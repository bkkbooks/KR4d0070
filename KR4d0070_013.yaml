body:
  text: 樂全集卷十三宋張方平撰芻蕘論武備論臣聞善為國者不師善師者不戰善戰者不敗若夫文德修於兩階聲教被乎八垠兆庶懷仁愛之如父母夷狄慕義親之若君師愷悌之化行暴亂之端戢是謂善為國者不師帷幄之中几筵之上指顧之際得失起焉蘖折其牙厲平其階其為理也有不可亂之勢其為備也有不可犯之形此謂善師者不戰合軍聚衆交和而舍將誠勇智衆誠精練天地誠得法令誠信而我之廟算必勝矣此謂善戰者不敗雖然兵者死地而戰危事也故昔之為國者先為不可勝以待敵之可勝不可勝在我可勝在敵故為國者能為不可勝不能使敵之必可勝不可勝者備也可勝者戰也故曰善用兵者無智名無勇功備於無形策於無聲攻其心於未合伐其謀於未成故不待交綏而敵已屈夫如是又何智名勇功之有乎易曰重門擊柝以待暴客蓋取諸豫又况宅天下之大而可以忘武備乎故預備不虞古之善政不教民戰是為棄之昔周氏因提封之地立乘馬之法天子六軍兵車萬乘比年簡車三年簡徒五年大簡車徒春振旅以搜夏茇舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉漢制京師則有兩軍七校郡國則有材官樓船皆嵗時肄習武事未嘗廢也後晉武帝既定吳會講武於宣武場時山濤與盧欽論用兵之本以為不宜去州縣武備帝雖稱善而不能用永嘉之後冦賊蜂起方郡皆以無備不能制天下遂成戰國至隋文平陳始通王統內置十二衛棲功臣於散地外分折衝府備兵籍於調發唐因其制凡三百七十四府散於諸州而名𨽻諸衛後承平漸久中國安寧於是逃者不捕亡者不補衛士無實籍衛將為虛名至天寶中遂停折衝府而幽陵之師堂堂焉在咸鎬之郊矣於後章武削平羣盜恢復兩河而植頴無成務之才旋至叛渙昌俯建銷兵之術更取孤危本弱末強漸成顛拔強蕃內侮王室其頽今我治朝丕迪皇道海寰一統神旗無指伐之行戎虜稱和齋鉞息受成之命化平治定三紀於兹是以衣冠搢紳不道軍旅之事貔貅士卒罔知戰陳之容天下安於隆平郡國頗以無備夫天生五材民並用之廢一不可誰能去兵故兵可無用不可無備善師不戰備之謂也故國之大事在祀與戎政之本經惟文與武禮樂制度文之施也禁暴戢亂武之用也今朝廷所言大事必曰軍國是知兵者時之大務邦之重柄臣陋愚諸生不達兵事今所論著皆參校前史舊迹得失之狀可施於世者冀上贊廟堂之餘論焉民兵臣聞周典因井田而立軍賦稽民數而起兵役約比閭族黨州鄉之法為伍兩卒旅軍師之制乘馬器甲皆隨而具搜苗獮狩因訓練之辨其鼓鐸鐲鐃旗物號名之用教其坐作進退疾徐疏數之節示以號令之信習以陳列之容故其民趨耕則為農起戰則為兵居處同樂死生同憂服容相别音聲相辨自三代至於隋唐兵農之業未離也隋則諸衛領乎鄉團唐則諸府備乎衛士初文皇貞觀中因踵隋制內為十二衛將軍之號外立折衝府都尉之名其府兵分置於畿甸及諸州而名𨽻諸衛天下衛士向六十萬人成丁入籍六十出役每嵗十一月以衛士帳上於兵部以備調發後天下承平漸久武事不修天寶中府兵無復存者遂停折衝府立武士帳而兵農始判矣郡國無備索然虛邑及盜起范陽併河朔獵留鄭衝鞏洛突函潼如踐無人之境焉肅代已降干戈日尋帑藏不足以贍軍士爵位不足以賞勳勞拔用聚斂之臣廣為斂剝之計生民膏血滴瀝亡餘悍將驕兵未厭所欲而跋扈藩鎮之帥睥睨朝廷之隙招置亡命募集姦凶至乃撫息詬濡育為假子取其爪牙之效為厥子孫之謀故大厯中李正已擁青兖十五州之地養兵十萬李寶臣據趙冀七州之地養兵五萬田承嗣有魏博七州之地養兵五萬梁崇義有襄鄧六州之地養衆二萬皆因叛亂得位各擅土宇盤根結固輔車相依上不供乎職貢下竭盡乎民力以奉軍給各圖自固時李抱真觀察澤潞當山東之兵衝土瘠賦重人皆困匱無以贍軍抱真乃籍户丁男三選其一有材力者免其租徭給弓矢令之曰農之隙則分曹角射嵗終會而校焉及期按簿集試示以賞罰比三年則皆善射抱真曰軍可用矣於是舉部內之鄉得成卒二萬前既不費廪給府庫益實乃繕甲兵為戰具遂雄視山東時稱昭義步兵冠天下於時朱滔在薊李納反鄆武俊亂趙田恱擾魏乘纍世之巢穴為藏姦之淵藪相為影援合勢同率然而上黨孤軍獨稱忠義奮擊河朔傑賊憚走由是觀之蓋養卒要乎姑息民兵可以訓練姑息之卒難用訓練之兵易使也我太祖之北征也亦嘗制為鄉軍之法獨取乎三晉之民而得十萬之衆是時北鄙繹騷國兵再衄義軍奮拒號為強鋭夫界邊之郡民多習鬬結曹分伍挽強拔距裹糧淬刃惟敵是求習其川原識其形勢以戰則力以守則固不食廩粟不衣藏帛不邀上賞不利寵名郡縣相維聚落相護鄰里相任刑罰相及故民兵之與營卒利害嘗百倍也伏願逺採周唐之法近考太祖之制謹修民政寓行軍令若夫十鄉之縣鄉之户千為户一萬老者疾者鰥寡孤獨困窮無告者去其半存者為户五千貴者賢者能者服公事者去其半餘得一師五縣之州為一軍諸郡縣之大小視其民之衆寡設為團隊理如軍法嵗終農事之隙縣大夫親誓其衆頒官府之鼓鐸旗物兵器教習其坐作驟趨擊刺之法州長巡行部縣察其精慢而誅賞之農事既修命歸鼓鐸旗物兵器於官府各使執事于田如此則兵農之勢再合營聚之軍可省國用必積民力必寬臣竊見今之郡縣非邊戍之地者郡卒才足給徭役縣直不足供追捕聚無寧壘兵無繕器數夫攘臂勢且奔擾百人譟突立可潰亂且秦之顛也以陳項漢之危也以黃巾唐之覆也以巢冦此皆烏合於倉卒計非其素定無決全之算非訓練之鋭奮梃為戟揭竿為旗而躒郡夷都如摧枯破竹瓦解土散瀰漫莫遏雖乘朝政之有釁抑由郡縣之無備也今民兵誠設搜練以時戰士服於田疇部伍存於軍籍兵仗貯於官府粟帛實於帑庾寬其苛斂復其他徭調發立集事平隨散外則郡國武備得常訓整內則禁衛驕兵可漸消減雖外敵有冒頓之雄叛將有蚩尤之強匪民有勝廣之姦且亦不能自外而起變矣顧議者以為何如任將臣聞馭將之道置兵之機繫天下安危為國之大事臣實陋儒寧識其術竊按前代之載册觀英主之立制較其輕重之勢考其得失之迹最為得䇿惟在漢唐漢定天下置材官於郡國京師有南北軍之屯後平百粵更增七校其有四夷之事旋授中府之甲入卿出將無文武之常位因事立號無名職之定稱故五營六郡之旅事畢解散二師下瀨之官功成輒罷而將軍奉朝請矣是以終漢之世無弄兵內侮之禍東都之後四方分裂重兵在邊驍將揔戎強臣執權國從外理故叛亂接踵顛危相逐唐氏一統乃因隋制內設諸衛以處武臣外布府兵以𨽻諸衛四方有變選將於朝調兵於府建牙而出凱歌而旋將軍就第矣郡縣有守禦之備朝廷無權重之臣不耗帑財不費廩給國力充實民用家足本末相稱表裏相託誠天機神算平康之道也至於景雲之初始立節度之號以雄邊鎮以寵勳臣行則建節府樹六纛得以軍事專殺而方面始大及明皇天寶之末昏惑不事邀功競進之將獻謀於恢拓當國執法之臣務專乎寵利兼道開鎮地逾四履鋭卒殲於沙磧邦財空乎上林蓋中原無擊柝之虞而北兵排乎函谷矣由是憤兵悍將連衡接勢東擊西應朝降暮叛更相禽獵或自篡逐生民焦灼勦絶耗斃肅代之後中官得政行軍始於輔國軍容自乎朝恩塈德宗之興元置中尉於神䇿兵權國命盡在北司矣蘭錡虎臣皆其子蓄方嶽戎帥率自賄成至有市井賈販之夫臺輿厮養之賤折券而取千里諂附而得通都至於蹈利干賞壞法侵紀姑息假借養成驕孽君位天祿如從其貿賃以居焉故唐氏之基圖終為藩臣所傾且古之賢臣在國則為相在軍則為將商則阿衡佐升陑之伐周則尚父領渡盟之師姬旦東山之征以尅淮奄孔子夾谷之會以折齊萊漢髙文之朝命相於諸將之列武宣之後將軍為執政之官留侯漢祖之謀臣未嘗親矢石髙密光武之元勳本則理俎豆孔明處士也西據荆州建蜀三分之勢元凱書生也東平吳會成晉一統之基江左五朝兵官尤重二衛四軍五校七帥皆選朝廷清重之士搢紳名望之流介胄武人非所預也唐初大臣入為三公八座出為行臺總管故自三代而至唐氏莫不合兵農而議政通文武以命官是故苟有制勝之術何必擊刺之伎乃為勇苟有經邦之道何必章句之學乃為文若夫積恩澤以稍遷階奔走之勤舊以敢死為武以引強為材裸股肱而決射御程軀幹而角健捷此所謂匹夫之敵一隊之長又豈將之云乎又若樞密之名近由大厯置於宫閫不列朝位凡中外臣庶上計議事干軍國祕未宣行則謂之樞密兵亂之際機務煩多乃用中人使專掌職五代後唐已來始更崇重與宰司分總文武謂之兩府焉噫夫欲論致理之要講太平之策是必先在乎一政事通文武合兵農而後天下之務可成矣如曰未能則漢唐之盛終不至况曰三代之道歟臣策事迂鄙衆必誚其難用然通識逺慮知治道之本者必有是乎臣言者也兵器臣聞鑠金為刃弦木為弧古之聖人以威天下故國之重器厥惟五兵歷代寶之以為神物是以周官六職工居一卿其治兵之工則桃氏為刃函人為甲冶氏為戈戟廬人為殳矛弓人為弓矢人為矢其典兵之官則有司甲司兵司戈盾司弓矢之職掌辨其物受而藏之以待軍事故天有時地有氣材有美工有巧合此四者然後為良夫寒溫異宜隂陽異齊此天時之節也剛柔殊性堅脆殊理此地氣之分也燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也粵之鎛燕之函秦之廬胡之弓車此工之巧者也古者百工之伎必皆世守監長日號戒其不良物勒工名識所精濫而有司乘其事考其器以上下其食而誅賞之是故預備不虞古之善政不忘武備邦之大經臣竊見今之州郡所上兵物徒有兵數實皆濫惡不足為用蓋天下承平長久兵未嘗試上吏視為冗務監長安能盡心選占善工為家治具又州郡率少軍匠借役民工以次姦侵苟求速就及輸上中府而主吏因緣為市惟貨是問閲數而已其為弓也角斤無液治之法故其引之必撓縱其為矢也笴羽無深厚之數故其發之必翔俯其為刃也金無煎和之齊安得敝盡而不惡其為函也革無豐約之制安得長圍而便利夫介胄不完士如袒戰器械不精卒猶手搏是以古者兵有三制視人形之大小甲為兩旅權服者之上下故井賦之法車甲各出於丘甸焉若其合軍交和鼓驅而進以命爭命以首爭首而弓折刃卷甲裂鐏敗是乃委人於死地而奪其自救之具也不教民戰尚謂棄之投人於死豈仁之謂管子曰致天下之精材者五而六之九而十之來工三倍不逺千里矣又曰聚天下之精材論百工之鋭器不課不用不試不藏記曰日省月試餼廩稱事所以勸百工也臣謂宜嚴立新條務釐此弊外使州郡守倅通領工作而委提點刑獄揔檢之厚匠手之稍食寬日課之役力材取乎精不取乎豐工務乎盡不務乎速器求乎良不求乎多吳殳越戟之利燕弓代革之徑因地之産就民所工設為監司厚價募取則雖田閭之下匠鍛之巧一人一藝咸歸官府矣而內選重臣掌其守藏司其頒入凡州郡所上必有試焉工有不當必行其罪如此則府皆善兵國有重備以待武事無誤他時夫害起乎甚微患生乎所忽兹事雖小所繫極大故獻鄙議冀裨冬官氏之闕政焉樂全集卷十三
