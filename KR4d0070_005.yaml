body:
  text: 樂全集卷五宋張方平撰宋頌并序昔周自后稷有功生民至太王宅岐下實始翦商肇基王迹文王受命養晦武王丕承其烈戎功耆定始安鼎洛至姬公旦隆建禮樂酌告太平成康之間頌聲爰發其在于詩肆有清廟臣工之什咸所以噫嘻歎歌本先王之懿德以薦郊廟告諸神明是謂承天之休漢自髙祖夷靖殘酷克就王業孝文保厥成孝景奕其光勤儉安厚四葉富庶刑措不試格于大寧爰及武帝重熙襲盛數䝉瑞物而近侍詞臣乃始作為寶鼎芝房之歌用備祠祭以大樂其祖考書在簡冊流耀無窮亶乎顯哉有國之美爍繼序善承之孝也今聖上再臨軒録士之春臣方平預鄉老賔興之書伏觀國朝清靜儀法昭郁深惟太祖皇帝神聖天機經綸屯昧開五季之荒棘翦專土之跋扈天麾時指趨順詔令既賔既治民獲更始太宗皇帝緒闡逺猷樹建程令始大一統為長世之謨先皇帝毖慎不怠薦膺駿命澤南加而威北暢受豐報而享厚利爰定有北載櫜載戢文德舒密武事嚴尅天旋坤寧雷厲風肅隂陽端序生息祥遂東封泰山西祀汾睢殊休偉觀充塞蟠極振古能事悉舉畢至皇帝陛下祇奉文母光覆寰表盛德大業承前灼後然而自開國建太平且七十載而詩人未能法周漢故事薦美祖禰播于樂章以備登歌臣誠固懵幸生清厚之世陶漬醇醲之化越在草莽恨未得見邦家典禮敢採民間所聞其焯爍尤異者裁為宋頌十五章為上下二什其天假之什八篇繫之先帝其日之初升之什七篇繫之今上焉觀之祀祫之㫖而祖宗之淳烈見矣雖道聽塗說不足以鋪張對天之休而腹鼓壤歌亦聊得發揚輿人之頌也天假之什宋頌上天假先帝既封岱宗旋廟薦諡告祖宗也天假元命皇武基之率時永猶烈文熙之爰撫大夏溥底維之克懷惟德非天實私之繼圖爾成駿嘏允綏之天假一章十句大定祀烈祖也太祖始受命平天下焉芒芒九宇微禹疇奠嗟在五季亂厖孰剪人紀大棘百年殘獮帝心震傷降武于皇皇受命純將孰為昏狂敢專叛亢薄舉震之悉致其良海寰內外際于覆載景云休假九琛來㑹大定維武丕有烈光神用燕休民用靖康天用顯相後序用永昌繁祉無疆豐年穰穰大定一章二十五句曰嗟祀太宗也太宗致理之勤克成大業又以戒焉皇帝曰嗟豫念在昔如帝軒勛華可謂至德君臣無邪相迪戒敕顯成有家皇帝曰嗟豫念後世如魏晉已還多在凶德以速後艱土宇崩裂典禮隳殘幾世幾年生民瘁殫皇帝曰嗟近如唐時革亂勤理維是文皇奄保終釐肆造大室曾孫之庇皇帝曰嗟天既相成豫廟艾拔荒棘中區一闢惟豫克念庶勤有績緝永熙圖授我後人敢有怠思曰嗟一章三十二句報成以成功告上帝上岱宗封也噫休哉天實陟我烈祖奄截九壥式夷式靖烈宗奕厥成纍緝熙于丕命駿貽我無疆之謀萬世萬年維祗保之念兹純嘏非天實相峻極宗嶽維華之望爰邁柴告上帝其饗遍綏百神禮秩具宜不夸不勞不私于祈錫我有年民無札疵於皇顯思百祿來覆宜民宜家佑我長世報成一章二十五句有北北鄙始賓也桓桓無競隂隂有北不訓于方與我為敵維聖宅中嚴德四驚荒服來庭有北仇仇不格不柔朔易薦騷皇咨于右其閲而旅六飛言襄金鉞雕斧旗旄茷茷鸞軛楚楚貝胄朱英犀甲粲組如風之撓如霆之怒既伐我鼓師蒸澶浦皇武烈烈王旅截截有拳有傑如火之烈如山之亘如川之決薄言奮兮朔漠震兮如摧如僨兮執或釁兮劉或徇兮我武既張一戎底康既定有北要夷來王有北既來惟皇之威王旅振凱旋告廟社揉此萬邦格于丕寧百世永賴有北一章四十句有諶上帝真宗德澤淳洽天錫祥應以寶書來告也有諶上帝鑒允明哉夙夜維德毖厥成哉降命不渝克祗克承哉匪物告之言喻來哉序我寶厯展有開哉永保安無疆不震不回哉振古其有維德之懷哉有諶上帝一章十句祈汾隂祀后土也萬邦清和歲乃薦有思皇烈祖既勤繹止撫有疆土迄若正命妥綏有家於嘻承武敦尚斁思亦既顯報以升以降以禋以祀報時介育介育不已生物靡靡降福侈侈其逺驛驛其豐蓻蓻祈一章十八句龍登于天國家啓祚在宋上幸亳回按蹕念創業之艱始命升陪京營祖廟焉龍登于天大辰之域式遄受命戡亂作極於惟烈祖于家之造念初時艱不忘惟孝取虞往猷我邁其永休龍登于天一章十句天假之什八篇八章日之初升之什宋頌下日之初升上始即政也日之初升顯就維漸於丕承哉祖考之獻烈烈顯祖皇皇昭孝維命不易永保克孝惟命實艱孝則克守日慎如始天將綏佑既錫令康介以眉夀如地之靜如天之健而肆能久亶成厥後日之初升一章十八句天監有事于南郊也昊天蓋髙降監顯在於亶熙哉肇佑我有宋三后介之天命可畏翼翼保之對越在上維懷格思乃眷不違福祉繁錫宜我子孫永以無斁天監一章十三句民懷母后佑臨御也民懷維仁既安克厚亦文母在佑肆德多有穆穆昭考肅事宗廟上帝是綏誕此文母克順承天為萬邦度采翟有章聖子維后兆民歡仰如天之覆匪特仰兮願言將兮荷百祥兮夀無疆兮祚寖昌兮民樂康兮民懷一章二十句皇造祀真宗也於鑠皇造照時密幾肆動有靖届天之威盛德襲成格斯純熙天寵有嗣我顯膺之奕奕昭廟孝孫來享湛樽潔粢有充騂犧肆夏在堂鐘管在墀總千萬兮蒸獻祗祗萋其儀兮載永載迎亦昭假兮既昭假爾孝孫惟后神人且宜保兹萬夀皇造一章二十三句有浚者泉大祫祖宗也有浚者泉匪長自源皇建民極彌萬世則允時帝軒之力肆有羡德小侯國是宅大龜是食帝命不越炎德原發丕顯后祖懿德之平聖獻庭庭帝命是膺彤盧旌斧以征以輔洵烈且武肇荒東宇克寬克擾不澄不撓百休是保天祿始造江介既耰湖潭嶺陬右叙川蜀并汾之酋師行優優不犯不劉取其大球旗裳冠旒格其僣戾悉公我謀三象霧霽無競惟休中葉奕章有猷有常敷哲維人天錫無疆彌億萬年山嶽之固河流之長嗚呼令王實念兹來享有浚者泉一章四十五句載耜修千畝也月旅孟陬農事既飭陽氣蒸達原畛充澤駕言徂郊載耜告籍申命農畯率時主伯爰任疆游開其休棘乃播而實亟耘以擇既發我公亦服爾私迄登稔成有穫丕丕爰稟于廟積億及秭以豐粢盛以供酒醴以禮賓尸以格祖禰既登既徹亦勞其耋以措以澤穡夫胥悅載耜一章二十六句成重民政也敷告旅臣祗考乃涖釐爾民人以成來比顧時元元豫育維子克愛克勸克廉克類豫顯陟汝汝庸汝異思荷多福往勤汝試迄成登年惟郊之既乃尅乃怙乃慢乃侮豫有顯誅罰不赦汝成一章十八句日之初升之什七篇七章樂全集卷五
