body:
  text: 樂全集卷十九宋張方平撰論事上疏一道臣伏覩丙午詔書以星文流變坤載震搖先春而雷衆異間作陛下惕然戒懼思所以當天意爰下明詔誕告庶官凡上躬之闕遺政刑之闕失阿枉之黨䝉罔為姦咸使密疏以言悉心無隱約之親覽靡及有司臣伏覩詔書悵然感慨逺惟祖宗造基立法之勤先帝持盈垂裕之意勑天之命撫此下人無疆惟休亦無疆惟恤陛下天資神智英睿聰明紹隆基圖恭承帝事治民祇畏罔自暇逸嚮若僕臣皆正股肱惟良協心弼違將順其美陛下可以髙揖成康之上徐步唐虞之域惜乎人主有仁明之德人臣乏輔翼之材因循蔽欺偷取一切治而無法弊不謀救沴氣成象變咎薦臻皇皇焉獨貽憂於陛下也臣愚孤逺學識踈陋猥逢詔㫖詢于芻蕘謹稽探天人之情參合古今之論上原厥罰之本下陳致治之方儻日月之明照此心之忠義斧躓之下免報讎于權强是由陛下至明豈獨微臣受賜惟陛下留神研慮察臣狂言臣伏思詔書曰星文流變者臣鄙儒不通天官之學謹按前志說春秋星隕如雨為王者失勢臣下專恣之應况紫垣太微上帝之座天子之庭列星布位近臣之象流移失次乃邇臣不恭其職相朋附下懷二苟容不忠王室之咎也坤載震搖者臣竊考載籍歷世以還地震之異未有若今兹之甚者謹按前志陽伏而不能出隂迫而不能升於是有地震兹謂不隂夫坤為隂體臣道也妻道也外國之道也陽薄於隂而不能勝相乘而震且定襄之地直王城西北正在乾位君德所在天之警告夫豈虛發先春雷震者臣謹按前志雷當以二月出其卦曰豫言萬物因雷出地皆恱豫也以八月入其卦曰歸妹言雷復入地則孕育根荄保藏蟄蟲雷本陽氣有人君之象故先時而聲猶陽不閉藏發泄無度也又正月以來日䝉少光輒或數日不解臣謹按前志䝉如塵其䝉先大溫巳䝉日不見行善不請於上兹謂作福䝉微而風解復䝉下專刑兹謂分威䝉濁奪日光公不任職兹謂不黜䝉一溫一寒風揚塵知佞厚之兹謂蔽此䝉大略也臣聞上天無言示人以象人君省躬應天以實是故考政者必求于天端弭災者必推于人事天人之際其應甚明臣謹按春秋之義舉往以明來觀著而思微天地之變國家之事粲然皆見無所疑矣故夫星流而殞地震而裂先春而雷日䝉不解其咎皆由乎陽德舒緩隂道專縱下為阿比以蔽聰明者也臣愚不達道敢因四變推明七事臣聞之書曰無敢伏小人之攸針蓋言明王求理不遺下言也臣議雖鄙切以為今世之切務治道之至要難尚此矣陛下幸加惠不以臣之疏逺而廢其言天下幸甚何謂七事其一曰密機事二曰用威斷三曰廣言路四曰重圖任五曰正有司六曰信命令七曰示戒懼何謂密機事臣聞之易曰君不密則失臣臣不密則失身機事不密則害成故春秋之義譏君之漏言是以人臣造膝而對詭辭而出人君明以察之斷以行之慎之至也韓子云事以密成語以泄敗臣比見羣下之言事者深言切論陛下或播之於左右囊章密疏陛下多付之於有司凡國之庶政得失之疏莫不繫乎二府者故諸臣下之言其有指摘時病及諸治亂者則用事之臣必所不恱而陛下更暴其言而露其章緣是而䝉譴者有之矣此蓋陛下體貌大臣篤其誠于勿二疏外羣下忽其言之未然大臣固不可以忌疑下言固未可以輕信然亦在深思其意㫖徐察其情僞參諸理道辨其否臧言苟可行自當聽納言之未善置而勿揚使下竭其忠效所見則姦謀僻行不萌於下嘉猷正論日聞于上致理之效何以先此今清問之對封奏之事開言為怨府灑翰為禍胎沮忠義之言成忌克之俗人悼後害孰敢獻納下情壅隔國之大禍也臣深願陛下先務此道以為立政之本凡臣下入告之議宜斷在聖心清問之言姑慎于外泄念大易失臣之戒防春秋漏言之譏則天下有心之臣皆為陛下用也其二曰用威斷何謂也臣聞書洪範曰惟辟作福惟辟作威臣無有作福作威臣之有作福作威其害于而家凶于而國故春秋之義譏鄭忽之弱以其脅于權臣也君人之柄惟賞與罰信賞必罰惟斷而巳夫乾體以剛天行以健故能中正無邪運用不息人君之德配乾而法天者蓋取乎剛且健也以陛下之英明溫睿而濟之以斷天下不足治也往年莊獻晏駕陛下親政革弊去蠧拔材賞忠斷自淵衷不撓于下典刑立正區極一新天下翕然皆謂陛下天機如藝祖神略如太宗萬世一時無窮之福也今者道路之言皆謂陛下寬厚敦恕徽柔廣容事存大體動循往例臣竊惑之此蓋怙權之臣摟取邦柄故說陛下以為人主之孝莫大于奉先志守成規夫祖宗之所以建基圖垂謨訓炳如日星信如四時雖百世其可易諸至于操紀律明賞刑用正人去邪慝治不忘亂安不忘危以和其民人而保其宗廟此孝之大也且政由俗革彼此一時事體權宜各有云設或迹存而理異或治久而姦生必踐而行以為無改於祖宗之道尚安足以為孝乎易曰窮則變變則通通則久故復而不厭久而不弊之謂道遵常守故非聖人之事因時損益乃建治之理昔先王之作為爵祿賞罰臨事而制宜是以為天下之主見勞授賞則衆譽不能進無功見惡行誅則衆讒不能退無罪若政無大小人無大小弛張用捨一取諸例是爵祿賞罰不在人主而在簿書也豫奪之柄於陛下何有一史持簿書按例而足矣此蓋用事之臣自謀之慮不才而例進者收恩在已才而例退者歸怨于君人主欲賞拔忠良擢用才俊而用事之臣不恱者輒曰於例不可用事之臣猥引親舊妄援謬庸而人主欲詰其故輒曰於例宜然以致今兹臺閣混淆賢愚糅雜典刑都弛名器益輕于後執時政者便于引例之說終無發明之言臣嘗讀漢書至朝錯之事惟錯謀䇿宏逺達于權義有致主經世之志戮于姦讒之口而史氏不能褒其忠更譏以變古易常之說臣竊憤厲痛忠臣之難為也臣又讀晉書至何曾之事誡其子曰吾每進見未嘗聞經國逺圖但道平生常語此非貽厥之道及身而巳且曾為上公圖之不建誰任其咎而史氏不能貶其罪更美以知幾先識之善臣竊惋悼痛諛臣之誤國也嗟乎忠諛之無報淑慝之不顯其巳久矣又可獨長嘆於兹乎臣愚伏願陛下奮乾威發天斷裁正無不忍之愛采拔罔疏賤之隔大稽諸古小度於今使天下之耳目常新萬務之本原必正無曰引例合義而巳帝王之制不亦光大乎其三曰廣言路何謂也臣聞書美堯之德曰詢于衆春秋之義大君命譏大夫之專者今天下之士不思結知于人主思見知于貴臣願歸恩于强臣不願受恩于人主何歟得强貴之心者身不涉危而長保富貴䝉陛下之遇者立未及安而巳罹禍咎今夫大臣有所薦論陛下重違其意或勉從之陛下之有眷遇者而大臣獨不能以陛下之故姑收其用必排而去之何陛下之待貴臣厚而貴臣之待陛下薄也而又多逐善人指為鈎黨使陛下腹心無所寄耳目無所託姦無所發惡無所彰九重之深漸成孤立陛下天縱將聖知幾其神此理甚明豈其不悟昔漢魏相白去尚書副封以防壅蔽而宣帝得以知禍變之微為漢明主唐太宗躬勤政理明于聽受著司門式云其無門籍人有論奏者皆令監門司馬引對不許關礙又制大臣入論事輒引諫官隨入或對問之言有虧理道即從而諍之此唐文帝致太平之跡也至代宗時元載為相邪慝不法懼為人言因議凡羣臣奏事皆先聞之司長官關白宰相而後得上聞時顔真卿疏奏曰往日李林甫欺君擅權姦驕用事羣下指言者率皆因事隂中傷之猶不敢顯為條約以絶言路以為元載之惡過于林甫也惟在陛下開延讜直虛心接納無限卑逺苟造膝而有益雖犯顔而必恕以通天下之志以成天下之務其惟廣言路乎其四曰重圖任何謂也臣聞書曰鄰哉臣哉此帝堯所歎以為與已密近之臣必有德也又曰欽四鄰此帝堯所歎以為在已左右前後之臣必正人也故春秋之義以為天子之宰通乎天下重之至也夫國之所謂大臣者莫尊乎宰相君為元首宰相乃其股肱動靜休戚義猶一體宰相之職朝夕王所論道官材圖議天下之政者也安有居宰相之位而足不至王庭靣不見旒扆言不聞君聽者乎大臣疾病君為之憂軫上醫治療內使臨問數賜告加恩意禮厚矣若其偃息卧家遂罷其朝謁曠時彌歲則未之有也伏以臺司為具瞻之地廟堂非養病之所朝廷之儀不可慢社稷之重不可輕况今災釁荐作人心洶懼安危所繫實在柄臣伏願陛下為宗社之大計略恩禮之小節髙選德望考慎厥相應譴告于上穹示大公于天下且自災異之作陛下憂勞謙畏誕降德音舉諸闕政致誠罪已而元臣當國莫肯任咎苟安寵祿以妨賢路禮義廉恥何以訓下自餘三事任政之臣志行忠邪材智深淺必料陛下知人之明悉存乎聖慮矣其五曰正有司何謂也臣聞夫子曰必也正名乎春秋之義君不尸小事臣不專大名故尊者主要卑者位勞所以正位分明堂陛也人君逸于任使垂拱而治三公論政九卿分職羣有司各事其事故端本而影直振領而襟整衆務百職各安其局今夫津官亭吏一命之微米鹽貨利毫杪之細莫不關决衡石煩黷天衷三公不修其職而猥侵羣有司之事羣有司苟謀期課莫安所守上下姑息習以為常偷慢懷安風俗益弊臣愚以為方今國體所繫政府而下分職之重臺省備矣而豸冠乏匪躬之士蒲規鮮替否之言當衡鑑者循資格而無賢愚之别絶勸賞澄清之義運計籌者張空簿而責錐刀之末無斂散輕重之權政失其本事忘其舊其所召弊由來漸矣臣愚伏願陛下少運神智詳思世務諸如此弊宜有興改撮其機要謹其關柅莫若擇任三吏切摩治本使夫總百揆者則謀用庶官之長列庶長者則各選衆職之任付之柄而責其效盡其才而要其成官守典司無相侵紊有廢厥職必正于罰如此則陛下優游太紫之上執賞罰之柄而羣下莫敢不奔走其職庶務肅然而理矣其六曰信命令何謂也臣聞書曰慎乃出令令出惟行夫命令者以簡為重以信為本簡則易從信則必行易從則不犯必行則可久此之謂為國之要為政之經臣比見朝廷出令或尋即更改或俄復停廢吏易之而奉行不固民忽之而苟慢多違揆大體而論之此害政之深者夫滋章召乎巧詆文煩所以法輕今條令重纍盈乎几閣自明習者不能遍覩况郡縣承用者乎陷愚蠢於亡辜羅元元之不逮其咎由乎格令之煩多而不信故姦吏因緣而為市也臣請今後凡諸臣有請改釐條制審復勘㑹益加詳慎無稽之言勿聽弗詢之謀勿庸俾萬姓咸曰大哉王言又曰一哉王心自然民無起詐之端吏息舞文之巧祥刑善制咸中有慶矣其七曰示戒懼何謂也臣聞書曰惟天降災祥在德而吉凶不僭在人是故或無災以傾其邦或有災以興其國無災者驕怠所以起有災者戒懼所由生故堯湯遘水旱之期中髙有桑雉之異一則以有備而無患一則以修德而弭妖今兹之變亦在陛下惟德之修而巳承弼之臣戒其權重者侍從之臣戒其阿諛者帷幄密近之任戒其用事之勢掖庭嬪御之嬖戒其燕溺之惑服羞戒其過制優戲戒其蕩心嗇用無小侈費無微念四方惟正之供憫小人作業之勞至于邊防之守兵食之備器乘之用將帥之材臣謂宜皆存乎聖慮矣臣故曰惟備之戒此其槩矣夫修省之方惕厲之意雖陛下兢兢夙夜不忘于懷然天下之人莫之知也按春秋左氏傳晉梁山崩晉侯召伯宗而問焉對曰山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉今震謫之異衆變重纍何啻乎山川之災臣愚以謂陛下宜于常禮有所降損齊居澄慮深思天意揆隂陽之道察教政之闕其在陛下者臣願陛下勿吝其失必易其度其在臣下者臣願陛下內斷于心明正其罰俾彛倫咸叙以邀天之福則七世之廟傳裕于無窮蒸民之生率同于慶賴矣臣位卑而言髙有陵越之尤跡踈而意忠有激訐之咎但使臣言一經聖覽微悟主心幸以涓塵於國家而有補則雖鼎鑊捐軀而不辭干冒天威臣無任激切待罪之至平戎十䇿及表臣某言臣于景祐元年以茂材異等對詔䇿陛下擢臣祕書省校書郎至寶元元年以賢良方正能直言極諫對詔䇿陛下擢臣祕書省著作佐郎夫士感知已猶許以死况陛下自臨御以來十五年中三䇿天下士中選者止五人而臣再濫揀拔等比三人而巳今雖逺在江湖之外而聞朝廷有鄙上之虞其可悠悠自同常人者哉臣不佞才見短淺然歷代之書備嘗涉獵至于成敗得失尤用心探討略能言其梗槩至於國論大體時務細故參詳措置使臣間議其中臣潛自量亦未敢在諸生之後是陛下再選臣于大問之下臣幸不辱也頃聞元昊猖獗敢干邊吏出車遣戍頗煩旰昃臣竊投筆憤歎西望毛竪恨身在遐逺不得請纓闕下思效愚者之慮輒上平戎十䇿臣未嘗過函潼之西故其山川地形風土人物不無闕略至于軍國機事臣以疏逺莫得詳知今所論著徒採歷代史册兵謀地志及所見朝廷施為顯然之事臆度道聽懼不精審至有所得或足以發伏惟陛下神機天略固無遺算萬機之暇清閒之餘少回日月之光一登衡石之末以臣䇿不甚迂踈乞召兩地大臣試于御前商榷或有一得上稱清衷則于海嶽亦有涓塵之益也所撰平戎十䇿謹别録實封附遞上進干黷天威臣無任戰汗隕越待罪之至臣誠惶誠恐頓首頓首攻心臣聞上兵伐謀又曰攻心為上竊料戎心之蓄叛謀有日矣國家自藝祖剗除五代之弊始太一統立太平之基太宗真宗休養生息仁澤覆露文德綏逺强敵侵軼驅逐出疆謹備邊而巳未嘗耀威靈勤逺略深入其地以恢封境也今元昊猖狂負恩且習我之舊有輕我之志而無備我之心謂我必不能長驅出塞薄伐問罪也臣謹按地志麟府本銀勝之地去銀州三百里夏州五百里其去興州封壤相接賊巢穴在興州中都山若因嚮導渡河直趨五七日可到賊來入寇必自延渭北還自救程途自倍若徒遣輕騎姑謀犯邊清野深溝足挫其鋭儻悉發其衆身來入寇則中都守備勢當單寡誠能先以精兵屯布旁河州郡至元昊犯塞之時為竒兵自麟府路入卷甲掩其巢穴使西邊城壘守險自固勿與之戰元昊聞兵臨國正所必救事出慮表衆懷沮懼數道伏擊潰敗可保且彼州父老我之遺人飲湩荷旃猶懷華土王師奄至可以恩信招徠則朔方之地庶復歸國伐其謀于巳定攻其心于不測所謂出其不意掩其不備一舉破賊策之上也臣聞先人有奪人之心軍之善志自國家失朔方棄靈武置戍內地控扼益蹙專為靜勝深戒生事然戎心貪戾益思蠶食今若屯兵邊郡坐糜餽廩來則自保去又不追費財無功損威示弱計者若不厚姑息之使甘心而後止則臣恐邊鄙之虞未能徹警也伐交用兵之道其次伐交今元昊所恃為交者豈非北國乎臣聞元昊與之通姻揆其事勢必先要結我與契丹通好餘三十年矣自漢氏巳來南北之和而能謹守信誓如今之久者未之有也非唯懷我恩信利我聘幣抑當我盛德之世無釁可乘今其與我之和好也在外而其與戎之和好也在內外雖我睦隂為戎助此又不可不過慮也示我之有禮防彼之有辭此為事機不可失也臣願遣使一介齎書一函示之以元昊背義之由朝廷備禦之意其書曰夏州自德明巳來受恩于國至于元昊撫綏彌隆今忽恣睢虧廢貢職藩臣阻命法當致討如聞元昊連彼婚姻遽興問罪之師實損與國之好彼誠矜其狂易遣喻此情若元昊悔過改圖效誠請命則我為之寬宥待之如初誠元昊不禀訓辭居然愎扈違我二國之命自恃獨夫之强則當明下詔書削其爵命申敕守將蕩除鯨鯢如此則我於契丹以元昊之故益示敦睦之道契丹于我雖元昊之姻莫興間嫌之說雖未能破彼之交而我之親鄰伐叛兩有辭矣專勝善用兵者我專而敵分我專為一敵分為十是以十擊其一也則我衆而敵寡吾所與戰者約也吾所與戰之地不可知則敵所備者多吾所與戰者寡矣寡者備人者也衆者使人備巳者也昔吳為三軍而病楚隋以易戍而弊陳多方誤之用此算也今緣邊城壘綿接千里臣慮元昊分布凶黨間出討掠示欲掩襲分我守備務以疲我而諸守將輕請濟師我備彼去正墮其計今鄜延環慶涇原諸路皆國家控制西郵置兵之根本也形勢影援足相首尾緣邊城壘於兹倚重臣請諸境上州軍精擇守將使修築堡戍斥逺烽候非時寇至姑使斂衆清野閉壘自保勿與輕接又元昊犯塞路皆荒磧地無水草齎糧而至假有攻圍勢不能久若賊亟來肄我則逐路發師設謀邀逐無輕動衆以損威重如此則不為多方之誤而取專勝之功矣以敵攻敵邈川大首領唃厮囉本吐蕃之遺種也自潘羅支殺繼遷而德明破滅六谷世為仇怨今諸戎能為元昊後患者惟洮涼爾比聞效順來獻戎捷朝廷撫納恩信亦厚此誠得以敵攻敵之良䇿也臣以為馭戒外蕃之道惟賞利懷誘亦在誠信要結今邈川介于西鄙感慕恩德納忠為用常所贈賄恐未足以致其力儻于朝臣中擇一有機辨材能之士銜命臨撫諭以國家眷遇之意凡元昊部族與洮河接境而我應援可及者使自攻取之為出偏師趨要害為之掎角是令邈川自為戰也或難臣曰元昊既弱邈川復强是元昊未破又生一秦矣臣曰不然今量邈川之衆固未能困元昊也我因其力而假之勢羌有貪利之心且為我用足以牽持元昊之後分其備禦兹亦多算之一端也安民臣聞武有七德先安民而後可以保大定功也今聚師西陲凡百調率應期趨辦實在關中若百姓力屈流亡騷動則嘯聚草竊不逞之民乘焉語曰鳥窮則啄獸窮則搏民窮斯為盜矣羣黨連結展轉相雄兹亦患起于甚微釁生乎所忽則朝廷之憂不在邊防而在四郊之內矣伏願陛下深念兹哉諸陜西將命轉運使等宜得識大體明時務周材之人充之凡廢置之宜弛斂之事當循寬大無使躁急陜西州縣長吏悉為選擇特降深詔告諸守令所聽民政務從簡直宿逋久負一切除免諸所科率起自近年有害于民者悉且權罷應徭役重色破民産力者使更張之以便安百姓關津山澤侵民小利者與衆公共以惠貧弱上以布國家之德澤下以裕編氓之生路以弭盜賊以固根本安民之要此其大節若其不先恤之而先困之寇未至而民巳疲則是自取疲也何保大定功之有哉置兵根本用軍决勝在乎統帥統帥不一則威令不行不相為用非成功之勢也近觀唐時元濟淮西之誅慶緒相州之圍成敗之由其事可見淮西之師中外疑阻以用裴度為宣慰使度才至師諸將各圖立功惟恐在後故元濟卒擒焉相州之圍子儀光弼皆在非無名將也以九節度之師不相統制但用魚朝恩為觀軍容使故相觀望卒以潰今環慶鄜延涇原等路各有部分莫相統領臂指伸縮當從中御機宜緩急勢不相及夫同舟而濟吳越一心利害背馳則為路人矣臣伏觀唐氏制度方面重權不欲專授戎帥故命皇子弟為元帥及節度大使而藩帥但授副元帥節度副大使及長史行軍司馬亦或命宰臣遙領節度及副元帥者今自陜以西永興當咽喉之要大河之南褒漢之北滎陽之西輸餽供億此其都會臣愚竊以為大軍根本宜駐此地而置陜西處置招討使之名應鄜延環慶涇原諸路皆節度之其大使請自聖心選置留止都下使遙領之擇命大臣才望威略可任以重者為副大使行大使事以永興為治所以臨制諸路凡緣邊城戍要害控扼之處為寇衝突或邀襲討逐當得鄰道相㑹合應接者聽其處置焉此則權用雖在外而柄鐏實在內輕重相持易以移改蓋馭將之要道也足食關中雍州之域厥田上上昔秦鄭國引涇水注洛三百餘里溉澤鹵之田皆畝收一鍾至漢白公復引涇水注渭袤二百里故關中號為沃野千里而無凶年自漢唐之盛此焉作都非為百二之固抑資膏腴之利也臣竊以為西疆之事宜聚重師于永興為臨制根本之地然今關中地有遺利山陵險阻飛挽為艱邊儲軍資供須勞敝今誠能按兩渠之故迹豐衣食之夲原檢責經界開置屯務則不煩逺為調發而足食矣或難臣曰昔唐氏都關中肅代兵興中外艱食禁軍乏餉百姓至挼穗以供之及劉晏領租庸轉運使最達食貨輕重之術然徒能引江淮之粟以食秦人豈二渠之利不興于爾時乎臣對曰昔在唐初二渠所溉猶萬餘頃及承平漸久事不務本沃衍之地占為權豪觀游林苑而水利分于池榭碾磑以故亡天府之利貽天下之害故二渠難復于唐氏之時正為建都于彼也今議復之又何憚焉豐財夫兵事之大財用為急豐財足用必有根本財用根本在乎三司比來邦費敝事積矣有司徒張空簿而國財靡散於姦游之手伏望選用材幹精力之吏通輕重之數明功利之術者核實天下之金榖以入為出以有餘補不足以㑹中外一歲經用之實則財賦之盈虛可預料矣而又通其積滯權其贏縮使關市不乏貨物平凖此理國行師之本也諸不急之務無益之作浮冗之費侵欺之弊精為節度以集大計子曰足食足兵洪範八政先食貨而後賔師故知師旅大事財用為急也備姦臣聞用兵之術多方誤之伏以東南糧運在于汴渠比來重惜民力久不開濬每歲霜寒水落沉沙填淤遂至渠底髙于堤下民屋至于黃河奔流湍瀉亦全藉隄防之固所謂築垣行水今黃汴是也自戎人即叙通其行商憧憧往來布于都市其所通結素無禁限唐憲宗初討淮西而姦臣王承宗李師道輩潛遣刺客暴害大臣斷陵廟之㦸焚芻廪之聚此亦慮外之事也今黃河橫腹心之內汴渠為輸委之本若姦人窺伺潛有決鑿汙瀦我良田損墊我邑屋阻絶我運路則是肘腋之下更生一役其汴渠黃河隄障益望擇勤幹吏密為分地巡邏以譏察姦人書曰惟事事乃其有備有備無患其此之謂也購募竊聞元昊勇而好殺安忍無親背面之間必有讎敵可重行購賞以動其人有能得其首級者舉元昊之爵位土疆授之而許以重師為之援護戎人不知見利必動則彭寵喪元于家奴苻生殞命于近族事或有之矣右平戎十䇿伏念臣齪齪書生本學爼豆之事區區壯志頗涉孫吳之書豈達權謀徒得糟粕頃聞元昊飽飛朝廷備禦雖蜂蟻屯聚犬羊躑躅仰惟聖慮未忘憂軫臣身紆郡紱神馳塞垣不得一至軍前圖上方略輒此遙度或禆萬分天地容覆日月照被蠢蠕微動各得盡情臣之芻蕘伏望採納議西北邊事今月五日中書樞密院聚㕔奉傳聖㫖宣示契丹來書并朝廷回答書本如所見有異令具陳奏者今朝廷答書大意且欲納元昊故書末有理難阻絶之語臣竊詳今來契丹與昊相攻虛實未保且以來書大體言之其辭以元昊不順朝廷之故因緣搆釁遂已興兵恐深入討伐後元昊却歸朝廷故乞拒而不納今若答書直云理難阻絶則是峻拒契丹之請堅納西人之盟得新附之小羌失久和之强國况契丹見屯兵甲近在邊陲因此違言或成忿隙控弦近塞有以為名則北鄙邊防素備何若患有遲速事有重輕廟算折衝厲階自弭事要允當義在兩全今西鄙遣人巳到境上欲乞朝廷降詔元昊大約言昨者朝廷納卿欵誠亦緣契丹啓贊嘉其善意遂議加封今聞卿招誘契丹邊户頗失甥舅之歡契丹遣使為言朝廷睦鄰有體揆之大義有軫于懷卿宜審處事宜早除嫌隙則誓書封册便可施行仍乞於契丹回書中具及此意如此則朝廷於西人有恩意之厚於北鄙無搆怨之端中國禮義容覆大矣若將來契丹却與元昊通和遣人復請開納則今詔敕巳具後命元昊被此德音應知感戴儻其凶德復為抗拒則較其輕重羌戎之患小契丹之患大斷可知矣叨䝉逮訪合罄愚瞽採擇用捨繫之朝廷再上議事臣等近為中書樞密院傳聖㫖宣示所答契丹國書令各陳所見巳於初六日同上劄子具陳事意竊聞朝議改定回答契丹書以為元昊若盡如要約即朝廷難為辭却者臣等竊懷未盡須至再有敷陳蓋當今可慮于西者三可虞于北者五何者若朝廷巳納元昊誓書勢必便行封冊而北使復至固邀我以拒絶此其可慮一也若朝廷已納元昊誓書遲留未行封冊是使西人窺我有所牽制此其可慮二也必不獲巳而封冊之命中止是中國無復信義永斷招懷之理此其可慮三也若報至契丹見我辭拒意堅言切萬一睢盱生忿因成急變則河東河北忽為所乘邊備何若此其可虞一也且以西人構難於我彼曾約束使來納和今西人起釁於彼我乃遂納不同其患持此責我彼為有詞此其可虞二也今二國相持事形可見元昊權譎無恥狙詐多端縱負屢勝之强必不兩延大敵北兵既迫或迎而伏罪則契丹號令元昊未應敢逆安知已和之約不能復使之離是我不能弭患于西徒以致怨于北此其可虞三也今契丹聚兵近在境上擇利而動勢不虛歸若元昊旦而受封彼必夕而望報但恐事之以金帛未稱其所欲也故不如叩其兩端之中徐觀二國之變逗留日月繕完守備不當乘其方逞激之卒發此其可虞四也夫二國之隙誠僞未明就使信然尤宜審處見情則獲直往必違而我以新附難保之叛人怒久和可患之强敵既促尋戈之釁翻堅元昊之交此其可虞五也凡此可慮可虞之事若朝廷深謀長䇿有以善其後臣等所不敢知倘未有以待之則若虞機張釋括期于必中爾臣等前議故願示以大義要之兩全且未納西人誓表特降詔書或遣一介之使往申告諭至于和約又非阻絶即具以此意回報契丹因令使人邀其終趣于北則言遜而體正於西則名拒而實通凡諸事機後皆可救臣等位叨侍從義均休戚國之大義復䝉訪逮愚慮所及不避再三伏望朝廷更賜採亮取進止學士宋祁同上樂全集卷十九
