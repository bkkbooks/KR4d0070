body:
  text: 樂全集卷十四宋張方平撰芻蕘論食貨論臣聞食者生民之命貨者百用之權興自古初世所最急神農氏始辨五種為耒耨之利以教天下而民知粒食日中為市致天下之民聚天下之貨立交易之法而世之財用不乏黃帝堯舜經土設井授時布政通其變使民不倦而天下之美利備焉禹辨三壤定九賦懋遷有無萬邦作乂周文王在岐制司馬之法建平土之政均土地連什伍以稽其人衆而井牧其田野以物地事授地職而令貢賦税斂之事葢古之王者所以制財用之道惟田及山澤為正其百工商賈衡虞之賦以其浮食去本之民猶罰而抑之也自周之衰庶民失職經界隳壞繇役橫作秦知順人心改之可以獲大利故滅廬井而置阡陌急耕戰之賞尊奬兼并猾詐之人棄削王制務為一切深害偷苛之政至始皇二世收太半之賦征戍輸發並起勦絶蒸民之生天下愁怨遂用潰叛漢氏接秦之弊務安百姓約法省禁輕田租十五而税一量吏祿度官用以賦於民文景躬脩儉德節用而愛人四方和平家給人足都鄙廩庾盡滿府庫皆餘財人知自愛而重犯法先行義而媿黜辱及武帝外事四夷内興工作七十年之積未幾而竭盡征戍交起天下共其勞行者齎居者送中外擾騷百姓抗敝以巧法財賂衰耗而不贍入物者補官出貨者除罪而言利立功之臣析毫分銖之士紛然而進矣於是設平糴立均輸起漕運興鹽鐵置爵級制𣙜酤筭舟車占積貯又下告緡之令更造皮璧之幣天下蕭然無聊矣以一人侈心之故為生民萬世之患是故聖人尊仁貴義稱歎儉德以利為賊其意逺哉自兹已還捃摘愈甚損下益上日剝月朘侵刻小民以為忠功南北披攘王澤竭矣在唐初世薄賦寛徭天寶季年國用寖廣邊有立功之將朝有專柄之臣戚里相驕女謁競進故崇禮慎矜韋堅王鉷以聚斂而進實繁有徒為上聚怨為民瘡痏是時承平既久民不願亂而此數人進邪䇿以侵擾之終為厲階以致喪敗迨至德之後兵戈不息調發轉餉百役並作人户凋耗版圖空虛賦斂多門殊科異調計司不能覆諸使諸使不能覆諸州猾吏權臣因緣為市津渡有率堰埭有征廬舍有税苗稼有斂乃至平率豪姓配取僮馬夫人之常情與則喜奪則怒故先王見其與之形而不見奪之理然後民可得而有也橫斂雖復利在侵剝猶以抑末遏强為辭唐氏之賦也異哉直取無名曽何異乎刼剽掠奪之也歟昔者明王之保國也其經費制用夫豈天降地出亦自民而已矣然其所以御輕重調盈虛出入之節備儲之道必有術焉爾大約唐制租庸之令定於武德兩税之法起乎建中牢盆之利大於第五琦而成於劉晏𣙜茶之禁萌於趙贊而成於張滂進奉之名起乎興元於後則有日貢月進之臣方鎮羡餘之目瀝民膏髓結上恩澤不領於縣官之經費而入人君之私藏焉此唐氏制財用之大經也我國家撫有萬方富全四海太平安樂且五十年邊塞無聚徒宿師饋運賞功之費州郡災沴足以饑穰相補民無急征雜調朝令暮具之急是宜綽然舒泰而乃公私之積不足兼年不幸仍饑民力困屈所在倉廪無以振救其由何哉非以天下之民趨末而背本者衆生之寡而靡之多外則彊敵為耗而供億無厭内則兵旅夙驕而匪頒亡度法制不立故編民僭王侯之服羞教化有虧故齊民入釋老之邪道倚市萃乎游手命卿鮮乎誠士是故耕桑之民漸鮮衣食之路益狹而資以奢侈用無紀極夫如是安取乎富且庶者哉是以聖人制民别其四業自天子公侯卿大夫已下至於抱闗擊柝其爵祿奉養死生之制各有差品小不得僭大賤不得逾貴故上下有序而民志定矣在易履卦象曰履以辨上下定民志其在節卦象曰節以制數度議德行又曰不節若則嗟若故先王制禮立法要在使人循於軌道裁其淫過使之欲寡而事節財足而不爭爾管子曰使民知分王道之本也若乃上不能節用嗇費使人以時國之制度不立民之游蠧不去則雖夷吾之權術李悝之能盡地力晁賈之善議論諸葛亮之理國用亦不足以有成也謹列往代濟國利民之得策危邦害物之亂謀可戒可法宜於今者舉其要焉屯田臣聞古者師役不逾時無逺征久戍之勞宿軍轉餽之費故在三代無屯田之事降及秦漢務恢封畧疲弊中夏外事邊圉魏氏之後吳蜀鼎立永嘉東徙遂成南北天下割解更相鄙夷分疆占域各分戍守力穡之夫鮮被甲之士衆曠日持久兵勢未解而屯田之利興矣漢昭始調戰射士設屯於張掖充國後擊先零羗留佃於浩亹魏武之經畧四方取濟許潁之積晉氏之南征吳㑹仰給江淮之儲唐太宗既定天下思欲散兵權省國用遂因隋制相要衝以設府計隙地而置屯三時務農一時講武居則有扞城之庸而廩食自足動則備調發之籍而戎事無廢及明皇恃海㝢之泰寧承國力之全盛府兵耗散田萊不墾後又停折衝府立武士帳於是乎罷丁兵而有正兵矣寵將驕卒坐而蠧食帑庾虛竭財用不贍而商利侵刻之臣百方誅取生人困瘁漸至危亂范陽搆禍日尋干戈代宗德宗專用姑息自諸方嶽之任徒兼營田之名荷㦸之夫箕踞待哺至憲宗時有司上元和國計簿校天下兵農之數率以兩户而資一卒人力凋敝可舉而知天下兵農之業遂離而不復合焉今國家之務莫大於養兵四聖同仁恭儉慎德靡遊于逸于觀于畋念四方惟正之供憫小人作業之勞節愛惟㣲嗇用罔小然出納之吝在乎有司刻斂勾收錙毫圭撮天地所産山海之富動植之物悉筦於官婦織不裳夫耕不食黎民力盡寒暑不息以供軍士衣稍匪頒之費汲汲乎其不能足也伏見議者有獻屯田之䇿雖未能盡該乎體要顯辨其利迹而或者猥為異説破其端緒臣輒為之揚㩁以申其論或者曰蓋聚衆邊境戰守相持留則芻糧不足解則冦患未息故且耕且守而後有屯田之事未聞平時興屯於内地也臣應之曰昔棗祗建安之迹邇布都畿鄧艾正始之謀近緣陳項晉荀羡興石鼈之利分界東陽齊嵇氏置懷義之屯乃在河内唐氏府兵就田天下相望後上元中因洪澤芍陂之饒大資國用我朝自唐汝河朔之郡皆由田務此固不待邊境而後有屯田也今淮揚許昌汝南之域人稀土曠地力不盡密接京輔便於漕發雖内師禁旅更出就食往復浹日不廢衛䕶又東平鉅野至於彭城率多閒田民力不贍決河之所墳淤皆為沃野嵗所收入東自濟汶漕而北洄可至河北東境西入廣利渠可至太倉曹南陶丘可為廩積置屯之地無便於此江淮之境人稠土狹田無休易可以布屯且國家嵗漕東南之粟度其運致費已兼倍此為謀之迂也或者曰唐氏之前兵民同業本調取乎農版故可任於農事今之軍士皆市井桀猾去本惰游之民至於無所容然後入於軍籍且其驕也久矣呴濡保息莫敢拂其心者是可使之寒耕暑耘者乎臣應之曰昔之為屯田者多在師旅之中解甲胄而執耒耜釋耒耜而執干戈出死入勞莫之憾也惟所御用之而巳又况四方無事邊疆無役衣食足而起居時安室家而守妻子使趨南畆各食其力又何慊焉蓋智者謀始因勢推移使事濟而衆安在資權而成務臣雖不敏請試効愚蓋漢氏之屯田也發弛刑焉曹氏之屯田也置營卒焉後魏之屯田也借民力焉唐氏之屯田也以府兵焉或兵或民惟所用者今天下浮户依强家而為佃客者取分末之利輸大半之率由無以自業也倘優制招來艷之以利寛其賦入復其他徭則願屯之夫襁負而至矣為置典農之官專司力穡之事功勞報賞為法必信因使冬隙簡其强鋭教之角射賞其精力古者因農事而寄軍令蓋此之謂則是募屯田夫得屯田兵也居則稼穡之人用則戰騎之士不衣庫帛不食廩穀是驕卒可放省屯倉可待盈雖有凶荒水旱之變而軍不乏乎儲峙民不増乎橫賦建屯之利其亦博矣倉廪臣聞古者民三年耕則餘一年之食九年耕則有三年之蓄通三十年而有九年之積豐年補敗雖累凶年民弗之病然後德化流洽禮樂興焉此三代之盛平土分民富庶而教之本也周衰經界失叙生業不平則有權謀之臣通變之士調盈虛之數脩輕重之術以制國用均民財若夷吾之凖平李悝之平糴漢桑𢎞羊之均輸耿壽昌之常平下至齊氏義租隋人社倉之制是皆便物利民濟時合道安人之仁政為國之善經也孟子曰犬彘食人之食而不知檢野有餓殍而不知發人死則曰非我也嵗也是何異於刺人而殺之曰非我也兵也是知蓄委者國之大本檢發者政之大平饑穰者天之常行備預者人之所及者也故萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏而人君御之以凖然後民有所恃也國家之承平六十年矣漕引東南之粟以輸太倉卷地無餘常若不逮而僅充兵食邊塞之積鮮及兼年强家之藏舊不接新貧人之餉朝不繼暮不幸而有凶旱水溢之災民力匱竭國無以振救老弱轉死相枕溝壑方駭而圖之强發私廩千里轉餽重為勞費官民皆擾不亦謀之末乎比者勅書有諭州縣使立義倉之言徒有空文而無畫一之制於兹三年天下皆無立者况今之俗苟且因循嚴令堅約猶復違慢為民興利豈易其人有位者無心有心者無位在上可行者務暇逸而從苟且在下樂行者或牽束而不得專以故民間利不克時興害不得時去積成弊蠧以及喪敗又凡事體興立實艱墮壞孔易或謀以為利而轉以為害彼義租社倉者齊隋唐氏既嘗為之矣始為百姓儲備之道終為僻君淫侈之費是於籍外更生一調也誠國家規前代之善策為齊民之大計明立條式權其斂出令天下之縣各於逐鄉築為囷廩於中户已上為之等級課入穀麥其輸入之數視嵗薄厚為之三品縣掌其籍鄉吏守之遇嵗之饑發以賑給小饑則約小熟之所斂中饑則約中熟之所斂大饑則約大熟之所斂專自縣鄉檢校之無使州郡計司侵取雜用焉此則收自優户穰嵗之有餘散於貧人凶年之不足不使兼并賈人挾輕資藴重積筦其利以豪奪於吾人此其協於大易裒多益寡稱物平施之義符於周官黨使相救州使相賙之法契詩人京坻之頌應時令振乏之理使民足而知順讓益歸於本業誠為國之大事也税賦臣聞理人之道地著為本分民之要平土為大故古者井田之制必先立步畆以正經界夫受私田百畝公田十畝是謂什一之法夏氏五十而貢商人七十而助周百畝而徹皆什一也故春秋傳曰什一者天下之中正者也其山林藪澤原陵淳鹵之地凖肥磽以為差隨厚薄而收入是以春秋譏宣公初税畝謂履畝而税擇其善者取之故君子惡公以為於民已悉矣自廬井之壞而王制大亂民生失平税賦之法不齊矣漢初接秦之暴務安殘氓約用省禁益薄田租至文景之際乃或三十而收一時更盡除勿收可謂寛約矣於時網疎而民富百姓安樂知重禮義天下之刑獄幾措焉夫厚斂則民困困則姦盜起而刑辟重輕賦則民足足則禮義興而刑罰簡刑辟重則民愁怨而思亂禮義興則民安樂而思治思亂者視其君如仇讐雖箕㣲之仁不能使之安而久思治者愛其君如父母雖蚩尤之孽不能使之動而危葢厚斂起乎荒汰薄賦由乎節用秦自暴政之并天下侈心無極恢大封域北拓胡地南開越境於是發閭左之戍掃天下之命飛芻輓粟萬里轉餽暴骸露骨積於邊荒内興功事窮極力役創阿房之宫備六國之制胡亥發徒百萬以營驪山及山東兵興聚師待餉此所以收大半之賦而不足也漢初定天下生人困瘁量吏祿度官用以賦於民孝文躬脩儉節仁愛清靜宫室苑囿車馬服御無所増飾有不便輒弛以利民身衣弋綈後宫親幸衣不曳地帷帳無文繡惜百金之費罷露臺而不為匈奴背約犯塞令守邊備不發兵深入無動勞百姓治陵因山不増髙器用瓦物不藏金銀又親行耕籍之禮以勸農事務廣儲蓄以備災沴此所以三十而税一或盡除勿收而國用足也自漢叔世吳魏三分司馬氏之南渡中原剖裂外備疆事百役之費内則間以昏僻驕淫之主急征橫歛科調雜出是故漢有虐政而作田畝之賦齊有淫政而重牀調之租隋有亂政則有先期逆征之暴唐有弊政則有青苗地頭之税舊弊不革新名日生侵刻疲人自取孤弱是何異割肌膚而滋口腹事枝葉而剔根心反裘負薪徒有惜毛之意斃人以梃不知罪嵗之非剝斂之名可謂窮矣國家接衰唐之頽綱經五代之亂軌平四方之僭閠立一王之法式其橫出之筭無名之征革其弊者多焉比在先朝定民田之租考地之肥瘠制賦之重輕裁使平均本於寛約利人奉國誠為中典夫古之田制有賦有税税以待郊社百神宗廟之祀天子奉養百官祿食之給賦以供車馬甲兵士徒之役充實府庫賜予之用今夫車馬甲兵之資士徒之衆皆縣官素具不復籍於民大率中田畝收一石輸官一斗畿甸之外嵗供兩税無他課調則是今制賦之法抑已簡而有經矣至如山原之地或入稻秔之物陂澤之鄉或有縑綈之税捨其所有責其所無農人供之其費自倍有者半價而賣亡者倍稱而取使乗利估販者得操其竒贏此商人所以兼并農人農人所以重困也誠依古制均定壤賦隨地所産因民所工省其雜名專為穀帛除折凖之令去錢刀之目如此則國之經入如故民之輸出有常利歸於誠農權奪於富人上之德澤加於百姓民之頌聲興於天下可以制梃而鞭撻歴世之暴君汚吏矣畿賦臣聞王都者天下之根本九州之樞㑹譬之一人之身則京畿為之腹心而四方乃其支末腹心宜泰支末處勞養身之道也先安京畿後康四方理國之體也今所謂租税之法更徭之制而王畿最重品色尤煩力耕時穫無水旱蟲螟之害田賦適辦銖收毫聚累以嵗月生業甫立敺就一役隨復破散故甸内之民鮮有盈室者昔明王保邦預備之道惟於平世始可為謀及其已弊救日不暇雖有賢智豈遑經久今内外無事賦入有經而民家壁立野無青草設有橫出之調緩急之率不及均遠應近求具則必扶老携幼轉死溝壑雖峻刑嚴禁不能止流亡播潰之患夫致理之本在乎制度制民之産在乎均平子曰不患寡而患不均蓋均無貧且都城之内大商富賈坐列販賣積貯倍息乗上之令操其竒利不知稼穡之艱難而粱肉常餘乘堅䇿肥履絲曳綵羞具居室過於侯王淫侈之俗日以輕僭賦調所不加百役所不及優游逸豫專事驕靡而農人侵冒寒暑服田力稼以供租稅以給徭役仰不足以養父母俯不足以畜妻子同為王民而都門内外勞逸之殊如此此豈抑末敦本之道乎又凡國家發德音布恩令必首及輦轂或曲有所被重罪者末減輕繫者疎宥姦邪桀慝踰軌亂常草竊偽濫不經之民咸霑渙澤而農人積逋舊負錐刀之末不䝉蠲除侵肌斷髓連錮妻孥此豈推恩布德之道乎兼并之族姦宄之人以幸近於天日故特䝉於庇照而此農人澤不下及臣愚疑其未周也誠天子哀此疲人霈然加惠除其雜調變折之目寛其税入庸役之令採其孝弟力田節義之人賜復其家以勵風俗因制王畿之内嚴立占田之限無使權豪侵併貧弱上以為國備下以勸農功使本業之人得自比於兼并姦宄同被上之恩澤此不亦强幹優本之道歟樂全集卷十四
