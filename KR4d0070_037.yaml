body:
  text: 樂全集卷三十七宋張方平撰神道碑推誠保德崇仁守正忠亮翊戴功臣開府儀同三司守司徒致仕上柱國岐國公食邑一萬九百户食實封三千九百户贈太師兼侍中諡曰恭潁川陳公神道碑銘并序褒忠之碑者體天法道欽文聰武聖神孝德皇帝神筆所題以表揚故相贈太師兼侍中岐國公執中之遺烈也惟公再登元宰當國之重體直方大實有常德素履終吉不失其正故聖上兼天日之明稽春秋之義顯其大節章示無窮夫其誠心之所感者深故於恩禮之垂答也厚教勸流於朝序盛美光於國牒君臣之道斯為至矣謹按公字昭譽豫章南昌人烈考韓國公恕以器望忠力參知政事太宗真宗時為任職舊臣總邦計十餘年典刑在朝功利在民逮今計府凡財策利權率循陳侯故事終於尚書左丞集賢殿學士公風骨英秀氣韻粹深河目犀角居然公輔之表初以廕授祕書省正字非其好也學問通大義不為章句志欲以竒䇿髙議感結明主自致功名初仕衛尉丞監征慶州值朔方款格疆場解戍條逺御之略上河西兵機五事繇此聲迹聞於時秩滿知泉州惠安縣復拜疏論時政語侵要近益逺徙知梧州公奮曰天子眀聖匹夫罔不獲自盡度吾材必有當者研精覃思著當世之務撰復古要道三卷驛置上聞章聖覽而善之曰此固名父之子為國敢言可用也即召赴闕是時今上盛德日新而未出閣天下屬望大臣莫敢為言公又上演要三篇發明家國大䇿請時建儲位以正萬邦參用公卿兼領保傅諷諭詳切出於精誠書奏天子異焉翌日袖以視朝先出他疏於執政曰何如皆贊曰善帝指所袖曰是更有佳奏即公所上三篇也復出示之執政相顧愧謝既而召公對便坐慰問移刻擢為右正言先是諫署久不補繇公始復置貟公既以納說時君被遇特達思效忠益展意無所依違表請增諫官延讜議每言事引大體慷慨輒見答禮權寵忌之屬御試進士以公編排試卷坐第次小差罷諫職還衛尉丞𣙜酤嶽州永州改太子中允通判歙州撫州纍年江湖天聖初還朝遷殿中丞復正言上雅知公意將顯用公前在諫官常論曹利用事至是利用言宜且試之治民復出知漢陽軍嵗餘召還道丁內艱服除補三司判官復知諫院直集賢院提舉在京諸司改尚書工部貟外郎兼侍御史知雜事賜三品服遷刑部員外郎充三司户部副使拜天章閣待制知應天府徙江寧府遷工部郎中知揚州召還上志先定用公有指宰相復有間言者除龍圖閣直學士知永興軍未幾拜右諫議大夫同知樞密院事昊戎叛命西師暴野嘗被手詔問經制方略條畫敷啓多見納用久之罷知青州尋拜資政殿學士工部侍郎充陜西兵馬都部署經略安撫招討使兼知永興軍羌大入朝郍攻圍延安連拔堡戍再踐平涼塞覆軍殺將邊鄙日聳天下被其勞詔公徙幕府回中示鎮撫之重固關陜根本公下令諸路凡騎冦來鈔虜獲自入故其戰人人知趨利除野堅壁詐力必屈是嵗賊果犯河外破豐州斷麟府西陲盜衰止公以謂兵事尚神密千里禀命舉後機㑹非所以制勝宜屬四路各保疆圉治軍禦寇可濟事功纍表便宜且歸兵柄朝議善其䇿就除知陜州復徙青社沂州卒王倫害戍將搆亂輕游附從至擁旗鼓入城邑殺掠吏民郡縣惶擾失據公召京東都巡檢使傅永吉謂之曰是雖微孽敢涉吾地並淮且渡江若蹈無人之境使民間而有姦桀豈不生易朝廷之心歟若趨躡之賊不得勿還也永吉受命恐栗窮追至歷陽采石磯力戰賊黨殱焉上聞嘉歎璽書褒奬慶厯四年召除參知政事內璫馳遽來錫命示眷待之加非常例也未朞同中書門下平章事集賢院大學士初西方有釁師久無功上命二相兼樞密使俾協謀議以便處置既羌酋納款罷兵歸庭塞徼無事而宰司領右府遂習為常公以為權宜之制盍復祖宗之故乃謝解樞柄秉政五年以足疾辭機務章十餘上除尚書左丞知陳州上意不足公曰先臣終此官臣幸已過後相更以為言乃拜兵部尚書祀眀堂進天官加觀文殿大學士制授集慶軍節度使同平章事判大名府復以吏部尚書召冠宰司又逾二年足疾增劇求近藩久之制授鎮海軍節度使同平章事英國公判亳州公繇世資自致通顯初不藉交黨引重為名髙挺拔特立峻清不雜如絶壁千仞髙倚霄漢事上待下直誠無飾不違道以干譽不矯情以圗全退朝闔門不受私謁詭行游說浮薄之士無敢自通性嚴毅有威重寡言笑其在朝廷陟降進止皆有常度舉措時當攝大柄斷國論凡進對謨議未嘗漏言有猷有為世莫聞知善則稱君過以歸已而巳專務逺權勢匿名迹及其久也天下信之故上察公行慎厚眷委之心特密焉在亳乞歸養疾不許堅納旌節改尚書左僕射觀文殿大學士徙判河南府兼西京留守司過闕不任覲謁求易曹州恩㫖留京師便醫內侍勞問賜黃金珍劑視其有瘳蓋屬任之意存焉瀝懇告老輒被手詔敦止逾年疾日侵始䝉軫聽嘉祐四年二月制除守司徒岐國公致仕越四月十八日薨享年七十屬乾元節宴羣臣是日休暇聞訃即時乘輿臨哭酹不視朝三日榮贈太師兼侍中發哀苑中文武叙班殿門進名奉慰凡贈襚恤禮率加常典太常議諡曰恭其配吳國夫人謝氏諫議大夫泌之女端操淑範配德具宜公薨才彌月而夫人繼歿即以七月二十八日合葬於京城西南韓公舊塋實祥符縣之西韓村大王父追封衛國公嵩王父追封燕國公光嗣逮先正韓公並贈太師尚書令兼中書令曽祖妣二黃氏祖妣孫氏妣王氏李氏齊晉魯陳秦國太夫人嗣子世儒太子右贊善大夫方八嵗岐嶷有至性法相惟肖隂隲善慶必克纂續六女皆封郡縣君長適屯田郎中李章次大理評事宋均國次光祿寺丞王杲餘尚幼公之薨也上軫之深時季弟將作監執方知曹州驛召俾護喪事又命壻章幹其家執方有器行而章材敏公所愛厚故朝廷因其意而命焉初韓公見公讀漢書問公盍言爾志公對曰平津侯有言人主患不廣大人臣患不儉約竊謂名理韓公默然心知其志之逺也及公鎮關中委統帥之權登政府避監總之重再至上宰一心在公未嘗敢因緣恩威為市及其去位深自裁挹不敢以隆名重器自處在景亳納旄鉞以為養疾便藩不宜尸厚祿隤然抑畏罔以寵利居成功都城僻坊有韓公敝廬再入相方贖取之門不容回車僅蔽風雨不營資産家無僮伎四方竿牘苞苴問遺之私莫敢至其門故世謂韓公知子之明而公可謂亦允蹈之者也燕居如齊未嘗見懈惰之容非朝服不見賔客所接無貴賤率盡誠禮不妄為款狎故平生與人無憾恨之隙無侵侮之羞將東首神爽恬泊親札召其壻章屬之後事封署端楷猶如平日其資性莊重如此銘曰岐公直專其誠也天其重如山其止如淵秉心宣猶靖共惟䖍蹈道之正秉德之全顯允韓公匪躬徇國宣力汝為有民汝翼利盡事功忠存衮職實著義方貽我淳則公起世家泱泱大志玉氣莫掩揀材拔萃明主我知青雲自致絶塵逺騁摩霄髙厲遂登臺閣爰陟公卿立朝正色於國乃情不援不陵不將不迎得之自是直哉惟清密勿中樞本兵之柄左右泰階執國之政入告善猷出賦明命式是百辟時庸嘉靖典刑是修舊章是由敢曰識知祖宗之謀匪福匪威莫我德尤無好無惡孰為黨讎天生蒸民有物有則時惟淫朋人用僣忒我求之身王道正直愛莫助之㑹於有極不回不疚期處其厚無逺四方相在屋漏譽非余同毁非余否常德不渝克堅其守不否不同其守彌冲天子曰忠天下曰公賢人之業本於易從全其神明始為令終允文大君獨照精實揚其惠節寵以神筆聲烈烜明恩禮周密有侐幽堂永對天日推誠保德功臣正奉大夫守太子少傅致仕上柱國昌黎郡開國公食邑三千三百户食實封八百戶賜紫金魚袋纍贈太師中書令尚書令許國公諡忠憲韓公神道碑銘并序公諱億字宗魏真定靈夀人父信國公始家京師咸平中進士擢第除廷尉平知亳州永城縣永城劇邑當津衢衝要本繇吏部銓補今久不治始命審官除吏公釋褐為選首初署事聽決辨訟如宿吏精習文法者縣大治郡將皇甫選時名士有賞識數試公以事平處詣理稱歎曰能由是著材名部司察舉治狀遷大理寺丞通判陳州徙單州丁信公艱去官服除通判許州復徙陳河決屬邑衍溢民田廬計役費隄塞巨萬公按形勢以便宜就功一不賦民河復故道有劇盜聚郡境匿諸艦中期㑹攻劫公亷知之揣其所過抵夜率吏匽河上流舉火伐鼓以駭之賊棄舟迸潰邀捕無脫遺者轉運使鄭文寶喜謀略聞而壯之被公檄至於許曰急欲識公面顔爾遷殿中丞章聖嘗覽公文俾召試外舅太尉王文正公當國避嫌以為言特召對改太常博士知洋州郡有豪吏李甲兄死迫嫁其嫂而誣兄之子為攜養以專其資嫂流離歷許州及司官數置對甲輒賂吏掠服之積十年寃不伸公至復出訴為索舊牘詳閲煆鍊牢密但未嘗引乳醫為證微伺之尚存奄召驗問辭服案竟姦黨母子始如初改屯田員外郎知相州河北旱蝗轉運使靳租調蔽匿災害公抗章極論詔書嘉奬為蠲賦役百姓賴以全活故相張文節公鎮魏薦公文中御史被召除殿中侍御史淮浙饑命公安撫所至先察吏治宣布慈惠救荒之政畢舉合肥舊陂久為豪家彊占公按復之民得其饒未還除開封府判官一日奏事畢趨出至屏外復召賜五品服章俄除河北轉運使别㫖留公為故相河內公均其室初向氏長安華嚴有美田時丁朱崖擅朝欲得之諸子已聽命使所親諷公公不答而謂向氏土田衣食之源宜共保之故華嚴不以分崖州大以為望既赴河朔獨領其職㑹章聖御樓晏駕今上踐祚軍賞重沓河北厚屯戍經用常不贍朝廷憂之公心計精密均輸從容以辦鎮定帥曹瑋有威名朱崖亦忌之以大將軍斥知萊州以其得士心慮或逗撓詔公馳傳統其兵緣是伺隙欲有以中傷公者公舉措時當處之無間改司封員外郎加直使館徙知青州未幾召為侍御史知雜事賜三品服章遷工部郎中時中丞缺久不補公專臺務都下有告急變者中貴人夜開禁門逮卒百餘輩付臺公一訊情得悉釋其縛中貴人以捕反者為巳功日傳詔促案及獄具止誅告者三司更𣙜茶法𣙜利虧廢詔公劾前議者條罰自丞相率數案詔獄持法平不撓權幸二宫知公秉誼不回可任國之重擢龍圗閣待制器望風采益為當世巨人重德天下以其出處為時輕重矣被命刪定法令審核條次科比眀慎書奏因請頒示天下人得盡其情以議有文害者更之兾以便安萬姓於後每編修制敕必循此例久之出典亳州未幾召領審刑故事諸州獄疑讞有令後讞寖繁天下多留獄公建言諸刑科當讞者為傅中比著于令以省奇請之敝又四方上具獄理官當報日程賖緩亦因緣開姦利公奏促其程由是州郡省滯繫獄以清知星者言蜀且有兵變若災沴公被選以樞密直學士諫議大夫知益州陛辭二宫諭以占說公頓首曰願以屬臣至蜀果旱薦饑公以愛利為政安輯荒散均節賦調先蜀守張公詠以蜀地狹生齒衆嘗艱食為請嵗發倉儲六萬斛賤估以贍貧民遂緣為常公先期倍數以賑之故民不大乏自秦李氷鑿離堆避沫水之害穿二江成都中釃以溉田若嵗大旱溝塍猶涸公更決九升口水行徑易迄今享其利初二宫以蜀災害為憂既而聞公綏靖之美有㫖召公參知政事宰相白益部逺方宜須代還以拜以緩其命而援所厚善故公命中格除御史中丞充理檢使蜀之西境卭部烏蠻接雲南地多馬嵗入永康官埸鬻之經歷山川道路周知其夷險公還對請徙埸沈黎自此蠻夷窺蜀有以隔限㑹中宫虛位公抗章請擇舊門淑德與大臣定議舉典禮聘納以示母儀之重既而下果有自細微覬幸上配者馬季良自貶所遣所親扣登聞自通而潜賂要地得致仕言事者以謂致仕所以優賢季良在流放未有罪人致仕者詔公劾登聞吏不當通其辭公以謂可否在執政吏何罪之劾納敕不奉行議者以為得體又按唐典奏置御史裏行四員以廣言職奏疏論朝政時務其言深美多法義上嚮納之益欲登用嵗中遷工部侍郎同知樞密院事樞密本兵之地是時天下乂安上下習於優游武備寖弛公獨以為憂建言為國者思患預防故萃以戒不虞請下二府各任堪將帥者稍試用之觀其器能又言將不可不知權謀形勢之法上為親集四種之要名曰神武祕略頒諸邉將使習通之嶺外蠻夷或恣睢屯聚輒下湖湘之甲或發畿兵奔命率不及事又北軍涉冒溫暑瘴氣多死亡公奏置廣南東西路鈐轄司增募土兵戍守南粵便安夏戎內附其人至京師一切自便公揣昊酋野心請為除館屬吏司其市事驛道護以往還視若優為之禮實以羈防其姦諜既而邈川與夏戎連兵洮人來獻捷朝議賞典公曰二羌皆藩臣擅相攻擊若又加賞是驕邈川而怒夏人非綏御四夷之道固執不可而止凡武經邉備惟思日孜孜景祐四年授參知政事占謝之日召坐嘉西府之勤勞勉久之尋遷户部侍郎是嵗地大震定襄災異數見公方在告力疾入對為上精言其端以為地震隂有餘外蕃中國之隂也其深戒外蕃之患又請下詔求直言消復之術上納用焉久之罷政事改吏部侍郎知應天府越二年夏酋叛暴突疆埸覆軍殺將天下共其勞識者悼歎儻公在位戎難不及於此既而契丹氏乘釁來渝平授公資政殿學士知成德軍入覲在道內璫齎手詔問攻守方略公條邊䇿甚詳時劉平敗沒延州邉臣以降賊聞有司設防守將收其孥公因對言平在軍戰甚力毋降屈之狀上意釋然更加恩恤如死王事者尋改澶淵以控北道之衝屬疾因請便郡復徙亳州地當東西京淮甸之交故盜充斥連發境中民相恐公以耳目㰅起賊區處乃府大校為之囊槖掩捕百餘人磔諸市自此羣輩散落井閭清淨訖公去郡不復有盜就遷尚書左丞拜章固讓詔書褒答慶厯二年請老授太子少傅致仕四年八月十五日薨於京師私第享年七十三上悼傷廢朝禭恤用優典贈太子太保太常考行諡曰忠憲二夫人蒲氏王氏皆先公歿追封安定太原二郡太君繼室太尉文正公之女某年月日葬於許昌長社縣嘉禾鄊從先塋禮也曽祖某贈太保妣張江國夫人祖某贈太傅妣李舒國夫人考贈太師尚書令中書令信國公妣郭越國夫人周吳國夫人三世德厚流光在公公郭之自出八子曰綱尚書水部員外郎綜刑部員外郎知制誥綘翰林侍讀學士諫議大夫環慶路馬步軍都部署經略安撫使知慶州繹某官維某官集賢校理縝殿中侍御史緯某官􅒺某官材業重於朝廷譽望著乎臺閣隨其器能而並篤於行誼義方忠教固有根本綜先卒諸子通顯纍贈公太師中書令尚書令許國公女六人適端明殿學士户部侍郎李淑某官蘇舜賔太常博士王整其一早卒二尚幼諸孫十三人宗彥度支員外郎集賢校理三司判官早卒宗道宗師登進士第餘皆宦學修立詵詵盈庭盛矣公性質方重正色立於朝若大議論一登於言確乎不可轉也事上待下本於忠恕間邪存其誠故忮巧詭激之為不接於心術雖燕居未嘗見其惰容其家事尤理清規素範不為勢利增改書有之作德心逸日休易曰視履考祥惟公之素履所謂德有基而道有本其旋元吉而大有慶宜哉銘曰於休耆德忠憲韓公文武之道大者在躬直方以動允蹈於中能盡其性周爰始終釋巾從政知微之顯歷令刺守風聲日逺載采於朝臺閣之踐有翼有為惟時為憲睿明能哲屬畀機衡公不敢康懼思盈平警戒無虞夙興竭精戎難既作知公忠誠年至得謝遂傳家事天錫蕃祉慶延於世子孫振振卿材國器几杖優游百福全備公葬信公長社之原今從先子歸安故園大物藝藝各復其根惟其神明一氣同存推誠保德守正功臣正奉大夫尚書户部侍郎知潁州軍州事管內勸農使上柱國汝南郡開國公食邑二千户食實封四百户賜紫金魚袋贈兵部尚書諡文忠蔡公神道碑銘并序國朝沿唐制設進士科取天下髦俊其擢第一多至顯位以間得英才國器章聖御極二十五年選士十二榜有若王文正公曽李文定公迪蔡文忠公齊皆擢進士第一登翊大政為時名公此英才國器者大中祥符八年方太平用文治天子臨軒試貢士采賈誼之言賜賦題曰置天下如置器時文忠公預試上覽其賦有安四方之志異焉既唱第廷中考等果第一召前風采堂堂英秀挺出章聖屬目顧相冦凖曰佳哉士也殿上下聳觀舊事唱髙等三人數而擇焉是日即命公獨謝特詔金吾給七人清道為之光寵釋褐將作監丞通判兖州徙濰州歸朝遷著作郎直集賢院判三司開拆司歷右正言右司諫同修起居注改尚書禮部員外郎兼侍御史知臺雜事同判吏部流內銓更三司副使奉使契丹國還授起居舍人知制誥同知審官院入翰林充學士俄兼侍讀學士久之除龍圗閣學士知密州徙應天府召為諫議大夫權御史中丞加給事中復除龍圗閣學士權三司使拜樞密副使進尚書禮部侍郎參知政事閲四嵗罷以戶部侍郎知潁州薨於郡享年五十二公字子思其先洛陽人曽祖綰太平興國中為萊州膠水令九年卒官有遺愛子孫因家焉祖鄰考夢臣世傳經術懷道不仕以公之貴追襚三師公幼自立苦學故相文定李公見其詩謂人曰此君有大志未易量也將就鄊舉才名當首送致書州將讓其里人史房而身下之始至兖州長吏有苛政公約之以禮使不得踰法民賴為安至濰有士族摹市征印文相因緣為姦利積十餘年或告發之株連數百人公曰盡利為民姦是用長兹為政者之過為從末比多得釋濰人大歡愧更相勉為義識者知公非苟為德是謂民風化之所自迹近而體逺者蓋其初仕已達於從政秩滿還都不過執政之門在勢有弗恱纍月不召乃差監永豐倉真宗知之詰輔臣亟令召試文奏御中㫖除官明年賞花禁苑羣臣退獨留公出仁宗所賦詩示之將命為太子諭德為弗悅者沮格章聖知其有公輔器眷屬殊厚永定遺弓哀慕深至家人視其卧衽涕洟沾濡丁謂顓國使人語公能自致即處華要公歎曰兹言何為而至於我竟不答未幾謂敗反側者多矣公淡居其間時論益貴之直翰林章獻太后修景德寺近璫羅崇勳護作既奏功詔公撰記崇勳信幸用事遣親密謂公善為記參知政事可得公巳受詔欲辭不可置不為撰崇勳數請終不以進怒而讒之太后遂出守密州魯肅簡公在中書爭之不能留至州太后語中書降敕趣奏記乃上屬東京旱薦饑先除公田之租數千石遂請悉除京東田租弛鹽禁使民得賈海救荒東人於今賴之皆曰活吾人百萬口蔡公也公前知臺雜事復拜中丞正色立於朝權戚干憲度必彈劾未嘗及諸細也章獻太后遺制以莊惠繼垂箔參聽閣門白臺促百官入賀公毅然顧吏無得追班前白二府天子春秋巳長太后末命非天下所望抑未有聞於前代者惟執政圗之故莊惠但稱尊宫省號保慶太后不復預政一王體正國命公有力焉及登西府向時房闥專威閽謁依藉因是以習典刑猶紊公持重據正意在杜邪撓以贊平康之治嘉謀嘉猷入告為多然性靜密未嘗語於私故幾微啓沃莫傳焉衆所共聞者著一二云爾景祐初中宫虛位有自細微因莊惠以入掖庭得見中意將遂正位號大臣並諍而公尤力既而欲以備嬪御公獨堅請歸之因得髙選勳閥上儷天極王䝉正者連姻外戚子殺人謫徙未更赦中札命樞府復官公謂同列始初清明宜謹國章旦朝以聞寢之或曰小事惡足煩上公曰德刑治本人主以為操柄殺人而以官免免死而復官是殺人者無罪也斯之為小將奚為大退為奏明日懷以授樞密使王文康巳朝奏事且退公前曰王某向與臣議更有奏請文康不得已白之上意不回公曰法天下之平而撓以私且亂政刑又命降官一等固請而止樞密院有直學士題名錢惟演撰記希丁謂意獨黜冦忠愍公逆凖不書示懲惡也公建言萊公忠義有勞王家茲實厚誣以疑後世請而剟去其辭南徼蠻酋虐用諸蠻奔宜州自歸八百餘人議者請勿納公曰蠻逃殘酷歸王化以求生處之湖湘曠土足使自給却之勢必不敢還聚散山谷為盜從而戮之蠻亦人也酷又甚焉不果納既而潰為民患至殺將吏宜桂以西皆擾朝廷方悔契丹徙帳幽州屯鄙上邊戍繕完赤囊狎至二府並請增守備宰相吕申公對上決策勿與保無變異論猶藉藉公議協遂定鎮靖有體人情妥安河決橫隴朝議隄塞公曰水趣下河朔地卑順而導之可免澶滑壅溢德博數州得在河南於國家便但護魏為可從之澶滑逮今無患仁宗景祐間朝廷尊嚴治平乂安是時在位為多正人周頌云無競惟人四方其訓之不猶信歟寶元初夏戎叛命公在潁州聞之以為戚念時任事者慮害不能深俾弟禀入言西邊事於朝甚詳禀因論次其說條類成書號通志時亦多施行者本公志也公資忠信器靜深不矜而莊不厲而威直方而有容內文理而外溫厚非義所存不接於心術不恃髙論不為詭行施諸已而不願不以施於人與人至誠重然諾一言之出終身可復樂道人之善推賢達能惟恐時之有遺才也性謙退不伐執義堅固臨大節有不可奪之守在朝廷惟日孜孜以思納君于善身處外乃心無不在王室故士大夫倚公以為當世重焉中年而薨天下莫不痛惜以其才之未究也嘗謂名教治之本孔子之後襲文宣公舊矣乾興中四十九代孫承祐卒絶不襲十餘年公援漢元始故事上言聖人之嗣不宜久廢承祐有母弟在請續封詔從焉尤篤故舊死生不以易其操初馬絳調萊州判官與公為忘年交公除御史中丞被㫖舉御史以絳應詔故相王文穆公隨守泰州綘通判隨政事多僻絳剛正每執不阿以大忤隨至是文穆當國持奏不下公請政府曰舉所知無易絳者不下請罷舉隨不得已絳除殿中侍御史鄊賦時州掾賈編考試公在宥密編老滯銓集公請解一官為編改秩仁宗嘉其意擢編朝籍與彭城劉顔布衣友善顔積學有行誼然罪廢不可復振公為解說其情稱所長於朝録其所著書上之顔以縣尉謫至是起授泰寧軍節度推官時近臣多薦文藻之士充館閣員公獨薦陸參有古學將召試公為請曰詩賦非參所工欲觀其學所著䝉書在焉參特召充館閣檢討公篤義雅正不撓權幸類此范仲淹龎籍劉隨楊偕郭勸皆公推轂以顯於時事母楚國太夫人張氏色養無違公薨楚國在堂士君子傷之其配中山郡夫人劉氏三子曰延年將作監主簿早世延慶今為尚書屯田員外郎京東路提㸃刑獄材敏而文有逺度亢蔡宗者也延嗣大理評事精爽似兄好學不樂仕長女適太常博士劉庠顔之子公憫顔志不遂庠幼孤即以女妻之次適某官某生男冦平早孤保於外氏楚國特愛之故公視猶子公薨子幼凡喪葬庇家事悉屬平平厚重君子也今以太常少卿直昭文館知鄭州公守南都某以舉子見厚䝉器賞故我以國士報之於此文也銘曰在仁宗朝廟堂名公道德之純蔡公文忠公之為人性乎仁義用中為常不勉而至發為忠孝於君於親施於百行於以誠身有如珠玉禀於純精亦如金石中含和聲又若水火之清之明又若山川之秀之英乾坤之體其用簡易賢人德業久大以類我不為善亦奚以伐我弗為髙則將焉越雲上於天其潤在下公心所存可求諸野施不為名報不在夀誠以自成茲則不朽惟公之道以誠始終豈復可昧一氣是同凡此陳迹公之苴秕揭此銘章孝子之慰朝政大夫贈禮部尚書天水趙公神道碑銘并序夫積善垂裕命曰慶基揚名顯親斯為孝範故世家濟美流光本乎德厚朝廷著令命秩行乎追錫所以褒明教忠之懿懋勸事君之節人倫國體於是備焉茲大宗伯趙公所以沒世而道益光也公諱某字某自造父受封趙城而叔帶有後晉國成宣之勳簡襄之業列於諸侯十有二世而并於秦秦使王嘉之子輔主屬西戎實得戎心號曰趙主漢髙祖入關輔率諸戎以從因家天水營平侯充國蓋其裔也唐末自河朔徙睢陽之虞城逮公七世宋人矣曽王父某含章篤行見宗鄊閭府聞於朝署州司馬邑鄊名數始為士族王父某允蹈吉德敦守節誼博考典訓推為醇儒諸生來學逺傾齊魯時宰薦其經行召入成均助教歷五經博士考某傳家學通春秋五代晉漢之際遭世多艱知志不遂選除平隂南華楚丘令仁恕愛利惠綏百里宦不逺其桑梓示祿仕之意也逮公通籍贈太常丞公局度沈邃體裁莊和臨事發揚殊更彊毅年十三常自平隂迎外王母於譙路逢羣盜徒御駭散公下馬叱咤辭氣甚厲盜愕相顧壯其少而勇且仁平隂之政歸所掠而潰家雖治經專於六藝公既該貫則以學文購致太史公記兩漢書南北朝史文選諸子集悉手自寫讐考詳正時中原喪亂篇籍亡缺及是梁宋間始傳善書具全本逮今家藏子孫寶之河東栁仲塗為宋督郵名髙使氣士子罕通者獨接納公與定交契輝光聲問由是寖逺太皇纂極崇儒右文初御便殿親策貢士公不預奏籍慨然曰英主可自託也録所著述獻書闕下文奏御上知有司遺才也特召試賜進士第調鳳翔司冦參軍府按重辟具獄上且論殺公發疑狀果囚誣服凡決獄事多所平反上官薦其材髙驛召至闕遷光祿丞領梓州𣙜鹽院制貿遷之法操其竒贏不設峻防大儲放利加佐著作通判密州時騎冦仍入北邊嚴警戎備籍夫兵於山東州將據版圗取捨失平民大譁趨攻牙門將發庫兵作難公挺身出慰解衆釋伏指刺史廷曰吾屬特不忍公不然茲流血矣巳而推戮其造端者而郡以全朝廷聞而問故公曰吾可以為已功而不分謗也乎竟不自言受不覺舉坐徙倅縉雲又徙新定俄以太子中允知洋州淳化中盜起青城陷成都絶閣道王師循褒梁入討興道當其衝發輸期㑹絡驛星火僚屬謂公利害在民功過屬身公行不忍將有稽乏公曰州縣之命繄吾是賴操切取辦以圗賞利吾不能也由是左授南陽監征公慘怛愛人之心大指類此在南陽故參知政事蘇公冦忠愍公並繇執政臨州以公老成待之上賔禮意甚至皆謂公長者也章聖登阼除國子博士尋以尚書駕部員外郎提㸃江淮茶鹽賜五品服章遷比部顧謂子弟曰知止不殆豈惟富貴者然士之常爾今吾告朝以老歸爾以事將安性復命佚吾餘日族人故舊或謂公未嘗立産業基趾退身安之乎公笑曰吾惟平生家無長物儻是之念則漏盡夜行莫攸息已章再上得請改駕部致仕行過山陽郡舉子王生鬷見公於傳舍髙公清節為買宅一區田一壥遂留寓於山陽竟考終於此第享年七十二鬷後貴顯至樞密使云夫人清河縣君張氏後夫人渤海縣君髙氏淑明仁順德禮允諧子七人曰常固曰盤曰集曰明允曰棐其一未及名率循素業無所成名而卒朂幼曰槩閎大冲逺純粹疏通發策甲科躋華近列今為翰林學士知制誥踐歷臺閣為時名卿自司馬仕州佐至太常三世皆以道義忠信沉晦微下公年知命方解巾從仕盤桓恬尚卑不可踰凛凛然有德讓君子之遺風識者固知其後必大素履終吉成於翰林故公纍贈兵部郎中諫議大夫給事中禮戶部侍郎春官大宗伯詩云君子有穀詒厥孫子春官之謂歟無念爾祖聿修厥德翰林之謂歟翰林掌綸西掖渤海就養北堂上郊圜丘均恩著位請回勳爵錫母邑封詔㫖特允封渤海廣陵郡太君因追贈張夫人汝隂郡太君既而廣陵即世翰林去職柴毁孺慕哀哀罔極始自山陽奉公帷裳歸葬虞城之天巡鄊二夫人實祔焉誠信克終哀榮並伸刻石新阡用揚顯仁惟嘗僚且同里宜傳信於斯文銘曰有唐毁頽五季積衰小雅盡廢中國道微先儒訓典不絶若線博士循循師門獨闡楚丘沈默埋照屏飾猶有社稷尚優執翟逮公榮名式遭王明初掾于岐察獄以情州將失民致戎於門為公投仗自消厲氛國兵入褒發輸火急公委州符洋人相泣仕不為身造次惟仁眀水太羮淡乎潔純引年退迹篚無餘帛以道為歸匪家之戚四世一心貊其德音積善有基爰啓翰林翰林亹亹維實是似履道孔夷宜必儲祉慶流湯湯顧後寖昌絳服纁裳公享襚章宋故密州管內觀察使金紫光祿大夫檢校工部尚書使持節密州諸軍事密州刺史兼御史大夫知汝州兼管內營田堤堰橋道勸農使兼汝州兵馬總管上柱國河間郡開國公食邑三千五百户食實封六百户贈昭德軍節度使諡惠節向公神道碑銘并序周封微子於宋春秋時公族諸桓有向氏賢卿大夫不絶書中稍微皇宋誕興向氏從盛真宗皇帝考慎厥相有若魏國文簡公諱某謨明弼諧緝熙百度翊隆盛業治致升平勤勞王家書伐國䇿以尚書左僕射門下侍郎位居元宰公其幼子也諱某字仲模初以任令起家衛尉寺丞娶冀康孝王惟吉女萬年郡主改內殿崇班王太祖皇帝之寵孫恩禮絶等歷太宗朝未就外邸故主長於禁中真宗有㫖為擇嘉耦以公才地兼美選配焉既席世家又聯戚里涖官典職常處親近自祥符至皇祐三年未嘗違京闕纍官至四方館使榮州刺史始出知相州司空僚佐意公未習為吏易之而觀其所發及視事知體要奉法循理舉措時當人情莫不厭服治有聲遂著材望日益顯重遷果州濰州團練使解州登州博州汝州防禦使密州管內觀察使歷守恩邢陜滄保澶鄆潞汝凡十州正身戢下凡家所資率致自京師以行至官所約閫以內不得與外通貿易餘祿輒以均諸幕府掾屬凡官什器不入於家所至以為常日孜孜思所以為惠利者勤而行之惟恐一有失所者知州縣之事賦役為本監司或以權便違令斂發不以時傷財害民必守常法酌下情俾公私各得其宜體安而理和故操事者樂於聽改而吏民實䝉其惠政平訟審獄市無擾民得職上課數為一路最重宿望或更出其下異日貴侯近戚之為郡者飾苞苴事厨傳巳則弗率而求容於刺察之官救過之不暇於庇民乎何有以是百姓重傷景德之後鄰敵請和河朔不用兵且六七十年邊無興調耕桑安業宜乎樂事勸工家給人足而比屋屢空鮮有蓋藏非由官吏侵漁不恤而然耶如公者保而牧之則老稚鰥寡庶乎有以養矣其在滄州蜚蝗蔽野官督焚捕而無所施其力有鳥羣啄之委之塍壠故境內不告災乃以有秋見者咨異歸德於公謂其仁心有以召之者其解鄆父老請留於朝以千數止之莫可非慈惠有以懷之衆心雖令孰從焉自天子至於公卿大夫皆以其才為可任不以恩澤遇之出守陜郊仁宗御賜詩寵其行又嘗暇日援神筆書其姓名因以賜之蓋有以簡於清衷者矣文簡餘慶寖以蕃衍公於宗為長若親屬吉凶艱乏之事撫存周急恩意均至諸仕宦於四方死喪在逺久未克葬者日月益多公積俸纍嵗并萬年主脂沐之賜資千餘萬計足以集大事一日請於朝諸族人之在外官者㑹於京師凡舉六十四喪合葬於魏公大塋之次中外莫不髙其義茲固有以厚風俗美教化豈但施乎家人之道也哉治平中英宗皇帝為今上納妃於向氏面命公主嘉禮䄖翟羽儀率由先典上登宸極爰正中宫乃今定國軍節度使觀察留後經之女魏公之姪也公糾勵宗門尤自抑畏蓋居家理故治可移於官位不期驕祿不期侈非守之以禮行之以義克保令名夫亦鮮哉歷官自內殿臣制五遷至西京左藏庫使東西上閣門四方館使多由課升間因才舉罕以年勞叙進也歷職事奉輿輦典軍器帶御器械翰林引見皇城司三班院㑹靈醴泉觀三使戎廷十主蕃客國有大禮若大故必預焉自潞州以使歸闕便醫久之良愈復知汝州遂薨於官下享年六十有五熙寧七年七月十八日優贈昭德軍節度使聖上愴悼命護其喪還京師三宫遣內宗臨奠恩禮殊渥即以十月某日就窀穸豐臺之原奉常按狀上議以為公典十郡有惠政人安樂其治所至以最聞不以富貴驕人斥巳之餘以賙宗族臨民不撓行潔清故舉諡法愛民好與曰惠好亷自克曰節合二法以易名焉公資愷易謹密和而有守出入禁省金璫綺襦羣居並游挺然中立亡親疏之迹善與人交篤於風義長於治民知簡易之體不忮不求亦何用而不臧矣曽祖某祖某烈考相國並贈太師尚書令兼中書令進封許曹魏三國四男縝內園使繪贊善大夫早卒繹西頭供奉官總右侍禁四女適比部郎中劉宫皇城使曹諶國子監修撰經義檢討練亨甫次在室孫十一人銘曰穆穆厥聲湯孫多仁王子出迪為周室賔支别自桓有邑於向邈及皇朝始出將相顯允魏公文武帷憲弼亮昭辟篤循大卞德厚流光乃終有慶公承其休世家以盛始繇任仕亦緣戚恩爰及蒞官則以才伸行既信厚資復安重職近地親益彰諸用帝曰汝器才譽允穆曽是好德爰錫之福試之治民所至稱治民罔常懷懷於愛利不矜而嚴不苛以簡古之惠人道豈云逺義敦於族存亡以篤行成乎身有媺風俗駕言徂汝宗姻出祖素蓋遄歸號迎於路作善降祥所享奚嗇吁嗟旌旄乃以追錫奉常考功表之節惠沒而不忘流微永世國門可望豐原故林勒銘樂石式昭德音宋故端明殿學士金紫光祿大夫行工部尚書致仕上柱國太原郡開國公食邑三千八百户食實封一千二百户諡懿敏王公神道碑銘并序公諱素字某其先大名莘人曽祖五代唐莊宗時左拾遺祖國初以尚書兵部侍郎知制誥始家京下著籍開封考以太尉相真宗並贈太師尚書令兼中書令封魯晉魏國公景德祥符間天下無事生民安樂功成垂統號稱太平太尉位居朝首執其政柄故生極隆名歿而從享於廟為一代之宗臣盛矣其薨也章聖問諸孤公猶未官更以嗟惻始授太常寺太祝服闋特遷大理評事召試學士院賜進士出身復召試擢通判潁州更懷州許州三遷太常博士近臣薦其材髙復召試賜五品服凡三試禁林當登館閣之選每以大臣親嫌見抑出知濮州年尚少下觀望有大姓倚要人橫猾公彈治竟法吏民聳懾政有能名河決始復故道轉運使按瀕河之田檄郡縣增賦公上言流散方歸正宜保息特詔無得增賦自濮七州之民皆被惠秩滿領宣州未行御史中丞孔道輔舉充侍御史未幾道輔外補公亦出知鄂州荆湖一道配民率口鬻鹽公持利害不從鄂人獨免徙宿州慶厯初夏戎阻命契丹來渝平仁宗格以至誠鄰敵自懷益修政事首增諫員召公自宿知諫院同判國子監悉情獻替多見嚮納皇子生將大慶賚公曰西師尚嚴勞臣在邊士苦戰戍之勤民疲齎送之役而金帛散於不急爵祿加於無功慶賚非宜朝議為止論天下貢士不得才行之實請罷糊名以取誠士論郡國置學校擇師官以漸復里選之法論中書凡中外奏事不即裁定輒下近臣集議蓋執政者莫肯任咎為此紛紛由是集議稀濶論請置官三司㑹校國計省諸冗費以不訾仁宗間御天章閣召二府出手詔訪時務公因列疏闕政十餘條皆人所難言者他日帝坐延和殿特召賜三品服尋遷天章閣待制領淮南都轉運按察使時初加按察之名以假司官之重奉使者率以苛峻為稱職公獨處之以平易惟貪暴吏莫容焉故常更易二稅致羡錢上供以自為勞公徹其敝朝廷聞而善之舉以戒諸路就遷涇原路經略使知渭州有操權者不悅公伺釁危之河東轉運使因事被劾辭有及公者坐徙華州按推者與公薄親而不以聞又坐是奪職徙江州未至改汝州徙潞州丁太夫人袁氏憂服除知兖州還待制復知渭州就拜龍圗閣直學士還領三班院遂除樞密直學士知開封府至和二年仁宗不豫內外憂恐秋大雨水蔡河堤壞墊安上門漂沒軍民廬舍中㫖遣馬軍帥范恪塞朱雀門公密啓止之衆心以安公白今茲惟宜鎮靜精察姦盜爾故獄市無擾京下肅然於時識者謂公處動危時得體閲嵗遷龍圗閣學士定州路馬步軍都總管安撫使知定州尋除翰林侍讀學士知益州益部㑹府宴設嵗費為錢數千萬取給牙校習以為常公為裁節所損幾半川峽用鐵錢諸爐嵗課嘉卭苦之公請停鑄而貨幣以平關市無乏漢中饑遣賑廪而後以聞朝廷適議救恤而奏至見謂適便宜公臨下以恕簡而易從條教明審人情安便故西川之政蜀人紀之代還復知開封府嘗建請置使院判官主賦役之政令置八廂官以決小罪置發放司勾朱官以檢稽違後皆施行稱便久之請解領羣牧使請補外知許州英宗初羌入平涼塞連犯堡塞朝議擇帥謂無易公者除端明殿學士復知渭州邊人聞公至曰無事矣羌積服公威信即解散既下車境上恬然公三帥平涼御將卒有恩闊略不苛急人皆樂為用臨事毅然不可犯也時謂三邊統率公稱最初在平涼部將蔣偕築堡境外為羌要擊間道竄歸公貰令復往訖役總管狄青曰偕往必復敗公曰偕死君行矣偕知不可徒還故以死就功而堡竟立有畨官密悉天水羌也粗有計略羣羌所信前帥欲羈縻之請以為諸族巡檢事下公議公數其罪械送本道中路亡去諸將請重購之以絶後患公曰是烏足以為者不購亦竟無能為一日方燕饗邊民驚譁奔入城將佐請闔門防姦變公曰妄相恐爾冦至吾不知耶傳令敢妄有言者斬俄而自定衆服其明決西陲諸路內屬畨部因事質留者有至老死不得出公閲其籍情非甚惡而繫久者戒諭散遣之莫不感悅弓箭手邊徑兵也先有千餘家在境上無城栅冦至莫自保公築八堡分處之老幼感泣曰自此有生計矣舊事弓箭手人騎分領於東西路巡檢公曰是屬官但給田使自衣食聚而役之是廢其業趣使就耕有警則發之故戰士競勸懷於自效拓州之西南城濬隍三周無慮二十萬工而民不知役渭人刻功於石畫像於祠改澶州亷察知成德軍真定府路安撫使太原帥缺上顧謂輔臣河東節制四路其議宿望以行柄臣以公應詔復端明殿學士遷尚書左丞河東四路經略安撫監牧使知太原府汾河暴溢命築諸隄防之缺曰匯平晉勢必及郛既而水果至不為害年大殺發公私粟蠲諸賦救荒之政甚設民皆獲濟還朝知通進銀臺司門下封駁事以疾請外補留提舉醴泉觀復請知汝州嵗餘疾稍侵遂請老以工部尚書致仕繇博士及此凡歷尚書省員外郎郎中侍郎並三遷中間除諫議大夫給事中澶州青州觀察使尚書左丞而以冬官老焉故事致仕雖三公無兼職者朝廷初立親制公首以學士就第公宰相子自勵學問潔操行與游皆時俊故朝論不敢以世家子弟等比臺省清要官缺物望必及之資尤徑善談論及為御史諫官論事上前不撓權勢不顧嫌忌稱為敢言侍讀經閣至於前言往行必精切開說因以諷勸仁宗常命公悉上御史諫官時所論事間省閲之蓋有簡于上心者深矣晚之涇原英宗面諭曰朕知學士久矣邊有警其勉以行且及進用意公還在道英宗疾大漸猶問輔臣王某至何所公至㑹英宗上仙遂赴真定上亦舊聞公名其往汝州謂之曰汝非卿所宜處從所便爾性愷易無城府善與人交久而彌篤早從公游及所嘗奬薦至於幕府文武間登公卿或至將相而公處之自如也熙寧六年三月甲寅薨於京師享年六十有七上聞為輟視朝奉常易名曰懿敏公生長富貴及解紱私第葺虛齊悉屏平日玩好陶器野服放懷方外至於啓手足神志不亂泊然怛化五月庚申歸葬文正公先塋文集二十卷藏於家娶李氏同安郡夫人禮部尚書維之女滕氏安康郡夫人給事中涉之女張氏永嘉郡夫人太傅士遜之女九男厚將作監主簿早世固大理評事堅光祿寺丞鞏本碩大理評事凝祕書省正字常奧將作監主簿二女適將作監丞李祥文居中僕與公義兼姻友故得詳為紀述後之載筆者有以傳信於斯文銘曰宋有賢相太尉魏公昭事乃辟於變時雍公其才子祗服是似泱泱大風德音載韙惟國之良於朝有光令問令望金玉其相御史諫官世家鮮處帝曰惟才獨䝉察舉不將不迎直躬以行思我王度尚有典刑國之重防守在三邊公秉帥節于蕃于宣卒乘輯睦農狎於野赤囊弗馳壺歌以雅英皇有言公余舊知圗任共政既面命之召自平涼綴衣已沒攀胡靡及朔門復軷巖廊訏謨匪咎匪誅時莫我與將誰不如汝海之行依依懷止駕言于歸遂致君事幅巾虛齊蕭然遺照回閲平生恍如夢覺人生而靜泊湛諸情公將北首靜如厥生聖人貴真真謂性命公乎庶幾知終以正樂全集卷三十七
