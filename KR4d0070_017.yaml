body:
  text: 樂全集卷十七宋張方平撰論中庸論上篇中庸曰天命之謂性率性之謂道修道之謂教此聖人所以參天人之理極性命之際舉大中之要正教化之端者也至于孟荀揚三子善惡之論則其於中庸之教異矣或問其說對曰三子之言性一人之性也中庸之為道天下之化也夫天下之人雖風俗異宜賢愚殊品至于口之於味也必同嗜焉耳之於聲也必同樂焉目之於色也必同好焉至于心豈獨不同乎是故天下之心所同貴者五常之道也子知雨雪霧露之所從來乎是亦江河海澤之氣也噓吸而上為霖雨為時雪為霧之潤為露之濡百穀以成萬物以生天下之人曾不歸功於江河海澤而本於天者以水旱所本也人稟五行而生含好惡之明聖人因其性之所同貴者於是推仁以廣愛制義以從宜禮以正名智以應變信以著誠天下以治彛倫以叙而民曾不知此本為已之性也而歸德於上者以治亂有繫也且夫五方之民夷貊之類嗜欲相戾言語不通其性之不率教也蓋天地之氣所肖偏者何則文王作德西戎為仁讓之邦箕子行化東夷為禮義之國幽厲淫虐成康之俗以壞桀紂暴酷禹湯之民可誅秦居鎬京而戎政興子居九夷而夷不陋被髮而祭伊川為陸渾椎髻既朝甌越為漢郡以是為言民性何常哉惟化之從也子盍况之異物乎馬牛駝騾獸之悍者鵰鶚鷹鸇禽之鷙者馴而服之韝而役之惟人意之從也况人之靈豈如木石之不遷者耶誠如是則周衰戰國之亂亡秦之暴且數百年而下不復有漢文景自漢之末魏晉之弊五胡擾攘且數百年而下不復有唐太宗是故大化之行也則天下之性如一人大亂之作也亦以一人之情變天下愚故曰中庸者天下之化也聖人所以極性命之理而正教化之端者也謹論中庸論中篇問者曰子謂中庸之道必為天下而後可施耶曰非此之謂夫中庸之道卷之充一身舒之彌天下蓋聞稽大可以略小拘小或遺諸大愚特廣其要而言爾姑以一人之性觀之不愈精乎且堯舜之為善桀紂之為不善豈天下之人家至而日見之歟上之所行固下之所效之者食荼蓼者不知薺甘居嬴博者必為齊言紺緅隨染薰蕕易氣由所遷之者也堯舜率天下以仁而人從之夫上所指顧下必趨走矣又况躬率之者歟故一人之性誠仁則天下之性斯仁矣湯武之民桀紂之民也在夏商而惡在商周而善知民性之易正矣故民性之從化譬之杞栁屈之可為杯棬譬之湍水激之可使上下如樹苗焉以溉耨之功可以移地之肥確如化材焉以攻揉之力可以變木之曲直是以聖人知天下之人性可使同也故執乎一以制天下之動通乎誠以合萬化之原吻合乎諸異周視而同仁端默乎户牖之間凝神乎太紫之庭我無為而民自朴我無欲而民自化夫是而天下之俗安以和各復其正性命之理得矣故曰惟天下之至誠為能盡其性則能盡物之性能盡物之性則可以贊天地之化育而與天地參矣是故聖人之道大可以參乎天地微可以通乎鬼神變而動順而靜不疾而速不行而至天下之民猶範圍之內也故其穆人倫移風俗使民德歸厚物性合和其本自乎一人之化而巳是故極性命之說通天人之際者中庸之教而巳矣謹論中庸論下篇子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也夫賢者人道之大成知者天下之達道以賢知之材於中庸之德也其幾矣子曰過之何謂也曰此乃所謂過與不及者非上智與下愚之謂蓋言中人之行可與之上下者也彼中人者不得道之至正是故剛者自伐柔者自怠故曰小人中庸也小人而無忌憚也彼自伐者賢已之賢而知已之知故過之又曰人一能之已百之人十能之已千之果能此道矣雖愚必明雖柔必强彼自怠者謂已不能而莫之勉也故不及焉是兹二者髙者可抑而下者可舉爾非不移之性也子曰舜其大知也與執其兩端而用中于民其斯以為舜乎設以知者為過之是舜不得為舜矣子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣設以賢者為過之是顔氏之子尚安得曰其殆庶幾也子曰人皆曰豫知驅而納諸罟擭陷穽之中而莫之知辟也人皆曰豫知擇乎中庸而不能朞月守也前所謂知者過之謂此類也子曰愚而好自用賤而好自專書曰侮慢自賢前所謂賢者過之謂此類也是故聖人之道莫過乎中莫節乎和以之理一身則心莊而體舒以之施有政則民安而事順舉而錯諸天下國家萬民用乂其所以推而廣之之源發諸一人之誠爾故曰誠者自成也又曰誠者非自成已而巳也所以成物也是以始於自成終於成物堯舜以德自成天下之民歸厚矣禹以躬勤自成天下之民允治矣湯以去暴自成天下之民徯來矣文武以仁義自成天下之民興讓矣漢祖以寬大自成天下之民推心矣文景以恭儉自成天下之民安靜矣推而逮乎百世之下未有上正而下不厚者也未有上僻而下不邪者也是故君子誠之為貴中庸之德至矣哉謹論三代建國論天子建天下之大號所以表萬國諸侯立一國之名所以長百姓故王者受命改正朔易服器與民更始兹為大制說者以為顓頊而上象德以立君號髙辛而下因地以為國名至于三代則天下之稱章章矣惟五帝之道大公天下而無私生之號不浮于實死之諡不溢其美百姓日用無得而稱焉三王之國世繼如家不為之名子孫何述或曰夏商周者因故封邑者耶既受命而為之名也曰禹之興也無民無地而享天祿則是夏之名非素有也自契至湯其國八遷湯始居亳從先王居師趨鳴條桀奔南巢遂順天人纘禹舊服則是商之名非初封也稷初封邰公劉居邠太王徙岐文王基命為西伯言其所都猶曰鎬牧誓猶曰逖矣西土之人武王克紂誕成厥勳爰集大統以撫方夏作武成之篇始曰祀于周廟曰庶邦冢君暨百工受命于周曰惟有道曾孫周王發則是周之名蓋克商後建之爾是知此三代之號者皆取光顯之名以著久大之業以建大統以垂無窮者爾夏之言大也莫與為大也商之言中也用中於民也周之言備也盛德大備也項羽之裂天下而封諸侯也髙祖得漢失職西去心懷恨望而良平等曰漢美名也人之言曰天漢故髙祖既即大位竟以名國乃自魏晉以來創業之主咸因受命之地而為建國之稱襲以為常無或更易夫王者以天下為體國君以國為體世其位子其民君之善惡也不常而國之體也不可改飾身之美私也美國之名公也愚故曰王者受命改正朔易服器貽謀之大者也觀先代諸儒多執三代之名皆以為因故封而不易且以為先君封國之名不可變以疑後世者故論以明之謹論史記五帝本紀論周道廢秦撥去古文焚滅詩書故明堂石室金匱玉版圖籍散亂太史公綴緝天下放失舊聞録秦漢上記軒轅下至太初成一家之言事迹條貫信該詳而周悉矣然而為史之法繫在夲紀紀者統也言王者大一統正天下正朔所稟法令所由出者也而遷為紀始諸黃帝愚有惑焉易曰古者伏犧氏之王天下也仰觀象于天俯觀法于地於是始作八卦以通神明之德以類萬物之情蓋三極之道九疇之夲書契所紀君德最盛伏犧氏為歷代帝王之首也孔安國曰伏犧神農黃帝謂之三皇少昊顓頊髙辛唐虞謂之五帝今遷叙三皇而遺犧農紀五帝而黜少昊何哉易始于三畫書夲于三墳禮之所萌樂之所起萬類以别生民以存皆自乎伏犧而遷不録焉何也易曰帝出乎震夫五行用事先起于木故太昊法之首以木德王天下今遺犧農而不録黜少昊而不叙是於五德相承之序可乎哉郯子曰伏犧氏龍師以龍命官神農以火紀黃帝以雲紀少昊以鳥紀顓頊以人紀今遺犧農而不録黜少昊而弗叙是於五官之紀可乎哉時令曰盛德所在各以其帝配蓋所以主祀四時正位五方今遺犧農而不録黜少昊而弗叙是於五時迎氣之體可乎哉家語載孔子語宰豫以五帝德之說遺少昊少數而禹在焉又季康子問五帝之名孔子乃以太皡炎帝黃帝少昊顓頊為對蓋夫子之答因乎所問康子以五德發端故以五運相承者答之宰我夲以黃帝為問不及少昊故略而不書遷既網羅周博斷為定典接先聖之絶緒遏學者之末流書以該名數表以正時厯世家以顯宗夲列傳以著成敗然其大夲紀為之主而一紀之初所失者二考三皇之迹而犧農不録觀五帝之事而少昊不載愚竊惑之如曰有微㫖焉蓋未之知也謹論三代本紀論蓋聞述作大體在乎辨名名之不正條理何出三代之王其可知矣而史遷為夏商周夲紀乃帝夏商而獨王周此何道哉夫帝王者有天下之大號也號者所以表功德之迹也維昔堯舜以至仁格天溥愛無私以德而帝者也禹平水土九功允治湯武革命為民去暴以功而王者也其在乎書堯典則曰若稽古帝堯舜典則曰若稽古帝舜至於君臣之言則稱帝曰俞帝曰吁帝曰疇咨其在夏書則曰若稽古大禹至於與臯陶益稷相贊勑之言則稱禹曰俞禹曰吁禹曰都啓與有扈戰于甘之野作甘誓則稱王曰嗟六事之人自先代諸儒皆曰禹既繼世以家天下自為德下衰始去帝號啓而曰王信矣湯誓則曰夏王率遏衆力仲虺之誥贊湯之德則曰天乃錫王勇智惟王不邇聲色王懋昭大德湯誥則曰王歸自克夏伊訓則曰伊尹奉嗣王盤庚則曰王命衆髙宗肜日則曰祖已訓諸王其在于詩商頌長發之篇則曰武王載斾有䖍秉鉞又曰實維阿衡實左右商王稽諸詩書夏商之王也其可知巳而史遷紀三代自禹而下十有六王自湯而下二十九王至於桀紂並録曰帝書稱商王受遷曰帝辛至周方曰王噫遷既破編年為紀傳緝補舊聞馳騁百家上下數千年條貫明白可謂勤且精矣而於帝王之序國統大體反為差戾違背六經帝桀紂而王文武可謂正名乎哉且夲紀者政教之源傳志所出今遷紀五帝而失相承之序叙三王而乖正名之體莫大此者故論以明之謹論四代受命論或曰夫源逺者流長基厚者德深而舜禹之受命也以身商周之纍功也以世何耶曰舜禹天之所自立商周人之所自成昔舜鰥而在下棲於畎畝䕫䕫齊栗瞽亦允若大孝之德格聞于天帝試諸難遂命以位禹平水土彞倫即叙六府三事九功以平厯數在躬乃庸諸位此皆至德大功合于神明故能無一旅之衆無一成之土而獄訟者不從朱而從舜謳謡者不之均而之禹故曰舜禹之受命也以身天之所自立者也商自契歷十世而有成湯躬行仁義十一征而有天下周自后稷有功在民積德襲仁及文王而受大命故曰商周之纍功也以世人之所自成者也是故以匹夫而有天下德必若舜功必若禹之大繼世以有天下惡必若桀紂而後天絶之故雖商周之興必待此時也然一代異王苟有大德天必佑命夏之少康商之二宗周之宣王咸能篤修前烈中興王業者是也夫豈二帝三代之事為然雖百世可知巳且天道至信人心至煩命不於常惟德是授漢祖起于徒步挺劒西指革秦慘酷去項殘暴乃自周衰戰國以來民塗炭者五百年一旦而拯之置之仁夀可謂大德矣重以文景之恭儉武宣之英明故雖中絶而民心依依不去者有以哉有以哉東京喪亂天下尋兵直于唐始復王迹唐祚三百所以結於民者太宗為之也唐宋及五代之弊四方裂壤待民益虐埀二百年息肩無地我太祖武皇帝應天順人撥亂反正天麾所指海寰大定肆及先皇天錫靈嘏振古能事悉舉畢行不曰受命之真主哉是以宗廟享之子孫保之以集此無疆之休有自來矣詩曰嘉樂君子憲憲令德宜民宜人受祿于天保佑命之自天申之傳曰夫有盛德必百世祀中庸曰大德必受命其是之謂矣謹論南北正閏論夫帝王之作也必膺籙受圖改正易號定制度以大一統推厯數以叙五運所以應天休命與民更始西晉之亂九區分隔琅邪播遷於江左實紹金行拓跋奮起于雲方奄居神縣蓋五郊禋祀南北不可並享三統相承正閏宜歸一致今夫以晉為閏耶未聞革命所傳以魏為正耶實匪中華之舊大與之兆决誰處之夫晉之渡江也遺中服之雅俗據吳人之舊土齊梁之後風教蕩然危弱相承禮刑不立五代四姓浸微以滅上無所授下無所歸雖欲正之人誰適從且夫商盤庚之遷亳周平王之都洛不出王畿之內如歸别館之中兆庶實從不失舊物比夫身居藩翰觀望本朝進不扶危退而正號非同論也至如太伯之奔勾吳不得謂之姬矣昭烈之興巴蜀豈可以為漢哉魏氏先實漠北控弓朔代南平燕趙遂通秦凉出令作法變風遷俗天地有奉生人有庇且居先王之位宅先王之國子先王之人矣則是夏禹之出東夷文王之祚西羌爰集大命以撫方夏詩書所載謂之何哉前世大儒斷南北之疑者所以正魏也或曰二帝三王應天承運必謳謠之先歸故人神而協贊秦遷周鼎漢受秦降雖仁暴不同亦傳授有所元氏起於參合踐食上國謂之受命晉祀實存謂之中國則劉聰僭據乃陶唐之冀方苻秦所都實宗周之咸鎬若其審定王居之次推考生勝之法偏閏相承夫何足尚曰劉石苻姚世祚短淺欲正其名無名可正魏之霸業肇自皇始典法眀著成於太和內無強臣孰與蘇桓之逼間有中主未若宋齊之季雖末世爾朱之變而建康易三姓矣唐以土承隋隋以火繼周周以木變魏魏以水而紹金昔漢祖之正號也去姬氏之滅幾六十年閏霸秦而繼周著為火德識者以為得天統魏氏之推厯也去愍懷之亡亦六十年捨四僭而踵晉定為水行議者以為當正位推晉而上至於伏犧氏出震而王天下也帝王之大統明矣謹論君子大居正論宋宣公捨太子與夷立弟穆公穆公疾使其子馮出居於鄭召大司馬孔父而屬殤公焉殤公與夷即位十年十一戰民不堪命華督因民怨而弒之國大亂公子馮立是為莊公息兵安民國以治公羊傳曰君子大居正宋之禍宣公為之噫宋之禍穆則為之公羊子之譏宣過哉夫國之大事莫大於繼統宣公捨其子而立穆公蓋念宗廟之重而慎付託之意也非疏其子而私其弟弟才子不才也穆公不原宣公之意而效區區之讓使與夷逞志於國而致大亂是宋之禍穆實為之宣無譏焉可也或曰春秋之義貴義而不貴惠伸道而不伸邪故魯隱之讓桓君子以為不正可謂輕千乘之國蹈道則未也此宋宣公所以為譏也曰是不同義夫宋為商後立弟為常昔者微子捨其孫腯而立衍君子以為行古之道也周法子死適孫為後微子立衍自行商道故記者正之則是宣公於慮也深於禮也順義不可以隱桓比曰舜肖堯堯授之禹肖舜舜授之禹不得其肖已者故傳之子而以止天下之爭且亂是舜不能以傳禹堯失所授也禹不能以與子舜非知人也此其授受不失其宜故二帝一王稱聰明之德宣公以穆公為賢使主社稷而穆反為禍階則如宣之失於所付何曰是不同義夫堯舜舉於外宣穆取於內舉於外也廣故必求肖已者取於內也惟親故足繼世而巳耳穆賢於殤舍殤而授穆可也殤不賢於莊捨莊而授殤不可也故愚曰宋之禍穆實為之公羊子之譏宣過矣以國之大事莫大於繼統故詳言其大義云謹論詩變正論夫子刪詩分四始之義列十五國之風而惟二南為正始之道王化之基厥㫖安在曰昔周道之興始諸帷閫初古公亶父爰及姜女聿來胥宇其後太任媚周姜太姒嗣徽音文王刑于寡妻以御于家邦武王十亂乃有婦人焉故在國風本諸后妃夫人之事而以關雎鵲巢為之首乃周所以成王業之迹也故季子聽歌周南召南曰始基之矣及乎風化洽德教純終以騶虞麟趾信厚之應易曰正家而天下定是其義也後幽厲敗德內惑外亂艷妻煽處並后上僭於是乎夫婦不經人倫不正而風俗壞矣關雎之亂可勝弊哉曰請問諸國之無正風何也曰周自懿夷失道上無天子下無方伯國異政家殊俗政之和者其民樂政之乖者其民怨一日之內諸侯之國而美刺之情不一得失之迹殊致故變風作矣若夫王道方盛治致太平易禮樂者有討革制度者有誅政出一人逺近一體王澤流而頌聲作則是治定之功歸乎天子列國安得有正風哉然則周召非列國耶曰當武王克商巡守陳詩觀四方之風以二公德化最厚録為風之正始者蓋本諸文王焉曰周公之盛德若豳者何衰而變焉曰公以流言東征念先公先王基業之艱難始于稼穡之勤而成天下志在濟大其功業故七月之詩兼四始之義總諸風而參二雅猶有疑心存焉非天動威以彰聖德成王其終不悟則其詩遂變矣曰風者一國之政雅言天下之事王國之有變雅則宜又從變風者何曰雅者正也蓋言王道以正九州周既卑弱不能保先王之舊俗僅如微國尚安能正九州也故有幽厲之雅而平王之風焉變風止乎禮義猶有先王之澤也故曰小雅盡廢則四夷交侵中國微矣孟子曰王者之迹熄而詩亡及陳靈公之亂君子知其不可訓也而變風之聲亦絶矣是故以后妃夫人之德為之始而采詩者止於陳之亂誠人倫始終之大要乎謹論樂全集卷十七
