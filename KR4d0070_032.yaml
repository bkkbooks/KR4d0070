body:
  text: 樂全集卷三十二宋張方平撰箋啓授翰林學士謝兩地伏奉制命授前件職者王人傳召恍候㫖於銀臺禁從參華遽躋名於王署胡然冒寵惕不自容伏念某識昧事微學無師術幄筵臨䇿嘗率爾以應書衡石親程誤擇焉而中等射豈期於沒羽博偶快於成盧遂齒清游俄升近綴寖踰始望益駭償來虛舟無競於風波疏籟寧諧於鍾吕矧此浮鰲之地深切翔螭之庭號令所頒猶決大河之水樞機有益或助泰山之雲自匪時髦必孤職選顧忝塵之非次抑薦寵之有初兹蓋某官申迪儒猷早熙天縡霧露之潤䝉物咸濡桃李不言成蹊在下致夫煢陋濫此凝嚴惟勉蹈於忠方庶逭譏於朝議退深愧畏罔既敷宣謝直集賢院䝉恩充前件職者伏以國家懋建百職分治衆政惟是圖書之府為養材用之宅天下英俊萃為淵藪至于巖廊承弼之重帷幄侍從之列凡邦之彥由此其選服命無忝必士之擇如某者材靡堪乎諸用藝弗精于一家天與愚野之姿早習汗漫之技遭時獲售解巾從政姑胥下邑吳江之水清㑹稽東郡越山之雲白皆仕宦逍遙之地實朝廷愛育之私况堂有二人年髙多病旁無手足與同喜懼所畏迹涉乎寵利之末敢以身徇乎耳目之前而辟書交來皆自其聽過朝㫖除遣抑由於名使引趨陛㦸臨錫笥衣且謂陋才頃塵詔選免給尚書之札遂參麗正之游豈無老成之人蓋有膚敏之士學則稽古才堪成務居然廏騄未登伯樂之圖奚此社樗翻回匠石之顧此蓋某官深懷奬善助國樹人導源使流本乎長者之論憑風載響成兹豎子之名致此莝微謬膺推擇敢不深考所履益期寡咎冀於風雨之晦見乎雪霜之色愚柔自勉無怠乎百千涓撮未遺或增乎萬一上報施生之大次酬薦寵之私過此以還未知所措謝賢良方正登科伏奉制恩濫䝉選第丹扆出策臨問乎大政青幄陳對居慙於昧理惟設科之體大矧取人之材難敢自謂能期於一得撫心知沗被恩良優昔漢之官人並開數路唐之辨論廣設衆科故其名公偉人磊落之器由此其選昌言讜論經濟之具於是乎在國家受命祖宗稽古已治不有咨周于下時延特起之士求聞警切之言竒傑之才間復出萃風流不絶于兹有人皇上統攬九維緝熙百志惟是事事之備念夫安安之難復舉方聞講求王務自非發論合乎正道可以美教化䇿事得其逺體可以尊朝廷有大制度能探沿革之本當大施舍能折損益之衷理之淵源無不貫物之情僞無不通則安能沛然來思膺兹訪逮建髙誼而列上副清衷之虛佇如某者一介自守諸慮本恬生遘昌期世蹈淳則幼居里社知從田蘇之遊早喜古學時就君山之講逍遙內樂拂略世紛未知朝市之中為趨利名之處一壥莽甚四壁落然無如親甘始謀祿食屬深詔之再下辱宗工之交薦時以異等對於大廷初命起家典校四部之籍有民與社庇身百乘之邑幸在僻處居多暇時因得緝所管窺暨嘗道聽聊補稗官之說歸備遒人之獻亦既奏御留置乎尚方俄復得㫖許預乎大對延閣覆實有司上名得召便殿咸如初禮射之飲羽往嘗出于邂逅昏于注金大懼失乎兢局上倚公朝之明不恤狂言之罪十駕已病未知稅鞅之所九霄云逺莫遇便風之勢昔平津再上初非優等劉蕡如何乃猶不第敢以一得之慮邀乎萬全之功且自復六科逮兹十祀詔書三下中選幾人夫何不材再濫名等自非朝家樂育宗儒慎擇豈此孤陋而能致然此蓋某官公議無阿斯文自任四方依乎光景下自成蹊深慮屬乎孤平優為之地致兹庸薄獲被甄收得不夙夜丹心初終一節敢趨末路以徇耳目之前義不苟生而為戮笑之事上全國體之重下報化鈞之仁過此以還未知所措謝茂材異等登科六月二十六日皇帝御崇政殿引對釋褐授前件官者奉對廣墀曷塞天臨之問校讎祕府獲升仕進之階服寵良優撫顔有靦竊以漢詢三道博觀儒術之精唐張衆科務盡人材之廣歷世得士兩朝最光越五季之屯期廢先王之舊典語道斯下由時無人我皇家之茂興大一統以光宅早自先帝爰舉六科咨周自乎搢紳虛懷及乎巖壑庸得佳士不減前朝主上嗣攬寶圖祗守神器特頒深詔用述先猷招致英髦躬御便座詢質經術講求治方冝得異材以稱上意如某者肖靈非粹承學不精生而被化之醇家有業儒之素區區一志斷斷無他若夫天人之大端皇王之髙致質文更救之弊禮刑相須之冝時之所以安危法之所以治亂竊嘗探其統紀究其宗原而屢預計偕輒從試罷鉛磨易卷蹇䇿益疲間遭細札之書復起方聞之士東方自薦或奏牘以三千北海飛章或舉才於纍百惟時孱薄分自晦淪乃為邇臣收諸過聽猥聞名於宸極爰得召於公車有司辨材敞蓬萊之仙藏凝旒親䇿設户牖之黼筵聖謨淵微天聽髙邈收至聰而託不逮寬後害以盡下情遘遇闊希愧才疏陋考經微義曽乏一家之精訪國大猷曷通萬事之紀敢曲學以阿世姑悉心而效愚錐置囊中鋒稍銛而必露矢注弦上勢必發而不留蓋倚公朝之明退無蕭斧之畏遲從罷遣無覬甄收豈謂登衡石百斤之程收芻蕘千慮之得言如綸而加寵衣在笥以班榮延閣之冨圖書典校乎四部大邑之有民社庇身于一同置之俊遊施于官政深惟叨假實過沗僥此蓋伏遇某官燮友萬微曲成庶物思廣上聽盡社禝大臣之心樂育賢材敦太平君子之志器盡成於陶梓物無遁於權衡致此顓䝉亦獲成就竊循頂踵誠有源流敢不祗服官針遵飭名檢憂深思逺敢苟利於當時積精㑹神尚致勤於他日過此以往未知所裁江寧府謝上與兩地伏䝉聖恩授前件職就移知江寧府者參華祕殿易守名藩復親帷幄之嚴仍當方面之重寵靈蕃集優幸殊多伏念某閥緒單平性資䝉固早遘嘉亨之運薦更清要之塗內省短材實安拙分區區一介之守義不自欺碌碌羣居之間心無與校知公朝之為恃忽險俗而弗虞姑勉寬身之仁竟集圖全之毁駭機激矢奔車共塵魯酒致邯鄲之圍枸醬開崑崙之道國章有體廟論無私解籍禁扃假麾便郡方思補過內惕於危衷豈意疏恩遽還于榮路垢疵一蕩壞陶再新此蓋某官道贊穆清誠通化育折金投冶鍾鼎陳於大廷斷木就工犧象薦于清廟故兹甄録逺逮空疏敢不恪守官針期終素履風雨如晦信晨警之匪渝雪霜既零保後凋之靡變冀酬洪覆用報大鈞賀宋侍郎入參知政事伏審祗若帝咨入參邦政伏惟慶慰恭以國家基圖廣厚源流深長亶三后之典刑極百王之軌物念從間歲政出兩宮姦微據乎事權女謁干乎王度彛章就紊順氣為愆誠士悼心思投鼠而忌器匪人得志悉牽牛而蹊田當此一時夫惟自信儻非秉心忠敢達義深明周旋依于本朝造次合乎正道則孰能不虞彼衆迥出其朋深懷憂君之心首建復辟之議言雖甚密固慎出於户庭聲實能飛蓋隂騰于涂道天惟助順已則為仁屬主上躬攬寶圖再造區極天機發于時晦睿德昭乎日躋大明東升廓重隂而霽靜北辰上正拱衆緯以經行宗社之靈妥安朝野之風清迥正人道長理古事同圖任舊良果歸全德伏惟某官懿猷㑹極清照造形以中庸至誠之道治心用春秋原情之法臨事知幾如易多識如詩如樂易良如書疏逺服邁先憲誕宣古人之猷啓迪上心先􅏡天子之命早侍顒卭之席雅膺體貌之隆帝多賈傅之才夜談每久王錫康侯之寵晝接甚頻而靜履保常冲光處易止水均乎澄撓定鑑絶於將迎爰入告於忠謨故出司於留鑰㑹聖神之獨運正紀律於大中思庸俊良乃眷東顧發節首召賜傳促歸地密楓宸奉穆清於奧殿望崇槐位二燮友於鈞庭佇當正耀階符調元鼎席協四鄰而同德期萬物於由庚遐考輿情大同末志如某者聲猷不振神調且卑有數篋之陳書傳為緒業無一壥之舊墅得以自存頗游心於藝文幸飾身於端甫頃逢盛德實尹陪京幸占籍於版圖得通名於屏樹一昨再頒溫詔旁取沈英獨奬録於不材為薦聞於丹扆迥清暉於蔀隙吹和律於不毛假諸箕斗之名䝉以虎豹之鞟木僅不雕之朽徒纍名工金非自躍之竒第憑巧冶特達成造之力始終顧遇之私每頂踵以竊循壓丘山而未重側聞登拜潜動鄙中蓋為元元喜仁人之進用寧惟瑣瑣賀大厦之落成陶化所施歡諧率協伏祈上為朝廟倍保福禧杭州范資政兹者承恩巾檢還著內朝復親帷幄之華仍忝藩垣之重光靈下逮優幸殊多伏念某治世為修散才乏用薦更臺閣之要久依户牖之嚴竊戒懼於奔沈每逡巡於寵利知公朝之為恃忽險俗而弗虞解籍禁扃假麾便郡方釋駢枝之纍自容蓬艾之隂反視聽於希夷收精神於蹇淺安諸拙分聊以窮年豈意中途遽還近綴炎凉未易渥澤惟新此蓋某官時取典刑道恢忠恕言發乎邇世皆信其大公已則為仁物咸䝉於平施致兹甄録爰暨空疏自省䝉姿粗存素守若鈞與引寧違權度之平終白且堅豈受磷緇之變庶幾逺節用答厚知滁州謝上與兩地昨奉敕差知滁州軍州事已於十月初五日到任上訖兩禁近班歷要途而知沗一麾支郡䝉便地以為優早依壞冶之仁適遂榆枋之分俯仰知幸成虧蓋常伏念某與世闊疏持身簡易上加憐於拙守俯垂祐於孤蹤恥於諔詭之為庶乎忠恕之道蕭然逺籟豈諧鍾吕之音泛若虛舟不較波瀾之勢踐歷清華之列逡巡寵利之間控地卑飛謂見寬於雨彈曲轅蟠䕃竟不捨於風斤有惻仁心免銷毁骨瀕淮近甸依山僻城值歲大穰與民同泰事務殊簡㫖井粗充悄悄危衷雖未寧於臲卼昏昏病眼得少嗇於精明此蓋某官衡度盡公陛亷存體駭機初發誠激矢以難留和律徐吹顧枯荄而必及敢不靜循士檢動謹官針助德澤之微分答陶埏之大造謝轉運使奏舉伏審某官過聽不材露章聞上俾部縣之陪長玷㑹府之介賔惟東南之奧區稱仕宦之佳處提封二浙列部百城陟其有聞黜諸無狀弊兹羣吏之治繄在上官之論若夫文雅名流亷能幹吏固相望於著職皆屬意於寵知何此謬庸猥承刻畫如某者學無師法識暗事機須被詳延幸承訪逮榷之國論昧古今治亂之方斷以經疑謬聖賢述作之趣分當報罷俄忝恩收塵延閣以起家得通邑而試政疆里逾於百乘版圖倍乎萬家歲屬薦饑民艱粒食惟深仁之不忍哀疲氓之就隮夙宵一心綏救百術年用大有民咸安生利興而害除私餘而公足顧叨撫字徒謹遵承鈍鉛費於磨礪羸蹇勞乎鞭䇿所虞廢職上黷於刑書敢意誤知優稱於薦牘此蓋某官與人道廣樂善誠深匠伯視材盡輪轅之曲直陶工作器就缶甓之方圓將激起於後生故奬推乎一介退量鄙陋實辱甄揚敢不勉强為仁顛沛以禮佩服名教之樂感慨忠義之名所冀近雅不流中清廟之琴瑟負重無撓堪明堂之棟梁上報惠於巳知免貽羞於士友荷卵翼之攸漸循頂踵而豈忘上宋參政伏以推揚士類采拔人材乃賢公之美名抑清朝之本務近世何者兹道闕如豈意猥才親逢真賞濫首布衣之舉得窺黼座之光推行量能固出諸生之下乘風託景遂成豎子之名伏念某立節無竒少文近野為學荒略曽弗究於一家賦性闊疏復靡堪於諸用但弓裘不可以廢業而簞瓢非所以養親聊干祿以代耕實亡心於過分無何天幸孤奉恩知遂霑一命之榮遽叨百乘之長回瞻屏樹宛在霄衢幾疏記而欲通比內函而輒止蓋騰口說者為感之末中心藏者實義之深故將略其外而篤諸誠捨乎薄而居其厚此其志之所在非敢引而自疏仰料汪汪之寬垂諒區區之懇恭惟某官懿文通理吉德蹈中明淨無瑕若青天白日精粹不耀如璞玊渾金掌邦家之衡繩固名教之律度磊落大節著於危疑之時幾微逺猷施于醇靜之治今夫璇璣在政金鉉調元明堂布政之宮方資坐論東閣翹材之館尚接末游素琯候深黃扉地隔方引領於海上徒馳神於日邊伏惟作德逸休代天燮友神明所祐戩穀具宜更冀上為廟朝倍綏福履賀樞密蔡侍郎伏審祗若咨俞升庸宥密伏惟慶慰竊以貫兵民而議政兹實舊經别文武以命官厥惟近制專廟謀於先勝對鈞軸以平章屬我治朝丕迪王道海寰一統神旗無指伐之行鄰敵稱和齊鉞息受成之命朝廷禮讓民俗宴安是以搢紳士人習守兵鈐之禁貔貅戎旅罔知戰陳之容姑息厚而兵驕威罰弛而將惰竭天下之賦廪稍不充輸上林之藏賞頒亡度且軍志之重糾命為先蹈水火而必前當急難而奮效豈此治寧之日先成貪慢之風譬有不戒之虞其將何術而用自非權知適變略出經時密而後神達夷吾之妙慮取之必與得柱史之深機過聖上志在求理之辰罄忠臣知無不為之節則何以興舉敗度提振頽綱安匪忘危不謀朝夕之逸備於無患永貽子孫之休仰寵拜之得賢實廟朝之繫望恭惟某官徽明應世忠淳自天道無磷緇溫其美玊之量容澄撓淵兮止水之清迪吉德以佐王服常修而簡上若乃裁帝綸於清禁分侯瑞於價藩執國憲於南司㑹邦財於北省聽民衆治理四匭之上封考吏六亷總三鈐之比績率由至正亶與僉諧方主上大振典刑再新區極正人道長理古事同某官嘉㑹此時光膺陟拜密勿樞衡之地矢明帷幄之謨至于朝紱之老成士林之識者聞斯命矣咸曰休哉佇當正耀階符調元鼎軸恥為管晏豈曽西之敢當必致勳華乃阿衡之自任竊惟孤藐最荷顧私髙見品題謂是絶塵之力優加賙恤俾忘捧檄之羞虛當國士之知寧效野人之獻側聞嘉拜有激懦衷方歲薦饑乃值京坻之積臨川未濟更觀舟楫之雄調燮所施邇遐胥抃朔風嚴沍密闥深凝迹方逺於霄程心徒留於屏樹伏惟上為邦國倍保崇髙知陳州謝上啓右某啓奉敕差知陳州軍州事已到任上訖伏以太皡之墟肇自上皇之世有媯之後爰開盛德之風承京師首善之流實勳舊均勞之地祗膺朝命濫領藩麾伏念某平世為修散材乏用更臺閣之要久依户牖之嚴海鳥暫留亦受太牢之饗風簫忽過豈諧雅奏之和頃解郡章獲歸里社冀安末節遂以窮年攝迹閒曹分從於病廢長民近輔復被於詔除此蓋某官秉國治均贊時化育亮采通於百志燮友周於萬微大道甚夷至誠斯格敢不仰䖍存録自力衰疲更礪鉛刀聊施於一割所憂駑乘難效於長驅過此以還罔知攸措樂全集卷三十二
