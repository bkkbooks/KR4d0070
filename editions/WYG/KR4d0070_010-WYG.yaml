body:
  text: 樂全集卷十宋張方平撰芻蕘論宗室論臣聞昔在帝堯克明俊德以親九族九族既睦而後平章百姓協和萬邦三代之王莫不封建宗子以為藩衛周之宗盟異姓為後其敦叙世族之義則有飲食之禮親睦伯叔之國則有脤膰之賜及其衰也幽王不能燕樂同姓骨肉相怨而頍弁角弓之刺興焉平王棄其九族而葛藟之譏起焉然維城毗輔翼奬王室故有周之享國逾八百年及乎孤秦郡縣天下專自封大不復建侯子弟單㣲勢同匹庶及山東冦起孑立無救四方瓦解遽至顛覆二漢之制屏翰支子入參宿衛宗室賢者預聞朝政親疎雜用輕重相權故基祚揺而更安國命絶而復續魏氏簡薄兄弟隔逺族人制諸藩王不許朝覲文如鄄城武若任國闗防禁固才不試展而乃忍死待賦託孤寄命本根淺弱龜鼎速遷司馬氏近鑒當途謀安後世配兵諸子分據要地永嘉之後禍變九作自相屠刈過於血仇離石嘯亂區域大擾羌胡紛起王制剝盡猶賴藩戚撫臨方面故大命重集於江左焉中興之後敦峻干誅皆自上流蹙逼京邑故自晉世逮於宋齊險害都㑹必命王室子弟鎮督之於後劉蕭二明昏迷悖亂忌同好異縱其尋斧枝幹都盡枯枿兀然股肱悉除但存胷領險慝之人以為利姦雄之臣以為福故使齊梁坐移神器嗚呼滅天理反人道汙禮義傷風教凶德之大其惟内自誅夷者乎近者唐氏創業亦多宗室立功中世已還多難之際斧鉞征討巖廊謨謀書勳鼎旂流芬史諜者同姓近屬實繁有徒臣聞教莫大於親親道莫大於立愛故傳稱六逆其一曰疎間親夫子曰君子篤於親則民興於仁伏惟我國家德厚流光慶基憑固天實保定長發其祥韡韡棣華既和樂而且孺振振公姓皆信厚而有穆宜乎德教自家而刑國孝悌達於四方者矣至於爵德官才教勸長善之道臣猶竊慊疑若有未盡至者採其大要敢僭論焉皇族試用臣聞周之五等分土繼世立適以長不以賢立子以貴不以長無嫡選庶兄亾弟及故子孫傳祚與王家始終其支子為羣公子公子之子為公孫逮乎世代已遠服屬且疎則各以其祖之所居官或封邑或字或諡因以為族以綴親别本而各仕其國為卿大夫士焉漢之封爵皇子則王王子則侯王侯世及無嫡則絶後武帝復使諸王得推恩封子弟為列侯而王國之嗣無不侯矣其宗室同姓肺腑之親入居卿相出為牧守中外逓處惟才是用故諸劉繁衍彌漫乎天下曹氏裁制藩戚最為無道至於隔其兄弟吉凶之問禁其婚媾慶弔之禮上不得預朝覲下不得交人事離恩絶義斷弃天常能者被拘才者不試故曹植自比圈牢之養物求一效死之地而不得氣類乖疎公族翦弱故司馬氏乗間而起如襲虛邑焉南北之際晉宋之事尹正王府督領藩鎮兵戍之地險要之都必命宗枝分居岳牧爰及隋唐未之替也我國家祥符之前皇親尚出臨郡後絶外授初無他釁且天下一統承平治寧藩郡之勢制如臂指不比江左隋唐都督節察輒千里百城事權之大也又何忌焉葢以其驕貴放恣鮮遵軌度罔自抑畏不知小人之依故朝廷推示大公為百姓計上全親親之義下為元元之福爾且國家基圖安固源流深長古者族食世降一等親必有盡屬必益遠及本枝百世衍大蕃昌有蓺文如向歆材畧如臯勉又可以勿用乎哉夫天子建國諸侯立家大夫有貳宗士有𨽻子弟上下尊卑莫不用其宗戚以自佐佑春秋秦伯之弟鍼出奔晉譏其有千乗之國而不能容其母弟至使出仕於晉故謂之出奔方今天下之大郡國之廣百官衆職文武參布宗室子弟豈無智可以效一官才可以帥一校者歟彼夫執事内外之臣統理軍民之長規約條教又豈生而知之蓋習之則至矣臣愚以謂諸皇宗天戚有能脩整端良者宜稍試其材出領郡職入參環衞異同並進親疎雜用輕重相制等級相權唐之諸王率為州郡别駕漢之藩國衆務由於内史誠約漢唐之制漸進而叙用之選量上下律之以法宜其才用能否志行僻正可得著見矣則又察其謹良莊慎者以備王室爪牙焉詩曰豈無他人不如我兄弟誠使盤維之固豈不益為廟社之休乎諸院教授臣聞昔在帝舜命后䕫典樂教胄子夏有東西之序商建左右之學周則大司樂掌成均之法樂師治國學之政自王及羣后之子皆訓以四術三行之事又庶子之正於公族者亦教以孝弟睦友子愛之道明父子之義長幼之序故庶子之官治而邦國有倫衆鄉方矣自秦燔滅先王之道而教其子以申商刑名之言不復有庠序之事漢雖開設學校選置師儒而國子遂廢齒學之禮今諸宫院講説教授之官實古師友之地且天枝帝胄習見驕貴生於深宫之中長乎婦人之手甫出就傅性習之始朝廷當為慎擇道德之老經術之儒莊介堅質之人純重規矩之士俾正言日入於其耳善氣薰襲於其心使知恭儉之為令名嚴畏之為吉德聳勵之以樂善則有榮賞福祥之事誡懼之以趨惡則有刑罪禍敗之來善惡之端實由師友今乃使自薦請即為除授凡選人充職一嵗乃得改官至有商販初仕輕薄少年率僥倖以自媒為進官之捷徑以備優弄之具曽何誨導之為夫食荼蓼者不知薺甘居嬴博者必為齊言紺緅隨染薰蕕易氣况人抱血氣剛柔之性函欲惡荒佚之情書曰位不期驕祿不期侈此言富貴不與驕侈相期勢必自至者也而不節之以德義輔之以正人欲其不入於邪動克由禮其可得乎周公曰孺子其朋孺子其朋其徃言方幼孺當慎所與朋處者也子曰損者三友友便辟友善柔友便佞損矣臣伏見近建睦親之宫制度周大前拱宸極後固國基夫漢立諸侯之邸纔備乎朝宿唐建諸王之院專寵乎近親未有能糾合宗族均恩等義如今之美者也其設司分局綱維備矣至於教育勸勵之道臣敢獻愚焉其諸院講設教授之官臣謂宜擇其學問精博志行端脩之士定其員數中開廣堂為之學館凡宫族子弟尊卑咸㑹而以齒叙焉晨以談經書以學文學官分掌之而命耆德近臣一人揔攝焉其勤於肄業恭懿莊儉學蓺特優者使之上聞遷其秩祿加之賜賚以旌之則其不帥教者不待罰而憤悱知勸矣鏘如冠珮雖居象魏之間洋然頌聲如在洙泗之上不亦美哉故為國以禮動人以行王化之大者貴游公卿之子弟州鄉庠塾之士人莫不上靡德音下脩志業四方風動其教不肅而成矣振振公族咸如麟趾之時緜緜葛藟更茂本根之庇可為德化之媺邦家之光也夫樂全集卷十
