body:
  text: 樂全集附録行狀本貫應天府宋城縣孟諸鄉曾祖文熙皇贈太師曾祖妣蘇氏武功郡太夫人祖嶠皇贈太師尚書令兼中書令祖妣劉氏沛國太夫人考堯卿皇贈太師尚書令兼中書令魏國公妣嵇氏譙國太夫人公諱方平字安道世家睢陽三代以公貴封贈各極品位景徳四年丁未生舟中有盜躡船後旬浹未得發是夕泊舟在野盜乘便將逞適太夫人欲就蓐問乳醫居隔水因移舟從之有船後至正泊其處盜夜至不知舟巳易也大譟攻刼後舟乃武人登岸與鬭盜奔散有被執者自言其情方知誤爾由此母子無恙公髫齔英秀神采瑩徹見者莫不慕悅之皆謂仙骨道韻非風塵中人也稍長敏慧夙成飄飄有凌雲之氣太師沖黙燕靜不以物累自嬰而太夫人賢明知書躬自教誨年十三太夫人撫之曰揚州俗浮薄睢陽鄉里有庠序四方學者萃焉吾弟為之領袖汝方志學盍往依焉吾惟汝一子念孟母徙鄰之義不逺千里致汝外氏俾之就業汝往勉哉夫人有弟穎時名士有學行故割情遣之既至舅氏器愛之切磋講習業大進常宿學齋二鼔就寢忽有叩門甚急公起問之乃一生自逺方至舉子許育自亳州城父至因延與語俄頃室垣頽簀案盡碎公資性明悟諸書一覽輒通罕復再閱不能為精若至其要節不能遺忘放曠不屑細故其度廓如也暑月乘醉歩於郊外大雨暴至不覺行逺向曉方醒乃偃臥水中奮而起歸亦無他不自測其然也在鄉黨交游不雜諸老先生皆自謂出其下名聞四方宋宣獻公綬蔡文忠公齊繼守南都解榻待焉歸朝大為延譽明道二年制舉六科因共稱薦舉茂材異等科范金華諷見公文章曰竒士哉因同二公列名以聞召試秘閣選預廷對釋褐以秘書省校書郎知蘇州崑山吳劇邑户三萬多田訟至三數十年不決初吳越歸國郡邑地曠人殺占田無限但指四至涇瀆為界歲乆水旱涇瀆移易更相侵越縣受詞歲追擾鄉鄰覆驗往返農務荒習以為常鄉人不得安業積苦之公索田訟凡十餘案召佃人問所輸租稅幾何大約百一二公悉收其餘以賦貧户自此田訟遂絶范文正公仲淹蔣公堂守姑蘇邀公談游罕在縣縣亦無亊蔣公勉公曰即代歸朝何以為獻空言無補不若著諸時務之為益於治也公因人亊之間採掇當世之得失浹日成芻蕘論五十篇十巻蔣公披閱不能釋手櫝而上之薦應賢良方正能直言極諫科䇿入等遷秘書省著作佐郎通判睦州是歲地大震河東災異數見詔求直言公上疏闕下指切時政之失引義慷慨援經術推明七事極當世之弊以大忤在勢者制䇿登科官罷當召試公既孤介未嘗造要門復此奏疏故不召疏在文集先是韓忠憲公解㕘知政事知南都奏辟公通判應天府既成命矣及對䇿指陳時事無所顧避執政竟用此更除新定實左遷䇿在文集仁宗張六科網羅天下英俊其自布衣登茂材異等者惟公與富丞相訖三朝無復繼者其再登科者惟公一人至新定之次年夏戎阻命廟堂慮害不深玩成大梗興發調輸不閱歲而天下被其勞公上平戎十䇿在文集時呂許公復入相方勵精得公十䇿謂知樞宻院宋宣獻公曰六科得人哉蓋以公初為宣獻察舉爾十䇿悉施用時勅州郡諸縣增置弓手約束甚略郡縣異見措置乖宜公以謂賦役大事理宜均當列上節目八條朝廷更為詳議事以周宻俄又命朝臣分使諸路於所置弓手招募配補諸軍公陳六患上命中書下公奏所遣使者由是募人莫敢廹民情少安二奏在文集吕丞相每閱公章奏謂同列曰國器也凡條白必施行焉用舊相李文定公辟徙通判天雄軍續有㫖召赴闕既朝對面賜五品服章翼日上諭執政送學士院試俄而記之曰是其再對制策者執政共白其所上章疏朝廷採納巳見之行事矣上曰安用試即除直集賢院以李公舊相特㫖俾赴辟命李廸或移徙即令不俟代歸館供職公還南都將迎親就官李公徙青州即日除太常丞知諫院舉劉䕫王質自代䕫遷知黄州質除荆湖北路轉運使皆有清名是時夏冦阻命覆軍殺將相繼國家多事公獨在諌垣外論邊事内正典刑造膝盡規悉心將救仁宗寛大容納當國者雖惡其切直然亦頼以肅中外王師挫衂關陜動危先是張士遜作相建言軍旅之事樞宻院任其咎故罷免知院王鬷等而中書自如也公援典故請政事總於中書以通謀議上以權宜為然降制宰臣兼樞宻使自是戎事機宻中書始關預奏在文集夏竦等領陜西四路招討經略安撫使并䕶諸將四路禀復事失機㑹請罷竦總帥使四路各自為守可以責效朝議然之故竦内徙而命四路帥臣自此人知自力備禦益修奏在文集前范仲淹在延州遣人遺元昊書喻以逆順禍福既遣使而錄其書夲以聞賊答書辭不遜仲淹焚之㕘知政事宋庠以為邊臣擅交境外又致慢書辱國建議請斬仲淹仁宗以其言險不用然自此邊臣以為戒慶厯元年冬郊公乃請因赦書招懷夏寇因令邊臣通其善意仁宗喜曰此朕心也至中書又詳白執政嘉奏也非君孰發此者郊禮成肆大眚赦文所載皆如公請因是西賊通問遣使至于納欵解兵息民公啟之也奏疏在文集賊順命范仲淹韓琦龎籍皆以西事平登拜二府是歲赦書錄用諸功臣之後加賚戍邊守將功臣立私廟賜㦸凡九節皆公建白奏在文集又上親祠郊廟徹登壇陛黄道虚小次不御糾諸祠官不恪饗用金石新樂皆上特從公言奏在文集惟日孜孜以思補益大㫖論風俗夲於厚論刑名夲於恕論賞罰夲於正論朝廷夲於官人論邊防本於選將論財計夲於嗇用今所編文集後論事十巻其著者存之且數十百篇有所不可傳及所遺者多矣亦足以知公之納忠匪懈也公以章疏數上思有以啟廸主心俾不倦因上言聞之荀卿曰聖王有百吾孰法焉禹湯有傳政而不若周之察也唐室治亂於今最近請節略唐書紀傳中事迹今可施行有益時政者日録一兩條上進善者可以為準的惡者可以為鍳戒兹亦賈誼晁錯借秦以喻漢事之意也上悅從之後遇事有當言即取其類者以進三五日不入仁宗輒問其故樞宻使杜祁公衍聞之曰此所謂陳古以刺今詩人諷諫之㫖矣後除知制誥仁宗命取所錄唐書奏御者編次為一集留中焉明年春除修起居注仍領諫職冬使契丹假起居舍人知制誥入北境及郊迎北主與弟私至范陽郭門外母閼支等亦乘駞車出郊道旁填壅觀者莫不屬目焉燕日北主親至坐前命玉巵揖公曰聞君海量畢之語左右曰有臣如此佳也又因公出館至公寢室繙藥奩取湯茗懷以去所賚必别題送之禮意殊厚使囬進語錄中有對答數節皆逆折其事端當時禁中大黄簽摽之以示中書自此北使以事宜至者輒命公館伴慶厯中館伴數矣二月使還三月召試中書除右正言知制誥賜三品服章時慶厯二年也尋糾察在京刑獄判吏部流内銓登聞檢院昭文館太常寺兼禮部事知通進銀臺司兼門下封駁事勾當三班院知審刑院審官院兼史館修撰専修日厯修宗正寺玉牒詳定編勅修唐書樂書充館伴使考試制科武舉每兼職事以數四輒辭避觧之于時仁宗眷公厚對必留降必目送凡朝廷重議官局要處宰相不敢不以公名上中書嘗擬曾公亮史館修撰上不從賈丞相語公亮得張君一薦可哉公為薦仁宗即許西掖辭制唐元稹獨得深厚之致唐末歴五代國朝鮮及王言之體公文既爾雅濟之雄贍號令風采煥然一新庶幾西漢之遺韻矣至今天下推服范文正公㕘知政事時政有所釐革必伺公入直始出事目降勅詞嘗謂朝士張舍人於教化深非但妙於文辭也自是兩禁辭命有訓誥之美由公倡之仁宗臨御歲乆日厯因循失紀章丞相監修國史奏公續修之公始請自乾興迄慶厯臣僚之薨卒悉追取其閥閱功狀而巳有門緒彫喪或子孫不能紀其先世遺落多矣展轉究訪僅可條次至于諸司沿革事典悉責送官乃僅有存者及仁宗在位四十二年譔著實錄頼公中間採集稍有預備于時操事者頗立交黨更相貴寵互為遊說奔走胥附公正色于朝獨立不懼衆雖不悅無如之何范文正公每以公議持之上亦自知之深也吳正肅育春卿宋景文祁子京與公最厚善毎相謂曰不動如山其張安道之謂歟領審刑御史臺有獄辭連歐陽修時修任河北都轉運使制使就推修不承覆推如前具奏法官當修報上不以實之坐公以案上仁宗盛怒謂使者有黨故不盡情命送中書選官復按公謂賈丞相曰相君與修異衆所知也今覆推無狀而復按雖有㫖天下必議公公盍圖之賈丞相為之觧說得罷按而復下案審刑取㫖詳議官引江湖上佐之例以白公公不從乃上言審刑特㫖嘗在法外而領審刑者一員專其輕重凡侍從官到任巳重有吏議請自中書上取衆議之允也竞不以上而送政府賈丞相思公言止奪修龍圖閣直學士以知制誥知滁州續有龍圖閣待制王素案公引前請又不斷而以送中書不悅公亦自引罷審刑斷例命官犯贓私罪案後收坐舉主公上言收坐舉主而許首免者責使常察其所舉者之不法也而致仕官既巳解籍休退謝逺人事不當與在職者之責朝議謂然由是致仕官免收坐吏不及門矣夏文莊公有憾于張耆耆子閤門使得一守貝州到任七日吏卒王則卜吉生變拘得一王師攻圍六十日城破下得一御史臺法官當得一謀叛文莊欲盡叛法論時相陳恭公執其事以為得一庸懦被拘不能死巳抵重辟叛無夲謀仁宗為免緣坐而猶沒其第公與張氏風馬牛不相及聞耆妻僦陋舍無以處其族因從容為言耆真皇寵臣也此第本恩賜今得一妻子免緣坐耆猶在諸子衆而沒其賜第法不類仁宗謂然以其第給還之迄今張氏子孫莫知者仁宗因從容問公臣寮上言治術在刑法今法弛故下慢非峻法無以振頽敝大臣亦有為言者何如公曰古之聖賢言治道夲於徳義三辟之興皆叔世也國朝列聖累仁積厚急深故之罪寛縱出之罰百姓懷惠安於壽域法無由弛人實弛之去諸姑息懲其僥倖頽敝自振不在峻也既而資政殿對䇿條陳亦如此仁宗善公言羣論遂息受命修慶厯編勅公以為編勅者當依律門類而備其起請之因㕘詳之意夲末悉具乃名編勅治寧歲乆事目滋廣天聖之後文簿猥煩乃許編修官删潤而加損益或數事并一條比附有所不盡天下承用多失法意議欲省其繁細稍復舊體執政難之及書成公校新勅凡諸刑名使無加於舊文乃上之權知開封府聽决明敏雖不閱時稱為治辦除翰林學士免京尹領羣牧使公在兩禁朝廷大事時䝉訪逮奏事在文集公必披誠條對一無顧慮故人主嚮納之羣牧司自真皇時以國馬大亊常命樞宻使領之職司甚重天聖後海内乂安監牧多廢事積弛公充使乃修舉課牧之政令復沙苑東平監創立綱目將以廣蕃息削除諸敝經營未效遷諌議大夫御史中丞甫受命即知貢舉時太學舉人妄變文體以竒字僻語為髙以游辭長句為贍四方學者承風而靡公主文考試有如是者揭而斥之因上言請行誡勵上命録公所上奏大書牓于貢院前由是士子知循舊格奏在文集中宰臣與㕘知政事辨爭上前且數日舉朝喧然公請對具白道理所處宰臣使人說公凡是非在公爾㕘知政事今日免公明日補其處公駭曰此言何為至於我也所使人公所素善及是深責而謝絶之既而有自効於宰臣者㕘知政事免果得其處宰臣恨之欲有以危之前當南郊賞給未集仁宗深憂之三司使連坐此罷故復公翰林學士除三司使至則督責郊費公按京師及諸路支給名物一一區處有備籍以上聞上大悅讒言遂詘至今計司以為常例遇郊輒前上籍公初覧事吏白河朔𣙜鹽法議巳定方施行公命收格翼日登對論此鹽筴非是唐末藩鎮專土横賦積重五代相承中原窘狹鹽禁峻宻民苦刑報周世宗北伐父老哀訴請以鹽課均之地稅而弛其禁世宗矜而從之今地稅鹽錢是也國初征利之臣請復𣙜鹽之法河朔父老詣闕叙陳太祖皇帝問其夲末法竟不行今日令下百姓必來訴不從實非便從而更之不若以特㫖先罷俾軍民知惠仁宗深謂然是日降手詔罷之河北父老皆至澶州旁河橋南向建道㑹謝恩祝延諸州以次浹而止仁宗以諭公鹽事幾誤朝廷手詔今刻石在北京自西師屯戍事邊寖廣財用不贍民力大屈公大校國計上言天之生民以衣食為命聖人因是而為之均節立君臣貴賤等威之分以止其争且亂故禮也者文飾此者也刑也者防禁此者也凡所謂賞罰法令仁義㢘耻皆緣此而後立者也衣食不足何禮刑之有哉内無以保其社稷外無以制諸夷狄國非其國矣故貨食者人事之確論非髙譚虚辭之可致者也因條例盈虚之由出納之數請究其夲原節以制度章數上可謂精悉矣中書繙閱經時數議而不能有所措置也郡國賦調必寛為之期㑹故免卒暴之費庫務給受必明為之程式故無邀阻之患省諸刑夲絶諸後害几桉之前四方䝉福凡所建立皆為故事至今老吏追懷南京鴻慶宮奉安三聖御容當遣柄臣上特俾公充禮儀使禮畢錫燕命公主㑹鄉黨榮之越明年春以目疾懇請觧邦計上面諭卿領大計事無闕悞宜且小勉不多時煩卿也今宰臣陳恭公敦止又欲正三司使名公堅辭又特命三部副使分受辭訟常程細務但令諸案發遣大事乃禀白焉仁宗於臣下鮮見厚薄之意眷眷留公蓋蔽志於進用公以目痛乃曰不堪一日留也恭公為之歎咤曰禄位固有定分耶遂解計司歸翰林仍兼端明殿學士判尚書都省領銀臺封駁審刑太常三月上召兩府兩制官於資政殿觀龍圖天章閣所貯瑞物觀畢賜坐陳列筆硯上出一幅于懷乃䇿問也宣各就坐條對宰臣陳執中獨固辭巳而二府並進請歸中書樞宻院對而封進許之或云樞宻使夏竦忌執中以其不由科第少文故建此以困之執中毅重質直心知其然故力辭不對執中夲以章疏自逹真皇由此自光禄寺丞擢右正言若奮筆于時二府亦自鮮能企之及此堅辭識者以為得體時公出還禁林是夕值鎻院草麻制使相章得象除司空致仕訖方援紙一草數千言五鼔封入仁宗披覧以其精贍異之復廣為問益為條目是日復中出御札俾盡意以對公所陳皆祖宗典故時事之所要切便宜利病周詳該洽上深簡在月餘復御迎陽門召兩制近臣賜坐又面賜問目略云國之姦蠧朝之憸䛕大臣之不才者直書其狀無有所隠其設席引公自近宻邇御座且面丁寧俾盡條析覧訖當毁之保無漏言專注視公揮翰公意不欲暴人之私而廹人於險竟不如詔㫖泛論大體而已奏御上色不懌初上竒公前對及御迎陽專為公發問公不才者意且即以代之既不承㫖命遂中格公聞之曰吾志在納忠因而為攻奪之便豈我心也哉前對詔䇿二道在文集迎陽門問對對御無藁然上意自此解左右浸潤因乘間得入三司判官楊儀者以請託被劾行險者緣是以逞連引近位及朝士十餘人公與儀頗厚故亦被問獄具法官當儀罪止于請求而所累者殿前指揮使許懷徳御史中丞楊察知臺雜事張昪修起居注韓綜開封府判官种世材等皆詿細文獨公無罪可書時執政有欲中傷者例從重議公亦罷翰林出知滁州公乆處清近陟降論思忽爾無名逺補淮甸士友多相唁者公曰是奚為者諸朝士代還求官候闕輒三二年今我何勞懷郡章即安逸相賀可也沛然就郡殊無不足之色上意尋悔到官三月就除端明殿學士知江寧府公平日與所知譚民政之體以謂獄市賦役民所以慘舒者獄斯無苛市斯無擾賦斯時役斯均民有所措手足矣無苛夲於恕無擾夲於約時者期㑹緩急之謂也均者簿書詳允之謂也故公長民布政允蹈所志凡此四事必留心焉用是所至清淨吏民安之不留章章之迹乆必見思蓋體道之深耶先是江寧府廨火及此重修始成特㫖命公撰記因著是說于文勅撰江寧府重修府署記在文集中明年冬就加龍圖閣學士遷給事中徙知杭州錢塘氣俗輕侈貨利凑聚號煩劇難治公纔渡江望風讙迎既下車訟庭肅然時清臺上言推星占吳越當災非兵即疫故命資政殿學士知杭州范公仲淹兼浙江東西兩路兵馬鈐轄及公徃代吳大疫越饑故公修救荒之政而人無失其所者及公罷遂分浙江東西為兩路不復專統焉杭州地當衝會賔客留泊百姓積苦廚傳之擾公聞其然舟車入門即時致饋吏卒呼噪供索無時公命典庖晨一爨而巳餐醪豐潔民以各安其業公謂僚屬曰利害於人不繫細大歸於簡便此政術也大者畏之小者忽之何有於民也郡城溝瀆自吳越納土未嘗疏浚瀦渟濊濁人户滌灌皆用之公視江閘方潮退時髙下甚逺因暑雨集舟百餘艘蕩諸穢水發閘瀉出之流惡至富陽乘潮納新水溝瀆一清城中相慶凡諸施為舉從便利錢塘人著之風謡至今頌詠未幾丁太夫人憂郡人哭送郊外戀戀不忍還親舊聞公䕶喪且歸南都為於嵩麓陽翟擇塟地以待公至南都謂鄉人曰三代以還諸侯各世其國未聞宋公塟于鄭曹伯塟于許也若以許鄭水土深厚為善宋曹淺薄為惡則許先曹滅宋後鄭亡兩漢之間州鄉著籍魏晉以還封壤分裂衣冠始有僑寓矣吾親知有睢陽爾内外姻族松楸相望也吾未知陽翟所在柰何委親於山麓而與妻子自安鄉土哉此地雖淺薄吾將累甓為坎窆而下實之以土免崩頽漂浮風水之患蛇䑕狐狸無自入不亦善乎遂以此竟襄事今宋人舉用此法遂以成俗諸近郡縣稍稍倣此咸得安厝之宜服除還舊官是歲上郊陽丘陳丞相問公得無民間利病可市上之恩徳者歟公為陳王畿稅賦之重及請減定刺配刑名故赦書及之畿縣兩稅特於元額例減三分永為定式及據續降勅刺配條詳議減除皇祐五年赦勅事在文集俄兼翰林侍讀學士除秦鳳路經略安撫使知秦州時秦州蕃部有叛者斷古渭路都總管張昪舉兵討伐副總管劉渙不禀令互有論奏故並内徙而以公代昪公請對曰邊有兵事即合用典法昪與劉渙自有階級今乃更相論奏又兩罷之昪既自失帥主之體渙有不禀節制之罪較量輕重律令具之臣徃代昪何以御偏禆論列再三竟不受命故但徙渙而昪得免時朝議以陳許滑鄭曹為輔郡增兵防上命於學士乆次中選守臣故公遷尚書禮部侍郎知滑州以三月赴上七月遷户部徙益州兼益利路兵馬鈐轄戒路至陜逢夲路走馬承受張勉入奏廣南蠻賊儂智髙誘扇雲南寇蜀兵巳涉卭部坤維大擾比至岐下朝廷具事宜促行相繼録下蜀中部司州郡奏報甚急宣發秦渭兵馬轉送器甲絡繹閣路過兩當驛即入川界州郡役民夫夜築城諸縣弓手輒增三倍團結晨夕訓閱比及綿漢城皆啟閉不以時民結壇社相約保險嫁娶不復待年窖藏諸物譌言相驚動危紛然公徑至府已視事即日下教所部諸所增弓手築城役夫即散遣之告諸州縣察諸言語相恐禁止諸嫁娶不如禮者解諸壇社蜀人謂之清壇蓋私與盟約值上元觀燈日夕設盛㑹因大啟城諸門三夜不闔民心乃定徐究傳言所來乃卭部譯人欲軍馬集境上規商販之利追其造謀者戮之餘投之湖湘之問乃具奏歸秦渭戍兵還器甲于岐雍蜀土乂安如初蜀父老相傳太皇時李順王小波以甲午年作亂故蜀人識之以甲午年為惡仁宗每以為憂癸巳歲夏程戡自宻直學士除端明殿學士領益州面諭此意且曰無事歸朝寘卿二府明年七月以㕘知政事召還而公代之及公定蜀正甲午年也初張勉入奏中外皆聳公初授朝命委之經略即上言雲南去蜀險逺乆不與中國通諸蠻雲南為大智髙窮賊豈應舉國從之此殆虚言然因民之擾亦有以致動亂惟宜靜以待之既入境比下車處置已妥寧俄而平安奏至兩府共白鎮撫得體仁宗為之色動稱歎龍圖閣學士王贄授瀛州過闕仁宗遇贄素厚公在中司舉贄御史上記之問贄張某卿舉將也因及益部之事咨嗟乆之曰昨深解朕憂人之才當以所為觀之爾蜀人圖公像於浄衆寺眉州蘇洵西蜀名儒為公祠堂記秘閣校理知卭州李大臨方雅士也為公畫像贊所述皆足傳信矣于時儂蠻逋誅實逸在雲南故諜者乘而扇動後此蠻竟為雲南所戮先是智髙母妻子皆執在京師猶存欲以招智髙公奏至始伏法坤維方面險逺藩鎮最為雄大故朝廷假之權重民有姦暴得法外彈治事有艱急得便宜裁處或謂公前守牧必以威嚴操下公曰等王民也何事為虐治如内地未嘗逺徙一民故蜀人至今懷感在蜀幾二年以三司使召還公既對未嘗言蜀故意在復請一麾不樂主計時仁宗違豫初平重煩上聽遂就職向自西鄙用兵兩蜀多所調發人用告困公為奏免横賦四十萬貫疋又減鑄興嘉卭州鐵錢十餘萬緡人頼其惠公慶厯中總邦計倉庾軍儲足支三年馬粟備七年及此嘉祐初中間十年軍儲減半馬粟纔備一歲因上言今之京師古所謂陳留天下衝八達之地非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐朱溫受封于梁因而建都至于石晉割幽薊之地以入契丹遂與强敵共中原之地故五代爭奪華夏靡寧其患由乎畿甸無藩籬之固根夲無所庇也祖宗受命規模畢講不還周漢之宇而梁氏是因非樂是而處之勢有所不獲巳者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立兵以食為命食以漕運為夲今仰給於官廩者不惟三軍至于京城士庶以億萬計大半仰食於軍稍之餘故國家於漕事最重最急因列畫漕運條件十四事奏上時富丞相為上宣讀且開陳其説是日留十刻侍衛至跛倚且曰此國計大夲非常事也公至中書文丞相曰慶厯中公在三司所陳邦計二奏中書每議財䇿必按以為議夲于時公在杭州已得㫖召公復主計值公服憂而止公凡論議固有夲末未嘗徙廢十四事一如條畫施行奏京師軍儲事在文集後五年公過都問三司舊吏自行此法倉儲足支五歲餘矣公在三司文移之下諸路者輒減半廷無妄訴獄無留繫天下無暴賦其愛利所及溥矣就省遷吏部侍郎以目勞屢請解輒降璽書不允再閱歲始得請遷尚書左丞還端明龍圖二職出領南京留府奉親輿歸里舍未朞遷工部尚書領秦州申前命也以親老迎侍不便辭章三上三詔不聽表及詔在文集先太師謂公曰君命當爾取必耶顧吾任騎乘汝盍行矣公始受命到闕屬盛暑仁宗特㫖令俟秋涼以便親也秦壤接夏戎統押洮涼邈川大首領朝廷制誥但名唃厮囉乆矣中外莫知其所謂公始詳究得其種族名號住坐遷徙城邑部落備錄以聞二府中多歴秦帥者亦未嘗聞乃曰付之史官西羗一傳備矣奏在文集政令嚴簡卒乘輯和時夏酋諒祚驕僭遣使至朝廷乃稱宣徽使而其界以侍御史知雜事大㸃集戎騎立寨近篳篥城城秦鄙也旁邊畨户多投匿山林公料閱軍馬聲言出境以安内屬之心實未嘗興發也當言職者有憾於公謂公輕舉當國者乘便欲危之一相云邊臣謹守備職爾何論焉有備無患軍政所先寇至而不戒何以固吾圉師不出營何輕舉之有上亦素察公所為故言者不得逞初命公奏冇㫖除宣徽使間言旁發故除冬官且有後命再任除之及是故不悅者將撓廢前命公聞之曰宰相者時來即為於我乎何有即懇辭請解官奉親歸里侍養故復領南都留府英宗即位加禮部尚書自此數以歸養為請又徙陳州過都值仁宗神主祔廟故止陪位因留判尚書都省未幾請知鄆州州北大澤自青齊問有河入焉公私舟檝徃來相屬至壽張縣河分二𣲖其一近南安流徑易其一近北回曲岸多石湍激分十里許復合冇土豪甲氏居回曲處積姦敝漸湮塞南道舟必由湍激騰剥重載僦人牛以挽之而甲民專其利公因歲饑出倉粟募人疏濬日役千工出穀三千斛浹句而南道通逮今公私獲便刑部郎中李師中撰記刻石在壽張未幾加翰林侍讀學士徙知定州夲路安撫使公以親老復請歸養改徐州以舟行侍親為便故受命明年春召還翰林充學士承㫖遷刑部尚書頃赴東平登對英宗愕然曰吾籍卿名乆矣不知卿乃在朝今何自為郡公曰臣向領陳州過都屬先帝升祔陪位因少留無職事故不敢見今奉辭亦思効涓塵出奏牘言時政要務在文集中顧問再三業巳外除意若有悔及徙徐州屢語執政俾召還凡三沮止最後語云吾在藩邸時覧其所著芻蕘論及所對賢良䇿於時務該洽矣以此典誥命足揚朝廷光采沮者察上意堅始奉詔及入見上具道此意慰撫甚厚且曰聞卿親老當内直時或文字稀少出宿可也上自在藩邸好學喜文辭即位後兩制代言多不稱㫖故喜公還每覧詔命謂知制誥蔡抗曰老筆自别一日登對上問公吾昔觀卿著述知於治道留心所謂治道其有體要歟公曰治道固有體要何謂體要曰體要在乎易簡其說云何曰易簡者天地之理而賢人徳業之所由出也因為上開陳繫辭一篇之意上曰何所施行而得至于易簡曰夲於誠明爾誠則易明則簡誠明者君子之性也誠則易知而有親明則易從而有功故其徳業可乆可大其治天下何啻乎視諸掌矣是日顧問甚乆上曰吾昔在藩邸列於朝位望兩制近臣以為皆天下之選自即阼方見其奏事或常常爾不惟兩制執政中亦鮮有發明者今聞卿所譚方知有人矣上起宗子及纂御深自謙抑自宰臣以下未嘗名但呼官館閣諸生有得對者亦止呼學士公從容白君尊臣卑國之大體君前臣名朝之常儀肅權綱正憲都治道之夲待下之禮太過非所以隆堂陛明等威上自此見羣臣稍正名分冇奏劄子在文集公前在禁林修玉牒屬籍及此再還内制復司宗籍見近歲宗室蕃衍其賜名者率鄙惡蓋四聲諸字取用已盡宗室在亡巳千餘名以音同相避名一字即餘字悉廢公請以服屬疎近賜名其音同字異者不以相犯迴避由此宗子還得雅名英宗屢稱其善云張某可謂知救時敝者矣有奏劄子在文集上深患官冗令兩制集議以清其尤濫向者兩省官議事多異同不能折中詣理及是公為兩禁之長事必舉正於中朝廷頼其裁定諫官李受請對論冗官之敝上曰此議屬之張某卿若别有意見可以語張某擇所長而處之也李端愿對亦及此仍令端愿至學士院宣上此意樞宻副使胡宿請外補出知杭州翼日中書請除人上曰張某宰臣復欲沮之而難拒上意乃曰向者常議樞宻院夲有武臣一員乆闕不補今請用前議以復舊典即歴數武臣三數人至郭逵而稱其可用除逵簽書樞宻院公事他日公因對上曰罷胡宿夲以用卿中書每不為卿地至如議用武臣中間除呂公弼樞宻副使時不舉前議則其意可知也公曰自仁宗慶厯後擢用二府必與宰臣㕘之臣知事君爾然所守有年歲矣十一月英宗違豫十二月漸劇二十一日召公入福寧殿上憑几授㫖册今上為皇太子翼日宣麻盛傳制辭下四方公至中書執政皆言皇儲建立國之慶典得公制辭足以增華儲邸流芳史牒矣皇太子上辭表公批答至儲宫太子讀之稱善宫僚皆誦之莫不歎美公受勅充册立皇太子禮儀使方討論大典英宗升遐皇太子即位翼日公首見召對于側門議加恩宰臣宗室公因言仁宗晏駕以在位四十二年凶禮亡闕倉卒綿蕝事多過制郡縣更成勞擾今請詳酌裁定儀典稍從簡便上曰朕思之但奉先之禮裁損非宜公曰請申明遺制遺制固云應山陵事並從儉約能奉先志可謂天子之孝矣上拊髀曰卿言甚有以發朕心即傳宣中書差官就三司置司省諸冗費不急之物公私稱便焉以即位推恩遷户部尚書時國家荐有大故内外賞給發及積藏英宗登極頒賚尤廣公率近侍之官請從裁汰故自宰臣以下宗室戚里例損十之七八省費不貲劄子在文集公在内禁諸詔命令天下莫不傳布英宗廟號諡號祧遷之議諸大手筆皆公撰定凡所損益莫不折中諡議廟制皆在文集故今上眷禮尤重常問方今政務所先公陳治道大體在文集國集大夲論國計亊在文集是謂守位曰仁聚人曰財上曰此可謂政務所先也公所陳國計極詳因曰陛下何以圖之上曰責之二府爾公曰得之矣既付二府毎旬浹輒一詰其施行條理故二府亦莫敢懈稍稍措置所補亦不淺矣四月㕘知政事吳奎免是日公適對上語之故且曰朕志先定登卿政府公再三遜避上曰卿歴三朝可謂獨立傑出知卿不結交黨左右莫為之先今朕首舉卿以自輔尚何辭之有既而語及韓琦乆在告其意保持奎奎免必不復起公因言琦雖挾愛憎然有勲王室進退之禮宜盡恩意上深然之為親札手詔敦諭琦還奎于位以慰安之上好文章從容問及古今制誥優劣公曰王言以簡重為體西漢制誥典雅深厚辭約而意盡故前史以為漢之文章與三代同風以其與訓誥近也臣才學空疎愧無以發明聖意亦庶幾取其爾雅而巳翼日降賜宸翰稱其書詔褒嘉殊重時䝉訪逮或見特召一日謂公曰卿所上封奏其精切者朕置之卧内時省閱之九月英宗神主入廟忽夜召公入以宰臣韓琦罷議除拜恩典因命公㕘知政事時公以親疾在告固辭上曰受命以慰親之意亦庶於有瘳也徹御前雙燭送公歸院是夕别召知制誥鄭獬夜就起居院草公制面諭贊辭之意獬所草除書皆上所授故事自知樞宻院除授皆中書得㫖以辭頭授當制舍人具草未嘗夜召也惟親王將相大除拜乃面召授命節旄亦多用熟狀翼日制出公在吿宣入即時中使召赴延和殿告謝公立殿門外以親疾自陳促入宣上殿慰諭乆之公請候親疾良愈受命不許近璫即送赴中書先一日韓綘邵亢除樞宻副使次日公與趙抃並命又次日内殿起居閤門儀制兩府以先後入為班次班退宣閤門使上親定班著以公為首綘次之抃又次之亢又次之至政府之次日宰臣議以王安石補御史中丞公曰御史中丞秉國憲度安石以經術為名自處髙難居繩檢之地趙公抃亦以為然竟止未幾太師捐館上聞震歎遣内司賔臨奠近璫數撫問賻賜尤厚後每語及即嗟惜命虚此位不除人以待公安石預政與公志趣不同又聞中司之議沮乘公執喪之間衆口交爍服竟乃除觀文殿學士知西京留府遣使齎勅誥帶馬即家以賜旬餘中批令赴闕朝見公既入對懇請南京留司御史臺上慰問移晷且諭公可以宣徽使留供職公堅辭惟南臺是請翼日乃除判尚書都省領集禧觀公復請對免不受勅上曰朕留卿卿堅辭卿所請朕所難從且若之何藩鎮惟卿所擇歴問公太原雍河陽許青鄆孰便公曰不得巳願為潁州上曰潁支郡公曰潁實佳郡自舊相皆領之曰孰與陳公曰向經新行經國重戚也上曰經之移徙易爾遂領淮陽公因面言臣被恩特深當微有以展報也上曰甚善因探懷出單奏具言近聞朝廷置條例司開端創意且大為改作若一司一務有所釐革縱有過差後皆可復而國之大事在兵與民不可易議也師旅興發患必在後民心危動安之實難夫兵為凶器戰為危事不可玩夫民愚而不可欺弱而不可勝不可忽故兵猶火也可以焚物亦以自焚民猶水也可以載舟亦以覆舟願陛下謹守祖宗之法以保泰山之安時熙寧三年正月條例之議始行故公因對及之退而謂親友曰吾此得見亦不為虚至矣奏辭上問且少留否公曰今出都門行矣既下殿不復至私第乘馬即戒路聞後有賜亦不及也在陳一年餘慶州有叛卒構亂聲勢動關中夲路轉運使沈起傳檄在所兵官縣尉各集兵境上防守介胄持兵村落皆擾民大惶駭州縣展轉騰報急如星火公發檄止之故自陳以東皆安靜且具以聞上以付樞宻院頒下諸路兵方散顧謂二府曰守臣不當爾耶臨事乃見人器慮矣近臣登對者必語及之特㫖舉堪諫官者二員公以李大臨蘇軾應詔或止公公曰吾知舉堪諫官者不知其他也時監司官有苛深者事小嫌輒别推一州至設三數禁官吏多被檄推事州縣患闕官陳州置推四所速者猶淹半歲追逮證騐數千里外道路輿曳或在禁疾病寒暑瘐死間有之公條例上聞司官被問郊霈得釋朝廷因立約束頒行天下諸路推獄由此不敢妄作刑禁以清公在西軒聞築者謳聲甚諠問焉曰民為張太尉立廟公遣視之男女奔走以輸財力材甓貨食充積他日國忌僧寺行香堂後門闔下見畫像公問左右曰唐趙太尉也公曰巢寇亂陳今郡城北舂磨寨遺跡在焉其毒可知也趙犨守孤城以罷兵無日不戰竟全此州能捍大患而不廟食張侯何者今有廟在京師封靈應侯命徹張侯廟夷之籍其資用送官立趙太尉祠堂於寺中至今官吏以時薦常事陳人皆奉饗石記在寺祠堂前諸路司官所興功利長吏皆不預聞公曰吾衰矣且素不能事人盍歸歟以全所志故復請南臺不許又累請遂解州紱判南京留司御史臺先治裝受命即行掃舍掩關罕所通接坐忘遺照遊方之外矣所居構虚堂題曰樂全蓋取莊生云樂全之謂得志所謂得志者非軒冕之謂也謂其無以益其樂而已矣自號樂全居士謂知友曰一丘一壑盡在是矣中外屬意朝議謂公必尋起或謂公朝議如此公將何如公曰吾進不求合退不為髙今以病故爾何敢慢命也樞宻副使蔡公挺里人也上時問公動靜時宰知㫖欲就除南都公揣且别有除謂蔡寧就陳遂授陳州未幾夫人卒因請易南都便塟又徙南都上諭宰相韓公㕘政馬公張某可令過闕二公因所親通㫖遂入覲閤門新制應見而當對者並待次次日早宣令對巳退朝不果對又次日方對慰問留數刻語舊甚悅曰先帝常說卿不立黨友所居竹栅門常掩或終日無一馬出入因曰且以宣徽使奉朝供職懇辭不敢當宣坐賜茶前殿罕嘗賜臣寮坐既退上語左右張某氣貌可四十許人爾俄有㫖下閤門前兩府見辭日即對不得以班次隔遂著令是夕御筆批出令赴南郊陪祠執政者以為大臣得請有陪位今令陪祠特㫖也即當攝事乃降勅攝侍中又攝太尉皆見執政所承攝之職也前一日宣徳門肄儀公端笏挺然進止詳整樓前萬衆無不屬目冬假未開先投牒奉辭上恩眷既渥前嘗面諭令時對來公不敢數上意候假開且有除拜忽覩奏辭見班而公名在焉訝之夜半降一幅批張某三字付外在韓相所中書早㕘令改宣徽使判應天府及入辭上曰巳有命懇辭不可居數日閤門促受勅告謝公請先對後謝有㫖令先謝後對蓋絶其避免也因陳宣徽使必由寄任而除向臣以私便請南都今授重官歸鄉里是啟僥倖之路上曰此意朕未之思也卿自持誠得體青州重鎮也大臣臨撫為宜面諭輔臣咨嘉稱有風節改判青州兼京東路安撫使延和殿吿謝宣坐進茶上問卿知邊事祖宗時所以禦戎者䇿孰長公對軍旅之事雖未之學歴代史册所著得失成敗亦可言之矣夲朝太祖專務擇人以安邊保民不勤逺略如夏州李彞興靈武馮暉河西折御卿皆因用其酋豪使之承襲以固疆圉而選驍將如董遵誨捍環州一路郭進守西山李漢超保關南並乆于委寄至十餘年不徙優其給賜寛其文法使佚樂自恣以收其力用故盡太祖之時無鄙上之事太宗既平并州因兵勢遂欲收幽薊不克乃與契丹交怨邊難無歲不有曹彬劉廷謙傅潛等皆大失亡至各十餘萬人又遣李彞興馮暉之族内徙以取其地因是致繼遷之亂三邊大擾朝廷旰食後有蜀亂以至憂勞厭兵然悔無及矣由是觀之其禦戎之策得失明矣真宗初趙徳明納欵西邊安靜及澶淵之行北國講和軍士觧甲及今七十年生民安於富庶可謂盛徳大業者矣近歲以來頗聞邊臣獻開拓之議此實進取之人僥倖立功以干賞蹈利恐非國家之逺慮惟陛下思太祖之善制鍳太宗之失䇿謹三朝之好以乂寧四方撫育黎庶上曰慶厯以來事卿知之乎元吴初効順如何待之公對元昊効順時臣為翰林學士其誓誥封册皆臣所撰因具言其夲末上曰爾時卿巳為學士耶可謂舊臣矣又問慶厯初契丹泛使來常見富弼言于時兵在境上志必南侵竟以金帛餌之而退其謀果何在公對當時蕭英劉六符來使乘我西師之屢挫知朝廷用兵之困北國貪倖故來渝盟臣當時充諫官亦曾上言竊料敵情餌以金帛必解何以言之自和好以來北兵自亦驕惰其貴近安於侈逸其下無由自振故生事以邀功而圖富貴此人之常情也今北國猶有舊臣如馬保忠之比北國尊重其為之謀必忠今若受金帛而解耶律氏之利也必棄好交兵羣下之利也于時仁宗命宰臣吕夷簡樞宻使晏殊於殿廬中置酒與議事蕭英自言兩朝和好乃是好事豈願更見兵革耶又自言北國事頗漏其情六符變色目之及歸英竟以此獲罪由此觀之乘利而動得所欲而解其謀止於是矣因言今聞泛使復至願陛下為社稷生民計所議更且深加含忍今河朔荐饑民多流散財用不給糧饋空虚以至將帥之臣克堪整衆者實少必有忍其乃有濟有容徳乃大時泛使蕭禧頗黠猾恐對上禮有慢者或不能容故公深以為言上曰兵凶器戰危事朕念慶厯中敵再和之後中國遂以自安不以凌侮為辱亦不復忍戒備以善於後故朕今者除戎器訓軍旅非有意於興舉至于不得巳以為應兵爾公對此魏相所謂兵應者王兵貪者亡然應兵者謂兵禍之巳成也及其未成消平其患乃善之善者也公向在内禁英宗大漸召公至福寧殿凴几曰來日降制册頊為皇太子語少力公請紙筆書僅成公亦不敢藏之私家至是袖之面納上曰何者公曰先帝御札欲閱之公曰請内中披展上泫然以付侍璫他日諭曰卿所納先帝親札乃憑几末命此真可謂之顧命矣公不敢當專乞赴青州對下上遣近璫就班次宣謂卿可候過正旦朝辭次日中批俾就都亭驛押賜遼使御筵都亭押宴常以兩府官未嘗有外官主之上曰卿舊望館宴可與戎使開懷譚話不與新進者同矣元日館宴戎使甚恭曰敢問押宴宣徽貴壽公言年六十八四人皆贊言公顔全不動公慶厯初嘗使北是四人中必有曾見公者既而切切耳語久之蓋以公使北時北主有異禮北國紀之迨今三十餘年不意今猶在朝也晩暮上馬北人皆擁堂堦聚觀望公出門方散甫過元日請辭赴任面奉㫖令過上元上親諭閤門使張某且赴常朝過上元又請上曰青州無事且知州滕甫見在任卿可留過同天節公對同天節猶逺臣乆留京闕乞且赴任上曰卿老於朝廷典故朕且欲時相見眷諭再三是夕中批令歸夲院供職公以為宣徽使留京師惟國之重戚文臣未之有具此瀝懇竞不許面諭曰宣徽院無事留卿有以訪問非但供職而巳屬春宴北使蕭禧在路公請待禧到同此宴上語及禧來為河東疆事諭示甚悉公奏仁宗朝嘉祐二年北使蕭扈已曾來辯朝廷討尋夲末令館伴王洙等具言扈辭屈遂錄節目付扈公猶收洙奏章遂以上之禧當辭偃蹇吏晨夕促之不入公於殿屛與樞宻副使吳充並立謂充北使留館禮遣之不行俾主者日致饋而勿間命邊吏以故移告北可矣充以此入啟上然之居數日禧果自請辭上曰朕謂卿自詳事體兼一職乃除中太一宫使面諭宫新成國家所嚴奉故創置使名公對臣此入覲巳荷顧遇之深南都之命且引年矣念他日莫復望清光夲志一謝恩眷即行非為官職來也願不以進退累聖懷臣自安分因辭宫使降詔不允上數言卿可謂顧命之舊臣矣常求補外得無在朝有所好惡者歟公曰君前何敢隠臣實未嘗與人交惡也閤門儀制宣徽使奏事辰牌上即赴後殿公每對遇報辰時上必有㫖次日前殿對未嘗隔過後殿也蓋其禮遇不以常制待之親知或勉公曰公得君中外莫不知盍體上意數辭非宜公曰所謂得君者謂行其志也余於國既無補又懷恩而求容以傷君之明是重得罪也引身而退有以逺耻辱是亦一介之守也生日中使賜餼醪見任二府有此賜宣徽使不及此異數也奉朝夙退門無雜賔乆之復丐徐兖一郡遂不入上遣近侍就宣見問卿志常自疎外何也公對曰大夫七十而致仕禮也臣年巳廹幸得請冀便於吿老上曰卿殊未衰何謂年之廹也公曰譬之土木偶外若可觀中實乾朽上曰禮有不得謝進退不在朕公曰不得謝君所以加優老成者然亦不屬以煩重之事矣上曰年至而任煩重者固有之矣公曰天禀特異不謂無之大率古者四十而仕七十而老中間三十年是為一世天之紀也物壯則老人之精力年至自應衰黽勉從事顧禄位者為之臣雖知戀於聖朝豈敢忽於名教次日中書纔奏事上曰張某朕再三留而請不巳須從之因議恩典或有異言乃易宣徽南院使加檢校太傅有謂公上殊慊然有不足之色遂判應天府受命登對上曰卿請巳確此命朕深不得已玉色不怡乆之辭日特賜方團帶宰臣解政除使相有此賜餘無前比優恩及於私室辭後數日有長星見於軫犯左右轄掩其中星名長沙星上避正寢降禮下詔求直言公上疏論時事得失疏留中到南都適髙麗使人過府先有制夷使所過長吏迓迎公上言宣徽使班秩同兩府夷使陪臣也禮太過特㫖罷迓送止令通判承事使人來謁見即與復禮時使相公諸人之在揚州令揚州依此夷使入謁退而謂中使馮宗道通判韓晉卿李鈞曰某在夲國聞公名乆矣不意今日於此得㕘接也廣西守官侵擾諸蠻交趾乘釁構亂破邕州廉州大殺掠南裔騷動朝廷命師出軍稱十萬二廣湖南至江西調夫輸送發陜塞勁騎往討公上疏論其事凡十條大意以為古之征蠻未嘗舉大衆以其巖壑深阻水土風氣惡今為大舉銳士難以乆於瘴鄉突騎不能馳於鳥徑蠻走險兵不得用謂宜選吏綏集亡散保境徐以謀取之為善疏上師巳出竟以癘疫兵夫不可留而還時司農總制財利之條令典其職者間或非其材舉天下之祠廟令比諸坊場河渡歲入貲而專其祈祝之事公時守南都上言閼伯封於商主大辰之祀微子始封於宋宋者國家王業所興而又以火徳王奉祀尤嚴至於張廵許逺南霽雲前代忠烈之臣廟食於此俾無賴之民得干黷之殆非朝廷之議上覽奏御筆批曰慢神辱國無甚于斯使執政推究其施行之因實未嘗經朝廷之議有㫖前主判司農嘗遇此事而不發舉者以輕重加罰申命天下一切罷之公身在外覩諸利害輒言請禁錢無出邊關復銅禁髙麗使人到闕初無防遏恣所適公請絶其私游凡有便宜必以聞再閱歲年七十請老章累上每賜詔不允王丞相以上意諭公所親以為雖百請必不從公致意相君姑就散地可哉相君為言乃除東太一宫使府罷就第遂屛人事惟趙公叔平老在鄉閭往來未嘗他適也僅二年復請致仕又三請詔止之最後上以章付執政令召知制誥李清臣至中書宣諭以公懇謝之意且令誥辭著公先預升儲事故命書具及之以宣徽南院使檢校太保太傅太子少師致仕遣使臣齎誥勅至第賜之聞蘇軾下吏思有以寛朝憲上言昔晉囚叔向于時祁奚老矣乘馹以見晉君聞說而釋之不見叔向而歸示公言也軾以刺譏為罪加譴而免囚有以慰士大夫之望公坐軾亦罰金自是屛居一齋方且齊生死不但遺榮辱也回首風塵莊子所謂若蟁䖟之過乎前矣襟量坦夷無城府不逆詐不匿怨性不喜為聲名故未嘗有所矜治標飾其於毁譽蔑如也性不好交黨故未嘗攀援結納其於人事泊如也性不樂權利故未嘗希時取容雖事君常禮不懈而巳其於進退恬如也所讀書專於六經讀史但觀太史公記班固漢書以為猶足以傳信也暇時頗樂老彭導養之術閱佛典楞伽淨名而得其理每曰儒之誠明道之正一釋之定慧其致一也君子之道求諸已以正性命而巳矣公既兼内外之學由是天下以通人推之故頗僻詭邪不接於心術愛惡哀懼無自入矣凡歴官釋褐秘書省校書郎著作佐郎太常丞右正言諫議大夫給事中禮吏户部侍郎尚書左丞工禮刑户部尚書宣徽北院南院使檢校太保太傅以太子少師致仕歴職直集賢院知制誥史館修撰翰林學士龍圖閣翰林侍讀端明觀文殿學士在朝知諫院登聞檢院糾察在京刑獄太常寺兼禮儀事吏部流内銓審刑審官三班院通進銀臺司兼門下封駮事尚書都省昭文館秘閣秘書省宗正寺修玉牒官提舉集禧觀羣牧使知開封府御史中丞權三司使正三司使㕘知政事宣徽使中太一宮使間授命修日厯唐書樂書契丹國信使館伴押宴知貢舉南京奉安三聖禮儀使册立皇太子禮儀使外任知蘇州崑山縣通判睦州知滁州江寧府杭州滑州益州應天府秦州鄆州徐州陳州秦再除而一赴陳五除而再就應天四除而三至西京鎮定太原永興青徐皆受命而不行大約所歴藩鎮至則清浄去必見思抑可知其中外􅆒歴之風迹矣文四十卷號曰樂全集内外辭制雜著二十卷號曰玉堂集元祐六年歳在辛未十二月二日精神不動寂然順化享年八十五訃聞輟視朝二日特贈司空官其屬五人其配永嘉郡夫人馬氏太常少卿絳之女有學識婦道順而正母徳慈以均晩年明性理其歿也有異别誌載之四子邦彦大理評事邦直邦傑並太常寺太祝皆有文學行義並先公以歿季曰恕克自修立保家之子也三女長適殿中丞蔡天申樞宻副使挺之子次適右朝奉郎王鞏端明殿學士工部尚書素之子季嫁而復歸以元祐七年八月九日庚申𦵏於宋城縣孟諸鄉之南原從先塋也右謹具閥閲功状上太常考功請議諡及上史館以備編錄年月日王鞏狀樂全集附錄
