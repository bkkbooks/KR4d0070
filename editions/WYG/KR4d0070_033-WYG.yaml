body:
  text: 樂全集巻三十三宋張方平撰記序江寧府重修府署記奉勅撰慶厯八年正月癸巳江寧府署火自唐失政姦豪專土更相禽獵或自􅆲襲紫色淫聲餘分閏位李昪冒揚徐之業開國江左大築城府僣用王制聖朝治定混一區略戈船南渡煜歸京師徹其偽庭度留表署然規模壯麗猶雄諸藩至是火焮徼人之廬煬譙門延東西序公私寢既焉府書焚室以聞詔遣内侍韓從禮問故且有後命俾營如舊度除龍圖閣直學士知揚州張奎右諫議大夫領軍府事屬之經治才選也命發運副使許元轉運使孫甫鳩材庀工遂以從禮䕶作奎初下車莽然垝垣撥煨燼略區址計徒庸程事期以賦功于羣吏元調所部方湖滙澤章蕩泭集甫效七州二軍之卒以待役費稽以尺籍令以鼛鼓斵者如風築者如雨茨者雲舒墁者波巻餼廪稱事忘勞競勸自閏正月至于八月合役二十二萬有竒合材用無慮二百二十萬考室七伯楹臺門崔嵬前達通逵以表命令彰儀範公堂隆深中敞廣庭以頒詔條聽民成崇榭壯雄東闢坦埸以訓軍乘嚴戎備分曹布局舊邦鼎新從禮抨圖復命上嘉奎之敏於事而器幹足任被之璽書稱飾其勤將佐吏卒率有加賜凡民工弛其户租之半盖春秋之義新作必書有詔守臣俾著經始謹按金陵楚邑勾吳舊地東南王氣萌於三代秦并六國置鄣郡江南而改曰秣陵厭之也在漢實丹陽郡治所吳主孫權始城石頭號秣陵曰建業自京口徙焉晉平吳郡如漢舊析建業為江寧縣琅邪紹統畿政領於丹陽尹隋平陳墮其郛而野之故六代之迹掃無遺者唐初揚州督府治江寧後徙江都既而以丹陽縣為潤州江寧更𨽻焉至徳乾元中改江寧郡為昇州廢置數矣天祐板蕩楊行密據有江淮子渭竊號而徐温實專其國督强兵據上游以昇州為金陵府自署尹事開寶八年復為昇州節度屬江南東道區域形勝山川氣象三江五湖之一都㑹泱泱乎大風也哉表于南夏隱然巨屏聖上以天統之正國本之重相攸疏壤肇建赤社故天禧二年制書升為建康軍江寧府下教封内存問吏民河海之潤潜通日月之光先及暨登儲禁誕昌寶祚淳耀濬發兹邦有開朱轓彤䄡等威隨重巖廊舊老臺閣邇臣于蕃于宣是均出處領五縣版户十萬榖帛之輸歲百萬有餘初李景奉淮甸十八州之圖以入于周徙其民渡江而均地征焉事充政重朘斂無藝郊甸之賦杼軸空矣逮今雜調舊弊盖存土塗而沈逺諸貨利野無十夫之籍邑無千金之藏緯蕭敷臺廬鮮瓴甓風雨漂摇尤多火患纎嗇蹙急為生偷甚夫民之飢勞吏實其罪合徼而習翫之也古之循吏乎其道恕而已矣施諸已而不願則勿施諸人老吾老幼吾幼爰及人之老幼夫是之謂恕沈沈乎大府而長吏民于斯養老而撫幼于斯宴樂賔客于斯其亦念閭里甽畝之艱且勤哉為之慘舒者獄市賦役而已獄斯無苛市斯無擾賦斯時役斯均曰惠政也未也語今吏所可及者爾獄有法令市有估賦有承役有更關柅動静臂指伸縮以守以禀放命罪也矜斯無苛約斯無擾期㑹緩急之謂時比要詳允之謂均是則在乎吏長民者知此之恤庶乎奉若仁聖愛育之心而使人有所措其手足矣儻是之弗圖而惟庖傳觀㳺之務甚者猜禍昏墨以逞雖邦罸未加其不愧於屋漏乎盖記功必及於政猶古道也矧承明命敢不以誡時皇祐元年冬十一月戊申日長至謹記湖州新建州學記寶元二年上命尚書祠部員外郎滕君守吳興郡始至見吏民問疾苦披圖牒考風俗頋謂僚屬曰古書建國君民教學為先四代之道起於黨遂漢氏繼周而王懲秦非聖人之法以敗稍復遵用儒術循吏文翁興學蜀郡變巴夷如鄒魯漢廷多武人莫或賛上褒廣其道以孝文之盛德具王道而微者所不至於王一息爾猶能冨庶而不能教也東都中興儒雅寖隆公卿大臣咸門有諸生横經受業三分多難微言僅絶小雅盡廢文獻不足唐雖禮典甚講盖文具而實喪是以後王研究理要終莫致於三代者顧所以化民成俗之道育才官人之法隳其根本矣惟我治朝丕冒出日鳥言鴂舌知誦簡册之言髽首卉裳競襲端甫之服而庠序俶落乎睢澳嗣音乎郟鄏規摹大於齊魏絃誦聞乎荆吳且遍諸郡矣矧是吳興南國之奥有佳山水發為秀人自江左而清流美士餘風遺韻相續也凡為郡者用民之力于署于觀于諸不急而學校不建豈守臣布宣王家風教之意歟僚屬曰唯吏民聞君子弟畜其人將敺而之善也相與輸金願遂建學乃十二月考景營基鳩材類工且以命教請于上越明年夏四月勅書先至錫名州學仍賜田五夫六月新學成重門沈沈廣殿耽耽論堂邃如也書閣屹如也皆相次東西序分十八齋治業者羣居焉入門而右為學官之署入門而左有齋宿之館又為窣道距闉挾閣構二亭凡溪山之勝眺望悉㑹庖圃有次廥藏備設復立小學于東南隅童子離經肄簡諒者聚焉凡為屋百有二十楹既釁器用幣釋菜成禮客有興于座曰美哉學也若稽田既勤敷菑在所播植惟學敏厥修念終始在其所志君子學以聚之問以辨之舉而措諸可以成天下之務斯得謂之士矣若其拘文牽義齪齪近思誦焉不通其變習焉不達於用此辟儒之犬患也師乎師乎記問云乎哉能開達學者之志慮使廣大深實知道之所以為用兹可以為師矣學乎學乎藝文云乎哉彼先王之糟粕後世且得其味而嘗諸苟知道之所用何學而非道者兹可以為學矣士充其業上使其器則致理之本不在學校乎以是而觀滕志其已逺哉某不敏豈足以語道之大命紀經始不獲讓云時康定元年六月日記吳興郡守題名記唐氏自天寶失馭而忘其利器諸侯專土姦猾乘隙竊國而侯壊法放命不貢不享更相禽獵或自􅆲逐五代草草亂靡有定天下為戰國者且二百年我太祖武皇帝既擒諸僣王創艾末大之弊思拯塗炭講建長䇿因四方漸定諸帥王覲者輒留宿衛畜其族京師罷節亷諸府裂方鎮之地而置轉運使罷刺史而遣士大夫行郡事置其貳陳其旅以分其權郡長吏不敏聽理不明則轉運使糾其謬以直民之曲郡長吏而才足以自為政不復攝屬于連帥之為患也故距兹八十年天下如一家政事如一體關柅動靜臂指伸縮無有不如意者斯可謂大聖創制從權合義藏身之固置器於安規摹之閎逺者乎吳興二淛之佳郡自江左以來以處名流令望為養才用之宅寶元二年南陽滕君宗諒子京以尚書郎來領符竹子京文雅風采士林推為卿材國器早歴諫官以論事諤諤無迴避不得乆留中換郎外補至郡見吏民問病苦有隠咸照無弊不革因其俗以教獄市帖然始大庠序育人材諸生負笈自逺方至霅水之上既同洙泗矣凡若因循舉興悉復嘗坐㕔事問前為郡者之名而不紀曰是非闕者歟命録自錢氏奉圖朝廷所除吏逮今三十人推次備詳見謁以序盖聞諸長者粗習朝家之故惟皇祖經法之善躬攬鐏柄以遏亂略及生人之利大郡長吏由是專於為政賢不肖之迹以辨今列其名非徒載年月記到罷亦俾覽之者得以善善惡惡而懲勸存焉實春秋之意已至于紀星土本風俗郡之廢置吏之沿革産毛之物山水之勝則於圖牒焉觀之可也時康定元年夏四月記蜀州修建天目寺記浮屠氏之教流而至諸華也迨晉之東其法益熾以大設權實示方便指因報明利益故自世主至于士民莫不丼心焉五方異禀四夷殊類氣俗之别慾惡不同法制所弗齊禮義所弗加甚者至有不識父而大率輒知奉佛百家之聚必有一窣堵焉兩楹之室必有龕像焉矧名都通邑塔廟固錯落相望矣晉原在井絡之維處陸海之沃玉壘銅梁之阻金沙銀礫之饒控犍牂通滇僰即山而鼓民擁素封之資厥篚之華户贏玩巧之利即安樂土知植福田郡有天目寺城郭之最形勝緇素之所萃聚殿焚冦火區址莽然先是郡之善男女合施鳩材僝工構締既已歴載功緒弗就至是尚書郎王君略領州曲臺楊君璵為之倅二君敏材利用周行之彦獄市平簡吏民便安修弊起廢出於餘力越皇祐初年季春哉生朏二君相造而諏日按令式前誕節祓精廬啟梵㑹以祝延而棟宇未完像設莫備執事者為不䖍矣顧何以示逺方乃移縣大夫杜君濟勾攷財簿部䕶役事於是境内四邑之耆老更相勉曰府君之志上以㳟邦典下以為吾屬也且吾屬廢居射利墆不知發譬蟲食蓼而忘其苦佛言人命在呼吸間一息不屬雖至親愛莫相為救何嗟及矣今此道塲近在閭閈動步而至浄土舉首而見化城壯者㳺焉有以生善念老者依焉有以發後心是府君為之舟航拯吾屬于溺也於是樂輸善捨如趨期令既羣樸斵且塗塈茨役効其勤匠究其巧歲未云半仁祠鼎新為大殿八楹環屬四阿廊廡回合屹若山燦如霞桷雕欒文㮰花鬘藻盖中為大毗盧遮那像文殊普賢二大士左右之相好殊勝彩飾妙麗紫金光聚極於壯嚴兠羅綿網依然開合殿之四周圖華嚴九㑹顯佛國之神化增法門之壯觀也寺有阿育王塔嘗見光相亶有靈迹凌空危聳與殿對峙自兹寶地方為具足既慶成邑人大和㑹踊躍讃歎欷歔瞻禮以為須彌燈座寶華嚴飾菴羅樹園金色明浄昔未嘗有乃今復現信一方之功德海四象之甘露門也二君皆余舊置郵以布其事請有以示之後者余詳二君之為抑可謂仁術也歟君子之教民敺而納諸善而已二君之為也本於嚴朝章因以導民善是亦仁術也矣異夫舉土木之役而事觀㳺亭榭之娛者哉斯可以記矣㑹中檀越比丘衆等盖著之石隂皇祐二年六月二十八日記華山重修雲臺觀記太華三方古迹逺矣上方白雲宮在嶽頂據蒼龍嶺云昔羽人焦道廣常居之中方太清宫枕太羅峰今猶有老君像下方即此觀因雲臺山名焉唐明皇天寶中因舊基構棟宇命右補闕集賢學士衛包撰修三方記見存五代亂離三方荒毁髙士陳摶披荆榛築室于下方太平興國中太宗皇帝累賜詔齎御詩召摶赴闕乃勅有司增葺隱廬復給内府金錢經始壇殿規摹方備今觀是也慶厯初某領史官嘗閲國書見摶本傳云摶字圖南亳州真源人始四五歲戯渦水之濵有青衣媪召至懐中乳之自是聰悟及長讀經史百家之言一見成誦無復遺忘尤工詩後唐長興中舉進士不第遂不仕肆意山水間自言嘗遇孫君仿麞皮處士二人者語之曰武當山九室巖可以隠居因徃棲焉服氣辟糓二十餘年徙居雲臺又止少華石室每寢輒百餘日不興周世宗顯德三年召留禁中月餘因問以黄冶之事對曰陛下為四海之主當以政治為念奈何留意此小道世宗不以為忤命為諫議大夫固辭不受而歸詔本州長吏歲時存問問因牧守西行過山下致賜物興國初始赴召九年復來朝上尤加禮重謂宰相宋琪等曰摶方外之士在華山已四十餘載度其年盖百餘歲語論甚髙因遣中使送至中書琪等從容問曰先生得𤣥黙修養之道可以教人乎對曰摶不知吐納養生之理神仙黄白之事非有方術可傳假令白日冲天亦何益於世聖上博達古今深究治亂真有道仁明之主正是君臣同德致理之秋勤行修鍊無出於此琪等皆稱善以其語白上上益重之下詔曰華山隱士陳摶晦迹丘樊棲心巖穴跌宕世表涵味道腴徃在周朝物色幽遯嘗䝉鵠板之召終遂鴻㝠之心自爾以來多歴年所今復言迂髙迹來儀帝庭不有嘉名何彰清範可賜號希夷先生上屢與之屬和詩什乆之還山端拱初忽謂弟子賈得升曰汝可於張超谷鑿石為室吾將憩焉二年秋石室成手書數百言為表其略曰臣摶大數有終聖朝難戀已於今月二十二日化形於蓮華峰下張超谷中如期而卒經七日支體猶温有五色雲蔽洞口彌月不散摶好讀易手不釋巻自號扶揺子著指𤣥篇八十一章言導養及還丹之事舊相王溥亦著八十一章以箋其㫖又有三峰寓言及髙陽集釣潭集詩六百餘首能逆知人意齋中有大瓢掛壁上道士賈休復心欲之而不言摶謂休復曰子來非有他盖欲吾瓢爾呼侍者取而與之有郭沆者少居華隂夜宿觀下摶中夜呼令趣歸沆未決復謂之曰可勿歸矣明日沆還家果中夜母暴得心痛幾不濟食頃而愈華陽隱士李琪自言唐開元中郎官人罕有見者關中逸人吕洞賔有劍術雖數百里頃刻輒至以為神仙皆數至摶齋館與之酬唱如交友時人異之此皆舊史之文也仁宗皇祐三年雲臺觀道士武元亨進希夷先生傳所載尤詳云初先生居下方茅茨不剪蒿蕪不除有訪先生者窺其户闃焉無人但鳥聲獸迹或樵子山麓薦莽深處有骸如腊塵荄翳焉迫而視之乃先生也捫其心獨暖良乆氣還而興曰睡適酣奚為擾我州將以聞周世宗故召見既不受官賜號白雲先生故太皇御詩云曽向前朝出白雲後來消息杳無聞如今若肯隨徵詔揔把三峰乞與君既對于延英殿華陽巾垂絛躡屩用賔禮見上欲征河東先生請姑待軍已興不克下其再對也言天下一統矣果執劉繼元平并州密陳天命實在章聖其所啟沃幽賛逺圖太皇亦欲以為諫議大夫先生懇辭命遂不下委化之年盖百一十有八歲自餘先幾逆數知來藏徃精微深妙殆不可測至諸竒詭眩耀之事則未嘗為也故先王之道浩然莫得而掲厲之者無賢愚貴賤莫不聞其風而悦之大中祥符四年真宗祀汾睢駐蹕華隂再幸雲臺閲先生遺像佇立凝思乆之命除其觀田租召對道士武子華等賜紫服輿駕還京俾就御座所建本命元辰殿内璫䕶作繪晬容於北壁皇祐二年構神御殿嚴奉之禮始備自先生去世門人賈得升武子華元亨相承主持觀事至是殿成元亨詣闕謝恩仁宗令進歌詩元亨應詔進三篇帝屬以御詩又神筆飛白清浄字賜之元亨遂重修七殿至于道院齋堂必葺一新經營累年為力勤矣某徃來秦蜀㳟謁神御既而瞻禮希夷堂惟神仙之云者盖神本無方道無不在神也者妙萬物而為言者也惟神也故不疾而速不行而至漠然與合兹謂至人由是而後可以出死生而通變化雖非積學而至非學則未知或至也夫九室下方豈徒與麋鹿為羣木石為伍而已哉治平四年九月一日記淮南轉運使奬諭勅書記何以保大曰兵何以聚兵曰財故國之大政無先征賦漢氏三分天下之入以其一供邊孝武事四夷調用不足興雜算設諸筦籠山澤之利而民始病唐既兵興蕃戎乘弊陷河湟凡諸侯之師防秋塞上暨勤王討伐出本道之境則食於度支有司商利分毫析銖民之膏澤竭矣盖戎狄侵略何代不有非所以為中夏之安危然率由軍旅期㑹應聲卒辦姦吏因縁邀功市寵為上斂怨生事召亂故中夏之安危不在邊防而在閭里也國家自北方通好西戎款服偃革無事且三十年而黠羌飽飛逸于牢圈驅刼種落内驚邊人顧其意慮股掌中爾烏足以煩靈誅朝廷思為不可犯之勢守備甚設内外當財柄者稍復目動矣時刑部郎中陳君工部郎中張君轉輸淮服當東南之津要以山海為府藏而二君有才術方略貿遷弛斂資用充冨屬王師弔伐邊城委輸惟淮南供具尤贍而吏民不知有貢也上多其勤下詔褒之某將赴都道由山陽刑曹出詔相示願紀其故某伏觀詔㫖以其無斂於民謂之嘉績是以知上心之仁逺也其愛民也二君之體國也其不害民也深惟朝廷寛大之意二君功利之優足以使貪夫亷懦夫起彼邀功市寵斂怨生事者冝知愧畏義可以示天下故及前世備邊大略著本末云時康定元年十二月記素書明録序明道二年三月余自睢陽逰山東將至東秦路由兖海過泰山故人田度為奉符簿止余宿官舍出道書一巻紙札精妙朱墨如新且言龜䝉山人採蜂者迹之登髙崖入洞穴漸深若有人曾棲止處見石盎發其盖得書百餘巻取而束之負下山遇本縣尉詰得書狀取數十巻去山人挈其餘以歸相近村落好事者知之稍稍分散略盡度聞急遣人徃問止獲此巻皆諸符籙篆章也因相與恨歎此盖有道之士所藏必皆竒書具有諸經訣方術惜不得盡見因從度借之以行還自青社遂入待詔京師未暇傳録度俾猶子祥臣來取去後三十二年余守彭門祥臣以都官員外郎致仕在郡而適病卒或言祥臣聞余將到歎曰我與新太守有舊恨不一見也乆之從其子試詢其書曰乃先人嘗所珍秘者即奉以至匝而鐍之猶是祥臣緘封始令摸録而歸其本明年被召還都既素疎懶尤倦人事夙退掩關所與逰者一二林壑之人東陽俞居士數至敝齋喜談丹竈暇日㩦素書明訣三巻示余曰此於丹術微而顯詳而晦妙㫖備矣予覽之信然且言是書三十年前沂州新泰縣䝉山之隂採蜂之人得之崖穴石盎者也余方省向所得書乃自琅邪新泰矣并是而方見四巻信皆竒書也又滕東毛陽地接新泰有王老頗知諸書在處云徐沂間可有五七巻泰山趙生亦知其書有三五巻云在太平醫家皆未及訪其向者新泰尉取數十巻者竟不知其名氏兹人首獲獨多若其髙識迨將有得歟治平丙午良月既望京師靖安坊舍西齋序諸朝賢題朱氏小山詩序京都衣冠之淵藪名利之埸有軒冕焉有斧鉞焉榮于斯辱于斯萬國凑聚以欲是故以惡是故旦夕鐘漏風雨寒暑冒没奔逐惟日不足負國門外名園佳墅桃李連蹊臺榭接影飛花落葉節物潜換主人惴惴勢地皇皇賈區或歲無一至之暇焉芳辰美景風月樹石猶胡之舟越之車也有若朱氏子者居禁垣下車馬之塵交于門其迹近矣而心若逰方之外者是非得喪紜紜擾擾若一不屑然居有虚齋曲檻小山在軒寒檜在庭閒澹蕭灑絶有野趣來㳺來歌皆朝之清流上才天下之知名士觴羞聲妓咄嗟略具雅善娛賔至必為醉亦既醉止方復忘我汝方復遺形骸又奚相别于外物之外者哉且士之立功名取冨貴繫于時繫于際㑹不專于材吾觀朱氏子縱横通敏輕財利善交結能附託英髦得衆懽心兹亦大有用之長也際㑹于時足以為豪傑雖以吏事進志亦逺哉况早與子㳺者今已歴歴布臺閣不日而當化權器使人矣是必有知子之用而用之者少安遲之先是余待詔轂下出一編詩示曰士大夫不遐鄙僕以是為寵也敢謁以序及余去都三千里而謁書不已余以用取人不索以迹者序何辭歟朱氏子乎爾有酒食且以鼓瑟且以喜樂且以永日彼惴惴皇皇雖有臺榭雖有樹石弗遨弗康宛其死矣他人是翔子可箕踞而慢罵之矣梁國張某序吳興歸安尉署凝碧堂詩序吳興近郡諸山環合重見層出煙翠不斷岡麓連屬林薄映帯霅溪中注四水並下溢為大澤漫與湖接歸安尉署占溪山之全勝焉尉謝君炳宗又構堂署南盡納諸景山在堂上水在堂下四時物色旦暮氣象俯仰頋望不逺几席余自新定來行吳興事嘗暇日過君騎及于郭門舟及于堂之前軒見琴書在牀牎檻蕭灑茶烹顧渚酒傾下若怳疑凌崑閬濯滄浪澹乎其適也徘徊眺望日下忘歸客或曰君子之樂也内所居而安陋巷衡門足以求其志亦俟外奬歟余曰子未思也乎處鄉黨而和過廟朝而莊居闤闠則鄙吝之心生經墟墓則悲哀之思作是非外之感者歟清曠爽塏之境固足以恬情性而起和樂焉吾愛是堂也山色共水光俱静草樹與魚鳥並閒可以使貪者約躁者静邪僻者安其機心其功多於几座之銘益者之友也事有迹近而事逺吾於是堂取之謝君又嘗㑹賔朋于斯談名理于斯至于柱下漆園之論則且齊得喪遺形體入達人之大觀委外物於倘來凡軒冕之馳逐榮利之相軋悉以付諸蠻觸氏則向吾所云外奬者顧復卑矣若梁竦徒勞之歎淵明歸去之作於通人之致其猶隘歟謝氏子乎可與語道矣既而謝執簡進曰衆君子來辱者必有作也願刻君之辭以冠諸篇可乎曰可哉歲上章月孟冬記禪源通録序楞伽阿跋多羅寶經乃先佛所説第一真實妙義故謂之佛語心品祖師達磨以付二祖曰吾觀震旦所有經教惟此楞伽四巻可以印心祖祖相付傳為心要後至東山以為楞伽義理深微非淺智粗心所能窺測故每用金剛般若經開示衆等令其易解逮于曹溪以大慈悲一音演説對荅偈句掲如日月其所開導直指本心未嘗離楞伽自證智覺之大㫖也由是領悟者多法周沙界初二祖常言此經四世之後變成名相深可悲哉自衣止不傳諸方分化地殊南北名標頓漸參學之流各相祖述道塲相望源流寖廣去聖逾逺時風益薄堪任大事根器誠難然輕重不可欺於權衡方圓不能出於規矩但兔角龜毛泥牛木馬務為深隱巧愈彌甚名相之言諒非虚示初六祖教諸門人説法必令先定宗㫖雖以三科起用究竟二法盡除故知一問一荅豈苟而已若其具無碍辯才入浄圓三昧隨其語黙佛法現前縁與信合事實稀有故黄蘖禪師毎謂衆曰江西㑹下唱道之師八十餘席得大寂正眼三兩人爾則知為世度門傳佛法印大善知識豈易偶哉自賔鉢羅窟諸聖賢衆相結集多羅等藏其紀述之來尚矣至于中華則有蕭梁續法元魏付法藏傳以至于唐寶林心要祖堂等集國朝傳燈録時代師承本末詳備近吳興有具壽僧拱辰道意純熟禪寂為樂再啟法筵尋復捨衆雖不顯談説而示人聞修之法雖無所作受而為衆利益之事故閲上以來諸傳集録正其差訛攬其精要推明統本總括横枝若網在綱條目不紊依於義不依語依於法不依人不離文字示解脱相徹照今古乃無盡燈又續法眼之後至治平之末達磨法嗣通十有九世凡二十四巻題曰禪源通録時熈寧四年正月望日樂全居士安道序唐太尉趙公祠堂記唐有天下三百年其間大盜三發明皇天寶末安禄山反范陽長驅陷兩都河北河南關輔罹其禍德宗建中末朱泚乗涇師倉卒之變以構凶逆兵不出畿甸尋敗亡僖宗乾符初草冦王仙芝黄巢秦宗權相踵作亂流毒乃遍天下起曹濮襲荆漢破江淮殘閩嶺東極海岱北越河遂蕩覆京邑剽岐隴所至無噍類城府為丘墟榛莽千里煙火斷絶粮食既盡啗人以飽列巨碓數百納人臼中糜肉而食名為舂磨砦軍行則鹽屍以從指鄉聚曰尚有人焉吾衆何患飢也惴惴遺黎靡所寄命于時惟朱全忠據汴趙犨兄弟保陳門之外即為賊境汴去賊差逺全忠兵力足以自固陳被攻圍勢孤衆寡為犨難矣初巢入長安朝廷除犨陳州刺史始領事䇿巢出闗必犯陳即繕完以待既而巢果東奔趣項犨擊擒其愛將孟楷賊盛怒志必屠陳以逞合兵數十萬圍其城疏塹五周百道攻迫犨以饑疲之衆無日不戰歴三百日竟全危城巢以此師老不振卒潰滅論者紀忠烈之事名多重於死執功每減於生全夫忠烈士志義所存豈有意於死生之際也幸不幸存焉爾肅宗乾元中陳州刺史尚死於史思明之難後䝉褒贈至今廟食于陳趙公全城保民享受寵命頋其功名反出於死事者下兄弟三節度皆著勲於王室並終於僖昭之世而唐史不書德朱全忠之救以解其圍故事之謹然未嘗北靣于梁而梁史書之史官無法筆削兩失國朝重修唐書方為立傳昶珝附焉梁書謂珝為弟新書以珝為子犨自有二子麓巖意者珝其弟也熈寧三年余守淮陽州學教授蘇轍為余言趙太尉有畫像在開元寺東廡僧院以聞之不早尋被代不及見七年復被命領州徃瞻其像在殿之隅闇壁闔下晝日不以燭不見也公殁於龍紀中距今百九十年陳人莫知遺像之存于此適隣有空院一堂巋然嚮明髙爽因命工葺飾表為祠堂繪素鼎新神氣如在禮祭法曰能捍大患則祀之若太尉者可謂能捍大患冝列于法祀者矣故封為上公祀為大神聖人立教著在禮典祠堂既立為率僚屬陳饋奠乃告所司春秋薦時事比羣祀以其二弟從又為鑱新書本傳于石立于堂之東楹使陳人知遺育之至于今公之力也時大宋熈寧七年歲在甲寅九月十三日記樂全集巻三十三
