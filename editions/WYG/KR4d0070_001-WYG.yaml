body:
  text: 樂全集巻一宋張方平撰律詩皇帝狩于近郊内署同進并引狀伏覩皇帝陛下順茲冬令狩于近郊以臨農疇以蒐軍實運用乾健烜揚天聲事已而旋禮無違者臣等叨處詞禁幸陪詔蹕謹抒歌詠粗章盛節各齋沐賦成皇帝狩于近郊律詩一章謹隨狀上進以聞講事時農隙斿車此狩畋旌門開霽野帳殿拂霜天星斗隨華蓋風雲逐寳鞭翼開花浪急圍合錦城圓射狡無遺鏃從奔必應弦迹人輕過電騎隊速囘漩鷙翮紛争擊材盧亦競先亟來餘逸足徑下不虛拳勇氣凌金鼓懽聲雜筦絃抗緌分逆順植表閲周旋湯徳逾三面堯心豈兩豜頒禽均近列賜帛及髙年坐幄陳慈宴停輿勞力田鳴鐃迴綵仗斜日下濛泉寧校虞旗獲聊供廟俎鮮簡稽嚴卒乘典制寓蹄筌甫草深懷古磻溪念得賢威靈増震耀徒旅静喧闐羽獵嘗箴漢車攻昔美宣詞臣茲紀詠抑未愧前篇大禮慶成并引狀皇帝陛下躬祀天地嚴配祖考百禮交舉而莫有違者萬靈來顧而㒺不歆焉仍自發冊之朝以至肆赦之日風氣時順雲物晏溫大衆之都羣方畢會喜覘容典抃舞相慶非上聖陟降庭止其孰能至于是乎臣等獲預近班親瞻盛事抃歎不足輒撰成五言詩十韻豈曰揄揚休烈亦臣子愛戴之誠饗帝精禋舉嚴親廣孝純禰宫増懿典皇冊薦威神寳殿齋居肅琳房獻禮陳慨瞻清廟几穆奠紫壇茵備樂嘉安曲鴻儀顯相臣玉從丹禁出禮神之玉出自禁中路儼繡旂新新造玉輅今方御之瑞靄䝉天仗祥風入帝宸懽呼九州會慶澤萬方均有幸逢華旦無謨翼至仁但祈陪百禮景扈越千春九日侍宴太清樓并引狀今月九日䝉宣召赴後苑穫稻觀橙及太清樓射弓侍宴者秋肅商旻日重陽琯眷蕭辰之節物綴宸賞於囿游因宴示慈俾人同樂伏惟皇帝陛下治猷時乂聖問日躋裁成太和丕覆羣品清籞之田是穫稼作爾甘上林之苞素蕃天成其實駐玉輿而省斂恣荷橐以榮觀而復頒以天官之餘輟於果丞之供並拜君賜交荷上仁方且坐寳構之重深旅飛蕤之雜襲彫弧在彀具相圃之和容大笴連飛餘西山之勁氣賚金咸暨醉露云晞浹愷樂之洪私極亨嘉之盛遇臣等幸叨景從俯激歡衷相趨舞歎之餘綴伎游揚之末冒陳清覽増集腆顔謹齋沐各抒成九日侍宴太清樓詩一章謹隨狀上進登髙聞舊俗况此奉堯觴鳴蹕遥空下層樓顥氣傍御溝新過雨苑樹未經霜楚澤丹苞重吳畦紫穗香三侯天縱妙九節召南章中豈矜多藝威將懾四方清時人共樂白日坐間長近從叨慈渥區區祝壽昌上享郊廟幷引狀慶厯四年甲申十一月二十五日壬午冬至伏以皇帝陛下寅恭郊祀罄竭精衷乃吉日已夘齋宿路寢翌日款謁景靈宫朝饗太廟遂有事於圜丘以見上帝瑞應昭答盛禮告成聖意徳音皆可書為後世法臣執綏驂乘尤見詳悉謹用賡成享廟禋郊詩二章章八韻誠不足闡揚丕顯休命之萬一然事皆紀實可以備史筆之闕是亦臣子區區之誠者也享廟瑞雪清晨集丹墀發䇿初皇帝大慶齋宿之日先發改上五后尊諡册寳德音聞徹葢是日雪大作左右進蓋有㫖不御玉色望升車先是禮官上儀注冊寳出殿門上退還次有詔俟冊寳升車進發乃還次羽衛排閶闔晴光溢紫虛比曉升路霽月皎然琳宫陳玉幣先薦享景靈宮玉用四圭有邸幣用青疏屏宿旌旟祼獻多儀備絃匏九變徐有詔樂畢九奏不許减節太官無盛舉上自齋宿不舉盛饌掌次省先除兩廟設小次不御立以終禮靈鑒紛昭格天心不自舒孝慈更答告萬福此攸儲禋郊囘仗由黄道鳴鑾入翠宫愾思文武侑圜丘之祀太祖皇帝太宗皇帝并升侑誠與地天通登陛行裀徹慶厯元年親郊始改圜丘上一成黄道用緋藉至是有詔悉徹之仍命曲臺編入禮令永為常式終祠坐幄空上即壇所端立以至禮畢不還次風雲歸絶域星斗下遥穹是日恬無微風瑩無纎雲星斗離離如下臨享壝際柴煙白龕層燭焰紅氣祥書魯觀至日雲物黄潤四望一色太史奏有年之祥福嘏萃堯躬海上雞星動樓前馬隊雄是日御端聞肆眚畢閱捧日奉宸等隊僕臣殊幸㑹獨得近重瞳臣忝攝太僕恭乘陪禮升祔慶成明詔初發中奉慈講升祔考典下容臺集議付近署變禮稽國章大義推經據叅覆經宰司裁定皆宸慮獻后正壼儀仍几被遺顧擁佑隆帝室清夷賛王路懿主鍾景命禖宮開慶祚靈長繄發祥熙洽本垂裕蓬闕邈仙軿柏城拱寒樹别饗隔昭穆時思怵霜露陽月日上辛齋居待清曙當衙薦寳冊夾道陳鹵簿玉色儼莊栗淵衷􅃡馳慕端闈出翟車黄道囘天步千官陪祠庭祕祐寧神御盛徳配不祧至孝始如素穹厚昭精純蕃夷入儀注渙汗肆慶宥需雲均膏飫廣愛形海區教忠憲侯度下臣叨載筆書法資典故大祀禮成皇祐五年皇心奉先孝盛徳事天明嚴配講隆禮三聖並侑著為大典精禋格至誠衣冠先示質臣慶厯四年攝太僕升輅執綏及皆此再攝太僕竊覩衣冠及諸服御不易舊聖心尚質貴誠之意也金石始諧聲郊廟始用新製鐘磬及以晉鼓鼔金奏鬲享初登熟鋒和用啟牲始循古制鑄牛羊豕鼎及用鸞刀啟牲百神䖍受職萬物樂由庚星斗羅空碧柴煙徹紫清祥曦囘羽衛佳氣覆瑶甍雷雨金雞動風雲鐵馬輕靈休紛報貺宸念在持盈臣陪輅屢被顧問聞持盈守成之言孤陋叨華近何辭頌泰平喜雪慶厯二年仁宗命作愆陽干歲事齋殿軫予憂黙為斯民禱心從六事求同雲俄蔽景盈尺忽呈休淅瀝千瓊樹峥嶸萬玉樓塵氛開紫宙氣象露皇州鵰鶚精神勁松筠操禀優邊庭傷乆戍農畆慶來麰咨爾臣鄰地常期九叙脩送内閣蔡公歸闕豐宫周舊宅梁國漢東闗尹正司留鑰賢公出近班教條推愛利滋蔓悉除刪狹野耕桑急終年獄市閒燕申鈴閣静榮養彩衣斑治迹經綸外陰功造化間士林歸北海人望在東山一節遄趨召西轅不可攀前旌霜樹曉候騎古河灣和氣均生物淳風復海寰具瞻知可副盛徳致無艱他日開鑪冶餘功為鑄顔送吴春卿赴都法座臨軒䇿俊髦同君陛見預旌招疲駑十駕始千里孤鶚一飛先九霄蘭棹秋風行邐迤觚稜旭日勢岧嶤石渠為謝諸時彦行邁同趨便殿朝送冀州李太傅多君貴主子材識乃名儒青海渥洼種丹山鸞鳯雛兵家左車後書法右軍無擁幄羞紈袴懷章就隼旟亭臺煙水闊樓堞暮雲扶信都郭東連大澤亭榭觀游在焉析木元分冀滹沱漸近胡雙觥雖藴藉文和在澶淵故事重閉勿須㬰誰道長城逺今觀出上都送李芝東歸此君齊魯之竒才三十病廢吁命哉來遊京國動悽悵東歸泰山卧崔嵬支離攘臂福所倚功名累身古共哀但恐人求駿馬骨未免却上黄金臺送蘇學士錢塘監郡趣時貴近君獨逺此情於世何所希車馬塵中乆已倦湖山勝處即為歸洞庭霜天柑橘熟松江秋水鱸魚肥地鄰滄海莫東望且作阮公離是非呈資政宋尚書當年留鑰守陪都龍坂因茲得曳裾北海一章慙鷙鳥松江三歲厭鱸魚賈生感事多垂涕園令居閒輒著書獨恃明公念孤介東郊未去逐長沮送石曼卿赴闕功名本不與人期人取功名亦繫時蜀相閒居乆龍臥馬周狂醉竟誰知將軍身到衡廬問英主心驚奏牘竒宣室思賢方空席去陳經濟勿遲遲重送趙叅叅也堂堂氣拂雲十年䇿蹇四方塵羇窮自古有元叔精鑒觀今少法真驥在駑羣殊有態龍初魚服未能神君看渭曲傅巖事天困斯人必有因送馬武才命相憎不相並古來達者齊其中此君寂寞年雖暮靈府峥嶸事甚雄韝上鷹飢思掠草車傍驥老尚追風丈夫掩棺始為了是故南陽晚立功送張寛得喪竟誰尸人謀不可移獨看屠釣叟達迺帝王師大觀齊諸物雄圖彼一時君思塞上説孰可預端蓍送張郎中赴闕明公才氣本雄傑晩戴儒冠腰拖紳講劒妙傳勾踐術工書兼得伯英筋外臺共歎郎潜乆中檢行膺帝命新司列不煩詢治狀幾州欒社有遺仁送宋祕丞赴任鄱陽蕭灑武夷秀茲人美且偲治經通古學應務富時材盍在脩書選行須造幣迴更研輕重術歸奏阜民財送祝生東陽簿之子東南美聲光滿貴游溪山聊薄宦才調自名流野趣雖孤艇清涂即十洲金波沁園宴遲子有賢侯送客游兖海寒飇慄冽響吹空雪意沈沈歲向窮正是兼衣御醇酎如何孤蹇逐飛蓬杉松古色泰山廟絲竹遺音夫子宮訪舊自堪寛旅瑣賢侯況似蜀文翁送楊君西安君過嚴陵瀨扁舟入婺溪灘長秋日短山亂暮雲齊未探驪龍頷聊羈駿馬蹄吳江濤正惡鴻鴈此東西君之昆子莊學士赴四明倅同行送客入洛高歌彈鋏酒盈鍾壯士何須歎道窮客路歲䦨天又雪旗亭醉别氣如虹驥騰夷路思良御㠶破長波待便風今子方為采蘭役未宜去揖紫芝翁送福州監郡陳殿丞七閩一都會乃是無諸城海近氣物異山遥風候清宦游過鄉美君禄及親榮去去倚門念溪船歸棹輕送陳汝玉謁三川大資政左丞吳公育吳公昔作河南尹首唱儒風薦賈生今日治平承祖德可無推引助文明謁青州范天章劍横驢膊儒裝陋㦸列臺門霸府雄喜似禰衡逢北海直須雷煥辨南豐謬悠為説非今味疎畧言詩粗古風更似賈生多歎息聞公真賞勝吳公送沈生昆弟隨侍之博白四絶句炎方景象異中原海氣昬昬雜瘴煙今日荒夷成雅俗薫風南播自媯絃不須南浦懷消黯好過西山訪隱淪比到嶺時應近臘相思可寄一枝春東連海道徹扶桑北望神臯斗柄旁兩處音塵杳難接征鴻歲只到衡陽夕陽疎葦暮江湄秋色蕭蕭動客思自侍嚴君領州去豈同騷客夢邊時呈范天章詔起東山對紫庭清風蕭灑動堦蓂讜言幾為忠邪發大用須憑廟社靈武庫神兵羅斧㦸大宫禮器列籩鉶願公早入當鈞軸重演三篇相武丁送郭誠思歸華下忘懷物外且如愚何事勞精據槁梧以馬喻馬即非馬數輿無輿方得輿莫執斧斤過櫟社懶施几席向蘧廬好歸玉秀峰前坐閒看晴雲自巻舒送汾陽高士歸三峰君深於易遇至人遂不食知逢三洞客曾指九丹方氣抱冰霜冷神含日月光閒軒同鶴静妙境入龜長它日南峯路相期過華陽送邢遁山人忽悔輕抛雲水來便將鶴去指林齋生涯琴劒外無物日逐醉吟中遣懷舊隱居常因夢到塵遊動是與心乖送君飜自嗟羇滯木葉脫時還計偕送趙先生家住崆峒塞垣上翩然遊蜀遂忘歸九還氣足通神化一日丹成是道機曽共靈龜波上隱又隨蒼雀火中飛只於醉裏藏身去休入紅塵作是非送珪師歸衡嶽師通禪律外外學二篇微師精大衍貌似寒山古身隨風葉飛瀟湘曽曉夢鴻鴈伴南歸七十三峯裏雲庵拂舊扉送僧南遊雪竇早出都門何往哉四明雪竇指崔嵬便從古道揚眉去莫到寳山空手囘乘月曉行松露濕迎風晩渡海濤來普賢樓閣知非逺邐迤南遊想善財贈韋不伐莫隨世偽作圓方坦坦無邪是履祥學鄙淺訛趨古道天教轗軻與剛腸俛投胯下人皆笑獨臥隆中自不常畢竟途窮無所合何妨持釣坐滄浪兖海孫學士寄示晝錦編述先徳宣公進退之美報之長句四韻奉揚盛事鄒魯衣冠古士鄉義方不獨有扶陽徳名垂世先君子經術傳家小太常閭巷共榮新晝錦吏民同愛舊甘棠前人彞鼎銘勲伐未似盈編盛事光贈趙先生此老得天樂自稱雲水人佯狂不妨道太息漫勞神沈醉少醒日與遊多逸民常憂忽不見無處訪清塵贈三茅朱先生鬱儀結鄰太霄道金璫玉珮虛皇冠鑪中火候煙霞煖壇上磬聲星斗寒紫節晨遊從玉女緑軿夜降接靈官願持璧紐充盟信乞取胎精九化丹玉泉觀贈髙道士古屋氣象冷蒼崖煙翠中龍歸半天雨虎嘯一巖風露後芝房紫霜餘栢實紅終期把藜杖來伴白雲翁贈郭誠思壯志本桑弧當年亦棄繻塵游謝京國火記得鄷都露氣凝瓊樹冰光澈玉壺世間出世法胎食即天厨贈趙抱一君隱居兩當石門後更深入紫栢山人迹絶矣石門路已絶塵寰紫柏髙深不可攀野客蒼茫連逺水暮雲慘澹裹寒山琹碁有徇皆為役松竹無情且共閒卉醴一盃時自釀陶然亦可發朱顔君童子時遇道士與一桃啗之遂不食嘉祐七年余領秦邀君至七十餘矣不食已六十餘年髪白面紅亦不甚異於常人云山中乏酒釀蜜飲之亦可醉道書謂蜜為卉醴贈青城山威儀觀李鍊師天倉三十六峰下猶有軒轅轍迹存丹竈前臨六時水芎田逺接九仙門九仙寳雲洞近後觀火芝夜照千燈迥江樹朝涵一氣渾道友相邀尋異藥􅂝笻幾到老人村贈終南李道人神仙靈藥自然功五色光中一氣通借問叅同相類法何如相類即叅同贈琅邪智先長老師臘八十六山路層層峻幽棲最上層凈光懸海月幻體任春冰四句有為法一心無盡燈我來忘所問相伴乆騰騰贈辰長老燕坐非持律遊方不學禪長空任飛鳥古澗自寒泉見月何須指追風不待鞭平生一破衲隨處伴閒眠贈崆峒天水公天下赤龍訣人間金液丹先生今已得此事古傳難陰徳留塵世仙階在廣寒舊聞三五一乞取畧開端送徐總半醉長呼意若何官情道味兩蹉跎眼前漸漸故人少世上紛紛新事多疎籟自鳴非節奏虛舟妄觸任風波悲歌深歎流年急常憶江南藍采和送杜山人山人山行見虎輒同路而行乂善嘯到不説來處去安知所之野雲同自在溪鳥與誰期虎伴閒行逺猿驚住嘯遲相逢聊一醉重見又何時宋屯田歸湖南舊學孫明復春秋助發微儒者孫復字明復撰春秋尊王發微君常預講論倦遊驚白首知已失緇衣故司徒陳恭公常薦君乞了朝雞去南隨社鷰歸衡湘多隱逸道侣未應稀笻杖贈凌生生有官不仕無妻子山居知獨處一杖代兒曹試水溪沙淺挑雲嶺路高訪僧歸有伴採藥逺忘勞它日蓬萊會應騎過海濤都官葉紓郎巾歸三衢宗邸横經授小侯跡同半隱乆沈浮却尋故國溪山路多謝朝堂鐘鼓樓冉冉年華成老態紛紛時事作閒愁一丘一壑平生志况有門人伴釣遊樂全集巻一
