body:
  text: 樂全集巻四宋張方平撰古風詩古興條牧始龔罰干戈茲濫觴以拯焚溺起謂副天人望君思彼伊吕胡為乎夏商商之興也伊摯在夏周之興也吕望在商順守信有道啟端乃無疆讀公羊傳四首齊桓合兵車召陵始服楚忿縁蕩舟起辭為包茅舉勤王豈其誠繼絶聊可與萌此挾君姦夷吾合膏斧晉之公室微六族相吞螫趙鞅率邑車志豈在君側封茲禍亂根留為姦雄迹呉楚因誅錯丕昭寧復辟季子治内難牙也王堤誅緩追逸慶父二子奚親疎探情異無將歸獄兹何辜減量自孟徳抽戈實公閭親親自禰率恩禮有等節雖云王父命天性何斯絶奈何彼衛輒父子相傾奪此而義可與人倫固隳㓕讀孫子二首渾渾十三篇兵謀與師律匠巧雖自心規矩寧可黜腐儒知舞干奔車暇擇虱腠理與骨髓所攻蓋異術伐謀自廟堂長城在樽俎下敵無智名服叛非蕭斧主尊而民安茲宜國之輔勿使有功臣功大將騎虎得請南臺偶書紫陽洞中客水晶宫裏人一念墮塵世資本猶天真擢質出流俗抗志凌蒼旻邈從逍遥遊浩與恬漠親風簫不受調溪鳥非所馴敢希古作者尚從諸逸民犬馬皆有養况我無天倫俛首遂干禄老先稱過秦流遁亡舊守趨鏘陪薦紳驕氣與矜色湛没四十春市合先縮手戰酣早收身桑榆近頽暮丘壑慙荒榛福兮禍所伏名者實之賔雖嗟負前志大觀亦同均贈姚白汝南平輿人平輿舊龍淵今復見鱗角隱景入虛無長吟振寥廓寧為嗜慾留當假風雷作我亦待扶摇徘徊伴黄雀幽薊行昔者帝堯光宅本都冀幽朔迺為寰内地舜肇十有二州此其一禹服周藩有年祀崆峒之英其人武氣含陰殺樂鉦鼓秦漢發吏守邊亭世與其民扞中土召伯功勤黒社傳昭王意氣金臺古我興北望涕交頤念汝幽薊之奇士兮今為勛華光耀照四海忍遂反衽偷生為吾民孰不願左袒汝其共取燕支歸槎客歌八月風髙星漢秋海邊閒客騎槎遊雲濤茫茫浩無涯槎頭忽觸斗柄斜囘㸔乃在織女家織女投梭顔如花客愚不知天上樂遽把一拳伴歸鵲問得嚴生應悔來重去何由尋得著東山吟我思古人兮有東晉太傅謝公者其庶幾英才乃是孔明輩風流更覺茂𢎞卑東山遊兮不歸妓􅂝手兮嬉嬉晚年拂劒兮一起為蒼生兮安國危笑言指揮兮八千師氐秦百萬兮潰而夷朝之君臣兮猶鷰巢於幕上公對枰兮解頤吁嗟公之車兮逢白鷄而遽止青山空兮已而偶興財利乃怨府功名為禍胎東市悔晚矣西鍾悲悠哉庖刀割腴味匠斧斬良材在埶勿偃蹇居易無低徊一瓢顔子巷孤竿嚴光臺盛德與髙風顥清無毁頽新定道中寄桐廬關太守三首辟書來北門召命自宣室朝廷搜英材溪山及野質當世良有心一得思造膝曙霞隱扶桑巳是長安日旦下烏石灘暮泊嚴陵瀨潺湲卧溪聲慘澹宿山靄所歴已陳迹不忘惟嘉話淚濕青雲篇撫襟慙慷慨關有詩相送云青雲篇送行詩也帆掛桐君山櫓入富春渚寒風蕩江波煙雨迷汀樹煮茶論藥經挑燈數碁路全勝謝惠連獨望新安去同行者蜀僧吉善醫茂材龔君美好奕謝守赴新安過富春渚有詩初赴新定過錢塘江颺帆上漁浦隨潮宿鴈灣烟火指富陽雲樹連蕭山曲岸蓼花疎清波鷗鳥閒江外信清曠吾心睢洛間酬歐陽舍人寄題醉翁亭詩我本髙陽徒野性葢踈拙豈堪天子傍命令裁機宻一麾出承明猿鳥遂超逸山州寂無事氣象頗蕭瑟閒尋琅邪溪雲嵐可披拂中路聞潺湲幽亭對崷崪鏘咽觸環珮清泠泛琴瑟知君多醉此歸鞍屢突兀醉中遣形骸題名亦信筆遺我溪風清蒼顔坐髣髴暝色失松竹徘徊望寒月攜酒頻來游行待山花發出京東歸招趙叅季子揣摩佩六印主父宦游食五鼎奈何君抱縱横才四方漂泊無人省我客在陳君逆旅秋霖淫滯宵燈永解裘命酒邀與談蕭蕭衢路驊騮騁是時泣血畧相弔我走汝南君入郢今者索然來上都陰懐一刺謀謁請深閎髙盖競豪權大浪長風獨萍梗龍待雲雷無一勺虎思林麓困窮穽壯心日覺春氷消素髪年來曉霜冷季子主父昔亦爾子叅今胡懷怲怲一為齊國無立錐一為洛陽無二頃我有弊廬濉之陽子叅良田枕清潁况是伊人高枕時明朝歸鞅同君整酬范思逺陰陽萬變始三畫天地大法都九疇斯文濫觴日増廣淳源已潰分千流舉而錯之為事業典誥始勛終乎周尼父將聖生無位一王遺法存春秋化成天下文之大豈事章句矜雕鎪道經戰國遂榛莽賴漢諸儒勤耘耰然其文物比三代高曽下視雲來幽唐時師匠多磊落昌黎把鉞為之酋姬公端冕明堂位八門四面羣小侯嗟時迦老駕異説吾儒路阻行無郵可憐韓子獨强介抗顔不為緇黄羞惟余碌碌謬庸者蓬頭風轉萍波浮出言疎闊觸忌諱倦遊四國無人收夫君家公世才傑士林嚮景稱英游是故落然來北海登門如到神仙洲貽詩旅人定交分所期者大將安酬爽如高秋望霽景壯如拔㦸逐挾輈兩敦六瑚見古器黄鍾大吕聞鳴球偉哉志趣規取逺古人之善今人仇直須擺脱忽迴視逺趨董賈為朋儔此心可以厚風俗此文可以揚天休誓將它日同利涉我為之楫君為舟贈邢山人思齊琴客夜凉風月静庭幽松檜陰羽人江外來為我開素琴上清通灝氣太古傳遺音逍遥得天和虛寂還真心更調三樂曲無惜一巵深胡然憂世患慨歎傷靈襟梁甫吟與任向秋風吹空一横掃秀桐芳蕙經宵老晨鷄驚起窮丈夫心骨凋殘感霜草獨起過君喜君在鸘裘同就旗亭解酒酣氣壮把袂歸吾曹心過中區大君不見豐城兩龍思延平氣凝愁紫牛間横神物際會當有時洛陽樓上逢張卿古人率自窮途起景略執畚南陽耕朝元引貽趙抱一星斗掛空碧鸞鶴翔紫清朝真弟子古壇上爐煙裊裊金磬聲露脚斜白寒不動千山岑寂横煙清絳闕太真冠簡静紫宫夫人璫珮鳴霞旌曉邁遺空谷石磴雲埋瑶草緑殘蟾冷帖西南隅迴首塵寰煙一簇有所思行有所思在斗墟之東華我欲從之路阻賒寸心坐馳天南涯彼美一人鶱且都明月環珮雲霞裾蹇于翔兮不我留登高杳視令人愁褰裳欲涉江湖修江湖修不可過不可過兮奈若何私自憐兮長嘯歌送柳澥下第出京少年心骨壯功名期力殉文邀馬卿評劒謁猿公問御良驥足逸胡為車三僨浮沈道所向窮達天之分跡從逍遥遊心與洪濛論姑佩湛盧歸休復較銛鈍送龔懋千里寒雪程平生旅人心丈夫雖四方行役愁不任禰刺弊生毛趙囊空無金餞子一罇酒送子垂楊陰寄贈姚白疇昔未識君汝南熟聲耀相隨相隨亦作隨計會上都一揖心相照愛君真快士顧我畧同調劇孟重然諾曼倩喜諧笑往簡日共評高樓常對釂君鋭如利劒騰拔已出鞘我獨䇿征驂舌在慵復掉歸養詠南陔丘園憶高蹈哭友人任向暮哭寢門外南望愁雲昬何言英邁氣奄成幽寂魂寒月長夜臺秋風黄蒿原十載金石心凄凉誰與言暮冬書事物色無容華朔風利如剪晨興心悵然惜此歲華晚自古東流波滔滔去無返計事須及時咄哉行自勉廣陵散廣陵散妙哉嵇公其㫖深誰知此是亡國音商聲慢大宫聲微强臣專命王室卑我聞仲達窺天禄人見飛鳥在晉屋子元廢芳昭殺髦常道鄉公終蕩覆義師三自廣陵起功皆不成竟夷戮廣陵散宣誅凌景誅儉文誅誕廣陵散晉室昌魏室亡滄浪曲五湖波浪涵秋空風煙蕭索愁溶溶棹扁舟兮長邁當年則有越相之范公烏喙不仁固可恨文種踟蹰亦巳庸功大不賞威震主不去必誅今古同周霍中曽殆如線黥韓竟不保其終誰能持此滄浪曲寄入三湘棹唱中過齊篇有叟羇窮垂白頭潜神宻理同天遊朝歌鼓刀既屠紂渭濵垂鈎來釣周晚遭西伯與同載首封東海荒營丘洋洋大風僅千祀當年固乃屠釣儔世變後有薛公文館中多坐倜儻人魯連節重輕丘山馮驩氣高微風雲丈夫志義絶流俗豈與屑屑雛䑕羣楚漢興亡事巳微後世傾奪奚足譏龍韜豹畧苦迂闊使公復生將安歸瑶池宴曲仙人仙在滄海湄雙毫出耳緑絲垂瑶池西赴白雲宴丹山逺借青鸞騎香雲紅淡春光染天風吹旌霞颭颭曉過扶桑水一泓下視中州塵九㸃蟠桃初熟甘露𤓰對持斗柄泛流霞妄向秋空舉金掌茂陵衰草令人嗟秋過琴臺懷古周道積衰禮義瓌夫子詠歌沂泗濵宓君不齊宰單父獨推深誠仁此民彈琹燕坐澹無事人不忍欺風化淳流光逝水二千年我税征鞍來盤桓滿屋清風氣象古繞臺宿楚霜華寒􅃡懐德音竟誰嗣揮酒灑空獨長歎安得長官盡愷悌編氓父子聊相歡渌水辭山翁貌清聳膝横古桐彈泛弄渌水曲滿絃流潺潺初調意緒㣲漫流動斜暉劃然響嘈嘈秋風駕怒濤數聲細更大澗泉咽復快曲終急以停驟雨齊無聲西壁月華白萬壑松風清灝然太古氣使人塵慮平山翁彈罷抱琹去歸處一峰煙翠横老將篇聖明天子仁且英海寰内外歸神靈辭客相夸鳯凰詔功臣不貌麒麟形繡旗塵巻霞紋闇古劒秋澁銅花青尚餘舊愛征西馬待從日仗登云亭讀高士傳天地閉不泰賢人隱山澤如何堯舜代箕潁有逸客消長存乎時出處惟所適箕子之明夷釣築亦潜迹乘桴海上逰採芝商中匿有道盍來儀經綸建皇極致君羲軒庭安民仁壽域豈必同蚯蚓蟠屈泥中食古意灝灝元氣淳茫茫太古迹文巧不勝煩發機自三畫盟詛復誥誓民心日澆弊蕩然返太初祖龍亦深意傾奪損生理世人多夭死誠哉象繫言乾坤有時毁詠松受命託厚地稟氣獨英妙有心出太虛無情合至道君子正容色烈士全節操自是萬木王何辱大夫號謝人贈玉界尺美玉琢溫潤界尺裁方直非惟立規矩亦以端簡册玉性比君子尺用同正人兼有盤盂戒冝為几席珍崑山初秋觀稼囘縣署與同寮及示姑蘇幕府邑民三萬家四邊湖海遶家家勤穡事市井商游少薦歲逢水沴飢勞何擾擾我來忝撫字見此心如搗去秋僅有年膏田尚停潦今幸風雨調皆話天時好春喜鵲巢低夏更蟬聲早吳民以此候旱潦饑穰焉秧船拏參差葑岸縈迴繚蓺挿暮更急車響轉清曉紡筥猶掛壁何暇張魚鳥我時行近郊小艇穿萍藻渚長葭薍深野沃􅛉稏倒孺子逺餉歸閒暇顔色飽預喜省敲笞租賦可時了歸來軒館静曠蕩盈懷抱衙退人吏散庭廡闃窈窈露篠映孤亭風荷動幽沼置身木鴈間茲焉願終老顛蹶走榮利况余拙非巧鱸膾飯紫芒鵝脂酒清醥紫芒鵝脂稻名悵然懷友生虛齋為誰掃臨池翫游魚曲池秋水平虛碧杳澄淨有鰋從何來鰋鮎也潜據乆已横鼓鬛作波浪晴景占蘋荇貪呑無遺鱗多折脩荷柄西軒因納凉遶歩恣哦詠時逢横水面氣意殊毫勁向非神守嚴雨霧尋飛迸不揆入江海且與蛟螭競暇日呼罟師搜摝窮泥濘潑刺出數尺怒跳何健輕狀醜足涎沫刀几嫌腥硬遣童放西澤不死儻知倖猶慮持私烹誡囑煩言令去去避鈎網再獲誰爾諍遂取羣小鮮投中使沿泳上游若浮空衆沈疑落穽隊行有孤出如嫡從諸媵忽散何所驚兩合成相迎銜尾既競速依蒲亦少定莊濠念逍遥嚴溪思隱行聊以貽後人持竿助閒興吳中暑雨澤國氣温濕暑候尤鬱蒸矧更並江海霖霪乆相仍沉陰不暫解雲霧常昬凝蛾蝶敗禾麥鰍鱣占田塍菌本出床脚蘚痕粘杖藤蝸蚓離竅竇伸縮殊自矜蛙黽聒晝夜耳慣猶愁憎漫水接河漢寧復分淄澠暑弱為寒冒陽㣲遭陰凌震雷寂不發凄風時暴興孰此宰四序令煩無威稜將由列缺惰何處閒曲肱飛廉獨掀撲公爾作陰朋共力起波浪勢且襄岡陵涉古考經説助陽義有憑古典救日法于社縈朱繩置麾伐五鼓消慝使勿勝庶幾災沴革幸獲年穀登幽齋牎戸闇懵瞀思不澄有如坐盎缶巾羃施層層疚心忝撫字搔首徒鬅鬙安得昬霾闢坐見白日昇東亭逐雀芳園夏景初茂樹成帷幄幽亭鮮人到羣雀宅簷桷飛集得所安朋噪聲何樂幸無彈弋虞復免鷹鸇捉入水時尚賒孶育日以數啄埸徒耗粟穿屋皆有角屬我厭歊蒸來居屏紛濁置榻開小窻當軒掛踈箔莫肯少畏避竟來鬭紛魄爭粒時聚喧奪栖或相搏誰命為嘉賔輕率可無怍古今注雀一名嘉賔主人不爾堪盡逐歸蓬藿桃源二客行劉郎阮郎丹籙客桃花源中有舊宅閒尋流水過碧溪忽聞雞犬見人跡瓊臺瑶榭知何所紫雲深處開珠户鶴駕龍軿綵仗來鸞歌鳯舞霞觴舉世縁未斷塵心狂苦厭仙家日月長洞門一閉怳如夢歸路古木何荒凉滄洲白鳥歌水為都雲為廬芙蓉帳青葢車霜裾雪襟素襜襦秋空清秋雨晴弋者不來漁翁去孤翹羣泳蘆花汀往來東浦何容與莫愛稻粱過西渚漁翁布羅滿葭下潜教媒子來呼汝罥絲漠漠不可見羽翰一掛脫不去汝掛羅媒子喜更笑汝愚落他計門有車馬客行崇軒華葢為誰子髙閣朱扉為誰第孟公君卿善請謁少叔王孫有權勢憑凌豪氣務相傾晩日署門復誰恚君不見隆中草廬客陽里蓆門居歛翼蓬蒿下蕭條意自如觸羅向稻粱肯隨黄口雛將軍三降顧真主六用謨豈由趨逐交遊得壯心自與功名俱平臺秋層臺複道盤盤斜馬頭冷光揺玉花曲葆翩翩映紅日綵旗苒苒舒晴霞鏗鐘考鼓臺上宴花間樓榭層層見香霧低濛爛不收觥籌隨酒東西轉山銜半日王未醉桂花蟾露滴濃翠鼕鼕滿板敲金丸千娥攅碧臺門閉古銅青澁對秋曉王樂不極將如老孟嘗墳上牧童歌千歲空臺長荒草土花愁碧古甬平陰夜鬼熒光擾擾黄鶴篇黄鶴飛來兮越滄海之無垠標格孤髙誰與羣風前清嘯欲命侣凝神翹立如含嚬鷹鸇獨矜觜爪利鷰雀止為腥羶馴扃籠猶負語言巧墮羽直為衣襟珍杳杳水雲上亦有網羅屯黄鶴飛去兮汝無戀此擾擾之塵寰冲丹霄兮凌紫煙行啄秀芝咽醴泉静棲琪樹金羽麗閒舞瑶池菊裳鮮鵷羣鳯侣乆相待休隨鷰雀陪鷹鸇胡生畫牛歌有儒落落何為者䇿驢曉到吾門下風標高古氣深淳詢之乃是陶唐民并汾形勝太行麓西距潼關大河曲春秋戰國漢晉史所書義勇雄俠士多出三晉與秦燕古云氣俗禀之然我顱儒冠腰博帶軀幹不如胷腑大曽遊兩河望王屋不到并州心不足喜君歴歴説其鄉引我心飛過太行因愛其鄉愛其人已重其人重其文文比玉溪既髙爽詩比玉川仍清新胡君不但歌詩好又工畫筆名精妙畫牛百年鼻不乾浙東獨有戴巡官胡君不肯居戴後自署名為畫牛叟忽攜兩幅教余看囘首故園心戀戀我家一㕓寄淮汭往曽親把枯犂尾月下歌商叩牛角雨裏尋春坐牛背長來提劒事羇遊虛名役我荒西疇見君畫得牛如活却憶煙蓑淮汭秋胡君胡君君賢者畫得信竒宜少畫勿令畫價聞於人掩君詩價兼文價勸酒行并引朱崖丁晉公初寒微嘗寓學睢陽廣順僧舍其詩版舊記咸在暇日一二友人就院置酒客有訴盃意若不快者為作勸酒歌云衆客醉歸盃席䦨有客不醉坐長嘆不醉長嘆客何苦請以眼前近事觀客見南遷丁晉公擁旄秉軸天禧中昔歲羇遊客此宇窮秋蕭索隨飛蓬漸達得意忘舊困手提國柄矜權雄矜權未足俄南竄青衫白髪窮衰翁向者枯榮試囘省何異春宵夢一終人事紛紜似飛絮鐘漏聲中朝復暮且脫鸘裘換酒來與子相從醉鄉去思逺辭露下蟬不鳴愴然覺秋暮獨立夕陽樓遥見南征路動乖心所期事與年同去彈鋏歌歸來愁思發宵寤高吟惠連詩重憶安仁賦佳人何當還荆陽歎流寓歲除世事隨波濤流光逐魁杓二年革新舊一夕連昬朝容華益凋歇况味殊蕭條信似唐生語躍馬期非遥姑蘇蔣公北池詩并序景祐四年秋七月上命天官蔣公堂自會稽來守姑蘇公之徳望風聲在人有素故始受命而吏民迎服下車而四封坐清凡理越未期而遷吳理吳纔百日而被召公之守二郡雖不得乆于事至於杠梁道涂亭館觀游莫不畢葺是雖小者亦以見公之敏於政而精慮之無不至也府署之陰有廢池圯亭濬之新之曠然為清逺之景蕭然有林野之趣姑蘇版圗户逾十萬郡當衝會為津為岐而日攜嘉賔清談池上又以知公之理其多暇也士君子嘗預游者皆聲詩以美之不敏亦䝉授簡因得敘公吳越之政以備南國之風焉詩曰浙江湯湯南國之紀句章之鄉居巢之里天子命公二邦更治越人之嗟吳人之喜公之為政簡而易從不嚴而威敏以有功孽不及牙姦折其緒孰施斧斤不見鋩露老稚晏起壯服于畝椸有澣衣廥有多稌公之退公樂是北池飛閣渠渠虛廊遲遲魚跳于藻渚有鳬鷖釣亭檜島其水漣漪公之退公以豫以游邦人喜公尚無疾憂邦人祝公百禄是遒匪公其私王家之休我思建官公理衆政與民最親惟時守令其有不臧根心之螟小猶蟣蝨膚皮是營於鑠有宋一統萬方千里所付幾人曰良凡領王民守土之吏有理如吳帝道則粹我歌北池爰頌公徳以告後人勿汙勿塞睢陽雙忠廟詩并序睢陽雙廟者有唐忠義之臣張巡許逺之祠也禄山之覆兩京賊將尹子竒東略地睢陽當其衝二公保之且二年孤城無援以没宋人以公之義廟食之因以其同時立功者賈賁姚誾南霽雲配享俗亦謂五公廟予讀唐書忠義傳唯張許得載而敘功狀甚畧韓吏部書張巡傳後為詳按許逺為睢陽太守張公以雍丘之衆依逺并力而逺推誠納巡而處其下壯士之節於逺殊為難巡雖功高非逺不立睢陽吾里也嘗暇日步廟廷覩唐來諸公文廟者數篇咸以巡為主愚為逺不快因作是詩以補唐風烈士趨死易黜巳下人難况乃持柄位而當功名間天寳唐中圯大盜起幽薊伐鼓傾中州意有摧枯易桓桓許公逺持節睢陽郡孤壘扼賊衝攻急勢危窘張公何壯哉雍丘以衆來誓將同忠義分持虜羮杯慷慨二丈夫感諾明悲吁對舉兩手起力與扶中區空郊乘垝垣賊鋒四周攅萬夫齊一心就死無悔顔夫豈威令使化公心如丹兵盡糧餉絶重圍氣逾烈龍枯無一勺虎騰墜竆穴帳下萬金士霽雲特雄傑乞師賀蘭府嚙指如枯蘖七日哭秦庭何謝楚臣節隣藩救不來呱呱守埤哀天胡不我弔竟使孤城摧沈痛數忠良委骨鯨與豺王師遂破賊天王歸京國持乆全江淮實由二公力遺烈在宋人食公河之津我聞唐天子命逺守宋民張公何為者單車投逺舍開門授之柄引已出其下張公仁且英節義無與程但初無睢陽此功將安成顧豈沮大節而下張公名意欲覺後來知人為賢明閒居述懷踈慵余本性放曠涵天真自疑姑射來藐然太古淳思與老彭游坐閱冥靈春世家守儒業此志成越秦蹭蹬湛世偽遂與英俊羣闊步處清禁迎班趨紫宸高議預時事客氣矜要津薪火不停焰風波浩亡垠釋筈前無的將車後多塵履地弗敢蹐仰屋徒含顰兼濟悼遲暮獨善慙隱淪瀝懇得嘉命閒曹容病身性以浄為體慵乃徳之純融師善知識牛頭謂之懶融中散誠仁隣首慵廢冠弁腰慵捐佩紳手慵如槁枝足慵若竒輪耳目遺聲色鼻舌忘馨辛内樂極委順中扄收精神大觀齊諸物萬化同一均禍兮福所倚名與身孰親何須入林壑自是逍遥人酬琅邪山僧智先相示禪册種種諸法皆心生心自無生豈有法祖師來意我不知昨夜秋風掃黄葉遊九老祠堂閱古碑舊記字多訛闕詢諸故老靈跡甚異因成長句以誌其事黄裘紗帽霜眉白九老相擕意氣同碧水宫中初邂逅黄金殿裏乆從容苦催歸路憎驪毋留賞名園喜葛公為問家鄉還逺近迢迢七十七程中寓意詠月贈李先生二八已微闕十四猶未圓盛滿在三五素蛾逞嬋娟兩半陰陽合平分上下弦臼中有靈藥一粒九光全樂全集巻四
