body:
  text: 樂全集卷二十九宋張方平撰表狀許終喪制詔勅某省所三上表并劄子乞免起復恩命事具悉朕之疇咨四維之輔首用擢卿以陪幹王室未及庭謝以鉅創釋位而去俾朕歉然思欲以墨縗起卿於苴麻之次累辭痛切諭之而彌固記有之君子不奪喪朕奚敢違禮必欲奪人之憂乎夫喪致乎哀而止無所過毁以傷性也廟堂之論猶將待卿以參擇焉依所乞許終喪制故茲詔示想宜知悉春暄卿比平安好遣書指不多及謝許終喪表今月十五日進奏院逓到詔書一道伏䝉聖恩以臣上表辭免起復特許終喪者哀懇怔忪數塵於睿覽俞音軫惻許畢於喪期追成命之已行遂私恩之罔極微誠既達餘息再生中謝伏念臣起自單微乆塵通顯國之厚禄早伸反哺之懐朝有榮階實荷流根之澤仰繄仁治獲報義方向繇疎薄之材上被聖神之選捧承綸命及見庭闈雖迫隙光備䝉贈典惟是稱情之制斯為致孝之終方伏堊廬遽聞詔檢輒稽留於嚴㫖屢披瀝於血誠孰云在隂之微亦有聞天之感俯囘英聴垂亮孤衷許循致治之常以盡免懐之慕丁寧細札徇人欲以矜從荒疚餘生戴天恩而殞絶此蓋皇帝陛下逺存古道下厚時風本盛徳以興仁擴寳慈之惻隠章明大義沛發温俞謂墨絰之非經著素冠之得禮賜周存没施厚生成草芥寸心亦抱太陽之炤潢汙一勺期歸滄海之深畢命王家敢有遺力免俸劄子臣今月二十一日得應天府送到中書劄子一道奉聖㫖特令依見任參知政事請俸減半支給者臣聞以庸制禄自古為國之大經也設官分職量其功勤而賦之禄未有安坐而享之者臣執喪在廬無所事事承此恩㫖義何可當况近時將相重位居喪而䝉恩給俸者辭免皆得請臣今所授中書劄子不敢捧承已封繳納中書第二劄子臣今月五日得應天府送到中書劄子一道以臣昨奉聖恩特令依見任參知政事請俸减半支給具劄子辭免奉聖㫖所乞不允者切以先王立制為邦大經位所以待才禄所以報功國之操柄於是乎在若其憂服之中巳致官職之事而乃叨冒重恩䝉享厚禄内於情而不稱外於義而有傷雖甚鄙庸敢辱名教伏望天慈許循近例特從停寢少安愧懼免知陳州降詔不允謝表今月一日進奏院逓到詔書一道以臣免知陳州不允者攝職閒司分從於病廢領麾便郡復被於詔除中謝伏念臣立節無竒文少近野為學荒略曾弗究於一家賦性闊疎顧靡堪於諸闕荐更臺閣之要乆依户牖之嚴上荷清衷俯知素守有愧珪璋之特迺䝉藻黻之華海鳥暫馴虚設太牢之饗風簫忽過豈諧雅奏之和尋外補於輔藩遂引歸於舊里冀安末節遂以窮年且隣解紱之期忽被遺簪之訪此蓋皇帝陛下乾坤均施曜魄並明謂嘗奉於清寧知頗由於忠厚綸音存録璽札敦行君命臣承敢忘於祇率政平訟理但愧於循良向日傾心望雲馳戀陳州謝上表奉勅差知陳州軍州事已於今月二十二日到任上訖太皥之虚蓋自上皇之世有媯之後爰聞盛徳之封氣俗敦淳土宜博厚日畿神甸先承首善之流耆望宿勲茲迺均勞之地中謝伏念臣乆叨近列無所取材向出守於是邦實祗聞於面命俄嬰病恙遂解麾符司憲陪都粗安於拙分于蕃近輔愧荷於明恩此蓋皇帝陛下圓覆無私大明委照有守者則錫之福可器者必盡其工顧惟孤陋之微亦荷記存之及敢不上膺簡亮自力衰疲更礪鈆刀聊施於一割所憂駑乗難効於長驅進退怔忪罔知攸措辭免宣徽使劄子熈寧七年十二月臣伏䝉聖恩除宣徽北院使檢校太保判應天府宣徽近司地聨二府名器之重禮秩至崇臣才望非髙器識殊陋恭聞明命不任戰越朝廷舊制自前任二府臣僚改宣徽使皆由寄任除授故於物議為允臣職叨祕殿位列六官祇膺渥典雖有前例但以昨由輔郡移守陪都本為便私又居近地異寄任之重非宣力之處虚冒榮禄誠為僥倖况臣昨求朝覲獲至京闕止望一登文陛仰對清光以上謝於眷懐敢切希於晉寵天明下燭宸造曲成特降綸言俾叅近綴在臣自量豈遑安處敢陳丹懇冒黷淵聰伏冀聖明俯垂察諒特回制命以全愚守辭兔宣徽使欲乞近京一郡劄子臣伏䝉聖恩乆奉朝請今幸遇同天節稱慶禮畢敢瀝懇誠上干天聴切以宣徽近司地重而無責非國重戚而以恩澤加優者未嘗徒處也臣向因移任過京覲對猥承寵命遂留供職素餐充位豈所遑寧欲乞近京一郡稍便鄉閭粗安素守伏望聖慈特垂察允辭免中太一宫使劄子臣承閤門告報已降勅命差充中太一宫使臣近以奉朝請備位而無所事故乞一郡以安愚分伏䝉聖慈更加重職愧尸素而有請被恩典而愈優虚冒寵光無施報稱切自省循豈遑寧處所降勅命不敢祗受伏望據前所陳乞特賜施行謝除中太一宫使表伏奉勅命差充中太一宫使已赴本宫管勾訖十精天之貴神肇開靖館五鎮國之命祀舊啓靈祠崇奉式嚴典司為重謬充使職上出宸恩中謝伏念臣仕適逢時材非濟務智用同乎綆短不可以汲深切實譬之拔揚無得而成大昨領别都之鑰許覲中天之廷祗荷明恩俾陞近綴既乆陪於朝著輒干請於郡章復膺温檢之榮兼領殊庭之重披誠封奏申錫詔音嘉命是承危悰增惕此蓋皇帝陛下惠深涵養仁浹施生猥加體貌之隆奚取典刑之舊衰癃之質極蒲栁之望秋云補之心猶螢燭之嚮日念言謝事近在踰年敢希止足之風庶免婆娑之事實惟素志敢昧大明免中太一宫使乞外任劄子臣竊惟人臣立朝出處固有常分苟失其節必貽悔咎人君之所以厚遇其下非但優之以禄位而已亦在察其志之所存使處得其所斯可以為厚矣臣早際聖明特䝉察舉採諸羣議之外擢於執政之末罷而外補優以閒曹甫及二年復除便郡每垂記録皆出淵衷昨自陳州就移應天府自念衰晚前迫引年若便道以之官望清光而無日故因過闕請來朝見止一謝以眷懐敢切希於寵利本期旬浹即望辭行陛下特軫慈衷俯矜舊物發於中㫖處之近司曲示敦留俾奉朝請日趨嚴陛俄僅半年昨逢誕慶之辰已畢奉觴之禮故求一郡冀安素守今䝉聖恩更加宫使名秩增重優幸尤多今陛下厲精庶政自朝至於日中昃不遑暇食中外事無大小靡不經於神慮觀游娛宴未嘗留情輔臣百司莫不夙夜豈容浮冗獨無所事于其間以一介孤逺之蹤席貴戚恩澤之地取譏清議上累公朝是敢䖍瀝懇誠仰塵聰聴欲祈近南京一郡退養衰疲則是宸造曲成慈眷尤厚始終保全實繄洪覆冒凟天威仰祈察允辭免判永興軍劄子臣自忝近司奉朝供職日趨嚴陛俄僅半年昨逢誕慶之辰已畢奉觴之禮故求補外退安素守數傾情懇未奉俞音今承差知永興軍須至復有干黷伏以永興大藩寄委為重但臣行將七十筋力殫疲目昏耳鳴精神内竭比及謝事纔餘半年今去鄉閭程途頗逺虚煩吏民迎新送故伏冀聖慈檢㑹臣前奏乞改京東一郡顧茲衰暮得近松楸致仕之日歸田為便敢冀慈衷垂憫宸造曲成保全之恩終始大幸上冒天威仰祈察允陳乞外任劄子臣早遇聖明特承眷奬昨因朝覲處之近職仰依洪覆實為優幸然臣年齒遲暮志氣衰索資本疎拙無所取材處則莫施補報之勤出則不堪煩重之寄而一介之守粗安常分上不敢為詭潔之操下不敢為貪冒之行故求徐兖一郡所冀漸就田廬荐瀝懇誠未䝉察允伏望天慈俯矜愚朴特推保息之仁獲遂首丘之願干黷聰聴臣無任哀祈激切之至再陳乞外任劄子臣陳乞外任方在私第俟命伏䝉聖恩宣召令奉朝供職臣不避嚴誅須至再陳誠懇念臣齒髪遲暮志氣衰索累求一郡退安拙守干黷天聴未䝉委照雖進退之禮慈衷曲示於眷懐而出處之方愚臣宜有以自處伏望聖明俯加矜察特允前乞以畢私幸臣無任祈天俟命戰越激切之至乞致仕第一表臣聞事君主於無隱誠必自通陳力至於不能勢宜知止輒露引年之懇仰干從欲之仁中謝伏念臣親際盛明早塵華顯文章不足以潤色才業有愧於經綸歴事三朝殆通四紀内之清塗嚴闥極侍從之榮外之名城大都徧藩守之選乏嘉猷以告於后無膏澤以下於民徒以朴忠愚直之心資不能改至於利害得失之際初不自謀縁茲過被於聖知嘗亦與聞於國論士儒至此幸遇已多比奉對於清問每自陳於衰拙莫保留宫之鑰坐安喬木之邦惟饕顧良時忽焉而如失年齡浸邁疾疹交乘神明潰虚難支於外慮筋骸摧苶頓異於前時榮敢尚貪福知已過非獨招滿盈之禍懼將累覆燾之恩迫此憂危期於引謝伏望皇帝陛下曲矜舊物深燭至誠貸其無補於涓塵哀此已疲之犬馬許上還於冠紱俾退養於丘園順服生經儻保完於餘喘願陪鄉老永歌誦於太平上以成君父始終之仁下以全臣子進退之節伏乞聖慈特許臣致仕詔勅某省所上表陳乞致仕事具悉中外老成朝廷倚而為重始終厚遇人臣去不可輕卿寵光進躐於疑丞禮貌兼隆於徳齒比擇留都之優近仍從故里之便安胡亟上於封章顧請還於印紱徒事括沖之舉殊違眷異之懐所乞宜不允故茲詔示想宜知悉秋冷卿比平安好遣書指不多及第二表近者輒具奏封乞從致仕伏承温詔未賜俞音懼汗莫勝危誠難止中謝伏念臣材資極陋身世至孤幸縁明主之知簡拔衆人之上功勤何有禄位過盈雖存王室之心死然後已而徇公家之事耄矣無能尚被優容復叨居守厲衰殘而矍鑠不免曠官懐寵遇而留連又將滿嵗災釁時作罷癃日增念治世之難遭抑重恩之未報迫茲頽朽無以勉彊况今時不乏人人得其所自惟進退何繫重輕捧細札之丁寧益孤衷之感涕朝經所著惟禮分之有常天聴蓋髙冀精神之可徹伏惟皇帝陛下天無私覆物遂其生俯推保息之慈特軫矜從之造幸全拙守俾佚餘年既以免鐘鳴不止之譏又以脱器滿則傾之禍咏陶樂聖恬莫終身雖在林丘之微不忘君父之賜詔勅某省所再上表陳乞致仕事具悉卿歴事三朝嘗更二府頃授宣猷之秩往司居守之權方委才明坐分憂寄忽屢陳於封奏祈上致於官榮曰老而傳雖耆年之常制若不得謝亦禮典之舊章宜體悉於眷懐勿堅求於沖退所乞宜不允故茲詔示想宜知悉冬寒卿比平安好遣書指不多及第三表伏奉詔勅以臣近上第二表陳乞致仕所請不允者恩由特㫖禮過舊章恭被訓詞倍深感愧在念舊之仁既厚顧籲天之願未從敢瀝肺膺再干黈纊中謝伏念臣蚤縁一介獲事三朝濫沐恩榮祗縁幸遇積嵗時而徒乆曾報稱之蔑聞比陪近綴之嚴每慮素餐之誚間因燕見屢嘗懇激於引年䖍奉德音乃復逡巡而就次出司留鑰又浹嵗筩桑榆之光徒引髙年之望犬馬之力豈堪長路之馳雖復勉强良難振起故傾丹悃以乞殘骸敢謂聖度寛大而曲容拙疎天眷惻怛而尚加撫遇切念事君之禮雖以承命而為恭然其陳力有期至於不能而則止冀念微守仰答深仁謹復盡辭庶希得謝伏望皇帝陛下廓日月之照而幽無不燭推天地之造而物皆遂生許上麾符俾安田里黄髪兒齒退從鄉社之游文陛赤墀徒望天衢之逺逶迤末路誦咏昌辰茲惟君父之慈豈特丘山之重詔勅某省所三上表陳乞致仕事具悉卿位居法從歴年滋多職踐政途宣力尤至比從近列出領别都方資鎮靜之才坐委居留之任奚屢陳於封奏祈自解於事權朕注懐老成優眷舊徳宜體待賢之禮少捐知止之懐勉安爾官無咈予命所乞宜不允故茲詔示想宜知悉冬寒卿比平安好遣書指不多及乞致仕劄子臣昨者上章陳乞致仕伏䝉聖恩降賜詔書不允固合上禀徳音姑安分守然義不獲已理難苟安臣自念荒疎乆塵近列犬馬之年七十有一本期過同天節方伸前請涉春以來舊所患眼疾頻發昏痛至於簽押案牘披覽詞訟每委僚佐一面發遣事屬妨闕切不自遑而又心氣虚煩動多遺忘深惟此疾非旦夕可愈雖欲勉强難以遷延仰祈天慈俯垂矜念前未得謝已為恩禮之隆今復自陳可諒懇誠之至伏乞朝廷檢㑹前後奏請特許致仕上荷大君之徳下從鄉老之游樂聖安時以全素履乞致仕第二劄子臣近奏乞致仕准中書劄子奉聖㫖所乞不允臣資憃愚然切嘗聞事君之道矣蓋君猶天也天可欺歟人之悖徳敢於欺天而後忍於欺君也臣雖不令不敢以忠信自期然一介之守亦粗有所存矣當有聞於天聴敢不以誠者哉臣自熈寧三年赴任陳州於路得疾面目偏急後醫治雖痊損然終不復舊至今語謇澁心多悸易忘時昏眩故向者在朝因對屢常面求謝退夫隆名重禄是人之所欲臣非事詭激獨異於人蓋自度不任恐無益於國以上累於聖知此實深情所在自到南京又一年半精力寖衰惟自知覺加之目痛心氣虛煩其於公事實多妨闕以臣素好道養故外若可觀然實無功效譬之土木偶其中朽矣故事曾處近司而乞致仕者章再上而得請臣已四請而不允天恩可謂隆厚矣今者不避誅殛復上干於宸扆言出肝鬲非有飾辭游説大明在上無幽不燭覆育之下生物咸遂况臣孤拙夙被慈眷今茲微懇可無感徹伏乞特開恩㫖許令致仕仰冀曲成之賜俾䝉保息之仁荷天之休以終暮齒辭免東太一宫使劄子臣伏奉勅命就差充東太一宫使許以南京居住者臣昨乞致仕累黷天威今䝉聖恩更授宫使列在近班處之真館上承渥眷以感以懼然於愚衷有不安者又須再披誠懇仰冒宸聰臣猶自以為煩然於義不獲巳切惟陛下勵精庶政惟日孜孜臨聴至於中昃程書逮乎乙夜弼臣近司陟降勤恪百工羣吏各有官責臣在朝無補於國何勞自以年齒衰暮氣力疲乏故乞殘體以避能者天髙聴卑得請為幸今乃以重職而家居享厚禄而閒佚臣竊安此物議謂何伏望陛下正王制名實之體成臣子進退之宜特許致仕是臣本志儻過辱優禮未容謝退乞特還舊秩領一閒曹雖媿備員之冗庶寛浮食之慙上足以昭示恩慈下可以少安分守仰依天日得引嵗華覆照之下實獲容處謝東太一宫使表昨者陳乞致仕伏承勅命就差充東太一宫使許於南京居住尋再伸前懇或乞還舊官今奉詔書不允者欲致為臣蓋衰齡之所迫恩不得謝尚舊物之未遺止解鑰於留宫猶備員於真館忝冒滋甚兢悸靡遑中謝伏念臣本自寒生曾微逺用雖薄聞於大道亦粗守於孤忠其實憃愚誤被三朝之所奬至於報効殆無一事之可言惟寵利人情之所懐惟聖明仕者之難遇自念支離之乆且多饕冒之慙亷恥之思豈獨畏清議而巳滿盈之戒實亦有私意在焉屢剡悃誠決期引謝天慈過厚鄙志莫伸尚聮徽省之班仍玷殊庭之職官責之所不及人事之所至安衆共稱榮臣實知懼念籲天之屢凟姑就次以為恭俯仰深惟捐糜曷稱此蓋皇帝陛下道周謨典化格範圍取人以身盡物之性九徳以之咸施四維於焉並育臣敢不歌福禄以崇君親因榮幸以循名節庶完終始無累生成再陳乞致仕表七十致仕禮有常經再三上言情非虚飾中謝伏念臣早塵顯仕才本空疎荐歴要途事無稱紀幸遘寳圖之肇啓預聞玉几之道揚首承日月之光先沾河海之潤特䝉褒舉迥出等夷虚被寵靈訖微報稱乆從外補遂迫頽齡致章紱以上還丐筋骸而歸盡陛下矜憐庸朽寛屈典常加使領於祠宫俾便安於鄉社臣感戀徳澤難以固辭留連衰遲體此深養坐糜厚禄行復二年誠恐一朝溝壑之虞遂成終身負乘之恥逮茲未耄得以自陳伏惟皇帝陛下天施無私父慈均篤出處之際既曲盡於恩榮進退之間得粗全於名節屏伏閭里詠歌聖時行葦無牛羊之憂蒲栁免風霜之患嚮用五福式彰皇極之隆國有四維少穆民風之厚詔省所上表陳乞致仕事具悉卿國之耆艾時資典刑内領祠宫外居里閈不嬰以事固足養安乃復抗章遂求解組徒欲遺於榮禄良未協於眷懐雖知懇誠難徇來請所乞宜不允故茲詔示想宜知悉夏熱卿比平安好遣書指不多及第二表近上表乞致仕䝉聖恩降詔不允者切以大君保息之慈人之老者疾者得所養治國經常之制士之進者退者惟其宜不堪陳力之勞爰上乞骸之請詔函下降天㫖未俞中謝臣聞委質大方前經明訓自古不得謝者在禮雖或有之然皆徳業髙賢功勲夙望邦家倚以為重中外賴之為安加恩所以特優被寵誠為無愧是以義全大體衆罔間言如臣徒以空疎早䝉簡擢事猷弗逮報稱蔑施遽及衰疲遂求引罷而更濫當渥命遥領真祠位陪執政之班禄倍大夫之秩職優靡預官責不加上紊彞章俯慙私倖敢循舊典謹復自陳伏惟皇帝陛下一氣均私大圓丕冒匹夫自盡各伸所志之微萬物由庚皆受曲成之賜俯諒䖍勤之懇特垂開可之恩精騖紫宸猶結望雲之戀迹還白社終懐樂聖之心詔省所再上表陳乞致仕事具悉卿逢時特起歴事三朝直諒多聞可謂成徳比縁請外勉徇均勞旋解宫符遥涖祠館優游鄉社幾同佚老之歸輔養天和何待潔身而去累章來上殊怫予聞姑體眷懐務安厥位所乞宜不允故茲詔示想宜知悉夏熱卿比平安好遣書指不多及第三表臣昨再上表乞致仕伏䝉聖慈降賜詔書不允者章達御前至誠上徹恩加望外再請未從顧惟衰朽之年乆切優安之地祇膺異數益不遑寧中謝臣聞事君之方本取精神之用行已之義當思名節之存壯而不勉則非忠老而不歸則忘恥今臣心力日耗耳目加昏謝事之期已逾三嵗瞻天瀝懇蓋亦累年且士之立朝古有垂訓四十曰强而仕七十曰老而傳非異稟之粹靈必同倫於荒耄坐糜重禄虛占近班偃息在床優游卒嵗進退非據俯仰厚顏衆將謂何没有遺恨伏惟皇帝陛下金玉百度紀綱四方元首股肱既熙萬事奔走先後各効所長在臣去留奚繫輕重蓋年及而引去人臣謂之令終禮得而許歸人君所以加惠仰希慈造濬發俞音國制坦明式遂區區之分王道正直益恢蕩蕩之風生成亭育之仁始卒保全之賜撫心殞咽之死靡它致仕告詞勅凢内外羣工許其謝事而去者咸進秩一等是於優賢佚老之義亦無所缺矣至耆艾大臣有顯勞成徳而朕之所禮重則非殊恩異數不足以稱朕意又可以常比言乎宣徽南院使光禄大夫檢校太傅上柱國清河郡開國公食邑五千八百户食實封一千三百户張某宿有重望歴服近班頃在先朝職守禁從屬英考以朕為儲副而親聆徳音實視詔草自解政柄乆從便安而數奏引年懇上印紱乃命舊使於東宫二品就第對此光渥永介壽祺可特授依前檢校太傅太子少師充宣徽南院使致仕散官勲封食實封如故仍放朝謝謝致仕表今月二十三日左班殿直郭安仁齎賜勅告各一道伏奉聖㤙授臣太子少師依舊宣徽南院使致仕者引年謝事錫命自天以徽省之近司加儲闈之崇品祇承詔檢榮觀綸綍之辭知自宸衷曲被寵光之渥䝉恩至厚震魄無容中謝伏念臣器慮迂疎材資淺薄踐揚通顯叨逾四紀之長陟降光明忝覩三朝之盛聖神纘御邦國惟新屬當訪落之辰濫預其難之舉遽罹家釁越去朝班因違户牖之嚴荐易寰畿之守遂嬰犬馬之疾寖迫桑榆之期上列奏封蓋謹循於禮典俯頒細札爰深示於眷懐特授祠宫俾安鄉社又仍嵗律當復自陳祇荷天慈獲從私志臣子再三之黷顧不容誅君父覆載之恩孰與為大此蓋皇帝陛下至慈鞠育大徳生成始終為之保全進退免其咎悔簪履敝物猶矜惻於棄遺名器至公用顯章於優異但今嗟於衰暮訖莫報於鴻私共戴一天均在照臨之下同居萬彚豈離造化之中免宣徽使表今月十五日進奏院逓到告一道伏䝉聖恩授臣宣徽南院使檢校太傅依前太子太保致仕降命自天恍日星之下燭跼身無地凜淵谷而若驚恩出殊常義難虚受中謝伏念臣器資本薄材用無長時幸遘於昌辰仕早塵於近綴荐揚中外曾罔著於事功孤立朝廷實粗循於分守頃引年而得謝蓋倦飛而知還退處田廬遂經嵗籥仰聖神之並化揭日月以合明豈期綸綍之光忽及衡茅之下徊徨自失愧惕交懐此蓋皇帝陛下大徳施生至仁丕冒播九功而惟叙致萬物於由儀一氣發春槁木成於萌蘖大雲布雨涸澤接於潢汙顧茲耄殘亦霑亭育然再念臣名除班籍跡逺闕廷事匪遑寧理當自列慈衷圖舊迺聖王之所行小節不踰亦匹夫之為諒曲頒寵渥曷敢欽承伏冀寢停庶安微陋第二表伏䝉降到詔勅一道以臣辭免恩命不允者天鑒蓋高微誠未徹王言作命諄誨如聞夫何疎外之蹤亦預僉俞之議數斯上黷但積戰兢中謝伏以宣徽兩院之名厠於執政二府之重職業無實班秩甚崇中間廢停蓋縁官制今茲復置以待賢勞豈謂龍光遽加散冗惟朝恩之誤及豈愚分之所堪此蓋皇帝陛下百度允脩九徳咸事大中之福用敷錫於庶民不宰之功以曲成於萬物如臣者忝塵最乆倖㑹居多及茲大耋之年安然泰寧之世纎埃無補於國一毫罔迨於民敢於草莽之中自稱簪履之舊乃今瀝懇而有請猶是為身而圖全仰冀髙明特垂矜察典刑大法不虧立政之方名器至公免累假人之慎特回寵渥昭示邦彞第三表伏䝉聖慈以臣辭免恩命再降詔書不允臣聞慎出令者邦國之憲章知守節者士人之義分難避聰明之黷瀝陳肝膽之誠中謝切以舊置宣猷秩均近輔比還使職蓋待材勞詔㫖經年除書未再而臣頃縁衰耄乆逺朝班退伏田廬寖更嵗歴無功徳於平日徒安樂於聖時退省其私中切自幸深懼滿盈之戒粗安止足之懐豈渝率履之常上致假人之義伏望皇帝陛下天光下燭人欲不違察其孤衷矜其微志特頒眷㫖囘復誤恩使臣保犬馬之餘年全桑榆之頽景考終厥命無愧於心則日月之輝天地之施生成之賜淪骨闕免宣徽使劄子臣伏奉詔書以臣三上表辭免恩命不允仍斷來章臣切以先王建官分職所以延俊乂崇名重秩所以旌勞能此乃治世之具立國之基幹也本朝宣徽使無所任於事為待材用之宅中縁官制而罷既而復還其任蓋廟堂之議事存本末臣既退老多年雖曾經此職今則非復任用之人寵渥忽及自度虚受無名屢黷聖聽不敢承命三代之盛王未有遺年者歴世明君優恤耆艾以為令典恭惟二聖德義出於此然人臣之節一介之守區區孤陋亦有所志今夫聖王之事陛下既已行一介區區之守臣亦願終其履踐焉敢妄意苟得以干物論伏望天日髙明特垂降鑒庶於朝廷大公之體粗有補於涓埃謝免除宣徽使表伏奉詔書以臣上劄子辭免恩命特䝉聖慈允所請者切以惟皇建極置器以安恩福以發其光榮憲度以成其嚴重必使人而知分實為國之大經故得俊民用章百揆時叙中謝伏念臣委質四朝之盛及今大耋之年罔著事功靡一毫而報上偶逃罪惡幸無忝於所生退處田廬倐逾嵗紀豈意桑榆之末忽承天日之光命出殊常魂驚失措力陳微懇實内激於肺肝仰冒明威蓋自甘於斧鉞伏惟皇帝陛下至誠成物大德得人徳義之興本出民風之厚典刑所載良資王道之平豈惟孤陋之身可當謨訓之美授太子太保謝表伏奉今月某日告命授臣太子太保者成命巳行義難辭避無功虚受愧益面顔中謝伏念臣早依日月之光退迫桑榆之景杜門屏迹已安灰槁之餘送往事居無復分毫之効敢期新寵例及陳人此蓋伏遇皇帝陛下哲命初基舊章畢舉嘉與羣賢之共治聿追列聖之貽謀雖零雨時風無所揀擇於物而枯草腐木難報生成之恩又伏奉今月某日告命授臣太子太保者渙汗所均一新中外逓遷之澤例及衰殘中謝伏念臣歴事累朝叨塵二府少壯之日已不逮於衆人艱難之時又退安於末路有何功績冒此寵榮此蓋伏遇太皇太后陛下美化財成至仁涵育荷宗廟之重託極神人之歡心大覃曠世之恩求助嗣王之徳而臣老病所迫報効無時惟當教忠於子孫庶幾無負於天地遺表臣聞生也有涯况叨䝉之過分死之將至猶感戀於存懐輒鳴臨絶之音仰黷蓋髙之聴中謝伏念臣立身孤介遭世休明早習藝文自託聖人之道粗持為守以近天子之光塵忝髙華踐揚中外雖其經國之逺業無稱於時至於事君之大方敢愆於義鐘漏向盡田廬有安惟大期之既窮念鴻私之難報伏惟皇帝陛下體均洪覆神凝太清尊若北辰乗璣衡而不動安如厚地容河海以成深時萬斯年如一之日自惟殘迫方永謝於明時獨此丹誠豈可埋於幽壤免南郊陪祠表伏奉詔勅令發來赴闕南郊陪位者郊廟親祠國家大事百辟咸在有懐舊臣明詔及門許陪盛禮顧衰體之疲朽承寵命以震驚中謝伏念臣頃荷天恩出司留鑰榮歸鄉國理極便安年迫桑榆義當休息飛章請老本慙賢路之妨不稼取禾更積素餐之愧恐再三之上瀆終忝冒以不遑然而夙苦目痾比頻發動近加末弱殆不支持方陛下咸秩百神駿奔萬國思以自天之福禄均畀在位之臣工惻然眷懐未忍遺棄而臣自顧殘癃之質恐成跛倚之尤身滯周南信榮觀之有命心游魏闕念入侍之為難惟當望柴燎之餘煙伏敝廬而切抃坐馳丹悃仰企清光媮惰之誅逃避無所免南郊陪祠劄子臣伏被詔勅令發來赴闕南郊陪位已具表稱謝及陳情懇附奏訖切念臣早以庸虚上塵眷遇昨知應天府引年謝事備瀝微悃仰䝉宸恩就除宫使竊禄自便每不自遑退就私居纔逾時月天慈記録又加特詔愧甚失措感深隕泣誠願榮陪盛禮因得一覩清光此時不入國門便是永填溝壑但臣夙患目疾每發良苦近因退閒方專治療攝心收視冀復精明仍自夏秋足膝少力雖不妨行步而難為乆立儻若可趨班著固當不俟駕行今此阻難彌用悼恨望雲極目向日傾心形骸徒存神爽飛越敢披愚鄙上達聖聰謂天蓋髙矜此跼蹐謝免南郊陪祠表伏奉詔書許臣免赴南郊陪祠者天眷優隆不遺舊物老身衰病辜奉明恩未即譴尤重加慰諭中謝伏惟皇帝陛下奉若天地祇事祖宗罄萬國之歡心洽百禮而為奉四海來格尚何有於匹夫誠意旁周獨未忘於一介其為幸㑹上出眷懐况臣仕歴三朝班聮二府固合勉强筋骸之力奔走籩豆之間聴上祝之告休均在庭之率舞顧以迫於罷曳豈敢苟於便安始効私誠謂嚴誅之莫逭重邀細札識聖度之兼容雖蒲栁之質既衰而葵藿之心未已瞻望隕越寢興不遑免南郊陪位表伏奉詔勅令發來赴闕南郊陪位者國之大事禮行於郊在位羣工肅祭容之嚴翼有懐舊老仰天眷之優隆顧疲朽之殘軀惟震驚於寵命中謝伏念臣乆安鄉社巳迫桑榆雖優佚於盛時日侵尋於衰病目痾增眊但馳想於闕庭末弱難支實艱趨於壇壝方陛下恭承圭幣嘉薦豆籩四方駿奔萬福來下欲其敷鍚弗忍遐遺而臣自顧尫癃之姿恐成跛倚之失侍祠拱帝難叅㑹弁之星抱瘵卧廬徒望升煙之燎坐馳丹悃仰企清光媮惰之誅逃避無所賀南郊禮畢表伏見今月二十七日南郊禮畢大赦天下者惟聖為能饗帝莫大於卜郊好生之徳洽民茲謂之大徳中謝臣聞天地萬物之始祖宗百世之先書有肆類之文禮著嚴配之義曠三年而後舉周四海以薦誠然後精意獲通萬靈咸秩惠澤迨於列辟賜予均於六師自非熈辰曷修盛節伏惟皇帝陛下仁孝昭格叡知日躋克享天心以作神主故能普安寧於八表効職貢於殊方釐事告成舊章益茂臣忝逢明代獲綴近班觀陟降之多儀阻陪祠位被厖鴻之純嘏徒仰天光遙望闕庭實深慶抃謝加恩表元祀告成鴻恩溥及雖在退藏之品猶加異數之榮祗奉絲綸實増慙懼中謝伏惟皇帝陛下竭誠致饗受禄自天樂與羣臣同霑大慶上自股肱之列下周筦庫之微嘉其顯相之勤録其駿奔之助霑然大賚夫豈無名如臣草木餘生桑榆暮景顧田廬而願逝竊秩禄以常驚多病支離已無任於陪祀寵光霑洽尚不間於推恩荷徳滋深論報無所免明堂陪位表今月二十三日伏奉詔勅以明堂大禮令發來赴闕陪位者伏以大饗之禮蓋崇於宗祀至孝之誠莫重於嚴配盛節斯舉惟聖為能既被闡於典章尚不遺於耉老中謝伏念臣退歸鄉社乆逺禁塗雖優佚於明時日侵尋於衰病目痾増眊但馳想於闕庭末弱難支實艱趨於軒陛伏惟皇帝陛下恭承圭幣嘉薦豆籩四方駿奔萬福來下欲其敷錫弗忍遐遺而臣自顧尫癃之姿恐成跛倚之失侍祠拱帝難叅㑹弁之星抱瘵卧廬徒望升煙之燎坐馳丹悃仰企清光偷惰之誅逃避無所又伏奉今月二十三日詔勅以明堂大禮令發來赴闕陪位者國家大事祀典為先况茲饗帝之嚴實舉配天之禮百辟咸在有懐舊臣明詔及門許觀聖節顧殘骸之疲朽承寵命以震驚中謝伏念臣早荷朝恩老歸鄉社坐糜廩禄無益涓埃夙苦目痾比頻發動近加末弱迨不支持伏惟太皇太后陛下咸秩百神駿奔萬國思以自天之福下均率土之濵惻然眷懐未忍遺棄而臣自顧尫瘵之質恐乖恭肅之儀身滯周南願瞻仰而莫及心游魏闕念入侍之為艱敢冀宸慈特垂矜允上虚明命難逭嚴誅免明堂陪位表伏奉詔書以明堂大禮令赴闕陪位者明徳惟馨方格神於盛禮相予肆祀猥賜詔於老臣衰朽知榮兢惶靡措中謝伏惟皇帝陛下嗣隆聖統躬致太平翼翼文王之小心烝烝虞舜之大孝季秋順序方萬物之盛多四方和來嘉多士之奔走祗見列聖裒對昊穹敞布政之法宫大明禮樂受丕天之景貺均被邇遐喜交神人慶洽夷夏凢執事豆籩之末或觀光輿𨽻之間足為至榮可以無恨而况臣早已屏退尚叨記存温詔在門外庭有位固願聞舜韶而率舞瞻堯日以傾心遲暮之餘衰疲且乆當千嵗之接統自滯周南奉半夜之受釐莫趨宣室無階策勵惟劇飛馳又合宫備禮方蕆事於季秋列位侍祠尚不遺於故老仰恩榮之優異循衰瘵以戰兢伏惟太皇太后陛下聰明自天博厚載物左右景命固大濟於艱難保育神孫既聿躋於齊聖邦家康靖朝野肅清頌徳告功既對天而不怍隆禮備樂念報本之惟時當魚麗之世而物既盛多由思齊之聖而神用昭格擁純禧於二聖肆大賚於萬方曠古上儀于今盛典臣乆辭屏著退伏里閭覩聲明於垂盡之年受徳澤於惟新之政顧餘齡之巳幸矧温詔之見臨是宜䇿勵造廷齊明就列與其失周士在廟之敬不若同堯民擊壤而歌文物莫瞻夢有均天之想精誠未巳心為魏闕之遊謝男某差遣表命行予奪之間茲為君柄事守章程之細則有司存凢出殊恩謂非常制不有宜稱是虚寵靈中謝伏念臣早遇聖明嘗䝉親近仰承眷遇實有異於等倫自念衰殘顧難當於注意幸分符鑰因就田廬殁歸狐首之丘生奉豚肩之祀上託至仁之化遂忘大耋之嗟猶䑛犢以嬰懐爰拂龜而有請輒干明格方待嚴誅伏惟皇帝陛下治用孝慈徳隆穹厚不期舊物仍記於堯心豈謂塵容尚存於舜目淵衷矜惻特㫖可從宸造屬於老臣私便及於愚息九天降澤霶霈接於源流一氣發春榮潤均於根葉莫伸報塞但積愧惶葵藿至微徒有心於向日潢汙且涸固無路以朝宗想望闕庭飛越精爽薦龔懋應詔表伏聞人主大柄在乎攬髦俊人臣大節在乎建功名况當有為之時尤急非常之士伏見應茂材異等科龔懋研究歴代之故通習諸家之説材略可使從政智筭可以慮事向嘗應詔再召延閣有司所病不及大對羈旅益困操守無虧今邊略未寧謀能為急有如懋者士林之擇如使在野茲為遺賢臣今舉其人堪叅謀帷幄之舉如䝉甄録試任無効臣甘准詔書連坐之罪代人自外郡除待制表范文正公今月日逓到官告一道䝉見授前件官者省署清曹禁廷近職忽外除於散地知上出於宸衷中謝伏念臣藐爾孤生遘茲盛世竊慕匹夫之諒誓守平生之心暨忝列於冠裳每感激乎忠義頃值陛下躬親聴㫁始初清明登用俊良旁逮疎賤擢從郡倅陞列諫垣誓輸肝腸以報恩遇有聞無隠盡芻蕘之鄙言淺智深謀昧朝廷之大體寛恩外補支郡假麾未易炎涼遽遷㑹劇嵗水潦之為敗民力食以方艱求寛常租議導壅水陳章請而煩復輒恩㫖而可從睿澤周隆編氓蘇息在臣愚劣何術保綏夙宵勉勤曠敗是懼豈謂江湖之上逺䝉日月之光詔命忽臨寵名非次大邦多士清朝富才上簡帝心豈少臣比感深泣下愧甚魂驚此蓋陛下仁及隱微徳施溥博虚懐小善來天下之魁英借寵孤臣勵朝端之風節揆能不敏思報何階惟當白首初心黄泉一節仁思反哺庶堅烏鳥之心義不逃生無惜螳螂之臂樂全集巻二十九
