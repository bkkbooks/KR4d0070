body:
  text: 樂全集巻二十六宋張方平撰論事論討嶺南利害九事臣竊惟百粤之區三代為荒服正朔聲教所不加秦倂天下始開置三郡曰南海桂林象郡乃今廣州桂州交州漢武平南越拓為九郡元帝棄儋崖但存七郡以至後漢交州刺史部郡七縣五十六今自嶺以南皆七郡之地而交趾得其三郡二十二城其土地下濕多瘴癘人短折性躁悍好讐怨相殺害易興逆節歴呉晉至隋皆内屬除吏供賦役唐南海節度兼嶺南五府經略使交州是為安南府唐末劉陟竊據嶺外并有交州國初交州帥吳昌文卒管内十二州大亂其大將丁部擊定之部死子璉承襲太祖擒劉鋹璉請内附因而撫納授安南都護自昌文至今爭奪簒盜已易四姓太平興國中其大將黎桓簒丁氏太宗下詔討伐興兵由邕廣水陸兩路入諸將孫全興等逗撓擅退並戮於邕州市黎桓上表謝罪降詔赦之遂除安南都䕶景徳中桓死諸子爭立國復亂廣州守臣奏請承釁取之真宗不許既而大校李公藴又簒黎氏朝議以其遐荒異俗置之度外因亦用桓故事授公藴旄節及此傳四世矣向自日南貢職巳廢朝廷濶略不問邊臣苟慢防禁益弛凶惡盜賊姦蠧之民諸配徙者不無逋逃頗從亡匿亦有人頑嚚不逞挺身亡命赴其招集教之治兵助為邪計故令乾徳敢奸王命凶黨用事多是華人往時遣使例抵其國見城中無居民府舎湫陋有茅竹屋數十百區以為軍營兵器有弓弩木牌梭槍竹槍弱不堪用勢不能為中國患故逺而易之至景徳中李氏竊此疆域及今七十餘年王人乆不涉其地不復知其虛實今聞其城栅隍塹乃有數重兵力民衆必益充足頗略旁占城等諸小國事勢施設比前為强大而嶺南長吏猶習故常本非經逺之才又忽不虞之戒狂妄輕脱為國生事蠻性狠悍有不能堪告訴不聴投書不受事情壅塞積成忿恨及其戰艦抵岸軍鼓叩城如入無人之境略無交鋒之備冦兵所至城邑為墟遷致其貨財係纍其婦女封豕長虵恣其酷毒傳聞其事可為痛心然此為既往之咎方當慮將來之策昔漢誅南粤兵㑹番禺道便近故為功易至後漢馬援擊交趾縁海而進隨山刋道千餘里﨑嶇三年始得賊討襲轉戰至九真日南境上以定漢界吏士得還者十四五而象郡南境由是竟分為林邑國歴代或小叛亂尋即平之隋破林邑以其地入于交州終亦不能有也唐懿宗時安南都䕶李琢侵暴獠民羣獠引林邑蠻攻安南府遣將率江西湖南之兵赴援既而交州陷遂集諸道兵赴之積六年方破蠻衆收復安南而藩鎮之兵猶戍桂林徐州戍卒遂倒戈剽掠湘潭破宿州徐州滁州和州濠州攻圍泗州揚楚廬壽兖海沂密曹濮皆被其害詔㑹蕃漢諸鎮之兵十八將進討又二年方殄兇逆由是天下騷敝跨接五代遂為異域故太祖皇帝棄之不欲勤中國以事荒徼列之外蕃使隔限諸蠻此天機神筭長轡逺御之術也逮今百餘年故無島夷之患此時竊發窮兇極毒逆天理黷神道自古蠻夷猾夏冦賊姦宄未有如是之暴害也天衷慘怛為之旰食顧此滔天之惡遂興問罪之師天下切齒恨不即執其兇徒誅裂葅醢之瀦其邑落以為兇虚宣九廟之威靈謝一方之寃痛伏惟命將行軍授成制勝既巳審之於巖廊定之於帷幄攻取形勢諒無遺策然臣聞處重位食厚禄國之休戚義當共之不待迫於咎責而後勵勉也况臣雖守陪都服在近職上荷恩眷無補聖明豈可自同常人坐觀國家之事若越人視秦人之肥瘠無慘動怵惕之心思慮所及敢懐不盡謹條九事列于左方上達衡石冒塵睿鑒儻有一得微助涓塵至于填溝壑之日亦無遺恨焉一事即今淮甸兩浙江東西湖南北州縣仍歳旱蝗陂澤竭涸野無青草人户流散窮荒極敝事可憂痛方當散利薄征緩刑弛役布徳施惠以撫存保息而盜起南裔王師大興焉出荆潭之路此時民力何以復堪賦發後漢永和中日南象林徼外蠻夷數千人反亂交阯刺史發交阯九真二郡兵萬餘人救之兵士憚逺役遂反攻其府州郡并力討之不能制為所攻圍嵗餘而兵穀不繼朝廷以為憂召公卿百官四府掾屬問以方略皆議遣大將發荆揚兖豫四萬人赴之李固駁以七不可之説而請選有勇略仁惠材任將帥者以為刺史太守令募蠻夷使自相攻擊轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞因薦祝良張喬可任用四府悉從固議即拜祝良為九真太守張喬為交阯刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人由是嶺外復平今南蠻叛亂始由長吏侵擾積忿無告及其致冦曾無戒備故令屠陷城邑流毒一方然事已失之於前謀當善於其後臣愚以謂今茲上策當以謀取不可以力勝謂宜且擇廣桂二守臣精密毅重識略足任者屬之方面付以便宜使各選舉部下文武將吏其兩路職司官朝廷為之慎選令協力從事招集户口各安本業為發禁卒以代荆湖見兵益令募本土丁壯分屯縁邊城邑使足以保守要害更相救赴則賊不敢復窺徼内自取殱夷峙糗粮積芻藳惟事事乃其有備揣情觀變臨事制宜嵗年之時經營進取蓋中國御蠻夷固有大體圖功宜審慮害宜深務在保威靈紓民力全士馬之用惜金帛之費先收多福以絶後虞此為全勝之筭經逺之道儻謂業已興舉難于散遣猶有中䇿具諸下條二事蠻冦自入欽㢘以至陷邕州殘暴黎庶踐食城邑既而席巻還其藪穴及今巳累月朝廷旌死事者而録其孤推恩厚矣然及民之惠猶有闕者春秋傳魯與齊戰曹劌請見魯君問將何以戰公曰小大之獄雖不能察必以情劌曰此可以一戰蓋謂其重人之命也謂宜特降徳音下廣南荆湖以慰安逺人之情使知陛下哀痛傷惻之意凡四路百姓耗病之事加意優恤之庶國家仁恩有所下逮至如宥釋罫誤以安吏卒之反側開設賞募以招溪洞之酋豪祭酹其亡魂掩藏其殘骼皆前代常行之事也夫文之所加者深即武之所服者大徳之所施者博即威之所制者廣震耀殺戮生殖長育功用相承此天之道也三事東南六路災荒已甚官私匱乏莫相救恤又縁青苖助役市易之法農民困於輸錢工商窘於射利謂之錢荒人情日急今王師薄伐聚于荆潭調發賦輸即以軍興從事荐饑之際供億實勞臣聞安民豐財用兵之本也所有荆湖南北廣南東西四路青苗助役市易法伏望特賜先罷其役法令復依舊制施行以此宣布徳澤慰悦民心易曰悦以先民民忘其勞悦以犯難民忘其死悦之大民勸矣哉四事臣聞兵者國之大事死生之地存亡之道不可不憂深而思逺知天知地勝乃可全地者逺近險易廣狹生死也彼蠻之舉事非謂其衆可以抗王師非謂其智謀可以勝中國而敢為暴害至是者負山海之險林藪之深可以出為冦患難以入與戰鬬乘我無備因而得逞傳聞蠻界其崖壑阻處篁竹叢薄不通人行人有操持器仗者從横不得囘轉頃年貢象治路劣容象行謂之象路象過尋復蓊塞蠻行如鳥獸穿竄山藪間自知其路外人不得而入也自漢武之伐南粤時淮南王安已上書諫曰粤地草木深昧而多水險中國人入其地雖百不當一攻之不可暴取也兵入其地必逃散依險阻委而去則復相羣聚留守之歴嵗經年則士卒罷倦食粮乏絶方夏暑濕癉熱嘔洩霍亂之病皆作水居蝮虵蠚蟲曾未接刃死傷者已衆矣兵法曰地形者兵之助故用兵有九地行山林阻險沮澤凢難行之道者為圯地所由入者隘所從歸者迂彼寡可以擊吾衆者為圍地李靖兵法亦曰夫決勝之策者在乎㫁地之形勢觀時之利宜歴觀前代征蠻者未嘗舉大衆非不欲一舉殄滅之地利形勢衆不得用也以故率常羈縻馴養不使至于決驟候察警戒以固疆圉而已今業已失備致蠻冦又悉衆而歸王師于征是行天討非救急之兵也救急則欲速行討則要之致誅而已不許收功之緩當圖全勝之策今興師十萬日費千金鋭士不可以乆瘴鄉驍騎不能馳於鳥徑營柵無所立粮道不能通長兵無所施利器無所用財殫力屈徒沮國威先有自困之形未見必舉之勢何也若士馬而得為用則螻蟻之衆何足平若士馬而不得用則熊虎之力無所展儻今冬蠻未撲滅則前春兵須抽退更圖後舉臣竊難之臣識闇志衰安知軍旅之事但以古今方册亦足比測事宜向者嶺南有萬兵蠻何敢輕入竊謂今來弔伐兵在於精不在於衆可以計取難以力爭况淮浙江湖公私罄匱人至相食豈有蓄積計置芻粮財費過倍若令諸軍且駐襄鄧將佐僚吏省去冗員隨行廂軍量留充役自餘浮食一切勒囘以寛轉輸省齎送國財民力實為大計襄鄧間比年豐稔倉庾充實軍留就食足支嵗月士飽馬肥暮秋引發乗鋭誅賊軍氣自振後無艱乏方可圖功五事臣觀蠻事可以計取難以力争盖交阯氣俗與諸蠻不類諸蠻貴種姓服從貴種義不可奪交阯自國朝巳來巳易四姓皆由大校以權黨簒奪乃是唐末藩鎮遺風故其勢易為翻動竊聞乾徳尚㓜諸酋共事而主謀者三人今入冦大獲金帛子女各得所欲蠻夷不義惟利是貪歸國爭功豈能相下如裂其三郡分授三酋各為主領被之告命使達蠻中事縱不行必生猜貳以至他日釁端常在多方以撓之則功易舉矣兵法曰軍莫親於間事莫宻於問非精知㣲宻不能用間用間之術神妙之道也惟時㑹之為難得今實得其時㑹惟陛下深念所以可付之人誠上䇿矣六事林邑國在交阯南境本象林之地漢時列為郡縣後有功曺區連者殺縣令自立為王因别名國歴江南六朝常羈屬之隋仁夀中擊破其國㝷而自復至唐朝貢不絶國朝以來為交阯所隔遂不復至然自晉宋歴代常侵冦交州南史以為林邑素無土田貪日南地沃常欲畧有之故乘釁即入日南九徳諸郡輒留不去唐末亦是為羣獠構扇以陷交州為中國患今揣能害交阯者惟林邑且林邑與交阯相去纔千里本共象林一州之地今桂州至邕州尚十四程則是林邑交阯之間比邕桂中間程途猶近意者募能使外國之人諭以討交阯事約之師期使自一面入㑹王師如能破交阯者以日南九徳之地委之蠻夷貪重利必自為力亦伐國一竒也七事竊見安南後軍見在本府待師期所領南京一將外又涇原秦隴之兵約二千五百騎聞約取七月到本府正是六七月間在路到此又便南行夏秋盛熱比至桂州巳行萬里臣前巳陳蠻界山林崖壑之險不通人行馬實難用頃年儂賊構亂狄青破之聞在邕州西北適近山坂地勢寛平馬得施力故當時破賊馬軍之力為多今日行軍深入蠻地事與儂賊不同儂賊溪洞一首領入我郡縣之間止是劇盜擊破即糜爛矣今交阯自是一國竊有土宇恃其險逺主客勢殊秦渭馬軍弓箭手本備羌戎皆是捍邊鋭兵勁騎有到京師猶謂不伏水土輒生疾病而乃驅之瘴霧沮洳之中巉崿􅓕枿之地水土沙毒草無藳秸進又不可以馳突決勝其能還者無幾矣况西北二敵睢盱顧望如聞王師逺出邊騎多行忽起風塵來犯亭障東西往還萬里莫相赴應又不比海阻之失備矣凡言國家大事必曰軍馬軍馬者戎事之本不可忽也今邊塞簡選一鋭士調習一壯馬甚不易得盡心於國者方知之爾所有昨召邉要將官乃備邊騎兵願各遣還本道使荆湖多募丁壯蒐補諸土軍其將士服習土俗諳識山川地利其騎亦只用南馬格式雖小筋力自壯慣行險隘安其水草使與中國之人相先後勢之便者也且使西北知朝廷之力一方有警邊備晏然不為動也八事伏見安南招討司期諸留兵以八月中旬悉至潭州潭州去桂州十四程竊聞嶺外嵐瘴八月九月尤甚謂之黄茅瘴草黄時瘴氣方盛十月已後氣候始肅湖南饑荒粮草難致乆留就食實費供輸若便引行觸冒瘴毒士馬未用恐多病疫若展一月期㑹可省一月芻粮湖湘之民大寛事力比至其時新米巳熟暮秋湖外風土調適免致人騎枉有損傷國計軍行兩為便利九事漢宣帝時先零羌背畔犯塞用後將軍趙充國將擊羌虜充國以為擊虜以殄滅為期必先計策以待利便酒泉太守辛武賢持異請出擊之帝下其書令充國與校尉以下吏士知羌事者博議充國執意如初下其書公卿議者多同武賢帝以書勅責充國督之出戰充國上書謝因陳兵利害六月戊申奏七月甲寅璽書報從充國計其秋帝復賜書令因吏士鋭氣擊虜充國策虜有必可破之形上奏請罷騎兵屯田以待其敝上報書曰皇帝問後將軍言欲罷騎兵萬人留田如將軍之計虜當何時伏誅兵當何時得決熟計其便復奏充國上狀言屯田得十二便出兵失十二利上復賜書報曰皇帝問後將軍言十二便聞之將軍其更熟計復奏充國奏言兵以計為本故多筭勝少筭因策虜情以聞充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍冊其言常是臣任其計必可用也上於是報充國曰皇帝問後將軍上書言羌虜可勝之道今聴將軍將軍計善明年充國上言羌本可五萬人軍凢斬首七千六百級降者三萬一千二百人溺河飢餓死者五六千人定計遺脱入雜羌亡者不過四千人請罷兵奏可宣帝承漢之盛業天下富實四夷賔服先零小羌顧未足為患害遣將出兵充國所陳皆全師保勝安邊之册及上屯田之利止用吏士萬人留屯因田致穀以省大費不失農業而為武備宣帝璽書往復問難可謂籌計精熟矣而猶每下公卿議者以叅其得失其於兵事詳重如此本朝祖宗有邊防大事亦嘗博採羣議今安南之舉興師十萬萬里討伐涉危渡險利害甚多然聖志先定國論已協伏願特降璽書内外近職之臣各令獻䇿以示博訪之道使四方知陛下重任之意三軍知陛下憂軫之懐觀其否臧亦以見羣臣之材識愚者千慮尚須有得採擇所長不為無補論祠廟事臣伏見司農寺奏請降下新制應祠廟並依坊塲河渡之例召人承買收取淨利本府勘㑹在府及管下所管祠廟五十餘處㝷巳依應施行訖内有閼伯廟宋公微子廟已係百姓承買閼伯廟納錢四十六貫五百文微子廟十二貫文並係三年為一界臣竊以閼伯逺自唐堯遷此商丘之土主祀大火而火為國家盛徳所乘而王本朝歴世尊為大祀微子宋之始封君開國于此亦為本朝受命建號所因載于典禮垂之著令所當䖍潔以奉時事又有雙廟乃是唐張巡許逺以孤城死賊所謂能捍大患者今既許承買之後小人以利為事必於其間營為招聚紛雜冗䙝何所不至慢神黷禮莫甚於此蓋聞有天下者祭百神故咸秩無文毖于羣祀先聖哲王所以致恭于鬼神者所以為國家萬民六經訓典備矣故曰克典神天俾作神主此人君之職也今既嵗收細㣲而損國體至大臣愚欲乞朝廷詳酌留此三廟更不出賣以稱國家嚴恭典祀追尚前烈之意論蘇内翰臣讀春秋傳晉叔向被囚時祁奚老矣聞之乘驛而見執政韓起為言叔向謀而寡過惠訓不倦宜䝉寛宥之意起與之同乘以言諸公而免之祁奚不見叔向而歸蓋祁奚之言為國非私叔向也今日傳聞有使者追蘇軾過南京當屬吏臣不詳知軾之所坐而早嘗識其為人起逺方孤生遭遇盛明之世然其文學實天下之竒才向舉制策高等而猶碌碌無以異於流輩陛下振拔特加眷奬由是材譽益著軾自謂見知明主亦慨然有報上之心但其性資疎率闕於慎重出位多言以速尤悔頃年以來聞軾屢有封章特為陛下優容四方聞之莫不感歎聖明寛大之徳而尤軾僭易輕發之性今其得罪必縁故態但陛下於四海生靈譬如天之無不覆冒如地之無不持載如四時之無不化育於一蘇軾豈所好惡伏惟英聖之主方立非常之功固在廣收材能使之以器若不棄瑕含垢則人才有可惜者昔季布親窘高祖夏侯勝誹謗世宗鮑永不從光武陳琳毁詆魏武魏徴謀危太宗此五臣者罪至大而不可赦者也遭遇明主皆為曲法而全之卒為忠臣有補於世自夫子删詩取諸諷刺以為言之者無罪聞之者足以戒故詩人之作其甚者以至指斥當世之事語涉謗黷不恭亦未聞見收而下獄也唐韓愈上疏憲宗以為人主事佛則壽促此言至不順憲宗初大怒欲誅而恕之其後思之曰愈亦是愛我今軾但以文辭為罪非大過惡臣恐付之狴牢罪有不測惟陛下聖度免其禁繫以全始終之賜雖重加譴謫敢不甘心臣自念朽質上荷異恩今伏在田廬無復涓埃之補竊慕祁奚雖老猶不忘公室而申請叔向之義僭越上言自干鼎鉞不任惶懼待罪之至論手實狀臣竊聞昨有新制開列條目自府畿至諸路郡縣令人户各自供通財産手實狀有所隠漏者許人陳告近巳施行公私勞敝鄉閭甚擾但憂増益賦調不復更事生業必有姦猾漸相告訐窺圖賞利獄訟繁興政令寖以滋章民徳何以歸厚况上户以下鮮有蓋藏田蠶所收嵗有厚薄户等耗登何常之有不惟扇惑人情更有紛亂新法以建議者内為之主故當職者人無敢言向者朝廷所立法制蓋以便民為本因成富國之利今茲一事專用撓人徒搔挐於天下實無濟於國家伏望聖明博行體問忠於國者必言其無益慮於民者當明其非便憂深思逺早垂止罷令億兆欣戴天恩論錢禁銅法事臣伏以錢者國之重利日用之所急生民衣食之所資有天下者以此制人事之變立萬貨之本故錢者人君之大權御世之神物也切觀自漢以來名臣高識者之篤論皆以為禁錮造幣通開塞輕重之術此濟民之切務保邦之盛業也故錢必自官鼓鑄民盜鑄者抵罪至死示不與天下共其利也國朝故事諸監所鑄錢悉入于王府嵗出其竒羨給之三司方流布于天下然自太祖平江南江池饒建置鑪鼓鑄嵗至百萬緡積百年之所入宜乎貫朽于中藏充足於民間矣乃自比年以來公私上下並苦乏錢百貨不通萬商束手又縁青苗助役之法農民皆變轉穀帛輸納見錢錢既難得穀帛益賤人情窘迫謂之錢荒府庫例皆空虛人户又無居積不知嵗所鑄錢今將安在此事實繫安危之體宜明利害之原夫鑄錢禁銅之法舊矣累朝所行今勅具載錢出中國界及一貫文罪處死而又重立賞格使人告捕至于居停資給擔擎人等與夫官吏之失於檢察者各等第坐罪又禁銅之條犯之九斤巳得刺配之罪亦設告賞之科而自熙寧七年頒行新勅刪去舊條削除錢禁以此邉闗重車而出海舶飽載而迴聞縁邊州軍錢出外界但每貫量收税錢而已諸􅔓舶船舊制惟廣州杭州明州市舶司為買納之處往還搜檢條制甚嚴不得取便至他舟也今自廣南福建兩浙山東恣其所往所在官司公為隱庇諸係禁物私行買賣莫不載錢而去錢本中國寳貨今乃與四夷共用又自廢罷銅禁民間銷毁無復可辦銷鎔十錢得精銅一兩造作器物獲利五倍如此則逐州置鑪每鑪增課是猶畎澮之益而供尾閭之泄也大為之防民猶踰焉若又廢之將何憚矣蓋自弛禁數年之内中國之錢日以耗散更積嵗月外則盡入四夷内則恣為銷毁壊法亂紀傷財害民其極不可勝言矣臣見公私上下並苦乏錢深求其由僅有一得因畨閲前後令勅誠見條制之未便今具録勅文進之衡石伏願陛下申明舊章急救其敝立四夷内外之限通下民衣食之原所録如右嘉祐編勅慶厯以前編勅並同一將銅錢出中國界者河北陜西河東不滿一百文杖一百一百文徒一年每一百文加一等至徒三年決訖刺配逺惡州軍牢城一貫文以上為首者處死從者決訖刺配逺惡州軍牢城其餘路分二百文杖一百每二百文加一等至徒三年決訖刺配逐州牢城二十貫以上依河北等路一貫以上刑名定斷隨行之物並沒官其居停資給擔擎人等依知情藏匿罪人律科斷仍許人告捕給賞錢一百貫文地分官司及應巡捕人等不覺透漏並減犯人三等科罪州縣不切鈐束亦行勘斷内蕃人有犯除河北外並禁奏取㫖仍半年一次舉行曉告臣詳勅意言自餘路分雖非三路但出中國界皆係禁法熙寧編勅刪去此條此是見今所行編勅自熙寧七年正月一日行用嘉祐編勅慶厯以前編勅並同一商客蕃客往南蕃者聴逐人各帶路費錢五百文過此數者許諸色人陳告犯人依雜禁條將銅錢出中國界刑名施行蕃人禁奏取㫖其錢盡數給告人充賞仍委市舶司并縁海州軍常切㸃檢熙寧編勅刪去此條嘉祐編勅一犯銅并鍮石一百兩杖一百一斤加一等九斤決訖刺配逐處牢城十斤以上決訖刺配千里外牢城仍許人陳告其因告獲合支賞錢者一兩以上一貫每一斤加二貫過徒三年每一斤加五貫並至五十貫止若犯銅鑛或夾雜者只據烹煉到實銅科罪仍委轉運司將條約逐季舉行熙寧編勅諸不産銅鉛錫地分銅鉛錫官自出賣許通商販及聽以銅鉛錫或鍮石鑄造器用賣買仍並免税右臣惟古先聖人之立制内諸夏而外夷狄夷狄者中國之㓂讎也今乃傾中國之利撓君權竭民用以資㓂讎又弛銅禁通商販銅入四夷無復紀極所謂假冦兵也既資之財又假之兵以濟其猾逆之心暴害之力桀黠之敵有以窺國家御邊之無筭樞機之不密安得不啓其侵侮之謀者哉不知議法者之意據何義理累朝之經逺長慮所以保國便民之典一旦而削除之此國之大事惟陛下聖明察納早垂神斷論率錢募役事臣竊惟天之生民以衣食為命聖人者作而司牧之乃立君臣貴賤等威之分以均節其數度而止其爭且亂故禮也者文飾此者也刑也者禁防此者也凢所謂仁義亷恥賞罸法令皆縁此而後立者也衣食不足其甚則至於父子夫婦相賊害何禮刑之有哉内無以保其社稷外無以制諸夷狄國非其國矣故衣食者人事之確論非高談虛辭之可致者也昔者聖人所以治民之道别其四業任之九職農夫効稼穡之力虞衡主山澤之利百工飭化八材商賈阜通貨賄各率所事以奉其上而上之所以取于民惟田及山澤闗市此財用之所出也沿革損益雖歴代不同要之必本於此過是則非王制矣伏見近制募役之法令人户等第輸錢夫錢者人君之所操不與民共之者也人君以之權輕重而御人事以平准萬貨故為國者必親操其柄官自冶鑄民盜鑄者抵罪至死示不得共其利也夫錢者無益飢寒之實而足以致衣食之資是謂以無用而成有用人君通變之神術也且本朝經國之制縣鄉版籍分户五等以兩税輸穀帛以丁口供力役此所謂取於田者也金銀銅鐵錫茶鹽香礬諸貨物則山海坑冶埸監出焉此所謂取于山澤者也諸筦𣙜征筭斥賣百貨之利此所謂取于闗市者也惟錢一物官自鼔鑄臣向者再總邦計見諸鑪嵗課上下百萬緡天下嵗入茶鹽酒税雜利僅五千萬緡公私流布日用而不息上自郊廟社稷百神之祀省御供奉官吏廩禄軍師乘馬征戍聘賜凢百用度斯焉取給出納大計備于此矣景徳以前天下財利所入茶鹽酒税嵗課一千五百餘萬緡太宗以是料兵閲馬平河東討拓跋歲有事于契丹真宗以是東封岱宗西祀汾睢南幸亳未嘗聞加賦於民而調度克集至仁宗朝重熙累盛生齒繁庶食貨滋殖慶厯以後財利之入乃至三倍于景徳之時而國計支費更稱不贍則是本末之原盈虚之數其疎濶不講乆矣陛下憫時事之積敝志在變而通之以財成天下之務故創法立制所謂措置事以十數要在經國利民崇徳而廣業也其中率錢募役一法為天下害實深通都大邑要扼之地以之併廢名藩重鎮將吏之倫以之散遣游民敝夫而委以倉庫案牘之事軍員卒長而付以錢穀簿書之責如此不便之事因縁極多至于五等版籍萬户之邑大約三等以上户不滿千此舊制任差役者也四等以下户不啻九千此舊制不任差役者也今令五等一槩輸錢是率貧細不足之民而資高强有餘之户也且舉應天府為例畿内七縣共主客六萬七千有餘户夏秋米麥十五萬二千有零石絹四萬七百有零疋此乃田畝桑功之自出是謂正税外有沿納諸色名目雜錢十一萬三千有零貫已是因循敝法然雖有錢數實不納錢並係折納穀帛惟屋税五千餘貫舊納本色見錢大體古今賦役之制自三代至于唐末五代未有輸錢之法也今乃嵗納役錢七萬五千散青苗錢八萬三千六百餘貫計息錢一萬六千六百有零貫此乃嵗輸實錢九萬二千餘貫每年兩限家至户到科校督迫無有巳時天下謂之錢荒搜索殆盡而又弛邊關之禁開賣銅之法外則泄于四夷内則恣行銷毁鼓鑄有限壊散無節錢不可得穀帛益賤變轉既難民日益困逺方僻路無所措其手足臣故曰募役之法為天下害實深凡公私錢幣之發斂其則不逺百官羣吏三軍之俸給夏秋糴買穀帛坑冶埸監本價此所以發之者也屋廬正税茶鹽酒税之課此所以斂之者也民間貨布之豐寡視錢所出之多少官錢出少民用巳乏則是常賦之外錢將安出或曰募錢輸官還以募役錢既出入非蓄聚也臣對之曰夫募錢者率之農民散於惰游市井自如南畝空矣或曰四等以下率錢數少民易輸也臣對之曰彼窮鄉荒野下户細民冬正節臘荷薪芻入城市往來數十里得五七十錢買葱茹鹽醯老稚以為甘美平日何嘗識一錢向聞役法初行其間刻薄吏㸃閲民田廬舎牛具畜產桑棗雜木以定户等乃至寒瘁小家農器舂磨鉎釡犬豕莫不估價使之輸錢吏以刻削為功干賞盜利朝廷開賞典而勸寵之則諸趣時進取之人安得不從風而靡豈復知朝廷經乆之體耶陛下本欲以美利利天下至于施為見於行事非復聖意所存者矣陛下盛㫖一出執政奉行從而増益至于有司苛細甚矣頒下諸路職司之官各出所見展轉文害本同而末異朝行而夕改郡縣承用以至不勝其敝且民二税水旱檢放自有常制青苗之息或遇災傷猶暫倚閣募役之錢年雖大殺無減免之理往時州縣之役若身充若雇傭率三分其費而二分以薪糧取給豈悉資於錢也大鄉户衆一役代歸十餘年間安居無所預矣募法之行且六年初年民始大駭既而伐桑棗賣田宅鬻牛畜比年稍荒歉處民流散多矣至今紛紜變更竟莫能定其法上不能富國强兵成國家之利下不能便民濟物為天下之福若但坐觀其敝莫大改圖臣恐國家之憂不在四夷而見伏戎于莽矣伏惟陛下深思宗社之重俯察下民之情申命高才逺識之臣通議率錢募役之法蓋愚而不可欺弱而不可勝者民也動危甚易安之實難故民者天地之心而國家之本也是以聖人甚畏之甚重之欲保家國必先得民是謂藏身之固置器於安之道也臣以衰疲不任陳力近已上章乞骸骨歸田里伏念上荷聖恩至深至重故不能自忍為天下生靈披瀝肝膽以致補報之心儻精誠上達天光下燭得以涓埃少禆海嶽一旦先犬馬塡溝壑亦無遺恨惟陛下留神省察樂全集巻二十六
