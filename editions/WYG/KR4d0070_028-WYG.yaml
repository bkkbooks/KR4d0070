body:
  text: 樂全集巻二十八宗張方平撰表狀賀皇帝加尊號表三推修籍禮畢於青壇兆姓樂推恭上乎顯册天人協契夷夏胥歡中謝恭惟尊號皇帝陛下寳玉紹圖淵珠在握稽乾文而布政鈞妙用以為方圓覆九區大沖羣性雖上徳不有故人無能名在後聖異文必功稱乎號是以帝堯則天之大皇軒體道之元加諸寳章未浮睿致臣心傾宸極身繫陪京莫伸率舞之誠徒慶嘉亨之㑹賀皇太后加尊號表臣庶等以陛下徳對天儀功邁古烈奏誠丹陛贊國鴻休爰此吉辰誕膺寳册宗廟増慶華夷共歡中謝伏以皇太后陛下厚載無疆裁成百度躋含靈於仁壽浹和氣於清寧教始正家雅憲邁乎文徳禮成見廟故事盛於和熹大業著於升平隂隲存於造化惟茂功之所被豈徽號之能殫臣適逺龍墀叨司麟籥想盛儀而心騖望宸極以魂飛光獻皇后上仙慰表伏覩遺誥太皇太后奄違盛世聞誥號擗糜潰五情伏惟皇帝陛下至情大孝哀慕深切臣退伏田廬不獲陪位宫庭不任摧殞之至光獻皇后靈駕赴山陵慰表伏承大行太皇太后靈駕發引赴山陵者大升即逺萬國同哀伏惟聖情永懐攀慕大行太皇太后隂功庇世神御賔天尊極三朝實積貽謀之慶孝刑四海詎勝銜恤之深臣退伏鄉廬阻陪班位瞻望莫及殞咽椎心先帝上昇慰表上天降禍大行皇帝奄棄萬國悲纒穹壤痛貫華夷奉諱哀號罔知所措中謝恭惟皇帝陛下性於仁孝罹此艱虞哀慕切深中外悸恐願思社稷之大計無徇曽閔之私哀臣以老病不獲奔赴闕庭無任哀痛感慕激切屏營之至第二表伏以大行皇帝奄棄萬國哀纒中外痛貫神人奉諱悲號擗踊無任中謝恭惟太皇太后陛下義重天屬恩深母儀罹此艱憂永懐痛悼願為無窮之計少割難忍之慈第三表伏以大行皇帝登遐逺近奔赴朝夕號臨況臣昔嘗備位二府雖老家居猶當躬詣闕庭以盡哀慕頃以垂老乆病兩目生翳起坐須人雖欲勉强其道無由慙負哀痛罔知所措皇帝登極賀表伏奉制書今月五日皇帝陛下嗣登寳位纘服先猷中外聳觀華夷同慶中謝恭惟皇帝陛下英風冠古世徳在民煥乎天日之姿卓有祖宗之烈民心所在神器自歸如天作春萬物有向榮之意如日出地四海無遁照之心眷茲神人永有慿奉臣以老病不獲奔詣闕廷無任歡喜踊躍激切之至賀太皇太后同聽政表伏奉今月五日制書太皇太后臨朝聽政者天覆地載八方以寧春生秋成萬物乃遂民心既定國步自安中謝恭惟太皇太后陛下轉導兩朝儀刑四海襲治世之故事繼先后之永圖屬茲難疚之中實負安危之望共聞大政勉副誓言人神有依華夷須賴國之大計萬世以昌慰皇太后表大行皇帝奄棄萬國奉諱之日哀殞忘生成服以來擗踊無地中謝恭惟皇太后配徳宸極助治宫闈崩坼之憂既下同於萬宇攀號之痛又身先於六宫臣以老病不獲奔赴闕庭無任哀痛感慕激切屏營之至慰皇太妃表大行皇帝奄棄萬國洪覆圯裂羣生震搖凢有識知舉増號慕中謝恭惟皇太妃奉侍朝夕左右聖神遽罹下席之憂永抱終天之痛賀皇太后表伏奉制書今月五日皇太后光奉國章誕膺册禮凢在臣妾知有依歸中謝恭惟皇太后殿下内徳茂於先朝母道隆於嗣聖恭儉之美上繼周之姜任孝慈之風下掩漢之馬鄧豈獨盡天下之養蓋將明王化之先盛禮既行多方同慶賀皇太妃表皇太妃誕膺令典受册内朝盛禮傳聞四方同慶中謝恭惟皇太妃功書女史徳配周南早以虞嬪之休遂儲堯母之慶坐論婦禮既師表於六宫誕生聖明實本支於萬世恭聞盛禮實慰羣心賀皇太后受册表致六宫之肅雍備四星之光耀國章畢舉實繄中外之心隂教益明式顯廟朝之重中謝恭惟皇太后同徳聖期儷尊宸極成周之盛任姒繼於徽音東漢方隆隂馬昭於内則式陳寳册上正母儀普率承風抃蹈胥悦臣乆違京闕退伏田廬聞命有初為國同慶賀皇太妃表盛禮斯成徽章式備國之慶事天下歡心中謝伏惟皇太妃地重星闈徳隆宸極重光累盛上參中壼之榮積徳累仁允穆普天之望慰慈聖光獻皇后神主升祔表伏承慈聖光獻皇后神主升祔太廟禮畢者因山復土已掩於下宫祔廟安神肇開於拓室宸衷追慕綿㝢同懐中謝伏惟慈聖光獻皇后配極居尊俔天為大對勲華之盛旦越任姒之徽音國體端嘉功出九人之上孫謀丕顯治超三代之前展龍駕以賔升復龜臺之舊御寢園載肅虞輅初迴昭穆有嚴式序宗祊之重烝嘗是享永惟配帝之隆徳性純深孝思篤至四海為養實由來祭之恭萬民以和本自國親之教臣忝從朝舊退伏鄉廬徒望庭壖莫陪班列不任慘切之至賀聖躬痊復表伏承聖躬康復巳於三月一日御紫宸殿視朝者擁全衆福臨聽萬機含生與聞舞手相慶中謝恭惟尊號皇帝陛下丕承駿命光宅永圖上全虞舜之聰明中盡周文之抑畏雖甚盛徳未嘗輒安將大有為無敢自暇至若一穀不登則憂見於色一夫不獲則慮形諸心于夙于宵以諮以訪僅踰三紀常御太和茲極神明之勞偶爽晦明之適然而天地敷佑祖宗降休百靈隂相於前萬俗精䖍於下粹氣來復淵衷寖清保社稷無疆之期為朝廷莫大之貺臣早從外補越在西涯第思扆宁之深嚴阻預簪紳之蹈躍賀册貴妃表得本州進奏院報今月三日貴妃受册禮畢者徽章有煒茂典聿修臣子之心中外胥慶中謝恭惟尊號皇帝陛下丕承寳構光闡皇圖凢議禮文必考本朝之故事誕孚徳度舉協前王之令猷疇壼掖之賢明成家邦之風化若時吉日備禮大廷敷厚人倫足致闗雎之應裁成内治永標彤管之光臣限守郡符方遙象闕徒心馳于宸極阻手舞于天墀謹差都教練使張遵道奉表詣闕稱賀以聞代中書賀壽星見表司天監狀奏今月十九日戊申其夜五更五㸃後于丙位瞻見壽星出見赤而光大者秋氣方清曙光微動爛然珠彩宛在丙方考日官之獻占知睿筭之無競中謝伏以三辰垂象所以示人五福敷言莫先惟壽觀景祥於南極驗愷悌之萬年恭惟尊號皇帝陛下寳命在躬乾圖紹統治民祇懼事帝寅威故鑒祐於有仁用永鍚於難老惟享國之永若商之中高願當天而王如古之巢燧臣等愧非一徳忝列三司覩此休符倍萬忻慶謝賜御飛白書表今月五日伏䝉聖恩賜臣御飛白書一軸者仰拜綸言甫啟緘縢之秘恭瞻宸翰恍驚輝照之臨中謝臣聞書之俊竒法傳飛白得諸心而方妙應於手以如神惟我太皇若時多藝高出肇昔孰為擬倫恭惟尊號皇帝陛下繼聖恢圖無為御宇顧萬機之臻靖咨八法以宣精祖則茂昭睿功允緝因齋居之多豫灑逸筆以為娛以臣乆塵侍槖之華近被于藩之重特加寵錫曲示眷私俯僂以觀徘徊増惕重有同於分器榮實過於笥衣神物護持恐難留于私室世家傳保當大庇於宗門臣方迫嚴涂無繇躬謝謝賜御書表臣伏䝉聖恩賜親書一幅天語温純煦若春陽之景宸毫璨麗煥如星斗之精褒逾華衮之章捧過鴻鈞之重臣道原殊淺學殖乆蕪早塵兩禁之游遂玷三朝之遇陛下宸襟縱邁天稟濬明妙萬物以為神乘六龍而比健豈臣庸陋得望清光灑潤及於蕭斯委照通於蔀隙逢時之渥傳後為榮仰服寵靈深淪骨髓進慶厯編勅表恭聞聖人之於法也揆時設禁察失建防律令統於本原詔教縫其漏隙世輕世重參制吕刑之權新典平典互存司冦之職然則通其變者未嘗使倦歸於治者不必相沿更化適宜由來尚矣臣等中謝竊以宋興受命垂及百年制勅之文累經編定造邦則綱目粗舉繼世則禁約彌周故刑統輔乎建隆農田析於景徳附令輕常憲之犯減定省中覆之煩要取便人迭為救弊其間執文生意吏所不免縁令興詐人所必為語不直宣則奏請生於未曉法雖曲處故比例興於一時由是報讞浸多文書彌積官雖行下民罔究知旁縁為姦承用差駮網逾密而禽駭䇿雖弊而馭勞必待刋修乃能折中伏惟尊號皇帝陛下燭知治本茂建民中既清問於羣工思更始於多辟而舊條浩廣後令煩挐或月異而嵗不同或小得而大有失矧乃俗無定化法貴善更不徇古以礙今不執此而妨彼譬夫調瑟易柱順燥濕而扣音虞機省括度髙下而求獲乃頒明命改緝懿綱仍詔臣等博舉衆僚並咨先例置司率屬舉要申凢於是以尚書屯田員外郎臣奕等刪正其文翰林學士臣某等詳處其當臣昌朝臣育典總其任㝷據天聖編勅為始下盡慶厯三年續降宣勅凢得四千七百六十五條極慮研精彌年論次因事標目准律製篇擿除重複揚搉輕重増所宜立周所未詳一詔而該數罪者從類析科數勅而申一事者併文示簡向以損益未定首末或乖須訖纂修方咨處可露奏前上俞報實頒又詳天聖編録之時勅不著年巻無先例遂使法家無指用之限諸條有疊出之文今每勅繫年存舊體也先巻發例省煩文也其言某年月日勅者則盡如元降言某年月日勅詳定者則微加修潤言臣等參詳新立者乃是衆議建明務合大中庶全體要又念折杖之法創始本朝上聖卓行前王未悟故取自刑統冠於本章且俾羣吏曉知王制明白其中書門下樞密院聖㫖劄子批狀係今來纂録者悉改曰宣勅總一千七百五十七條離為十二巻倂總例一巻目録三巻又取勅内汎行約束者為續附令勅一巻及録到續降赦書徳音三巻合為一部如得允當即乞特降勅命與刑統令式及先編附令勅一路一州一縣勅兼行蓋以窒詆欺之塗略苛細之弊義歸畫一人得共規文淺則用者明語約則該者廣由天地之化確然易知侔江海之流大而難犯若使吏能明習官謹奉行不為惠於法中不游情於法外庶可杜塞竒請追庶獄之號平銷戢爭心致黎苗之遷善臣等謬膺遴選殊懵大猷探理略以服勤惕奏期之淹晚粗終研削少佐侀成或許頒行仍乞以慶厯詳定編勅為目其新編勅共二十巻謹隨奏上進以聞牒奉勅宜令崇文院雕印頒行謝賜熙寧編勅表伏蒙聖慈賜臣熙寧編勅一部者伏以建邦之治本原在乎典刑禁民為非綱紀繫乎法令屬當平世簡用祥刑式助四維允成三徳中謝恭惟皇帝陛下體天為大如日之中燭於象表之微制此天下之動俯觀時務旁察人情時惟適以為宜事何乆而不敝貞夫一者百慮可以同歸變而通之萬民於茲不倦故講求於往制俾論次於新書雷電合章金玉條理緬合大中之訓益昭欽恤之仁甫畢刋摹爰加頒賚臣幸縁近綴忝守輔藩方恭命以奉行思揚吏職復䝉恩於降賜永獲家藏滑州謝賜新厯日表王官底日考厯以正天端侯御奉時告朔而賦民政中謝伏以尊號皇帝陛下乾圖紹統寳數在躬推軒策於明堂五氣以治合舜時於方嶽七政以齊臣罷職禁林分符畿服捧新書于芝檢増舊戀于蓂階南京謝賜厯日表居卿典厯太史序時憲治象於庶邦大王正於一統尊號皇太后陛下厚生著徳大順御期撫節以推天元履端而勤政始氣物惟叙機祥薦和爰頒朔於海寰俾示人於嵗事臣忝由禁署分守陪京捧迎日之軒書切望雲於堯屋秦州謝賜厯日表清臺謹職俯畢於新書法座推恩亟行於諸夏撫封載逺拜賜為榮中謝恭惟尊號皇帝陛下乘正御乾順古敷化海以内外盡陶於太和天之後先率有以常應然猶命南北之正記昏明之期自始而終能究六家之法惟疎與密具歸五紀之文序作嵗言布為民事凢舟車之所逮且郡國之相維悉用頒宣庶令奉順而臣復從外補越在西隅㑹承詔檢之嚴得見辰猷之重謹當恪思睿訓昭諭編氓不獨示元聖授時之休抑亦知至仁生物之意讓除諫官表今月二十一日閤門領告勅一道授臣直集賢院知諫院事者膚短之材孤逺之迹選除忽及愧惕無涯中謝伏以國家分命百工並釐衆務惟茲諫職實禆治要自非素履約乎中道處議得其逺體詳曉事物該知典故有大制度能探沿革之本當大施舎能折損益之中苟塵獻替之地是貽朝廷之辱况今陛下勵精於上大臣宣力於下聽納不倦謀能並進是方輯明紀律式遏冦暴宜得通識上助有為衆材森如多士萃止上簡天眷豈少臣者儻陛下矜其愚而錫保全之造公朝體其介而敦愛育之仁許臣且以舊官就館供職上免曠官之咎下逃十指之譏茲實由衷之私竊積聽卑之望謝除知制誥表伏奉制命蒙恩授臣右正言知制誥者槐庭給札甫上於奏篇星掖代言遽陪於景從躐進論思之秩預聞毖密之謨俯僂拜嘉兢凌失次中謝恭以邦家所重典誥為先故廣延於翹英俾對司於明命尚書作詔任處機衡内史出方贊為爵禄蓋歴朝之極任為外廷之華階向非學本名家代推傑筆則何以發揮鴻業徊翔近班體漢家深厚之辭演周公煩悉之誥訏謨定命鼓舞乎萬方除書徳音竦動乎羣聽備諮訪乎政事專潤色於王猷必資東里之才取重西臺之望伏念臣斗筲微器樗櫟散材獨奮草茅之愚再舉方聞之目小冠宰邑式敷慈惠之經别乗贊藩無補中和之職無何被㫖即追還臺陞處樂卿之丞留充諫省之缺赤墀伏奏曽未逾年右史記言仍偕備位自量未至兼此數官惟内罄於朴忠可少紓於官責汲黯之言多忤實荷優容鮑宣之義少文粗存體要免譴斥之為幸曷恩榮之敢圖猥被寵甄遽承官乏内省而愧外言謂何此蓋皇帝陛下洪覆如天至仁育物修官以一乎統類施命以告乎方來思皇俊乂之才裁成温雅之號詎宜輶淺玷此敷求謹當疏瀹煩襟厲摩素業闗決六曹之議深務持平靦修四禁之規覬能謹職敢言論報蓋逭顛隮西垣陳乞外補狀臣幸以微才濫當書命去本朝而就州郡捨辭翰而趨吏責蓋不獲巳豈所願為臣堂有二親年向衰老母氏抱疾多歴年所自臣登仕再任淛中迎親就官樂其風土今來外制見有五員臣出領州餘足供職伏望聖慈許領江淮間一郡矧今疆埸之戍未解中外之事頗繁萬一闕人選任誤及不惟自知愚懦實亦迫此私誠臨時有辭愆為臣之義遺親冒寵乖為子之方臣若旁有兄弟或下有子姪供養有託何憚奮身縁此區區尤不遑處仍恐物議不察臣誠以謂多事之時猥為便私之請占掖垣之近職擇善地以自安臣乞解綸闈換一散秩若祕書學省東宫之官資清品髙典藩亦重矧茲官號乆不補除散要逓居願從臣始仰祈天造俯鑒愚衷戰汗屏營伏候勅㫖謝宣召入院充學士表今月日翰林待詔劉文蔚至臣所居奉宣聖㫖召臣入院充翰林學士星車傳命玉署參華才薄恩隆以榮為懼竊以學士之職盛於有唐本朝右文其選益重間䝉訪逮得効論思地處深嚴絶為清近服四禁以謹職業詳七制以贊訓言諒匪通才豈當妙簡中謝伏念臣幸縁儒服竊覬仕階濫肩四方之豪曷明三道之要大庭發策再矚帝輝東觀紬書亟游俊域荐塵事任粗守官箴内省顓䝉已塵賞拔豈謂皇帝陛下軫憐孤特矜芘拙艱記演綍之微勤陟浮鰲之近綴斗無挹酒之用鶴有乘軒之譏謹當自求履祥緬思典故體巽風而申令當勵深辭瞻法扆以在顏勉承切問冀少圖於來效諒奚報於鴻私滁州謝上表昨蒙聖恩授臣依前右諫議大夫知滁州軍州事已於十月初五日到任上訖近班就列早玷於清途便郡庇身復蒙於善地荷天之寵循分知優中謝臣緒閥單平材用疎短謬登詔選叨處仕途通籍朝閨濫巾儒館擢陞兩禁用踐羣司粗逃官尤曽微風迹比因病目不堪簿領之煩遂剖丹誠求還文翰之職清衷加恤慈㫖垂矜得就閒曹少安散質事介有無之迹議生疑似之間睿鑒孔昭朝論惟允領麾殊幸省已載兢久依日月之光榮陪法從忽到淮山之上怳復塵寰值嵗大穰與民同泰俯仰優足出處便安此蓋皇帝陛下一氣均和大圓廣覆動植之物並被生成之仁小大之臣咸荷保全之道矧在孤微之迹嘗叨任遇之恩拙守有常厚誣巳辨敢不勤恤民瘼恪謹官箴冀勉樹於教條期少資於化育江寧府謝上表三月二十三日進奏院逓到官告勅牒各一道伏䝉聖恩授臣依前官充端明殿學士移就知江寧府仍放朝謝者巳於四月十七日到任訖參華秘殿被寄名藩從便道以治行奉寛條而署事寵榮蕃集媿汗交流中謝竊念臣世系單㣲天資䝉淺褫巾未乆通籍為榮乗善養於羣材遂叨塵於顯列沾河漢之滋澤依日月之光華寖親户牖之嚴備更臺閣之要物勝權而衡殆形過鑑以照窮乆冒龍光倐罹箕舌仰繄能哲俯察所存寘兩省之近班假一麾於便郡危心未定渥命亟頒蔀屋照通陳根脈起垢疵悉蕩坯陶更新此蓋皇帝陛下大度開容至仁涵育鑒丹誠之不昧知拙守之有常申穆朝猷曲囘天造禁帷密職復近穆清之塗方面通都俾當雄重之地敢不精心以慮來效是圖庶有獲於涓埃用酬恩於天地服除再授端明殿學士兼龍圖閣學士給事中謝恩表伏奉制命授臣某官者禮方終制恩許還朝入覲黼惟邈清光而在望登陪藻幄簉近綴以為榮中謝伏念臣才匪通方器慙適用從鄉人之善者幼擇與遊玷國士之品題早塵上達荐承詔選遽躐仕階見推英俊之場周歴華要之地比繇禁署分領翰垣不圖釁罰之深靡究劬勞之報乆纒病苦無望生全况晷景之不停悵几筵之已徹仰膺茂典俾復通班再趨户牖之嚴仍處閨帷之密此蓋尊號皇帝陛下大圓周覆一氣均和軫塵露之舊勤收箕斗之浮象匪遺輶曲同被範圍敢不進念竭忠退思寡過日月獻納庶盡近臣之規夙夜切磋以勵在公之節少期來效上答鴻私除尚書禮部侍郎知滑州讓遷官表伏奉制書以臣差知滑州特遷尚書禮部侍郎者甸服陪京首膺東眷春官小宰仍假寵名奬受有殊兢憂無措中謝臣論材謭薄語道迂疎親逢樂育之辰屢塞方聞之詔誤䝉恩記嘗歴事權向解禁扄連紆州組契濶江湖之逺流離嵗月之賖近趨丹陛之嚴復預紫垣之近激揚懦氣仰奉清光伏遇國家示壯邦畿増崇屏衛郊甸屯兵慎擇臣守豈期玩印之咨首訪遺簪之舊遷貳六官之重用優三輔之行無鎮撫方面之勞有息偃鈴齋之樂論今地望雖體大而勢雄較昔官居本事稀而身逸過加賞利恐累典刑若非此際懇辭必啓後來僥倖况臣職忝殿幄官處瑣闈乆塵侍從之華足領藩宣之寄曷煩麗澤方重左符伏望尊號皇帝陛下特寢新恩許還舊秩往釐州務躬布詔條雖去君前稍違於户牖顧居寰内何逺於本朝仰祈寛大之慈曲示保全之度俯回照鑒垂諒由衷輒干九死之誅冀完一介之守所有勅誥未敢祇受知滑州乞免轉官劄子臣伏奉勅告授尚書禮部尚書差知滑州近者朝議升曹滑等州為輔郡増置兵衛以壯王畿所遣守臣縁此誠重然滑州本實閒僻公事絶稀無宣力之煩非藉才之地更起遷官之例恐開後倖之途又環都五州並為陪輔知州在任遷易不常必待加恩而行益滋干賞之濫況臣官叨兩省職居清近出當屏翰體亦非輕臣前日欲先陳論又慮涉於辭避故且受命須至上言伏望聖恩許臣只以舊官前去赴任慎重名器茲為治本在臣之分亦獲自安謝遷禮部侍郎領輔郡表臣某言伏奉制命以臣差知滑州特授臣尚書禮部侍郎者近服建侯地升三轉中臺分次官貳六卿倂荷褒榮交深媿懼中謝臣世憑儒素天與朴忠幸遘重雍之辰濫膺特起之詔造廟堂而干禄兼冀親甘輕藁鑕以獻言累迂聖問蔑聞塵露之益空收箕斗之名頻煩寵章進㸃清貫嚮間闗於補郡方契濶以還朝重趨丹陛之華再預皁囊之綴喜從遐邈獲際近嚴嘿務安恬絶希僥倖㑹廟堂之深議崇畿甸之邇封盛修官儀推峻地望遄恤北門之舊首䝉左竹之咨謂密附日闈雖居重寄而輕辭天仗亦動淵衷因假儀曹示優禁從露囊封而啓讓承汗號以難迴載省無功徒堅自訟此蓋伏遇尊號皇帝陛下曲垂睿覽俯暨寒蹤念昔誤知非縁黨援推今同類每異矜憐偶賜節以殿邦猶出綸而増秩敢不祇循條教恪佩訓詞往殫夙夜之誠少荅乾坤之造免知益州表今月十五日逓到告勅各一道伏䝉聖恩授臣端明殿學士兼翰林侍讀學士尚書户部侍郎知益州軍州事者左户美官西區重寄敢期推擇俯及庸虛驚惶失圖進退無措中謝臣涉獵經術遭逢聖明越分踰能連階累仕周旋侍從之職踐更清要之途風議無長猷為弗建向終苴制擇守輔藩報政靡聞方積簡書之畏陟恩逮下遽當方面之行地官亞卿坤維巨屏寵靈殊渥跼蹐為増念臣父當傳老之年而臣抱終鮮之戚有息皆幼于宗弗蕃顧温甘之所須豈晨昏之可舎惟拜嘉之誠厚敢有靦以自居情所不安義亦何處伏惟尊號皇帝陛下宇宙同廣曜魄並明測逺方之民深期於鎮輯訪大廷之議誤致于簡掄聖治難逢私懐為迫敢期逺照俯及丹衷布朝家天地之仁徇臣子庭闈之志追寢成命選除通材他日捐生敢惜螳蜋之臂此時反哺幸伸烏鳥之情輒竭寸誠仰祈洪造免知益州劄子臣伏䝉聖恩除臣端明殿學士兼翰林侍讀學士尚書户部侍郎知益州巳具表辭讓章奏之文不盡誠悃敢披愚懇再黷天聰伏以益州方面至重朝廷委任推擇至精臣以庸虛猥當簡寄濫加崇秩榮兼近職揆才揣分忝冒逾涯但臣父年髙旁無兼侍昨受秦州之命亦嘗縁此自陳事播朝班言存聖聴况今益州除授寵利兩優雖國家任人自有大體而縉紳所指實貽清議敢望大明委照洪慈亭育垂憐拙守加憫孤蹤許臣以見官留滿今任犬馬之力期後効於驅馳烏鳥微情庶獲伸於哺養望闕待命不任隕越上殿再免知益州劄子臣近被勅命差知益州奉表及劄子以親老乞且終滿滑州見任准中書劄子奉聖㫖不許辭免又聞已差梅摯知滑州亦有朝㫖不許辭讓梅摯縁輔郡加職巳朝謝臣於事體難為更留本郡今奉恩㫖朝覲獲對天顏敢再瀝懇誠上黷宸聴伏以益州方面甚重朝廷寄任非輕臣以庸虚誤膺推擇便當策勵駑鈍往䖍詔條但以臣父年俯傳家而臣終鮮兄弟賤息尚幼未堪承事義難違逺苟冒寵靈敢望聖慈垂矜愚守俾循陔之志獲展於盛朝則圖報之心􅊎伸於異日臣無任激切待命之至益州謝上表蜀控西面益為大藩臨守之難畀付為重茲既署事實深惴懐中謝伏念臣資地本寒機悟殊淺偶縁朴學進㑹休辰乆塵侍從之塗荐更華要之地曽微云補之効第忘内疚之憂一昨起奉慈宸出分寰服烏鳥之情甚樂犬羊之鞟自宜適偶清衷深圖逺御庸殿一都之㑹專鈐兩道之兵枯朽見雕款段仍駕復冒寵陞之命無容固讓之私錦里舊城陸海千里軍屯整睦民俗阜康訟事不煩遨嬉多暇此蓋尊號皇帝陛下内全哲惠旁達聰明謂常預於樞機知頗存於謹厚可行寛詔以撫遐方謹當精究事為修明紀律冀成安輯之效持荅聖神之休愧靦瞻天跼蹐無地益州謝詔書奬諭表進奏院逓到勅書一道以益州路轉運使奏據本州吏民乞留臣滿三年伏蒙聖恩特降奬諭者錫命自天怳日星之下燭跼身無地懍淵谷以内驚惟功善之不聞冒寵靈之誤及省循無狀愧懍兼懐中謝臣聞漢宣帝之勵精留思良吏唐明皇之求治注意外官然如膠東潁川治有異等之効濟陽河内事昭將順之誠方被璽書之褒而䝉絲言之飾前朝盛事舊史美談如臣者所藴虚疎見拔孤逺早玷清華之選乆陪英俊之游頃自禁嚴外分藩翰維益部一都之㑹據坤隅千里之疆氣俗剽輕貨利繁錯比守臣之彈治習舊事之便宜居然方面之雄稱為權寄之重獨顧行能之下亦叨推擇之行然頗知獄市者為政所先賦役者治人之本戒諸苛擾務在平均良用拙勤粗免隳斁不意吏民舉浮淺之迹朝廷敦奬勸之方細札十行置郵百舎善聲不著方虞責問之來榮號所加適取虚名之誚此蓋尊號皇帝陛下凝神象表垂統化元盛節隆乎中和美利充乎髙厚君視臣如心膂允謂至仁天自民之聰明故無遺聴百城聳觀遐俗知榮臣敢不上體宸慈下修官業率勵愚柔之性無怠百千荅揚覆照之恩少禆萬一謝除三司使表伏䝉聖恩授臣依前尚書户部侍郎充三司使者驛遽奔塗䖍趨於嚴召芝函錫命進冒於寵光俾專筦計之煩實玷難才之選勢名參重靦汗交盈中謝伏念臣樸鄙孤生孱疎近器夙遌堯文之郁荐膺漢詔之求緤組朝闈濫巾儒館職箴規於獸省記言動於螭塗䝉擢掖垣遂登禁署中司執憲㑹府理財蹉跌外除因循十稔比自日畿之近徙臨蜀表之遐勉布寛條汔寧逺俗績幽宜絀覆廣惟私亟䝉瑞節之華歸奉燕朝之覲不謂尚存睿眷前出制音繇左户之班聮商大農之功利夫以㑹計之重賦入有經惟貨盈虚繫時休戚方今邊警雖徹而列屯猶厚年穀鮮登而沈冗為多調度既繁儲用幾蹷豈宜懦品竊假要權此蓋尊號皇帝陛下乾健垂明宸慈廣愛誤以愚朴目為幹臣謂嵗代之最深乆更巳試察羇蹤之自立素不因人優以職儀俾之器使敢不力求姦弊顓講富彊事有可為固自宜於竭盡衆之所避亦無憚於設施誓堅忠蓋之忱上荅簡求之造乞免三司使不允謝荅詔表伏䝉聖慈以臣近上劄子乞解職出知鄆州特賜詔書不允者備員主計嵗涉再期辭劇請藩章凡六上荷淵衷之憐惻紆璽札之丁寧仍示撫存未容罷免内循孤拙愈極兢危中謝臣慶厯中擢自憲臺長茲㑹府于時齒髮方壯精力尚彊雖趣辦應猝之非長獨居官任職而無廢早以目疾求解利權乆方開俞得還禁近自爾出入中外奔走川塗更歴數州又逾一紀嚮罷坤維之守志圖近郡而行遽被詔除復膺使任臣聞命之始即以舊疾為言就職而來每以曠務為慮蓋財用之均節繫剖析之謹嚴急之則害於農商緩之或容於姦利責其簿領之効實存省察之明而臣心之精微比頃年而亦耗目之瞭眊迪近嵗而有加或苦勞疼乃移告謁因控懇誠之切屢形封奏之詳願停三使之浩繁竊丐一麾而休息公議幸寛於譴劾朝恩亦盡於優容實陳力之不任非無名而罷去豈謂尊號皇帝陛下俯矜愚守早綴近班不違道以求全頗著誠而無偽再頒温詔曲諭訓言重念臣所苦未平知分頗熟儻精神之可强顧煩冗以何辭但懼眩昏致隳重害雖虚懐容納俾收累乆之勤而列牘干祈未免再三之瀆至明垂鑒丹悃寧誣謝兼翰林侍讀學士表伏奉制書以臣差知秦州授臣兼翰林侍讀學士者塞垣謀帥議及孱材講席敷經恩加異數仰膺睿奬交悸危悰中謝臣本起寒生親逢盛旦兩迃軒陛之問連䇿草茅之愚空竊虚名曷禆要務遄彯纓於諫署即珥筆於史林仙掖代言禁坡眎草領中司而持憲專大計以治財皆憑誤知蔑樹成績嚮從州寄頻換歲筩復遘母憂退棲閭閈近奉明庭之對重趨法從之班雖荷徳音屢矜滯迹自循拙守方避英游閒局冷司無關於朋比陳編蠧簡更續於見聞豈謂邊將終更聖宸擇守俾自承明之直往提戊已之屯陞持槖於書筵命擁旄於藩閫載言㑹幸奚塞疇咨此蓋伏遇尊號皇帝陛下濬發皇明旁求介善不責全於士類嘗圖舊於臣隣曲記小忠曩經煩使因推光寵以峻事權况臣陪殿幄之凝嚴典閣圖之奥祕如評榮進已處美階令兼講勸之員愈重論思之職暨引章而懇避承垂詔以敦臨帝意難辭人言可畏為儒薄分於叨冒以固多報國私誠在効酬而都淺惟益䖍於夙夕庶少荅於涓埃南京謝上表伏奉制命除臣端明殿學士兼龍圖閣學士守尚書左丞知應天府兼南京留守司巳於今月十日到任上訖陪京分守實王業之所基故社言歸在仕游之為寵肅膺期命已布守條中謝伏念以植性㝠頑逢時熙盛荷聖神之眷察繇文史以誤知漫歴嵗華洊承官乏詞垣禁署間黷詳延憲府計籌嘗塵器使斥麾去國就日來朝洎䝉右蜀之遷復有大農之召司均九式顧調度以靡充營職一心亦勩勤而敢怠叙升省轄出領留都仍還籍於禁嚴示推慈之渥洽此蓋尊號皇帝陛下幽而必燭覆以無私隱其有不移之愚俾之以自求之福典茲宫鑰之重綽然里閈之華顧莫稱於恩光徒有慙於委寄撫心自省當益勵於乃修有軀可捐尚更圖於所報辭免知秦州奏狀今月十九日進奏院逓到勅告一道除臣工部尚書秦鳯路兵馬都部署經畧安撫使兼知秦州者秦州重鎭尚書重官伏䝉聖恩俯及孤外在臣虚薄豈堪眷委兼臣父年老乆患脚膝不任騎乗闗隴山阻實難迎侍逺行敢望天慈矜察情懇特賜追寢新命許令終滿今任非但便臣庭闈之養抑免誤國方面之寄所降勅告未敢祇受謝賜手詔第一表今月初八日進奏院逓到賜臣詔勅一道以臣奏陳為父老乞免秦州滿今任不許辭免便令受告勅發赴本任者錫命自天烜日星之下燭跼身無地懍淵谷以内驚進退徊徨啟居震恐中謝伏念臣性資疎拙自奮單微實乏出倫之才誤䝉不次之舉寅縁資歴躋躐顯榮向解計圖叨司留鑰榮歸故里養展私庭曽微治效之聞敢冀光靈之及伏䝉尊號皇帝陛下俯矜愚守乆綴近班進文昌八座之聨委西州一面之寄惟是行能之下忝茲推擇之行天地生成曽未侔於全度形骸捐廢固莫報於深仁曷敢逡巡妄為激潔但以臣父筋力已謝齒髪寖衰孝徳訓人不責便親之請愧心即路是專冒寵之懐被細札之丁寧増懦衷之隕穫粗致其樂願伸一二之私深察其情儻宥再三之黷辭免第二狀右臣昨䝉聖恩除工部尚書知秦州以父老患脚膝難以迎侍逺行尋具奏陳乞滿今任今月八日伏奉詔勅不許辭免便令受告勅疾速發付本任者臣已具表稱謝外敢傾私懇再黷天威伏以寵命遷除邊方委寄猥加虚薄實冒恩榮前所陳情非縁矯激臣父年逾七十脚膝早衰跋履逺行艱於騎乘臣去年外補上荷天慈陪都鄉里方安奉養今塞徼清謐鄰敵輯和中外畯良足備推擇敢祈宸造俯遂微衷特寢新除許仍舊任荐煩睿聴敢逃罪責謝賜手詔第二表今月二十六日進奏院逓到賜臣詔書一道不許辭免秦州令依前命疾速赴任者天聴蓋高念微誠之難徹威光孔邇感慈㫖之下頒有愧拜嘉尚祈得請中謝伏念臣材資至下地望尤寒幸遘熙辰乆塵清貫出當方面曽風迹以無聞入總計圖顧事功之不立頃分留鑰獲養私庭未易嵗筩遽遷邊閫中臺喉舌之重西藩斧㦸之雄朝寄非輕寵光甚渥在王臣之義况無難而可辭但人子之心幸奉親之為便爰罄由衷之請願終奉計之期荐叩公車再窺方面垂矜危悃未寘嚴誅此蓋尊號皇帝陛下舜孝格天堯仁被世君使臣以禮允昭徳教之隆臣承命為恭甘俟典刑之及竊惟覆照俯逮幽微遂愚志於一夫致懽心於萬國辭免第三狀右臣昨䝉聖恩除工部尚書知秦州以父老患脚膝難以迎侍逺行再具奏陳乞滿今任今月二十六日復奉詔勅不許辭免令依前命疾速赴任臣已具表稱謝外竊惟愚誠有所未盡上煩聰聴遂至再三干黷天威分當嚴憲朝廷不以臣才下付之方面加寵而行齒髮尚壯稍任劇使奚事顧憚妄為避免但以父年高末弱不堪乗騎須至逺冒炎暑轝而就道風氣有隙或以愆和由臣貪冒恩榮虧玷風教聖仁孝治及人之老區區危悃敢祈矜亮今月二十五日趙槩已到本府交割公事管勾徐濟州並係京東去南京不逺迎侍便近伏望聖慈就移一郡少安孤拙臣見在本府祇聴朝㫖君命至重詔勅再降臣不即祇受自速典刑不任戰越待罪之至謝賜手詔第三表今月十五日進奏院逓到詔勅一道賜臣令依前降指揮發赴秦州本任者需章瀝懇屢干旒扆之嚴温詔遣行荐被絲綸之寵拜嘉優重積慮兢惶中謝伏念臣向奉制函亟更蕃棨文昌八座進陟卿聨隴坻一隅俾專閫制退惟親便屢以誠陳願囘渙汗之恩少適循陔之養愚衷所冀宸鑒未俞稽留一尺之書合從吏訊繼奉十行之札仍促駕行祇覿褒章實増厚愧此蓋尊號皇帝陛下照臨施普覆載均休逺微一物之遺慎擇四方之守眷存孤舊預在選掄示以大方采其微效仰聆睿訓俯極靦顔顧惟三瀆之煩實有再思之懼敢不恪趨官守躬布詔條掲節戒徒指西州而即路瞻雲結戀望北闕以馳誠上殿辭免劄子臣近自應天府就移知秦州以父年老患脚膝難以迎侍逺行乞賜停寢詔㫖不俞天聴蓋高君命至重不敢煩黷祇受告勅今䝉恩朝見獲面天顔敢瀝危衷猶希矜亮秦州於邊鎭尤為雄劇朝廷擇守委任非輕况今疆索晏清顧臣齒髮猶壯猥承寵寄何事懇辭但義有未安誠當開列臣皇祐五年曽差知此州是時已為迎侍不便嘗所控陳昨罷三司知應天府亦縁便親得請今陛下方以仁孝治天下臣子於奉養之私莫不得所願臣若貪冒恩榮事親不盡奚待典刑之及故於名教有虧仰冀天慈曲全拙守特與鄉便一郡徐亳濟州皆於南京為近烏鳥之情儻得伸於茲日犬馬之力尚當効於他年干黷宸嚴分甘誅竄秦州謝上表昨奉勅命差充秦鳯路馬步軍都部署經略安撫使兼知秦州軍州已於今月二十七日到任署上訖者一都之㑹控制西陲兩使之符謬膺中選爰此布條之始實深思職之憂中謝伏念臣起自孤平表惟疎拙入朝荷槖蚤次於禁塗出守腰章屢當於方面任隆有責効薄未酬曩辭邦計之煩獲假留都之近迹依鄉國情展親闈方幸便安俄叨簡擢進除省座往殿冀門䕶岐隴之師屯撫洮河之種落雖連牧之寄尤重顧晨昏之養難違因上達於懇誠屢煩紆於詔督曲形公議莫徇私懐驅暢轂以戒塗敢稽嚴㫖奉安輿而至部幸慰慈顔此蓋尊號皇帝陛下愛物無私使人以舊恢天下之度何逺而不柔付閫外之權惟才而是用良慙菲陋曷稱旁求幸今邊警之晏然上體聖謨之共此敢不殫竭精慮詳求逺圖期刑政之得中副乾坤之平施内面丹闕乃心一誠乞罷禁林就閒曹劄子臣祇奉聖恩召還詞禁臣乆患眼疾僅二十年舊學廢忘無以備顧問素業荒疎無以應時用若復典司制命自揆不堪供職又臣父年八十有二近在徐州卧疾半年至今右手乏力臂指不相為用今當更直省内家無兼侍之人早昏緩急敢安愚慮臣受命之日即欲自言孤逺之情難期察允故待到闕幸對天顔上謝宸慈採擢之賜俯陳微衷深切之懇所祈覆育曲賜矜容俾就閒曹獲全拙守候近郡有闕乞别就一差遣奉法循理少分憂寄臣不任荷恩待罪激切之至免起復除參知政事第一表今月某日試祕書省校書郎充睦親廣親北宅小學教授蔡天申齎到詔書一道授臣起復前官赴闕者三年之制天下之達喪終身之憂人倫之大義承恩命之至重在情理而匪安中謝伏念臣早冒寵榮乆尸禄養無事功之可紀積咎釁以為多䝉聖神之誤知假名器而虚授上辜天造莫効於涓埃不意慈親遽罹於禍酷懐茲鉅痛豈兾餘生使傳忽臨朝恩特降舉權宜之故事爰追召以還朝聞命哀迷撫心悸慄矧惟銜恤甫此逾時孑然一身未復同生之戚敢有二事居然從利之為伏望皇帝陛下隱惻上仁恫矜微志絀奪情之弊典惟致孝之永懐特寢天恩用敦本俗許畢倚廬之慕免累聖朝之明螻蟻之微儻獲終其所願犬馬之力期得盡於他時臣不勝號殞俟命激切之至其詔書不敢捧承謹令某人齎赴闕於通進司投納兼奉表陳乞以聞詔勅某省所上表乞免起復恩命事具悉朕方履天下之籍疇咨大臣以供天職以卿雋老茂徳乆鬱而未奮斷自朕志擢佐鼎軸將觀夫深謀秘議倓然起廟堂而澤四海未及踰月遽罹艱棘釋位而去巳畢哭踊之期宜從墨衰還復舊府深謀秘議遂而卒其功烈此朕所以拱袂以遲卿之來耳所乞宜不允故茲詔示想宜知悉春寒卿比平安好遣書指不多及第二表今月某日某官再齎賜詔書一道授臣起復前官者哀誠激切未諒於清衷詔札丁寧復申於明命憂惶失措悲哽莫勝重瀝懇情兾垂察允中謝臣聞聖人制禮愚者企而及之君子篤親天下從而化矣顧鮿生之無狀蔑介善以自名昔自弱微實勤力養終鮮兄弟素無田廬徒用丐遊以給晨昏之事暨叨宦達遂䝉根葉之榮自念孤單每懐喜懼數陳情而聞請求解職以便私頃復禁嚴寖違志願先臣雖年耋老氣本清和小爽起居之常未切憂危之慮昨承宣對垂諭選除仰奉徳音已陳深懇逮明廷之贊授面法座以控辭聰聴不回天心具照誠荷及親之幸遽罹過隙之悲退守几筵甫更時序豈期宸眷猥降璽封承命不惶悼心自失上稽嚴㫖敢盡苦辭伏念皇帝陛下大義愛人深恩恕物俾終祥禫以報劬勞則所守粗完免作亂常之首餘生未謝永酬錫類之仁隕涕椎心期於得請臣無任號訴激切之至其詔書不敢捧承謹因蔡天申齎還赴闕於通進司投納兼奉表陳乞以聞詔勅某省所再上表今月五日蔡天申齎到詔書授臣起復前官伏望俾終祥禫以報劬勞其詔書不敢捧承謹因蔡天申齎還赴闕事具悉三年之喪雖天下之所通惟國家急賢則經制可以權奪而臣子順變故至恩亦以義斷卿嚮參柄用旋屬家艱既虚席以踰時宜抑情而復位已嘗㪟諭當體至懐所乞宜不允故茲詔示想宜知悉春暄卿比平安好遣書指不多及第三表今月二日某官再齎賜詔書一道授臣起復前官者朝命至嚴巳辱再三之重私情所切期伸萬一之微哀迫靡遑矜從是幸中謝臣聞孔子曰人鮮有能自致者其惟父母之喪乎故三年之制天下之達禮尊卑所同古今不變用紀人倫之厚茲為王化之本在國朝之制繇慶厯以還近自親賢外通文武悉優容於在疚申鉅創以盡情豈獨孤臣敢忘大義方聖神之獨化㑹傑俊以熙朝羣材並施自成乎大厦一毛雖落誰謂乎無牛曽是庸虚奚為損益惟踐修之常守乃補道之近規雖出下中猶知企及敢作亂倫之首以傷則哲之明輒冒罪誅訖陳情懇伏望皇帝陛下天無私覆物有曲成溥推亭育之仁俯軫蓋髙之聴上全王體下盡私恩儻前畢於祥除或幸存於視息則區區薄志獲伸永慕之懐穆穆清光猶有再瞻之望興言哽塞實切憂惶臣無任號訴屏營之至其詔書不敢捧當謹因某人齎赴闕進納兼奉表陳乞以聞隨第三表劄子臣頃因進對仰奉徳音以為君人之道當正紀律審命令茲謂持重之要蓋禮煩則黷恩過則輕節以制度馭下之操術也祖宗朝臣僚表章之儀朝廷詔荅之體公式所著舊典具存近嵗以來頗逾故事或因勞舊特加異數後來何者遂沿為例既無甄别徒紊憲綱至如兩府起復仁宗朝富弼以宰臣當國釋位服喪五降詔書竟許終制即是起復之命決不可復行至于呉奎召㫖尤峻奎歴陳將相執喪近事亦䝉報允臣昨膺擢用曽未旬浹莫展絲毫之効遽罹荼毒之苦甫經時序三辱璽封銜哀抱愧容身靡所在臣之分恩典已過過此以往恐非所謂正紀律審命令之深㫖也臣已上表披瀝情懇伏望陛下天日光明委照萬物察臣薄守非有詭激寢罷後命以明等威早圖俊賢禆贊國論積精㑹神共熙庶績上以尊乎王體下以全於拙艱苫凷餘息不勝願望謹具劄子以聞樂全集巻二十八
