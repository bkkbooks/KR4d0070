body:
  text: 樂全集卷二十四宋張方平撰論事論國計事臣切惟天之生民以衣食為命聖人因是而為之均節立君臣貴賤等威之分以止其爭且亂故禮也者文飾此者也刑也者防禁此者也凡所謂賞罰法令仁義亷恥皆緣此而後立者也衣食不足何禮刑之有哉內無以保其社稷外無以制其夷狄國非其國矣故貨食者人事之確論非髙談虛辭之可致者也今京師砥平衝會之地連營設衛以當山河之險則是國依兵而立兵待貨食而後可聚此今天下之大勢也臣在仁宗朝慶厯中充三司使嘉祐初再領邦計嘗為朝廷精言此事纍有奏議所陳利害安危之體究其本原冗兵最為大患略計中等禁軍一卒嵗給約五十千十萬人嵗費五百萬緡臣前在三司勘會慶厯五年禁軍之數比景祐以前增置八百六十餘指揮四十餘萬人是增嵗費二千萬緡也太祖皇帝制折杖法免天下徒初置壯城牢城備諸役使謂之廂軍後乃展轉增創軍額今遂與禁軍數目幾等此其嵗增衣糧幾何是皆出于民力則天下安得不困臣慶厯五年取諸路鹽酒商稅嵗課比景德會計録皆增及三數倍以上景德中收商稅四百五十餘萬貫慶厯中一千九百七十五萬餘貫景德中收酒課四百二十八萬餘貫慶厯中收一千七百一十萬餘貫景德中收鹽稅課三百五十五萬餘貫慶厯中收七百一十五萬餘貫但茶亦有增而不多爾天下和買紬絹本以利民初行於河北但資本路軍衣遂通其法以及京東淮南江浙景祐中諸路所買不及二百萬匹慶厯中乃至三百萬匹自爾時及今及二十年但聞比較督責不聞有所寬減也如此浚取天下豈復有遺利自古有國者貨利之入無若是之多其費用亦無若是之廣也昔唐室自天寶之亂肅代之後國力大窘禁軍乏餉畿甸百姓至挼穗以供兵食登都城門以望四方貢奉之至可謂危蹙已然患難既平則兵有時而解兵解則民力紓矣今中外諸軍坐而衣食無有解期天下困敝已如此而上下恬然不圖云救寶元康定中夏戎阻命西師在野既聚軍馬即須入中糧草在京支還交鈔銀錢物帛一嵗約支一千萬貫以上三司無以計置即須內帑供給慶厯二年三年連年支撥內庫銀紬絹只此兩次六百萬匹兩三司以補不足尋即支盡西事巳定二紀于兹中間亦不聞有所處置者邦家不幸大變仍臻頒賚之餘府庫虛匱宿藏舊積蓋無餘幾萬一因之以飢饉加之以冦戎臣恐智者難以善於後矣夫苟且者臣下及身之謀逺慮者陛下國家之計兹事體大在陛下所憂無先於此財計之任雖三司之職日生煩務常程計度簿書期會則在有司至於議有繫於軍國之體事有關於安危之機其根本在於中書樞密院非有司可得預也今夫賦斂必降敕支給必降宣是祖宗規摹二府共司邦計之出入也今欲保大豐財安民固本當自中書樞密院同心協力修明真宗巳前舊典先由兵籍減省以次舉其為弊之大若宗室之制官人之法諸生事造端非簡便者裁而正之至於微末細故於國計盈虛不足為損益屬之有司可矣提其綱則衆目張澄其原則下流清易曰窮則變變則通通則久又曰變而通之以盡利節卦之辭曰節以制度不傷財不害民故傷財害民之事當為制度以節之爾若但遵常守故齪齪細文避猜嫌顧形迹恤浮議而廢逺圖忽人謀而徼天幸日月逝矣嵗不我與後雖噬臍何嗟及矣臣服在近列荷恩三朝竊見時事日以迫急不勝憂憤輒罄狂瞽惟陛下留神省察請裁減賜賚事天下不幸大行皇帝奄棄萬國自仁宗升遐及今未滿四年大禍仍臻內外公私財費不贍再頒優賞府藏虛散臣深惟方今至急莫先財用財用者生民之命為國之本散之甚易聚之實難財用不足生民無以為命國非其國矣祖宗平天下收斂其金帛納之內帑諸庫其所以遺後世之業厚矣自康定慶厯以來發諸宿藏以助興費百年之積謂存空薄竊見赦書其諸軍將校賞給已行支散外至於文武百官既以遷官加恩德澤已厚其諸賜賚若更循嘉祐近例切慮國家財力不堪供給伏乞檢會真宗上仙遺賜仁宗即位頒賚舊事施行乃是先朝體則非由今日裁損所有山陵制度遺詔戒從省約切聞永昭陵修奉之時有司不能恭遵先志張皇勞擾虛費不資供索煩多半成棄物乞下三司及經由州縣凡係科率所及路分當職官吏各據的確名數明立期會務在愛惜官私物力今日月猶賖足以辦集至於諸色用度非所急者不以小嗇為無益而弗為不以小費為無傷而不節深慮經逺之計以底蒸民之生方今之切務莫先於此矣臣等被遇先朝叨處近列身同國之休戚目覩民之利病不敢循默少裨涓塵論時政要務陛下受天明命纂隆大統勵精圖治志在緝熙祖宗之休烈虛懷訪逮思聞嘉言自輔臣近職沃心納説蓋日有以啓迪天聰者矣臣以薄陋久參侍從昨因外徙暫留朝著居無事職不敢請對旒扆今被命守藩奉辭就路敢不少效狂斐微補大猷臣聞治國者知為政之所先則能成天下之務知當世之所急則能通天下之變方今政之所先莫先於簡人材時之所急莫急於足貨食簡人材當精察其誠偽足貨食在屏斥其遊冗推是而言觸類而長之提綱而衆目張矣臣請略舉其概堯舜禹臯陶益稷古今所謂聖君賢臣也書稱堯曰克明俊德平章百姓以協和萬邦言帝堯能明俊德之士任用之以平和章明百官之政故得天下乂安至於舜禹臯陶益稷相與謨治道之要吁嗟相戒率以知人為本且曰知人則哲惟帝其難之夫帝堯猶以知人為難可諒人之難知也若夫天下之廣萬幾之煩故非一人之聰明精慮所能周舉亦在操其要而巳矣今自二府輔臣侍從近列至於左右前後之人其材用淑慝不可不知也知其材用淑慝則陛下之腹心有所付然後庶務可以舉矣以陛下之明而察其言行考其能效參之羣論亦可以得其粗矣若復要其操守觀其履久而益審則盡其精者矣此所謂簡人材之大略也方今中外庶務積習頽弛兵籍猥多而不精練吏員猥多而智效一官者少至於宫省之事體宗室之禮分制度不立苟為因循國計不贍民生日匱此所謂斥遊冗之大略也或曰持盈守成之道當循舊章兹所謂淺近之常談不知時務者也今日之政其敝豈可不救譬之琴瑟不調甚者況當陛下始初健粹天下想望朝廷丰采傾耳以聽惟新之令蓋人心惟危道心惟微惟精惟一允執厥中發而中節斯謂之中事舉其中無過可矣若曰恬而無以為也何異大厦有風雨之患而不知葺病者有膚腠之爽而不知療良匠善醫豈應若是臣今所言所謂舉其槩者譬之文章為發題爾陛下以臣言稍合於理試舉此題以詢諸可顧問者必有能推廣利害詳為條對又以見臣下之器識庶於海嶽薄增塵露論治道大體陛下即阼以來顧諟天之明命慮而後言議而後動欲以身先而率天下以正可謂盛德矣然始初清明中外觀德朝廷風體顧當先其大者逺者若夫厚風俗美教化修典刑正紀律以通天下之志以成天下之務此今之所當先者也而近日政令未見有可以慰天下之心者而但聞利害相傾愛惡相攻議論紛紜斥免繼踵臣恐四方有以窺時政者矣國家設官分職置臺諫官臺官以究邪慝繩愆違肅朝倫諫官以拾遺補缺規君過歷代具員各揚其職仁宗虛懷盡下容納無擇先帝英明健粹令出惟行陛下祗遵成憲以端治本王道正直在執厥中所言是耶事固當無大而必從所言非也事亦當無小而必察取其至當何所依違天無私覆日月無私照帝王之心如是而已矣又方今朝廷之大弊政事所以因循人情所以不盡止為避煩言恤形迹事小嫌廢大體名曰公道其實徇私名曰慎重其實苟且以此為適治之路是猶北轅而之楚也伏願陛下廓大明恢遠度有以率勵羣下革此敝風俾協恭和衷共成雅俗如此則君體以尊人倫以穆紀律可得而正風俗庶幾乎厚陛下以此圖於執政推是而廣之觸類而長之治路由此而適顧為近爾論消復災異治平三年臣自到闕伏見陛下以垂象之變避正殿減膳降服恤刑罷宴徹樂聲弛力役所以修省答天戒者甚至竊聞退就宫閣尤為憂勞至以聖躬為民祈請臣深惟陛下以上聖之資自在藩邸其稽古好德令聞夙著於四方繼天纂統越今四年始初清明厲精求治然未聞有以修明紀律震耀威靈以究安危治亂根本之議也前史推彗星之占率以為除舊布新之象中外之因循久矣官失其守事忘其舊綱目頽紊憲章隳弛天其或者儻將以是為告先賢以為政譬之鼓琴瑟不調甚者必當解而更張之竊觀朝政殊未遑及此晉書紀何曽傳曽侍武帝退而告其子曰吾每對見未嘗聞經國逺圖惟説平生常事非貽厥孫謀之兆也及身而已後嗣其殆乎後天下亂危果如其言今夫萬幾庶政屬在兩府願陛下以燕暇之時就清間之處延召執政之臣從容賜坐垂意訪逮各使悉心陳治道之要以陛下之明而擇參其言舉其可施行者以興敝舉廢救時急務匪惟修人事抑以承天意又比來災眚間作率由隂沴夫隂也者臣道也妻道也夷狄之道也庶民之象也陛下推是而求之則天意可見而消復之道得矣惟陛下留神幸察請郊祀用新樂事臣前承宣詔崇政殿觀新樂近又聞聖旨以將來南郊且用舊樂令兩制詳定伏以後周樂律本王朴竇儼之所考正朴既人傑儼亦通儒制作所傳必貫精義按朴疏云自秦而下旋宫聲廢自漢至隋垂十代凡數百年所存者黃鍾之宫一調而已十二律中惟用七聲其餘五律謂之啞鍾唐太宗用祖孝孫張文收考定雅樂而旋宫八十四調復見於時唐末之亂工器都盡購募不獲文記亦亡集官詳酌終不知其制度梁及後唐晉漢缺壞尤甚至於十二鎛鍾不復通其聲律但循環而擊之編鍾編磬具儀而已絲竹匏土僅有七聲作黃鍾之宫一調亦不和備其餘八十三調於是乎泯絶世宗臨視鍾虡患雅聲淪替乃命竇儼考詳八音粗加和會以朴通於律厯宣示古今樂録令加討論朴遂依周法以秬黍定尺作律準十三絃分尺寸設柱以準十二管之聲十二聲中旋用七聲為均旋宫之聲久絶由朴而復出遂命太常按習國初因之後太祖以雅樂聲髙近於哀思不合中和因詔和峴審詳其理峴言王朴黍尺較西京銅望臬古制石尺短四分樂聲之髙良由於此乃詔依古法創新尺并黃鍾九寸管令工人品校其聲果下於王朴所定管一律遂重造十二管取聲自此樂音和暢景德中御史上言太常樂器多損音律不調先皇命李宗諤考較課習既而親臨閲之亦先以律準定鍾石自是樂府寖有制度陛下自景祐以來講求樂事於時李照輩各率所見議論不經制作乖方尋亦廢罷聖心深維治本以禮樂為大事故孜孜考逮必欲盡其精要考音制器蓋已詳備矣在周王朴雖造律準略定八音爾時方經略四方用干戈征伐海內日不暇給蓋但編次舊器考擊粗諧會而已藝祖詔和峴重定律尺亦未嘗有所改造也今陛下既合衆議新作金石試之廣廷聲律又協此乃藝祖之遺意先皇之逺懷夫又何疑成而不用夫樂本於人心成聲於物聲既和而反感於人心者也先王以是交人神變風俗其用大矣然歷代之審音者常鮮其人又音樂之妙非淺學所及應于耳而通於心然後能達其精微之致儒生學者按文泥古局于形器制度之間而不自知律吕本于自然之道音官藝人記其搏拊節奏之序而不能知教化之原臣往年嘗蒙宣示樂府要略竊以蒙昧妄為注解即知聖心之于樂律通達本于天縱也外廷諸臣不足以仰望清光預制作之議今郊祀日近乞令太常勒工人按肄新器使益精習用之禮天地薦祖宗以伸陛下之孝誠則積年之勤亦不虛設無煩過事謙損以稽盛節論君前臣名事臣聞君尊臣卑人倫大義所以立朝廷之體定上下之分不易之道也故君前臣名著自上古陛下紹膺寶命光宅萬邦降意虛懷優遇羣下小大之臣進對率稱其官此乃等夷相推民吏奉上之言非所以正尊極而隆堂陛明王制而崇主威也孔子曰必也正名乎名不正則言不順言不順則事不成以至禮樂不興刑罰不中真宗嗣立之始厚待先朝宰臣吕端李沆初不呼名二臣上表固辭尋如常禮陛下厯數在躬及兹四年君臣之際尊卑之分别嫌明微在乎言動願陛下總攬權綱威恩並用呼官過禮乞從寢削曰公曰卿足正名分長轡逺馭使無遺力則百職並修庶務以濟此逺者大者之體也論宗室賜名事臣昨受敕修宗正寺玉牒臣先於慶厯年中嘗領此職近閲屬籍文簿仍是慶厯七年八月臣所修進及今二十年不曽復行編纂慶厯七年所進屬籍皇族已賜名授官除前著籍外其新立籍五百八十八員其未賜名授官者猶有二百五人共一千八十有餘員上通聖祖及廟諱并已前薨卒落籍者凡一名即同音諸字皆為相犯又諸文字如日月水火等不可為名者甚多以此近年所賜宗室名不成文理無復義訓竊慮接續更賜名授官者下本司撰名益更鄙俗稱呼不便謹按禮經上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭穆人道竭矣故四世而緦服之窮也五世袒免殺同姓也六世親盡無屬名矣按屬籍所連名太祖皇帝之後曰德曰惟曰從曰守曰世曰令曰子太宗皇帝之後曰元曰允曰宗曰仲曰士曰丕秦悼王之後曰德曰承曰克曰叔曰之曰公則世數可推也國家鼎祚無疆宗支蕃衍但據即今人數已為無字可名欲乞下有司檢會諸屬絶無服之親今後賜名其同音異字並許撰進合係連名者亦乞朝廷詳定指揮論王府官屬事竊惟潁王地居嫡長春秋鼎盛方今稽古向學修誠進德若其左右前後有位之士所以朝夕納誨咨告法度出入起居罔有不欽一有元良萬國以正社稷之本也今慎簡宫僚進用時俊嵗年之間即復遷易於此假途以升要近乃令搢紳之列指為仕宦捷徑非所以資王之重也願留聖慮申諭執政王府記室顧當兼用詞翰之選至於翊善保傅之業也宜於兩省以上推擇老成舊望行安而節和者得以久處其職俾典領宫中之政至于侍御僕從便僻側媚以非正之事云為者察而聞於王小者懲戒大者上聞而斥之無有憸人得在王門以著王之令聞兹國家無疆之休惟陛下留神幸察請慎用兩制資序事伏以知制誥之職所以代王言為誥令由此召入禁林充學士非才譽允洽何以當其選比來朝廷率以體例補次日近誥命或有淺鄙傳為口實前代國家有事之際或以單札之辭折衝千里之外使三軍感勵萬方悅勸背逆凶醜或以革心邉方外域或以向化故知文詞書命有足以助國威宣王澤也祖宗之世有自州縣之職拔處辭禁有自兩禁黜為管庫者蓋惟才而是用豈為人而擇官其修起居注史館修撰即次除知制誥之資序也今朝士不修亷恥至冒憲章法座之前輒自干請竊謂若此除授宜詳加推擇必其人流才地辭學器識他日可以備大臣之用而後擢處其職文物盛於本朝光華照於天下使名器以重堂陛以隆論進用臺諫官事體伏見天禧元年初復臺諫官詔敕云所置臺諫官三年內不得差出仍不兼領職務候及三年或屢冇章疏實能裨益特越常例别與升遷若職業蔑聞言事無取移授散秩仍遣監臨比來朝廷命臺諫官甚異先朝本意蓋臺諫官之設所以切摩理體助為聰明非使其生事招搖為仕宦捷徑也粵自近年增置員數而又進擢殊速聽用過當頗開朋黨險危善良鼓動風波淪胥以敗比雖易轍尚存遺俗不有丕變曷扶國體乞今後應臺諫官宜如天禧詔敕俾之久於其職以觀其效倘於政令無所發明雖有奏論不適理道稍明黜陟用勵公忠庶明治方以風化下請致仕官免舉官連坐事伏見法寺奏斷命官使臣贓罪案後收繫舉主其間或有已致仕官等例皆行勘依法同坐夫保任之制同坐之文所以懲謬舉然知人之明聖賢所難今夫任人於朝而終身共其纍既已重矣其在仕途猶可以布耳目聽察其人之所為變節者得以自聞其致仕官已去仕籍所任之官聲迹不接有才勞則賞典不及罹罪辟則坐纍如初彼縉紳大夫之能保名節引年謝事朝廷宜有以優禮之若之何猶使刀筆之吏以非其身之過從而責之臣恐有以傷風教也伏乞聖慈溥加矜察今後官吏犯贓罪舉主有巳致仕者更免收繫同坐請刪定敕令竊見天聖中刪定編敕於今纍年比來鄙庸之人意慮淺近不識大體妄陳利害朝廷輕聽往往行下自邊事之後末議蜂起條令錯出舊章淆亂郡縣承用益駮姦吏因緣出入為弊導民偷薄動開爭端亂獄滋豐民用怨苦臣聞天何言哉四時行焉簡易以信之謂也方今之政所謂文敝其民利而巧蕩而弗靜勝而無恥為救之道在簡而信臣愚謂宜刋定法令以明示民選命近臣達政體通時務者三兩員慎舉京朝官之明曉法意練習民事者五七員類聚天聖編敕後條令其毛細苛冗者蠲除之違異重復者考正之必事理精審條目簡便有輔於政者存為著令夫子曰古之知法者省刑本也今之知法者不失有罪末矣夫然後官知守法吏息舞文民有措其手足兹當今之切務也請減刺配刑名按歷代刑法之制蓋自漢文帝除肉刑而用箠令於後沿革世有增減大體笞杖徒流大辟為法五等至隋髙熲以經世之才議定科律笞以一十至五十杖以六十至一百徒以一年至三年流以一千里至二千里大辟以絞斬蠲損前代鞭刑梟首轘裂之法輕重之準識者以為盡天下之平唐室遵用惟加流刑以二千里至三千里然而笞杖皆用竹其徒流者不加杖若加杖者即免役諸犯徒應居作者在京送將作監婦人送少府監縫作在外者供當處官役婦人配舂犯流應配者三年俱役一年加役流者流三千里役三年若家無兼丁與工樂雜户太常音聲人及習天文并給使散使者方加杖免役還依本色皇朝建隆四年太祖皇帝神智英武自立一王之法始建折杖之制一百折二十以次為差杖制用木而大於箠各有輕重之令犯徒者加杖免役犯流者加杖配役其情罪尤重者更為加杖刺配之法逮今百年雖纍聖以慈恕御天下欽恤慘怛留神刑典而科禁條章其實煩密四朝編敕自建隆開寶興國淳化咸平祥符天聖慶厯八經詳定門目寖廣其刺配之條比前代絶重前代加役流既不加杖又役滿即放或會赦即免今刺配者先具徒流杖之刑而更黥刺服役終身其配逺惡州軍者無復地里之限祖宗之世比條尚稀臣嘗檢會祥符編敕刺配之罪四十六條天聖編敕五十四條今慶厯編敕九十九條諸係禁奏取旨又七十一條比之天聖蓋已增倍其間亦有一條該刑名數節詳而究之比祥符敕幾三倍矣錮械係纍扶老攜幼道路相望不得至配所而死溝壑者蓋不可勝計州郡積多往往奏乞住配臣恐更歷年載逺方小郡流配益衆漸成淵藪其強猾不逞念已隔絶鄉里親戚不復更自顧藉厲階患萌亦嘗起於所忽也故臣前曽上言乞差官據慶厯編敕及續降敕諸刺配條重行詳定議從減除其情理蠧害顯為人患不可存之鄉里者須用此法諸緣茶鹽酒麴銅礬冒禁以規財利之類約見行刑名輕重别立居役之法合配逺惡州軍者令實役七年配三千里外者六年千里外者五年鄰州者三年並供當處官役不用赦降原免人情安土且開自新之路減遞送之勞息流離之苦州郡役事亦足資助譬招募本城役兵頗省衣糧之給又以少清刑本上洽和氣消逺方之釁兆廣仁政之大體其於治道實繫慘舒請節録唐書紀傳進御荀子曰聖王有百吾孰法焉欲觀聖王之迹則於其粲然者矣禹湯有傳政而不若周之察也非無善政也久故也傳者久則論略近則論詳當今之世而君必談堯舜臣必稱禹稷是拘儒迂生之談非適時濟用者也伏以唐代有天下三百年其間治亂得失詳矣朝廷立國之紀典刑制度因於唐者也故觀今之政唐氏最近臣以不敏忝職諫司思有以薦乙夜之親程廣觀文之典學欲乞今後節略唐書紀傳中事迹今可施行有益治道者間録一兩條上進伏乞萬幾之暇特賜開覽善者可以為準的惡者可以為鑒戒兹亦賈誼朝錯借秦以喻漢意也論同天節錫宴誕辰紀節自唐明皇天下承平務為盛事宰臣張説請以誕日為千秋節相沿至今為大慶會州郡宴設廣作勞費煩擾百姓敝事甚多搜求庖味兼諸水陸是日四方暴殄天物不可勝計唐貞觀中太宗嘗謂侍臣曰今日是朕生日俗以生日喜樂在朕之心翻成感思詩曰哀哀父母生我劬勞奈何以劬勞之辰更為喜樂之事也今大行梓宮在殯將來同天節願陛下特降御札天下州郡錫宴只用酒果素膳誠為得禮以此仁心儉德足以昭奉先之孝廣及物之慈著之於令貽憲後王兹盛德之舉也論變更舊制事熙寧三年正月臣蒙恩朝對今已奉辭竊惟孤陋之質尚偶聖神之會上膺眷遇有異等倫今承特詔而來安敢緘默而去輒獻愚忠上裨天聽臣聞人心惟危患生所忽動危甚易安之實難禁衛六軍邊防三路撫御之法善制具存民心戎事國之大本動靜之機安危所繫若民心危搖戎事興動䇿慮一失綏輯非易祖宗謨烈國家大計甚所慎重惟此二者不同小事宜隨改易縱有利害容得更張民猶水也可以載舟亦可以覆舟兵猶火也可以焚物亦可以自焚焚溺之害當在幾之先見造形而悟已是後時害成乃悔何嗟及矣夫人臣之分出處是常家國大業天下重器譬之輜重豈可輕離願陛下思所以置器於安審所以藏身之固廣聰聽於符同之外採公議於得失之前深察軍民之情厚為社稷之慮使人安其業上下無怨溥天之下欣戴盛德髙拱巖廊之上保此泰山之安朝廷尊而國體平順氣應而嘉生遂不亦休哉臣疏外狂瞽不識忌諱以此愚言上答恩眷退就誅殛實所甘心論水害修隄防事竊惟水之為利害大矣夫欲捍水患全地利非惟開通溝洫亦當修築隄防今諸州縣有古之障水基迹往往存者循而視之蓋古人之勤民其用意周矣頃來因積水言功利者乃欲決舊障以通壅塞不慮為害更廣乞下有司凡議水事檢行通塞利害者必令兼度地形因髙卑之勢可成隄障之處為之增修導水就下則中平之田得以稼穡租稅入官是為公私之利其舊隄障令州縣常為補築頽缺無令民得擅隳鑿斯亦於水之利害一端也論京東飢饉請行賑救事天災流行國家代有惟其有備恃以無恐近者旱蝗上貽憂軫京東聞已雨足然二麥不收比至秋成尚隔明月此路民尤暴悍輕為冦劫不加賑恤必擾鄉閭明道年中京東飢本路公私無蓄積朝廷憂之乃泝淮濟以至轉海運糧斛水道艱阻比至多後時無以救荒應卒伏見京東每嵗上供斛斗六十萬石其斛斗多在淄齊州界旋撥綱船輦運上京臣昨在徐鄆間見緣河諸倉頗有貯積見今五丈河綱運不絶乞速令且住裝發其已裝發在路者自曹濟廣濟軍隨處卸納留充賑濟一二百里內州縣人户並可各隨近便赴倉支給也以至河北東路州縣飢民亦可救賙得及陜西亦有上供小麥三十萬石可以截留應接本路今京城出糶倉糧價甚賤且留兩路一嵗上供之數乃是以有餘補不足也見差安撫使將辭行兹亦少副臨遣恩旨許州潁州舉人父老僧道詣闕進奏以皇帝自忠武軍節度使潁王即位乞恩澤事令兩制定歸一處臣等伏詳國朝之制太宗皇帝自開封尹晉王即位真宗皇帝自開封尹壽王册為皇太子即位仁宗皇帝自建康節度江寧尹升王册為皇太子即位纍朝即無推恩舊領封鎮故事大行皇帝自齊州防禦使即位本州舉人父老僧道詣闕進奏故有推恩近例今皇帝以忠武軍節度潁王已降制册為皇太子即位事與先朝有異今據兩州所援恩例事出僥幸皆是妄作干請兼别無典故稽考乞各勒還本貫論除兵官事昨因登對伏承顧問選補軍職舊事臣竊觀國朝故事所除軍職或以邊功或以勞舊或以肺腑據其資任視其履歷有即直除馬步軍副指揮使都虞候者不必自四廂稍遷其例甚多近日所補軍職人材器略多無素望至於纍勞亦無顯效短中取長苟備員而已又遞遷迅速曽微事功如郭逵自諸司使除龍神衛四廂都指揮使不五年已遷殿前都虞候舊事儻未有人且虛其員俾之兼權以待勞能未為妨闕臣伏見濟州防禦使向傳範資性謹重和而有守典藩有政常居課最沂州防禦使劉永年綽有武幹理戎嚴整數守邊郡頗著風績此皆閥閲舊門地連戚屬右職之中可以寄任閣門使嘉州團練使劉几自康定慶厯初昊賊初叛命即在西路久效驅馳從征嶺南備更任使其人履歷出郭逵之右逺甚此皆可以屬之禁衛者也伏望陛下更加察訪以備委用論補軍職昨差出許懷德後馬步軍皆闕都帥遂自環慶路抽回殿前都虞候王元令權勾當步軍司公事其王元又已年老衰病至于總司軍政亦恐精力不逮切以殿前馬步軍逐司公事不少非惟統率宿衛務要衆整亦須諳熟軍制稍通吏用太宗朝侍衛都虞候以上常至十員職位相亞易於遷改且使軍伍素相服習邊藩緩急亦得選用先朝時馬步軍當闕帥殿前都指揮使髙瓊頗知軍中舊事上言及此先帝甚然之今內則禁兵寖驕極須彈壓外則邊患不測常資防備昭亮王元恐未任專幹心膂除郭承祐好進多事纍被彈奏不堪入典禁軍外乞於以次管軍將校中擇取一兩人赴闕分總禁衛佐佑扈翼於體為便樂全集卷二十四
