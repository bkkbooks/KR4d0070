body:
  text: 樂全集卷八宋張方平撰芻蕘論選舉論臣聞設官所以共理擇才所以任官夫位職祿三者官之紀也德才勞三者人之分也度德居位量才賦職計勞詔祿興王所以治德不稱位才不任職勞㣲祿重衰世所以亂惟君司牧兆庶惟理亂在庶官惟賢惟能其難其慎古先明王育才考德之道至矣周之取士爰始庠塾郷老舉秀茂而賓其禮司徒教行藝而升諸學樂正品俊造而進其名司馬辨官材而定其論而後天官執其柄而詔其爵内史書其貳而制其祿司士掌其版而知其數小宰平其計而弊其治葢其官人之法如是之詳漢之取士亦始郷邑自幹佐曹史見拔州郡復辟公府更舉髙第始出除吏其郡國所送孝秀或公車延召諸罷職待詔者悉居三署光祿嵗察四行茂材亷吏方補用焉至於魏氏疆宇分蹙兵戎罹亂衣冠僑轉陳羣立九品之法而選舉始濫中正定髙下以署品吏部據升降而授任其後法雖益壞議者紛起而終不能革歴六代而至隋中正始罷夫進士科者設自隋煬緜於唐而我循之可謂浸淫而蕃大矣為業益浮入仕益易唐考貢士之制專委有司嵗第殊鮮雖升名王府而未階仕牒再試於吏部有屢斥焉其中格者補畿赤丞尉爾其不中格者或例赴選曹之集從事藩侯之府必外效有著而真命始加我太祖之初受命也王畧猶梗人物葢希進士登科嵗無十數抑於時文法闊畧吏員簡疎嘗聞郡自牧長而下或數員而已爰及太宗治致泰平教風寖盛丕冒出日一統無外且喜天下英俊盡入彀中始親御便殿以臨試貢士博於采拔務盡乎人材待以不次驟升乎美仕國初進士甲科授司冦或幕職官興國之初始授等甲京朝官倅大郡或即授直館者進士中第多至七百人後遂為例至今興國已降遂為常規然凡諸為士之民惟此為干祿之路儒術治國誠王道之大經文藝起家固儒林之盛選是以天下學士靡然嚮風非惟道化所陶抑由寵利所誘也夫子曰以言取人必極其言而考言彌華於道所以紳行乏稽古之識端甫鮮經時之論涖官少稱職之吏臨事無仗義之節風俗有流薄之損朝廷成掄選之濫豈不由乎易取而驟用之乎此張衡所以深憤嫉於漢日楊綰所以議革廢於唐年且三王之道不能無弊故董仲舒譬之琴瑟不調甚者必解而更張之夫周之造士論材始乎庠序至漢而興亷舉孝自諸鄉里至順帝凡三百年而左雄建議諸生試章句文吏課牋奏而為限年之格又百年而魏陳羣設九品官人之制又三百年而隋文立志行脩謹清平幹濟之目次及煬帝更制進士詞賦之科此皆歴代舉選之道因時之宜更救其失猶三代忠質文之政以革敝易化者也伏惟朝廷取賢斂才之方故亦並開數路惟是進士最廣而甚夷鼎司台席之崇玉署金閨之彦更處乎館殿參布乎臺省國之綱紀民之君師百辟衆官其清涂要地者何莫由斯而起歟雖名臣輩出而淆濫為多其故由乎取之泛也以周漢育士之詳而不能盡善良又況採一日之伎昧素定之價若之何責以無濫也歟夫以唐世之制專委有司者則利在乎才者必不遺弊在乎啟奔馳之徑而平素者絀焉以今日之法則利在乎使人循道以求已弊在乎得者不必才才者不必得而勸勵之教怠焉其利害相形之理思所以折之必有短長矣至如儒術之㣲削思所以振重之士節之陵遲思所以興起之皆國家教化之端王政之本聊用窺測以著於篇凡資任子弟𨽻名國子監立格試業補用論臣聞古有四民皆世其業則象賢世祿為古之道然三王世代必教諸學藝成德就乃辨材而官之故舜命䕫典樂教胄子夏氏大小之學商人左右之序皆所以教國子也周官大司樂掌成均之法以治建國之學政而合國之子弟王太子王子羣后之世子卿大夫元士之適子國之俊選皆造焉崇以詩書之教詔以德行之媺干羽絃誦凡學必時脩六禮以節其性明七教以興其德比年考校至於大成然後論材定位而官使之漢制中二千石九卿得任子弟為郎或没於刺守名績流著亦蒙恩典錄其後嗣凡三署郎悉屬光祿勲更直宿衛嵗察亷茂舉四行才迹優顯始䝉選舉銓居髙第方出補長丞下自魏晉迄於唐朝臣寮有功利及民勞效在國始被恩澤賜一子官褒勵勸賞其義甚大臣竊覩朝制凡職參侍從班在兩省無間中外嵗至誕節輒任京官一人郎官卿監外臺亷刺凡及郊禮輒任選職一人又近制貟外而兼館閣得視正郎之秩三丞而請致仕亦荷門子之祿誠由盛世一統溥天無外銓除路廣郡縣員多足以霶洒王澤周冒纖㣲之品奬勸羣吏無為子孫之憂然臣之愚意竊有不足者夫賞延於世雖盛世之典而能不當官亦先賢所誡今仕任之涂益廣顧教育之道未施且世祿之家鮮克由禮膏粱之族子弟易驕夫其生享豐餘之養習見逸欲之靡而不淬礪以先王道德恭儉之言陶染以古賢孝友祗庸之訓是使立身之道不篤涖官之法不脩罔知小人作業之勞不念稼穡艱難之勤家緖速淪世美鮮濟故宜然矣彼性知禮義之貴心存藝文之樂卓爾而立不入於邪令器自成其亦幾族是以古者作為膠學聚而教之非惟為國造士固乃為臣立家也臣伏請凡今之子弟以資任入仕者宜悉籍於太學其在都者令日入肄業遵古齒序之禮臣聞師嚴而後教尊欲尊乎教在嚴其師欲師之嚴在重其位伏願於朝士中擇宿儒清德名素在人者正授博士明立教條使行師弟子之禮以肅之比年考校顯勤罰惰及三年則大比能精一大經量䇿時務而通者送吏部依資補用其未精通者復留進業必及格始得除吏其在外者以大比時赴集升降同之傳曰學以從政不聞以政入學故夫學古入官量才授任著諸典訓若何捨之如此則名為資任實經誨育雖髙華之胄有寒素之業也父兄必加夙夜之訓子弟必勤講脩之志勸勵之道立庠序之教興朝多世德之家官獲稱職之吏仰補時政旁恢治法非邦教之大者歟復舉孝㢘臣聞善論士者先行而後藝善官才者奬本而礪末故子曰孝弟也者其為仁之本與先王之臨天下也正其大倫長其義節務隆道化使民歸厚故周官司徒以鄉三物教萬民而賓興之其一曰六行實先孝友漢制始復孝弟而得拜官武帝遂以孝亷名科郡國不舉孝以不恭論不察亷者免漢之得人雖稱數路最近王道兹制為篤歴世而下風教寖㣲豈古今之俗殊葢勸導之方淺且人才行鮮克相兼以慶建之謹厚不通舒誼之經術以黯式之質直又乏遷向之文雅而今官人之格葢進士明經世家而已孝如曽閔莫希勸駕之遣亷若夷范不入辨材之論臣愚以為宜復孝亷之科自兩府大臣各歳舉一人而天下歲貢委於外臺其有持身端事親孝生養以禮没喪有聞友于兄弟睦于族親為姻黨所宗慕為里閭之歸仰者可許鄉人署行列狀於縣縣大夫詢於衆而實升之於州州長審訪如所署以聞外臺外臺㑹部郡所上各考次其行陟其尤異者一道嵗取三人焉獻於天子不必備惟其人其渉知文義頗通經業者命有司量策以時務隨才而叙官之其行實誠著而殊昧於學藝者可寵以上佐助教冗散之秩復其家勿徭臣聞動人以行不以言行教以厚不以薄葢經術者仁義之糟粕文章者經術之駕説夫躬行其道而不見顯異顧獨駕説之尚臣疑旌勸之術未為盡也且世家廕補嵗以百數二科取士一開貢闈而第者以千計雜流冗仕不在焉誠叅以孝亷之舉則勸善勵俗之方不益備乎記曰上舉孝則民不遺其親上察亷則民不黷於行邑取一人焉一邑之人勸動矣州舉一人焉一州之人聳礪矣天下之為人父兄者莫不朂其子弟天下之為人子弟者莫不勉其行之在其身也故夫厚人倫移風俗美教化其惟進孝亷之士乎選格臣聞選舉之法自周漢至隋凡六革夫惟更張以救其弊立制以宜其時得政之體也且人情安於久習時論重乎改作道者寡而泥者衆倡者孤而沮者羣是故因循之患政之大病古今所同也昔後漢左雄以亷茂之陵遲郡國因緣多濫始建議諸察舉者皆先詣公府諸生試經業文吏課牋奏副之端門練其虛實而拘以限年之法於時胡廣郭䖍駁於前張衡黃瓊非於後上獨信嚮雄議得行自雄在尚書歴十餘年天下無敢妄舉朝廷稱為得人後世識者方善其制故知昧時之經者必循名以遺實達政之方者乃收實而後名駁於前者是疑其胷臆之説善於後者是見其耳目之效也唐代宗時楊綰以貢舉之弊建議請廢明經進士之科而復鄉舉里選之法詔下其議而在廷之臣多同於綰遂行其制後近臣淺滯者或論其不便上不能持旋以復舊今二科之弊獨在乎泛濫猥多而取之不能精或實學而見遺或下材而髙第然天下所以未厭者以國家處之以至公而有司不得措其私此所以人自循已反之於命不復咎於法也且二帝之廷疇咨仄陋三王之盛感發夢卜至於兩漢士束脩於衡蓽而辟書在門魏晉之際操行内著清議外同夫使士以謹身篤行為無益寵名爵祿為儻來成苟然之俗敗奮勵之節是於政體不已虧乎今一啟禮闈仕逾千數銓衡依等以注授郡縣無員以除遣乃復過期停罷遷延嵗月則是賢愚同滯涇渭一波不審源而塞其流不計本而抑其末也臣愚以為宜畧比唐制依其甲品設為選限其在殊等特承優恩請循舊即除以旌髙業餘當入選率從限格其能決别科目自當更䝉賞拔且唐以明經進士為及第宏詞㧞萃為出身及第者雖有籍王府而未階仕牒乃辨材定論之名出身者始著錄官板而涖行公政有為臣主之義故夫以二科羅衆士以詔舉擢異材以選限難濫進數路而取為制其備若國行盛禮覃慶四方凡名選人復當普叙伏請初入選者稍宜異其節文可委自刺守察其鄉論有一介之節一善之長令以名聞即為注授其不預舉必滿選期凡今之士流鮮自敦飭學業務乎苟就進取規乎速至且民之情偽動息事之險阻艱難古為政者必周知之自非賈生終軍之妙齡甘竒辟疆之神敏則雖有明悟之性或多輕簡之失今夫立選以重其進設舉以勉其立則必人自磨礪家自教朂終始脩整務為鎡基自然人知謹身之勸士免去業之速民里有恭讓之義場屋息争逐之末官局得才良之吏銓調省煩積之員肅其風聲端其教節不亦優乎川嶺舉人便宜臣聞唐因隋制以二科取士然諸侯得自辟署仕進路廣不專科第多由藩幕入登王朝又閩嶺黔峽士人殊鮮兩河之外後為冦境帝都闗中近乎巴蜀故禮闈可以嵗啟選第不逾十人開元天寳舉人或至二千人然登第者百才收一我太祖朝其風猶在抑亦王度草創人物希少及舉荆蜀下江廣收閩越定太原武事偃罷文物寖昌興國已來取士益廣風教遐被海㝢大同曳博帯於文身誦聖言於鴂舌甌閩之俗編戶待乎賓興邛髳之鄉比閭思乎隨計踰劍者崎嶇萬里度嶺者徃復一年故禮闈不可嵗開而賢者能者同時而滯塞貢士必當廣取而猥者濫者一槩而混淆且其遠方之人顧有可售之伎雖䝉續食莫拔窮巷之身弗預充庭遂斷亨衢之望託於遐陋誠有可嗟臣伏請凡當秋賦之年禮部既以三月上請即頒示逺方其嶺南兩川即於中夏發薦其預薦名者嶺南諸郡送廣州兩川諸郡送益州委二府如禮部式考試當試時本路轉運使及州長吏監考於部郡選差文學才望有聞者為試官朝廷特遣臺閣臣寮一人傳詣監試比嵗之杪取令畢事其當解人即遣至都附南省牓送預廷試其不預解人即依到省叙舉其廷試下第者既還本貫許本路計使差充攝官如此則遠人免﨑嶇之勞寒士無廢棄之歎土俗以鄉舉而民勸禮闈得人省而考精矣難者曰今禮部考試選委大臣遍擇館殿博用才良以司考校又糊名轉錄以防私濫誠重難其事矣捨是而委二府其曰可乎臣對曰彼岷嶺雖狹然各踰百城官吏數百計皆王朝任用銓衡選補二府長吏國之重寄兩臺使者朝必慎擇誠復遣臺閣才臣就而監之嚴其法制明其條約重其委付信其命令可遙御矣如唐時分選於洛邑放第於東都其制近之矣况此試時官集諸州匪容私請權分當手當由公共且方為薦發之地豈預名器之柄理無疑者於何不安難者曰夫變常危事改作惡名今夫二府之選多則長濫鮮則召怨且衆聚焉非國家綏逺之術也臣對曰夫變常之事危改作之名惡為其乖民情而動也變之順衆改之就利何危而惡乎臣嘗見禮闈川廣之貢士各纔百人夫豈衆之謂哉且二方之士趨赴試集徃復幾年驅涉萬里入四海之衆多角無涯之得失或數罷退鮮不告勞今使不出郷闗坐而就舉藝學相委名稱相聞就有取捨皆其土人擇一方之官吏考百人之所試取之必精又何濫之長退之以禮復何怨之召故臣謂之便理可詳矣謹論樂全集卷八
