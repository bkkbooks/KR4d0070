body:
  text: 樂全集卷二十宋張方平撰論事陳政事三條臣嘗讀前史率以臣下敢諫為美蓋斥時之忌犯主之顔色人臣最難事臣不佞待罪諫曹涉赤墀歷文陛以望清光者無虛月矣論事無指切無疏謬無不蒙收威容受竊自惟遭時之幸而齪齪淺致暗于大道不能激昻風義有所感發愧不任職為公朝羞夙宵以慮紓過責者略條三事以聞惟陛下留神省察伏以今日之事最切者在乎明賞罰辨欺誣通謀議審兹三者則內可以正軌度外可以遏寇虐致治之本致效為速何謂明賞罰臣聞善為國者必先正賞罰之分賞罰必行則人以生為辱以死為榮人不畏死舉天下易於反掌况以討賊乎及駕馭失所紀律不振則以僥幸為賞姑息為罰雖賞而士不知恩雖罰而下不畏威上習因循下懷顧慮則人將援其手而不前况使之赴患難乎自西邊騷動事之三年矣賊昊雖驍猾一鬬將之材爾非有逺圖大志英雄之略其幸者資適逢時而巳時久人寧戎備不戒廟堂無受成之算疆圉乏制勝之䇿自延州之圍好水定川之敗覆軍殺將沮喪威靈皆由自驅師徒投之死地當總帥之重無待罪者朝廷專用姑息莫正其罰且自賊始叛授夏竦旄鉞韓琦等副之統制四路并護諸將凡三大舉竒輪不返使封豕長蛇肆踐食之暴邊亭千里蕭然一空賦輸興發天下被其勞交黨株連公議不立至于不得巳但解其總帥以所居官內徙便郡而巳又如并州比緣賊入麟府朝廷以方面之重難於謀帥遂以名使楊偕寄任方面而處事踈略陳請謬悠駭于人聽夫麟府輔車相依而為河東之蔽無麟州則府州孤危國家備河東重戍正當在麟府使麟府不能制賊後則大河以東孰可守者故麟府之於并代猶手臂之捍頭目也而其上議欲棄其地既知才之不足用也顧猶以近職領河北重藩如是而欲收功是北轅而適楚也及乎鋒鏑之下矢石之前奮命小臣論功行賞一資一級分毫析銖惟恐比例之過臣觀歷代英主良臣用賞罰之理蓋威罰之行當自貴者始恩賞所被當由賤者先故罰一貴臣當其罪則天下懼賞一賤士當其勤則天下勸臣不敢煩引往事我朝祖宗之所以駕馭臣下操威恩之用其事耳目所接也往往能言之陛下萬機暇時試廣訪逮必有得也凡大賞罰人主之事非聖心自出臣下不敢任之以故僥幸姑息生於依違即欲杜僥幸之門革姑息之弊惟在陛下於議賞罰之際少垂主斷爾罪罰所當加勿以貴要而隱忍恩賞所宜及勿以微賤而輕廢擬議一立勿容姦讒巧言熒惑變亂則恩威明矣何謂辨欺誣方今之弊人以僥幸為心政以姑息為用正謂欺誣得行也夫欺誣得行則大臣懼方且自營救於讒毁之間而不保又何暇旌别淑慝修明憲度者哉今俗大率宿貴之臣輒以身下後輩矯情飾貌習偽成風損美化敗善俗朋比以彚下凌上替比者亦有以善誣結天心冀用事矣陛下竟不登於大用士大夫之有識者是以知陛下之淵衷大智無不通照其情狀信姦慝之不可為也然其風猶未之盡革者蓋左右近臣猶有以疑毁廢者舜曰朕嫉讒説殄行蓋讒人在朝舜所不免孔子曰逺佞人陛下既推讒佞而逺之惟復起用以讒廢者則天下無賢不肖舉知浸潤邪説之果不行且以安臣下之心使厲志竭精有心報效者無悼後害事有不令而從兹之謂巳何謂通謀議國家承五代之弊有不能革者軍國文武之事分領於中書樞密院唐代宗時兵興軍事繁多故於禁中專遣內臣典中外文奏謂之掌機密事梁氏始置使名五代時樞密院與中書或合或離入國朝遂分總天下之務對為二府由是軍民異政文武殊用命令乖戾更為彼我夫天下之事何嘗不以同而成異而敗乎平日無事苟可因循有為之時斯害也巳昔祖宗三聖威靈獨運各延圖議斷主乎一陛下沖執謙德推委仰成柄用既分事揆必隔陛下誠能矯往弊稽舊典合二府一政事真大公之盛舉也即若重前規難改作臣謂應樞密院事宜與中書合議使理道相通惟事事乃其有備有備無患故臣曰通謀議意在此也凡此三事今日切務恩威明則邊臣奮欺誣辨則朝廷清謀議通則政事平而命令一皆治道之急者臣猥以孤微當得言之地所恨知不足以造微材不足以成務敢進一得冀禆萬分論請通中書樞密院事臣竊以朝廷政令之所出萬事之夲原一統於中書若樞密院則古無有也起於後唐權宜之制因循相承兵柄寖重乃與中書對秉衡軸至於分軍民為二體别文武為兩途宣敕並行議論難一事無任責更相顧望自古為理患在多門况今二府之中豈盡材猷之士朝綱內弛邊事日生西戎北敵交有憑陵中夏之志財用殫窘百職曠廢此時廟堂之上豈容非材夫欲朝廷尊邊事寧其要在乎揀别大臣才不才而已矣陛下若去不才之人又復誰當進用若使宴安朝列容身養望者優遊備位則勞臣益解體武士益離心兹事體大實在詳察謂宜詳求利害稽復古制省樞密院歸於中書若又重於改為則莫若通樞密院之職事於中書見任樞密院使副才者留之不才者去之其諸房吏史且皆如舊措置施捨徐更圖議是足以一政事之本重賞罰之權汰冗濫之員塞僥幸之望改而張之不傷體裁而成之不動衆陛下幸與一二宗臣舊老深圖此議有益於國願斷自聖心行之時降制以宰臣兼樞密使請不罷兩府聚廳商量公事臣伏見宰臣賈昌朝陳執中等乞解兼樞密使巳降詔允所請自古已來歷代之制三公之職無所不總國初中書樞密院兩相兼領臣竊詳其時蓋是後周世宗深意欲合二府以復唐舊及范質等罷其職遂離事體兩分謀議不一總於主斷實煩柄馭比以鄰敵構患邊防多警始命宰弼關決機務國論粗合習以為常今疆場雖即漸寧戍守未能解備御北國如御虎飢則噬人養西戎如養鷹飽且揚去兩相既罷去此職退朝必更不聚廳便如路人往來杜絶今雖有處分凡干軍國機要及邊陲事宜令依舊同共商量施行又緣朝廷舉動惜體中外人情易搖三邊忽有小虞兩地即須聚議便是非常之事逺動四方之疑合固易離離則難合今聖恩已聽昌朝等解罷使名即密院文書自不通署諸房事務亦罷呈稟臣愚以為其邊防奏報軍馬機宜依舊常且聚廳每事並皆同議於後或有警急庶務得以周知儻值有事商量亦免動人視聽若或聖心採納乞特宣諭施行請令兩府聚廳商量公事臣伏以中書樞密院分掌軍國之務其於朝廷本實一體若其逺計長慮思患預防謀議相通事始克濟慶厯二年邊陲多故陛下深惟事體思適機宜始命宰臣兼樞密使凡干邊事使同商量北國再平西戎欵順亦由柄臣協議上贊睿明謀通事允此其效也昨者宰臣請解樞密蓋由謙逺事權降詔允俞之時臣亦僭曾論列方今疆事粗定朝廷稍間正是經營補緝之日未為宴安暇豫之時臣愚以謂中書樞密院執政之臣宜時聚首同議朝務講求得失至于邊防處置將帥遷改中書治夲所當關預謂凡稍干大事並從參議而行所冀各盡公心上禆國體請乘間召大臣論事劄子近邊鄙有釁朝廷多務仰惟聖慮豈忘憂勞然逐日視朝御前後殿各不過數刻自兩地大臣以次進對急急呈文書而罷至于論道經邦則未暇也今髙秋氣清宫殿涼爽臣願陛下燕間之餘延召大臣從容賜坐與之圖議天下之事則治亂得失盡在几席之上矣臣觀今天下之勢可與之安可與之危安危之勢顧陛下力行之何如爾且帝王之體如天之行健不息如日之髙明溥照深處宫禁自取蔽隔此隂沴之變所以作也惟陛下特開睿鑒諒納愚衷論治道先後臣聞今中外之議者莫不以羌戎之警兵賦之急為當世要務臣竊以為凡歷代治亂安危之所起不在邊徼之外蓋嘗在户牖之間爾故臣所獻愚言先陳近事伏惟陛下少留神慮臣聞禮曰古之聖人欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先正其身何謂先正其身昔商中宗嚴恭寅畏治民祇懼不敢荒寧文王卑服以念稼穡之艱難不敢酗于酒德樂于逸豫自朝至于日中昃不遑暇食用咸和萬民彼聖人者不惟躬自菲薄兢兢治道亦惟聲味逸欲非養身之益故務為勤儉退從淡素具示愛民之意其實有自愛之道焉恭惟陛下春秋鼎盛臨御日長雖三靈保祐而國嗣未立臣願陛下上思宗廟社稷付授之重下念中外士民繫屬之心保愛聖躬配天悠久省諸無益之樂移為居安之慮神怡於穆清之外福及於照臨之表此謂正身之道何謂先齊其家使夫宫闈有禮之謂也自景祐巳來嬪御之列行非婉順輒斥逺之天下之人皆知陛下廟社之為重而不愛其所私蓋患防未然悔生所忽斥逺之事非宜數也不若節之以禮制之以義敘進良淑無昵賤微詩曰文王刑于寡妻以御于家邦易曰正家而天下定此所謂齊家之道何謂先治其國大臣百職之謂也伏以近歲邊陲用師指縱受成實在二府凡所除拜宜使將帥心服物議稱愜然後朝廷尊重成功可期如其不然則堂陛不崇中外失所瞻望矣成命遂事臣不復論至于才與不才固亦何逃聖鑒又自景祐之末綱維潛弛上下苟且人素姑息怙權相比愛憎相奪立朋黨者有之漏泄機事隳撓朝政專已見者有之陛下知臣之明既照見其情狀稍去其弊矣儻更振厲紀律審詳邪正則憲章修舉百度用正此所謂治國之道臣以庸昧擢從疏逺今日乃始陟文陛望清光指事剖誠不識忌諱萬分有補百死無悔貢院請誡勵天下舉人文章臣聞文章之變蓋與政通風俗所形斯為教本國體攸繫理道存焉况今官才專取辭藝士惟性資之敏而學問以充之故道義積乎中而英華發于外以文取士所以叩諸外而質其中之蘊者也言而不度則何觀焉伏以禮部條例定自先朝考較升黜悉有程式自景祐元年有以變體而擢髙第者後進傳效因是以習爾來文格日失其舊各出新意相勝為竒至太學之建直講石介課諸生試所業因其所好尚而遂成風以怪誕詆訕為髙以流蕩猥煩為贍逾越規矩或誤後學朝廷惡其然也故下詔書丁寧誡勵而學者樂於放逸罕能自還今貢院考試諸進士太學新體間復有之其賦至八百字已上而每句有十六十八字者論有一千二百字以上策有置所問而妄肆胸臆條陳他事者以為不合格則辭理粗通如是而取之則上違詔書之意輕亂舊章重虧雅俗驅扇浮薄忽上所令豈國家取賢斂材以備治具之意耶其舉人程試有擅習新體而尤誕漫不合程試者已準格考落外竊慮逺人未盡詳之伏乞朝廷申明前詔更於貢院前榜示使天下之士知循常道臣典司憲度復預文衡敢此敷聞伏候進止論中書議事臣觀古今治亂之變在上下之勢離合而巳上下之事合事無大不成上下之勢離事無小不敗况近司輔臣股肱同體協恭和衷豈容乖異竊聞中書奏事爭辨御前連日紛譁中外喧駭其于事理必有曲直伏以中書政本其所擬議即為命令無作好惡是謂皇極各徇所執何以適治歷代敗亂之兆皆由朝廷立彼此之論而巳彼此立則朋黨分朋黨分則勝負生勝負生則攻奪作攻奪作則敗亂之所以起臣願聖心深鑒於此緣中書議論之事頗密外傳不審不敢以為言故陳理亂大體而巳論小臣妄投封章訕上事臣聞下輕其上賤人圖柄則國家搖動俗用不靜春秋之義以貴治賤不使卑陵尊左氏傳曰下陵則上替陵替之漸不可長也竊惟近歲以來時風寖敝是非起於憎愛毁譽移於朋黨貴而尊者畏訕誣之見及故待下之逾謹賤而卑者恃詆訾之可行故奉上之禮益倨更相姑息遂成氣俗法制因兹不振堂陛由是益削且軍國圖議三事之職將相進退人主之柄即措置有乖于理體謨猷不允于人望朝廷固有邇臣列位諫官御史得言者衆必有獻納豈容小人妄兹干議近如王預仕人卑品婁徹草澤狂生投匭上封恣斥朝政唐貞觀中監察徐師合上書論執政不可兼數職太宗曰此人妄有毁謗欲離間我君臣流師合於嶺外師合官為監察所言未為切害太宗流之蓋所以重朝廷謹風俗也臣忝列諌官以言事為職豈欲杜塞羣論蔽虧聰明顧此等纎邪無益於政優容之不足以廣言路崇長之足以損善俗伏乞降出預徹等所上封奏觀其義理若顯為欺罔侮黷經國即未能深示刑章乞且投畀遐徼庶使行險之人知所懲沮請推捕荆南嘲咏長吏人事近聞王某因言事官彈奏乞除外郡某比在荆南頗招流議亦由被人嘲刺所以播傳京師慶厯三年嘗降詔敕止絶匿名歌詩兼開告賞之令小人狡獪敢蔑憲章日來在位臣僚齪齪習為姑息逺嫌避怨以防多言風俗澆漓公道陵替事雖輕微實傷國體其撰詩譏刺之人乞下荆南密切搜捕必令推獲以置嚴科庶示四方知所誡懼論赦前事伏見近歲臺諫及按察官等多發人積年罪狀及有奏劾之事輒請不以赦降原減作法於涼甚非治道赦書之文云敢以赦前事言者以其罪罪之所以省刑夲而著至信也人之多僻其亦久矣在於中人孰能無過若以一眚之故而為終身之纍臣恐舉世無全人矣既經赦宥許之惟新忽復追論誰將自保快一時之小忿失天下之大信相沿弊迹寖成險俗棄瑕録善義則不然伏望特降詔書明諭中外今後言事及按察官等不得發人纍經赦宥之事及乞不以赦降原減上資忠厚之風允穆大公之化請因郊廟致誠以謝災異事伏以禮行于郊乃陛下所以恭事天地嚴配祖宗而對越百神者也故非多儀備物之為貴在乎外致精虔內盡誠志而巳自景祐五年郊禮之後災異數作三辰失次于上五行作沴于下水旱流災于內夷狄侵寇于外臣伏思陛下自攬寶圖其難其慎恭儉之德率巳無懈愷悌之化視民如傷宜乎三靈降休萬國戴仰而天人之際未為順敘者蓋由左右中外百司庶職不能協心將救輸誠徇公上承聖猷以臻至治臣聞禹湯罪已其興也勃焉禮曰陽感天不旋日陽者君也言人君若發心致誠上感于天其為響答速不逾日臣願陛下惟災異之來其必有以因時郊祀齋居穆清上思祖宗付授基業之重下思生民託命賴慶之意逺思前代邦家興亡之故近思朝廷紀綱得失之體內思宫禁帷幄左右之蔽外思戎狄邊疆侵軼之患總此六思深存逺念書則思之於匕筯夜則思之於几席至于入廟與祖宗相見登壇與神祇相接因蠲潔之薦致精虔之誠引咎在躬祈天永命以示陛下知上天告戒丁寧之意庶乎上天知陛下寅畏修省之心則感應之來必不旋日勃興之福不獨在乎禹湯竊惟宸衷明發攸憲愚陋所見豈能忖度緣臣職在規諫志存禆益近慮所及期必上達而巳論郊廟三事慶厯元年臣前所論請於郊廟致誠以謝天戒此乃內出於精衷者然祀享之禮在於內盡志外盡物外盡物者不貴乎物之多也在乎稱禮而已臣近奉敕執事于郊廟故舉所見不稱禮之尤者三事以聞蓋疑於典故别無討論禮也者主於恭而已矣此聖心可裁正者也一圜丘黃道伏見圜丘昊天上帝皇地祇用黃褥位祖宗配侑用緋位以示損於天地也皇帝板位及飲福位皆用緋褥示不敢踰祖宗也而自小次前設黃道升壇夫黃道之制不著于典禮臣竊詳之蓋以皇帝既解劍脫履用藉步為潔既用藉步而色用黃則是踰於祖宗褥位之制而又從升壇諸執事者盤辟回旋禮容不肅至于襟袂委拂神位以避黃道故也且壇上既鋪織罽為藉臣謂自小次登午陛例可罽藉其黃道特請徹之於禮為稱一小次皇帝既行禮當就壇下褥位其小次之設皇帝奠幣登獻每降即就次至于近侍左右輒幄後休坐則陪位百官不能不跛倚懈惰夫三年一郊禮稀曠矣而又恭虔之不足非所以副陛下事天尊祖之意掌次周官所載禮有舊文若徹其帷蔽虛而不處即此變禮始自聖明後世有述矣一祠官凡祀事主於肅恭况禮行於郊廟若肅恭不足是謂黷祀臣於太廟見司徒升奉俎而俎巳入室命執事者復舉以出乃始奉而薦之其不虔乃爾又監禮之官終事不至有司莫詰御史不糾百執事之懈于位乃爾應緣祀事官雖於尚書省受誓戒徒習虛儀而巳請特降中旨申敕御史臺嚴加糾察以懲不恪右三事切於禮意事非難行上可以將陛下之精誠下可以正朝廷之彜典庶乎三靈來格百福饗臻倘蒙聖心特垂察納即乞降出施行中旨徹黃道不御小次百執事不恭其職糾而正其罰郊禋赦書事目録用近代有功邉將子孫本朝將臣如楊業田紹彬曹瑋張凝李允則等皆禦寇守邊名迹著者其子孫中器能可選任者各為升擢邊任即門緒衰微仕籍不續推其近屬量材録用禮曰繼世以立諸侯象賢也存亡繼絶春秋大之此足以示邊臣之勸邉上守將量與賜賚郊禮應行事官及雖致仕而得陪位者內外諸軍將校皆以例受賜邊臣守將不預焉其緣邊諸路極邊守將謂宜等第量賜器幣以均慶賚邊任臣僚諸邊除遣多避免者蓋以窮塞之上危苦之地與江淮湖浙優便之例待之無異故審官銓三班常以罰謫補之若令極邊州軍城寨應選人等代還比常選格量與減舉主考限磨勘轉改未該磨勘者先次注家便近地有職田處班行使臣京朝官約此頗立優制如是人必樂行三邊官吏可選則惠加於民博矣麟府州城中百姓老弱之口不能自存者若願渡河令即河東轉運司分處於近裏州縣務令在濟麟府州患在儲廩不屬要在節食惜費其間居人既東渡河避寇就糧商販亦應不至勢必難以自存倘因赦文開此一意外示推恩內實減口若轉運使能以經畫處之得所則老弱之口內徙必多賊退還業兹亦權便功臣許立私廟賜戟按唐制三品已上許立私廟賜門戟今朝文武階勳品髙者多難為一例如三朝配享功臣及曾為將相雖巳歿有功德於世者今其子孫雖微不應立廟宜令史臣先具功狀申中書疇其勳迹之著者許令本家追為修營見任將相固自如禮仍令禮官詳定立廟典制頒下及賜之門戟凡名器所以勸功勤章等威也若依令典則當賜者多受賜多則人不以為貴謂宜且以特恩示褒勞臣京東稅賦應天府濟單曹濮鄆廣濟軍等昨全無夏麥轉運司不與減放租稅朝廷知民力之敝令南京通判宗純體量而巳後時督納了足比秋復旱所收苗稼一二分又復不為蠲除因兹覃慶請與免放河北兩浙京東西或有流移令所在安存右四道內兩浙河北艱食尤甚宜令轉運司多方賑救應與災傷之地鄰近郡縣若有流移人户在其境內守令等務與安存量發廩粟以賙救之郡縣官吏率斂比來朝廷雖降責王逵王隲等以懲聚斂之吏而近見奏報郡縣猶以助軍為名因緣為姦謂宜因赦書特與戒勵使天下知誅求之暴本非朝廷之意舉人前因慶禮推恩科埸年深纍舉之人令免解赴京至有數千里破産丐謁而至復令就試既久廢業試多不中輒復罷去咨怨道路且朝廷之意蓋念其老而無成非復取其才能也若與便立程格令郡縣勘會當如式者上其名一命文散酬其平生之勞免使奔馳進退失所於事差便奏請赦書事節皇祐六年南郊臣伏以夲朝之制常因大祀而布德惠今郊饗在近大號所發敢效愚見少禆國論一事請減定刺配刑名伏以祖宗謨訓以仁厚寬大為治夲其於刑罰尤所欽恤凡大辟之情法輕重小可矜者纍聖加恩俾讞于有司率附寬比景祐中嘗因赦文著為減定刺配敕以省報復之煩今慶厯編敕中配𨽻條目比前敕益多罪有等差故配有逺近械錮遞送相望道路荆湖嶺峽尤聚姦慝比者蠻寇猖獗亦聞此輩類多從惡若無釐革配𨽻不巳誠恐逺地寖成淵藪乘間扇動助成厲階幸因赦書乞令諸路提點刑獄轉運使與逐州軍長吏各據配到人元送犯由詳加揀别所犯情理稍輕者與直移就夲貫人情安土必差自顧惜流離咨怨為念必輕其編敕及續降敕諸刺配條乞别差官重行詳定議從減除則刑夲少清民心胥恱非惟示仁政之大體抑以消逺方之釁兆也一事請減均畿縣稅賦伏以京甸者天下之根夲賦役者百姓之生命今畿內租稅之制比四方最重輸送之不給則輒託於水旱之災以幸蠲放夏秋羣訴歲以為常且都城之內豪商大姓纍資居貨以逐機利僭侈逸豫無所不至賦調所不加更徭所不及而農民服田力穡供稅租給徭役仰不足以事父母俯不足以畜妻子同為王民而都門內外勞逸之殊如此又權豪之家凌奪貧細竄移稅色輕重不均乞因赦文明諭恩意為擇明敏朝臣據府縣版圖賦租名數重定稅式稍從輕寬按地頃畝均其輸入變折雜科率為定例仍制都畿之內嚴立占田之限無使形勢侵併單弱此實強幹之術扶夲之道也請因郊禋肆赦招懷西賊劄子伏以前景祐五年有事於圜丘西戎貢職不至始發釁端次年春遂構兵犯邊殺掠吏民邊將備禦無䇿賊數入寇輒以勝歸濟其凶謀氣焰益盛今自陜西四路河東麟府逺近屯戍輸挽供給天下為之勞弊而解嚴息甲未可以日月期也臣嘗聞自邊來者詢賊中事蓋今羌戎乃漢唐郡縣非以逐水草射獵為生皆待耕穫而食賊每點集資糧器用人自為備須歲年為計乃能一大舉雖破城寨不能有我寸土也而又絶其俸賜禁其關市賊中尺布直錢三數百邉防守備繕完益固賊情見勢屈自當改圖然猶騎虎不可復下雖有悔心亦何由自通誠款朝廷雖欲招來若非時無名事亦難舉倘因今來郊禮覃慶之時特開曠蕩之恩示以綏懷之意或特降一詔或著之赦書其辭意大略則曰夫王者以天下為度含生之類罔不覆育况朔方靈武河西五郡聲教所暨莫非王民頃自德明巳來克保外臣之節朝廷眷待恩禮至隆去年元昊遣使人來稱為夲藩推戴緣其附順三十餘年忽此奏陳不無疑駭見情未審遂至興兵使邊人不寧師徒暴露今親郊上帝盛禮告成慶賜大行囚繫盡釋乃眷西顧惻然軫念虧於撫育吾甚傷之今後夏州或有使人至者候人不得遏絶或有願通於朝廷之意即令邊臣受而上聞且泛告邊臣以謹守封略罔或生事令榜而揭諸塞上或邊臣之有威望者遣單使以朝旨往為開諭足彰陛下德義之厚無損朝廷威重之體且賊妄自尊大於巢窟中久矣王者固宜以鳥獸畜之豈足與之辨名器等威之分哉賊若有悔禍之心稱藩納貢陛下優為封爵名號以服擾之出府庫之餘以歲時豢餌之使天下知陛下深誠逺慮為生靈計至于天地鬼神亦當助仁而佑順仁者無敵於天下况一賊歟若賊悍然自恃凶愎不移亦足以驕怠彼心激怒我衆邊臣必曰天子之恩意如此賊無革心我不可以不奮身而為國致討矣戰士必曰天子不以賊之不義而必窮誅是哀吾屬之久戍也今賊無革心而吾屬不可以不效命而鬬戰矣自邊之民至于天下之民必曰天子所以赦賊蓋念賦役之煩擾吾人之困勞今賊無革心吾人不得不竭力以奉邊矣賊黨必曰天子幸加恩而不我誅也而其主苟不思焉是驅我于鋒刃之下以濟其欲而巳夫兵猶火也不戢將自焚使我怒彼怨賊有自焚之勢則成敗有所分矣今議者聞臣之説必難臣曰賊自入寇無不克何困之有今雖招懷之徒示國之弱賊肯革心乎臣請對曰昔遷賊之為邊患也號為驍悍有謀略者陷朔方靈武國家喪地且千里而其衆亦大弊爾時繼遷雖不為六谷所殺勢亦不支矣故其死時戒德明曰爾當傾心歸順朝廷如一兩表未蒙開納但連上封章以祈見聽故德明款附畢世不渝今賊非遷比也不幸自其初叛而我守邊匪人是故賊纍得志而其衆嗜為寇之利向使我無大敗彼無大獲而以賊之虐用其下尋應疲潰矣今朝廷處畫邊事守遏益固將卒用命財用不乏雖未能大殘其衆姑使來無所掠獲即賊自窮蹙今先開其歸路以為後圖縱賊未懷與國何損必又難臣曰賊雖致款戎心可保乎即有其實邊備得以徹之乎臣請對曰昔景德初契丹大入河朔先帝親駕北狩于澶淵北主始遣使議通和好俄又其統軍達蘭中伏弩以死和議遂定于時邊陲可保戎心徹警備而謂繼好至今之堅乎在朝廷所以撫納控馭而巳今事邊之費歲且千萬用師以來係纍殺戮幾十萬人故自古以來論邊事者莫不以和戎為利征戍為害蓋深念此也伏願陛下延召二府大臣試詳此議儻蒙採納則生民之福實所繫賴臣不勝區區之懇樂全集卷二十
