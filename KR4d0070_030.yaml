body:
  text: 樂全集巻三十宋張方平撰奏狀遷禮部侍郎知滑州舉官自代狀右臣䝉恩除尚書禮部侍郎准勅節文舉官自代者竊見翰林學士尚書刑部郎中曾公亮端良清慎守道有文爰自立朝搢紳推重使登省闥實煥儀曹乞回茂恩庶允公論服除再授端明殿學士兼龍圖閣學士給事中舉官自代右臣䝉恩除前件官職准勅節文舉官自代者臣竊見翰林侍讀學士尚書右司郎中錢明逸業履端修學識該敏施於有政議者曰才盍處深嚴上資訪對代臣充職實允僉言除知制誥舉官自代狀右臣䝉恩除前件職准勒節文舉官自代者臣竊見尚書屯田員外郎集賢校理充天章閣侍講曽公亮藝文該洽業履清純綽為儒館之英早預經筵之選臣猥繇注筆叨踐綸闈較之若人實為悞進願回恩典庶協僉言除翰林學士舉官自代狀右臣伏䝉聖恩特授前件職准勅節文舉官自代臣伏見右正言知制誥楊察器識優長藝文通敏早陪法從再掌命書宜被詔於浴門以増華於禁署臣之孤陋懼玷詳延願回寵章庶厭公議除知諫院舉官自代状臣伏䝉聖恩擢居諫職退省才分夙宵愧畏竊見尚書度支郎中直集賢院知泰州王質淮南轉運使尚書兵部員外郎劉䕫器識方雅學術深正冲退處易安和有守使備獻替拾遺左右必能副清衷之虚佇勵風俗之貪競况質等名宦年德逺出臣先儻以代臣實愜物議除三司使舉官自代状臣伏䝉恩授前件官准勅節文舉官自代伏以貨食者國務之重農商者民業所存平准之權通利之術領兹大計屬在長材竊見端明殿學士兼翰林侍讀學士尚書吏部侍郎宋祁器藴閎深業履端厚乆登近列綽有逺猷俾之治財必濟輕重願推渥命庶允朝僉舉李大臨蘇軾充諫官臣某准熈寧三年六月二十七日中書劄子奏聖㫖諫院闕官令於朝官内舉二人聞奏者右某伏見尚書刑部郎中李大臨識藴純深風局冲逺殿中丞直史館蘇軾文學通博議論精正其李大臨雖曽任知制誥見係散郎官在常叅此二員並堪充諫官不如所舉臣甘同坐舉戚舜賔館閣檢討伏以美教化厚風俗王道之本也欲教化之美風俗之厚在乎進廉節敦朴之士焉臣等區區竊志於此伏見尚書司勲員外郎同判刑部戚舜賔奕世名儒並見史牒孝悌著於家行義稱於鄉該涉藝文留心經術自祥符初被詔管勾應天府書院切摩誨誘諸生多至成就至今孜孜不倦昨任淮南提㸃刑獄屬朝議方操急郡縣謂舜賔長者非搏擊吏罷之而令管勾國子監近改判刑部伏望朝廷察其儒者老於庠序除一館閣檢討名目所謂廉節敦朴之士臣等切謂舜賔近之干冒宸嚴臣等無任戰懼之至謹具狀奏聞伏侯勅㫖慶厯三年尚書兵部員外郎知制誥臣趙槩右正言知制誥臣楊察翰林學士知制誥充史館修撰臣張某翰林學士起居舍人知制誥臣孫抃翰林學士兼龍圖閣學士户部郎中知制誥臣王堯臣舉朱宷充館閣職名臣等昨奉勅差赴袐閣考試制舉人等内有應賢良方正能直言極諫科國子監直講朱宷所試六論考中第四等下據舊例閣試第四等下並預廷對止因景祐中年第四等人數稍多報罷之以此朱宷承近例不得召試臣等㸔詳所試六論其文學理致亦深可觀采及錢明逸對策登科亦是第四等次物議於宷頗稱遺才兼其人履行端確經術該明先著撰春秋指歸辨析三傳疑義辭㫖精通有禆儒林之説臣等今取索到上件春秋指歸一十二巻謹具進呈伏望聖慈俯回睿覽特賜召試置之館閣庶廣得人之路上副求賢之意候進止慶厯三年太常丞直集賢院同修起居注知諫院臣張某右正言知制誥臣楊察右正言知制誥臣吳育右諫議大夫權御史中丞臣賈昌朝劄子准勅舉省府推判官准御史臺牒准勅節文委待制已上官各於館閣朝臣臺官提㸃刑獄知州内舉一員充省府推判官者右謹具如前臣伏見袐書丞袐閣校理楊孜以文學發身以材敏從政使之治劇必有可觀臣今保舉堪充省府推判官任使如擢用後犯正入已贓丼當同罪如曠官失職不如舉狀亦丼連坐准勅舉提㸃刑獄朝臣准勅令舉提㸃刑獄朝臣須是曾任知州及實經兩任通判已上人充者右謹具如前臣伏見太常博士前任彭州令狐挺才用通敏臣今保舉本人堪充上件任使如在任犯正入已贓臣丼同罪准勅舉清要官准御史臺牒准慶厯八年五月十四日勅於内外升朝官曽任通判成資已上人内有材識通明履行淳正堪任清要任使者各同罪保舉二名並須歴任無公私過犯及不是兩府及自已親情方得奏舉或雖公罪杖已下情理輕者亦許論薦者右具如前今伏見太常博士范寛之甚有材識兼有操守係通判成資以上歴任無過犯不是兩府及臣親情今保舉堪充清要官准勅舉可升擢任使文資官准御史臺牒准勅保舉文資三員行實素著官政尤異可備升擢任使之人仍於舉狀内明具本官才用所長聞奏者臣伏見都官員外郎葉紓謹介好學莅官廉善堪任館閣帖職為郡長吏必能公清自持勤恤民隠懷州防禦推官張太中儀州軍事推官侯可並資性正直知經術通古今死節仗義有古人之風堪任臺諫官切摩議論為吏治民必能盡公竭力三人皆行實素著可備升擢任使並是孤立寒士非見任兩府之親亦不是臣親戚如朝廷擢用後不如舉狀臣丼同罪准宣舉提㸃刑獄使臣知江寧府准本路轉運使牒准進奏院牒准御史臺帖准皇祐元年九月十一日宣諸路同提㸃刑獄使臣員闕今下御史臺勘㑹見任知雜已上遍行告示於諸司副使以下至閤門祗候已上各同罪保舉一名有舉主無贓私罪曽經兩任都監等堪充提刑任使聞奏者右謹具如前臣伏見本府駐泊兵馬都監内殿承制馮文顯勤公幹濟諳曉政事累有舉主無贓私罪曾經兩任都監臣今保舉堪充提㸃刑獄任使准宣舉提㸃刑獄使臣准御史臺准宣於諸司副使已下閤門祗候以上同罪保舉一名有心力勾當得事無贓私過犯累任親民堪充提刑任使者聞奏如内有膽勇武藝者亦仰開析聞奏者臣伏見供奉官閤門祗候汾州駐泊兵馬都監劉舜臣有心力勾當得事無贓私過犯累任親民兼知書曉習政事堪充提㸃刑獄任使准宣保舉行陣將領准御史臺牒准宣於文武升朝官或右職供奉官已上同罪保舉知方畧有膽勇㑹武藝好人材堪行陣將領軍馬鬬敵任使者一名聞奏臣伏見東頭供奉官常鼎本出將領頗有武畧其常鼎即非自已及兩地臣寮親戚臣今保舉堪將領以備鬬敵薦舉孫復伏見諸王宮侍講孫復節行髙介經術精深居退泰山朝多稱薦恩㫖特召處之學官不游貴勢之門不言朝廷之事講勸王邸誠須純儒名世未光終慊清論若䝉擢備館殿有足敦勵風俗臣今保舉堪充舘閣職任若復後渝素守則臣罪丼罔上准勅保舉知縣縣令准御史臺牒准勅舉堪充河北陜西河東三路知縣縣令二員於前任職官令録知令録四考曽有三人同罪奏舉者保舉充京官知縣如舉主考數不及者知令録舉充職官知縣判司簿尉有出身二考無出身三考舉充縣令者伏覩見任絳州太平縣令韋不伐前池州青陽主簿李向皆有行誼識慮勤廉幹濟並無骨肉在朝食禄不伐已三考曽有人保舉今堪充職官知縣向亦三考堪充縣令舉吕昌齡充三司判官伏見羣牧判官國子博士吕昌齡材用精敏幹畧通濟周知財利之事明於輕重之體三司度支糧料案行諸路粮草總三邊入中其間甚有細微利害臣嘗以問昌齡昌齡曉知之臣今保舉充本案判官所冀調節三路入中事體無所闕悞如除用後不如所舉臣丼伏朝典准勅保舉京官准慶厯編勅節文一文武官或都在京及外處文武官員政治有聞公忠可舉意不掩善欲達朝廷並須明上封章者右謹具如前臣伏覩本府節度推官張誼莅事敏勤飭身廉約臣今保舉堪充京官親民任使如䝉朝廷擢用後犯正入已贓臣丼當同罪本官在朝並無親的骨肉食禄與臣不是親戚臣於皇祐元年四月十七日到任不曽奏舉官員充京官及流外選人充令録班行臣自皇祐二年正月已後不曽舉過官員今所舉本人係今年第一名請應天府致仕官王渙朱貫給俸劄子臣近知應天府竊見本府致仕官尚書禮部侍郎王渙年九十一歲尚書兵部郎中朱貫年八十七歲此二人者早仕於朝清節聞於搢紳退老於家善行睦於鄉黨平生履行並無虧玷渙由太常少卿除袐書監致仕僅二十年貫自兵部郎中不曽改官致仕幾十五年臣伏覩朝廷數降德音優恤耆艾醪􅀈之賜下逮庶老此二人遭時休盛克饗多福當國家太平百年之中生而不知兵革艱危之事年幾大耋式由禮義可為吉人君子矣伏望聖慈俯加恩惠王渙乞與比兩制官致仕朱貫乞與比大卿監致仕給賜月俸天下如二老臣盖亦希矣聖主不遺年况陛下之孝慈盛德冝有以垂光史牒者也舉王稷臣臺閣伏見尚書屯田郎中權管勾南京留守司御史臺王稷臣性資通敏操守方正和而不雜於俗清而不滯於物器識才望士之髙選臣今同罪保舉堪充臺閣清要省府煩重任使舉范隠之伏見太常寺奉禮郎范隠之所著春秋五傳㑹義經術深明㫖趣淳正今去聖逾逺異端多門常人好竒鮮根於道隠之論述獨探精粹且其履行髙介不羣志甚自强進未云止儻䝉樂育必成良材伏乞聖慈特命取自所著書登之衡石之末即誠有取望特與召試使得備館閣之缺所兾扶奬道術敦激風教薦舉邵炳臣昨任睦州通判本州青溪縣有前杭州富陽縣尉邵炳自天聖中因公累解官後遂隱居不復叙理躬耕自業講授為事淳文奥學儒林之所推伏素履懿行鄉邑之所表儀近歲朝廷採拔遺佚偏才小善無不收録有如炳者志尚沖靜不違道以干譽不飾竒以近名不交迹於公門不求知於要地以故搢紳之論未嘗及之臣贊理本州備知才行見善不舉豈曰能忠伏望朝廷特加禮召帖職館閣直講上庠在炳學行誠為不忝薦龔懋許平伏見前坊州軍事推官龔懋太廟齋郎許平皆因臣寮奏舉召試方畧考中髙等除前件官並通古今有筞慮周知時務堪從煩使竊見湖南蠻冦為朝廷憂宜選才能徃資謀畫其龔懋擬受權華州觀察推官乞與正除潭州一兩使職官許平乆經放選未就銓集兼累有臣寮薦舉乞與除潭州一初等職官非惟㕘贊民政足俾助圖戎事舉知渭州王龍圖伏見龍圖閣直學士知渭州王廣淵早承先帝知遇屬之心膂其人實有才慮備更任使臣謂宜還之朝廷處於要近使得効其忠益必有禆於時務舉知秀州杜充郎中伏見尚書虞部郎中知秀州杜充性資方雅吏事詳明通曉時務可以守要藩明習格令可以任法官精於勾檢可以領財計謹具稱薦以聞舉知諸城趙昶寺丞伏見大理寺丞知密州諸城縣趙昶謹厚有常勤敏任事朝廷方採擢人才收其力用有如昶者但地卑孤逺故無聞於時謹以名聞以備選擇舉陳州崔度助教伏見陳州州學教授試國子四門助教崔度通經有文周知世務早因胡宿等舉應制科召試秘閣不中選韓琦薦舉盛稱其才後縁張昇再奏方得此助教名目兩省近臣多有稱薦者度之術業頗涉從橫亦跅弛之士也切見每次科塲諸以舉數推恩者亦便注官示不終弃至如度者賜之一官不為貪冒伏望聖恩特與採擢優加一命以收遺逸舉御史准勅依條於太常博士巳上曽歴一任通判成資以上及歴通判一年已上堪充三院御史保舉兩人聞奏如三丞内有合數磨勘者亦許保舉仍須自來别無贓濫忠厚淳直通世務明治體之人如朝廷遷擢任用之後所舉人犯入巳贓並當同罪其餘贓私又不及舉狀亦當連坐續准中書劄子奉聖㫖如少得合入三院之人即許於數内舉升朝官知縣已上資叙人一員充御史裏行者右臣伏見太常博士簽書相州判官公事韓宗道安和有守通世務知治體太常博士前知鄆州胥城縣馬黙資性淳直勤公愛民並無贓濫今保舉堪充三院御史如朝廷遷擢任用之後犯入已贓丼當同罪其餘贓私及不如舉狀亦丼同坐舉劉時中准勅節文合舉官僚如覩在京及外處文武官政治有聞公忠可舉意不掩善欲達朝廷並明上封章者右謹具如前臣伏覩鄆州通判尚書駕部員外郎劉時中資守謹重吏文通審才用敏給足以幹事今保舉堪充錢穀刑獄煩難任使如䝉朝廷擢用後犯入已贓臣丼當同罪其人在朝有弟尚書駕部員外郎處中見食禄與臣不是親戚奏御史裏行臣等准中書劄子以臣等奏舉都官員外郎張頡堪充侍御史裏行契勘自來無侍御史裏行令别舉官一員聞奏者臣等昨准勅舉侍御史一員體訪升朝官鮮得才識資任相當者按唐六典貞觀中太宗始命馬周監察御史裏行殿中及侍御史初無此名也中間廢罷至先天中復置始通侍御殿中監察並有裏行開元初又置三院裏使皆出一時之制本朝有殿中監察裏行而無侍御史裏行者非無典故但官至侍御史罕有未歴通判差遣者官資自已相當故但充正員爾昨者兩次覃慶又不礙磨勘轉官故升朝官多是官髙資淺今復故事亦合時宜其張頡資履安審才識足用以充侍御史裏行可以稱職伏乞朝廷更賜詳議准勅舉堪任陞擢官准御史臺牒准勅奉聖㫖於文臣内舉才行堪任陞擢官一員者臣伏見袐書省著作佐郎簽書應天府判官㕔公事蘇轍學識足以觀其才風節足以信其行進士及第賢良登科二十餘年近出選調在於士議誠為滯淹臣今保舉堪任陞擢即非兩府及自已親戚如䝉陞擢後不如所舉臣丼同坐奏差竹昺益州鈐轄馮文顯益州都監右臣昨八月十二日崇政殿對進呈劄子一道奉聖㫖送中書樞密院内貳事為益州兵馬鈐轄乞差竹昺替郭周兵馬都監乞差馮文顯替何次公者至今未聞朝㫖切慮事寢不行須至再具陳論昨縁嶺南逋㓂在雲南朝廷思患預防屢下本路經畧臣以為倘有疆埸之事鈐轄即是將領之官以竹昺昨從狄青徃嶺南親與蠻人接戰諳知次第今郭周已滿任雖有再任指揮便與替回亦無損本人資序故臣乞差竹昺替郭周其都監何次公早縁犯贓曽除名編管貪猾傾險衆所共知昨除益州都監未到任楊察已奏乞别差官程戡又奏乞改差人臣雖素不識其人乆來知其事狀切以益州逺地人情傾危易生疑動鈐轄都監皆係兵官臣既此奏論已成嫌釁今徃共事實為不便伏望朝廷以防微慮逺為意特賜早降指揮上件四人竹昺郭周何次公臣並不識惟馮文顯素知行止頃嘗奏舉今亦不敢必乞差馮文顯但乞别選差官一員即於事體為便其何次公乞今不候替人先次發離本任免住本州搆諜人情妄有生事奏張顒知嘉州當司勘㑹轄下嘉州連接蠻界其賴因沐川龍水等寨控扼雲南徑路最是要衝防虞之地土多豪右兼并之族錯雜夷落頗資撫御累次知州非才事不修舉切見知雅州都官員外郎張顒有才慮幹用處事詳允在雅州已習知蠻夷氣俗所有新差嘉州知州孔叔詹其人見赴任在路近有陵州知州葛禧嬰患身亡陵州事簡地非要害欲乞朝廷特與就差張顒知嘉州所貴緝寧邊夷守備有方候滿任無事乞特與陞陟差遣却乞差孔叔詹知陵州庶令兩得其所事無闕誤舉李大臨右臣昨受命知益州舊例合奏舉通判一員切見殿中丞袐閣校理李大臨履行端方識用周敏逺方都㑹事務煩劇實藉通材協力幹濟大臨雖貫益州本人操守堅正必不以閭里之私而撓公事况大藩事體自有長吏今諸州郡因縁陳乞任本鄉知州通判者甚多又此益州與諸郡不同全要諳悉人情通其風俗大臨既是土人足以詳究民間細務伏乞朝廷特賜差充本州通判於見任通判兩員中候成資日替一員舉葉紓館閣檢討經筵講讀臣等伏見尚書屯田郎中宮宅教授葉紓資質淳厚篤志好學安分自守不交人事莅官臨民政存慈惠倘䝉甄奬可勵浮薄臣等今保舉其人堪充館閣檢討經筵講讀如擢用後犯入已贓臣等並丼同罪不辭舉朱從道臣受勅差知滑州地當河防一二年來水勢向若只有通判一員多在河上提舉本州近陞為畿輔増置兵屯今須創葺軍營添修器械諸事藉人管勾伏見屯田員外郎朱從道幹敏有才用濟之勤廉臣今保舉本人署本州判官㕔公事及勘㑹見任觀察推官齊年資考舉主自合該磨勘到任將二年乞差朱從道替年成資闕如本人任内犯正入已贓臣甘同罪聖躬痊復賀兩府狀右某啟伏覩進奏院報狀三月一日皇帝御紫宸殿視朝者清光在望沖氣薦和如日之昇配純明於乆照惟天為大等健粹以無疆此固乾祗貺祐之符宗社昌鴻之福伏惟某官至誠當國厚德端朝元首股肱雅同心體之泰大厦棟幹實共堂奥之安仰惟忠孝之䖍足感人神之報某虛孱無狀侍從有年忝守藩條竊均邦慶不任抃躍激切之懷除翰林學士謝賜對衣腰帶鞍轡馬狀伏䝉聖慈以臣入院特賜衣一對金腰帶一條金鍍銀鞍轡馬一匹者宸檢開榮禁扉傳召亟承蕃錫彌惕愚襟伏以車服以庸名器不假漢儒被寵用彰稽古之能唐制踵華仍集拜嘉之始限分職秩沿著儀章臣猥以菲才遘於熙旦方翔省户遽踐鑾坡祗命有初頒恩薦及天閑駔駿飾以金鑣御府衣稱副之釘帶備陳榮觀曷稱孱軀期罄朴忠仰禆褒遇兼侍讀學士知秦州謝賜對衣腰帶鞍轡馬狀伏䝉聖慈以臣授兼翰林侍讀學士特賜衣一對金腰帶一條金鍍銀鞍轡馬一疋者進職經筵靡容於讓避推恩禁坐仍厚於頒宣異數並隆危衷増愧竊以服惟章德名器當慎於假人馬以錫侯負乘或譏於致冦豈宜孱瑣優獲寵華臣學術空疎材謀譾薄乏論思之奥塵從槖以横經昧節制之長委分符而授鉞豈期恩賚更累皇明詔典枲以出衣敇司閑而班駿萬釘鏤寶既華索帶之圍六轡織文仍賁鳴珂之馭載思非稱何路為酬期師志士之忠少塞風人之刺服除再授端明殿學士龍圖閣學士給事中謝賜對衣腰帶鞍轡馬狀伏䝉聖慈以臣授前件官并職特賜衣一對金腰帶一條金鍍銀鞍轡馬一匹笥衣纎麗廏馬桓閑九環增鞙璲之容六轡副鏤衢之飾荷恩殊渥揣報奚勝伏念臣乆去禁嚴甫周服紀遽被綈封之召趣還藻幄之華逮此拜嘉復爾載錫上沿儀秩下辨等威服表身章安吉既榮於動色乘資體養驅馳式遂於代勞祗愧便蕃顧慙孱陋稽古之力敢援桓榮之言受寵若驚惟思老氏之訓誕節任子狀臣偶縁孤迹忝列近班稱慶誕祥喜逢辰之多幸希恩任例實干寵以為慙伏念臣有長男邦彦雖在幼齡實承單緒賞延諸世重愧於無勞子克於家竊期于有後仰希慈渥下逮微宗惟以心盟報於死所除翰林學士笏記伏䝉聖慈賜臣官告勅牒各一道除臣前件職任伏念臣曩繇薄技被奬淵衷驟躋諫垣亟玷詞掖荷光華之誤集頋藻潤以何工敢謂尊號皇帝陛下曲降使軺俯傳宸誨俾預禁林之選彌親幄坐之威揆載顓䝉懼墮職業勉殫素藴勤報鴻私除三司使笏記伏䝉聖恩賜臣官告勅牒各一道除臣前件職任者聚人曰財為國重務非材冒據危悃奚安伏念臣親逢盛期早登近綴曩繇風憲擢領利權契闊十年屯夷一節召從僰道還復計廷精力耗於流年憂責深於疇日寵靈踰分熏厲交懷此盖尊號皇帝陛下天意念勞慈衷軫舊察官成之已試謂歲伐之最深屬兹筦計之煩爰奉時才之選敢不力圖利弊精講盈虛知無不為思所未至庶積涓塵之効少酬盖載之私兼侍讀學士知秦州笏記伏䝉聖慈授臣前件職任者仰服寵榮交增感懼伏念臣親逢盛際早濫華塗中假州符嘗適江湖之逺近還禁瑣復攀日月之光豈謂尊號皇帝陛下猶録虛名未渝睿睠慙叔子恩信之著委殿邊防昩孟侯經藝之長延登講勸惟堅忠竭少謝恩褒遷禮部侍郎知滑州笏記伏䝉聖恩授臣前件官任者仰服寵榮交深兢懼伏念臣叨逢盛旦早竊虛名乆依幃幄之嚴頻䝉雨露之澤今建侯於三輔首祗命於一麾仍繇禁瑣之班進貳春官之秩此盖伏遇尊號皇帝陛下特申睿奬曲軫寒蹤謂立身之朴忠常留意於掄採載欽乾造愈勵寸誠服除授依前端明殿學士龍圖閣學士給事中笏記伏䝉聖恩賜臣官告勅牒各一道授臣前件官并職者祗荷寵靈載懐惕厲伏念臣早縁素業幸遘亨期待對廣廷嘗再塵於聖選㕘華近綴實歴踐於要途無補大猷竟罹危議方領麾於南夏奄鍾罰於慈闈晷景不停几筵已徹遽召還於法從復上覘於清光此盖伏遇尊號皇帝陛下照掲大明慈均洪覆垂矜簮履之舊俾陪殿閣之嚴敢不鞭策蹇駑砥磨鉛鈍庶勉涓埃之効上酬雨露之恩樂全集巻三十
