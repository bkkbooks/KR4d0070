body:
  text: 樂全集卷三十八宋張方平撰墓志石記文贈賢妃俞氏墓志銘并序國朝憲章古制敘建內官上法天極以正四妃之位外沿卿職而修九嬪之教所以順承后治燮諧隂禮品儀異數備存甲令謹按贈賢妃俞氏仁宗皇帝昭儀也吳越著姓世仕藩朝曾祖承遜女為錢忠懿王俶夫人從俶歸國終於睦州刺史祖仁祐東頭供奉官閣門祗候父振左侍禁妣陳氏贈東海郡王洪進之孫女良奧成家善祥保世慶鍾邦媛光膺天福景祐中海宇熙寧帝臨御巳久而堯門未啓甲觀尚虛妃早序金環之渥首當彤管之記三年就館始生皇子太師宣銅律之和詞臣獻郊禖之賦燕朝稱賀未舉慶觴柘館不留空遺文褓追賜名昉封褒王魏王復贈懷靖太子今封周王越二年生皇第二女號崇慶公主四嵗亦薨追封楚越國今贈唐國長公主妃以載誕承恩始封延安郡君進拜美人媫妤充儀昭儀贈其祖右屯衛將軍父右領軍衛將軍妣京兆郡太君録其弟祐之東頭供奉官祐成左侍禁諸姪皆登仕麗澤及宗榮陪戚里仁宗享國四十二年抑畏持盈始終如一中禁位號不必備惟其人髙華洵淑登六儀之列者無幾亦可知其選也昭陵發引號慕以從復土還宫結欷感疾治平元年六月薨享年四十有四上惟先帝諸嬪之舊悼賻有加榮贈賢妃用優典也命楚國保寧安德夫人景氏主喪禮宣慶使安靜軍節度觀察使入內內侍省都都知任守忠護葬事菆塗於開聖尼院以十月二十二日就窀穸於奉先資福精舍之東園鹵簿儀仗率從其品初妃年八嵗以選合法相入充掖庭笄總韶秀慧心警敏夙被傅姆之訓旁漸公宫之學鞶帨組紃音奕書繪耳目經涉妙通多藝嘗請國子監書籍特蒙給送以資翻閲玩味圗史摛辭掞麗時獻歌頌雅承賞激雲章宸制輒賜屬和授毫賡進不移晷漏數捧神筆侍為飛白退而灑翰亦習工焉康定初夏戎叛命西師在野請減俸賜以贍興費後邊患息還給本秩堅求停罷又昭儀嵗久屢有恩旨敘遷逡巡遜免竟不成命初拜充儀特賜冠衣盛服櫝而不敢御也至是舉以禭焉在寵不驕持謙自牧四德之懿知其有人特詔近臣俾刻樂石非惟漏澤泉扄傳芳內則蓋亦示美化於家邦本徽音於椒掖謹系之銘曰泰一常居後句四星爰敘內則承尊紫庭先朝謙儉位號尤鮮惟德肅雍式登於選有婉賢妃垂髫英妙好事圗史亦絢華藻見禮禖庭帶以弓韣如榮黼幄錫之冠服心無傷善志存憂國諧我雅風允穆嬪則龍駕上賔鵉旗西御青蓋莫留素帷永慕文明繼統慈夀開宫方承渥惠倐閟音容掩櫳箔兮遂無還就幽穸兮祗園悵流景之遒盡撫綘紗兮尚存辭柏城兮東返懷舊恩兮未逺侍玉衣兮下宫往言歸兮何恨秦國大長公主墓志銘并序秦國大長公主仁宗皇帝第九女也母曰淑妃董氏嘉祐四年四月二十五日誕生嘉祐初仁宗違豫淑妃奉侍勤瘁帝心察而憐之眷遇甚渥故主愛亦隆五年封福安公主八年英宗纂御進封康國長公主治平四年今上踐阼加號鄭國大長公主閏三月二十三日薨年八嵗主雖妙齡地居尊屬在仁宗有兊女之寵於英宗處天妹之重今上當太主之貴而太皇太后盡鞠育之慈皇太后敦諸姑之好可謂生而極盛榮之至也主既終三年之制復值大行之恤性資純孝情深攀慕日課佛經間或蔬饌積毁癯瘠感疾遂侵三宫軫懷日就臨問親省醫劑奄然無瘳美玉韜華明珠晦色琅函金簡應圖牒以暫來矞雲景星見光靈而遽返中闈傷慟掖庭哀送四月二日菆塗於奉先資福精舍上為輟視朝五日追禭秦國大長公主秋八月從英宗皇帝龍輴歸穸昭陵外域别用鹵簿儀物以從蓋舊禮也有詔近臣刋辭樂石銘曰月渚仙娥星潢帝女周美天妹漢尊太主初解文褓承嬉紫房穠華鳳彩秀色龍章素瑟未工玉簫方習黼幄愛隆雲軿回急三宫慈渥五陵神隩逝不可留吁嗟太早皇叔祖推誠保順同德亮節崇仁守正佐運翊戴功臣寧海平江等軍節度管內觀察處置堤堰橋道等使開府儀同三司檢校太傅守太保兼中書令杭州大都督府長史使持節蘇州諸軍事蘇州刺史上柱國襄陽郡王食邑一萬五千四百戶食實封五千户贈太師尚書令兼中書令追封定王墓志銘并序王諱允良字公彥太宗皇帝八子而燕恭肅王最幼尤寵焉章聖緣先帝意友愛加厚久不就外邸故以大中祥符六年生王於東宫母康國太夫人劉氏天禧四年先王為言能勝衣趍拜一命右千牛衛將軍方八嵗越二年仁宗踐祚遷大將軍舒州刺史天聖中始預朝參解將軍正授泰州刺史俄除潁州團練使徙單州明道二年天下乂安朝廷講稀闊之典劭農務本帝躬籍於千畝王預九推之位禮成覃慶遷鄭州防禦易蔡州陪祠南郊進安州觀察使久之改鎮國軍節度觀察留後慶厯元年景至大祀圜丘王備終獻陟降惟恪四年恭肅王捐宫寢仁宗深惟祖宗基統之重蓋吳潭太祖之昭也潞許邢潤蘇華燕太宗之穆也至是薨謝無存者思盤維之重慮深長之本始議崇建戚藩以屏王室於是以華原郡肇啓王封既而拜安國軍節度使皇祐二年冬祀明堂帝奉玉幣既交於上下神祇慨然嘉與天下均受靈貺推恩中外加中書門下平章事換鎮江軍節旄至和二年檢校司空領泰寧軍節度嘉祐元年行恭謝之禮王陪祠登獻七年祫享太廟除開府儀同三司兼侍中彰信軍節度八年夏英宗纂御王以叔父之尊檢校太保兼中書令泰寧軍節度改封襄陽郡王治平四年春宫車晏出今上踐阼王久苦末弱猶能力疾趍入盡號慕之哀真拜太保杭州大都督府長史寧海平江等軍節度哭而出疾遂篤尋有中詔俾朝朔望以優尊屬甫逾月而薨王姿表粹美氣質溫厚服寵四朝惟一心仁宗之仁周於萬物而仁之所施常自親始肆其眷待宗室恩禮隆密朝政之暇佳辰令節合族綴親宴於內朝如家人禮王於天屬至近行純而節和故被遇為渥賜以御筆飛白書王既刻石以進則遍錫公卿近臣嘉顯之王好修威儀矜莊自喜燕居裕如也趍朝肅如也侍祠恪如也性寬易左右侍御小過失未嘗譴責甚者詰之亦怡而弗厲久於其側者莫見愠色永嘉郡王王之仲弟也其子宗粹早孤王撫育如所生王既薨宗粹請服三年議者因以嘉王之仁心長者頗好篇詠感物吟諷時有風味佳句俸賜厚矣未嘗有畜也府藏出入未嘗披其籍亦不問其在亡國朝之制不屬宗室以吏事優其祿秩異其寵章列邸京師以奉朝請為選儒學士切磋講習廣之道義而已所以篤親親之恩不使任責惇敘糾合别於庶姓者也然間有藴才業抱器慮者不偕於用齎志以歿故執册者無得而書不然屬籍之功名豈直漢唐之比盛歟治平四年三月二十六日甲辰薨享年五十有五訃聞天子趣駕欲往臨哭有司言大行梓宫在殯而止輟視朝五日成服於苑中文武班慰於崇政殿門贈太師尚書令兼中書令追封定王閏三月甲午菆塗於正寢之西楹八月癸酉英宗龍輴西引從葬於河南永安先王之塋英國夫人張氏祔焉夫人橫海軍節度使贈太師尚書令美之曽孫女果州團練使士宣之女子八人宗絳右龍武軍大將軍郴州團練使宗藺右武衛大將軍台州刺史宗劼宗易右監門衛將軍餘早世女八人曰金堂縣主普寧嘉興延安安定同安普寧郡君皆已有適其一幼孫七人仲竣右監門率府率早世仲薈右監門率府率餘皆幼逺日有期奉詔紀實銘曰太宗之穆燕為寵王恭肅之愛亦鍾襄陽體自天人虎蔚龍章肆得靈稟敦和以莊勝衣奉朝雅有嘉問寵章麗澤康侯以晉乃啓華原薦更四鎮淑旗綏章兼綰相印逮事四朝屬尊位崇歷長三省汔登上公并帥全吳兩藩之雄别建赤社江漢是封有宋開基百年光大極盛積隆德周無外重仁纍慈恩光治內王生得辰與國同泰帝坐路朝一日萬幾昧爽丕顯居安思危王居深宫以燕以嬉五十五年始終盛時王享多福四朝盛德亦惟淑慎錫汝保極嵩洛佳原五陵接域往從先王返此幽穸皇從弟故推誠保順翊戴功臣安靜軍節度使梓州管內觀察處置等使金紫光祿大夫檢校尚書右僕射使持節梓州諸軍事梓州刺史兼御史大夫上柱國天水郡開國公食邑六千六百戶食實封二千一百户贈太尉追封永嘉郡王墓志銘并序王諱允迪字德謨燕恭肅王之第五子太宗皇帝諸王恭肅最幼鍾愛焉章聖嗣服緣先帝意加親寵故久不就外邸大中祥符甲寅嵗生王於東宫天禧四年遇承天節始賜名一命為右千牛衛將軍今上踐阼推恩內外褒進戚藩以翼王室除大將軍領和州刺史久之罷將軍改崇州俄拜唐州團練使明道元年宸居落成肆大眚徙濟州躬藉千畝王預九推之位禮成均慶遷汝州防禦使進靜難軍留後慶厯四年制授安靜軍節度使蓋恭肅王嘗領是鎮而王繼焉宗藩榮之是嵗先王捐宫寢聖上慈仁誠孝至性自然寅畏天地虔恭祖考惇睦族屬以御於家邦嘗欲以是風天下納民大順恭肅之薨也以叔父之重悼恤尤深而王執喪有不及禮者降授右監門衛大將軍克自修省循禮謹度尋改密州觀察使六年復安靜旄鉞王素康盛至是感疾良美中貴人挾上醫診治內出黃金劑以賜撫訊相及於路疾遂革慶厯八年三月已未夜漏十刻以不起聞享年三十有五上聞震悼厥明輦如其邸哭臨之廢朝五日丁巳上成服苑中文武班慰於崇政門遂以太尉章紱追封永嘉郡王凡賻賜率加等焉太常節惠諡曰思恪詔大鴻臚持節典喪事四月癸未塗菆於寢易官以窆事令龜先逺日維六月癸酉吉未引紼宣徽北院使李昭亮辭赴三城故事置餞酒於垂拱殿以王在殯為之徹樂五月甲寅具鹵簿鼓吹麾幢旄節𨗳輴以西葬河南之永安六安郡夫人張氏祔焉夫人德象婉嘉壼闈之範載命不淑方華而殞繼室昭國夫人錢氏忠懿王之孫女志尚清淨不安其家懇請遜於洞真宫遂賜道士冠服名曰修真號和正大師子四人曰宗粹右監門率府副率三皆夭逝女七人長早卒贈江華郡君次並在室王姿采秀發氣志果徑性開敏豁如也涉獵書史略通大義留思篇詠風體爾雅曉音律善射命中得和容之妙國朝之制不屬宗室以吏事悉留京師以奉朝請若永嘉之果以敏使之從政亦足以發巳若夫被化麟趾承華棣蕚靈長慿厚體聨上帝之孫顯重崇髙族系天王之弟昌辰纍洽丁慶祚以同安聖度廣容靡嚴顔之懷懼宴寧譽處生榮歿哀方之前朝王享備矣百福具有不至者年天實命之何嗟及矣臣職在史觀且司宗籍承詔撰識敢不直書銘曰訏訏梓潼蜀劒之東先王相攸實啓榮封帝念叔父建爾仲子纘其節旄俾多受祉仙源懿親詵詵振振祖宗諸孫其在五人堯心舜度仁覆寰宇豈其本支不貴以富胡然乎天不與之年奄違昌時而歸幽泉吉仗森列悲笳慘絶有裧者車挽紼晨發嵩洛之陽三陵相望體魄就寧下從先王左武衛大將軍沂州防禦使贈崇信軍節度觀察留後漢東郡公墓志銘并序平陽懿恭王子十七人漢東於伯仲為第六母曰崇國夫人王氏而漢東乃會稽縣太君黃氏所出公諱宗回字晞聖生九嵗賜名授官右侍禁景祐中會朝廷以環衛敘宗子於是以東頭供奉官除左千牛衛將軍纍遷至左武衛大將軍沂州防禦使年五十以疾終時治平三年二月戊申也訃聞輟朝一日告贈崇信軍節度觀察留後追封漢東郡公四月乙酉權厝於奉先資福佛舍四年八月癸酉從英宗龍駕往祔先王之塋纍階金紫光祿大夫檢校右散騎常侍兼官御史大夫勳上柱國爵開國公食邑三千七百户真食七百户漢東儀度峻整好學𨽻書曉音律善騎射平居寡言莊色儼如也有至性年十一喪平陽號踊不自勝若成人者及會稽歿毁慕癯瘠宗族稱其孝晚年篤信釋法不以世纍縈其心賔祭內外之事屬於其配忘懷委順以遊乎方之外夫音伎之樂玩巧之好乃富貴之地耳目之所常湛沒者是之弗由而獨逺離苦集之途庶幾真常之境推其所尚天下一致而百慮同歸於為善而巳夫人隴西郡君李氏克勤內則恭順宜家公之所以得不為塵事所嬰以夫人幹家之蠱有餘裕也子二人仲革仲洽並以將軍領雅州昌州刺史皆端固修立女三人長適右侍禁李彥明次適左侍禁倪良嗣次尚幼孫三人士縱右千牛衛將軍士慿士鉦並皆右監門率府率孫女八人俱幼銘曰孝哉漢東至性天得永懷二人哀哀罔極薄諸可欲忘懷世纍將超於彼自歸覺地知此如幻孰為延促往從先王維嵩之麓宗室金紫光祿大夫右屯衛將軍檢校太子賔客兼御史大夫騎都尉天水縣開國子食邑六百户贈潁州防禦使汝隂侯墓志銘并序汝隂諱宗育字德之太師尚書令潞恭憲王之孫安逺將軍節度使密國公允言之子源深流光胄自太宗國家篤親親之恩睦於公族天聖二年始賜名以右侍禁入備內朝稍遷東頭供奉今上躬攬萬幾超拜內殿承制兼視賔護副相之秩尋屬圜壇類帝陟配文考乃眷肺腑便蕃渥典於是進加右屯衛將軍賜階金紫光祿大夫列爵五等衍食采地六百户不幸感疾才三十而歿時康定辛巳秋七月也訃聞上震悼有加申命內司賔內謁者臨弔治喪事遂以潁州防禦使汝隂侯印綬權厝普濟精藍後三年甲申夏四月從燕恭惠王之鹵簿往窆河南永安縣實祔先王之塋惟汝隂資性溫願涉詩書點翰有楷法間喜武戲尤精射御方將承寵嘉輔熙隆而降齡弗修其命也夫夫人濮陽吳氏故領軍衛將軍元慶之女封本郡君勳門戚里姿德兼茂子三人長曰仲堯右內率府副率餘皆夭閼一女亦不育有詔掖垣俾識幽穸銘曰汝隂綽綽器槩宏博以善為樂襲寵軒綏􅏡庭侍祠在宗有儀當鍾遐祉森映麟趾收神遽巳鞏樹伊流陂陀新丘瑑石傳休宗室贈右屯衛大將軍仲考墓志銘并序仲考字晞尹魏恭憲王之曽孫平陽懿恭王之孫右龍武軍大將軍丹州防禦使宗産之子皇祐三年四月生至和二年始賜名授太子右內率府副率嘉祐八年英宗皇帝踐阼改右監門率府率治平四年今上即位遷右千牛衛將軍五月甲申以疾終享年一十有七訃聞輟視朝一日贈右屯衛大將軍權厝普濟佛舍八月癸酉從大行靈駕葬河南永安以祔先王之塋纍階金紫光祿大夫勳上護軍爵開國子食邑六百户娶王氏一女惟屯衛幼而岐嶷長而嚮善方朝廷設官立學以導宗子於德義而不得遜志進修以成其之才之性為可傷矣觀其臨終之辭與父兄相反復而愛順之心尤足悲者矣銘曰幼女稚妻常情在茲逝將去汝云胡不悲此愛能輕是有剛節獨於父兄咽不忍絶乃其性資知義所存雖不享年斯明不昏皇姪孫銀青光祿大夫檢校國子祭酒行右監門率府率兼御史大夫輕車都尉贈領軍衛將軍仲郢墓志銘并序領軍諱仲郢謹稽屬籍惟太宗皇帝之元子曰潞恭憲王生密國公允言密公生祁國公宗説祁公男子二十三人女子二十五人為領軍之兄姊者二人焉蓋疏潤星潢擢華月幹慶基慿厚昌緒隆逺矣領軍姿貌端秀性稟明悟始就外傅屹然佩鞢有成人之志嘗侍上射苑中攝弓操矢得襄尺剡注之體屢中正鵠賜賚加等復能留好文史吟詠自娛尤喜篆籀二王歐陽筆法粗達其勢孝友恭順本諸其衷事親婉以從令處子舍莫有失愛者入朝廷繇賔贊而威儀儼如景祐三年始賜名授太子右內率府副率慶厯四年遷右監門率府率以慶厯七年四月二日感疾而卒享年二十三皇帝以諸孫之悼輟垂拱朝一日禭以領軍衛將軍印綬殯於奉先精舍八年六月六日從永嘉郡王之鹵簿往窆永安塋域禮也娶郭氏三子長曰某率府率次曰某率府副率季未名四女並在室噫稟生如此其粹也慿慶如此其隆也降年不永是以祿位器志皆未之究也有詔史官為之識銘曰太宗之穆既蕃既昌祁公之子詵詵且良洵美領軍翹然而秀貴可踦待不俾以夀嵩髙之麓天啓佳城憲園祔竁體魄維寧宗室故銀青光祿大夫檢校國子祭酒行太子右司禦率府率兼殿中侍御史騎都尉世褒墓志銘并序宗室吳潭二邸太祖皇帝之穆也潭康惠王德芳生昭信軍節度使兼侍中英國公維憲英國生金州觀察使從郁司禦蓋金州之第三子諱世褒字仲華以真宗朝天禧已未生明道癸酉始賜名補右班殿直預內朝尋改右侍禁景祐乙亥遷階銀艾行太子右司禦率府率視秩國子祭酒寶元中兼殿中侍御史賜勳騎都尉慶厯元年十二月十三日遘疾終於邸院春秋二十有三權堋於普濟佛舍越三年嵗在甲申夏四月癸卯從燕恭惠王鹵簿葬於洛陽永安大塋夫人安氏無子司禦方雅信厚公族之秀幼知好學涉通諸經善行草書尤好虞褚筆法略得其妙近事諸皇族鮮出補外官悉留京師亦不釐務為選儒學官切磋講習外奉朝請而已此朝廷親親之義敦睦糾合所以别於庶姓不責以事然間有藴才慮抱器識者不偕於用齎志就歿故執册者無得而書焉銘曰太祖之穆在潭啓封君其曽孫源深基隆雅重者性粹厚者志言用與才則未嘗試蕭蕭馬鳴悠悠素旌往從先王永安之塋徐國太夫人墓志銘并序禮惟大昏之重以其合二姓之好繼萬世之本也矧皇胄宗子天家之貴其聘納之選非冠冕德門忠孝之族孰當焉潭康惠王之仲子故侍中英國公諱惟憲之夫人曰和氏王考諱凝相五代晉位至右僕射太師尚書令考諱㟸殿中丞母彭城縣君劉氏夫人體質間淑德言有度既就壼教稱賢姻黨祥符癸丑嵗嬪於王家事尊撫卑夙夜匪懈寬和敦約動循禮法丙辰嵗英公捐館晝哭過哀常好文翰通曉音律是後不復治習稱未亡人誦貝葉書奉金仙之教諸孤幼稚均養如一煢居二十年上下無間言者乾興初封汝南郡君明道二年進莒國夫人慶厯丁亥孟春感疾羸苶上遣中貴人挾醫診視諸子益購髙手療之莫瘳以七月二十一日薨於寢享年五十有六追封徐國太夫人上聞而悼之賻恤加等遣內人省其室詔使護喪事為菆塗奉先精舍戊子六月六日歸祔英公於永安塋禮也男子四人長從郁終於金州觀察使次從式左千牛衛大將軍彭州刺史次從湜左千牛衛大將軍循州刺史次從賁右監門大將軍女十二人長早卒次封齊安宣城懷德廣樂晉安安定髙平仁夀郡君諸季早夭嗚呼夫人其為女也靜而婉可謂有彤管之法其為婦也順而正可謂有采蘋之行其為母也慈以均可謂有鵲巢之德用能節義著於宗戚恩禮厚於宸眷史臣執簡宜有識矣銘曰展矣英公宗之彥兮猗歟夫人邦之媛兮自我于歸上下宜之樂只君子福履綏之云胡不淑公不偕老我逾終身則已夀考云胡多慶於皆克孝承顔無違服我慈教自公忽兮我心缺兮半甲子兮從於穴兮宗室右武衛大將軍黃州刺史令稼夫人夀昌縣君李氏墓志銘并序夀昌縣君李氏故右監門衛將軍言之孫故右侍禁祺之女於今皇太后為外族治平三年八月歸於右武衛大將軍黃州刺史令稼武衛乃冀康孝王惟吉之曽孫廬州觀察使廬江侯守度之孫舒州刺史世括之子夀昌既歸事舅姑如父母事其夫甚恭願和順之性出於自然每黃州之講學也承奉尤祗勤輒躬饌以待蓋喜其良之遜志自修也且曰富貴而能為善吾心樂哉蓋知內助之益者歟四年五月辛丑以疾終享年十有九六月已酉殯於普濟佛舍八月從英宗皇帝靈駕葬河南永安女一人始育黃州宗室之秀而夀昌才德婉淑宜與之偕老而遽然以逝亦可悲矣銘曰生也猶幻性也本真幻何延促真不可淪嗟嗟夫人所稟之純惜哉奄忽以還氤氲宗室太子右司禦率府率宗彥夫人張氏墓志銘并序夫人姓張氏祖遵以材勞受男爵歿贈邠州觀察使父文慶左班殿直夫人生而淑麗聞諸姻黨時平陽懿恭王少子今司禦率府率宗彥遴求佳匹協幹宗事允矣邦媛宜於吉卜乃展禽帛之聘歸於邸第執笄奠菜婉如肅如懿恭宗藩之望胄緒昌衍夫人協和娣姒雅有禮法褒封未逮穠華遽零凡好合八年以慶厯壬午七月既望終於內寢春秋二十四越月塗殯資福精舍甲申孟夏歸窆洛陽永安從邦族之大塋順也三男長仲寂次仲向並太子右內率府副率一未名三女詞臣被旨銘其墓曰懿女士兮洵美且嬛嬪天孫兮弗偕遐年曉風急兮捲祥雲秋霜繁兮摧芳荃伊之涘兮嵩之麓魂兮歸來安幽阡右監門衛大將軍仲炎夫人秀容縣君李氏墓志銘并序秀容縣君李氏章懿皇后之姪女也曽祖延嗣尚書令吳國公祖仁德尚書令秦國公考用和中書令安定郡王章懿皇后誕生仁宗皇帝以外家之重閥裔光大秀容幼聰惠今慈夀太皇太后養於閣中仁宗選皇族之秀以歸於右監門衛大將軍仲炎有子五人士良士屏皆終於內率府副率次亦亡二人幼未名女一人早夭秀容以貴戚之後為宗室婦盥櫛事舅姑謹恪嚴翼如出寒素無怠弛之意治平四年三月甲戌以疾終年二十有四權厝于奉先佛舍八月癸酉從英宗靈駕往葬於河南永安銘曰善事舅姑從夫以順貴出后家惟循針訓云何先春凋此芳舜二子肯堂尚承淑問左驍衛大將軍世謐夫人仁夀縣君安氏墓志銘并序仁夀縣君安氏贈左驍衛大將軍世謐之配祖習解州防禦考惟演東頭供奉官十有四嵗而歸驍衛驍衛才冠捐館仁夀奉姑清河郡夫人張氏婦道甚備供飬謹恪未嘗不適其意治平二年六月辛卯卒年三十有七四年八月英宗靈駕西引從窆於永安以祔其夫之塋子一人令業右監門率府率早世仁夀既傷其夫而哀其姑又悼其子於是口不茹葷手不釋佛書痛自勉約如是積年竟先其姑而亡可悲也矣銘曰無夫何儀無子何依苦志靡它之死不違勤勞瘁劬奉承其姑二紀一心之死不渝春露易睎秋華易萎從夫違姑姑情獨悲宗室右監門率府副率仲甫夫人魏氏墓志銘并序夫人姓魏氏曽祖仁浦追封秦王祖咸熙纍贈工部尚書父昭文西上閣門使封州刺史秦王國初執政勳在王府故夫人伯祖保平軍節度使同中書門下平章事鄆國公咸信尚太祖皇帝女許國恭惠大長公主遂為國戚閥閲益熾夫人年十七有行潞邸好合五年室家相宜以慶厯甲申六月丁卯云胡不淑奄就大夜享年二十有一男三人長某右監門率府率餘未名夫人姿儀秀靜性稟惠淑鞶絲組繡曲盡工巧事父母孝事舅姑順事夫有禮遇娣姒謙以和撫下恩意甚至生大族歸皇族不驕不忌亦婦道之難也初厝於普濟佛舍五年四月二十八日從潤邸楚國太夫人靈仗歸葬永安大塋宗室之尚制也有詔詞臣俾識幽穸銘曰猗惟夫人貴戚之生宗子之嬪逮日之吉歸以翟茀庶宜爾室胡然妙齡電泡不停蕙蘭摧馨柏城鬱鬱泉深土實國之豐畢丹旐素輿靈其就途從其王居右清道率府率世顒夫人髙氏墓志銘并序夫人髙氏祖瓊以才武典禁兵領忠武軍節度使父繼隆引進使陵州團練使母金華縣君吕氏夫人生而美秀性且明慧鞶絲針管曲盡工巧絃簧音律雅通其妙溫靜莊肅天資有裕吳懿王諸孫右清道率府率世顒方求淑媛以主內治聞夫人之懿因問名而卜之吉遂納幣贄鴈以慶厯丙戌十一月歸於吳邸既祭於禰室家甚宜入謁中禁儀容有度接諸宗黨莫不洽比結縭暮嵗載震彌月方緩帶以為喜遽收華而早謝丁亥十月五日卒於燕寢哀哉若人之不淑始十有七嵗矣厝於奉先精舍戊子六月往窆河南永安縣之大塋一子曰令典率府副率噫以清道之宗戚近屬以夫人之世家令範宜夫膺魚軒象服之寵享鵲巢螽斯之慶琴瑟偕樂福夀相終而摧芳先秋淪精長夜吁嗟乎彼蒼何賦與之獨嗇也銘曰彼姝者子溫且惠兮既笄有行合嘉配兮謂克享年福祿萃兮祥煙彩霞遽彼沫兮依然手澤在鞶帨兮揚且之晢恍相對兮翩翩者旌素車邁兮鏤石紀文納泉隧兮皇第八女追封韓國公主石記文慶厯紀年龍集作噩孟夏二十五日辛亥皇第八女齊國公主薨出於都城西普濟佛舍以須即還宸衷愴悼有詔追封于韓再不視垂拱朝甲寅為舉哀于後苑羣臣敘班慰於崇政殿之門外時皇族楚國太夫之喪歸祔潤恭靖王之兆故因其儀仗載塈周以軿車五月丁卯葬諸永安陵園本朝之故典也公主以癸未季冬十日實啓禓衣之慶生而明秀自然溫淨每省中建道場聞梵唄鐃磬之音輒有悅色以故嘗依浮圖法號為保慈崇祐大師及是疾良美乃下制改封于鄧再進大國於齊噫稟和天粹託體帝家以鍾念于淵慈故荐膺於寵數故不遐夀永嚮多福早歲逝矣彼蒼何哉不歸兜率之宫親承受記必向迦維之國還復下生被旨撰文用識幽穸謹記故鄆國公主石記文公主今皇帝之息女母曰御侍馮氏以慶厯二年六月二日生三年八月十八日卒火於奉先佛舍初宫闈叢慶荐啓紡磚之吉而公主於諸女行第五韶頴明秀瓊膚紺髮真天人之相方且詔有司條西漢之制以疏脂沐酌開元之典以錫嘉號制未及下雨淫遘厲奄至不淑宸扆眷悼乃有鄆國之贈國朝之故自帝子下逮諸宗室凡未封爵而殤雖追貴一品不專舉仗衛及是燕恭惠王之鹵簿將陪葬於永熙故公主從焉載以軿車大鴻臚持節護行以甲申孟夏癸卯藏于莊懿太后之陵域不封樹從舊制也臣某載筆以司宗譜承詔撰著得詳録云謹記宗室銀青光祿大夫檢校國子祭酒行太子右內率府副率兼監察御史武騎尉仲産石記文皇姪右屯衛將軍宗迥之第四子曰仲産曽祖潞恭憲王祖贈安逺軍節度使密國公允言母曰河南縣君梁氏以康定辛巳十月始育慶厯壬午春三月賜名一命為銀青光祿大夫檢校國子祭酒行太子右內率府副率兼監察御史武騎尉是歲十一月卒後二年夏四月癸卯舉而藏于洛之永安大塋國家錫羡貽謀宗姓蕃昌故尊者茅土以胙之卑者爵命以寵之枝葉扶踈本根深固羡乎哉隆且盛矣産也不幸而夭逝亦命而巳矣謹記宗室右監門衛大將軍世滋故長男太子右監門率府率令輯石記文令輯字君瑞冀康孝王之曽孫贈陳州觀察使追封淮陽侯守約之孫左監門衛大將軍世滋之子母曰長樂縣君王氏於皇上為姪曽孫慶厯四年正月乙酉生於邸第俄值誕節恩命之名録為太子右內率府副率賜階銀艾檢校上庠祭酒憲銜兼監察勳武騎尉八月遷右監門率府率是歲仲冬親郊圜丘均慶宗室加散官殿中改勳騎都尉越五年五月既望日而夭甫及二歲權厝于普安佛舍夏四月坎而藏於永安大塋康孝王實太祖皇帝之孫德厚流光本支蕃衍矧維睿聖親親之篤故殤子未違襁抱而寵錫數加賦命不遐奄違昭世哀哉謹記宗室右監門率府率仲郢第三男石記文宗室右監門率府率仲郢之第三男以慶厯三年八月生五年三月六日夭殁贈安逺軍節度使密國公允言之曽孫左千牛衛大將軍嘉州刺史祁國公宗説之孫也母曰郭夫人密國蓋潞恭憲王之次子其系實出於太宗皇帝本朝典故凡宗子賜之名則加於官若殤子者灑流濬源分華金枝未再周星遽隨逝水一命不及非命也夫初厝于普濟佛舍即以夏五月十二日掩于永安之域從舊制也謹記宗室右千牛衛大將軍宗訥第四男石記文殤子潞恭憲王曽孫贈鎮江軍節度使兼侍中郇國公允成之孫左千牛衛大將軍宗訥之第四子母曰長樂郡君賈氏康定二年辛巳七月十六日載誕慶厯壬午七月十五日夭卒生甫周歲奪於襁抱未壬命未錫名故無紀者初火于永寧佛舍越甲申夏癸卯坎而藏於永安大塋國家源流深長本支蕃衍諸宗室子垂髻佐餕即就師傅教之方名數目稍𨽻簡諒拜官賦祿矣故皇屬不患爵位惟不享年末如之何巳茲殤子之所可悼也謹記宗室故贈潁州防禦使汝隂侯宗育第二男石記文殤子潞恭憲王曽孫贈安逺軍節度使密國公允言之孫贈潁州防禦使汝隂侯宗育之第二子母濮陽郡君吳氏以康定辛巳十一月載誕慶厯壬午八月夭卒生未周星奪於襁抱未王命未錫名故無紀者初火于薦嚴佛舍越甲申孟夏從燕恭惠王葬伏藏于永安大塋吉壤廣原諸宗室之收宅使逝者而可作殤子且保于父祖矣又何愴焉謹記宗室右屯衛將軍宗迥第五子石記文皇室右屯衛將軍宗迥其第五子以慶厯壬午年閏九月生生旬日而殁蓋太師尚書令潞恭憲王曽孫贈安逺軍節度使密國公允言之孫母曰河南縣君梁氏初火于薦嚴佛舍甲申四月舉而藏于永安之大塋國家推親親之恩雖始生之嬰而莫或遺也其于敦睦收恤之道亦云至矣謹記故銀青光祿大夫檢校國子祭酒右監門率府率兼侍御史上騎都尉仲涵石記文故右監門率府率諱仲涵左監門衛大將軍宗懿之長子平陽懿恭王孫潞恭憲王之曽孫也母中山郡杜氏慶厯辛巳三月十二日生三月而賜名授太子右內率府副率兼監察御史是歲郊祀慶成加恩殿中侍御史四年遷今官其年復以郊祀加恩改兼侍御史七年四月二十日卒於邸遂殯于奉先精舍八年六月六日徙窆於河南永安縣之大塋率府資性孝謹不好戲㺯勝衣就傅學方甲書數墨筆字迹巳中楷法頗習丹青之藝亦有可觀方將討論文史趨為善之樂賦命不淑既齠而殞其可哀也巳謹記左監門衛大將軍宗楷第八男石記文宗室無服之殤曰左監門衛大將軍宗楷之第八子母陳留郡君吳氏以慶厯丙戌三月十二日生舉以文褓粲然珠潔雍樹顧復免於水火以丁亥七月十三日卒哀哉未名故未之命也其夭之遽巳櫝而焚之藏于奉先精舍戊子六月六日葬永嘉郡王于永安大塋殤子從與瘞焉國家親親廣愛以風天下惟是飾終之典尤為纎悉又詔詞臣為之識訥諸幽坎厚之至也謹記宗室太子右內率府副率仲郢長女石記文潞恭憲王曽孫贈安逺軍節度使密國公允言之孫左千牛衛大將軍宗説之子曰右內率府副率仲郢其耦汾陽郭氏以康定二年八月始生一女凡二歲感疾而殞即日從浮屠氏茶毗法而置之法濟精舍後二歲歲在甲申夏四月舉而藏於伊南之大塋夫古所謂殤者不以成人之禮舉之也本朝惇敘協和軫懷於夭奪所以廣慈愛之道而立教于天下也巳謹記祁國公宗説第六女石記文慶厯八年六月六日葬永嘉郡王於河南府永安大塋故事凡柩之厝殯者雖不成殤舉以是日窆若瘞焉今殤女之封用兹典也潞恭憲王之曽孫贈安逺軍節度使密國公允言之孫千牛衛大將軍祁國公宗説清河郡君張氏之第六女也質秀體淑美哉其容也柔聲下色嘉哉其言也針管盤帨敏哉其功也恭孝謹順懿哉其德也不幸感疹十一歲而卒蓋慶厯七年二月十五日也笄纓之期甫及脂澤之田未封蘭始薰而霜雕珠將圓而月缺故宗黨所以悼戚之尤甚也巳謹記宗室右屯衛將軍宗嚴第七女石記文皇從姪右屯衛將軍宗嚴之第七女以慶厯辛巳十一月誕育壬午八月夭逝火于薦嚴佛舍越甲申孟夏癸卯舉而藏諸永安大塋殤女潞恭憲王曽孫贈侍中郇國公允成之孫生未周星奪於襁抱珠碎掌上蘭摧庭中父兮母兮憯慟何及往安幽坎尚慰二人謹記宗室右屯衛將軍宗嚴第五女石記文慶厯甲申舉諸宗室暨諸小喪從燕恭惠王以西而殤女在焉女潞恭憲王曽孫贈鎮軍節度使兼侍中郇國公允成之孫右屯衛將軍宗嚴之第五女母曰長樂郡君潘氏寶元已卯十月誕育慶厯壬午閏九月三日遘疾夭卒年四歲殤女之始免於懷垂髫佩燧知承母教習於鞶絲濬發其源本銀潢之一𣲖華而不秀摧玉樹於先春初火于薦嚴精藍及此掩於永安之域實甲申孟夏之癸卯也髣佛弱魂往安幽坎謹記安德軍節度使華原郡王允良第九女石記文華原郡王第九女母英國夫人張氏慶厯乙酉歲六月設帨於門右且示有紡事焉負以文褓舉之於寢粹然而玉潔粲然而珠媚既孩則顧指戲笑裕如也不幸病悸先朝露以晞蓋丙戌歲之七月也遂厝櫝於廣福精舍慶厯八年從父永嘉王薨鴻臚護喪以六月六日葬永安原女亦從而瘞焉華原燕恭肅王之冡嗣實出太宗皇帝謹記左龍武衛大將軍信州團練使安國公從古第四女道娘石記文宗室左龍武衛大將軍信州團練使安國公從古之第四女道娘宜幼真母京兆郡君宋氏以明道癸酉歲有衣禓之喜幼真天資端秀異于羣兒性復頴悟所學輒善組訓餘力尤好筆札日事熏祓誦金仙書慕習其教侍安國公京兆君旁惟顔色所嚮而俯仰承接於婉若方且總羈就笄卜歸良族容纓未佩膏肓感疾上遣太醫髙手以視而藥石不效慶厯丁亥四月十一日卒年十有五矧才德既顯惟有待而發之惜哉天奪其夀故諸宗黨所以痛悼甚焉上為嗟惻禭以冠帔賻幣有加即厝於奉先禪院以慶厯戊子六月六日附竁曽祖潭康惠王之園兆謹記樂全集卷三十八
