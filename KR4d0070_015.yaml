body:
  text: 樂全集巻十五宋張方平撰芻蕘論食貨論輕重臣聞聖人以仁守位以財聚人故財者帝王之所以平理萬物養成羣生保邦御世安民制治之本也夫生人之用莫重於穀帛然聖人立成器以為天下利作為貨幣以通有無而後養生送死之物備貴賤之倫别萬物流布而不竭貿遷而無窮自燧人氏至於三王未有不以輕重之法為政者也通其變使民不倦明其天時辨其地利察其人力審其物理執權衡以御天下而操縱於其不平之間然後天地百物之情可得而見而輕重消息制於君上矣夫至動而不齊者莫甚乎人心衆趨而起爭者莫急乎財利故齊動在乎令息争在乎均人君者出令而主均者也長則縈之短則伸之虛則益之實則損之裒多益寡稱物必平示之以予之形而不見其奪之理使民由之不知其故而後可以制天下之變成天下之務也今國家奄四海以為富籠山澤之所産毛附之土有税横目之民有籍東南之美者大貝美珠羽毛齒革也西北之美者皮罽名馬也中國之産三品之金錦綺織文泉刀之利也夫鹽食肴之將鐵田農之本酒百禮之㑹茶衆飲之長皆管於縣官矣歴代所増横率雜調相循俱在貨物殫竭生人困瘁然而儲廪不為之實帑藏不為之積其故何哉盖物有貯滯利有稽伏開塞無術斂散不時有司徒能張其空簿多設科禁勾剥竒贏累年無捨勘詰毫杪萬里待報以至令下而詐起法出而姦生盖由不知輕重之權不達盈虛之道故畧大而規小忘逺而圖近者矣或曰司㑹之府實掌國財賦輿有經出納有程遵常循故謹守其度若之何輕重之為也臣應之曰今夫民有數金之業者猶知坐㕓行販準時趨利持其緩急取雄井邑况於為國乎况於天下乎故夫以輕重治食貨者民足而國贍弱國可以强其不知輕重之道者民困而國乏强國必弱請試觀於唐氏開元天寳時丕冒日出寰海平寧國本厚矣及明皇季年頗事侈費而崇禮慎矜韋堅王鉷希意圖寵剝刻百端不能開通利涂而專取於民倚法以弄權斂怨以搆禍四方騷動遂用傾危寳應永泰中承大兵之後民庶凋殘仍嵗凶荒中外艱食宫厨無兼時之積禁軍絶餉畿甸百姓挼穗以供之方嶽驕將旅拒傲命違慢法度征賦不入郡縣益减而得劉晏掌租庸以羡餘相補人不加賦自諸道巡院距京師置逓相望四方物價之上下水旱豐穰之地不浹日畢知故食貨之輕重權於掌握而能通其壅滯致天下無甚貴甚賤之物朝廷獲美利國用周濟下無橫斂民不知勞故唐世識者以為自㩁筦之興通其術者惟晏一人故開元得聚斂之臣不知阜財之術直取無名若奪攘剽畧故下困上虛以强盛而至喪敗寳應得計數之臣能明輕重之法以理財通用民賴其利以衰陵而獲安泰是知輕重平凖理國阜民之本也今國家賢材良佐濟濟在廷夷吾劉晏之比豈曰無人意者或任之而不盡其材歟遷歴之速不暇經久之謀以集功利歟是何山之麓海之濱積貨滯利之多而不知通洩東有遺秉西有餓殍而不知聚散冗游蟊蠧之害而不知去也乎意者任之而不盡其材遷歴之遽不暇經久之謀以集功利而然爾誠朝廷圖任賢能屬以大計使得自選郎官已下至於黄綬無限卑吏惟材是用為之官屬得以輕重用事而以成效責之必有管葛之才出焉自然和鈞齊物闗市不乏貨用足而國力贍賦斂寛而民生安矣原蠧上篇厥今天下生民之蕃四海山澤之富過三代逺矣賦歛所入財貨所聚加厚於漢唐内外無事無師旅戰守餽糧賞功之費無應聲卒具之征然民力益虧國用不贍中家以下衣食無餘其弊何由葢國有三蠧而莫之恤也三蠧而不恤雖太公之經權管仲之計數雅不能措國於安拯民之急也何謂三蠧一曰兼并夫兼并之人害農敗法上爭王者之利下固齊民之業擅斡山海之貨管林藪之饒役利細人以致富美規時輕重坐取百倍不知服田力穡之勤而菽粟餘於犬馬不知織絍紡績之勞而緹繡被乎土木馳車騰騎侔於貴戚藻井采題過於府寺因其富厚交通在勢爵可以鬻刑可以迴一悦所酬當中人幾家之産一享所費任上農終嵗之功夫如是小民何以自存農人安得不流亡農人勤苦而不能免乎饑寒而捨南畝而趨市井市井之人利奪於富强故窮而為姦盜姦盜日多誠農愈困是故民業並蹙國用益虛其蠧由乎兼并也夫富人所以能占市井之利侵農民之業者以國家不為權財貨之輕重明貴賤之制度爾誠能計本末之道審緩急之令平穀物之髙下視凶穰而斂發隘其利途使出一孔均其損益調其盈虛使强賈蓄家無所牟大利則權在君上惠在細人矣古者四民各食其力執藝作業以奉一君故其役易供其求易足今邑有君長之尊里有公侯之富豪奪單弱踰冒王禁是民寡而君之者衆也先王制典其國家宫室車旗樂舞衣服飲食賓客祭祀之慶乃至冠婚喪祭之式自天子至於大夫士秩位尊卑莫不異數所以厚其别也至於制庶人之産使之仰足以事父母俯足以畜妻子衣食足而信立矣故使雖富不異服無故不食珍入幣不過緇帛五兩合親不踰一肉衣食之餘皆踰分者也蓋撓枉者過直救文者以質禮義本於朝廷風俗始乎京師上行下效其應如響今雖未能取諸古謂宜平四民之業無使富人專財盡物自其室宇車馬器服奴婢宜益為制度撙節之夫分定則易足欲寡則不爭雖積貨財無所張用則其貪聚之心知所止矣上以厚國本下以勸農事使民有讓而刑罰以省天下由乎軌道無不足之患其惟去兼并之蠧乎原蠧中篇彼兼并之族害農敗法誠王者之弊民矣抑庶乎游入於釋道之道者之為蠧大也古者聖王域民分其四業有大人之事有小人之事或勞心或勞力勞心者治人勞力者治於人治人者食於人治於人者食人惟士者勞心而食於人農工商賈皆勞力而相養者也在昔理古朝有誠士野有誠農肆有誠工市有誠商及其下衰風教薄而民俗壞於是士飾偽行農去本業工作淫巧商通竒貨雖末路益開抑猶四民而已於後黃老之説出於秦漢晚乃更有浮屠氏至焉魏晉之後天下傾裂永嘉之亂彜倫咸斁羌胡雜處於諸夏衣冠流布於荆吳寖滛得志而其教遂大故詩序曰小雅盡廢則四夷交侵中國㣲矣至梁氏其徒益橫民益昏墊迷不知悟歴唐至今浸滛瀰漫橫潰不遏先王之道不絶如綫九疇五教天人之法置而勿論凡厥庶民捨君父之尊而事其土木之像畧忠孝之道而誦其謬悠之言簡律令之法而循其戒咒之説忽賞刑之命而果其禍福之報割衣服之用而奉其莊嚴之費侵貧人之業而資其游惰之徒上自宫禁戚里公侯下及士庶其所以信而嚮之無間然者古之教民各執其業父訓其子兄勵其弟少而習焉長而工焉不見異物而遷焉故經俗有常民志不亂制度而立邪僻不生今天下十室之邑必有一伽藍焉衡門之下必有一龕像焉異巷朋處喜相祝怒相詛一話一言必以浮屠之言為證少而習聞長而習見如之何其不淪胥以入其流也是以源深而脉長根固而枝茂其徒滿於天下而人不知厭苦國家之帑藏耗於上百姓之財力竭於下以人主之威權發憤而芟夷之纔息而復熾以正士之辯智扼腕而深議之言出而罪及是以其徒益張明無日星幽無鬼神前無羲皇後無周孔以誣惑蠧食於此黔首也廣殿大厦制度如帝居其徒是處羅紈纖縞其徒是衣稷粱滑甘其徒是羞而或貯積謀利坐列行販賦役不及兼侵農賈古之論理國者以為一夫不耕或受之飢一婦不織或受之寒今釋老之游者略舉天下計之及其僮𨽻服役之人為口豈啻五十萬中人之食通其薪樵鹽菜之用月糜穀一斛嵗得穀六百萬斛人衣布帛二端嵗得一百萬端竊度國家之制財用也上以給郊社宗廟百神之祀百官廩祿六軍糧餽其計至大矣倉庾之積仰輸東南然而嵗漕江淮之粟入之太倉制不過六百萬斛而莫之登也則是釋老之游者一嵗之食敵國家一年之儲也而四方列郡邊塞之地常苦兵食之不足至於天下不幸水旱之沴蟲螟之災黎氓填於溝壑餓莩流於道路思以賑救之而計廩積而莫之贍也則其蠧有自來矣然則奈何蓋聖人之制度也以道變化與時消息作事謀始必順而正在易節卦之象故甘節則吉苦節則凶若夫已失業之民敺而復之南畝毁其廬籍其産則所以節之不既苦乎今誠撙省其傷財害民之事稍禁其營築土木亡度之費益峻其姦盜冒法之律而無下普度霶霈之澤則不及世而亡其大半矣幸而省其大半之衣食以益於民天下其不加裕乎詩曰愷悌君子求福不囘若其賑貧窮恤孤寡禮髙年存疾病蠲逋負寛賦斂簡刑罰振淹滯此誠人君布德於下受祿于天之道也卿大夫事上以忠行已以正臨下以惠則服天休命克享有家庶人謹身節用以養父母則不罹于咎自然風俗歸厚上下與足堂堂乎邦民咸乂又惡乎釋老之求哉孟子曰吾聞用夏變夷未有變於夷者也其是之謂乎原蠧下篇三代而下言治國者惟漢唐至我朝焉天下其猶故也以言乎蠧則益多矣漢以兼并唐則釋老我朝加以兵馬蠧出於一百姓有不足者蠧出於二國且虛乏三蠧並生若之何而冀上下之豐給也蓋天生五材世所並用必有武備邦之大經夫兵國之衛也何蠧之云乎以夫置兵之法與古已異是以謂之蠧焉爾自三代而下逮於唐兵農一本故周氏因州里以起師旅齊人脩内政而寄軍令漢法調民代更以充邊戍唐制案籍科發以備府兵故其人耕則為農戰則為兵未有平處安坐仰衣食於帑廪者也案用兵之法馳車千駟革車千乗帯甲十萬計其財用日費千金故兵貴拙速不以久為巧者懼其屈力殫貨以弊國騷民也故善用兵者役不再籍糧不三載取用於國因糧於敵今自禁衛通於州郡之冗卒不啻百萬恣口而食舒臂而衣數日為期以取賜賚是日有萬金之奉無時休息天下供偫安得勿困夫用兵之術考之前世惟唐氏最為無數凡起徒役集藩鎮之兵出於其境則食於度支故驕將悍卒隂相連衡緩師養冦邀圖寵利國力不能給輒罷釋而更厚姑息之然猶師解則費有時而息矣初天寳中廢折衝府立武士帳而兵農始判代德之後内外多難益設禁衛始立名號而有天威神䇿之軍至於有大征討起大徒衆必發諸侯之師故寳應建中國雖多故其所漕引江淮之粟以給闗中以供兵食纔四十萬斛猶莫登焉今者運於東南輸之太倉十倍唐氏猶常若不逮也京師之民口億萬計大半仰食軍稍之餘故在稻粟之鄉耒耜之民寒耕暑耘常無餘粒中人已下率無蓋藏强家之儲鮮及新穀罄地之力窮農之功悉卷而西都為兵食故臣數為一蠧為其置之之法與古已異矣然則奈何若夫上不闕武備下不耗國財則臣嘗有民兵之説足食足兵不廢訓練則臣嘗有屯田之論儻見採於廊廟之上潤澤而試之不十年而精兵皆在南畝矣然後寛徭薄賦勸農務本損上益下民說必以無疆捨禁去譏國用自當周贍家給人足禮義興行洋洋乎頌聲盛德軼乎三代矣謹論樂全集卷十五
