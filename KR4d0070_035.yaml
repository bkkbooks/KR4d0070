body:
  text: 樂全集巻三十五宋張方平撰祭文祭故贈天䇿府上將軍燕恭肅王文為中書作維慶厯四年嵗次甲申三月癸亥朔二十八日庚寅具位某謹以清酌庶羞之奠恭祭於故贈天䇿府上將軍燕王之靈昔在太祖造我有宋實撥亂世而返諸正太宗撫極始大一統寖昌而熾則八斯男於穆真皇光宅萬㝢潞許邢潤逮於蘇華並建茅社為國親屏惟王最幼最享多福愛於太宗友于真皇重於今朝尊貴莫二沈識藴而不發威望懾於四夷命也有涯今則已矣聖懐感悼淺服逾時隆器重名舉極恤典靈輴即逺國門既軷某等遘時休運忝列台司雖曠接於儀形固上均於慘痛恭陳薄奠申訣㡛帷伏惟尚饗祭故夏國主文内制維慶厯八年嵗次戊子月日皇帝遣朝散大夫尚書工部郎中直史館輕車都尉賜紫金魚袋曹頴叔致祭於故夏國主之靈惟靈保祚世家撫有民社光膺禮命重處翰垣貢職惟時恭勤載懋宜昌而夀荷國之休訃告奄聞震悼無巳繼承有體俾統於舊封贈恤之儀式如於彛典爰馳使馹臨赴奠楹知氣如存哀榮是享尚饗故入内副都知贈振武軍節度使堂祭文維慶厯五年嵗次乙酉八月甲寅朔六日已未皇帝遣禮賔使帶御器械勾當皇城司于徳源致祭于故入内副都知贈振武軍節度使某之靈㡛帷即逺泉隧無還念其生平恪宣謹力致兹芳酹慰爾營魂故入内副都知贈振武軍節度使墳所祭文奄謝昌時邈歸長夜體焉則降魂無不之永恤舊勤爰陳嘉奠故入内副都知贈振武軍節度使堂攅祭文惟爾乆在左右不忘恭勤隙駒靡停壑舟遽失輤裧即逺泉隧其幽清樽芳殽以將追悼祭資政范侍郎文維皇祐四年嵗次壬辰七月甲辰朔具官某謹以清酌果羞之奠致祭於故資政殿學士戸部侍郎贈兵部尚書范文正公之靈嗚呼孔氏之門四科髙弟惟達者之十子得聖人之一體猗嗟乎公徳行則充文學純深政事閎通風節是勉名教是踐玉氣千尋金精百鍊赤墀清規正色讜辭引義忼慨主尊臣卑夏戎不䖍文告弗悛付公蕭斧詩書在邊公允文武威行士附革其鴞音亂亦遄沮復節還臺皇皇泰階縉紳謂言股肱良哉維直方大熈帝之載古訓是式王猷亶邁惟日孜孜愛莫助之時望去朝識者曰咨比釐南夏爰徙東社遘癘避劇汝隂促駕彌留泗濵竟號車棼精氣歸天復其清純死生去來於達奚哀渠渠大厦怛此棟摧公陪宰席嘗僚右掖炳然絲綸賞有餘色濤江湯湯徃襲遺芳見公禾興徳音未忘念言薄祜遭家艱疚莫適匍匐殞涕如溜平生素琴已矣知音寄衷一酹髣髴垂臨尚饗祭蔡參政文維寶元二年嵗次已夘七月庚寅朔十五日甲辰具官某謹遣右都押衙許思義以清酌庶羞之奠致祭於故參政侍郎贈禮部尚書濟陽文忠公之靈嗚呼公乎以公之徳之仁而中年以歿世乎天之報施略茫昧乎太夫人齒髮髙矣喜懼侍飬晚乃得子未及撫而名之而公捨以長逝乎公既生而不以家事為意捐館之日柩無所歸家無所寓不然孰知公之清節素志乎嗚呼公乎以公之徳之仁何負於天而至是乎公之事親如事天以為盡天下之美不足以報也公之事君如事親以為竭心力之勤不足以奉也公之待故舊朋友如待兄弟義之盡也公之視四海之人至於一物之細如視赤子愛之至也公之心如青天白日光明曠達華夏蠻貊同仰之公之行如渾金璞玉精華温潤無賢不肖同寶之嗚呼邦家之務生民之故茲念茲憂愛莫公助如何難諶云亡之遽某爰始羈微公實賞知已衣其寒復飽其饑延譽於朝聞薦於帝再濫詔選皆公引提公亦類舉非苟以私前年暮冬見公潁川姿神意氣和悦温然違别戀戀孰期終天單官江外萬山阻延不見裧帷歸旐翩翩涕淚流膺下霑九泉公有慈親公有弱子於焉展報其不有年嗚呼公乎庻幾鑒旃尚饗祭舅氏翰林學士嵇公文維皇祐二年嵗次庚寅十一月甲申朔八日辛夘謹遣家僕以清酌庻羞之奠致祭於故舅氏翰林學士譙國公之靈某粤在童年早依外氏惟舅文行是親是師廣平君之嚴明外王母宋氏南陽君之慈懿舅前夫人滕氏訓誨鞠育遂偕賔興筞名六科入游兩禁歴踐臺省周旋顯要舅繇文館乃登掖垣十年京華聨步朝闥瞻言母黨之重實兼僚友之歡休澣更過笑言莫逆漆園柱下楞伽净名相期逍遥之遊兩忘契㑹之際委勢利於塵滓遺生死於幻泡夫物芒芒不屑顧已前年小子遘閔南徂倉卒去國舅又卧疾不及執手折簡叙違永陽秣陵再周嵗籥豈謂此别遂成永訣前者七月猶得手書草札數行盖已扶病辭意悽愴異於常時老母閲之即為大戚小子猶謂兹無憂者乃舅宿疾間年輒發叔平訃至竟如母言承問駭怛殞心摧臆老母號絶痛不忍聞嗟嗟蒼天孰主張是吉人君子胡不夀考長子先逝遺稚藐然孤櫬東歸匍匐莫及念言思此悲來填膺戚文信來云有理命百日之内即安舊塋先公夫人南陽賢淑復與愛子共此泉壌九原可作神所慰矣戚信仍説舅自卧疾迨於順化晏然沉寂一念不動得首楞嚴本無去來亦何所住幻身雖滅我又何悲寄懐此辭示同世諦尚饗祭紫微韓舍人文維皇祐四年嵗次壬辰六月一日甲戌具官某謹以清酌果羞之薦致奠於亡友紫微韓君仲文之靈維夏臯月曉魄隅出明發不寐悲纒心骨念母氏之劬勞復襢衣於兹日晨有使來致君慰札發函號讀怪非手筆云感外寒方偃諸室口占書辭意殊詳密我弗以憂誰不有疾緘報章而未遣傳凶問於奄忽怛人事之無常何變故之倉卒也嗚呼哀哉惟我與君義則友生情猶天倫忘形莫逆寫照存真音適塤箎之和氣襲茝蘭之薫在明道之癸酉始傾盖於京輦洎寳元之庚辰並飛綏於文苑欽才致之開敏挹風局之通簡景行業之英實味辭義之腴雋何宴嬉之不同諒趨舍之無間㑹浹日以驚疎朝異班而恨逺嵗困敦以南謫同江淮之徃蹇俄叨命於秣陵君來司兮漕輓及春物之未䦨見畫艫於津館揮醉袂以相屬覺遲景之遽短邈江山兮清曠澹懐抱之攄展喜嘉召兮暮秋帳石城兮飲餞乆相望兮中流君之舟兮已緩䇿余馬以獨歸城鵶噪兮落晚恃年華之未徂奚離索之多歎亦孰謂乎夫君遂中天於此旦嗚呼哀哉人倫賞裁嗟我不明謂君器業實時之英必當機柄而立功名此盖公議匪私交情甫慶掖垣之擢方參法從之榮曽毫釐之未售矧靈府之從衡摧鵬翼於順風僨驥御於修程世大體兮多艱天施化兮靡平惟才彦之不可多得余哀君兮乃為聖朝與蒼生哭之慟兮寢門重余憂兮峥嶸指幻泡之起滅彼真諦之論精紛物我兮異同亦達觀之齊冥惟延促兮妄立緬胡為兮殤彭寄余誠於一酹時無忽於友聲尚饗祭楊侍郎文維皇祐元年嵗次已丑十一月庚寅朔七日丙申端明殿學士右諫議大夫知江寜軍府事某謹遣府吏奉清酌庶羞之奠致祭於工部侍郎楊公之靈惟公道徳醇厚山髙淵黙才允文武好是正直振迹朝綏飛聲霜䇿遂簡帝心外為内翼殿撫方面景從宸極訓輯戎䇿藻繪衮職敷經邇英稽古之力戊子暮春公致為臣年猶未也蕭然幅巾老成去朝我心慘辛爰合常僚閨臺嘉賔供帳淨廬以祖清塵接膝晤言街鼓振振權利見規實書諸紳陽羡釣舟期從公遊公即席賦詩留别餞客斷章云陽羡溪中有釣舟淪胥出守願言不酬徙麾建康蠡瀆比疆區區未通俄頃炎涼視公吉履謂斯齯齒天奚難諶遽遺杖几有子而才構業必偉嵩髙維嶽土厚如削逺即幽宅素旌綽綽復命曰常收神冲漠屬叨藩寄阻從弔位念言契濶濡膺隕涕吁嗟乎公歆兹一酹尚饗祭張密學文維皇祐四年嵗次壬辰八月癸酉朔四日丙子具官某謹以清酌果羞之奠致祭於故京東西路安撫使樞密直學士給事中張公之靈在坤六二臣道之美曰直方大維徳之體公仕初艱實勤素履肅以直内有勁如矢義以方外其平如砥守長郡邑忠恕愷悌承介臺省清規逺惠陟降侍從周密莊厲斡輸餽邉總戎在鄙寛國之憂急民之事知無不為於公之利聞無不革於政之弊惟日不足竭精盡瘁竟虧冲嗇以遘瘥沴靡究志用遽淪智氣比者秣陵嘗踵風軌帳軷津館徽音在耳洛師汶上訊幐接置晤言未諧素車倐至苴杖在廬阻從弔位慘怛盈衷寄兹一酹尚饗江寜府祭蔣山莊武帝神文維皇祐元年六月一日端明殿學士朝散大夫右諫議大夫知江寧軍府兼管内勸農使提舉宣歙等州軍兵甲公事輕車都尉賜紫金魚袋張某謹以清酌時果之奠敢告於蔣山莊武帝之神霪雨作沴浹旬未止民弗寜於厥居懼無以輸上經賦供神常事以至於饑且窮也某非才為之長吏慮政不敏以致咎罸謀於僚佐所以徼福皆曰祈雨而雨禱霽而霽庇祐茲土惟帝聦明屬限詔條不得躬謁以請也謹差將仕郎試秘書省校書郎行上元縣張康侯以告帝尚降鍳矜此下民尚饗祭真武靈應真君文維皇祐元年六月一日具官某謹上啓真武靈應真君某典守茲土既無惠政何以徼天之福下庇吏民粤惟仲夏嘉糓既殖霪雨不止懼成灾沴瞻言靈宇肇自前朝區區一方乆知依奉敢稽舊禮仰黷威神尚俾山川無作霖潦垂祐黎庻嵗以順成尚饗祭謝蔣山莊武帝神文維皇祐元年六月七日具官某謹遣上元縣尉張康侯以清酌庶羞之奠敢告於蔣山莊武帝之神昔有呉氏之開國於江左也封内之望實維此山兹土兹民獲免於灾沴札瘥之患惟帝之徳近苦霪雨將害田稼故致區區以伸䖍禱伏䝉昭答雲收氛散庶幾農穡遂以順成敢薦熟腥徃謝靈貺尚饗祈雨醮壇詞成都府臣聞惟天洪覆斡萬化之生成惟人至誠通上靈之鍳格敢申悃愊仰黷髙明粤茲井絡之疆遐處一都之㑹田穰有限生齒寖繁民勤稼績之功嵗無水旱之沴頋賦租之僅給猶衣食以不充矧非順成即致荒散比從改嵗迄此仲春三農作務之時九種播殖之候時暘過度雨澤愆期精禱未孚衆情同恐臣忝膺朝寄長此吏民内愧匪才不能稱職且懼政刑之謬上累隂陽之和宜以㣲軀獨當隂譴所祈甘澍早及大田庶濟黔黎免罹災害臣無任懇禱之至謹詞謝告詞維嘉祐六年嵗次辛丑六月壬子朔某日具官臣某謹稽首上啓伏念臣託質大鈞禀靈生物早棲心於道妙方寄迹於宦游顧有鄉廬用存家屬向集繕完之役已終築葺之功其間就方位之便宜犯日時之拘忌竊虞隂譴積致於忤違謹按明科祇神於謝告伏願上清真聖下土神明降鍳矜全垂慈保佑俾昌厥後以永獲安臣無任懇禱之至謹詞嶽祠祈雨祝文應天府維年月日具官某謹以清酌時果之奠謹上告於東嶽天齊帝伏以自秋七月迨今立夏亢旱不雨風霾無時麥初出穗糓未下種蟲蝗孳生癘疫薦作下民嗷嗷無所寄命憂懼惶惑莫知攸訴謹自薫祓致䖍祠庭夫膚寸之雲不崇朝而澤天下惟帝之徳幸䝉恩憫甘雨時降俾兹黔首免於災害敢不勉於善政以上對於靈心尚饗祈晴祝文秦州某叨被朝命守兹藩閫署事已將周嵗未遑躬謁靈祠麾符所繫非敢怠忽惟王聰直威烈西土之望生民之命待嵗順成風雨以時則無災害夏秋之交霪澍不已頗傷稼穡懼致艱食長人不佞深自咎責爰擇吉日恭伸享奠尚鍳衷悃同恤一方哀此黎蒸俾免荒札官私上下當竭誠禮共薦時事以荅神貺祭蔡資政文維元豐二年嵗次己未五月十四日辛巳宣徽南院使光禄大夫檢校太傅充東太一宫使上柱國張某謹以清酌庶羞之奠致祭於故資政殿學士諫議大夫蔡公之靈惟公質有文武資長政事凡所踐歴必存稱紀理財正辭曰信與義除暴戢姦令行禁止著勞南國宣威西鄙區槖破散烽塵消弭公議曰能朝僉載韙一節遄歸樞機是委股肱喜哉元首以起密䇿造膝逺猷當指濶步功名謂不移跬如何大車僨於平軌窮通險夷孰主張是我姻我舊我鄉我里奄隔幽明緒言在耳芻靈寓焉將此芳酹乆要不忘尚有銘誄嗚呼哀哉尚饗祭王龍圖文維元祐元年嵗次丙寅五月丁巳朔二十二日戊寅太子太保致仕張某謹以清酌庶羞之奠致祭於故龍圗閣直學士知應天府王公之靈先正文康仁朝樞宰有顯事功國䇿收載公起世家學優而仕直哉維清風類是似惟功之資信厚為質頗僻之萌不接心術故其立朝克秉常徳施於政事允蹈淳則天地之理見於簡易君子之道本於愷悌陪京二年治用誠恕民悦無苛先吝其去方謀借留言上未及忽驚鐘聲父老相泣雖未上夀星紀六周乘其積善邈與天游有子克孝白華之潔逝莫能從一號三絶我聞傷之爰作斯誄著其至性以章於世嗚呼尚饗祭滕龍圗文維元祐五年嵗次庚午十一月辛酉朔十五日乙亥太子太保致仕上柱國張某謹以清酌庶羞之奠致祭於故龍圗閣學士光禄大夫滕公之靈惟靈倜儻閎達逸羣絶倫始踐廣場衆推竒人洎登近著朝謂名臣神宗即阼訪落初政公在諌省靡言不聽獻納之益施於號令寘於西掖乃執邦憲召入禁林亦尹京甸一麾出守于蕃于宣悠悠江湖凛凛塞垣徙地淮海實便吳閶憩於國門易車而航解維有日親賔未還方歌而哭宿夕之間世故無常變不旋日孰主張是於何致詰我念與公義好為篤惠子知我潘楊載睦我老在廬遲公從容舟次津亭繐幃已空淮人來迎畫鷁相連今其歸矣丹旐翩翩嗟我耄衰情禮多闕寫哀一酹以伸永訣嗚呼哀哉尚饗祭蔡資政文維元豐二年嵗次已未七月二十九日乙未宣徽南院使光禄大夫檢校太傅太子少師致仕上柱國張某謹以清酌庶羞之奠致祭於贈工部尚書蔡敏肅公之靈惟公之才無適不宜惟公之志果於有為自初登仕鋒頴已見江南陜右績用丕顯簡在帝心中樞是付實講戎畧以承神武混夷震驚仇方是懲獨念之深疾入股肱嗟我與公少也友生黨序之遊繼以姻盟我老家居公病在床莫復笑語何殊他鄉命也有涯英魂豈昧平生志業銘詩具載日吉時良爰即窀穸遣息一酹幽明永隔嗚呼哀哉尚饗祭趙少師文維元豐六年嵗次癸亥四月丙午朔十六日辛酉宣徽南院使檢校太傅太子少師致仕上柱國張某謹以清酌庶羞之奠致祭於鄊老贈太子太師趙公之靈嗚呼仕顯王庭老歸鄊社我思故人今誰存者並游辭場麻衣如雪接武重金同茲大耋得謝掩關相望一陌樽酒笑言累經青白公病再期去年我病四旬徃來亦足有省公來視我欲興不能我徃候公公莫能興忽聞鐘聲公已脱屨非幻不滅何云去住倚戸而歌此事驚俗於行一酹衆哭亦哭先塋拱木體魄則降如其知氣豈埋泉壌嗚呼哀哉尚饗祭王端明尚書文惟公先正弼亮真宗從享於廟為時元功公承世家以才自致施之有政中和敏惠有為有守時推器識廼登諌垣補兹衮職四國於蕃四方於宣平涼常山至於太原坤維巨屏浚郊神甸帥節守符中外更踐出處三朝事功懋建公資樂易達生任真賔朋罇俎不虛佳辰脱屣世纒斵彫為樸富貴多忘爽如夢覺兩京相望晤㳺面濶忽聞遺言乃云永訣公於自性示既有省凡此聚散空花雲影人悲亦悲我何以異姻舊之私寄情一酹陳州祭太皡廟祈雨文惟帝乘震司春徳施化育萬物資始迄就嵗功此為舊墟實存命祀今方東作旱氣作沴百糓草木仰待膏雨乆未滂洽田野揚塵伏兾慈鍳俯垂矜祐時降甘澤稼穡順成凡厥含生皆䝉仁濟尚饗陳州祭商髙宗廟祈雨文昔上帝賚王良弼乃得傅説爰立作相而命之曰若嵗大旱汝作霖雨惟説式克欽承用能復興商道故王盛徳享祀百世今嵗可謂大旱矣説之光靈乗東維騎箕尾而比之列星王尚畀説復作霖雨大濟生物迄成有年區區下臣敢効誠請祭女夫故河北路轉運判官殿中丞蔡天申文維熈寧七年嵗次甲寅月日外舅某官遣息某具清酌庶羞之奠致祭於女夫故河北路轉運判官殿中丞蔡郎之靈嗚呼我在滑臺聞子彦秀鄉黨世交遂成姻媾徃牧蜀都任子校書一上中第聲光煒如學問滋洽辭章爾雅敏於從政有過人者朝廷爾才擢之不次京西河北俾專使指此時尊甫密勿近輔棣蕚聮華刺車接部驥髦未騁鷙翮方整悵望修途空嗟倒景籍始通朝年未强仕實勤其官以速彫瘁初歸庭闈寵光甚渥今出都門素旌綽綽吉凶糾纒勢靡有定將如之何不推之命慨余老矣繄爾之託而反爾哭事奚可度四子余出總角相扶遣息徃酹且撫其孤尚饗陳州祭唐贈太尉趙公文犨維熈寧七年九月丙申朔二十八日癸亥具官謹以清酌庶羞之奠敢昭告於唐贈太尉趙公有唐之季大盜移國封豕長虵踐食區夏生民塗炭城邑丘墟公於爾時獨保孤壘攻圍幾年浴血百戰陳之遺黎竟脱賊口兄弟三人繼登將相並有功徳著於此邦而其像貌晦於闇璧邦人不知乆不克享某祗膺朝命再來領藩惟公忠烈能捍大患寫之繪素神氣凛然乃建祠堂式薦時事夫封為上公祀為貴神春秋之義禮典攸著奉之廟食永世無斁尚饗南京祭喬太尉廟祈雨文惟神生為上公歿而廟食墳墓子孫殆今千載一方昭事神靈如在凡有祈請罔不貺答念兹境内夏秋以來水潦蟲蝗灾害已甚近又不雨復成亢旱秋成失望首種未入人心惶惶相與憂懼惟神哀憫時降甘澤殄除蝗孽粗以有年仰兾聰明鍳此䖍切尚饗樂全集巻三十五
