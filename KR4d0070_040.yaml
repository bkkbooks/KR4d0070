body:
  text: 樂全集卷四十宋張方平撰墓誌銘皇考金紫光禄大夫太子少師墓誌銘并序推誠保徳崇仁翊戴功臣觀文殿學士特進行吏部尚書知徐州軍州事兼管内勸農使提舉宿州淮陽軍兵甲廵檢賊盜公事上柱國天水郡開國公食邑四千户食實封一千户趙槩撰序睢陽有隠君子清河公世家宋人自唐季五代藩帥擅勢豪傑多見縻用公曾祖克以材略仕歸徳軍顯名東諸侯節度使皆倚以自重領亳州刺史行州事祖文熙通經從使府辟為軍事推官考嵪太平興國五年進士擢第風表秀偉長民有政太宗皇帝臨軒召對嘉其器望選知鄆州賜之親札優以金俸搢紳以為寵終尚書都官員外郎今贈太子少傅少傅篤厚長者夫婦奉佛中身未有子相與精禱乆之夫人夢天人乘空而降捧一嬰兒授之曰以是為而子因妊生公幼而莊介不戲弄不嬉笑人莫敢侮狎稍長就學記誦彊敏他日少傅曰人不學不知道道在六經也曰諾即習通諸經然非其所好也他日又問盍婚宦乎曰諾婚而未宦少傅即世遂不復仕曰向者從父之命今姑從吾志貲業素厚悉屬之弟十餘年間隳蕩亡餘一不為問乆之其子某通顯於朝比至翰林學士承㫖户部尚書㕘知政事天澤下施自葉流根公自大理評事太子中允太常丞歴尚書工部刑部兵部員外郎郎中至秘書少監以及今贈子領益部賜公階朝散大夫解三司使賜公金紫皆特恩也家人奉章綬服以拜賜然不再服矣從子之官所至官舍入府門更罷乃出僚吏無識者金陵錢塘秦亭有林園樓堞可以眺望山川之勝未嘗至其所也其在京國鄉里亦爾獨處一室四十餘年世緣人事不以自累貪愛巧偽之為平生不接于心術菲飲食衣至於不任補紉而後易羞有常物不得輒有加者居處器用不易其舊夫人先公沒十七年夫人既沒不復見婦人之面孫娶婦入門隔窗一㕘竟不之識早歲猶有山僧野客間相見者晩年悉不復接家有吉凶之事悉不復知其節孤峻如此尚書自錢塘丁先太夫人憂候潮京口錢塘淨慈寺老宿僧惟清行甚髙聞公常日宴坐語其徒曰是公豈所謂得一切淨功徳莊嚴三昧者耶我為善知識應為發起宿世善根乃至丹陽請見公欣然接納清問公住無所住耶公曰我住正住清曰公亦憶念耶公曰如是我正憶念後數相見公竟别無叩問清告其徒曰是不可思議當知公巳乆植衆徳夲巳得諸根清淨得大善寂力住無生法忍入甚深智慧徃者雖子孫常所親近亦不知公所存由是乃知公遊方之外逺矣尚書早晏定省燕居侍坐語寒暄起居外未嘗及他因事警䇿必有深㫖尚書自南京遷秦州慮公樂鄉里且迎侍道逺請于朝求寢新除詔書三下公謂其子吾猶可行君命豈得取必也哉吾聞先人話前朝事要官重寄莫敢以便私辭命者吾從若在滑州官舍所居東壁見題名記曹侍中除滑州節度自降麻到官中間不浹日有如是偃蹇者耶既行左右奉輿公曰此何為者尚書前白迓人實多數易不足為勞公曰吾從先人屢領郡矣見郡遣逆者白直不過二十人無兵卒也自雇車乘家人槖裝共載今官長自奉乃爾天下安得不困吾平生未嘗用人力今豈以老身使人肩輿徃還五千里竟不就輿乘馬度隴坂西人見聞莫不歎息其義方大體如此公自少無疾不服藥未嘗令醫診脉治平四年歳在丁未九月示疾十月五日昧爽寢適興居曰東方明乎吾其逝矣言終而歿彌日頂溫至于眉宇間七日而殮手足不殭上聞嗟惻使近璫弔内司賔臨奠以太子少師告第享年八十有三配仁壽郡夫人嵇氏靜溫有賢徳公諱某字化生化生云者先少傅以是志其始生之夢也王父贈太子少保王母蘇氏武功郡太夫人妣劉氏彭城郡太夫人一子尚書公也二女長適士人蓋襄次適比部員外郎蔡修孫曰慶基大理評事熙寧元年戊申冬十一月十五日甲申𦵏于宋城縣仁孝曲孤子方平泣血銘曰世報生身夲如幻如幻起滅非實相智者明知起滅空故離諸緣還自性公直善根非一刼宿集衆徳妙莊嚴現有眷屬常逺離雖在家居已明脫癡惑所生諸煩惱不可汚染如蓮華不修觀行常寂然是則名為真宴坐常正定中無依慧萬行非功自成就是則名為真功徳河沙無量空無邊浄智妙明非識想豈與色聲共生滅來如月影水中圓去若浮漚歸性海金剛堅固無有壞須彌盧山不動摇離一切相清浄身超越假名出三界朝請大夫行侍御史知桂州軍州事上柱國贈禮部尚書扶風馬公墓誌銘并序公諱誥字仲謀魏人其先趙奢為趙將破秦兵閼與下有功號馬服君後因為氏漢武帝時以吏二千石自邯鄲徙茂陵故中興伏波將軍援為扶風人魏建安中有漢傑者從袁氏河朔占籍清河故唐中書令周為茬平人開成中有繼勲者事魏博節度使何進滔徙家魏故公為大名人曾祖崇義善騎射以材略聞歴魏軍右職奉羅洪信為帥累戰多授懷州團練使紹威承襲患牙兵横强隂結汴人以除其逼懷州亦遇害子士安幼有氣節感家禍晦居里墅乃治産居積逐時以致厚貲立信義嘗曰吾權斂財散賑不贍是亦為政矣生昭美明經篤行以父晦居亦不肯仕即公之考也公之登朝贈殿中丞公弱不好弄資性沉毅及冠竒表長七尺行純孝謹讀書通大義不為章句與冦萊公準張僕射詠友善意氣相得太平興國五年偕行就舉同登進士第釋褐授大理評事知邵州邵陽縣政多惠利上官以課最聞就遷將作監丞代還授著作佐郎丁外艱時朝廷急於用材詔起公倚廬除殿省丞充御史臺推直官毁不堪命辭弗得巳就職俄遷太常博士公外疎達議論辯以裁舉中機節而合大體太皇數稱奬因對面賜五品服遂改殿中侍御史屬三司判官缺員執政以公名上上曰馬某材器朕自知朕行自用之中書無議為也後數日命公使江淮采訪州縣治狀民俗事宜引入受㫖賜之裝金襲衣束帶韉勒馬彯纓寵章殊渥搢紳聳觀既到部攷羣吏之課慰薦廉善三十餘員上輒次第甄擢後亦多至達官其不修者稍平鐫之因民便利去其苦徹偽朝弊事細大數十條即拜侍御史還屬太宗晏駕真皇纂服公孤直少與左右莫為之地故先朝所以待公之意上未及知也屬詔百寮言事公奏疏復忤執權者真皇初臨御間問大臣所以撫綏逺方之意執權因白公才可用即出知桂州兼總廣南西路兵馬嶺外常燠石藥發瘍而終于郡享年五十噫士之幸而得展者宜希矣哉功業視其材用捨繫諸時窮亨屬乎命是三者契而後為全若公者遭時盛隆見知英主摶扶摇而直上追逸景以遐騁將相必至之地也而鼎湖不待明離改照機言旁發南服于行終身不還齎志長謝豈非命耶夫人嚴氏寛明有徳年七十二後公二十五年以歿三男曰絳理識清通風節髙勁有公望於時歴御史三院是以似之今為太常少卿故公累贈至禮部尚書夫人東海縣太君曰繹曰紹無禄早世一女歸符氏鑑終縣大夫慶厯七年始命北都置留司御史臺而奉常請行以便襄事八年戊子十月某日𦵏我公夫人于大名縣某鄉某里先塋之右某託于姻媾平日熟聞奉常語公之故矣及是以誌文見命謹序所聞屬以銘曰堂堂公之材兮邈邃深而崔嵬既逢時而利見謂功名之余諧帝初命公式是南方鞗革瑲瑲為龍為光按節還朝大明繼照孰為巧言于藩嶺表公在桂林慆慆不還士友無戚公髦未斑畨山綿延越江浩渺吁嗟歸途翩翩素旐卜新宅兮並先塋草樹接兮水泉平尚宜子孫多才英永春秋兮陳芬馨贈贊善大夫嵇府君墓誌銘并序嵇氏出魯奚斯後徙會稽為稽氏魏有稽喜後徙譙嵇山為嵇氏中散之髙直侍中之忠義譙諸嵇也故今譙宋之境嵇氏為多府君諱適字利徃實睢陽人王父某考某屬五代亂潛徳家食初王父頗以財雄里中好施歲饑發積粟視告糴之窮窶者宻納其貲粟中歸之隂寘食于路以濟餓者務為自晦府君生國初王略猶梗縫掖者鮮鄉先生贈禮部侍郎戚公同文始大講學著錄牒者自逺方至王父與同里閈親善以府君屬焉授經通大義為門下髙業舉進士第歴汝南褒信尉掌洛之鞏江陵之石首簿果州流溪令越潁廬三郡紀綱掾祥符四年十一月十日考終于合淝之官舍享年五十九府君姿表秀舉襟局雅重性寛和寡言笑平居燕坐拱黙終日雖倉卒未嘗趨步疾呼家人未嘗見其懈惰之容喜慍之色其與人交不逆詐不苟䛕終身無與嫌怨者莅官臨事主於忠恕局事修整不出其位不為虚言竒行以邀聲名委蛇乎州縣之職而優為之古所謂足於巳無待於外者乎識公之道者以比苟當塗陳太丘焉夫人廣平宋氏賢明有法度婦道順以正母徳慈以嚴後君若干歲歿年八十有二男子四人長曰宗旦俊邁有奇才次閔次顒皆早卒幼潁今太常博士集賢校理倅南京留守事女四人長歸杜氏次王氏次張氏戚氏司虞郎舜舉贈禮部之孫也府君之在石首有邑吏父子抵罪皆當坐死情足矜者府君心惻之推免其子及父就辟一日附小竪語曰公且育令子後世以昌明年而集賢生府君之沒也集賢猶未冠夫人撫育誨教以文行立名既擢第再辟大丞相沂公幕府登朝為太子中允而夫人弃養倚廬終制入直書殿而公夫人未克𦵏集賢服不敢純采乃心無一日安于位得請于朝歸襄大事故有倅留府之命是歲上郊圓丘預及慶典府君贈太子贊善大夫夫人廣平郡太君始集賢規視吉壤方謀之主人一夕夢侍府君如平生笑語喜甚請曰大人兹喜甚何也府君曰曩吾之館猶寓也今考得善第是故喜焉爾集賢以夢告張氏甥方平曰是得吉壌乎語訖主人售地吿諧嗚呼九泉可作體魄必寧卜其宅兆而安厝之是以為孝之終也惟府君之神明克相厥後集賢之誠信克寧其先肹嚮來依志氣如在以景祐六年乙邜乃克祔于宋城縣之平臺鄉東南距王父舊塋五里所且謂某曰夫君子之道亨則行之固則守之乃外王父守道者也是以聞於四方者不若鄉黨閨門之詳巳爾幼保于外氏逮受廣平夫人之教熟習緒言宜誄善行以納諸壙也某不敢辭泣而銘之曰謀于龜諸之麋睢之汭食歩之厯歲單閼月孟余良考乎地兊之山艮之水吉嗚呼是為有宋守道君子嵇公之墓公之才不試兮公之志不遂兮石首之告踐兮追錫公紱冕兮宋故樞宻直學士朝散大夫尚書兵部郎中秦鳳路駐泊馬步軍都總管經略安撫使兼知秦州軍州事夲路勸農使上騎都尉南陽縣開國男食邑三百户賜紫金魚袋贈尚書禮部侍郎蔡公墓志銘并序英宗皇帝初潛宗邸龍徳而隠留情藝文以尊徳性顧莫與講習者啟濮安懿王曰睦親廣親宅講書著作佐郎蔡君某賢有行願得與之游王致此意於公公曰某在職且累年惟旅見大宗正未嘗私謁諸宗室敢辭他日王為置酒從容謂公欲請于朝使諸子受學公慮若有邀也始别見帝帝待君盡禮見必朝服義兼傅友咨詢道藝休聞日逺嘗訪宫僚臧否公對若人行誼若人經術皆非某所及帝以白王王曰蔡君非但文雅誠長者也然間造帝所竟歲不過數見帝尤多其莊重常以相從之晩而接之不得數且欵為恨乆之求外補因解宫職英宗入纂大統問輔臣蔡某何官今何在執政白今以兵部員外郎秘閣校理廣南東路轉運使帝曰兹人徳行朕所深知即以三司判官召還南海至都數千里江行淹乆帝每對朝臣之南來者輒問曰蔡學士何時可到道途安否既至對見慰勞殊渥日將旰屢留之且曰君朕故人朕望於君者厚勿以常禮自疎也俄除起居舍人史館修撰知諫院懇辭再三帝曰惟朕耳目心膐不屬君將屬何人趣令受命公自以被遇特達思竭其心力以致補報之効事有涉嫌説有至難知無不言言無不盡誠心為質引義忼慨凡所啟聞多見納用屬有請追尊親廟者事下三省集議公别請對言禮為人後大一統之義指陳切至涕下被西此議既非帝夲意又雅信重公因大感悟亦為公泣㑹京師大水公入對帝側席迎問變故公推致咎徴精言其端意猶主於前議論因中止然納説者將終遂所建以公在言路不便之適召試西掖除知制誥遂罷諫職且俾出聘契丹國往返閱時使還而羣論未已公於中間通上下之情安異同之意彌縫周宻主於忠信孜孜辨釋為士大夫道地恩全體正補益實多雖去諫垣越月不對帝必形於言每被顧問禁省秘事亦為及之其沃心造膝機柄之地有不得與聞者矣判吏部流内銓因言銓審官冗甚朝廷遂議新制將救時弊多所建發帝益知其材可大用欲其踐歴中外進龍圖閣學士出知定州然意惜其去既入辭帝曰第行且召矣行未浹日英皇違豫語數及公今上陞儲帝疾日侵猶曰蔡某正人促召來因除太子詹事未至先帝升遐東朝亦罷改樞宻直學士知秦州至闕覲對今上望公哀動左右且言先帝大漸猶不忘公卿之拜宫正帝問還期者再三深意有所屬者孤忠直道左右莫為之容乃畀需代者竞不及得見卧内憑几訓命遂成虚格忠義之士為先帝恨之八月八日靈駕發引公以其旦東望號慕避㕔事見僚佐於便齋退就私寢無疾而終享年六十前三日晨興語家人曰吾夢先帝召對顧問如平日欲退復留因嘆息感念及終人皆異之天子震傷累對近臣嗟惻遣中人䕶喪以歸賻賜加等特贈尚書禮部侍郎奉先志也公諱抗字子直宋人祖某贈尚書度支員外郎父某泗州軍事推官累贈工部尚書世以明經仕進實罕與進士游尚書雖治經有時才器識所交結皆當世豪俊故公兄弟皆舉進士早得時譽蔡文忠公有重望喜奬拔人倫深器公處之甥姪竟妻以妻之宗女景祐中登甲科一命太平州軍事推官尚書在臨淮寢疾旁無子弟公委官自劾單騎奔省得及理命越再宿而尚書以歿鄉里稱其至孝外除調平江軍節度掌書記秩滿近臣舉充潁川郡王院伴讀尋遷删定編勅遷著作佐郎俄兼兩宅講書賜五品服乆在宗邸獨不受餉遺衎衎然不可得而親不可得而疎故英宗皇帝深察重之間遷秘書丞太常博士通判秦州鍾内艱服除還朝召試禁林除秘閣校理淮西水民流散命公體量賑濟至郡亟請發廩食之郡請俟奏可公曰餓莩容待報耶晨坐庾門出粟全活至衆使還朝論稱善吳人荐饑朝廷察循良辦治之才以公知蘇州姑蘇土沃而卑並江湖積水渺瀰常苦風潮害民田公既習知吳俗至則為築長隄自郡城屬崑山横亘八十里中斷水勢民得因立塍堨且通水陸之行工省利大民安於業吳俗浮薄衣冠僑寓猥衆干請多事公患其然也採士族之守操行者輒加賔禮歲時饋勞以褒厲之士之承此差知自重發姦擿伏聽斷精甚蘇州吏役不均纖猾得職公為請於朝先貸官泉視役費之輕重而給之籍諸酒𣙜征埭之利舊用酬吏勞者悉入縣官以償所貸吏皆便之後傳其法不能易也就遷廣南東路轉運使吳民于今思之先是岑水銅冶大發官市之民止給空文積逋鉅萬里民大事私鑄姦游羣聚與江西鹽盜合郡縣不能討時公仲弟挺以選按刑江西專治鹽事朝議謂嶺南北并力則利害共功故委公將漕南越時朝㫖責捕羣盜甚峻公曰採銅非誠民惰游者為之今悉入之官而不畀其直非私鑄衣食安取資又從而誅之匪但民犯法也廼度經用斥冗費銅入而受泉民用樂輸徹爐毁槖刑報立省嶺外州縣多攝官廣東凡數百員悉自部司注補大吏操事為姦利公至收案致法選用平均吏員為清番禺煮海運給英韶泝流洄險因以逗遛侵竊雜惡公命十舟為一運擇攝官主之歲終會其課以為殿最是歲英韶二州增鹽課十五餘萬緡有司劾以奏未得報而擅立約束且廢其法適被召赴闕既對言南方便事天子嘉納悉如公請在嶺外懲攝官之弊憫逺人不知學問而苟祿無耻人士無可稱者乃盛修庠序擇官勸講凡鄉民之秀及官吏之子弟皆入學親為程校其文藝恩意深美由是諸生率教仍歲有登進士科者後在中山見河朔軍籍世家相承狃於姑息前人至墾閱場取蓏蔬之利公至闢之日命一軍親肄習焉軍士畨戍婦人游佚于外歸輒首原公下令連營逋蕩者無得首必盡法戍兵傳聞莫不懷徳繕甲兵完壁櫓皆起功緒在鎮未幾其首公勤職如此秦州西鄙皆雜羗有種落叛官兵擊滅取其地以建寨板築僅巳而公至守禦器備舉未集公規營指顧如宿計民不知有興也度其土田募千户以為守公私後無勞費州有質院質諸羗數百十人扄繫嚴宻被質者自少而長且老死無得出公為閱夲末其非利害所存皆釋遣之由是恩信著於諸羗且約部族不得擅仇殺俄而有犯者即斬以徇戎人讋服莫敢奸令在秦不半年而歿然於精慮不遺力矣公性靜宻而資長於政事公家之利知無不為為必有成成則可乆居家理賙恤宗族與同休戚仲弟天章閣待制某友愛尤篤公在秦亭内閣經略平涼帥府接封搢紳以為寵歴官自祠部改度支兵部員外工部兵部郎中皆敘遷也先娶彭城劉氏繼室張氏天章閣待制昷之之女封㑹昌縣君亦先公卒三子煜登進士第大理評事濳欽並秘書省正字五女適滁州來安縣令江懋簡大理評事曾孝序餘未笄熈寧二年歲在巳酉四月十三日𦵏於宋城縣仁孝曲從先塋禮也僕與公鄉黨交游之舊故知公為深銘曰英皇在宗儲精學問寤寐多聞得公儒雋道義惟傅蓺文則友造次法度克常厥守帝用知公資夲誠正于朝有言稱其徳行豈不爾思召自南服諫省史觀作朕耳目沃心嘉告造膝危辭罔或不以挹彼注兹中山扼戎依依屬公行未彌月金縢以封帝凴玉几仍有訓命謂公正人畀翊儲聖綴衣出庭奔號見星永懷靡及之死弗瞑宅憂未言孤忠少與于藩冀門深誠莫吐龍輼發引攀胡奄終先期感兆神明怳通天子震傷哀形宸筆追襚亞卿恩隆賻恤公之業藴足與大為獨廹于年莫究發施治民東南守邊西北于以觀政可推風迹天子大孝義篤於親豈忘先志公違盛辰睢陽北原三陵之右松梓森森匪親伊舊有子克家載世其昌斯文不朽流徽共長朝奉郎守太常少卿權北京留守御史臺公事上柱國扶風縣開國男食邑三百户賜紫金魚袋馬公墓誌銘并序公諱綘字某魏大名人世仕魏軍為河朔豪傑祖昭美始易士服讀書養志父誥舉進士第有器望終於侍御史知桂州公䕶􅀈車北還魏至蔡毁甚太夫人憂之命留蔡遂寓居汝陽言忠信行篤厚蔡人重之景徳元年詔下貢舉諸舉子推公就試守令勸駕遂首薦登甲科釋褐試秘省校書郎知婺州義烏縣至則闢縣扉凡辨訟者徑造于庭為之别白是非因勉之以義教民輒聽命罷去無復詞牒案牘大治後數十年父老猶有稱道公名者再調壽州錄事㕘軍還赴銓集引對御前選補職事官除萊州防禦判官時蔡文忠齊在諸生未知名公一見曰海濵有此竒士忘年定交日與游甚驩是秋主試貢士首送蔡公春牓至蔡公冠天下士公得知人之明秩滿改著作佐郎知永興咸陽縣就徙益州雙流丁内艱既除遷秘書丞知梧州公性剛直不屈上官恥為苟合以是滯留常調官不遂甞曰吾資不適時與其求容之辱不若全吾道故于鄠杜終南圭峯之下就水竹營别墅為棲逸之地及自嶺外歸稱疾罷官慨然有丘壑之志故樞相王文康公在西府雅知公蔡文忠公亦在内署數勉公起還朝相與稱薦遂以太常博士通判秦州時河陽相王文穆公知州事多回撓公持法不阿河陽不悅僚佐為公言宜姑為和公曰守正之謂和朝廷置吏豈使苟相順適以為和哉吾知奉公而巳内璫乘驛奏邊事承河陽指隂誣中公遂徙延州代還知坊州賜五品服章就遷屯田員外郎蔡文忠公拜御史中丞被命舉御史而以公名上時王河陽作相三奏而三却之文忠懷勅至中書白被㫖舉御史某之所知無易馬某朝廷不用請納此勅執政不得巳除公殿中侍御史尋改侍御史公素厲風節及在司察之職危言無顧憚不為擊搏悻悻近名事稱為知大體稍遷兵部員外郎三司户部判官出為江南東路轉運使改工部郎中徙京東廵按郡縣必為官吏言賦役獄市生民之命所以舒慘者也從政者知於是盡心焉可以上副明主求理之意矣復入領三司度支判官擢授兵部郎中賜三品服章知梓州還授知越州改太常少卿公老於政事練達人情左蜀逺方東吳輕俗因民所便為之保息條教清約不嚴而治歸闕將請老朝議為於北京置留司御史臺俾得歸鄉里慶厯八年六月二十五日考終于臺寢享年七十有五公在臺省王沂公吕許公當國重公方介有守從容謂公直而溫寛而栗所以成徳也君道少為委蛇不亦裕歟公曰良農能稼而不能穡士固有志違道干譽非鄙志者其自守如此孔子曰巧言令色足恭左丘明耻之公可謂耻之又曰不曰堅乎磨而不磷不曰白乎涅而不緇公之志行有之矣性清簡少欲菲衣食家居對妻子未甞易言色狎侮惟好讀書素多目疾而不能釋卷為子弟講說常至夜分夫人孔氏魏之名族主客郎中毅之女賢明有法義後公十五年年七十八以卒二男曰仲孫秦州節度推官早世曰孝孫湖州觀察推官監泗州倉二女長適張氏次適刑部郎中集賢校理王繹先公卒嘉祐八年七月某日孝孫克盡誠志𦵏公夫人于應天府宋城縣之長樂鄉不歸魏公之里命也某早託姻媾雅聞話言納銘泉扄傳信來裔銘曰太常直清渾然自成少私寡與實性其情學以從政仕以行義不為利回以湛世偽如玉在塗潔不可汙如金在鎔堅不可渝方正無疑則猶蓍龜滌除明覽亦如氷鑑達道之士命曰知夲萬物變遷道奚有盡公之體魄與物同塵公之神明斯還道真故翰林學士朝散大夫行尚書兵部員外郎知制誥勾當三班院糾察在京刑獄兼判尚書禮部上騎都尉永城縣開國男食邑三百户賜紫金魚袋嵇公行狀嵇氏之先出魯奚斯後徙㑹稽在漢為稽氏後復徙譙嵇山遂為嵇氏後又徙睢陽蓋譙之别也公諱穎字公實父適師事正素戚先生通經術有文擢進士第行敦厚不求合於時仕止廬州錄事㕘軍贈尚書工部郎中初任荆南石首簿民有父子坐重辟夲情輕被府檄專按其獄矜而出免其子父巳抵法假人而言簿君仁人也且生令子後世必昌明年而生公敏悟夙成天資謹厚早失所怙力學自立未冠舉進士常冠鄉賦修身慎行動必以禮安貧守道事親至孝鄉人皆貴而愛之王文正公張文節公相繼居守禮待甚至二公謂其子弟吾待此君所以教若曹此君可以為人之師表者也睢陽庠序率先於天下四方之士集焉公以鄉行為諸生領袖士自逺至必先刺謁公䝉一顧許與者猶公卿之重當是時公名望甚盛今資政殿學士范公富公並講習在學願與公游天聖五年登第試秘書省校書郎蔡州團練判官初文正文節雅知公後同執政每相謂言嵇君方雅之士不苟進吾二人必為成之至是沂公罷相鎮青社辟公掌鎮海軍書記沂公移大名隨府為天雄軍節度推官沂公特薦於朝召赴闕改太子中允未及别除授丁太夫人憂服除又用沂公薦景祐三年召試禁林充集賢校理判尚書刑部有疑讞請對崇政殿敷奏稱㫖特賜五品服外補通判應天府遷太常丞代還同知太常禮院判吏部南曹遷太常博士充開封府推官改三司度支判官移判都磨勘司遷尚書祠部員外郎公在睢陽典學舉子張堯封從公學文公以其俊整頗為延譽堯封依公以立所著文業多納公所後堯封女入掖庭為修媛有盛寵其弟化基甞造公自陳世舊求父平生素業且請編次為序以獻蓋中㫖也公不答亦不獻乆之同修起居注兼判尚書禮部糾察在京刑獄明年召試中書除知制誥賜三品服勾當三班院俄遷尚書兵部員外郎皇祐二年八月召入翰林充學士手疏固辭詔答不允先是公以疾乆在告命下未拜詔閤門以誥勅就第賜焉九月十五日捐館享年五十有五上方齋祠總章舉希濶之禮公不得陪侍盛儀命也夫訃聞天子憫悼加恩命有司以翰林中謝對賜洎明堂慶賚悉畀其家别加賻恤錄其二子京秩哀榮之典咸用優等公性淳至有雅量不汲汲於富貴不戚戚於貧賤姿表秀偉神韻夷粹標致髙逺不矜而莊然好修威儀重然諾毎與所親論君子之所以為貴動容貌斯逺暴慢矣出辭氣斯逺鄙倍矣故士不可以不𢎞毅以其任重而道逺先儒有言君子不失色於人故其嚴可憚不失口於人故其言可信如是而後可與立可以臨大節而不奪蓋公之志如此而從事於斯實終其身其在鄉黨恂恂如也見長者必變其與人交乆而彌恭朋友切磋其言似不足者其在居室未甞徙倚踞肆進止皆有常處不大聲愠色平生未甞與人相忤有所怨惡亦可謂君子人歟子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也若公者庶幾及焉者耶初游埸屋與故龍圖閣直學士郭稹仲微相善天禧中稹為開封府首薦人或揚其私曰王母喪䘏未究公投牒於春官保證之以是被累罷累舉曾不介懷在庠序與王洙源叔竇充公持為益友三人更相箴儆聞義而徙偕成徳業鄉論稱之夫以文正之方重文節之剛嚴夲朝之髙賢名相其所以待公如此天下知公之道有足致焉者爾文節早薨故終始為沂公推引及居朝廷登館閣歴兩禁文章温厚議論明審行安而節和官修而事舉誠一時之髙選也母喪常蔬食誦佛書因洞其宗㫖視去榮利如脫屣寢疾再逾月召姻朋諗之曰生滅人之常吾善滕子京𦵏九華壙中實以土非惟免諸患顧速反其夲遺令如九華襄事子京故天章閣待制宗諒也公娶滕氏給事中涉之女事姑以孝聞端淑有賢婦之風繼室王氏兵部員外郎球之女封扶風縣君三子景章太常寺太祝景華將作監主簿立夲秘書省正字某嵇出也少學於外氏訃至江外告以𦵏期念其孤也幼未能紀述其先人行事哭而略著其甞所親炙之嘉言善行致于紫微趙君叔平侍講王君源叔二君舅氏之執友以請幽堂之銘其在朝廷風迹之可錄而某未之聞者二君必能詳著之矣謹狀有宋南海大士趙君塔銘并序昔祖師達摩大士自南天竺國授般若多羅記當往震旦而作佛事始以如來所嘱付大迦葉正法眼藏逾海越漠以至中華為法求人而得大祖鑑智展轉傳付四傳而寖章五傳而其道大光至于六祖興于南方化縁益廣遍周沙界祖生新州終于曹溪轉妙法輪四十餘載故於嶺外所被尤深間冇異人世出者但宻行多晦微言不顯非流俗情識所能窺測以是莫可得而知爾海陽趙君蓋其人也君諱棠其先曹州濟隂仕族曾祖季良五代初歴官顯要後唐莊宗伐蜀王衍歸命明宗按蜀計簿發其積藏季良以太僕卿充劍南轉運制置等使至成都孟知祥已有異志見其材髙可以圖事因奏辟為節度副使留不得還知祥僣國遂以為相位至太尉祖元授從孟昶歸朝補東頭供奉官考陶婺州司理㕘軍君幼孤事母至孝仲父挈之任南恩州錄事㕘軍卒官母性畏寒戀南土因家南海累舉進士母老就攝官補連州連山尉母病瀝臂血和藥日至數服疾篤思羊羹刲股肉進臛聞冇異香食之良愈母終刺血寫佛經積成卷帙服除再調潮州海陽簿一旦去官棲止海上禪刹繙閱藏典君既素志禪宗又通經教常從諸方㕘問知識未有以契㑹于心番禺有逸人曰潘晃邑里長老云自少見焉不知其飲食宿止處所冬夏一裘未嘗易也日遊于市莫可與之交言番禺人呼為潘盎俚言盎猶狂也君聞之曰吾可從之游哉早年或遺君精茶一餅君黙識之曰他日有無口人可甞爾及是令人持茶一甌以頌四句投之潘覽頌啜茶遣人回語君今日果遇無口人矣君遂見潘于州西長林古屋語三晝夜都忘寢食廓然通宿命具慧眼從之三年不歸親舊以為惑疾後乃間至其家不復避寒暑毒草惡物遇輒啗之或謁問禍福時為之言罔不驗山林鬼神往往受教戒過汀州抵上杭縣山寺有神祠民日薦牲牢君戒責之至今惟饗蔬饌此類甚多山人劉立乆依君忽謂立曰京下言法華約我今當赴之遂不復食月餘留一頌示其子昶安坐而逝家人號呼逡廵復言曰吾固告汝矣何戀之深也起居如平日家人不復為慮無何妻子有所適回見公化已乆矣時四月已熱因龕而塗之家人守宿經百日夜未央聞叩龕聲禱焉復叩翼日發塗儼然如初君告寂時乂兩手于膝至是舉一手疊二指若實叩者焚其衣于庭舍利滿地傾城瞻歎巷無居人初言公住京城景徳寺人亦以為狂不可親近與君偈頌萬里往來目君為赤溪山主山人劉立後為僧名行忠亦住持傳法從君最乆故往往能記誦其義句深矣大意若云兠率天宫之道侣也劉立親于君赤溪何謂也君曰内院山名爾凡此皆非常情所可測者而事有不可誣也已君性剛厲少年事佚遊母憂形于色君自悔責斷左手之小指以謝母遂杜門不出以至成學業與循州舉子鄒起同下第起貧且病不能歸君傾槖雇傭舁起就路或自負而行竟致起歸其家福州進士翁彦升薄遊嶺表逼秋賦不能歸君與梧守善援彦升得從梧州薦罄家資其行彦升登第後終郎官因是索然四壁其風義如此卒年五十四再娶鄒氏黄氏子三人昶鼎旦昶今任楚州團練判官信厚士也忠師淳直所說君事迹詳實某年月日𦵏于沂州臨沂縣某鄉某里以君坐而逝故從浮屠法以瘞焉所著偈頌别刻于石銘曰海濵大開士日光佛化現君獨常親近得第一義心了自覺聖智觀世悉空寂以是清淨觀廣大無礙觀十方如掌中視菴羅勒菓彼愚夫幻夢歿在種種見聞是微妙音則狐疑不信得法眼淨者應見此境界上都故左街僧録知教門公事宣教大師塔銘并序仁宗皇帝在宥天下慈育含生萬幾之餘回向正覺時則上都左街僧錄宣教大師智林道行素修恩眷最厚咨訪梵學酬答句偈師於夲教陀羅尼門受持精制國有祈禱感通多應故尤見欽禮僕早探内典甞與師遊間問師諸陀羅尼佛秘宻藏華竺異音類不翻譯其㫖云何師為僕發明隠奥科指條暢楞伽所謂義句形身三和合相師悉開觧實通其妙又嘗問師羂索諸部壇場軌儀種種莊嚴不離四諦無上正等諸佛心印其用如何師云壇有多名空智為上一念浄圓同法界性住無所住如空無依彼誠之至者猶可以動天地而感鬼神妙湛總持一相三昧具足神力豈思議所及佛以大事因緣故出現于世無有二法惟一乘道至于隨緣立教應物利生百千法門等為妙用空智云者第一義諦也僕故知師得深般若究竟諸法空相非但嚴淨毗尼專精觀行而巳師姓阮氏其上世番禺人既受具禮廣慶闇黎為師傳秘宻教正勤四十年不虚一日自真宗時入内應奉仁宗樂宗佛事擇開寶寺西北隅增葺精舍祓除淨場神筆親篆成道釋迦之殿飛白繼昌之閣金書寶生佛號而製其像供具珍華物皆内出因賜名寶生院屬上足住持師主香火焉迨今四朝歴遷兩街主教門事天下僧籍為之統首内由宫省以至宗室貴戚莫不厚為之禮道俗欽嚮搢紳景重弟子百餘紫方袍者十五人熙寧四年四月十二日起居如平常作而曰吾報盡今日耶暮而歸寂報齡七十一僧臈五十三即以是年五月某日塟于開封縣褒親鄉東原為窣堵而不竁從本俗也上首寳印大師惠聰等以僕與師有道縁者奉師平生所持陀羅尼梵夾來告𦵏期願銘塔石為之銘曰釋尊出世像教示權一心之微教外别傳百千法門𣲖分枝出曰陀羅尼法中秘宻善慈之意威怒之容至于空智乃㑹于宗不動明王焰鬘清浄惟師總持獲是尊勝金剛寳印如令之行祇承四朝善利羣生幻有起滅本無去住累甓東原表兹空聚宋故推誠保徳功臣資政殿學士正奉大夫行右諫議大夫判南京留司御史臺上䕶軍南陽郡開國侯食邑一千八百户食實封二百户賜紫金魚袋贈工部尚書蔡公墓誌銘公諱某字子正宋人少而敏于學未冠登進士第俊聲聞于時釋褐䖍州推官再調陵州部司察其才就舉監益州市買院丁外艱甫除上官藉其器幹人人欲引為巳用時夏寇犯塞王師興討乆無功翰林王文安公將命安撫辟公自從遼人間我羗戎之難集兵騎鄙上來渝平富丞相往使請公以行所齎誓書有未安者俾公自雄州馳入白執政仁宗欲知虜情亟召對不及易朝服占奏明辯特遷大理寺丞尋改殿中丞簽書南京留守判官公事范文正公宣撫陜西河東薦公才任煩要徙通判涇州除太常博士易鄜州夏人請置𣙜埸通關市命公㑹羗豪於延州以定𣙜法改尚書屯田員外郎濮州有劇賊執通判井淵以縱掠公上言宜如漢喬元不以刼質開姦路急捕擊之朝議從其言賊遂沮壞時河北寇盜充斥公以選知博州賜五品服至郡飭屬城嚴比伍之令求閭里宿猾甞為盜嚢槖者得數人宻召約束貸其宿負以補吏使察諸偷區處毎發輒知其主名吏兵掩取無所逋匿歲中獲數百千輩境内肅清博平聊城田租多隠沒積為敝公為均之條教明審民無擾而稅大增三司上其法請推行天下後諸路稍施行公為人彊力天性明於吏事故獨能行之他吏苟以應命徒為紛更之敝材譽寖聞凡中外煩重之職推擇必首及之擢開封府推官接伴契丹國信使皇祐中以陳許鄭滑曹并京畿為輔郡以公提㸃京畿刑獄面賜三品服建議開封祥符兩赤縣倣唐制縣置尉二員一主刑禁一出警捕至今為便改度支員外郎先是河決澶淵乆不塞横流匯漫被害數千里李仲昌請修六塔河入之海命公同領其役值大雨水河不可塞坐是再謫免乆之起知信州改南安軍與南雄接境嶺路巇阻公為巉而甓之為永世利有㫖俾兩路當修完無得頽圮先是江西廣東福建路鹽法廢亂姦宄不禁至被鎧仗擁旗皷千百為羣乘勢剽刼吏不能擒制公奏請嚴勅所屬共除民患中書難其才謂莫如公者就除江西提㸃刑獄賊盜鹽事専以委之復度支員外郎公計盜夲以利合徒重購捕斬非消弭之術當設方略散離之是為長䇿乃下令民有器甲者與期限俾首納原其罪得六萬餘擇其精利給諸廵捕吏兵賊氣巳奪羣盜以賈魚為名公令賈魚者齎鹽不及二十斤衆不至五人不持兵皆為良吏勿問人情便安大黨遂解舊制自海陵諸場運鹽積之白沙自白沙運之江南荆湖率濫惡不可食公為具舟令州郡各夲場受之鹽善而數足畀其贏舟以給風波之備自此南國之人始識真鹽在職二年姦猾震壞渠魁効首凡捕魁長數百散羣盜九萬人歳省刑罰千萬計增鹽課四十餘萬凡所條畫著于勅令以為定制就遷司封員外郎秩比轉運使英宗召赴闕數賜對訪問公言諸道安撫鈐轄司軍旅之事得從便宜百姓有罪當恪守條法外配𨽻非舊制也由是申明禁止刑無僣忒除陜西轉運副使每憤歎昊賊畔亂之際陜西四路屯禁兵二十餘萬義勇弓箭手畨兵倍之氐羗種落大小二十城爾殫天下之財力喪中國之威靈勝敗之數可從知也因陳禦戎攻守大計書奏天子韙之知其有將帥材略未幾除工部郎中直龍圖閣權知慶州兼環慶路馬歩軍都總管經略安撫使事時諒祚驕僣自謂元昊風類侮慢弗率稍引騎並塞侵廹内屬部落公曰羗自納誓邊吏保境乃今鴟張漸不可長宜有以創艾之遣禆將耀兵境上宻使番官趙明伏隘邀之羗不意軍出引還伏起大殺獲前䇿羗謀必來報隂除備間數月諒祚果入寇大順城公以大順城堅故以委之揣柔逺城惡而當要害以屬重將張玉配以精兵守之一日公與賔僚弈烽起民囂公令無囂冦在吾彀中矣諒祚自將騎二萬諸豪部衆過倍結三寨傅城三面傍城有水可涉公令布鐵茨沙中羗騎渡水多蹶大驚以謂有神諒祚不堪其忿督帳下決戰公先選彊弩八百隠壕外矢徹重札諒祚中伏弩引却俾張玉募勇敢士夜薄羌營羌殺傷多遂潰初冦騎猥衆而我師不及三千吏士惴恐公料敵制勝覆之有餘力羌自入冦未甞挫敗及是諸戎始知畏懾國威用宣天子馳内使手詔慰勞賜之茗劑因請停夏戎歲賜而詰其奸命之罪時朝廷巳定議而公奏亦至使者遂行諒祚竟以傷痍致斃上繼命近臣傳㫖度控扼修堡戍捍賊衝公奉詔按視馬練平左通鄜延餉援右固華池形勝中禁鹽盜往來抨圖請城且以地利既得俟報必失機㑹遽遣种古集役費張玉總兵䕶築四日冦大至駐七日不得逞而解城立壯大塹壘樓櫓鬬具畢飭雄冠諸鎮乃分屬羗三千𨽻于新城上賜之名曰荔原堡卒為要防公常謂兵機莫神于用間非聰明精宻者莫及焉公坐府閤羌變輒先得蓋湟中酋豪多為用者其致之之術深矣蕃官思順黠羌也夲熟户叛入羗周知漢事羗人信用大為邊患㑹其部族有歸漢者公因宣言思順且歸俾環州宻為具以待游兵要路伺接之夏人果疑未幾諜報思順被害羣羗深仇趙明方多中傷公常先事幾保佑之故其子父為盡死力懐安鎮種豪屈爹有謀勇種落勝兵數千邊臣失於撫御㧞族背去更為羗用十餘年公因事致之復順漢撫納不疑請以補班行為夲族廵檢懷服恩信卒收其力羗中首領正名怡骨丁勵嵬劈延羅皆桀黠悉以腹心事公頥指如意非聰明精宻者耶今上即阼以公積勞除天章閣待制俄易渭州兼涇原路馬歩軍都總管經略安撫使時兄抗以樞直帥秦公以兄弟隣境為辭詔㫖不從涇原天下勁兵處最當賊衝前昊冦凡三大入皆此路自納欵戢兵垂三十年將吏弛惰戎事寖廢公至按尺籍閱得諸游冗之兵僅三千人悉就訓勵朝廷聞之詔札奬諭推行諸路以為法所統四州義勇萬五千人舊止用戍守而不習戰公分𨽻諸將結為隊伍定廪給之式立遷補之令皆如軍制時送使迭休人忘其勞後遂與禁旅相㕘戰守屬土兵闕被㫖招益三千人公奏義勇可備征防往覆問以措置之宜公條上畨戍之法具省費之利上嘉納其册復布吿諸路以為法舊募伉健士以為遊騎選鋒名勇敢資養優贍未嘗料簡豪右子弟市井之人竄名冒役幸從軍作姦利干功賞公始程其材藝為之陞黜空食者斥之又於熟户蒐擇壯鋭籍為蕃勇敢得千五百人騎自當分邏境上戍兵得休月一易者季一易公曰務農積穀保邊安民之長慮也美地薦草武備孰先焉隴氐沃饒蕃漢雜耕舊皆山林夲自縣官闢之因檢括得田五千頃召人耕穫儲為凶災之備邊户冒禁私置蕃部田法應沒入得田八千頃募弓箭手三千馬五百鎮戎軍三川髙平定川寨壕外冇曹英開展新壕乆不得城中有土山可以乘髙望逺據險結壘可扼其走集乃遣諸將分屯衝要役五千兵築十八日城畢樓櫓關楗兵廬吏區倉廩廐庫材用無慮九十萬營辦夙具民不知役開地二千餘頃募弓箭手千人守之勅書褒答賜名熈寧寨熈寧元年冬諜知羌集兵葫蘆河公曰往歲諒祚謀鈔秦渭甞㸃集于此盍備諸命田牧者急收入保部勒諸將申嚴警候七日而賊至出精勇逆擊之賊驚亂乃奔散公曰羗無他釁忽生變入吾圉雖北不可縱也遣四將分路入討破蕩勒緩等七族首惡殲焉首降者釋不誅羣羗震恐相率逺徙天都山之北上聞遣近璫錫命特遷右諫議大夫留再任熈寧三年慶帥失律致寇而不能禦羌騎攻圍華池大順荔原勢甚張公謂張玉慶州幾危吾豈得坐觀亟命玉以萬兵赴之羗素畏公威名聞涇原兵且至已懾兵既至遂解圍而遁勅書稱美别賜手詔云微卿忠義許國即諸將應援必至覆溺俄命韓丞相為陜西宣撫别㫖羗事俾與公共計議四年慶州軍亂關陜騷然公命玉倍道奔命至邠遇賊掩殺殆盡上聞俾近侍賁尺一慰勞且云慶州軍叛非涇原之救内郡無以安帖就遷龍圖閣直學士廣鋭徙營軍士憚遷搆亂城中惶擾公以一軍校諭之衆不敢動推其倡率十九人即日斬于毬埸營竟徙毎軍變倉卒鎮静晏然人皆壯其氣而服其量公喜用土兵故多募弓箭手後因恢復熈河故地詔發精鋭往助攻討涇原之兵戰尤力諸路將率莫不服公訓練之精在邊專以田牧為急意在厚生敦夲釃引涇水溉田民享其利以羗人綏附罷省諸城堡不足禦敵者但存守望而巳土兵營同華更上下戍邊請三分畨代益減東兵以實儲峙邊郡霜早民艱食轉徙公賑廩全濟者三百餘萬人畨部饑質田于漢户過期不償輒被沒公貸官錢贖還歲取什一之息償足而止後遂著為邊法治兵械便巧造䥥槍絶河巨絙常戰牧龍以鐮槍獲利熙河之役道阻水獨涇原兵先濟上聞皆推行其法平居與諸將燕樂投壺雅歌恩意款洽拊循士卒軍中磨磑薪樵紉縫之事莫不為之經營疾病者親為處醫藥死喪瘞埋必使識其處所父子在軍異營者請比類遷之同居事至極微必求其便利惟恐士有失所及有興發一以軍律從事部分整輯號令嚴明師有功歸之諸將上有賚必以及之小違節制必劾奏既而宻請于上或止罰金故軍令必行卒乘競勸上恩下逮士忘其死有事攻討未嘗奔衂紀將帥者公無異論焉五年中貴人奉璽書召赴闕慶渭懷之皆立生祠公在二州屢上兵事其奏議率親草雅有體要上語左右曰涇原之奏覽之可喜有使者還朝必問其年顔何如徒以選代難其人未召也及對拜樞宻副使上曰卿在邊得簡稽之要俾具條式以聞又召涇原部將臨閱于崇政殿嘉壯之頒其式諸路俾帥臣躬為按閱謂之衙校法靣命之曰邊事一以屬卿河州景思立戰沒上御天章閣召二府問之公請行上曰是不足為卿勞河朔有事乃當行爾建言陜西土兵父子兄弟在軍由行伍補將校姻黨株連狃於姑息河北保塞之亂可懲也請因郊恩比京畿遷轉其軍校不惟消弭後患抑材勇之人有以自奮于後推及諸路著為軍制遼人來疆代北之田頗撓封略公請追集北邊戍兵置三十六將給以虎符専事訓練逾年藝倍常格悉為趫勁京城門鑰舊禁不嚴請置銅符以謹啟閉善於敷奏開説詳明入吿謀猷多䝉納用沃心造膝則莫得而紀也任職三年夙夜不懈七年冬奏事御前忽眩而仆内侍掖就西廂上親臨賜藥自殿中肩輿歸西府中人監太醫診療晨夕奏起居狀存問相屬逾月少間懇祈罷退恩㫖固留章七八上方除資政殿學士判南京留司御史臺上使近臣宣㫖慰諭厚自持有瘳復位末弱遂不良行元豐二年五月一日薨享年六十有六神志不亂方與家人語奄然而終訃聞天子惻怛為輟視朝贈工部尚書三代閥閱著在伯氏誌銘娶王氏禮部侍郎致仕渙之女贈汝南郡夫人繼室禮部之弟殿中丞演之女封睢陽郡夫人並先公卒七子昕湖州歸安縣主簿朦太子右贊善大夫天申殿中丞煜太子中允堪太常寺太祝穀將作監主簿修尚幼昕天申早世五女長早卒次適秘書丞李閌著作佐郎趙磐潤州司理㕘軍王紳幼在室公起諸生夲以文學進雅有大志間讀兵書戰策以將帥之略自任游邊知其山川城邑至于風謡氣俗莫不諳悉既典方面治軍旅追惟寶元慶厯間元昊陸梁遼人僥倖之事每慨然長歎以為上憑天子神武之威下乘戎狄衰敝之勢湟􅀈以西可繕亭梁長城以南可徹烽候顧齪齪近習未甞精慮爾世有深識者亦謂其言之非徒然也居家理兄友弟愛鄉閭稱其睦賙恤宗屬善教子弟故諸子多才文集二十卷平生之素業存焉七月某日葬于某鄉某里從先塋銘曰惟皇作極文武是憲文經邦國武定暴亂道逺乎哉厥有典常在人賢者識其大方神聖御圖鼎熙駿命法天震耀以肅荒獷有韙蔡公資適逢時祇遹常徳式宣靈威蠢爾羗醜昊實虺蜴逖矣西土為所踐食祚濟其凶將復跳踉公來纘戎爰扼其吭公謂諸將兵者死地尚命糾守天不假易氐酋狠驕敢觸吾藩參連一發竞成遊魂排難解紛均庇隣路帝稱忠勤康錫蕃庶徹我土疆務農重穀憂國區區惟日不足帝曰汝賢朕志先定屬爾樞機夲兵之柄廟堂忼慨國論以明帷幄宻勿嘉謀允精義激于中之死靡避風淫于末此生奄廢在周方虎濯征淮浦暨漢營平窮討开零公在西圉威行邊土入經大册匪命誰沮北原先塋喬木森森吁嗟壯志此焉消沉有子多才是謂善建神明不忘于幽奚恨宋故朝散大夫守尚書吏部侍郎致仕上柱國彭城郡開國公食邑三千一百户食實封四百户賜紫金魚袋錢公墓誌銘并序公諱某字資元世家吳郡吳越有國諸錢疎宗皆見錄曾祖某祖某獨安素業不求仕太平興國中錢忠懿王入朝吳越國廢考某始赴京師就職事為左侍禁今贈左武衞上將軍妣倪氏追封淮陽郡太君公天禧二年擢進士髙第歴汾衡韶三州軍事推官調吉州判官三司舉監開封府東明縣鹽酒税丁武衞喪吳中無舊業家貧不知所歸聞陳州可居奉其母僦屋以居性介潔秋毫不以干於人陳人推重之遂卜𦵏而家焉丞相呂文靖公出鎮陳察公行厚有經術歸朝薦以為國子監直講改秘書省著作佐郎晏丞相守陳州辟簽書鎮安軍節度判官公事吕文靖鎮大名府又辟公勾當粮料院當寶元中夏戎叛命契丹來渝平時三邊多事吕公當北門之重意在得公幕府自助故以是縻之吕公復入相公以親老不樂留河朔移簽書河南府判官賜緋衣銀魚晏丞相為言其親老願得近陳一官徙通判潁州過都遂留刪定一州縣勅尋權大理少卿遷三司度支判官擢授河北轉運使以親老辭不行改江南東路皇祐初召還詳定一路勅未幾以選充天章閣侍講俄丁内艱服除還朝超拜天章閣待制仍侍講就遷龍圖閣直學士乆之出知蔡州閱歲徙知河南府兼西京留守司就徙亳州又改陳州至未周月召還復兼侍講知審刑院屢請補外得許州兼京西北路安撫使就徙潁州再改陳州逾年復被召因請老以吏部侍郎致仕公幼而好學長遂専精自六藝之文與先儒議説造微析理得聖人意為深方仁宗時天下靖安留神經藝日開邇英延儒臣講讀經史公於是時以古學進侍經筵其講說敷引諸家指其異同以發其長義辯而不給簡而易曉故人主樂聽而不倦間有顧問必依經以對因以諷諭政事遂及時務有啟廸獻納之益故前後留侍十五年特被恩禮以見重於朝廷每丐外官輒不許既去必見思而復召蓋冇以簡在清衷者矣故事講官分日迭進公將出守蔡州上曰大夫行有日可獨徹此秩於是同列罷進者浹日尤長於政事兼通刑名法義之學再糺察刑獄判刑部三為審刑大理慶厯嘉祐編勅至于州縣諸路條貫皆公删定詳處格令明恕詳平天下遵行莫不稱允其修編勅以罪之犯勅者重犯令者輕故請移勅文著入于令條目甚衆嘗講告捕法凡罪有可告冇可捕苟皆許捕則姦民得以措患於人因為省去許捕之文百餘事一路功成例進勲爵上獨賜三品服謂輔臣曰是其冇母八十歲而事之以孝聞可使慰其母心治郡有大體使官吏安名分謹事守而巳有所建請必令具簡牘故下不敢妄進說視歲之善惡救荒保息施設各有法度大約為求其便宜以成其愛利凡通流失業之民吏拘細文抑不得伸者必為道路以盡其情使不失所故所至民安樂之性沉靜不累乎物雖在顯仕居養清澹不易寒素之操動循法度以名教自約始終一致老而彌篤晩節覽佛書深好圓覺經以為諸幻悉滅非幻不滅斯為至言由是得自證淨智翛然遊方之外熙寧九年十月四日考終于私第享年八十一歲累官自佐著作改秘書丞太常博士祠部刑部兵部員外郎刑部右司郎中諫議大夫給事中工部刑部侍郎歴職三司鹽鐵副使判太常司農寺少府國子監提舉醴泉觀契丹國信使雖晩達而踐揚中外逾二紀不為皦察之行不求詭激之名循吏儒林列之無愧矣夫人上官氏刑部尚書佖之女先卒追封許昌郡君三子長卿大理寺丞仲卿太子中舍孺卿太常寺奉禮郎三女適職方員外郎王億清江縣令許升卿屯田郎中王庠二孫男曰秉守將作監主簿曰乘試將作監主簿即以某月某日葬公于宛丘縣友于鄉從先塋所著解經義及詩集共三十卷藏于家予在朝與公嘗同僚游有舊及再守陳公嘗見謂曰他日願丐一銘九泉可作無恨矣至是其孤以狀來追懷緒言悲不能忘為序其行事而銘之曰允文仁宗崇儒尚徳公資逢時發身典籍敷經帷幄睿思日益以重于朝稽古之力仁宗慈聖不忍一物全兹生民惟刑之恤謂公詳眀屬之丹筆忠愛之心夲乎仁術刺郡典州事舉其中寛以得衆敏以有功誠而可信簡而易從休然餘裕挹之彌沖公性至孝而行篤厚處簡通恕莫奪所守素履終吉既介眉壽報則未充以貽厥後樂全集卷四十
