body:
  text: 樂全集卷十六宋張方平撰論樂者天地之命論此下六論景祐元年應茂材異等科秘閣同日試夫人受天地之中以生生而靜者之謂性感物而動者之謂情物之感人無窮而人之好惡無極蕩而不返天理將滅焉夫欲平六志之邪復五常之正使之動而不悖發而中節非樂何以和之故禮記曰樂者天地之命中和之紀人情所不能免者其為是與故聽其雅頌之音志意得廣焉執其干戚羽旄習其屈伸俯仰容貌得莊焉行其綴兆要其節奏進退得齊焉夫人内和順康易則暴慢之心不入外恭肅莊恪則怠易之色不形外肅恭而體平内和順而志正陽而不散隂而不密剛氣不怒柔氣不懾雖甚盛德何以尚此如是則驕佚詐偽之萌悖亂竒衺之事無從起矣此固非制令之所可齊條教之所能詔其感也得之情性其發也合乎自然故曰樂者天地之命中和之紀不亦善人心之深乎昔聖人之防其情可言矣蓋樂者心之動也聲者樂之象也文采比節聲之飾也君子動其本樂其象然後治其飾樂作乎耳目之前感應乎心知之外故作之朝廷宗廟君臣上下同聽之則莫不和肅作之族黨鄉里長幼同聼之則莫不和順作之閨門之中父子兄弟同聼之則莫不和親君臣肅長幼順父子親三者天下之大教也樂作乎此而教成於彼非天地之命其孰能至是乎夫命也者不待乎諄諄而諭之而後為命也有自然之道焉之謂也夫瓦絲匏革之音清濁疾徐之序干旌行綴之列鍾呂周疏之節此豈樂之云乎將外之飾者爾至有宣導順氣輔成正心應之如四時均之如風雨滌暢乎血脉浸涵乎肌膚不使放淫邪慮得接乎心術近之一身遠而化諸天下一由中和之道此為得乎天地之命乃樂之本情者也是以聖王尚之言教之大者必曰樂云謹論聖王處民瘠土論維昔先王疆理天下均别地域莫不井衍沃之土標敦鹵之壤辨其物性審其産利以制地貢以令地職分休易三等之地為上中錯出之賦豈固務勞敝於民乎而國語載文伯母之言曰聖人之處民也擇瘠土而處之勞其民而用之是以能長有天下不亦異諸聖人敺民安樂之意夫亦有激而言者請試論之蓋王者之制民也分其四業列其九職皆所以勵之敦本朂之無游然而所以去本而赴末苦南畝而甘市井者常為利之所牽焉甘利而已常心不固於是乎放邪流僻詐偽驕汰無所不至亂是用作更相爭奪至抵於辟將懲其甚寧儉無僭故曰瘠土之民勞勞則善心生沃土之民佚佚則㤀善㤀善則惡心生故瘠土之民莫不嚮義勞也沃土之民不材佚也且民之函血氣心智之動畜喜怒好惡之情夫惟賢知之明為能性其情而自勉於善中人以下習則逺矣不足則約約斯固固斯淳淳斯念善是善生於不足也有餘則泰泰斯慢慢斯驕驕斯近惡是惡生於有餘也是以聖人知其然也思所以制節之道為之均其生業使之仰足以事父母俯足以畜妻子雖富不異服無故不食珍納幣不過五兩合親不踰一肉至於婚姻祭祀居室之禮莫不為之節文夫然後民罔有踰矩敗制而後知廉恥禮義之道無爭陵鬬辨之訟矣愚謂文伯之母為此言也將以激其子無使入於惰慢而知勤儉之為令德爾不然天下之大四海之富豈無尚義之民是豈盡得瘠土而處之者乎亦在為之上者制禮以節之而已故曰其言抑有激焉謹論治亂刑重輕論王者法天之震曜殺戮而為威獄刑罰法天之生殖長養而為温慈惠和此德刑之本然而刑罰世輕世重惟齊非齊故周官有三典之法呂刑有五罰之用隨時立制固不同道而荀卿之言犯治之刑固重犯亂之刑固輕其義何耶請得論之荀卿之發此論也葢言象刑之事以為治世不當有象刑爾故其言曰治古不用刑邪是象刑固不用矣治古猶有犯刑者耶則是殺人者不死傷人者不刑乃非所以為治之道也愚以為象刑之說固不可以為訓荀卿之言抑未足以折中是皆過猶不及之辭也治古之不當有象刑則明矣而荀卿以為犯治之刑固重亦不察矣夫先王之致理也議事以制不為刑辟懼民之有爭心也故禮以立其本信以行其令仁以全其恕義以斷其宜訓之以廉讓成之以節文故為冠婚嘉事之制以重其成人之禮為之祭祀共養之道以長其孝愛之心為之貴賤等級采章文物之數以嚴其奉上之誠為之聘享宴好揖讓登降之儀以篤其交接之義為之鄉射辭讓之法以序其恭睦之分為之歌樂儀節之則以保其和易之性是故君子無物而不在禮矣有一不由此者且得謂之治世乎猶懼民之未盡至於善也故求聖哲之上明察之官慈惠之師忠信之長以臨牧之以訓導之是故百姓無動而不遇於善矣有一不由此者且得謂之治世乎夫如是又何重刑之有故夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑皆在叔世三辟之興也非治古之事也舜典曰象以典刑益稷曰臯陶方施象刑惟明皆為法象之意又何墨幪艾鞸澡嬰菲履赭衣不純之謂哉自漢武公孫平凖劉向皆引以為言何亦不思之甚乎而荀卿先矯其説抑未能折之以中故不行於漢氏諸儒故愚曰二家之説過猶不及者也其為是乎謹論治地莫善於助論古之制國家者上則有宗廟羣神之祀下則有朝廷百官之給故所以制財用之節其取於民必有制也孟子言三代之事曰夏后氏五十而貢商人七十而助周人百畝而徹皆什一之法而謂治地莫善於助莫不善於貢貢者校數嵗之中以為常周詩曰雨我公田遂及我私惟助為有公田則是雖周亦助也蓋三代之道夏后寡怨於民不求備於下民未厭其親商人求備矣而孟子舉治地之善以助為得其義何在請試論之夫什一而籍天下之中正也多乎則大桀小桀少乎則大貉小貉故井田之制一夫百畝八夫為井共治一夫之地以為公田助者借也言借民之力以治之也地之腴确嵗之饑穰此乎取之不擇焉爾故曰私田稼不善則非吏公田稼不善則非民羣祀之粢盛於是乎出事之供給於是乎節國之經入於是乎在民之蕃庶於是乎起穀祿於是乎平政教於是乎均故曰什一行而頌聲作矣彼夫貢者校數嵗以為常不計乎地之腴确嵗之饑穰則是履畝之道也春秋書宣公初稅畝以其擇諸善者取之故君子譏公以為於民已悉矣是故君子之作事也施取其厚事舉其中斂從其薄則是先王之取於民也節矣所以能節取於民也者蓋有道焉節用無㣲嗇費無小不貴異物賤用物不作無益害有益念四方惟正之供則戒盤遊之佚憫小人作業之勞則絶侈過之奉嵗杪而㑹量入為出如此則能節取於民矣記曰時使薄斂所以勸庶民也故民趨其本農狎於野仰足以事父母俯足以畜妻子豐年樂於盈羨饑年免於轉亡於是乎樂事勸功尊君親上廉讓之義立爭奪之患息敺而從化也易矣何脩而至乎此得不由治地之法善也哉禘嘗治國之本論夫治國之本莫急於禮禮有六體莫重於祭祭之大莫大於禘嘗此其商人之禮乎記曰祭有四礿禘嘗烝四時之事也禘陽之盛嘗隂之盛古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也故嘗之日發公室示賞也草艾則墨未發秋政則民莫敢草故曰禘嘗禮之盛也治國之本也夫治國之本莫大於賞罰賞罰誠得治國其猶指掌乎古之明君爵有德賞有功必發爵祿於太廟示不敢専也禘為夏祭陽氣用事故人君順時長育因祭發賞上以明應天之序下以昭尊祖之義德義之盛由禘而見之矣傳曰始殺而嘗為秋祭少隂用事助隂始殺可以斷薄刑決小罪故曰草艾則墨言既嘗則可以發秋政矣夫賞以春夏罰以秋冬順夏禘而發爵祿因秋嘗而決小刑賞則以厚罰則以薄此先王勸賞而畏罰之意也故曰禘嘗為治國之本其斯之謂與是故明其義者君也能其事者臣也不明其義為君不全不能其事為臣不全義者何謂明賞罰之情而已事者何謂行賞罰之節而已是以人君將賞為之加膳加膳則有賜將罰為之不舉不舉則徹樂厚賞則士勸薄罰則民服政是以和教是以成以是而治國其與幾何矣夫其厚賞薄罰之意由禘嘗而見之矣故曰禘嘗治國之本也至於後王猶舉其典則有順景風而行封爵候鷹擊而疏囚繫抑禘嘗之㫖歟至於周之四時有事則春曰祠夏曰礿而以禘為三年之合祭焉為祭之名雖異施政之實蓋一順是而下雖百世其所以制治之意求其應天時而順人欲之道顧何以易此乎哉三公為鄉老論蓋聖王之建官分職化民治俗之道至矣内之朝廷外之鄉遂朝廷之尊莫如三公鄉遂之師莫如鄉老故周官鄉老二鄉則公一人以領州黨族閭比之屬焉其安擾邦國之道請廣其義云先王制爵位以處賢德異等儀而章貴賤則有公卿大夫士焉二公分監天下曰二伯一相處乎内三公之位也葢論道經邦揔方而議佐王制治燮和天人故曰天子之宰通乎天下重之至也若其中立六卿之事外與六鄉之教其要為民是以屬之鄉焉王置六鄉三公分領之故曰二鄉則公一人所以協比其閭里使知孝友睦婣任恤救賙之義勸導其井野使知稼穡樹藝世事學業之道賢者能者則行賓興之禮而獻於王冠者幼者則必執贄以見而聽其教飲酒於學則衆知長幼之節習射於序則衆知辭讓之貴蜡則教民敦嗇之事社則教民報本之法故夫序人倫正風俗美教化立道義其必由鄉老而且民惟邦本固於有政后非民曷戴邦非民曷立是以王政之詳自夫家起州為之長黨為之正族為之師閭為之胥比為之長尊主其要卑治其細大則分地職奠地守而行教法小則正地比任地事以待政令以至稽其衆寡與其施舍辨其老幼分其貴賤以聽政役以待軍旅以共吉凶以詔誅賞是以上下能相親睦禮義浹洽其化不肅而成矣三代之道既衰井田之制斯壞不修州黨族比之政而為阡陌涂巷之法尊奬游末寵縱兼并分職乏仁義之師牧民無慈惠之長善無勸而惡無沮壯者暴而老者遺爭鬭辯訟之獄繁侵奪欺凌之患起仁義之道自此絶矣葢古之哲王所以用賢貴德非以為一人之利將萬民之為利爾古之君子所以居位行道非以為一身之謀將萬民之為謀爾是以尊於朝而政成於上教於鄉而化行於下猶衣服之有冠冕水木之有本源故曰王政之詳必自夫家始則三公為鄉老之義其在是矣歸獄論春秋賢季友季友實魯之賢公子為公室輔國人是宜當莊公之末内難數作僖叔比慶父而友殺之慶父賊子般而友不討論者皆以友為得親親之道愚特疑焉案左氏莊公疾問後於叔牙對曰慶父材問季友對曰臣以死奉般公曰嚮者牙曰慶父材成季使以君命命僖叔使鍼季酖之及子般即位共仲使圉人犖賊子般於黨氏成季奔陳及閔公立季氏歸而不討也故齊仲孫曰不去慶父魯難未已既而共仲使卜齮賊閔公於武闈又案公羊氏説莊公末年公子牙不稱弟殺也曷不言刺之季子之遏卒惡也不以為國獄緣季子之心而為之諱爾莊公病召季子曰吾將焉致乎魯國季子曰般也存君何憂焉公曰牙謂我魯一生一及慶父也存季子曰夫何敢是將為亂和藥而飲之曰公子從吾言而飲此則必可以無為天下戮笑必有後於魯國飲之而死公子牙今將爾辭曷為與親殺者同君親無將將而誅焉誅不得辟兄君臣之義也不直誅而酖之行誅乎兄隱而逃之使若以疾死親親之道也殺公子牙今將爾季子不免慶父賊君何以不誅將而不免遏惡也既而不可及因獄有所歸不探其情而誅焉親親之道也惡乎歸獄歸獄僕人鄧扈樂慶父使樂賊子般然後誅樂而歸獄焉季子不變也夫僖叔之與共仲皆成季之兄牙也誅之仲也行之季子推親親之道戮其罪之著者可也象日謀殺舜舜即天子位而封之有庳管蔡挾商奄以亂王室周公其弟也而誅之故謀而未發與亂之既形罪有較也且叔牙以比慶父而死夫慶父之為臣也而賊其君為弟也而賊其兄之子季子反無討而歸獄乎微者卒使慶父再發難而終自斃焉親親之道此可謂正歟晉靈公之死也趙盾位為正卿反不討賊而史以弑君之罪加之季子雖亡而越竟苟避惡名而歸不討罪去盾幾何而公羊子又以歸獄於下為得親親之道而美之使人迹其事為姦利之名故歴世踐而為之者相繼也抑歸獄之為效矣嗚呼季友敗法於前公羊子失辭於後而後之人又繼其惡而莫之正其説也故論著之趙鞅論春秋定之十三年秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉公羊穀梁傳曰此叛也其言歸何以地正國也趙鞅取晉陽之甲以逐荀寅士吉射荀寅與士吉射者君側之惡人也曷以叛言之無君命也愚讀春秋二傳至是而未嘗不疚心焉夫二子之說春秋信長於誡勸然與聖人之用心為異聖人之言所以辭微而㫖遠者豈故迂為之哉蓋亦使人可以取法而不可為利也譬之天日可望也而不可親也今二子託事立辭雖意主於誡而反為姦亂之津歧權詐之凖迹故自誅錯而來稱兵構禍以逐惡正國為名者皆迹趙鞅之事也且晉自景公而下公室卑弱六卿富强政出多門漸以衰亂及此范氏中行氏之亂而趙鞅實為禍首焉案左氏之説初趙鞅以不忍小忿而殺邯鄲午故午子稷以邯鄲叛午荀寅之甥而荀范吉射之姻也故范中行氏助邯鄲而伐趙氏之宫趙鞅奔晉陽晉人圍之而韓魏與范中行相惡荀躒欲因亂以為利故躒言於晉侯曰君命大臣始禍者死今三臣始禍而獨逐趙鞅刑不均矣請皆逐之故荀躒韓不信魏曼多奉公以伐范中行氏弗克二子遂伐公敗而奔朝歌韓魏以趙氏為請故鞅歸于絳若其取晉陽之甲逐君側之惡人而以地正國之事蓋二子之寓言者且智伯以三臣同罪獨逐鞅為刑不均故范中行逐焉而韓魏獨以趙氏為請是亦不均矣鞅由韓魏而得歸尚何國之能正夫范氏中行氏晉國之世卿名族矣考寅吉射事君之素而惡無所載尚何君側之惡之謂自趙氏之歸而晉國無嵗不用兵競與韓魏併智氏三分晉國而有之唐叔之祀用殄焉其禍始乎此也且使後世權詐者襲其迹而為之故由二家之書實粉澤之也愚見其言不可為法而適為姦雄之利故曰異乎聖人之用心者其謂此也夫祭仲行權論事諸侯其國重佐王者天下正不顧小利而敗大體君可易也社稷不可亡也是之謂忠臣主在與在主亡與亡不能固存亦不從於亂是之謂具臣懷苟且之安挾觀望之慮回惑持貳以全寵祿是之謂姦臣是故忠於社稷者何事非君徒愛君者不必利社稷逢君惡者亡國矣此公羊氏所以賢祭仲以為知權者由是歟春秋桓十一年書宋人執鄭祭仲突歸于鄭公羊曰祭仲鄭相不名者賢其知權也權者何權者反於經然後有善者也權之所設舍死亡無所設行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不為也古人之有權者祭仲之權是也夫鄭弱宋强勢不可拒也已當國而就執謀無所出也以弱而當强以無謀而敵有備鄭且危矣忽雖欲勿出勢得勿出哉突雖欲勿入勢得勿入哉祭仲秉國之權内不及謀而外虛死是無益於君而徒自損其國也故必從其言則君可以生易死國可以存易亡少緩則突可故出忽可故反後五年書鄭伯突出奔蔡世子忽復歸于鄭則祭仲之謀效矣易曰巽以行權子曰可與適道未可與權權之時義大矣君子行之所以輔正道小人行之所以成詐利孟子曰有伊尹之志則可無伊尹之志則簒也至乃三卿之分晉田氏之得齊新莽之盜漢孟德之遷許三馬之移魏二桓之逼晉是皆挾一人而令天下發詐機而弄神器失之為姦叛得之為英雄假伊周之名行羿浞之事者矣嗟乎公羊子之賢祭仲於祭仲之心則可然而君子惡其啟端於後世也杜説左氏曰不稱行人聽迫脅以逐君罪之也穀梁子曰死君難臣道也今立惡而黜正惡祭仲也春秋之義有託始之貶有原情之責聖人將以示教誡明大法實不始惡猶託始焉今祭仲以陪臣事小國立君出君權皆在已貽之後人難為法矣若夫貶一人激來世防姦之漸夷亂之階是亦聖人忍小幸示大公之㫖也祭仲之貶請從二家之説漢功臣論漢髙祖起沛入關王蜀漢還破三秦與楚人争天下血戰五年卒滅項氏其賢傑之從君者衆矣有若蕭曹者為之腹心股肱以固其根本有若良平者運籌帷幄以出竒制勝有若韓彭者統兵帥衆以尅國擒敵有若噲歙者披堅執鋭以禦侮捍難有若隨酈者憑軾結紖以馳説諸侯有周紀之忠節以堅人心有陵勃之方厚以荷重事及其既定乎天下也則奉春論都以安其居稷嗣制禮以定其位律令以具章程以立雖日不暇給規模博遠矣大雅曰無競惟人漢所以集大命而成丕業者其信有人哉自髙祖之世至歴代之士論漢初之功臣者輒曰是其得三傑而酇侯功次第一以愚論之在漢之初定論功之時則酇侯宜無與讓在歴世之議者則未之思也以愚論之漢氏之功臣叔孫氏不在良平之下矣夫髙祖自布衣提三尺劍起於大澤之中顚危艱險不濟者數矣厯數有在人多歸之忠者守知者慮勇者戰辯者説以其寛仁大度不忌不克故天下之材咸為之用卒以有成及項氏之亡羣臣諸將皆野人武士與帝同起畎畝之中素常差肩等夷者一旦而為之君臣其心不能卒服乃至酒諠殿上拔劍奮擊當是時也亂在頃刻變在須臾雖蕭曹之忠良平之謀英彭之勇隨酈之辯顧無所施矣叔孫氏一創朝儀而悍夫懾勇夫服不施威刑不煩訓令君尊臣卑上下肅定宗廟以嚴朝廷以莊位分以叙貴賤以别髙祖乃始歎天子之貴焉在成周多士矣然其成文武之業致太平之功者終在周公而周公所以致太平之迹乃具於六典之法懿夷下衰王室微弱後王所守惟祭與號而天下尚知宗周以其邦秩國典綱本所繫雖齊桓晉文立威定霸必挾王命以令諸侯猶賜胙而下拜請隧而不許降及末世韓魏之分晉田氏之得齊咸因諸侯請命於周有封籍於文武之廟而後敢正名稱爵通於天下則知疆域之大士民之衆甲兵之强威勢之盛不可以犯典禮之重也不然者以齊晉之視安烈匹夫擒之耳至戰國兵拏禍大諸侯先竊焚削舊禮之篇籍而遂僭用王章焉然其維持邦國八百餘年雖危不亡將絶復續非禮何以存之漢自孝惠之繼立其大臣舊將北面於孺子之前懾然無敢有異望者及呂氏以婦人臨國坐閨帷之中以制天下彼陵勃輩輸力服事葢束於朝廷之儀而迫於大義也及光武中興三輔耆舊再見漢官儀至或感泣識者固以知其能復漢祚矣由是言之則知叔孫之於漢子孫所賴者也彼攻城野戰出竒畫策特決功於一日爾周典司勲氏辨臣之六功有國功有民功有戰功者若叔孫氏其可謂有國功者歟愚故曰漢氏之功臣叔孫氏不在良平之下矣樂全集卷十六
