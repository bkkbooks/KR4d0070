body:
  text: 樂全集卷二十一宋張方平撰論事西事咨目上中書一冦每犯邊輒擒戮大將議者以為諸將各有親隨軍隊舊事凡喪主帥自有軍法近事此令不行故將帥接戰左右逃潰無以禁制在愚觀之此是軍中政令招討經略司所當處置昨好水之敗任福等皆沒士卒散亡既多故韓琦奏請招集朝議從之請既無狀從亦非宜從則廢法自於朝廷而收恩歸乎帥府不從耶或以致不虞則帥府得以為辭而朝廷任其怨蓋軍中聞帥府之令矣忽有朝命特㫖三軍必懷疑懼若遇冦之際進有敗形退無生路勢不委將降賊更恐倒戈內向夫將在軍君命有所不受臨機制宜間不容髮豈有奏請往復數千里待命者哉謂宜特遣使者或明降詔書責問其情申戒於後此亦章朝廷防微之㫖折臣下圖全之計者也一賊連歲入涇原漸引而深殺掠老幼驅擁畜産焚蕩舍屋民不得耕穫樹藝緣邊籬落索然一空自鎮戎軍原渭等州城垣之外南畝蕭條矣勢且與保安延州相類此後供輸轉給公私益當大困漢法謫刑徒實邊唐制徙罪人塞下今若令流巳上罪鑄錢造印及諸為盜扺罪結羣冒販禁利十人巳上明知賊情而過致資給匿藏受分如此等罪但為良民害情理蠧惡者悉徙其本身一房於邊隨口贍田令自給食然後為什伍之法使相保察别為條目付邊臣以重法繩之所兾稍耕塞上空虛之地一四路分守其根本當在長安比來長安守備不設而騎冦每入漸深向使賊出上䇿乘勝豕突固可飲馬於渭水矣謂宜置兵蒲雍之間以重臣鎮永興而委以應接諸路候知賊有㸃集路所由入事宜審的即量衆寡部發應援賊退則引還本屯不惟壯根本之地遏奔衝之勢又足以安關中之人心免邊城之輸挽一賊每入寇常以羸形誘我師將吏貪愚相躡而入其伏中以敗賊用此一䇿三覆王師即如昨三川之事若懷敏擁重兵依險要之地堅壁而勿與戰令諸塞柵嚴備以守即賊遂敢引兵深入頓於堅城之下攻則勢不能克留則無糧道可恃退而有重兵乘其後此豈與我持久之勢哉以是揣之必未敢越懷敏而趨渭州也故賊惟利速戰多方詭計務以致我也況我屢北之衆氣索勢衰賊驟勝而不驕法令明而衆整愚常以為此賊雖無大志逺略其實良將也以任福葛懷敏等抗之殆未可與之決勝負於一旦矣今制賊之術莫如勿與之戰但能全師嚴守賊必不敢深入若輕有越軼而我以逸擊勞以輕鋭邀重齎據要害以制勝庶幾乎其有功也一竊思前後所以覆軍殺將張賊氣喪國威使邊事至此未有勞還之期者其大失在於主將不親臨行陳傳曰國之大事在祀與戎惟祀與戎君所當親之所以為重也自古行師何嘗有主將不至營陳者三代春秋時國君無不在戰陳秦漢三國至於唐其間書生儒士如諸葛亮杜預婁師德狄仁傑郭元振等不可勝舉凡曰將者未有不在行陳者也不能親執干戈以鬬者有之矣至於胡床羽扇從容於軍中可也主將在行陳則法令專賞罰明士氣奮機便得不在行陳事皆反此自賊犯邊境凡大舉入冦羌酋未嘗不親至也今諸帥授命朝廷輒許之以不臨戎行去年任福等敗至今天下歸咎韓琦即如昨者三川之事雖非王沿督責使趨死地蓋懷敏等勢不得不戰王沿悉一路之兵付之懷敏而自留渭州空城之中脫若賊越三川而趨渭州懷敏守便宜不出渭州被圍而急則王沿將何以處懷敏雖朝廷固以為縱敵也懷敏雖擁重師而王沿乃其統帥節制所禀故曰懷敏勢不得不戰在愚觀之主將不親臨行陳師出必無功不惟無功且必敗大事切在朝廷審議之一今遣王堯臣西路安撫不惟弔死恤傷完補敗亡凡軍中利害之宜朝廷所欲計置更改之宜四路或有異同之意因其行可悉條録令與諸將圖議凡士馬那移財糧器械有餘不足令通計議以聞朝廷則此後處置指揮庶精悉矣請罷陜西招討經略司事竊惟羌人叛命王師致討分命重臣委之統帥故授夏竦陜西招討等使四路軍政實節制之空國事邊於兹三嵗師惟不出出則喪敗冦惟不來來必得志控要城寨殘傷無幾內屬藩落驅掠向盡鈍兵挫鋭財殫力屈去嵗劉平石元孫之沒奪范雍節鉞今春任福之敗罷韓琦經略使中外皆謂朝廷威罰不舉責處太輕然猶薄示損懲微塞物論安有權握大衆坐玩冦敵至於覆軍殺將蹙國損威而曰我不預知是安用名為統帥也昔自三代至於春秋列國凡起軍旅未有其國君不親預戎事者自漢至唐興兵舉衆未有元帥不身先士卒在於行陳者後漢段熲征西羌二十餘年未嘗蓐寢訖平羌虜若將帥奮身許國發憤殄冦有如是之臣則陛下何憂焉事既乖失理須更張臣竊聽輿人之議皆謂前後喪師非賊能敗我我自取敗爾何哉凡諸邊臣稟令招討司機宜事㑹不失之急即失之緩勇者不得施其力智者不得專其謀而又愛惡相攻異同相戾文檄矛盾人無適從且朝廷設此司所以使臂指相用首尾相救決衆謀於獨斷通四路為一家近如麟府之圍雖非陜西疆域然為統帥苟急國患即未能請行赴救猶須耀師境上助為聲援陛下旰食軫慮遣敕使齎璽書督之出偏師使遙牽賊後逗遛立異竟不奉命至使賊如蹈無人之境因以平豐州夷寧逺麟州幾陷今雖僅存勢已孤絶如秦人視越人之肥瘠一不動念但恐涇原鄜延即有警急亦必不能如首尾之相為救也陛下曲全事體乞還竦舊官與之一郡遂其自全之計且精擇逐路守將使人自為功家自為固量其邊勢配之兵力仍於永興益置重兵以為諸路根本以為人心鎮重春秋擇遣重臣出巡邊春則量禦備之力遷其軍馬入就倉牧命守將修治城塹完利器用以待防秋之政令焉秋則閲其訓練之法搜補之術審官吏勞能以明升降之典按賦輿盈虛以通貨食之計以嚴其戰守但邊城能堅其守已足弊賊若將率各盡其用自當有功伏願天衷垂納裁擇論除渭州路招討使事臣伏見制除某官代王沿充渭州路招討安撫等使者朝廷比分四路以藩屏西邊其間道路坦夷衆得大入且車騎之利惟涇原故賊連年親來犯此一路覆軍殺將每來益深去年好水之役任福等猶力戰而敗驍將精卒器械殫焉朝夕竭力完補二年僅得成軍此來定川賊無亡矢遺鏃之費一舉而悉卷以去如蹈無人之境賊驟勝而不驕令明而衆整凡四大舉動無遺策氣焰益熾今既勝歸休養士馬若來年春首傾國復來我以殘破敗亡之餘稍更拓落不定勢且堂堂長驅有飲馬渭河之志則關中搖矣而北有強鄰睢盱睥睨外為和約濟其貪婪實用此賊困我意在坐收其弊以是慮之則今關中輕重之勢天下安危之形在涇原矣某雖涖官臨事粗有風力然未更重任恐不易當此劇賊又新䝉奬擢中外未之信服至於三路舊宣力人見其驟為之伍顧亦心有慊然且今來涇原人畜殆盡兵馬亡幾一路蕭然無藩籬之限此時施為經置動繫機宜乃老將之所難非全才而孰與成敗所寄理無試可切惟朝論更加審察必不得已或於三路中替換一人且當此路所貴諳練邊政通知羌事人心物望抑有屬焉論髙繼宣知并州并代路經略安撫等使事右伏以并代一路控制西北兩邊羌賊自三年已來頻犯西路揣諸道守禦為各已堅知緣邊蕭然入無所掠改圖趨利以故圍麟府睥睨汾晉之間今河西二城巋然孤絶河東千里各須設備此時謀帥匪易其人必使文能附衆武能威敵如繼宣者雖本將家其效官幹才衆多稱者然統帥方略人未知之緣今并州不同諸道是經營謀畫之始乃處置鎮撫之初須藉奇才方能集事況太原大府諸務浩繁若繼宣兼領郡章何由専心軍政誠朝廷為遣一有材望臣寮守州而令繼宣専總戎事即封略有警不妨出援事權所付足相為助下厭物議似合事宜伏乞聖心更賜裁定論种世衡管勾營田不宜差知環州事臣竊聞慶州范仲淹奏乞除延州知青澗城种世衡就知環州事者伏以种世衡昨於青澗開創營田朝廷奬其用心委之集事仲淹元奏只乞世衡暫到慶州教其部下營田及所請獲允世衡已到即復留占一昨罷省二帥分為四路使人自為守家自為備逐路將吏稍得力者則其主帥各所惜之世衡既元𨽻延州忽為仲淹奏奪如龎籍續有論列則朝㫖將安適從若諸路皆然互相侵競矛盾之釁恐從此始況世衡新承恩命方領使名宜推公共之懷以體朝廷之意環州管界雖接賊疆牧守之材終易推擢今夫衛邊之策惟足食為先臣謂世衡差除所繫利害不細一則廢營田之逺計一則啓四路之爭端謂其所徇者輕所失者大臣先見樞密院劄子許世衡營田成日優與酬奬夫見勞授賞則人知勸自用兵西鄙於今三年未嘗聞一邊臣有能建一功利世衡獨於窮塞之上首創營田之謀迹有艱勤義有足賞儻為優遷一官責其盡心興田利比諸安坐而享富貴者兹亦未為過幸其環州或却令仲淹别奏舉一人以替魏明則於與奪之間似為得所論雄州杜惟序事臣昨到雄州見就移杜惟序知滄州蓋左遷也切以雄州守將委任甚重惟序雖未能有長才逺略察其識用頗為通審去春已來值邊多事隨宜應副無大曠失臣比在朝聞議者多以昨蕭階之來惟序不合専遣通判接伴入界其時事宜蓋北人已釋兵聞朝廷未弛備戎帳不自安於燕京以故遣階走馬來使又涿州牒報先約定過界日分詳此事理惟序倉卒處置蓋慮止之别召疑生事即責議益重也臣竊觀河北中路武臣守郡者悉出惟序之下其於崇飭厨傳惟序實不及諸郡向來雄州守將如葛懷敏輩是皆以善承迎得虛譽誤䝉採擢終以敗大事若惟序以守分務實而取殆恐非以勸邊臣者王克基前在滄州以賄聞今乃以引進使知定州張茂實徒以出使道途之勞自供備庫使授東上閣門使知瀛州王克忠無他勤效近得遙刺知貝州惟序當邊事紛紜之際應接一年事已定而更被責去郡朝廷賞罰旌别於兹有纍其杜惟序伏乞録其用心之實不使廢於悠悠之毁得比茂實授一橫行在臣觀之諒未為忝至於任用之間亦望使之以器令得盡其用也論四路將率追兵不赴事臣伏見朝廷近以北人有渝盟之漸緣邊之急奏繼來車駕聲言親征有司各為備擬抽換陜西兵馬待河北事宜如聞諸路帥臣或有不時發遣至煩敕使從而告諭向若北兵遂至衝突鑾輿果或順動倉卒之際兵衛未集而又召發莫赴則見大事去矣歷觀古今之變為國理亂之形外敵交侵無代不有惟是人主威命之不行朝廷政令之不舉亂危之兆必從此始厥今事勢夫如何哉猛不濟寬威不克愛朝廷命令邊臣易於違戾邊臣奏復朝廷難於執持原此恣慢之端悉由姑息之過即如昨者除四帥觀察使故事尚書丞郎之帶職者得換廉察錢若水罷樞密副使徐乃授之馬知節罷樞密副使止除防禦使陛下優矜邊寄特示恩榮今四人者職皆直學士官郎員外而乃正其名使之總戎厚其祿使之撫下本朝之意夫豈為薄誥命已頒章奏沓至妄生意見覆為疵嫌就或強拜乃懷大慊甚焉者致欲繫獄請罪當之者猶以班叙為辭朝廷一切含容君命益成輕削臣誠愚褊竊獨憤然儻陛下之威命行朝廷之政令舉罰戮在後爵賞在前必信如春秋不測如雷霆使中外僚寀震懾奔走則天下之智力不勝其用矣何故屈大公之法伸羣下之私如是之惴惴為哉昔有志於尊主庇民者遭世多難感慨投袂徒以大義激烏合之心猶足以外攘敵國內寧社稷若據土宇握士衆聞國有急觀望晏然乃心王家夫豈如此儒臣猶爾使武人暴夫顧望倣效則履霜堅氷漸不可長也此臣所以竊懷憤惋實為宗廟深慮若中使回奏其諸路有不奉詔伏望聖斷特遣朝臣之通識理體者按問其狀嚴行責削以謹下之銜勒以正國之紀綱思患預防古之善戒惟陛下亮察請選差北使文武官伏以朝廷修好北人嵗月深久比來遣使多出恩澤人材智辨鮮由推擇今西疆未寧諸戎心動北方事釁頗有異聞孔子曰使乎使乎蓋歎其使才之難也且謂使于四方不能專對為辱君命古者兵交使在其間今乃以行人將命之重為徼幸恩澤之資徇臣下之小利輕國家之大計諒非謀議之不至蓋由因循而習然今北朝賀聖節人使且至日近當差接伴臣寮近例差接伴者便為奉使彼國之選臣伏乞此後遣使宜加審擇若使得其人才略足用可以發聖朝之光采揚大國之威靈覩事先機所助至博折衝排患此誠要務論廣信軍諜人事臣昨過雄州訪知廣信軍有勾當事人易州進士梁濟世為北界事發拔身自歸知軍劉貽孫奏乞令赴闕量材録用朝㫖下河北沿邊安撫司指揮廣信軍令婉順約回不得收留切以今來邊機雄州廣信軍實為耳目若非諜人往來探報敵中動靜何從聞知凡我諜人即彼姦賊為利誘使致家死地事泄於彼故當我歸此不收留使之何適若來無生路去為大戮爾後諜人豈復為用邊臣守將坐成聾瞽朝廷先事制勝之術疏矣其梁濟世伏望指揮沿邊安撫司令與資遣候到闕特與量材處置所貴邊臣有以使諜人朝廷有以責邊臣此之事機極為要切論京師衛兵事京師本古之陳留郡天下四通八達之地自唐室已前嘗為重藩五代朱溫始封梁王後因其宫府廣而為都五姓相承共十一帝四十九年亂亡之速自古無有抑由都城四向無險阻之形藩籬之固逼近强敵方鎮握強兵於外乘禁衛之虛弱末本倒置也國朝太祖皇帝深慮安危之計始削諸節度之權屯兵於內連營畿甸又修完西京宫內蓋有建都之意然利於汴渠漕挽之便因循重遷先帝通好北國即叙西戎爾時可以減戍消兵致生民於富厚矣太平三十年使軍士坐費倉庫以困天下非不深思逺謀也知祖宗本意依重兵而為國勢不可去也近昊賊犯邊漸發禁兵西屯四路在京軍旅所留無幾今又北人事釁巳萌兩敵合從人心搖動外有武帥分總重兵而宿衛之師日益單寡尾大不掉根虛必搖勢之當然不可忽也願留聖慮為社稷計京都宜擁重兵以封殖根本且乞勘㑹見在指揮人數若果缺少請從內出金帛召募材力訓齊教練必須精鋭以充禁衛無更外屯夫猛虎所以百獸伏者以其爪牙利也若虎而去其爪牙則犬豕鹿麋皆可以相狎兵衛者國之爪牙也足兵足食乃可以威服四方彈壓奸亂矣論州郡武備事二道西疆征戍未解天下州郡兵纍次料揀赴京江淮已南空虛尤甚無復武備日來逐處盜賊連結剽劫城鎮聲勢甚張至今不能誅擒自古盜賊之擾攘不啻四夷之患漢唐之事為鑒不逺國家創五代之亂削方鎮之權誠為強幹弱枝之術及兹敝也無臂指相為用之勢通都大邑吏守空城而已慢藏之誨不可不慮今諸道提舉兵甲司向來領為虛名但朝廷稍付事權則猶有古者方面之制應提舉兵甲州軍乞慎選長吏而為除本路鈐轄一員各令本路募兵量其山川險易封略逺近而約置兵之數常令教閲務為精練朝廷更不行抽揀本道亦不得閒雜差使逺出其一路巡檢使臣縣尉諸捕盜官吏使得亷察其能否勇怯而升黜之所部郡縣强惡之民纍犯罪禁者械送本司酌情法移配有冦盜結集之處量其勢力督遣巡檢等領兵甲捕逐若賊羣黨稍衆則本路鈐轄親督吏兵㑹合掩殺漢制刺史太守率以盜賊分數為最負其賞罰條目乞自朝廷比議指揮所兾郡縣武備氣勢相應萑苻不逞望風知懼肅清盜賊消弭厲階又臣前在諫院纍曾論郡縣武備所陳意見朝廷未加精察比來軍興多事賦役煩數顧亦天幸而屢有年姦游之民猶聚為盜至擁旗鼓入城邑殺吏堂堂無所憚不幸而荐饑民艱食勢必羣聚蜂起為盜或數輩匿村閭至聚吏兵千計縣鄉為之殘敝而不能時擒即氣焰稍盛兵連禍結豈在邊患也漢唐之大業未嘗無邊境之患至或長驅而犯宫闕然無害於根本之固及黃巾巢賊竟以大壞天下國家創艾五代之亂藩鎮不得擅兵常畨禁旅外屯州郡乃自近嵗悉還戍邊其州郡兵之壯者亦率㸃選配諸禁衛所餘乃罷弱羸卒供雜役使官吏導從而已豈知執兵之事今愚細之民知窺此隙故昨王倫等賊起沂州並淮渡江歷數千里若蹈無人地乃始下京師之甲而趨躡之使民間而有姦桀豈不生易朝廷之心歟伏以先朝置諸道提舉兵甲司所以專督盜賊抑有經逺之㫖粗存方面之制比來忽略領為虛名今能稍付事權自可外張形勢計諸藩郡有兼提舉兵甲處其為要地自用重臣鎮守自餘地望稍輕亦領此名者不過七八誠選用有風望方略之士以任長吏各於本路除鈐轄或都監一員量其路分輕重提封近逺約置兵之數令於本郡及所部州軍見兵中選取壯強集成指揮因昨所置武衛為名而廩給之若見管兵籍取不足則令招募及數明降朝㫖更不揀選調發赴邊亦不得輒差逺出內有逃亡隨即完補所有器甲必令精良每道選差班行使臣一兩人或令長吏薦舉比監押巡檢資叙專管教閲若所部郡縣有冦盜結集之處即量事勢發卒赴應使之統領追捕其所捕州軍都監監押巡檢縣尉諸督盜官吏令得察亷其能否勇怯以聞而升黜之若所部郡縣強惡奸蠧之民得以檢察追逮按情科罪移配逺方若賊羣黨稍衆鈐轄都監親督吏卒㑹合掩殺自餘賞罰科條更自朝廷比議指揮如此則不惟壯郡縣武備抑稍復方鎮事體庶以式遏冦虐消除暴害請申敕諸道兵甲司專督盜賊事伏以兩浙一路仍嵗饑歉近京東西河北等處今嵗大無禾麥自秋久旱首種不入必恐向去人户多有流移或奸游不逞聚為冦盜昨海州奏盜殺巡檢縣令未見擒捕朝廷舊制委諸道提舉兵甲司專督盜賊至如兩浙則杭州提舉浙西越州提舉浙東京東即青徐兖鄆各兼此職比來諸道領為虛名伏乞特降詔㫖申明條約應災傷荐饑之處委之賑救一道仍許舉劾本道都巡檢使臣等耄懦弛慢者選擇材幹之士以為提舉兵甲司大藩長吏使嚴督支郡務清姦宄所兾安輯流亡使疲人存濟除剪冦盜俾州縣肅清論京東西河北百姓傳習妖教事臣聞京畿京東西河北民間傳習妖教寖盛比曽上言乞加防禁蓋愚俗傳習初無惡意漸為誘惑因入於邪州縣官司因循不切覺舉至於法寺議斷又亦例從寬典以故愚民公然傳習僧徒讖戒里俗經社之類自州縣坊市至於軍營外及鄉村無不向風而靡所由來者漸矣近貝州妖賊傳云慿恃妖術朝廷加罰按察等官自緣素失防檢致滋竊發故降新條增損舊文重故縱之坐然聞州郡頗有告發妖事者中使馳傳捕妖者近已數輩竊慮姦人乘便搆造疑似以干賞利官吏希風不詳事體枝蔓考逮以及善良或挾怨讎更相攀引榜掠之下何求不獲則平人自誣皆為妖黨上致朝廷深惑下使人情惴恐伏望聖慈深察此理特降明詔應今日以前傳習妖教人並與除罪內情涉不順徒黨巳成者即令勘奏今日已後仍敢傳習者並依新敕施行夫制天下之動者待之以靜而已使事循於理淑慝有辨則安天下之道也論天下州縣新添置弓手事宜今月某日本路轉運司牒録到敕黃以近日諸處揀移兵士上京慮恐州縣别有盜賊特添弓手准備防護者兹誠朝廷約用兵農之法深戒本末之備者也伏緣天下州縣之長吏通明之才甚鮮每詔令頒下雖畫一丁寧及其施行猶不能詳舉儻又示之大體約束不盡則諸郡縣承用者駮人自為見措置乖宜況今所差弓手遍於天下賦役大事理宜均當經始出乎多算慮終兾乎少弊臣誠淺識早塵詔選敢以千慮上禆萬分其敕文有條制未盡事件及臣外有所見八條謹具列于左一敕文逐縣除舊管弓手外據見管主户每一千户差㸃弓手五十人一萬户五百人如不滿千户及萬户已上據今所定分較比量差㸃者伏以天下大縣有及五六萬户者若縣管主户五萬則所差二千五百人非惟人數過多民户煩弊或地處逺險或嵗逢荐饑或守令非人或姦猾乘隙聚兵資冦亦不可以不過虞也欲乞諸萬户已下縣所差人數一如敕文處分即萬户巳上亦以五百人為止緣雖小縣不可以無備雖大縣而選兵五百亦足以自衛矣如此則輕重之勢平臂指之力均矣一敕文弓手須於見管帳籍主户差㸃者只如臣州管內户籍有升降帳有桑功帳並歲上於户部升降帳所管主户二萬二千三百有餘此蓋官吏受俸約此户口數也桑功帳所管主户三萬七千六百有餘此乃州縣户口嵗有增益之數也而州縣賦役各有五等户版簿常所據用切慮逐處拘於帳籍二字致有㸃差異同欲乞明降處分州縣止以見用五等版簿見管主户數為準則天下之役均焉一敕文所差㸃弓手其第四第五等户如委實貧闕雖有丁數即不得一例差㸃者乞令諸州縣先從物力人丁最髙户差㸃第一等不足即差第二等第二等不足即於第三等比並資産丁行髙強者㸃定所有合供州縣色役依舊輪流差遣見供州縣色役者暫免弓手巳畢役者却充弓手非惟先富強而寬貧弱夫髙資之人各有護惜家鄉親愛之意故必重於犯法至於合用器仗亦有力置辦各得精好自然天下差㸃事體均當一敕文令逐縣創置教場每歲起十月後至正月終常分畨勾集教閲自教閲時每人支日食米二升十月後雖是農隙集教日長民亦不易又約計逐嵗人且支米二石四斗今諸州郡倉廩除上供外留州支遣例少儲蓄即如臣州在兩浙中户口不多所差㸃弓手若據主户實數猶僅二千人若據人數例支給日食嵗支米四千八百石將多補少計天下支費其數不啻百萬斛若令逐縣所㸃弓手便作三畨教習當教習時即支與口食已教放歸便截日住支即如三千户縣弓手一百五十人每畨五十人赴教每人嵗習四十日而已人不失業官不費儲是減天下糧給之費三分之二也一敕文自教閲時量借甲弩器械教習披帶教罷便仰管轄官員收納入庫其弓箭刀􅘫及木槍桿棒之類即許自置以備本鄉村教習者夫奮梃揭竿猶足以資嘯聚之勢况人知鬭戰家有利兵不可啓也請令逐人所置弓箭器械各自標認悉納州縣每當教閲及遇有盜賊勾抽㑹合之時據數給付事畢隨納常令官吏㸃檢其有損動即畨次給出各令修撰一敕文所差弓手每五十人內選差㑹武藝有身手者一名充節級每五百人更選有家活好身手能武藝者一名充指揮使者伏以內地州縣與河朔不同河朔所置鄉軍本備戰守之用故依軍法立為階級以相攝制又逐州軍各屯强兵勢足彈遏今內地州縣人不習兵但財力相雄富役貧强暴寡其兼并豪猾之民居常猶吞噬貧弱為鄉邑害况公使之相制乎夫能為五百人長是必鄉里之大猾者非惟為貧弱之暴更且有患之大者彼前世之大冦乘饑擾之釁奮臂猶足以為天下患況使之有素練之士甲兵之利乎兹事體大有安危之勢焉請令所㸃弓手每十人團為一甲置節級一人使嵗一替換依次更畨補充其指揮使之名伏乞省去逐甲人少則節級易為拘管呼集更畨補充則不相攝服亦馭民之深䇿也一敕文所㸃弓手須是少壯者充與免户下諸雜差配伏以天下州縣人户大抵貧多富少逐縣五等户版簿中等已上户不及五分之一第四第五等户常及十分之九故國家諸雜賦役每於中等已上户差科所以惠貧弱也今富強之家盡占為弓手即諸雜科配悉出於貧弱倘又姦吏因緣騷擾即縣鄉益困今若分畨教習每嵗赴教止四十日而官與之食富強之家未為有損而乃虛免差配貽患下户欲乞令州縣諸雜差配一切仍舊但嚴行條約所差弓手除教閲外州縣不得有勾抽差借諸般追役或有強惡賊徒結成羣黨勾抽㑹合之時亦只許隨近勾㸃令佐親自部勒掩逐不得令公人押領淹延團聚如長役弓級耆壯等一例監捕之法若縣鄉小小盜賊至于持杖竊盜非羣行攻劫者亦不得擅行勾抽免致官吏接便恣意聚散即其受利過於免差配之惠也一每歲教閲之時乞令逐州知州通判一次巡行諸縣以按閲之或所㸃人非壯健器械不完利行列不整訓習不精移易簿帳減削糧食諸事其逐縣令佐各行勘罰其弛慢甚者具事聞奏乞朝廷嚴行黜責右具如前臣以不材猥䝉郡寄區區之誠勉思禆補苟有所見輒奏朝廷伏乞聖慮裁擇儻有可行事件伏乞畫一列為條目頒下州縣使榜揭之戒勒官吏務在舉行睦州奏請州學名額及公田臣聞古之王者建國君民教學為先古之教者家有孰黨有庠遂有序國有學故三王四代盛德之世上自天子外及庶邦其所以化民成俗之道未有不以學為先也伏以新定古城山俗淳淡民風順睦以得州名邑有俊選之材野有名節之士先是太平興國九年知州故左補闕田錫始建今至聖文宣王廟及上請九經書于朝䝉恩給賜今見收管至景祐元年知州右司諫范仲淹拓廟西垣建置學舍樹立講堂至寶元元年知州都官員外郎胡楷增新廟宇基構嚴敞及臣到任塗塈茨以畢工焉伏望陛下崇導德教之源廣勵學官之路俾是逺方之俗仰霑天子之光特與恩賜州學名目并乞於管內荒逃係官田內量給十數頃以給學糧選官以領其教職置籍以㑹其物費庶游學之士獲安肄業之所使郡為鄒魯家為洙泗風化所被恩施甚美樂全集卷二十一
