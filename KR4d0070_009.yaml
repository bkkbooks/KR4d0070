body:
  text: 樂全集卷九宋張方平撰芻蕘論官人論臣聞股肱元首一體而後成人隂陽沖氣三合乃能生物君臣之義相須猶然故理亂在庶官安危繫所任良臣惟聖后德惟臣按歴代之典刑觀先王之治道莫不簡賢授任論才賦政勞於圖擇佚於任使堯之克明俊德舜之時亮天功分職用人猶咨四嶽故堯曰疇咨若予采湯湯洪水方割有能俾乂舜曰有能奮庸熙帝之載疇若予工疇若予上下草木鳥獸則是播種必稷擊拊必䕫各用所長故善其事爰及三代官有世守業精能勵百務用舉在漢武宣之朝亦稱多士之美内則有儒雅質直運籌定令文章應對之臣外則有將帥奉使宣風理民之良咸稱諸用各濟其志以故西漢號為理古凡魏晉而下創圖之主致治之君未有不能駕馭英髦賞拔俊彦而能建大功業立大制度貽謀長世垂裕載籍者也然官紀之制世増其弊原本要末請試槩論葢天子惟君萬邦國任三事揔百揆者則謀建庶官之長列庶長者則博選衆職之任卑治其目尊領其綱各有典司不相侵紊故人有所守而各安其事為法也簡而責效也詳人君可以垂拱而仰成百度所以條貫而有序及乎隋氏悉擥下權一命之㣲咸自王命三銓汨混諸流繁錯臯陶九德不足以盡官才之方周官六計不足以為弊吏之法毛玠之執衡鑒不足以振頽俗山公之善題目不足以發清議矣唐氏雜用隋制皇朝多循唐舊今吏部之職分而五仕涂煩廣賢愚不可周知資格有常能否固難悉辨然王者設官分職以立民極知人則哲能官人安民則惠大臣舉賢援能分治邦政在乎旁招俊乂列於庶位夫百司羣吏既非尊達各有其長其旦夕承弼出入起居發號施令左右前後之士固宜周識其善惡各盡其器能孰有致君成務輔相之道可以居廟堂孰有折衝決勝將帥之畧可以安邊域孰有沈謀深識可以斷大事孰有純誠樸忠可以臨大節孰有通塞之術可以主邦計孰有方重之望可以執邦憲孰有詳練故實稽古之學可以備對問孰有不畏彊禦敢言之氣可以司諫諍此皆帝室儀表當世衡石朝家輕重之所賴生民休戚之所憑夫不深詳乎僉議夙存乎簡注一職不舉固有闕政矣至於專使之才如終軍陸賈者牧民之術如延壽黃霸者澄清風俗凌厲名節如張綱范滂者明慎刑獄哀矜平恕如釋之定國者此皆内與之為政外與之宣風揚主之恩威為民之舒慘者又可不素察其能否而克收其功用乎臣嘗讀漢書見元嘉中丞相王嘉上疏曰前山陽亡徒蘓令發為盜欲遣使問狀時無可使者盩厔令尹逢拜諫議大夫遣之今諸大夫有材能者甚少宜先蓄養使之成就臨事倉卒乃求非所以明朝廷也臣每讀至此輒廢卷長息夫以孝哀之世其天下之廣職位之衆猶武宣也而朝廷虛空邦國殄瘁至無一使人之才得非由人失素備之道者歟故臣深願陛下廣知臣之明為立政之本采拔罔踈賤之間信任存始終之禮使端良之士夙夜乎左右才德之臣表率乎臺閣亷能之吏刺守乎州郡則陛下固可以髙拱乎太紫凝神乎穆清不出户牖之前而天下固已理矣臣才駑識近不通理要相時官人之道稍近乎政之損益者論著於後掇所遺焉用人體要臣伏以皇朝兩府前代三司所以平章庶政之經揔覽萬事之紀下賦羣吏之職恢成天下之務故髙宗以傅説作相而説旁招俊乂列于庶位周官太宰以八柄詔王馭羣臣西漢丞相東西曹或起為中二千石東漢三府察亷秀髙第出補刺守入居鄉校南朝晉宋以來五品已上執政與吏部參掌以至於唐宰臣猶得以不次進用官吏代宗時元載當國而公道隘塞常衮預政而人材凝滯及崔祐甫作相日除十數人未逾年凡除吏八百員上曰或謗卿所除官多涉親故何也祐甫曰進擬庶官必量能補任臣若與其相識方可粗諳人材若素不知聞何由察其言行上以為然識者是之憲宗時李吉甫自承㫖作相謂學士裴垍曰吉甫自尚書郎流落逺地十餘年後進人物罕所接識宰相之職宜選擢英俊君多精鑒幸聞今之才傑垍取筆疏其名氏得三十餘人數月之内選用畧盡當時翕然稱重吉甫有得人之稱自文宗之世宗閔德裕之輩挾私後公結援相傾而朋黨之議興焉故文宗曰去河北賊至易去此朋黨實難由是進用一官遷除一吏各相顧矚恐涉譏議豈至公宰物之道歟伏惟我太祖太宗之朝擢賢任能使人以器才畧奇傑或數年而至公相猥昧無庸或逾紀而不改或卑品而處要重或髙秩而居冗散升沈取舍惟才是視故能興造功業安綏四表制度遺文貽厥永代夫功名所立必由駕馭後世因循成弊葢自承平之久在今致理之本莫先官人之事助陛下官人者豈非宰相乎官至卿監職參臺省遷用之命故在政府郎官已下屬乎審官注授之職統乎選曹是二有司者宰司實掄之且今外任之重國權所寄不在亷刺之職分而為二轉運使提㸃刑獄者也天下諸道不登百人是百人者誠才則天下之政舉矣此陛下所當簡注宰司所宜慎選者也臣比見詔書更委兩省兩制薦舉此固朝廷不欲私用人之柄與天下公共之意然凡被舉者又果盡賢乎若類其資歴第其秩位貫魚授寵無復區選定馬於乾不知適變是猶按伯樂之圖而求驥騄於市也臣愚謂宜斷自宸明遠遵徃制以用人之柄責於宰司凡滯淹之才俊傑之器名行磊落衆實共聞自可越次甄升急收其效必依階躡級豈曰用人雖大吏而不能厥職居刺守而不聞治狀大者宜罷歸田里小者宜退從冗散漢官儀曰三公聽採長吏臧否人所疾苦條奏之是為舉謠言又漢舊制州牧奏二千石不任位者事皆下三公遣掾史按騐而黜免之此前代中外羣吏升善退惡咸自宰司之故事也既付之以柄推之以誠則一夫不獲一官不舉陛下有所問之矣或曰經綸屯昧之時則有不次急用之擢持盈守成之時自宜遵常守故而已臣以為此乃腐儒之謬説豈英主之遠謀且陛下向者躬攬萬幾再新區極獨斷不謀拔才振滯彼一二臣上膺奬擢咸自卑仄驟升清要又豈資任之云乎况此三司實掌衆職動而引例何謂掄材能者一日而在下則失一日之益不能者一日而在上則有一日之損故升拔善良斥逺邪惡以一日為晚何遵常守故之謂乎夫然故上下盡心庶官脩舉天下之士可得而官使也上無焦勞之憂旰昃之慮而百職理矣郡縣理本臣伏以今外權之重惟轉運一道百城號令千里官吏之黜陟財賦之弛斂恩澤之流壅民政之慘舒郡縣觀聼其風稜國朝倚辦乎外務提衆職之綱轄實方靣之師表葢漢刺史之職而唐度支諸道巡院留後之任也漢制刺史掌以六條督察二千石而不主金榖貨利之事其主金榖貨利之事者則大農有部丞州一人而郡國有均輸鹽鐵之官唐世亂後急於兵食而計臣始兼轉運諸筦𣙜之名而諸路置巡院官掌賦調之式委輸之藏而不揔州郡之政吏民之事其揔州郡之政吏民之事者則有按察採訪黜陟之使今之外臺乃兼其任受國寄用勢望甚雄小大之政無所不統夫其捃拾勾剝錐刀毫忽之計損餘補寡給報調度之筭正一胥史可辦者爾轉運使之大體在乎訪視風俗革正其因循之弊亷實官吏周知其否臧之才此固水木之本源衣服之冠冕矣是之弗圖而猥事乎米鹽芻秸之㣲誅效乎圭勺星銖之謬而宿姦大猾據都占郡府署為豺狼之窟州縣為虺蜴之宅以至暴於天聽達於四方而外臺猶莫之舉也此豈所以與天子共理之意歟比者朝廷議郡長吏之罪而轉運使坐累左遷斯見乎朝㫖務澄肅乎外政者也夫聖人立法所重成俗習見既久回革已難今天下之俗樂和易而惡堅介貴循常而重改作建一功利必䝉生事之名免一惡慝已落深刻之謗故雖綱膺之蒙寄任於今猶頗牧之當漢文之世也臣又詳轉運之名盖以賦輿為主似非專為舉賢黜惡而設也子曰必也正名乎則其居是職者先聚斂而後民政又不可多譏也昔在兩漢雖有刺史督州而又時遣四出察羣吏之治故前漢則有繡衣直指傳行郡國得專戮二千石後漢則有美俗清詔之名分行四方唐雖有採訪按察之職而亦時遣郎官御史訪事得失臣愚以為宜舉漢唐之典精選臺閣之臣才識深明風度方重者銜命分道參考民謠以升聞亷正劾免庸暴必列疏其能否之迹實錄其善惡之狀以行誅賞之法以立褒勵之道至於有可興之功利有可蠲之疾苦草萊有幽潛之士閭巷有節義之人因得搜揚以輔政道數年輒一遣而勿限於常如此則吏知沮勸常懷戒懼之意民有侵枉益開辨理之途利害上達而不遺恩澤下流而無壅矣考功之法臣聞三考黜陟著於虞典三年比校具於周官在漢則京房創考功之法在魏則劉劭立都官之制杜預泰始之格則委乎達官以考所統崔鴻延昌之議葢病乎選曹之無甄擇論雖畧著於後事各不行於時南北下衰無復議者若夫考歴代官人之得失酌一時風俗之薄厚為政之迹良可槩知漢之察舉辨論已詳取九卿於刺守取刺守於四府三署丞令之髙課者而外以六條督郡國之治朝廷時遣詔使傳行四方以察吏考俗而公府聽採長吏臧否以謠言舉按輒被黜免不在考功之法而善惡彰矣魏晉之時九品之制中正之職方為脩舉未至陵遲中正第其才行吏部據以除授故雖不行都官考課之制而物議定矣永嘉之亂天下幅裂時政衰蹙愒日偷安固無暇宏逺之謀猷以經時立政者也爰及有隋事不師古罷州郡辟署以收擥下權末品㣲資悉銓衡除擬官紀紊而人材雜矣唐氏以兵吏掌文武選事各分為三銓而考功掌校定中外官考類為九等雖制存著令而人鮮克舉凡二部所領六品而下赴期冬集臚唱注補而巳夫停年之制崔亮設於神龜循資之格光庭立於開元積嵗以為勞歴級以為限無賢不肖混然一律自是天官之任但行令史之職考課之制徒垂虛文今朝廷官人之式以貴任卑以衆任寡賢從類舉罪使連坐其道至公其法至平去偏重之權無專蔽之謬所謂詢于衆與天下共爵人之義也然選曹所以弊羣吏之治者其功過之迹始於州郡書之而州郡所書限於條式徒鋪列其紊文猥及毛細之事逮於筥釜盆盎老婦之用悉籍之有同乎劑約能否之用良惡之迹昧昧不可得而知也及滿嵗未調銓衡騐覈第能駁其文字小訛日月㣲舛勘詰細故邀賄引賂吹毛掩瑜去小州入大州解逺縣得近縣叙遷次補如魚貫雁行去此取彼若探囊發篋以故惡吏無所畏避民政多至紕錯臣謂宜令天下州郡嵗結羣吏之課必先疏其功過之狀則又以善惡深淺而相補除第為三等直云某人居某職事能舉其職嘗建立某功事有利於民嘗管幹某事能辦成或覆獄能得隱濫或能發大姦猾去民蠧害其書過罰約此凡郡縣衆吏長吏親書之其守倅之成則轉運使提㸃刑獄分校定之逐部州郡設月日期㑹集上於二司二司之官以其集時咸㑹治所受部郡之考籍而叅議之類其殿最歲上於王府移副於考功伏望朝廷慎選材識之士以授考功之職益増其員分總諸道受外臺所上部郡考績之狀使得博采乎清議訪察乎風謠有貪暴而居優課循良而處劣第得以論糾叅實其功過之事既合補除之法各以其秩序或上於宰司或列於審官或報於選曹各依等而行升黜焉凡吏涖職三年繼考三上者遷陟之三下罷免之二上而一下優叙之二下而一上殿留之其餘以是為差也此其約而易守簡而易辨有稽於古可繼於後吏知乎苟且非干時之術必勤於展用士知乎名節為取重之道必勵於進德則是為善之士益勉舉職之吏咸勸郡縣之政不肅而成矣比夫房劭之苛制崔裴之弊迹不少善乎辟署之制臣聞周制大國三卿命於天子自大夫羣士皆命於其君王卿士之官屬亦各自選用故穆王命伯冏為太僕正曰慎簡乃僚惟其吉士漢之藩國朝廷獨為遣傅相其中尉千石而下得自置立三府各擇掾吏州郡從事列曹衆職悉任之於刺守魏晉始建九品官人之法中正覈人材於外吏部銓授於中而辟署之制仍行不廢隋開皇中内外庶官罔論大小悉歸選曹無復外補唐氏雜考古法稍復其制採訪節亷之官屬判官而下皆自延請其已就署徐乃上聞未奉報者稱攝既王命者同正肅代之後嶽牧權重或自除支郡刺史專戮二千石凡諸辟用悉兼臺省皇朝興國初始罷假攝而重臣近職出臨方面自介倅賔佐逮諸掾吏得自王官請辟相承惟舊於政殊無損者而頃議者復為過論以為多引交舊或容請託又慮孤平之人纔上被代使奔命之不暇且郡縣送迎之洊勞由是復止奏辟之制臣聞書戒任賢之貳易美彚征之吉傳褒舉善詩貴烝髦且朝廷官人之法大體以保任論薦為選擢之路位登朝列職分半刺固可以舉其所知矣況大臣者上所尊禮而信用者膺共理之寄求自助之良設令引交舊而得賢容請託而不失才其亦何愆乎義凡所謂善知人者必審其善惡察其器能非交舊則何從知之既無交舊之素則必求於長者之譽善人之論採清議訪鄉評而取之是故涉乎請託矣魏盧毓曰夫名不足以致異人而可以得常士畏教慕善而後有名是不猶愈於殊無善而稱者乎而議者迎事端而設防蔽滯俗情而虧大體使大臣知善而不得用知濫而不得去是何取乎理哉臣愚以為宜復舊制稍為條約遂其援能之善塞其過分之請論辟之始當依遷次而補除贊助有聞自用常科而奬薦誠有人乖物論非可掩之瑕事出倖私有駭衆之迹自可使憲署彈劾外臺察亷暴其妄舉之愆示以必行之典如此則當薦延者有顧慎之意礪名行者有伸知之望吏皆勸向事斯脩舉翹楚必刈白駒可縶上為掄拔以漸之道下免滯淹不調之歎干旄好善雖紀浚郊之美棫樸官人終歸周朝之盛矣樂全集卷九
