body:
  text: 樂全集卷十一宋張方平撰芻蕘論禮樂論臣聞昔在帝舜命伯夷秩宗以典三禮命䕫典樂以教胄子爰及夏商制作損益不相沿襲周監二代文物全備事為之制曲為之防數度紀律具於六典於是教化浹洽獄訟衰息後之孱王其所守者惟祭與號而天下尚知宗周以其典禮攸出根本所繫雖齊桓晉文立威定霸必挾王命以令四方猶賜胙而下拜請隧而不許降及末世韓魏之分晉田氏之得齊咸因諸侯請命於周有封籍於文武之廟而後敢正名稱爵通於天下則知疆域之大士民之衆甲兵之强威勢之盛不可以犯典禮之重也不然者以齊晉之視安烈匹夫擒之爾後至戰國兵連禍結九法盡斁三綱咸解諸侯先焚削舊禮之篇籍而遂僭用王章焉然而維持邦國八百餘年雖危不亡將絶復續非禮何以存之漢初承秦滅學蕩無條貫叔孫通採拾遺散草蕝儀法而後君臣之位正郊祀之禮修宗廟以尊朝廷以嚴治道克興暴亂不作至於設官分職綱紀天下本末條理教民成俗使諸侯軌道咸歸於極則未暇也孝文接統治致太平賈誼勸上宜定制度興禮樂而時將相大臣皆介胄武人不知治體沮寢其議漢氏當文景之世可謂盛矣百姓樂業家給人足五都之貨殖七遷之豪舉驅扇浮靡汰蕩亡度閭閻之僭乃過徹侯夫以文帝之恭儉務德具王道而微者所不至於王一息爾其失由乎富庶而不能教也逮乎武帝招延材􅖿其文章儀物信美哉而制度典禮終不克建於後兵刑齊用財貨益急嚮非叔孫之法維持之殆矣由是言之叔孫氏之功垂於漢不在蕭曹之下也中興之後稍復增緝立明堂靈臺辟雍小學行宗祀養老之禮和安之世漸以陵遲桓靈不君王制大壞厥後吳魏異政南北殊俗世用多故文獻不足唐平隋亂太宗因開皇五禮修正頒行顯慶之初異同遽起開元之末討論甫定竊詳周官凡制度施設悉繫之羣職人存則法舉上修則下存事為典常者則謂之禮不恭其事者輒董以刑表裏相成本末為用經國治民同條共貫漢唐作者有異於是徒能類其篇目而不屬諸典司止具乎朝廷之儀不該乎天下之務吏民約束乃别著乎刑書子曰道之以政齊之以刑民免而無恥夫訓民正俗不在乎禮典而在乎刑書此乃備其末而廢其本縱其初而要其失故後王之道所以異乎三代者也我國家接衰唐之絶緒承五季之紕政德厚流光海㝢大定為承平者逾六十年宜乎必世後仁可以勝殘去殺然風俗猶未歸厚刑罰尚頗繁密故由禮樂未明數制未立王道有所壅而不備者也考定鍾律序正雅頌布明詔於天下誡庶民之僭忒此固朝廷深維治世之本欲清教化之原思納人於軌物者也臣聞之書曰伯夷降典折民惟刑言先以典禮教民而不專用乎法也是故禁於未發之謂禮救於已失之謂刑禁於未發者謂大為之防使無越者救於已失者謂養成其俗而後革之子曰導之以禮樂而民和睦是故設法而革於既失不若立禮以防於未然也今小大之吏凡理民之術莫不以簿書督責為急務文巧苛深為善職聚斂侵漁集以為功剝刻貧民竭其膏血錐刀毫忽人盡爭之此乃驅之使相吞食逼之使為盜亂又何暇孝友禮義之勸亷耻遜讓之貴乎故夫知理化之大體稍能使民回心而鄉道類非俗吏所能知者今凡羣臣之上計議條令之下四方非刑名之科即財利之事民不聞乎德教而惟利與刑之聞故法出而姦生令下而詐起苟取一切無憂深思逺之慮由乎所以漸引其心術者末也方今聖主勵精於上賢輔講導於下兆民安業四夷來庭是可以闢九筵而布政立圜水而宣德益廣天下之庠序俾習射鄉之禮隆雅頌之聲分命大臣集諸儒碩士因前聖之遺制考舊禮之沿革定慤當之一說以折衷於諸家芟其繁重以便遵用自國家損益之法至吏民等級之度成皇家之大典立百世之宏規且王者受命必有制作是故質文互變忠恭殊尚改正朔易徽號别服色異器械所以新天下之耳目振舊物之頽廢又况禮樂之大固無沿襲之理矣今天下學士所習者前代之餘制廷列羣臣所引者往朝之故事我大宋繼天而王久曠大儀小臣鄙愚竊懷憤悵蓋太平之期難值英哲之主間出臣不勝踊躍於下以至率然不量僭陳大議蓋為明時重惜也謹採末論稍近乎政教之本者存數條焉學校臣聞古之王者建國君民教學為先古之教者家有孰黨有庠術有序國有學夫其造育俊選以成官材是立政之基也上賢崇德正君師父兄之尊是設教之本也合射習鄉修揖讓絃歌之節是禮樂所成也養老合語享孤念功是仁義所起也出師受成執訊反告是廟堂之嚴也選習材能以助祭事是宗祊之重也蓋三王四代盛德之世上自天子外及諸侯其所以化民成俗之道未有不以學為先也周官曰州長春秋以禮㑹民而射於州序黨正以禮屬民而飲酒於序以正齒位文王世子復載諸侯羣吏養老之事此則州鄉列國庠序之禮咸與太學同制矣周衰天下大亂干戈日用而列國之學猶存故子襟刺其不修左氏美其不毁也漢文翁首建黌舍於蜀郡仲舒次發太學於京師而公卿大臣名儒隱德咸有門徒弟子橫經傳道書名録牒或數千人至於東都學士寖盛故在兩漢其政事本於經術其議論依於王制朝有名教之勸士篤去就之行及桓靈失御姦亂滔天王綱解絶民勞板蕩而賴正人持教義士奮拯支壞持顛更延餘厯雖腥德已塞於上而清議不敗於下豈非教學之功漬染深厚之所致歟江左晉氏范寧立庠序於豫章庾亮起講舍於鄂渚然倡而不和絶而不續尋復廢圯諸生解散以是而觀時之風政其可知也惟我治朝據宸立極丕冒出日同文一軌鳥言鴂舌知誦簡冊之言髽首卉裳咸襲端甫之服奎壁有爛河洛發祥文物炳然碩儒挺出故學校落俶乎濉渙續興乎郟鄏摹規大於齊魏絃誦聞乎江浙樂善之吏經營其闕民悅獻力不令景從庠序之制班班然且遍乎郡國矣自非朝廷以道德風示四方以禮義熏襲齊民又安得不言而化如草偃風若是之速乎然臣聞一鬨之市必立之平一卷之書必立之師周典以本俗六安萬民其一曰聯師儒記曰凡學之道嚴師為難師嚴然後道尊道尊然後人知重學今學宫盛立而師位尚虛諸生抱經侐然無主時敏厥修雖得樂羣之所必有正業曷取函丈之間且夫百工衆伎必有師匠緇黃所聚輒立師長况夫學者為國造士使民興仁所傳者纍聖之格言所習者先王之正道師教不立學乃虛器夫三代而下治道淳優儒雅尊博莫如二漢自文武之世屢下詔書勤命郡國勸使立學而終不能興自餘歷世小雅蕩然故弗論矣今天下承文明之化庠序修立乃盛於兩漢朝廷宜遂成其善意樂以成之顧同不急之務視之弗篤豈國家尊道育材之意哉間者近甸數郡之學雖為除乎講官旋復縻以吏職攬簿領之不暇何圖籍之能精且國家奄有萬邦吏貟至衆山澤津途百家之聚錐刀可斂必遣王官惟是膠庠王道所在顧一士之廩祿廢􅍇政之本原豈朝廷貴教化而賤貨利之意歟臣愚以為宜委清望近臣上從朝列下逮選曹舉經術篤行之士凡立學州郡悉為選官依其資任優其稍祿夫張官布職散劇繫時略之則輕屬之則重貴之則人必同趨簡之則衆斯共薄事無大小柄其事則權歸任無髙卑委其任則效立臣愚以為欲使師禮嚴重道訓尊立在乎使之專治學政主領學徒勤良者旌而異之悖惰者簡而黜之及賓興之時必參以學官之論其嘗簡黜者弗在蒸髦之選其嘗旌異者必預充庭之貢而命外臺察諸學之官其尤通博於講議勵精乎教育能得學士自逺方至者上之特賜奬諭或有賜焉太學貟缺即以充選且制使才名之士不歷學官者不得入乎館閣入館閣者必先歷乎學官猶近制先倅郡而後得補憲臺三院也如此則清流美士在乎學矣自然師道尊而教立士業成而行修禮義達乎閭巷德化漸乎州里國獲良才之用民得善吏之庇三綱以正五教用成絃誦聞乎四方道德行於天下矣車服臣聞為國以禮莫大乎制度制度誠立則上下之分定尊卑之序别爭奪之患塞僭亂之害除夫如是其理天下猶示諸掌乎傳曰夫名以出禮禮以體政政以正民是以政成而民聽易則生亂在易節卦象曰節以制數度議德行若夫以德詔爵以才居位是為議德行名位不同禮亦異數是為制數度故虞書曰車服以庸又曰五服五章哉周官則有五儀九命以正諸侯之位以等諸臣之爵自國家封方之度宫室門庭之式宗廟祭祀之法賔客交接之道鐘鼓羽籥之列几筵俎豆之數冕服圭籍珮組之飾車乘旗斿纓就之制牢積饗食之品祼酢問勞之節惟事事乃其有制而後邦國有倫也是故觀其采章則人望而畏辨其文紀而衆不敢黷有德者一物可以旌賞有功者一辭可以寵榮王者南面而治惟名與器而已漢世車服頗存周舊自士已上帶裳冠舄而皆乘車以馬為騑服異其輪輻衡軛轓幰帷裳以彰等級之度自江左至隋儀物未替而中原永嘉之後兵燹接跡先王典禮䙝亂無遺元魏髙齊增為竒詭輿裳制度於古無說隋氏一統稍復舊儀車服等衰差為四品有常服公服朝服祭服其三公朝服進賢三梁冠絳紗單衣白紗中單皂領褾白練裙襦絳蔽膝革帶金飾鉤䚢方心曲領紳帶玉鏢劍山𤣥玉佩紫綬烏皮舄笏用象牙乘車油幰朱網是時內外百官文物有序貴賤士庶較然殊别至煬帝數事巡幸屢興師役百官行從皆服袴褶始詔隨車駕涉遠者皆戎衣以五色表貴賤焉唐侍臣服令雖略比隋制蓋陪祭服饗元㑹大事乃具服其宴見進對折上巾紫襴袍環帶鞶囊佩烏皮靴而已始有乘馬之服蓋車不復御矣相承至今焉臣聞古先聖人制禮之意為冠冕以莊其首為履舄以重其趨行步則有衝牙之聲登車則有和鸞之節是故斯須而必在禮矣夫貂而騎趙武靈所制之服也靴戎履也合袴䙝服也傳曰棄衮冕而南冠以出不亦簡彜乎尊卑無章民何效焉苟曰便而已矣天下庸得不馳騁而狂惑者歟今郊祀大禮天子駕玉輅而王公百辟皆法服騎從此禮之尤失者也臣觀漢儀雖守令之卑皆有從車唐景龍中皇子將行釋奠於太學有司草儀注從臣皆衣冠乘馬時議者以為馬本用於軍旅戎服而乘貴于便習長裙廣袖紆組鳴玉非馬上所宜其議遂寢况國之盛禮天下所觀是宜示之以尊卑顯之以秩序而使輔相之重雜於騶騎之羣豈所以彰朝廷之尊嚴者哉又巾履靴笏自公卿大臣以為朝服而卒校胥史為制一等其羅縠綺紈織文絺繡自人君至於庶人同施均用其居室器玩之汰則豪人大賈踰於貴戚臣聞周官曰以儀辨等則民不越臣愚以為宜約前世之禮文詳定方今之制度大臣復依漢晉乘車駟馬增異冠服卿大夫士以品式差降之貴則備物卑則略焉其卒校胥史盍稍撙省其製令有所殊異不相疑雜則上下不相䙝朝廷之道尊等級自隆居然崇陛之象紀章自辨無復假器之譏矣僭俗臣聞古先聖人其制民之法詳矣始則經土立井分鄰畫伍為比閭族黨之法保受救賙之議辨之以四業任之以九貢以同風俗以齊豐寡將以驅之趨本勵之無游故使不畜者祭無牲不耕者祭無盛不蠶者不帛不樹者不椁不績者喪無縗猶慮驅而勵之未從也又為罰焉故使宅不毛有里布田不耕出屋粟民無職事出夫家之征惰游棄本者縞冠素紕垂綏以恥之已事其事矣又懼其侈而慢也故使雖富不異服無故不食珍納幣無過五兩合親不踰一肉老少異粻長壯殊役則是衣服飲食喪祭嫁娶之事莫不為之法制矣而後家有孰黨有庠遂有序比為之長閭為之胥教訓敦勉繩非糾怠是以民之生業均平而國之禮義興起矣自秦氏毁井田立阡陌賞勵貨殖寵縱兼并至有專地跨於丘甸籠利占乎山澤强弱相伏富貧相役四維盡棄淫刑以逞王道蕩壞遂不可復其流虐遺弊蓋至今焉於後天下或合或離承運立統凡十七姓平國治世惟漢與唐以文景之盛德文明之英才朝廷之政既修天下之俗已泰民知自重刑辟希省可謂既富庶而教之之時也不能圖建遠猷為之制節故其豐大及身而已天寶之敗仍親取焉今我治朝一統寰域日出月入咸被聲教自稚及耋不知驚擾導之以禮樂漸之以德義作法于治今實其時然天下務穡寡而游冗煩末俗逸而誠農困通貨貿遷者倅騎從後坐㕓射利者大第相倚食享列鼎服備四時曲堂便房妓妾夾侍四方新異咄嗟畢到與夫躬執耒耜寒耕暑耘水旱憂於前租庸逼於後奴妾不售溝壑為家其勞逸如何哉臣聞周官以度教節則民知足夫飲食男女人之大欲死生貧苦人之大惡故欲惡者人情之大端而制節者理人之大柄民知分限規繩之不可踰則貪奪僭侈之心息仁義亷讓之意興是故王道之端必自制節始也其在易履卦之象則曰履以辨上下定民志故知上下誠辨則民志斯定民志誠定則暴亂侵爭之患何由作乎向者頒下明詔誡天下服用之尤僭者而靡流之俗知勸矣夫齊一變至於魯魯一變至於道言理教之當以漸成也臣聞孝悌本於朝廷禮義始乎京師在詩晉國之篇以為其民憂深思遠猶有陶唐氏之遺風故繫之唐風且陶唐之不為政久矣其德教在民雖百世而不易非以其嘗所臨治被化尤淳者乎今京師者宫室所在王教所先宜乎其風俗敦厚質固以表正萬邦使八紘取則遠人知慕是當以道德為富而不以繁華為盛今乃子女玉帛多於郢國魚龍橦索過乎漢都雕飾淫巧之器奇邪纖靡之服陳鬻於市流於四方詐僞奸欺聚為淵藪虧損皇道熒亂民心臣愚以為宜益條節務從朴素事為之制物為之法掩塞末路摧省游人其兼并豪猾僭上剝下為蠧猶多宜深撙約使循律度勿令侵急小人以奉無厭之欲則天下之鰥寡孤獨困窮無告者得一息之寬矣雅樂臣聞人函隂陽五行之氣有喜怒哀樂之情心術所形隨感而動動而無節則必有淫佚詐僞之心勃亂暴慢之事是以聖人立禮以文其外作樂以理其中發於詠歌律呂播於金石管絃調雅正之聲導生氣之和全其天理起其善心而不使邪氣僻情得接焉古之天子諸侯卿大夫無故不徹樂士無故不去琴瑟絃歌雅頌之音洋洋乎流於族黨鄉州之中民共聞之莫不油然有易直子諒之心慈愛肅莊之意是以天下和悅禮義有序故曰移風易俗莫善於樂謂其感人之深也教化治世之要必本於禮樂焉乃自周衰王道喪敗禮壞樂散諸侯各溺所好異國殊俗而鄭衛燕趙秦齊楚越淫過凶嫚傲辟促數之聲作斷棄先王之樂用變亂正聲秦漢已還承習備用魏晉南北兵禍煩多雜之以巴吳揉之以淫哇耳目熒潰心志驕放古者所以興禮後世更用致亂焉其雅聲金奏雖世議完補然登歌下管既非賓饗所用崇牙樹羽徒為備物之設惟於郊廟擊拊成禮而已間者伏聞朝廷招集諸生考正雅樂蓋國家深維治本修起頽廢上以尊宗廟下以美風俗者也臣誠愚鄙不達樂意竊思有以仰贊盛事少裨景化者臣聞昔在帝舜命䕫典樂教胄子周官大司樂掌成均之學政至於師胥瞽矇皆用有道德通教化者世其官業通其精義故能用之祭享而鬼神格施之朝廷而君臣正展之律呂而陰陽和作之庠序而萬民協漢氏叙得人之盛而協律在乎儒雅質直之列又漢制卑者之子不得舞宗廟之酎取二千石至關內侯適子方為舞者歷代而下樂府令丞多用士人臣伏見太常樂工率皆市井閭閻屠販末類猥惡汙濁雜居里巷國有大事輒集而教之禮畢隨散則其藝安得而詳業安得而精䙝慢三靈誣黷典禮豈人君䖍奉天地祖宗之意乎今夫執技以事上者厯象則有司天之監醫藥則有翰林之署其琴奕書畫一藝之微者莫不厚賦廩稍間䝉好賜聮翩美仕朱紫垂章者亞肩於朝其太樂諸工真古者大夫士之職也所習者先王所以風化天下交接天人之具用則天子齊戒被法服儀典咸具而後設之是其於邦國之禮誠重矣而乃蓄養之至薄𨽻習之至簡曽不得齒乎醫卜雜藝之末以霑一命之榮是以人望太常之門徑趨而過矣又何暇一傾耳乎鐘磬之音者歟今幸得朝廷興起古道較定鍾石臣謂宜特立太樂署略依司天監為之官次秩序補用知鍾律之士以充其選擇衣冠之後或設為官廕若漢太常弟子為立選者如太廟齊郎室長之制領屬太常使專𨽻習焉以奉郊廟之饗以盡孝恭之誠其天下有學校庠序之所使得備金石之樂春秋釋奠行鄉射之禮則奏焉以風示天下化民廣教則庶乎神人接洽上下恭順正四氣之和奮至德之光民知鄉方而人倫清矣謹論樂全集卷十一
