body:
  text: 樂全集卷三十四宋張方平撰雜著先帝經疏文右伏以聖神示化弃黃屋以上賔凡庶何知抱烏號而永慕不有崇薦曷伸悃誠願依妙湛之尊特開清淨之供庶緣法力仰導真游伏願永證佛乘圓成道果儲神無極逍遙梵釋之間卜世愈延跨越商周之表至於含識普暢大和四針并序及進狀右臣猥以謭材沗職文館因覩祕閣曝諸圖書內有太宗皇帝御書一函臣竊發一軸觀之字為行書乃曲禮首篇四句敖不可長欲不可縱志不可滿樂不可極深惟太宗皇帝英睿多材自天攸縱萬幾之暇祕殿閒燕移聲伎觀遊之樂於經籍文史之間下筆習書意存勸戒昔漢諸儒集禮記諸善言而於首篇著兹四事蓋以為人君保邦制理之道所宜深戒者故太宗思而形於翰墨先帝緘而置諸祕府是將以嘉言善訓貽為孫謨又豈惟筆精墨妙之云爾乎臣待罪諌垣覩事有發輒廣其義述為四針誠不足以勒盤盂汙屏扆儻宣室聽決之暇一賜開覽法宫衡石之上獲預親程亦庶乎備晏居之誦代倚几之訓也干冒天聰臣無任戰栗之至其所著四針别為一軸謹隨狀上獻謹奏康定二年七月臣聞惟天生民有欲無主乃亂惟天生聰明時乂故王者奉若天命以臨萬方慎乃迪德無時怠豫以義制事以禮制心以輯寧邦家用咸和萬民于後佚王罔自抑畏罔顧諟天之明命以若先民攸訓不迪率典德用弗類故人君保邦制理之道慎厥身修思永兹惟艱哉禮有之曰敖不可長欲不可縱志不可滿樂不可極慎厥身之道兹四言者可謂切至矣書載周公無逸之篇曰在昔商王中宗治民祇懼不敢荒寧厥享國七十有五年至于髙宗嘉靖商邦能惠保于庶民厥享國五十有九年至周文王能知稼穡之艱難不淫于觀于逸于逰以庶邦惟正之供厥享國五十年則夫四者之不戒非惟德義之不則至于康養體志永綏萬壽亦莫之有益也蓋聖人所理有本末所顧有重輕身者當理之本位者可顧之重安其身然後能保其位能保其位然後能得其志欲而享天下之樂彼商之中髙爰暨文王先憂勤後樂欲而宜民宜人受祿于天由審是道也陛下濬哲文明徽柔惇懿慎諸事事之微念乎安安之難修其可願罔或過舉兹甚盛德也已然古之明聖無忘交警盤庚曰無敢伏小人之攸針臣以孤微職在規諫因覩太宗御書竊有所發輒廣其意而獻針云敖針惟皇至尊在上巍巍天日之高雷霆之威匪自抑畏盡人之微孰敢造膝以弼豫違外以溫恭通接羣志內以文明辨其誣僞溫則可親明則可畏端良既進纎邪自退欲針火燎于原水決于川欲之敗德猶水火然故昔令王好樂無荒蓋懼窮欲焚溺為傷凡欲之微則為身患大而不遏民斯塗炭易稱窒欲書戒無逸願銘盤盂勿忘終日志針居安思危已治不有其難其慎惟明明后乃後佚王驕盈怠忽謂已有天命人莫我咈恣其攸好動不慮善罔懲其侮以失黎獻湯不自用文王小心允迪休命兹惟良針樂針罔淫于樂罔逰于逸禹益吁嗟所相規恤在商成湯不邇聲色在周周公尤戒酒德祕殿燕閒萬機之餘時延正士訪其嘉謨前言往行則有圖書豈其優笑而後為娛蜀丞相諸葛武侯畫讃并序寶元始年冬余監新定郡王人閔廷俊來錫時服廷俊以善畫待詔翰林因候俊于傳舍語及畫之名家俊曰某之藝於人物為工比內出古之名賢像于資善堂嘗摸得之唯肖余既竊慕蜀丞相武鄉侯之為人因請于俊願見其像俊褚中適㩦焉以余好之篤遂以為遺時郡從事葉紓興于座曰君覩畫而愀然何歟曰有是夫蓋有感焉者豫獨念此公初耕南陽時抱膝長嘯自比於管仲樂毅時人莫之許也惟崔州平徐庶元直謂為信然夫士之抱器待用憂深而思逺以天下之事自負而識之者常鮮及其風雲變化功名光大從而譽之不已末乎又論者咸謂武侯為管蕭之亞匹兹尤非知言者彼夷吾從非其主已迷方復行險擇利更事讎敵不能檢身以禮而僣濫敗度不能正君以道而權譎苟合其器與行夫子卑之蕭文終起沛獄吏素藴初淺漢氏始造用衆智力文終之業專在關中至其追淮隂舉平陽密識公心真大人之事然與武鄉易地而處質勝其文矣故余謂論者之非知言後之君子必有取乎爾始武侯遇蜀主自夏口使孫車騎回與周公瑾破曹公軍時年二十七後出武功五丈原與司馬宣王對壘于渭南卒于師時年五十四中間僅三十年規摹事業光映千古噫大丈夫顧不當如是夫讃曰孰以武鄉而比管蕭桓文之事孔門弗道文終刀筆託驥之髦雄材清風亶猶相遼當卧隆中抱膝嘯吟方寸萬里何念之深蓋懷功名日月其淫不有良友胡獲我心將軍顧重拂劔為起折操之角斷權之臂堂堂西關莫之敢指芒星三反還復箕尾出師之表八陳之圖天髙日昭匪滔匪渝永慕夫人撫心悲吁悲吁云何悼無崔徐雪竇禪師真贊重顯本何從來今則非去不捨衆生示諸空聚諸漏巳盡萬法無住金剛妙身曷形繪素補元子時化余觀元子論化善其意然有未盡者為廣其說焉夫時之化也有大焉者爾蓋朝廷化為市井郡邑化為傳舍山澤化為府庫耒耜化為弓劍禮樂化為夷貊賞刑化為果報恩義化為讎敵忠功化為害禍威福化為喜怒仁讓化為詐僞補浪翁觀化元子浪翁觀化凡四說其辭悠悠不槩人事故述三篇云火生於木木亡而後火明木生於土土刑而後木生土尅水而水以土存火尅金而金以火成此有無相化之說右有無相化朝為商暮為周朝為公卿暮為俘𨽻朝為忠義暮為冦逆此有化無之說右有化無起于畎畝而君天下起于釣築而宰天下起于冦逆而忠義名此無化有之說右無化有舍人院試方略舉人䇿問國家自景德中與契丹氏平而夏人效職貢行四十年無鄙上之事軍政戎備則未嘗懈他日夏冦畔援大入髙奴塞平涼之役師頻無功自爾選拔將率訓齊卒乘繕治器械無日不講聽諸議者猶患率之才難士之未整械之不精其何為然諸生皆被大臣薦上以付於有司將以採其所藴也其陳用將之道訓士之術飭械之法以歷代最長之說為方今可施之宜詳著於篇得以推驗復觀前史所評材雄以武侯匹於管蕭衛公擬論於耿鄧功名之際其間近逺試為品藻用觀持論敏學髙識無不自盡省試䇿題五首第一首問唐虞稽古建官惟百夏商官倍周而三百此言王官也昔禹會塗山執玉帛者萬國蓋自九服之外至于蠻荒庶邦附庸莫不咸集然諸侯各於其國猶有卿士陪臣史胥徒𨽻今天下大小之縣比虞夏之所分封五分才一至于遐方逺裔止用一吏理一邑而議者皆謂置官煩於三代建為併省之䇿然又觀秦漢故事奏列郡四十二漢郡國才百數守尉之外長吏自辟掾佐分理而足此復何道也試參詳之為悉利病第二首問周禮地官載師職以大都家邑之田為公卿大夫之采地至于諸侯之國陪臣卿士各有封邑以奉祭祀兩漢之後列侯繼世乃自隋唐以來王臣兼五等之封者始為虛名實無分土而諸郡內外官縣吏俸廪之外命給職分地廨謂之職田此誠均惠仕進優其不足使全亷節者也近在位者或以不均啓幸為言既詔罷之矣復以經久之式歷更祖宗之世而仍舊貫者是必便於事使反初制雖朝廷之議利害必然之理其更推迹以要終效第三首問儒家者流講究歷代之故該貫百家之說以多聞博見為通者也然其祖述根於六藝幼學就傅即所誦習施於有政兹為理道故其本末討論應詳若夫易之為書人更三聖其分二篇何意所係十翼何名書何以斷自唐虞頌何以繫之商魯二戴之禮傳之何師三傳之學立於何代此經術之大略諸儒辨論之所嘗及也請為條敘以觀敏洽第四首問兵者武備之本騎者戎事之急古者乘馬之數出乎井賦之法周官六職掌於夏卿歷代著令備諸廏牧本朝之制則有司存質賈之平外通市乎夷狄孳遊之課內列坊于冀陜時方丁于纍洽議者忽于逺思芻田賦於民耕圉人配於兵籍庌夷廏毁井堙木刋向發邊屯搜補卒乘更索民蓄頗乏軍興昔宣王復校人之官美于周雅僖公修伯禽之政歌于魯頌朝廷治不忘備事思預防稍因舊程班舉牧政諸生治業之外必及時務之要此之利害蓋亦聞諸何以使赤岸三千阜蕃於麟德天間十二騰逸於龍媒考之前編為陳逺䇿第五首問昔唐氏自天寶失馭大盜干紀肅代之際貨力殫屈畿甸百姓至挼穗以餉軍元和中嘗校天下兵農之籍率以兩户而資一卒而又諸侯專土不貢不享山澤管𣙜之利未盡登于王府憲宗乘此疲弊而能戡夷冦梗復張紀律烜揚威靈惟皇運之開基席五季之多難擒諸逋僞遂大一統爾時王土蓋狹國帑未充耆定戎功兵力亦給比羌醜鴟義騷犯邊障出車戍守取贍大農賦發幾何民告刓敝逺鍳唐室近觀國初校物力則往虛而今盈計役費則此輕而彼重有餘不足胡為而然得非有司失平準之權豪賈操竒贏之利者乎將使農末並濟壅滯以通利用厚生九功時叙有望敏識為陳長算武成王廟試舉人䇿問三道第一道問屬者天子幸加惠復古制聽卿大夫營立家廟方詔有司考定舊典夫廟之制雜見禮篇及歷代之書皆多士所嘗講也若其堂室之位祭享之儀田祿之差器服之用自前代沿革之法逮諸異同之論略為條著冀效諸朝第二道問羌醜背惠頻年騷邊朝廷務為綏懷不事窮討惟是曠日之計要以足食為本比西鄙守臣有上營田之課者朝議善之下其法於邊而論者或曰既勤敷菑當虞侵軼若虧禦備是資冦糧蓋自漢氏以還世講屯田之事間有長䇿載于史牒諒惟該洽備嘗商榷自昔營田之制及諸功利之冝至于古法之可行于今今事之不便於古幸為條列上禆國論第三道問先儒有言自古有治人無治法蓋文久則滅事窮必弊變而通之然後能成天下之務故為國之勢猶權衡然損益重輕適平而已或謂改作非聖人之志變古亦先賢所譏遵用故常足以為政惟諸髦俊通明治體且謂事之循舊約而易守者為長將復理貴便時改而更化者為得矢言此義用觀逺識太廟祧僖祖議臣等參議伏以天子七廟著於尚書春秋傳禮之王制祭法禮器諸子之說歷代之議詳矣故昭穆所以序世及之正禘祫所以極仁義之本三代以降惟漢晉唐以其統祚之長得及祧遷之議國家繼天而王列聖重光盛德在人必百世祀厚陵復土虞主還宮對越祖宗升祔有日同堂八室廟制已定僖祖當祧合於舊典請依太常禮院所奏委為允當尚書考功覆諡議狀二首故鎮海軍節度使夏公伏准太常禮院諡議如前贈太尉夏公昔先帝以諸王在邸公才四歲童子給事左右及儲宮建至于踐阼周旋翼戴遂為親信臣車駕再北巡封祀行幸公無不從乃揔禁衛乃殿方靣乃登宥密位居承弼體于忠恕不矜不懈謹厚恭恪用終無咎夫考行尊名先王所以立勸者勤勞畏慎公實有之奉常之論於議允哉謹議故寧江軍節度使鄭公贈某官鄭公昔先帝以儲后監國公繇材武被選服事羈鞅六龍飛天雲從而上羽林龍虎歷典諸校上命糾守士心懷附薦試臨郡乃大得民遂擁旄鉞揔率親衛拱扈宸極祗勤勵翼奉身而退終節益休夫馭下以和兹謂寬裕治衆而整戎之昭也曲臺節惠較閥則協謹議送古卞北逰序天聖八年昔六國時趙之憂在秦備在鄰國李牧為趙將守北邊顧獨以其邊民戰破胸奴降東遼滅淡林盡牧之世敵馬不敢南下况舉其國之力又况用夫天下之力然自楚漢相持不暇北略而冒頓始大為中國敵晉氏之微小雅盡廢隋唐之際更為盛衰自石晉割我幽薊以自濟於禍難而冀方之地乃戎夏共處國家用文德懷逺以交好息民于今三紀天下安于太平民不知戰公卿士人恥言兵事子常何哉獨留意於孫吳家也噫誠得將如李牧輩朝廷能盡其用廟堂之上智者謀之復山北之地雪中原百年之恥係呼韓邪之頸縻致闕下使歲時貢賀如漢宣帝時子行觀之其易難也凉風暮秋木葉霜脫礪長劔以自衛冒北風而徑去惟我知子天下竒士汗漫之伎無所施爾酒酣日下駕而將行聊歌一引以起其倦遊之意云華夏無敵兮乃古其然中國大恥兮有石之遷顧瞻幽薊兮崆峒之英逝將去汝兮相從來庭太白宿兮箕尾宮旄頭北指兮塞垣空念頗牧之無所用兮吁嗟奈何感子征兮永歌送栁澥序澥自魏隨計來京師不利于春官將北轅以邁鬱鬱訪僕謀曰澥即歸將卜所以為親之羞敢問豫何往為可僕觴而告之曰嘗聞河東先生昔守邢今侍御髙公以布衣謁見先生優禮焉先生以文章氣義蓋一時仕不究其用天下賢士大夫莫不惜之矧自其門下出者耶前此三年侍御領琴臺不敏嘗請見實辱解榻以待則是侍御之愛才其與人博矣况子河東之猶子能以竒文懿行繼其家聲而欲覯見賢公動之以誠意者適邢可哉勉旃㑹宗酒行無辭僕亦從此東矣送趙參序聖上始親録鄉老之書僕與晉人趙生參俱見遺于春宗伯别去二年居無何邂逅於太昊氏之墟喜而飲諸市酒酣趙子擊觥歎曰嗟乎使我獨不當從衡時得憑軾結靷馳乎秦晉之郊取卿相猶拾地芥爾如在孔門吾庶幾子貢言語之科於是僕請趙子持觴為酌滿以讓之曰趙子且默無躁夫為國者孰不幸安而昌孰不不幸危且亡居是邦也既不忍其人於他邦也則使其人皆無罪而就死地君子兼濟之心何如哉若賜也為魯一出矛楯四國助田常無君之心不可謂之忠勸吳出兵教越襲其不備不可言乎信致齊之民為吳之魚肉不可稱夫仁欲善晉而使親魯則又誘吳之疲兵以成其僞不可語諸義是則子貢一出而忠信仁義索焉顧獨存一區區之魯雖曰墳墓之託不可不救於道不宏矣趙子君子藏器於身與時消息子前言過矣於是趙子喜其異聞也捧觴畢之翌日僕遂征淮西趙子西走輦下逆旅蕭索秋風向髙揮袂拂鞭各隨蓬轉思永交好褚無瓊玖故尋醉論書以識行且以規趙子使重其言也送山人邢遁序歲值青章魁枕虎首不敏薄逰淮甸間泝流且歸同舟一人布裘褒袂厖眉而長鬛揖而與語辭韻琅琅從容請其所自來曰吾耕嵩隂採藥於天台石門樂其山水留久之暇時言蓋於易公羊春秋甚深同載至梁王兔園不敏遂留先生且前自恨未即得從為山中遊姑結後期觴而歌送之曰嵩之盤吾耕一壥不羞素餐嵩之麓吾棲一谷安於華屋燎炎炎兮勢非長惟自照之明兮雖流螢之細而有餘光嗟豫聞道之晚兮與俗回屈沐先生之風兮愀焉自失非余親兮素髮班班從先生役兮歸柴關請誠上人就東京左街萬歲院講華嚴經疏伏以大方廣佛華嚴經者佛為大千衆生說一乘道純真境界超絶權假當念相應即成正覺故十㑹說法不離菩提之場剎那成佛無待僧祗之劫諸諦平等同法界性甚深廣大莫可思議非圓通㑹融安能宣揚此無盡藏海誠上人聞修有本行入勝流善財遍參漸進虛明之地普賢大願㑹歸悲志之門此處吉祥有衆延請盍亦示如來之知見成大事之因緣夫一切含靈下至微塵之細三世諸佛上窮多劫之先元明妙圓本同具足但以情生智隔所立照亡是致百千差殊一多揔别上人以方便惠為人演說譬之指月亦同筏諭不取於相乃如實語以是功德為大福田則毗盧遮那光明遍照矣謝劉莘老寄玊堂集序某在仁宗朝慶厯初知制誥時夏戎繹騷兵難連歲不解奉使謀帥多出西垣遷除更踐鮮得安其職者某白於朝請得專典詞命執政者亦欲見留故絲綸之地演潤獨多歷二年召入翰林充學士尋改御史中丞未幾復以禁職充三司使久之免邦計得請遂還禁林後改端明侍讀龍圖閣學士十易藩鎮英宗治平中復召充學士承㫖辝不得命又還內禁居玉堂東閣翰林盛事著玊堂東閣謂之承㫖閣自惟孤陋三入承明之廬暇日閲兩禁詞册因俾兩院史翻録前後所當內外制告命令書詔及禁中諸詞語類次為二十卷雖思致荒淺不足為文章風體然國家典册號令至於史牘所載亦有以美教化厚風俗示勸戒者非徒為之空文而已也玉堂者太宗皇帝神筆飛白大書玉堂之署四字揭於中楹備于翰林舊志故以命篇云謝蘇子瞻寄樂全集序某白承寄示荒文序引讀之汗顔內怵雖君子樂道人之善且以雅好愛忘其陋然虛飾已甚愧不自遑老夫性資疏曠不堪拘束幼知為學而不能勤于時山東士人若劉潜吳皓石延年韋不伐陳靖田度馬武十數人皆負豪傑之氣不得騁相與縱酒為髙僕年少好竒論與諸酒徒游故不得篤志於學也讀書每抽三兩䇿換易讀之未嘗依卷帙徹一部故涉獵荒疏藝文謬悠僅成舉業得科名遂以仕宦其所以自處亦與為學略同凡所經述或率意或應用每有藁草投之篋中未嘗再閲若再閲輒不如意自鄙惡之故積兩篋不曽有所改竄熙寧中得南京留臺無事有一吏頗敏利亦稍知文章體式因付兩篋令編次之便依篇目各成倫類亦不曾親閲有書吏三數人抄録成卷帙其間差錯脫漏悉不曾校對改證前年子瞻覯止見索鄙拙欣然呈納因而面告為刪除其繁冗芟夷其蕪穢十存三四聊以付子孫而已今承盛製而乃刻畫嫫母必欲使為姝麗或鬻碔玞於市妄自譽售市中莫顧有名識玉者為求善價盛稱為竒寶衆或信或否既遇卞和二人皆以妄謬見誚鬻碔玞者誚當其分矣為求善價人亦虛受其纍今公得無亦取虛僞之誚也孔文舉諸葛孔明前世之髙賢今以老夫為之擬倫賜也何敢望回唯有一節自束髮至終其身不為世屈此有似孔文舉然若遇曹孟德亦必不若文舉之憨去而違之爾所示序引幸公深裁損之使有以自得於心又門生二字尤是過言早以一日之稱遂託忘年之契何門生之有必請削除各正其分其髙文今復納上唯加亮察不勝愧悚愧悚眼病不能親札口占殊不盡意宮師趙公圓覺經㑹贊并序國老趙公叔平積有善根宿殖衆德本注釋大方廣圓覺經深究了義得古佛心匪徒言之亦允蹈之慈愍之心不折生草故用浮圖夏禁召淨行僧十人潔除園廬熏祓道埸因而講說新經至中元日經徹罷散樂全居士張安道聞其風而悅之以偈贊曰諸相非相自性圓是法非法自心覺自心自性自莊嚴婆伽婆佛光明藏平等法㑹文殊等共證如來非幻性了知幻是虛空華二十五輪坦無礙今日道場集清衆大方廣義重宣說普願法界諸含靈共此無邊功德海贈崆峒先生雜言先生拄杖常掛一葫蘆崆峒公何處來冠裾太穿敝路途苦漂泊葫蘆空向杖頭挑裏許曾無一丸藥何處得錢日日醉醉卧塵泥有何樂先生顧謂余吾鄉在雲壑壯歲去崆峒多年向衡霍吾有盛服披烟霞吾有華堂指寥廓藴抱兀何知嬉游聊假託亂髮垂破巾十指出芒屩布袴結雙繩緼袍縈斷索背上懶負琴身邊不將鶴藥即從來沒一丸杖頭葫蘆漫挑著當日陜中曾遇人一丸入手已吞却藻川子而識金丹耶為而說崖略煉時日月取精華餌時雷風相噴薄三光之氣通混冥五采九光動輝爍𤣥龜沈伏入深淵赤龍騰擊上霄堮洞天忽到見瓊樓寶藏從兹發金鑰再閏工夫不自勤已見塵寰如夢覺頃來瞬息六十年山深水逺窮遐邈林泉在處即為家乘興有時入城郭日飲五斗自有錢倒卧泥塵勝錦幄嗟而泡影已老殘朽木偶人猶動作附隂逐景類蚊虻爭粒尋栖隨鷃雀不知名利是泥塵自謂翻身登碧落葫蘆一丸而自覔良田稼穡須菑穫仙階鬼録路非遙一吷光隂吹劒鍔洗却塵泥從我來若到我家殊不惡貽王生略雜言并序嘉祐三年余居守南都故人孫元規謫官在符離一日致其門生王略來見余元規書且道生左蜀人舉進士下第薄人事弃業絶意名宦亦不復顧恤其家求有道者與逰以長往山林幽深為志于後數往來睢陽甬上其意謂余久留心於道術將有所謁也既知余無有所得遂告别云往茅山就陶隱居積金嶺下結廬以煉丹藥去後間有書來頗通煉丹消息向五七年不聞音問疑其丹成逺逰矣近有老郎雍君至自華陽云嘗見生山中猶守丹爐瘁矣余哀生志士也積功勤歲月久丹已逾期必不成又憫其內亦無以恃者以其嘗親近余意良厚為之慨歎余聞道也晚頃亦頗通還丹大指因抒雜言數十句代書因雍君寄生以發其所蔽無使守株空老巖谷若使隂魏諸公見吾此作定應相與三㸃其頥解顔而笑初謂大音之餘響已消空谷之傳不期遺燼之一星可復燎原之勢天之未喪斯術也固宜世有其人焉爾天上大龍訣古仙留此說古仙說還丹祕易不祕難所以煉丹人傳疑不得真人人有丹經藥訣人難明藥若得明訣還丹終見了何故丹難造火訣難得妙火若得妙訣還丹須可成火藥雖巳知鼎訣人得稀鼎若得真訣還丹成可期三訣明妙真事在人精意人意若能精還丹成決易藥是隂陽水隂陽體本二交媾性情親氤氲成一氣火是生殺權生殺權在手手法得之心不可傳於口鼎是造化主如國有城郭人民得所安禍難不能作魏公演古文直指藥本根彭老金鑰匙火候著精微更有徐真人論鼎語較親古仙說天一此是坎中實要知天一法正與節符合起數自星杓相將莫前却及至上下弦上下宛無偏五行顛倒術少順常多逆㑹此逆順情五行露蹤跡萬物榮又枯足見五行力即此是天機至神不可測天機在眼前對眼如面壁待而心識通何曽隔蟬翼霄壤信懸殊相通亦有路八十一程中但駕河車去去去依亭候節節如潮信紅塵日以逺紫清日以近大哉生化功到此無窮盡冨貴人所欲功名衆爭趨自有逍遙人閉關玩丹爐人見丹爐近咫尺逾萬里人見丹爐小具體同天地天地合其象日月合其明四時合其序神鬼合其靈是謂大還丹九轉龍虎精功滿告太上金簡收姓名人生水泡浮流景隙駒急念生久幽獨悒悒爐邊泣弃家二十年空谷守株坐何如就妻兒醉飽隨時過生且鎖山齊海上更尋討問得三訣明重去泥丹竈樂全集卷三十四
