body:
  text: 樂全集巻二宋張方平撰律詩㣲子廟西伯巳招二大老東隣更棄三仁人元龜遂訖商家命白馬永為周室賔抱器幸存天鳯祀喪邦都為牝鷄晨可憐長發源流逺舊國猶存廟樹春秦州北山云是隗囂宫登城樓下瞰偶題宛下君臣實兒戯昆陽勝敗非人力劉秀其來異獨夫隗囂何事為西伯送質巳是不能強保險明知本無策惟其得士似田横後世英雄共嗟惜讀杜工部詩文物皇唐盛詩家老杜豪雅音還正始感興出離騷運海張鵬翅追風騁驥髦三春上林苑八月浙江濤璀璨開鮫室幽深閉虎牢金晶神鼎重玉氣霽虹髙甲馬騰千隊戈船下萬艘吳鈎銛莫觸羿彀巧無逃逺意隨孤鳥雄筋舉六鼇曲嚴周廟肅頌美孔圖襃世亂多羣盜天遙隔九臯途窮傷白髮行在窘青袍憂國論時事司功去諌曺七哀同谷寓一曲錦川遨妻子飢寒累朝廷戰伐勞倦遊徒右席樂善伐干旄舊里歸無路危城至輒遭行吟悲楚澤達觀念莊濠逸思乘秋水愁膓困濁醪耒陽三尺土誰為翦蓬蒿題楊大年集後天上靈仙謫人間秀氣涵朱絃清廟瑟美榦豫章柟富艶三千牘從容八十函朱齡石典純追古昔雅正合周南溫粹瓊瑶潤滋醲稼穡甘微中緘海蚌巧處吐春蚕璀璨龍宫出精深虎穴探機衡成臲卼嵩洛入煙嵐公勁正不容權倖謝病歸陽翟因就除知汝州寂忍修禪智虗柔慕史聃驥轅曽未騁鸞馭不停驂巖廟登何數承明入獨三可憐經濟意舊客記髙談門人黄鑑録公餘論為談苑讀王朴傳世主英威動九陽髙賢事業出巖廊何須夢卜疑千古灼見雲雷定四方小國霸圖㣲管葛當時人傑自蕭張不終制作成遺恨律凖今猶在太常讀素書孺子圮橋跪履年七章徳在榖城仙所言道徳帝王事不比盤盂長短篇晩欲出塵應有訣初行遇漢豈非天蕭曺勲業皆勞力寜似功成樽爼前過豐劉季當年在古豐芒碭王氣已連空天機先露由啼嫗人意冥符自董公厯數有歸徒勝負風雲相㑹盡英雄不然樊酈蕭曺輩盡老屠商掾吏中過沛題歌風臺落托劉郎作帝歸樽前感慨大風詩淮隂反接英彭族更欲多求猛士為題中陽里髙祖廟縱酒踈狂不治生中陽有土倚兄耕晩遭亂世成功業更向公前與仲争臨淄同劉仲方作迴合空山萬疊蒼磻溪投釣此開疆儒家俎豆連洙泗戰國戈鋋接楚梁四嶽子孫終海嶼諸田意氣盡尸鄉不惟仲父能輕重形勝由來自霸強劇孟人物無重輕廟朝有失得世平徒匹夫時摇一敵國姦雄望風塵冠劔動慙色治庭不論功聲名輝典策讀齊世家黙坐磻溪素髮垂商周於此繫興衰機深正似㤀機者應被沙鷗靜處窺讀楞伽經楞伽三萬六千偈百八句中成自性法法非法離法塵心心無心入心病漸熟當似菴羅菓頓照猶如大圓鏡龜毛兎角妄有無海浪空華不清浄讀混元經五行生成本一氣曉此體用知命樞還元當復定金鏁過宿寜更懐蘧廬無質生質是丹地有象非象真壇圖此途得道亦連袂遲晩須乗八景輿寂黙通真說因戒而定云是小乗漸法然至則成大其致一也趙少師叔平覧之有疑見問以此答即定非存出入間照而常寂所居安將心起用知逾逺有眼無光見亦難向上本來惟一路初機聊為立三闗莫於此地分延促彈指時中海水乾讀坐㤀論并序唐書潘師正傳初陶隱居傳正一之法於王逺知逺知以傳師正師正以傳司馬子㣲故潘謂司馬正一至汝四世矣陶隱居毎謂門人曰吾於建元永明間仕不過奉朝請使吾爾時官得志豈有今日事耶詳此隱居所得深矣然為時主禮重竟不見其異迹至人守中抱一固不為異也至子㣲著坐忘論五時七候簡要易行本自正一暇日覧味因成長句正一初傳王逺知後來體用益精㣲惟無矜貴為真地但涉成虧即世機松徑風聲猶有待糠鑪火候事終違便令直了九丹術不到坐㤀何處歸覽九丹上化經寄南都王宣徽君貺上清紫簡世傳稀中有靈都妙㫖㣲雲霧披光丹鳯出風雷接勢赤龍飛琴心三疊胎仙舞籥筦雙迎帝子歸幸得九天真一訣塵勞何事尚依依讀穆天子傳八龍長騖造崑丘七萃前驅縱逸逰遇雪自裁黄竹唱捧觴喜答白雲謳羽陵廣奏随風逝崦阜銘蹤共日留惆悵璧臺人不返樂池遺恨素波愁讀樊川集不遇元和得獻謨望山東北毎長噓獨賡唐律雅風後更注孫篇俎豆餘霅水勝逰成悵望杜川歸事竟躊躇中年遽使山根折盡寫雄襟在此書讀杜詩杜陵有窮老白頭惟苦吟正氣自天降至音感人深昭囘切雲漢曠眇包古今萬壑入溟海一枝成鄧林掩抑鬼神泣寂寥星月沈珠慿㒺象得玉看晶采尋穰穰豐年榖磊磊殊方琛病源問岐伯兵畧須淮隂流寓四方路浩蕩平生心毎覽述懐篇使我清淚淫題英烈王廟伍子胥祠在楚州固云志在修私怨破郢其如不利吳由此夫差心遂侈䲭夷豈得謂非辜東方朔不獨巖扄與市塵金門亦可晦吾真孤風大義人誰見宣室聊曽抗倖臣天聖中年嘗有異夢熈寕癸丑退居南臺聊記舊事凌空素閣彩霞鮮舊侣相容見九𤣥上下登梯一童子逡巡離座六靈仙跪瞻寳案凝神久手納金匙受記専病卧夜長思此境忽驚四十有三年侯君房爵位功名可自豪青雲志士豈而曹嚴子陵謂光武曰士固有志何至相迫耶一朝黄鉞㸔看下馮勤傳始愧狂奴故態髙被命中山以親老不赴書懐寄集賢曾公叅政趙公野懐常逐白雲飛疎拙那能合世機偶似曹溪一宿覺巳多蘧瑗九年非畧呈幻事何須了惟願朝恩早放歸它日蓮華峯下去猶期話道過黄扉上三司蔡内閣此日河南念賈生留將名字徹丹庭秋聲漸覺寒生樹親老遥知獨倚扄徒繫車傍淹白晝得離韝上必青𡨕公如未信牛間氣試掘豐城必有靈謝范天章薦應制科明道二年初闢明堂見帝軒此時寜得戀丘園程文懶謁春官氏決策思干法扆尊千古聲名傳鶚表四方豪俊望龍門若趨丹陛承清問何以酬知或敢言次韻酬潭州周沆學士見寄鼇背三山壓海濤雲䑓髙議接時髦一麾忽到江湖外囘首方驚日月髙不善取容同曼倩且歌樂職學王襃賈生自是長沙逺更弔湘纍賦廣騷貽龔懋所至輒驚座歸來成淚痕憐君孤劔客擲謁五侯門驕氣羞紈袴凉風憶故園時清經世事捫蝨為誰言寄徐白乆客襄漢避暑鹿門寺虗齋風竹凉草連䢵國逺水接漢川長寓客懐江表騷人愛楚鄉京塵誠可厭君未捨名埸寄髙弁侍郎大雅乆頽弊夫君真古人道維皇極正文著帝刑淳公有帝刑五篇羙望鏘金石深誠照鬼神立朝惟一介為郡有遺仁素尚陶𢎞景風流賀季真嵗寒松有節明瑩玉無塵霜簡雖清重銅符亦乆迍老成急登用必有及斯民寄汾陽郭先生君家白雲外巖溜響嘈嘈絶壑風煙澹孤峰冰雪髙自能無世累誰見有生勞指我蓬壺路瓊宫隔海濤寄三峰郭誠思松檜峰前古栢林結茅無伴對幽禽鄙為浮薄八公事獨入精㣲九聖心春斸晴川閒種玉夜開丹竈試還金泠然風馭知何返三十六關雲路深訪朱先生值晝寝一枕清風靖館深滿庭松檜鬰交隂此時真境誰人見月在泥丸日在心寄代淵塵走我何勞巖棲君愈髙林齋且吟嘯世路盡風濤小桂閒招隠西岷續返騷氣機衝不露承弁縱雙毛貽劉几家自唐來世大儒惟君不肯讀家書春遊爛漫少曾醒俊氣飄揚頻得盧早講猿公飛劒術更通風后握機圖何時羽獵長圍合請看雲中一鶚孤謝韓仲文學士送白竹簟帶粉裁踈節凌霜剪翠筩鯨鱗鋪海浪鵬翅展天風暖恐春水釋清宜曉魄融露華流沆瀣寒色凛崆峒栩栩來荘蝶􅖇􅖇失夏蟲枕須松石碧幌鄙霧綃紅坐覺非塵境䰟如在月宫北忩聊寄傲俗骨愧方瞳金陵乆旱喜雨呈運使韓綜學士提刑令狐挺祠部及示諸府僚江城風日燥將燃喜此滂沱僅有年諸澤氣交隂壓地四溟水立闊圍天廓開紫宙清凉界頓去驕陽跋扈權須信化工人可代傅巖才業在三篇提刑祠部再和前篇猥為禱祈之應輒復次韻且以見志長吏憂民深望嵗諸侯閔兩著編年鵝鮮聊用遵明詔尫鼻何能感上天五事肅時斂在宥九功美利属持權守藩無状惟推分心在蒙荘内外篇謝浙漕劉忠順郎中送簟玉水一方光瀲灔霜華八尺翠琅玕卧來病骨殊清快勝餌西山五色丸近自鍾山採松花和湯甚美按本草經木部上品松花名松黄拂取似蒲黄輕身療病云勝葉節及脂松脂一名松肪淪入地千年為茯苓又千年為琥珀又千年為瑿一名茯菟通神而致靈和魂而鍊魄明竅而益肌厚腸而開心調榮而理衛上品仙藥也乆服延年陶隠居云松有脂潤又凌冬不凋理為佳物金匱方書葛洪所撰仙經曲晨丹用琥珀鍊合送湯一甖呈仲文學士青松北山麓春蘂摘金團芳澤逾肪節滋華本嵗寒功傳上品藥餌勝曲晨丹一泛彤霞液天和入肺肝日精月華所滋結金匱瓊笈稱靈珍味勝仙人掌中露色如遊女衣上塵餌之伐邪鍊神魄乆且長年登髙真輕瑿茯菟乃淪滓嘉賞當問清遐人居憂過祥制示辰長老流景無端隙駟馳永懐頋復感慈闈幸兹門外車馬少更復朝中書信稀衰颯顛毛素絲短芒佯病眼亂花飛舍西賴與招提接時叩禪闗話祖機貽辰長老同流誰往還終日掩柴闗璧觀少林寺門風先洞山師承臨濟源出洞下道埸随處是心地本來閒指我常河水都忘鬢髮斑離都招友人車馬交塵路不停勢家門巷宻如萍張湯筋力奈寒暑樓䕶口舌摇風霆機牙潜發如馳傳聲影相連若建瓴此地豈容山野客盍歸乎來掩巖扄慶䑓韓子華寄示清居大士牧牛圖頌酬寄長句香嚴昔向溈山住只作田翁學牧牛路絶纎塵寜見迹野無寸草漫迴頭晴天任去雲作伴露地閒眠夜不収却問清居真了未樹邉蓑笠為誰留都下别友人海内故人少市樓新酒醇與君聊一醉分袂此殘春北道邢䑓路東州泗水濵相期復何處京洛舊風塵寄魯平平也青雲器鄉評推孝亷髙懐焦尾澹壮節湛盧銛與我偏心照論交以道詹逸羣容策蹇美盼對無鹽振楫期同濟提衡豈致嫌前年稅征鞅彌月憩衡苫環堵藜為榻圭門席掛簷未曽憂四壁聊與醉青帘且黙何嘗說雖寒不附炎伏龍當自起躍馬要誰占舌在居貧樂情親茹蓼甜雅遊傷遽散流景頋將淹信㫁傷秋鴈愁多伴夜蟾不堪男女淚北望一漸漸寄郭誠思華下茅齋舍在世塵外松扉夜不関心同秋水靜身共野雲閒自得逾三樂誰堪話九還它年玉泉約何以救衰顔寄題都下知友山亭時在新定古郡利名外萬山雲靄中思君痛飲處累石小軒東觀闕風光近郊園野趣同溪頭對魚鳥未羨舞裙紅菴堂書懐呈郭誠思曉駕白龍車氤氳入紫霞翠微雲外路碧落月中家駛過剛風騎閒如迥漢查幽忩一欹枕世慮自空花誠思約以初秋東來相過輒馳短韻以速行期已聞露葉寒蟬急休待霜空曉鴈催不是相思閒命駕無為弟子望師來留别所知雪擁歸程朔吹寒來時孤劒繫征鞍此行誓不忘知已昨夜為公重一彈熈寕壬子嵗寄丁未同甲諸公秦亭吕宣徽寳臣汝隂歐陽公少師永叔京下王尚書仲義時並六十六嵗百二十年名上夀浮生百嵗實稀聞百年三萬六千日今巳三分過二分嘯歌獨喜齒全在文字看來眼未昏酒量雖衰猶得醉塵中人事自紛紛聞翰林承㫖宋子京尚書捐館平昔雍容兩禁游共陪帷幄奉咨謀功名不到麒麟閣詞賦空傳鸚鵡洲事業三朝虗物望聲華一代擅風流清時只作文章老誰識深懐藴九疇哭劉潜嘗謂君才似武侯草廬牢落臥龍愁天公不念蒼生故元叔堪憐郡吏休蒿野已埋經國策巖廊誰是富民侯朝廷今始思英俊不見庖丁刃一投君没二年西陲聚師朝廷挍用才士而碌碌競進矣聞郭誠思解化溪堂月榭幾分盃暫住三峰約便囘君近從東平歸華齋榻忽留青竹去庭除不待玉棺來人間如幻寜同恨天上修文亦用才顔囘王弼皆為帝所修文郎碧秀煙雲無限好此生勿復望崔嵬太華東曰玉秀峰一曰碧秀黄神谷過峯下水聲聞百歩外僕嘗與君遊而樂之約營居其下方得地且葺之簡徐登道人聞說頻來帝里遊藥鑪何日得同流勸君只就紅塵裏撥轉河車萬事休葛居士詩并序葛居士名自成絳州曲阿人世農家貲業富贍天性至孝喜誦佛經以父母疾凡燒六指於鄉黨有行義壮而染惡疾漸劇且将自沈於汾水夕有老父過其家而求宿與之語居士更悟向之所為妄著我見爾詰朝挺身行乞抵華隂遂登蓮花絶頂茹草木精脩五年辛勤備至眉鬚復生鼻通息聞華隂人郭誠思有道造焉誠思欣納之然但以為丐者不知其鄉里族姓也見誠思不食亦不食乆之誠思諸兄惡之數詬逐居士遜辭不見容因自道姓名謂誠思曰余曲阿人初行來時家不知也今一歸亦善君為遣人告余家誠思遣僮徃告之旬浹兄弟僕馬來迎比近鄉邑父母及其子皆至相見悲喜去其家二十里所白其父母曰兒之來以絶二親之望念也浮世幻縁縁盡即離請從此别端坐泊然而逝居士不識字諸經皆口授而誦之及自峯頂而下出語皆成偈頌時亦為詩章理意髙逺不類世俗之辭其偈句有妙法白蓮清浄脩又云法眼觀時世稀有俗眼觀時是癩人今採其句為葛居士詩云三峰頂上五經秋妙法白蓮清浄脩無數天花常自散真空性水不停流病癡誰問維摩詰俗眼徒嗟冉伯牛别有妙身諸相具金剛堅固異浮漚月夜吳春卿蘓儀甫相過㑹飲忽聞五鼓遂同入朝清風凉月滿前軒邂逅相逢索酒罇東有啓明俄動色北來寒鴈亦驚魂相車未過塵先起宫漏纔終市早喧階下從人催上馬百官巳是簇朝門寄崆峒天水公先生莫可測滄海逺沈沈詹尹徒端策昭文不鼓琴一丸天上藥幾日靜中吟安得菊花酒盈巵金液深赴錢塘吳江道中寄侍讀王君貺侍郎時王赴太原畫舩浮震澤煙水接秋空一霎過雲雨滿帆開岸風酒旗蓮蕩裏僧刹橘洲中何似并州路塵髙馬隊雄趙先生王屋杖待月移肩倚聽琴向膝横溪橋經雨滑山屐入雲輕擊水乖龍起書空老魅驚夜歸聞石響鶴舞逺來迎中秋夜清思䑓獨坐對月寄太傅曽魯公宫師趙公萬籟沈聲羣動息纎塵絶跡片雲無此時何物名身世一㸃靈光徹太虛蘇子瞻寄鐵藤杖隨書初見一枝藤入手方知鍜錬精逺寄只縁憐我老閒擕常似共君行靜軒獨倚身同瘦小圃頻遊脚為輕何日歸舟上新洛拄來河㟁笑相迎西齋偶書祖録㤀筌後丹鑪住火時浮生更無事燕坐復何思暖日移棊局寒風促酒巵世間安樂法不獨浄名知南原觀田日長春事動田野膏脉輕草青布榖過桑緑新蚕生雨足有酒色社近聞鼓聲牛羊暮歸飽舍中燈火明和叔平少師見示知足吟談宗㫖也昨日㸔公知足吟寂然不動至人心視身無實元泡幻觀世皆空謾古今忽忽嵗窮駒度隙塵塵事過鳥遺音從來兩箇泥牛鬬一任相將入海深大梅云我見兩箇泥牛鬬入海直至如今無消息樂全集巻二
