body:
  text: 樂全集卷二十五宋張方平撰論事奏陳執中碑文臣奉敕撰故相陳執中神道碑銘今已繕寫上進執中器資毅重有大臣風節陛下察舉再登元宰直清公正始終不渝薨謝之日恩禮隆至昨者有司定諡甚駭天下聽聞臣聞古為諡法節以一惠蓋君子成人之美不成人之惡責人之備於義巳甚若又掩其所長而專揚其短則是朝廷之內士無行義之全君臣之際恩無始終之篤春秋傳曰太平之君子樂道人之善夫禮讓之隆人相稱善此太平之風教化之美也昔魯哀公問孔子近世人君孰賢孔子對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之內無别而子以為賢何也孔子曰臣語其朝廷行事不論其私家之際也蓋聖人之是非如此斯可謂不成人之惡者矣臣切惟陛下勵精燭理以凝化朝廷推公存恕以求治執中在相位無交黨侃然正色匪躬之故干進好名者忌之當議論之際憎愛噂沓比而不周加之以惡名古志有之下凌則上替者積衰之漸不可長也臣今所論著執中事然皆實録乞更付中書看詳有所未安不妨改定免致降付本家刋立之後復招毁詆重貽執中之纍亦以上全陛下君臣之分下成國家風俗之和奏請修南京內殿門闕事臣早年嘗預史官竊見國書載真宗皇帝大中祥符七年車駕幸亳回次應天府制曰辰火名區梁臺舊址洪惟藝祖歷試是邦同豳土之始基應舂陵之王氣稽唐氏晉陽之制肇建新都追魏文譙邑之遊爰申美澤可升應天府為南京正殿以歸德為名是日御重熙頒慶樓即府署正門也觀酺慰賜父老别修聖祖殿號曰鴻慶宫奉安太祖太宗聖像因以衙城為大內尋降圖本修建宫殿門闕及諸名號皆已頒下天禧三年知府王曾奏南京內庭並未修建檢到元降圖子內有未銷修蓋位次相度減省下舍屋别具圖進呈時以旱蝗准朝㫖候豐熟日奏取指揮自後守臣久不檢舉景祐四年知府夏竦五年知府韓億又相次奏乞先修大內正門並內前正街祥輝門崇禮門並改作三門時以陜西軍興復准朝㫖候豐熟日奏取指揮自後守臣至今不曾檢㑹申奏臣近知本府以祥輝崇禮門頽敝已甚奏乞重修䝉朝㫖聽許即令修蓋相次了畢其重熙頒慶門見是兩門未改列郡之制樓觀卑陋仍復傾摧內城中惟有真宗皇帝御詩碑亭兩座外更無片瓦盡是榛蕪自先朝降制營都逮今四十餘年迄未興工陛下純孝格天丕承先制祖宗巡幸之地莫不存飾風迹以光遺烈矧興王舊壤大業所基久爾因循事屬廢闕欲乞朝廷檢㑹先朝所降指揮及王曾等擘畫事節特令指揮改修重熙頒慶正門依北京內門營造并創建歸德一殿及殿門四面行廊約不過百餘間即正殿規摹粗為完備比北京制度殊為儉省仍令三司就在京事材場事造材木地架了因回腳空船逐旋般載付本府差八作司人匠蓋造其餘合用椽箔磚瓦等物並令南京預支係省錢依實直市價收買應副量留本處廂軍三二百人充役如此則一不撓於民力復何繫於豐凶庶以尊藝祖受命之邦而奉真皇崇建之意比諸宫觀塔廟不急之役所全國體重矣論諸恩例除省府官事易曰何以聚人曰財故財者帝王所以御世保民蒸人所以宅生託命理道之最急者也故朝廷用三司使至于副介寮屬非士之選不處焉夫尊主其要卑治其目故其寮屬尤須擇人況聚師邊陲調用寖廣凡百事役倚財用而濟視如平日因循積弊貨力殫屈事豈勝言今三部判官及諸子司由門閥恩澤而進其居太半大臣去位或老而致仕輒陳乞子弟入省府以為例國之大計將以成天下之務者奈何以充恩澤之求也且父以老退子宜朝夕省侍解官就養於禮為宜因規寵榮又求要劇豈就養之意乎且大臣之家祿賜素厚若曰欲以祿養尤傷亷義凡諸門閥之士惟處京都為便既入省府即以為家寒素之人别無進望容身待闕俄復外除故三司者貴游處之即為家寒素處之即為傳舍而又諸清要官以為揚歷養資之地功利不舉職此之由且三司判官出為轉運使一道百城號令千里官吏之黜陟財賦之弛斂王澤之流壅民政之慘舒郡縣觀聽其風采朝廷倚辦乎外務提衆職之綱轄實方面之師表是又可以資恩澤之求者乎至如開封府推判贊理神州四方表則與三司相出入者也伏望明降敕㫖諸陳乞恩澤者不得除省府官其巳有陳乞恩命未行者伏望停寢務擇材能參用寒畯亦為官擇人之節也請議吏員事臣向在翰林充學士見本院天聖中具員兩制兩省官不及三十員今五十餘員近領御史中丞見本臺天聖中京朝官班簿不及二千員今二千七百餘員先領三班院見本院景祐中使臣不及四千員今六千餘員先判吏部流內銓亦曾取責在銓選人約計萬員以上以此審官三班流內銓並逆用一年半闕京朝官使臣選人罷任候差遣待闕比却到官或至三四年者自餘武班內臣料其數比舊必更倍多而又所養非所用所用非所養有一煩重之地輒便差除不得須旋擢人以充任使今邊陲之事稍寬交急而恩賞之典宜立中制若循前弊習而為常恐更數年轉成官濫欲乞今後中書樞密院所用兵興以來權宜條例悉從裁約巳還舊規治其本源用經逺體請裁減資任恩例臣竊聞近有恩㫖將來聖節自大卿監已上陳乞恩澤並令依舊者慶厯四年范仲淹奏定臣寮任子弟之制其間難行如國子監尚書省鎖試等事並已衝改只是恩例見行今自知雜御史以上何勤於國嵗任京官一員祖宗之時未有此事近嵗積纍僥幸為此弊法范仲淹新請略從裁損考之理道巳是過宜臣近曾具天聖景祐中及見今文武官員數進呈據今京官比景祐中巳多七百餘員經久之圖何以處置其臣寮恩例乞且依新制為便若朝廷議論惟是之從又不可以人廢言也請止中使傳宣諸司切聞近日中使傳宣諸司頗為煩數其至三司日或數次臣聞王言惟作命百官承式洪範五事言曰從從作乂故王者之言是謂號令令出惟行不行則權綱虧矣今夫屑屑冗微之事皆賤者之所親責在攸司各有程式發輸督促動煩宣下所司既被受其有不可奉行者又須稟復或却寢罷下成廢命上為損威習以為常恬弗知怪欲乞今後除有指揮中書樞密院事特降中使外自餘細務合下三司提舉司開封府等處者只乞傳宣中書樞密院劄下逐處有司或敢違慢自應合行勘責即事干急速不容留滯即乞宣付入內內侍省相度事體緩急須即施行者具録宣㫖報下所司所冀出納有章上下有體請立醫官定員臣按官品令尚藥奉御四員國朝故事翰林醫官院雖無定員然至奉御者率不過三數員而已今㸃勘本臺班簿醫官使副八員直醫官院七員尚藥奉御十二員合二十七員自餘醫官醫學祗候輩故不勝其冗且濫也按今奉御正五品下以其供奉至尊故得列於殿中省備六尚之職其雜科非供奉者不應名為奉御今自宫省嬪御至於宗室戚里內外臣寮奏薦醫官干求恩澤緣是而受奉御者不亦亂上下等威之分哉朝廷諸司百職率有常員惟此太醫制度未立其醫官院奉御以上至使副伏乞立定員數及遷授體例今後除供奉至尊或出特㫖遷賞外自餘並宜纍勞候闕轉補免令幸濫汩紊朝章論楊崇勳除致仕官舍人院繳納詞頭今月十四日本院當制中書送下詞頭一道左衛上將軍致仕楊崇勳授太子太保致仕前年契丹集兵幽州朝廷授崇勳使相判真定府總三路兵柄屬以邊防大事而崇勳縱其子宗誨干預州政多納豪人金為減免科率均之下户賊虐無告擅貸有罪及事發制捕按推崇勳匿其子不遣就吏郡縣迹逐既獲輒率奴卒篡取更陳章奏翻覆誣罔侮慢朝章無復顧憚天恩含貸止奪使相罷兵柄以上將軍就第於時物議無不憤嫉今雖經霈宥而致仕官非赦文所該猶無愧悔而更自陳典東宫一品非崇勳所宜處臣前在諫院備聞真定事嘗曾論列今又適當書命兼職領門下封駮其詞頭難以為辭謹封還中書乞别商量取㫖論許懷德遷除伏聞許懷德近除兩使留後言事官上章論奏者相繼其留後之命誠出非次緣許懷德自在邊城為將領素乏勞效比諸儕輩尤無材譽去嵗自防禦使改觀察使自殿前都虞候遷馬軍副都指揮使今者妄援體例僥幸陳乞隳紊軍制干撓朝章又聞李昭亮詣兩府叙陳頗駭物聽帥臣失和事體非便規萌杜漸盍有所處仍知續有傳宣應三路邊臣功重賞輕者令開坐聞奏自有事於西鄙覆軍殺將者數矣朝廷未嘗行法正刑一切容貸姑息而巳其論功行賞有濫無遺由此觀之蓋邊臣功輕而賞重者則有之功重而賞輕者莫之有也此命一下人人延首以待賞遍賞則無名偏賞則徒召怨而衆不服此乃因一懷德之濫遷更推而及於衆也若朝廷修明紀律振舉憲章其許懷德伏乞奪軍職處之環衛或除一郡則內外不戒自肅而軍政立矣即朝廷以成命新行疑於追奪則其續傳宣命乞寢不行猶庶幾防遏其泛濫也論責降御史監察御史裏行孫抗落裏行授太常博士知復州本官昨因奉使湖廣安撫奏請翻覆處事輕疏有章自劾故除是命切以荆南蠻冦騷擾郡縣殺害黎民為患七年未能平殄朝廷既移罷劉沆楊畋等欲新恩信以揚威靈故遣憲官寵綏逺俗且御史出使四方觀風為國重輕為人利害若其辱命理應深責按抗去年二月自太常博士通判耀州換監裏行到臺供職未及一年以奉使不稱却受本官知州於抗何損賞罰如此恐難勵下乞與責授一小處監臨庶激後人臨事知勉論王告除大理伏見敕差都官員外郎王告權大理少卿事切以大理寺評天下刑獄宜得寬平之吏以當其職王告為吏之迹專以苛深為能前任德州發官吏微過劾奏無虛月真天資刻薄人也國家自祖宗已來審慎用刑至陛下臨御哀矜庶獄急深故之罪寬縱出之罰天下懷皇家之仁最深厚者實以用法平恕未嘗濫一無辜近日所用法吏推擇稍易而舞文者頗出矣今又用告為大理必恐議刑文害損纍朝積德使四方化其慘急為上斂怨傷時善政伏乞聖慈特停此命别擇循良吏以為理官誠天下之福也論劉渙移郡臣聞滄州劉渙近因改斷軍人事為轉運司劾奏巳改知密州切以滄州河北重地劉渙周行常材器識驕輕志慮浮近方面之寄物論所薄今茲邊壘當精推擇渙雖謹亷自守克保無咎量才揆用猶須遷置移守髙密於體為宜然議者以為所改斷軍人情實凶悖所慮邊城守帥見渙移郡之事望風自沮怯於戢下威令不震又轉運司不體軍興之際寬假邊臣之權齪齪守文操急所部欲乞明降指揮下河北等路屯軍之處有似此軍人情狀凶狡者並令械送都部署司據情處分且使邊臣知劉渙移郡朝廷不特坐以專殺之罪抑由為方面而擇人也論王整改官新除河北同提典刑獄崇儀副使王整有㫖以其昨奉使北朝曾借洛苑使今授河北提刑慮北使過境訝其官名不同特與改此使額者伏以崇儀洛苑頗為超越北使之來提典刑獄不預賓主之事整雖在職使人豈知即恐以假官為嫌自應改授别路每嵗所遣使介例皆假官以行回而效整之為遂成真拜之例今政之大弊為多幸人塞其蹊隧猶不可遏若又啓之何以為政如整誠有是請原情深涉欺誣必朝廷懲沮纎邪修明法度不惟宜停恩㫖顧當下從吏議别行譴斥以戒為臣論席平推獄切見開封府取勘侍御史席平昨奉敕往濟州制勘宋易從不當事法寺檢斷席平失入人死罪據減外猶得徒一年䝉恩特放朝野聞之無不歎憤蓋以四方有寃獄朝廷特遣御史被制就按而乃殊昧公理陷人死罪朝論疑未審實遣官覆行推訊易從寃狀僅得明辨比來劾問平巳引狀理官斷上刑名明白忽蒙釋放何情可矜徒紊國家之紀綱尤損憲臺之風采益令羣吏慢於奉法且使天下有以窺時之尚姑息也其席平伏乞依法施行無俾忝於厥官亦足以警諸不職者論內臣奏廕子弟昨聞重定二省都知押班等著在閣門使之上物議雜起深以為非當時有司無人論執苟從其請既巳失之今又聞二省陳乞奏授子孫恩澤於見秩上更加一等此事若行不惟違越祖宗法度隳紊朝廷典章必致陛下有私近習之名大臣有阿親幸之醜內侍有恣橫之議諫官御史有隱默之尤且都知押班地處親近宜為朝廷愛惜事體動循軌度孜孜徇公如此僥求何以示外易曰履霜堅氷至言當戒其漸也漢唐之事臣嘗為陛下言之矣伏乞聖斷深賜察納其都知押班奏廕恩例伏乞一仍舊制陳州奏賦率數臣昨自二月二十二日赴任陳州本州自今春以來少雨日近甚有人户披訴旱災今勘㑹本州四縣合行催納夏稅苗子七萬七千五百石有零鹽錢一萬五千八百貫有零正稅屋稅預買和買紬絹三萬二百匹有零絲綿四萬九千有零兩又合行催納今年夏料青苗錢三萬七千七百貫有零又合催納今年夏料免役錢二萬三千五百貫有零又合催納去年倚閣青苗錢三萬六千一百貫有零又合催納去年秋料青苗斛㪷三萬九百石有零將來秋料諸色合納錢斛不在此數者切以本州四縣共計二萬九千七百有餘户今來只據夏料半年合納錢斛紬絹共計二十四萬五千七百貫匹石絲綿在外自去年秋已係災傷今春久旱二麥所收分數甚少除夏稅苗子錢見係人户披訴巳䝉特㫖體諒除放聖恩寬大民心感悅自餘紬絹絲綿久例常賦據數當行催納外其免役錢准新法諸災傷地分第四等以下人户應納役錢者如飢貧無以送納委本州縣保明申提舉司本司體量詣實於役錢數內量分數或全與免放今雖第三等以上人户猶多不濟之家其第四等以下户豈復更堪賦率伏望聖慈第四等以下人户免役錢别降恩㫖特與放免又去年秋及今年夏兩料青苗錢斛數目不少若令納錢民間錢實難得若令輸納斛㪷今又斛㪷價高上件兩料青苗錢斛伏乞並且倚閣候將來秋熟别定分數相兼催納所冀寬恤民力各得存濟貼黃今秋猶有下項錢斛合行催納秋稅斛㪷八萬六千五百石有零夏料免役錢二萬三千五百貫有零秋料青苗錢三萬一千七百貫有零共計十四萬一千七百貫石通計一年共三十八萬七千四百貫匹石陳州奏監司官多起刑獄臣伏以國朝自祖宗以至陛下積德纍仁慎用刑辟急深故之罪寬縱出之罰愛育下民若保赤子致其忠愛可謂至矣近年監司之官在所多起刑獄至於州郡常程公事方行推問未見情實或巳經檢斷事理明白於法平允偶其所見愛惡異同即别差官置司推覆事本微小張皇為大因緣騷擾株連枝蔓至有往還數千里勾追證佐盛暑嚴冬淹留牢禁其中甚有罪犯絶輕亦有無罪之人一身久繫家為破散瘐病饑寒愁痛無告及其結正亦有不移前案者推勘官承望其意巧文鍛錬雖是平人亦須以虛妄為坐以一州一路為率至於天下銜寃抱枉感傷和氣災害用生獄者人命所繫王者所當深慎者也豈容官吏依勢作威事既自外專行朝廷亦無由知得臣到陳州方此親見自二月末赴本任至四月中所司呈公事一件稱有兵士指論冒請糧米事係是去年十二月狀自後行遣㑹問回報始足遂於四月十二日送司理院方行取勘文案未具當月十九日有轉運判官張次山到州檢㸃取索一宗狀詞將帶前去尋别差官置院推勘四月末所差官到院至九月初方始結絶歷一百二十餘日前後所經禁繫近六十人往還三千餘里勾追照證炎暑之月係纍道路自夏涉秋其間病患相繼亦有軍員枉遭刑禁及至斷遣並止杖罪推院繳送到所取款狀二千一百三十一紙淨案六百七十張諸雜行遣照證文字三十五卷當時若自本州勘結不過十餘日可了其滋章為弊如此今又百姓樊宗望公事已經本州奏斷近轉運副使李南公到州㸃檢取索上件公案將帶前去又已差官令置院推勘臣竊詳樊宗望公事本州勘結頗巳詳允具案聞奏法寺定斷尋已准朝㫖斷放訖竊慮差官前來置院依前追擾淹延貧細之民饑寒失所欲乞特下法寺取索上件公案看詳委有情節不圓刑名差誤即乞别差官依公取勘施行緣此置獄之弊事干天下伏乞朝廷特降約束諸路非奉朝㫖所置推院令推勘官候結案日具録監司所送公事因由據到院出院月日但係勾追禁繫人數於在禁日有無病患死亡所追干繫人州縣程途近逺及斷放刑名開坐申中書送御史臺或法寺看詳事狀其有不當置院推鞫或淹延枝蔓枉繫無罪之人諸有非理伏乞議立條制頒下所冀上合聖朝慎用刑辟之意感召和氣以正治體乞量修南京舊內事臣伏以應天府王業所基開國之本自建為南京以府廨為內至于宫殿門闕各已立名其舊屋舍盡拆移修蓋為今府廨宫城之內鞠為場圃惟有門樓常經真宗皇帝登御賜名曰重熙頒慶之門依舊只是州衙舊門制度庳陋自後不曾營繕前後知府王曾夏竦韓億及臣纍曾奏乞量修一殿及門闕共蓋屋五十餘間即可粗立基構朝廷以為不急因循至今年嵗深逺門屋損壞每修葺時但添瓦箔其梁柱摧朽不復更堪薦拔重重撑拄處處傾漏又以先帝登御之所官司不敢擅行拆修伏乞朝廷特就將作監差官一員將帶作匠三兩人到本府檢計改作三門修建粗成門闕規制勘㑹本府見有昨開清汴河時自京般到松枋木二百三十八條長短不等准備河上修橋河既不成只使過三十一條充搭蓋土橋用外有二百餘條見在若收舊材相兼充使其於公私别無勞費或朝㫖不允只乞指射上項枋木量破官錢收買瓦箔等合用物料傭雇工匠於本城兵士內占留三十人供應役作只依舊門樓基址間架稍增髙濶作兩門修蓋亦且以安掛牌額遮掩荒榛乞滑州掃岸物料從三司支撥臣奉勑知滑州州城迫近大河境內堤掃不少近嵗水勢向著去年頗聞危急全借人力物料准備自來盡是京西轉運司應副今來本州既領屬畿內轉運使緩急河防之事畿內轉運司必難為抽撥兵士又無處計度物料申報往復慮致誤事伏乞應係本州所費掃岸物料今後直從三司支撥應付委自本案判官專切管勾其每年合差兵夫乞降敕下京西轉運司今後並依常年體例抽那赴州應役不得有所違滯若是本司減節兵夫人數致本州防河有所闕誤其本司官吏並與州縣同加罪責所兾公共免誤國家大事乞比試醫人事臣先判太常寺曾詳定本寺太醫署比試條式元條諸科醫人補充太醫署學生者聽讀方書習學醫道候及三年本寺奏乞差官考試藝業精熟入高等者具名聞奏送翰林院安排自慶厯四年創立此制差到尚藥奉御孫用和趙從古充醫師就武成王廟講說醫經及今十餘年嘗有一二百人聽習京城醫人緣此頗有通方書者考試之制竟不曽行其翰林院夤緣濫進實繁有徒伏以京師大衆所聚人命所繫醫藥最切醫工庸謬妄投湯藥誤傷人命豈可勝計伏望聖慈委樞密院申明太醫署前制每三年一次差官比試選擢髙業之人三數名與於翰林院安排則習醫之流必加激勸其醫師嵗月深者特與酬奬或加俸給人知朝廷留意各思勵精競效所長必有穎脫而出者亦足助聖心愛人之大端也乞免枷錮退背掃分物事人臣昨在滑州切見本州石堰州西天臺迎陽等四掃並係久逺退背掃分有逐界物料埸專副薛万等一十三人名係少缺芟草見行枷錮理納勘㑹逐年並是承例遞相據帳厯見在數目積垜去處交割到年深積腳或只指煤末堆垜即為界管係昨皇祐四年因官中㸃檢見缺只勒見主當人承認培填逐人家貧無可填納其所缺負委是前界登帶年深交割到損爛煤末即不是逐人侵欺盜用雖經赦書德音又緣文有拘礙致州司不敢除放兼檢㑹前知州薛紳并入內供奉官于文化等奏㸃檢得退背掃分不堪物料委實年深損爛盡是煤末不堪使用乞特與除破其時各奉敕命除放今薛万等所缺芟草伏望朝廷詳察特與依例除破及乞自今後應沿黃河州軍有退背掃分積壓下物料以至損爛不堪交割虛附帳籍者並令所屬州軍保明申轉運司於别州差官㸃檢或無侵欺並與逐旋除放責免積缺係帳枉枷鎖平人破蕩民業論並廢汴河劄子臣伏以太祖皇帝始造有宋蓋自宋受命而有天下故為建國之稱表於萬世真宗皇帝深惟祖宗功德乃升為應天府遂號南京又國家以火德王為得天統昔髙辛氏有子曰閼伯至於帝堯遷閼伯於商丘主辰辰大火也故辰為商星蓋商人因閼伯故國主祀辰星今宋實商地商丘在焉俗名曰閼伯臺古今著於祀典至於國家以盛德所主奉祀益謹其下有水淵未嘗涸宋人謂之商丘海蓋若有以厭火祥者地為建國之基祀為盛德之至二者於國家重矣昨朝廷差官創開河渠欲自京城以至泗河通江淮之漕為可以並廢汴渠其河由畿縣至南京城西北開鑿民田引而東南繞城為河兩重又濬商丘之址決其水所謂商丘海者幾為乾涸若其河渠之利害及諸役費臣不足論但以塹壞本朝建國之地凌犯大辰運厯之主於社稷之靈實為非便伏乞特遣左右親近可信之臣前去檢視所開河道如必不可以成功必不可以省汴渠之漕虛為役費作此無益願於前春興夫之時却行填塞依舊平為郊原商丘之淵更為疏導有經侵動處增築堅完使土復其本水返其原上安神靈以固基本候進止論免役錢劄子臣切惟天之生民以衣食為命聖人者作而司牧之乃立君臣貴賤等威之分以均節其數度而止其爭且亂故禮也者文飾此者也刑也者禁防此者也凡所謂仁義亷恥賞罰法令皆緣此而後立者也衣食不足其甚則至於父子兄弟相賊害何禮刑之有哉內無以保其社稷外無以制諸強敵國非其國矣故衣食者人事之確論非高談虛辭之可致也昔者聖人所以治民之道别其四業任之九職農夫效稼穡之力虞衡主山澤之利百工飭化八材商賈阜通貨賄各率所事以奉其上而上之所以取於民惟田及山澤關市此財用之所出也沿革損益雖歷代不同要之必本於此過是則非王制矣伏見近建賦役之法率令輸錢夫錢者人君之所操不與民共之者也人君以之權輕重而御人事制開塞以通政術稱物均施以平准萬貨故有國家者必親操其柄官自冶鑄民盜鑄者抵罪至死示不得共其利也夫錢者無益飢寒之實而足以致衣食之資是謂以無用而成有用人君通變之神術也本朝經國之制縣鄉版籍分户五等以兩稅輸穀帛以丁口供力役此所謂取於田者也金銀銅鐵鉛錫茶鹽香礬諸貨物則山海坑冶場監出焉此所謂取於山澤者也諸管𣙜征算斥賣百貨之利此所謂取於關市者也惟錢一物官自鼓鑄臣向者再總邦計見諸爐嵗課上下百萬緡天下嵗入茶鹽酒稅雜利僅五千萬緡公私流布日用而不息上自宗廟社稷百神之祀省御供奉官吏廪祿軍師乘馬征戍聘賜凡百用度斯焉取給出納大計備於此矣景德以前天下財利所入茶鹽酒稅嵗課一千五百餘萬緡太宗以是料兵閲馬平河東討拓跋歲有事于契丹真宗以是東封岱宗西祀汾睢南幸亳未嘗聞加賦於民而調度克集慶厯以後財利之入乃三倍於前朝而惟日不足何事功之異也舉是而言則本末之原有可得而究者矣陛下憫時政之積敝志在變而通之以財成天下之務故創法立制設青苗以賑乏絶建募傭以弛繇役所大措置事以十數要在崇德而廣業以惠養元元而巳臣官在守藩職在長民朝廷政令非敢出位而言至於民事利害以言職也夫民事之利害衆矣顧率錢之患獨切故敢具言其事自古田稅穀帛而巳今二稅之外諸色沿納其目曰陪錢地錢食鹽錢牛皮錢蒿錢鞋錢如此雜科之類大約出于五代之季急征橫斂因而著籍遂以為常今以一陳州言之州四縣合二萬九千七百有餘户夏秋二稅凡斛㪷一十五萬八千有零石正稅並和預買紬絹三萬有零匹絲綿四萬九千有零兩此常賦也復有鹽錢一萬五千八百有零貫并夏秋沿納錢雖緣敝法承實巳久然此諸色錢常例亦多用折納斛㪷不悉輸錢也大槩古今田制未有輸錢之法也今乃嵗支苖錢六萬七千餘貫計息錢一萬三千三百貫有零嵗納役錢四萬七千餘貫此乃常賦之外嵗輸實錢六萬餘千以陳之户口不敵諸州之一縣率是以准天下之所輸可見爾凡公私錢帛之發斂其則不逺百官羣吏三軍之俸給夏秋糴買穀帛坑冶場監本價此所以發之者也田廬正稅茶鹽酒稅此所以斂之者也民間貨布之豐寡視官錢所出之少多官錢出少民用已乏則是常賦之外錢將安出若曰募錢輸官還以募傭錢既出入非蓄聚也夫募錢者率之本民散於隋游市井自如南畝空矣窮鄉荒野下户細民冬至節臘荷薪芻入城市往來數十里得五七十錢買葱茹鹽醯老稚以為甘美平日何嘗識一錢臣聞諸路其間刻薄吏㸃閲民田廬舍牛具畜産桑棗雜木以定戶等乃至寒瘁小家農器舂磨鉎釜犬豕凡什物估千輸十倍萬倍百食土之毛者莫得免焉故天下之民皇皇無所措手足謂之錢荒吏厲鋒氣以刻削為功干賞蹈利而賞利從之此豈聖意之然耶必料天聰亦未之詳聞也陛下本欲以美利利天下至於施為見於行事非復聖意所存者矣陛下盛㫖一出執政奉行稍已增益至於有司苛細甚矣頒下諸路職司之官各出所見展轉文害本同而末異朝行而夕改郡縣承用以至不勝其敝且民田二稅水旱檢放自有常制青苖之息或遇災傷猶暫倚閣募役之錢年雖大殺不可免也豪猾乘民之急舉貸取息至或相因倍輸誠侵酷矣然不越穀帛民耕織之所有也州縣之役若身充若雇傭率三分其費而二分出於薪粒大鄉户衆一役代歸十餘年間安居無所預矣募法之行且三年初年民始大駭吏議法未一或納或否次年巳有伐桑棗賣田宅鬻牛畜今年稍荒歉處民流散多矣推此其可以經久者耶而乃恬弗為怪莫之改圖臣恐國家之憂不在四夷而見伏戎於莽矣伏惟陛下深思宗稷之重俯察下民之情申命大臣精議輸錢之法此大事也非取於髙談虛論苟而巳矣夫苟且者臣下之身謀逺慮者陛下家國之計愚而不可欺弱而不可勝者民也儻民情失於撫御大勢一有動危雖有智者恐無以善於後矣輸錢二事而募法之害尤重臣故勤勤先其重者今所開陳特舉大體其為害條目不可悉數也臣上荷聖恩至深至重自念衰疲不任陳力一旦先犬馬填溝壑沒有遺恨故求一對清光專為陳此愚懇少效補報粗寬愧負事聞天聽退就斧鉞臣所快也惟陛下留神省察候進止乞立皇子劄子臣聞王者大居正謂王者君國當先正其統本也三代逺矣漢唐之盛君即位太后太子多同時建立立太子不以長幼其緩者不過二三年不然則必有故史䇿具存矣本朝太祖開國知天命屬於太宗故不與子然以儲位寓於京尹太宗自京尹踐祚真宗自京尹登儲位仁宗未嘗出閣即登儲位先帝入纂天統尋登尊位尹京故事蓋未陛下即位及今九年受天之祜早有前星之慶正統大本謂宜時定上以尊宗廟下以係天下之心國之大事僭議罪也然陛下特以恩意留臣在朝愚慮所及敢有不盡故不避嚴憲輒陳忠悃候進止樂全集卷二十五
