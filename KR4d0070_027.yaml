body:
  text: 樂全集卷二十七宋張方平撰論事論汴河利害事臣竊惟今之京師古所謂陳留天下四衝八達之地者也非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐末朱溫受封于梁因而建都至于石晉割幽薊之地以入契丹遂與強敵共平原之利故五代爭奪戎狄內侵其患由乎畿甸無藩籬之限本根無所庇也祖宗受命規摹畢講不還周漢之舊而梁氏是因豈樂是而處之勢有所不獲巳者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立兵以食為命食以漕運為本漕運以河渠為主國家初浚河渠三道通京城漕運自後定立上供年額汴河斛斗六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運多是雜色粟豆但充口食馬料惠民河所運止給太康咸平尉氏等縣軍糧而已惟汴河所運一色粳米相兼小麥此乃太倉蓄積之實今仰食于官廩者不惟三軍至于京師士庶以億萬計大半待飽于軍稍之餘故國家于漕事至急至重京大也師衆也大衆所聚故謂之京師有食則京師可立汴河廢則大衆不可聚汴河之於京城乃是建國之本非可與區區溝洫水利同言也近嵗已罷廣濟河而惠民河斛斗不入太倉大衆之命惟汴河是賴近嵗陳説利害以汴河為議者多矣臣恐議者不巳屢作改更必致汴河日失其舊國家大計殊非小事惟陛下特回聖鑒深賜省察留神逺慮以固基本論新法臣蒙恩在朝備員經嵗無施補益每為深愧今被命守藩旦夕出國門適值陛下以垂象之變降御札發德音敕宰司率在廷之臣直言過失改修政事之未協于民者當陛下憂勞之際老臣不為陛下開一言則忠義之語無復至于天聽上負知眷殁有餘責敢以聞見少報重恩臣聞天尊地卑而君臣之分定君君臣臣而後國體正天下安故惟辟作福惟辟作威臣無有作福作威臣之有作福作威其害于而家凶于而國蓋為國之體猶權衡勢不可使有所偏重偏重之勢必成傾覆歷代成敗何不由此伏自近嵗以來災異之作率由隂侵於陽陛下天縱聰明前言往事無不洞鑒不待以説也今聖心所以答天戒責躬變禮可謂精誠之至謂天蓋髙其聽孔卑故不旋日而星變以隱感通昭答足以明皇天眷祐我有宋之意至矣陛下應之以實固當踐所言矣夫政事之未協于民者固有之矣大抵新法行已六年事之利害非一二可悉就中役法一事為天下害實深纍經更變竟無長策可以定其法議論日以紛擾公私日以勞敝夫人為天地之心天地之變人心實為之故和氣不應災害荐作蓋下令如流水之原取其順流之易也經六年而事功莫效故其事必有未協于民者矣法既未協事資必改若猶憚改人將不堪憂患一成噬臍安及陛下承六世之業上有二宫國家大事願陛下憂深而思逺寧忍于人情不可忍於社稷也憂患既成人臣各有去就之分家國之憂獨在聖人所以終日不離其輕重謂此也此臣所以為陛下痛心疾首一夕而九興也况今習俗奔競偷敝成風交黨相傾勢利相軋攻訐起於廟堂辨訟興於臺閣非所以昭聖化也毁譽移於好惡賞罪偏於愛憎非所以正王度也士大夫習尚如此有為國家死節仗義臨艱虞而不易其操者歟昔堯舜之為君選於衆舉十六官而與臯夔稷契昔治天下猶且明四目達四聰而後能協和萬邦雖大聖賢未有一人之心力而可以成天下之務也陛下臨御九年中外臣庶皆在照臨之下其間必有知忠義不二心之臣簡在聖衷者矣願陛下召之左右從容訪逮譬之金石叩之則鳴人各有心激之則發吉人之辭寡言人訥於言外若不足其中誠也利口捷給外若有餘其中偽也惟聖鑒精察之若夫導之以言而不能盡者使陳之簡牘必有所效者矣前代明君莫不以是考于下故能廣視聽于扶同之外究得失於幾微之先攬其權綱執其柄鐏慮所以藏身之固思所以置器於安此惟獨決于神斷而後可非所以謀于人者也夫事有失於前者不可不悔患有在於後者不可不懼如救焚溺勢不可緩緩則無及於救矣魚不可脫於淵國之利器不可以假人涓涓可以潰堤熒熒至於燎原釁端厲階不可忽也臣之心惟願國家之善政美事陛下之盛德鴻烈高越百王之上流光萬世之下天之福祥休嘉之象生而咎證之象不生民之愁歎怨嗟之聲不作而頌聲作使兆民樂事勸功尊君親上欣戴安樂臣退就田里以至瞑目泉下猶知懷此幸願也老臣無狀為陛下慮不敢不精為陛下言不敢不盡亦惟陛下察此至誠俯垂省納實天下幸甚候進止論募役臣伏覩見行役法天下共苦不便陛下天高聽卑必聞其利害切恐中外臣僚未有為國家深憂逺慮精言其本末者臣既以方拙上荷知眷今拜章乞致仕方俟命解謝念言重恩思有以補報而去故不避誅絶上此奏封極陳保邦便民之大計切務非徒詭激以抗髙論而已陛下至聖大明儻察臣言實有益於國家即乞發自清衷特下明詔停罷此法復行舊制之中有所未安稍為增損參定施行詔下之日四方萬姓若有匹夫匹婦不慰悅抃蹈上感德澤者則臣請受罔上迷國壞法亂紀之罪投放遐裔以正典刑若陛下猶謂臣言未足為信古者有大疑謀及卿士庶人協同而後有作即乞露布臣章俾在廷百辟以至諸路郡縣官吏共得盡其公議二者惟在陛下發於神斷以定天下是非若但送之中書詢之執政無益也則乞留中不下非惟有以保全孤臣抑以致忠義之言以廣四聰之達不勝為國憂慮區區之心惟聖明諒察所有劄子具别封進論高麗使人相見儀式事臣近見江淮發運司牒報高麗國進奉使人已到明州見赴闕前來次檢會先録到樞密院劄子降下儀式一卷看詳內一項所至京府州軍知州通判出城迎接管設飢送儀式伏見契丹國信使過北京只是通判攝少尹接送今髙麗係外蕃其進奉使人乃陪臣也宣徽使班秩同見任兩府出城接送禮更重於契丹非所以崇國體示威靈也前次過南京雖已曽行新儀其時知府係兩省官今來接送管設相見儀式伏乞朝廷特行再定頒下以憑遵守施行請防禁髙麗三節人事臣切聞髙麗國進奉使人下三節人頗有契丹潛雜其間經過州縣任便出入街市買賣公人百姓祇應交通殊無檢察所至輒問城邑山川程途地里官員户口至乃圖畫標題意要將還本國自明州至京水路三千餘里昨淮浙飢疫公私凋耗國之虛實豈宜使蕃夷細知自諸邊關一人入界謂之細作捉搦甚嚴今契丹之人與高麗相參遂至京輦中外動靜何事不聞漏泄國情深為不便伏乞中旨且立條制下引伴使臣令多將帶小心得力人緣路監防略比契丹夏州人使體例無令得與公私諸色人交關雜語外若示之禮待實以察其姦諜機事不密猶致患害況於蠻夷豈得不加拘束請詳定盜賊條法事臣竊聞山東河北頗有盜賊羣行劫掠至或三數十人為火乘騎鞍馬被甲操兵器多是傷害變主驅鹵民人遇捕盜官吏軍兵弓手即行鬭敵殺人放火恣為凶暴若更因之以飢饉嘯聚脅從切慮日益猖熾漸煩誅討舊制防禁盜賊之法鄉村即有耆長壯丁弓手州縣即有廂虞候鎮將所由軍巡人立限捕捉若縣鄉有強惡賊徒不時收送即州郡遣職員將校監督巡檢縣尉捕逐而又設賞購之科召人告捕故賊可敗獲近制廢罷耆長壯丁而使保甲捕賊不許立限科較但令衆共量出罰錢鄉户得力弓手往往放遣而雇募浮浪不逞之民以充弓手州縣鄉虞候鎮將所由巡防人等竊盜但令量行罰贖強劫盜第一限亦許贖銅其應科決者又許以别獲人數比折放免州縣將校職員舊得力人多已放罷見充役人亦不許别作差使惟告捕一科為禁防之助則有凶猾之人依憑法令已被拘執就禁輒自引服即從案問欲舉之法減死流二等便從徒罪定斷雖用配法乃有未至配所已復逃亡其告發之人憂懼讐報罕有敢告捕者以此盜賊公行稍見充斥使諸巡檢縣尉實難以施其力本府近日強竊盜賊比往前為多然尚於京東一路未曾有羣盜入境諸州則皆有矣臣深思殄冦之意動為法制拘礙亦無以設方略及檢會嘉祐以前編敕諸逃配軍作賊别作條目立法加重新編敕刪去此條諸盜賊計贓定罪新敕復為增加贓錢數目而法減從輕臣聞法令之設所以除姦去惡安養良民未有以容姦長惡為法也夫盜賊者國之蠧蝎不可長也熒熒不滅至于燎原涓涓不塞至于潰堤前代未有不由盜賊而肇亂者也伏望聖神照察特降宸旨命取新舊禁捕盜賊律令别行詳定自州縣長吏應係捕盜官吏兵級精立賞罰條格頒行以禁止凶暴安保萬民即今國家之深計重事論諸路州軍關報邊事臣竊聞安南九軍發離雍州已多日又頗聞一行士馬多染瘴疫頃來邊防事機不至周密中國動靜敵國輒知昨三月末間單州公文連到廣西關報交賊事所經歷州軍甚多始至本府臣尋時收留止住不行竊料似此諸州展轉關報若至三路即吏民騰口事入敵國伏望特行戒約嶺南荆湖江南等路職司使嚴切指揮所部州軍應行軍事宜不得妄行傳報更相扇動樞機不密實損國威其單州公文謹封進納樂全集卷二十七
