body:
  text: 樂全集卷三宋張方平撰律詩初春遊李太尉宅東池蓬島靈仙宅星河帝女家波光泛金翠樓影動雲霞清淺遊魚過參差垂柳斜移舟更尋勝逺見小桃花題代祠部書院代淵蜀人天聖二年登上第歸鄉不仕書院在青城山上第西歸即棄官此人趣味亦堪憐風波常自廟堂起雲壑不隨朝市遷野叟饋漿羞客氣山僧投拂悟塵緣青城山下空堂在留入華陽續舊編登泰山太平頂區區魯國爭蝸角矗矗齊城磔蝟毛萬壑相傾知地險浮雲忽散覺天高蒼煙自古埋塵世紅日中宵破海濤七十二君迷舊迹空教秦漢侈心勞題樂全堂莊子云樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣樂全得意自莊書靜閲流光樂有餘四句幻泡明般若一篇力命信沖虛心間自覺浮雲薄才拙誠知與世疏只此空名漫兒戲何王城闕不丘墟逍遙堂真樂不違俗紅塵自滿城捲簾寒日暖高枕暑風清世纍離憂患天和得性情五時依約合多謝白雲生李少傅佚老亭得謝自廊廟事髙疏仲翁安車雖駟馬歸路已冥鴻令子承良冶朱轓治左馮緇衣方改造列鼎有餘豐屨杖居多適軒裳夢覺空天倪希柱史性理問能公窗檻開瀟灑風煙接鬱蔥上方思賈誼即奉小輿東彭門城上見鄉人社會懷古南北分疆域此城當要津幻泡興廢速蠻觸戰爭頻世換山河舊時平井邑新喧喧村社散多是白頭人彭門公庭古檜為風雨所摧杳杳參天氣亭亭構厦材千年對霜雪一夕折風雷枕靜踈聲減庭寬翠影開梧桐與楊柳嬌色倚樓臺暮秋登彭祖樓徐州危樓古城角山色繞蒼蒼寒日下何速清風來甚長煙塵思戰國雲水似江鄉重九登髙近階前菊巳香經逺樓下六篇皆秦州公署共一樓耳中夏聖人調律呂八荒異國入圖書從容德讓唐虞逺馳騁戰爭秦漢餘不道鼓旗無勇將須知俎豆有真儒功臣騎虎凶而國常向氷淵審廟謨邽翠樓一川墟宇暮煙中樓堞籠山氣象雄北路荒原戎子國古邽戎之地東坡斷塹隗囂宫馬來洮海蕃城近涼州漢西海郡今洮河首領唃厮囉所居鶴去遼天越洞空山有越溪洞耆舊傳言洞口有詩云越溪道士人不識上天下天鶴一隻洞門深鎖玉忩寒滴露研硃點周易因此為越溪洞三十六程勞極目隴雲猶在故關東睢陽至秦三十六程道齋瓊籤隱訣舊曾尋共祕還金妙旨深會向本源分造化即拋塵劫出來今含生皆是坎離氣復會自知天地心幻事徒勞聊一笑他時雲壑有知音禪齋昔年曾見琅邪老惠覺智先為説楞伽最上乘頓悟紅爐一點雪忽驚暗室百千燈便超十地猶塵影更透三關轉葛藤不住無為方自在打除都盡即南能涼軒樓下涼軒六月涼風窗一枕傲羲皇壽山雲影浮空近羅谷泉聲繞砌長迥覺風塵非此世不須雪月更交光最宜羽客冰霜骨共引瑤巵沆瀣漿精思閣仙術初修自性情本除陰濁養陽明三田窈窈通虛白一路層層徹太清寂不動中方見道思無邪處好存誠君如欲到逍遙國須自還元第一程涼軒秋意南嶺雲嵐開曉霽北窗松竹度涼颸間欹碧簟石琴薦靜味丹經金鑰匙夢幻泡中何得失雀蚊虻處苦喧卑更令薰祓澄心閣客自三峰到有期華下郭誠思去秋到秦寓於府署澄心閣今秋復約西來秦州即事邊清羽書息事簡使君慵地僻俗客少日長春睡濃平安三路火秦州烽火候自沿邊三路而來昏曉兩山鐘南山北山皆有鐘戍滿歸心動先隨渭水東秦州後園春宴贈部署劉几閣使几深曉音律柳暗三眠困花繁二月香秦州後園有二月花開最早繁艷甚盛絶有清香情懷當酒盡興味為春長疊鼓漁陽節清謳北里粧階前樂無誤席上有周郎秦州晚宴即席示諸賔僚秦川節物似西川二月風光已不寒猶去清明三候逺忽驚爛漫一春殘香隨芳樹頻移席晴愛遙山久憑欄却憶京華勝遊處常為暮景促歸鞍隴西郡麥積山有獻白鹿者潔如霜雪馴養逾年放歸舊山十二韻地得金方正山藏靈物珍月宫遺玉兔仙仗失霜麟乳竇氷泉冷晴原露草春清風生澗壑高格對松筠久臥常存息凝思若養神煙崖一蹭蹬華館久埃塵我意本雲水無心愛珮紳平生厭俗客待爾當嘉賔蕭灑襟情逺虛恬氣韻真檜軒同鶴靜竹渚伴鷗馴龜智霑驪血犧純被繡巾放歸舊林麓好去避虞人題松江曹生學舍江邊無限地君舍劣容蝸急鼓田家社踈鐘野寺齋執經多卉服牽葑待荆叉秋雨鱸魚美時應釣蘚崖金陵府署池上草堂東方千騎忝藩侯情味都如寓一丘客氣盡將還野馬機心聊自試沙鷗時憑靜几隨飛蝶強拂危冠笑沐猴只向公齋得嘉遁何須逺逐赤松遊送屐韓仲文江南到梅暑蒸濕鮮晴明聊倣登山樣無妨涉水行齒牢防易折蠟滑亦加輕早幸還吾土間將挂後楹夢中吟神歸自何處記此夢中吟道為無心合人因省語深此兩句夢中作窗燈寒影薄庭月曉光沈悟境真泡幻迷情妄古今秋夕聽彈五絃琴古風久已壞今夕聞遺聲恍若忘身世怡然通性情緬懷有虞氏曠想三代英此時知此意青天秋月明李太尉園池魏國獻穆大長公主子驃騎子侯第長門大主園煙波二宫賜仁宗初章獻皇太后稱二宫賜主宅東池廣池榭宸翰四朝恩四朝所賜御札刋石在第禪客常搖拂先都尉好延禪僧名流必解軒朝之名勝必集君第春風與秋月好景不空樽城南林園避暑示道友不必山林逺且離朝市喧前軒好風月高客共琴樽在所同浮世何須憶故園八瓊還返事聊更話根源函谷關沛公弔伐軍戲下百二曽無藩楗牢天險固非一姓有孫謀寧在兩崤髙懸崖通棧遙連蜀絶巘橫空勢走褒幾見狂圖矜四塞泥丸封處竟徒勞遊琅邪山寺一徑過蕭森幽提此獨尋俗遊殊不意僧話粗寬心役役真何了空空究竟深塵勞何日脫來伴逺公吟火車同郭誠思作火車雙輪駕九虬出海直上崑崙丘經天三百六十度匝日一萬四千周電破重陰霹靂過風開霽色煙雲收乾關坤軸極排轢勢闌却返無為洲初秋即事久雨新晴後秋風初起時天倪一清曠精爽入希夷壁上吳生畫床頭杜老詩平常性酷愛對眼忽如遺冬過豪貴故園有感蕭蕭霜草曉風秋憶是當年最勝遊車馬自隨寒日急管絃肯入野雲幽流渠水斷魚何往髙樹陰踈鳥不留為問主人曽到否自家池館待誰修辛未清明感事二十四年流水東早為名誤逐飛蓬事隨過鳥去無迹愁似濁醪傾更濃好是把花歌北榭更休提劒哭西風壯心鬱鬱身牢落幾見中林鶴髮翁秋夜禁直朝著紫宸殿直廬金馬門楞伽百八句柱下五千言何處求花藏忘機即漆園涼宵萬籟寂明月在前軒再入禁林即事重到金坡二十春慶厯六年自學士出領郡逮今正二十年間思出處一傷神略行大地山川遍歷升杭秦益徐鄆等十郡府再覩青天日月新感昭陵也踈籟豈知諧律吕散材無意入轅輪何時却出都門去靜掩巖扉老此身兩浙張兵部秋日牡丹詩次韻霜天慘淡過重九忽見幽芳發故叢多愛清香對亭檻不堪踈葉下梧桐他年仙去空華表此夜魂歸尚漢宫過眼須為無色觀返童疑有內丹功寫題更愧詩情淺折帶應冝醉臉紅須為重重張翠帟可憐羸怯不禁風病眼飛花無復數遇物輒成雙書畫踈幽閣屏幃戀北窗懶開辭俗客寫望憶秋江椒菊供朝餌猶須發酒缸江樓遲客靜外遊神迥望中塵物稀天連逺水盡鳥背夕陽飛木葉初搖落鄉懷動式微興闌不忍去遲子一舠歸夜意羣動已沈響蛩吟時一聲露寒仙掌重月午庾樓清慷慨聞雞舞悲涼感笛情幾多塵役者夙駕待鐘行夜蟲庭户間扄月草根寒帶霜時方感搖落爾更助悲涼漏版敲孤館燈青背曲房向晨轉哀急幾斷旅人腸風琴露華月色淡軒庭風過時同衆籟鳴誰挂機心在絃索有絃寧更有全聲寓興代舍悲彈鋏夷門默抱關風雲未時會意氣與身間劒為屠龍礪弓須待虎彎君看緯蕭子一旦探珠還題葛驛李校書壁八十不扶杖看書夜每深自言非服藥無事可關心景為詩曾愛花因醉尚簮去城無一舍路若隔飛沈蟬紅樹依依古驛西一聲長是報秋期新晴忽見橫飛過落晚最傷孤嘯時陰激英雄增感憤潛催節物至蕭衰草根蟋蟀霜前鴈共與愁人染鬢絲柳吳體翠眉含愁展新葉長袖善舞拖舊條黃鶯初囀一何喜紅桃相映不勝嬌行人歇馬近驛路漁叟繫舟臨溪橋斜風細雨與殘照不妨意氣常飄飄雲無端聚散千形出本是輕清一氣浮終古光陰寧變壞四時景象自遷流寶華馥郁周三界綵仗氤氳過十洲逺望非煙籠鳯闕近觀如穗起龍湫餘霞映日晴相照素練橫空晚未收迥漢歸槎遙泛泛碧天孤鶴靜悠悠驚禽逸獸情無待陳馬風檣勢莫留泗水高歌增感慨陽臺殘夢作間愁斷虹落照江城暮淡月踈星禁省秋過嶺時隨樵叟去傍溪聊伴野僧遊久陰泱漭重重積忽霽飄零片片幽待物方行嗟滯影乘波妄觸笑虛舟仙家五色隨鸞駕海面千尋立蜃樓雪意低濃傷旅館歲朝黃潤喜農疇初微觸石才膚寸曾不崇朝遍九州生施功成讓雷雨無心却返舊山頭蝶遲景融融暖氣浮中園曲密小庭幽春風故引顛狂甚芳樹相容爛漫遊不分風流輸楚女懶將身世問莊周有時潛見多情處每遇王孫盡日留螢土潤正溽暑幽庭熠耀飛陳荄未全脫生氣一何微風急光不滅月明景共稀蠨蛸與蟋蟀時節伴依依歸燕社後日猶暖雨前春尚寒乘時衆來易無伴獨留難京洛柳花白瀟湘楓葉丹堪傷季秋雀風急海漫漫柳雨細池塘靜風斜院落深蝶飛隨亂絮鶯囀入濃陰翠帶堪紉佩金絲可度針願依菩薩手不上美人簮七里瀨古有桐君住漢時嚴子來山橫疑路盡溪轉若天開塵世不相接海潮從此回維舟上層巘戀戀白雲堆驚秋示三茅山人陳谷晚來枕簟涼杖屨望平野疾風卷浮雲黃葉如雨下奈此急景何忽過如奔馬九丹功未成幽恨將誰寫清明連上已治平丙午三月四日清明踏青原上飲祓禊水邊歌佳節相連好遊人一倍多齊魯道中望睢陽有念重疊荒山滿四圍征鞍繫劒背斜暉遙知梁國白雲下此際吾親獨倚扉對酒醉裏翻身天地窄愁來天地不容身可憐澤畔行吟客爭似壚邊高臥人赴益部途中此下二十六首赴益州路中作中臺分虎節全蜀領龜城山色二千里水聲三十程煙村深谷火雲棧半空鈴野館無鐘漏猿吟曉月明行次岐山坤維五十郡麾節忝師垣緩轡猶秦甸前驅已劒門儻來增客氣重寄愧君恩昨夜岐山夢三歸修竹園過灞橋長安道上作漢牒熟當披舊迹灞橋今忽過征鞍前朝宫殿煙蕪逺四望河山古木寒自古功名應邂逅大家岐路妄汍瀾興亡甚費生靈血只得髙人夢幻看青泥嶺斗峻凌霄出混茫東西秦蜀此分疆縈紆斷澗千尋曲回合危巒萬疊蒼煙外孤村通鳥徑雲間盤道繞羊腸朝家方面非輕寄何事徘徊望故鄉華州西溪西溪殊近郭少華更當軒竹徑通華表松庭接紺園過長安至岐山作髙原極望秦川闊危棧橫空蜀道長多謝終南山色好迢迢相送過岐陽過張真人洞兩當驛西亂竹谷口張果真人所隱處谷口巑岏獅子山洞門髙掩白雲間自慙末裔無仙骨名利途中鬢已斑籌筆驛本規一舉定乾坤遽見長星墜壘門公在必無生仲達師昭何業得中原雨中登籌筆驛後懷古亭山寒雨急曉冥冥更躡蒼崖上驛亭深秀林巒都不見白雲堆裏亂峯青興州長舉縣西二十里閣道立表曰飛石閣告往來者急度勿停豫赴益部興州將吏來迎皆至長舉因訪老吏飛石之狀云昔嘗有之亦飄風暴雨之時也豫望山頂皆巳墾耕而行人熟虛名至是皆馳過因成一絶蜀道循山多險巇行人獨此策征羈人情多為虛名怯鶴唳風聲走老氐劒門關地維絶脈摧鼇足天壘橫霄壯井輿誰軋禍萌通鳥道古來風土感魚鳬壺中日月鄰方外海內山河入帝圖過此益知方面重萬兵開府一寒儒華山雲臺觀題希夷先生陳摶影堂林壑雲深接玉泉松齋閉息輒經年一無標致惟隨俗别有真機在指玄詔板嘗延清暑殿詩筒時到華陽川蛻形雖在張超谷粟粒珠中自在天相國杜公舊里錢唐有别墅在華下公既得謝留寓睢陽因家焉某近赴益部過三峯聞華人之望公捨而不還又顧吾鄉之獨幸國老處焉因道西人之意成長句四韻奉寄杜公謀國有勞新史在挂車無第舊鄉遙睢陽圖記光耆彥華下風煙遂寂寥紫氣尚勞關吏思甘棠猶播陜民謡蓮花峯下仙人掌髙出雲端若奉招上亭驛在劍州武連縣西四十里傳云唐明皇西幸到此雨中聞鈴聲感懷命伶人寫之樂府名雨淋鈴雨中駐蹕此聞鈴當日梨園寫此聲忽忽悲心自多感鈴聲何事愴人情散水巖潄玉亭在嘉川驛西水從峯頂迸落三節而緣崖為瀑布入澗合于江髙從雲際落崔嵬疑決銀潢一𣲖來散漫難收珠網綻琤瑽不斷玉山摧尋源誰到煙霞路稅駕聊傾沆瀣杯向暮危亭上燈火水精簾下燭房開泥溪驛嘉陵江到水瓜園水勢東回入浪川前過劍門山路穩免尋閣道上雲巔杜鵑過興州入青陽峽即多杜鵑當冬月不聞此鳥聲蜀人云杜鵑飲春水即啼靜夜曉月更凄切入秋即無聲蜀道寒輕水木清峽中無復杜鵑聲歸期正是春風暖任向空山呌月明過嘉川驛嘉陵江上嘉川峽古木雲蘿千萬峯閣道緣山巳經月縈回未出畫屏中飛仙嶺閣蒼崖老樹雲蘿合絶澗驚湍閣路高羽駕飇輪殊惚恍依程緩轡未為勞亂石溪武興郡西飛仙嶺迸流而下亂石峥嶸散粟堆飛湍奔㵼萬山開轟空急若雷車過振壑傾疑地軸摧銀漢勢從天際落雲濤聲破海門來迸泉疊巘平生愛欲轉巖隈首重回魚關詩青泥驛西二十里危巒疊嶂曰魚關山小亭臨嘉陵江江有石闑水從石罅迸流魚不可過故以為名春夏水大沒石魚行無礙矣中流石埭隱如磓音堆五嶽舞而相追鼓鬛徜徉此復回春水漸深沿泳快為傳尺素錦江來青陽峽竒峰疊巘無重數橫澗飛泉會一溪老樹藤蘿從古長寒空雲靄與天迷幽中應有神仙住深處唯聞猿鳥啼野性舊多山水癖恨無心賞此相攜藥水巖詩武興長舉縣東十里藥水亭下官道三四里亂石崢嶸流泉迸激峻嶺十四盤而至石洞懸乳三皆徑圍二三尺下有石臼容可四五斗石泉尋乳下滴臼中溢而流入嘉陵江洞外有大石砥平云仙人鍊藥臺也俗傳此泉飲者愈宿痾豫過而步遊焉水雪千巖松風萬壑﨑嶇僅能至不通騎也因留長句時甲午十月二十三日靈泉一𣲖蜀江通源出蒼崖古洞中乳滴雲根苔臼滿藥成仙竈石臺空瓊纓珠絡千巖霤瑶瑟琅簫萬壑風杯勺巳欣清病骨刀圭敢望變衰容宿龍門洞在三泉縣西即古葭萌路到葭萌古道邊層崖疊磴入蒼煙忽逢方丈在平地何意中途過洞天四面濃嵐圍碧嶂半空急雨迸飛泉一宵身世離塵境却撫征驂懶下鞭嶓冢漢江之源所出蜀道金牛驛西七里有嶓冢神祠山勢岥坻水源甚微經祠前西南緣山曲折至興元之西縣諸山澗相合漸大而為漢江因思頃年泝漢嘗值風波之險遂留題一絶江漢朝宗入海長嘗蒙起浪卷輕航金牛西路經嶓冢却見微源此濫觴過汧河岐南一舍過長汧路近陳倉始入山三十三程橋棧外平川始下鹿頭關采真堂贈郭誠思香車曉駕九花虬笳管聲中到十洲太一元君傳密命許君長住八瓊樓聞蛩慘淡霜風月色寒愁人無寐坐間軒别聽一部凄涼曲幾種秋蟲咽草根探春妙句江春入舊年江梅長向臘中殘梁園地冷春來晚試劈垂楊舊眼看天寒風裂幽窗水澤堅寒郊空迥淡無煙何因得向桃源去景氣長如二月天慧聚寺東亭野色秋光共泬寥水村籬落晚煙交拄笻回就下山路行看斜陽隱樹梢縣齋懷京都東南古縣介江臯西北神州倚斗杓安得葉君傳祕術時飛雙舄詣臺朝曉景樹帶曉霜寒矗矗山含宿靄逺重重誰家收得汾陽筆八幅羅浮晦景濃郭忠恕有畫羅浮山陰晦景圖世稱神絶春郊攜樽縱步尋芳墅聊藉芊芊手把紅行樂豈關間客事少侯長日占春風夢後索索幽蟲急曉風玉繩西下露華濃逺鐘驚覺窗燈暗依舊江山一萬重書吳興僧興公院壁僧久不出院我愛霅溪風景間年年魚鳥伴湖山利名人到心猶靜况是老僧長閉關耳鳴一陽初獨嘯兩耳遂雙鳴寒谷踈鐘逺霜空衆籟清千鈴行險倦萬鼓戰酣聲瀑落山頭峻濤翻海面平風檣開大浪曉角動嚴城隴首悲涼意蘇門曠逸情鳯簫雲外過龍笛月中橫細轉繅車急微搖扤櫓輕衰殘傷老態馳徇厭時榮處世希蒙叟觀身愧淨名神明思內守豪蕩悔平生素問方家本巢源導引精早年曽有客奇術可還嬰何日開金鼎靈丹見八瓊蟬密槐遮急雨踈柳帶斜陽緱嶺餘音逺蘇門清嘯長附冠金翼薄橫鬢玉叉光高潔自天稟寧同蜂蝶狂題李先生隱居金丹一指自崆洞便控飛輪駕赤龍况是曽居小有洞先生舊隱王屋更應不住易遷宫易遷宫初得道者處焉紫文寶訣三元祕皇象靈符二景通却恨勞生聞道晚九還未就已衰翁芭蕉李都尉宅金淵閣分題得淵字吳僧新寄逺寄江城外新栽水閣前虛心勞可尚幻質定非堅佛經云是身不堅如芭蕉扇薄搖涼殿杯深泛綺筵忽疑鸞鳯過翠影落金淵赴新定過七里瀨舟過嚴陵瀨涼秋水木清鼓旗知郭近魚鳥見人驚雲亂迷山色灘長雜雨聲一毫名利事搔首愧平生挽辭仁宗皇帝挽辭三首享國承熙盛斯民老太平無私均覆載大德共生成陰騭無留迹神功不可名曰仁歸禰廟時夏繹清明臨御自初終恭勤一日同慈心夷夏等誠意地天通垂拱成文治安和即武功含生遊壽域四十二年中謨訓垂寬大基圗得顯承新宫開玉鎖舊册閲金縢龍駕歸虛極鸞旗建大升平生懷孝慕遊仗展三陵英宗皇帝挽辭五首不問大橫兆天人心是真謳歌早歸舜氣志自如神正合乾坤體明開日月輪孜孜朝昃意克已為生民舊學多聞富咨周聽德聰乾元純用九豐日正宜中治迹傳英烈神明遡閬風平居修五事洪範在潛宫八月初涼後千年此去長朝廷留事典户牖想容光濯景遊霄極乘雲返帝鄉春秋大居正天統付元良遣奠宣哀册嚴行按字圖橋山仙去逺渭水月遊初儉制遵遺訓方中列舊書龍輴三十里笳鼓節聲徐瀍東五陵陌嵩下萬安原風水通佳氣靈祇護至尊國容回吉仗像物闢神門清廟標英德流光萬古存神宗皇帝挽辭五首并引臣伏以大行皇帝山陵有日哀纒萬國昊天罔極中外羣臣多進挽辭臣早忝近班受恩深重今聞靈駕發引在近老退田廬無由得伸號慕自勉荒陋謹著挽辭五首隨狀上進羲軒前載逺虞夏信書傳比德皆尊大惟皇克繼先五陵同厚地兩曜出高天制作流方策憂勤十九年經綸成盛業震耀烜威神粹氣同乾健含生自化醇無文皆受職重譯競來賔東觀成書日方知百度新經始開三殿晨昏奉二宫承顔專致樂教孝遂移風訪對朝曦昃程書夜漏終艱難思稼穡意在紀元中睿智由天縱規摹繼祖貽有為皆社稷無逸著屏帷傳令通湟狹賡歌及島夷時髦俱入彀流美辟雍詩廣大天同量淵深海共澄遽聞憑玉几恨不瘞金繩同軌陪儀仗因山鎖闕庭深恩淪朽骨孤夢繞新陵溫成皇后挽辭二首何事高前烈忘身衛至尊平生彤管在憂國玉刀存一惠彰柔德深衷憶善言凄涼金殿月還照給孤園美化成麟趾勤心念兔罝廞衣薦翬翟靈仗咽簫笳香海歸華藏晴霄散綵霞春風青瑣閉侍女泣宫花故相贈侍中廣平公挽辭三首風采來塵外才名入洛初清言還正始雅度合沖虛玉氣千尋直金精百鍊餘雍容到巖廟一世共華胥不與椿齡逺先傷棣蕚零宸章懷舊德惠節入新銘後世推名教當朝重典刑東維跨箕尾一化本同靈謨明餘論在記博近書傳得謝三司重歸休五福全國門回鹵簿嵩麓望松阡天下中庸法寧惟伯始賢故端明殿學士工部尚書致仕清源王公挽辭二首臺閣留風論藩垣著治功時皆推舊德心自信孤忠驥騁常疲險鵬摶不遇風晚年探妙理頓看世緣空世德承槐蔭朝評許棟材都堂陪八座近府阻三階燕閣清宵閉佳城白日開南阡有一去冠蓋不重回故兵部侍郎致仕安定公挽辭三首晶粹分天婺深長自帝虞義聲髙北海政事達夷吾歷職小司冦退身賢大夫獨嗟造化手不得鼓洪爐經濟期成務康寧遽引年人知三事貴我愛二疏賢金石名儒刻弓裘孝子傳國書循吏傳誰在老成先湖暖春波闊山晴宿霧開空觀素車過不復畫船來柳外悲簫度松間送騎回鄭人懷子産行灑有餘哀樂全集卷三
