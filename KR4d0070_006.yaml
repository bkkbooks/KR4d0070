body:
  text: 樂全集卷六宋張方平撰芻蕘論政體論臣嘗讀漢書至鼂錯之事惟錯謀䇿宏遠達於權義有致主經世之志戮於姦讒之口而史氏不能褒發其忠更譏以變古易常之說臣竊憤厲反覆較錯凡所辨議悉國家危事亂經將以圖安建治皆合霸王之軌不可不正遷之謬譏嘗試論之古不可變耶則是三代無革敝救失之理而漢所用法當循亡秦也忠恭之異尚質文之殊用禮不相襲樂不相沿固三王之罪矣用寬大革苛慘固髙祖之過矣夫以文景之世追視漢初之政沿革既多豈錯先嘗變易哉稽遷㫖意則是顚而弗扶危而弗持興亡倚天成敗推數括囊結舌浮沈容身者為智矣此乃夫子深鄙以為焉用彼相可為具臣者也故論者稱遷是非謬於聖人其斯誠矣益使後人務苟且而惡立事貴因循而重改作沮有心之鋭為無功之辭其於教義不重虧歟臣嘗論之夫為邦之道有制有權制為之本權為之勢節之以禮行之以信齊之以刑斷之以義此不可易之法故為之制長則縈之短則引之重則損之輕則益之此不可常之理故為之權其不可易者不為艱危急卒而變之其不可常者不為安寧平泰而慢之其本正雖危必安其勢傾雖治必亂然人之大情危必思安治必忘亂均乎二者處權為難非通才達義適時知變者孰能與於此乎易曰變則通通則久故樂而不亂復而不厭之謂道夫事遠必弊法久必衰原其始初各有云設時遷俗易迹在理非聖人執權盍即回革使天下之耳目常新萬務之本源必正彼立法垂制不在人君乎言為典型動為律度苟無愆於大義寧一取乎舊章在商中宗嚴恭寅畏天命自度治民祗懼不敢荒寧在周宣王聿求賢臣憂勤戒愼以振絶緒嘉靖庶邦並建中興之業夫豈悉履湯武之迹哉在漢孝武引拔俊乂文藝隆起武功震耀雄材大略為漢盛主又豈咸踐文景之教哉且事苟便俗豈憚乎解絃而更張政苟戾時何固乎守株而求滯故夫不知達權推變之理而牽易常循舊之說者是拘生腐儒按文泥俗凝塞治道此聖智之所常患者也臣敢旁採世務僅若小敝者列之以禆萬分焉立政之本在信命令臣聞制天下之動者主乎一齊天下之衆者存乎信王言惟作命百官承式兆民從乂其難其愼惟新厥德天下至大也兆庶至衆也民心至動也萬務至煩也統之有宗㑹之有元使衆而不惑繁而不亂非信何以一之故曰德惟一動罔不吉德二三動罔不凶天何言哉四時行焉萬物育焉惟其信之謂也故王者居上以制下宅中而圖大慮善而動非禮勿言動則可法法必可以繼言則可行行必可以復賞罰政命紀律條貫惟事事乃其有備非信何以成之傅說曰惟口起羞言教令輕發所以召亂帝舜曰惟口出好興戎謂王者之言天下善惡所繫也故凡為人上自一話一言罔不戒慎一動一靜罔不寅畏又况設為法制布於四方之大者歟書曰慎乃出令令出惟行弗惟反故命令者國之綱紀政之隄防綱紀一弛則萬目隨解隄防一傾則橫流莫制故令必信則上得其正下安其事令不信則吏侮乎法民慢其禁弊雖微於安靜之初害必大於急虞之際且匹庶而無信衆必棄之士而無信友必疏之卿大夫而無信家必敗王者而失信天下必危故人可以去食而無信不立三軍可以奪帥而非信不行為國之本為政之經信為大也比見朝廷詔令或尋即遷改或久而自廢吏易之而奉行不固民忽之而苟慢多違揆大體而論之此損政之深者蓋國家切於求理急於聽受一人唱之即行一人沮之即止本末故為枘鑿前後自相矛楯是使民無所措手足而多犯于有司者也臣伏願自今凡諸臣有請創端釐舊事干大政必集議而後行於下多方必一定而無變略其毛細簡其苛蕪勿以辨言亂舊經勿以小忠害大德無稽之言勿聽弗詢之謀勿庸俾萬姓咸曰大哉王言又曰一哉王心自然民協于中四方風動疇敢復慢孰不悅從嗚呼弗慮胡獲弗為胡成慎厥初圖有終惟明明后邦其永孚于休政理之要在廣言路臣聞趨利違害去危圖安者世之大情遺身徇時忘家存國者人之難事故夫從容於舒逸眷戀乎富貴泥乎情之樂者舉世而是感激乎忠義顧重乎名節處乎事之難者絶世而希哲后興王深惟此理故開懷接納勤心率勵無言不受擇善而從竒策遠猷必加酬賞犯顔忤意曲為矜容愚淺者固在恕中疏誕者姑置度外如鑑之照各盡其衆形如衡之平無爽乎一物揔羣智以為智因衆心而為心通其情僞分其邪正而君人之道舉矣伊尹曰匹夫匹婦弗獲自盡人主罔與成厥功盤庚曰無敢伏小人之攸針此則詢于芻蕘下及庶賤者也況於士民乎況於卿大夫乎臣聞之屋漏在上知之在下政事有闕必訪旁議詩曰惟彼二國其政不獲惟此四國爰究爰度晉文聽輿人之誦克興霸功子産採鄉校之謗卒成善政衆所善者我則行之衆所惡者我則改之政以無瑕事以合義是為國者之藥石為政者之凖量也譬之庶人治一家之政其里人邑子有見其田萊不闢家事不修則勉之以敦業厚生勸功利用之說見其羞服玩用不中禮起居出入不以時則誡之以制節謹度周身嗇用之善居常則勵之以孝悌和睦之美緩急則展之以救賙分勞之助者是必其族姻親愛意在相厚者也其有語焉不以義游焉不以時間誘其子弟使不循於法離諜其僕妾使不親其上是必素嘗仇恨或挾姦伺便有所利之者也彼為一家之長者將孰悅焉是必悅其相厚者謂有益其家也是必怨其仇而利之者謂有損其家也今為天下乃不然忠良而相厚者翻以為怨讒邪而利之者翻以為悅是固不若庶人之治一家能審損益之正矣嗚呼歷代之昏君暴主不能自入於道德之門者可知之矣由其臣有利之者歟歷代之亂臣賊子不能自立於忠孝之路者可知之矣由其主有召之者歟故君臣之誠不盡則天下之患必生理之然矣臣竊惟陛下體乾剛之德奮震耀之斷奬拔孤介聽納下議帝堯之詢於衆大禹之不自矜成湯之從諌弗咈文王之徽柔懿恭道兼前王光被四表小臣愚鄙安足以識聖德之大者然嘗覽載籍頗識理亂之道見乎英睿之君忠正之臣恭寅戒慎咨嗟相戒莫不以博采下言周知衆情而興治德驕佚之主姦利之下阿諛順欲牽合迎意莫不以壅遏忠直漸取衰敝而至危亂故深願陛下揭日月之明無幽蔀而不照廣江海之度無涓流而不納秕稗不以近俗而見棄葑菲不以下體而不採招來讜論以廣聽德音漢魏相白去尚書副封以防壅蔽而宣帝得以知萬機之微為漢明主唐太宗躬勤政理明於聼受著司門式云其無門籍人有論奏者皆令監門司馬引對不許關礙又制大臣入論事輒令諫官同入或對問之言有虧理道隨即諍之此唐文帝致太平之本也臣聞人之才有通塞識有淺深諍而合義自為深益諍或非當第可置之故春秋傳曰文公逆祀去者三人定公順祀叛者五人去者謂三諫不從去之以禮此諫而是者也叛者謂諫不合道去不以義此諫而非者也是故臣之論事容有當否在人主明擇其善可從而從若乃闢忌諱之門斷謇諤之路公為蔽拒之意以沮忠義之心臣雖甚愚竊所不取伏願陛下覽成湯盤庚之令典考漢宣唐文之善制務進有心之士時聞造膝之對益為寬大配洪覆於上穹不自聰明託視聽於四逺以通天下之志以成天下之務則七世之廟傳裕於無疆蒸民之生率同於慶賴矣姑息之賞臣聞惟名與器君之重柄信賞必罰國之大經故以德詔爵度材居位計勞賦祿量罪議刑百王之通制也二典三謨五誥衆誓春秋一王之法周官六典之訓功懋懋賞其義同歸故車服以庸二帝所以褒德衣裳在笥有商所以禮賢爰及成周具存彜制寰內卿士甸外侯伯則有九儀之命以異尊卑之數八柄之法以馭豫奪之權其好賜匪頒之式蓋所以將宴喜之厚意非尊寵大臣者也昔者周公輔成王致太平既營洛宅社于新邑庶邦冢君駿奔咸覲召公欲因大㑹顯周公之功乃出取幣入以王命錫之才束帛爾則知聖人尚德貴禮不黷貨利訓天下以恭儉而已及王室衰亂戰國紛擾兵拏禍結務相吞勝競為賞法以激用命故秦設武功爵二十級以授戰士齊立賜金之令魏行給復之制以首爭首而享苴茅連從約衡至取封君干賞蹈利遂以成俗乃至楚漢歷世之王各乘間釁互行窺圖得之為英傑失之為姦叛莫不威之以斧鉞寵之以軒冕是猶鬻販買賣之道劫質誘略之術豈先王尊教化褒功德法天秩而制禮之意歟至於唐氏天寶幽陵之亂建中奉天之逼而爵賞刑罰窮矣財賦不足以頒賚而職官之賞行焉職官不足以補授而檢試之號立焉吏胥輿皂假春坊憲署之秩卒旅冗校僣三公八座之稱彜章蕩然官紀大紊五代相蹂亂靡有定詬濡姑息務相加厚姦臣驕將磨牙擇肉指帑藏為外府視藩嶽為别第人君之御國如燕巢幕上固無暇剗深固之弊迹立宏逺之規摹也伏惟我有宋之集靈命而宅天極也經綸屯昧削平亂略丕冒無外緝熙光明故歷世之相轥轢所以為我而驅除苟衆政之有因循固宜鑑彼而創艾臣竊見賞典之謬姑息之軌猶有存焉疑朝廷俟議者之所發也善乎前賢之論爵賞也以為立國之道惟義與權誘人之方惟名與利名近虛而於教為重利近實而於德為輕凡所以裁是非立法制者則存乎其義至於參虛實揣重輕消息盈虛使人不倦者則存乎其權專實利不濟之以虛則耗匱而物力不給專虛名不副之以實則誕漫而人情不趨故國家之制賞典錫賚財賦秩廩所以裁實也差號品異章服所以飾虛也秩之載於甲令者有職事官焉有散官焉有勳官焉有爵號焉其宰務而受俸者以序才能以位賢德此所謂施實利而寓之虛名者也其勳散爵號大抵止於服色資廕而已以馭崇貴以甄功勞此所謂假虛名而佐其實利者也虛實交相養故人不黷賞輕重互相制故國不廢權彼夫胥吏臺輿部曲卒校雖執簡曳綬而無貴異之實假名虛號而無揔攝之柄罪不足以論贖徭不足以庇復於下則在無喪無得之際於國則有虧名害義之深是故損上之虛益下之實固權收利政之大方子曰必也正名乎夫豈惟名之不正而已哉固有理之重者臣請備言焉自天下乂寧四鄙不聳人安其業逾三十年是國家全盛之時公私豐餘之日而帑廪乏兼年之積閭巷有半菽之民得非由為費也廣故為斂也重乎以是觀之設不幸遐陬有蜂蟻之擾連境有水旱之沴邊徼有立功之衆郡縣有施勞之人虛名先盡於無事之初實利不足於有為之際臨危而畫發機已晚矣且兵驕將惰無甚於今未嘗竭股肱扞患難而號列功臣未嘗識亭障出營壘而賞盈私囊作法於治敝猶不救治而無法何救艱難方今可謂乘治作法之期是宜悉去五代姑息之失而乃虛實之用已竭權義之制未立此臣輒用感憤者也臣聞衆之去就視乎君心事之重輕繫於國制重之則衆斯慕輕之則人必略故明主之為國譬猶執權衡謂其可以輕重乎天下之事制衆之去就也慎惜之斯重矣泛用之斯輕矣今虛名之在人可謂泛而輕者授之既不以為寵罷之固不足為怨而乃不加意慎惜作法貴重謀所以為佐實利而用者子曰民可使由之不可使知之管子曰密事端則上神自古明君良臣講議道理未有不以輕重消息之術為政者也若其守一定之制昧通久之變過時失㑹後徒噬臍乃以動衆為虞易常為戒若是而能通天下之志成天下之務者臣不敢知也恩貸之罰臣聞洪範三德平康正直言用正直之德以治平康之世也蓋剛柔並用威惠相濟之謂正直剛而不柔則非綏懷之道惠而罔威則成姑息之弊且子産有寬猛之說而謂寬則使民易犯不若猛以為政荀卿有輕重之論而謂輕則令人無畏不若重之近理夫子産仁人荀卿正士其言刑法乃後寬而尚猛是重而非輕彼豈樂苛慘而貴殺伐哉誠審乎治法之宜爾也書曰威克厥愛允濟愛克厥威允罔功何謂平世主尊臣卑本重末輕朝無權强士無僞行民篤其業食節用時樂事勸功尊君親上風俗敦厲禮義興行綱紀文章修整淳重此之謂平世其有不及此者未得謂之平也且夫以一國之法譬一身之治平則致養疾必攻焉安佚舒泰而不以時發伸宣導則必有壅滯虛實之疾生焉發伸宣導既失其節疾焉而不時攻延屬於腠理浸淫乎血脉而又怠於針尉煎劑之救滋入乎膏肓則雖扁鵲之技雅無施矣然初由恃乎安佚舒泰故也故刑罰者因循之藥石保息者承平之粱肉已平而用刑罰是以藥石致養因循而復保息是以粱肉攻疾也臣實愚憃不達理要竊揆時政屬纍盛之世治用中典德化醇醲仁澤深厚民頗流靡事或恩貸其尤著者罰用於下而不用於上賞行於上而不行於下若不整厲銜策箝勒鞬輈則且和鑾失節僨突敗御矣昔舜因天討有四罪之誅湯制官刑著十愆之誡周官八議具議貴之辟蓋謂請讞于王禮曰刑不上大夫蓋謂不虧傷其體皆非謂不入罰科也故內則有放奪殺刺之典外則有絀爵削地眚伐之制漢氏之法則有免罷謫徙完舂輸作之令是故爵位者天下之砥石先王所以厲世磨鈍賢則處之不賢則避之才則用之罪則罰之自古馭臣之通制也古者位重則憂大祿厚則責深今也位重則無憂祿厚則免責故臣曰罰用於下而不用於上賞行於上而不行於下也臣伏願陛下英威發斷髙明深燭鑒前王之治軌訪良臣之忠議更立大訓裁其過幸賞苟在功不以疏近而殊賞罰誠有罪不以尊卑而異罰如此則國典正於上官制立於下貽範永世見英主革敝立制之明焉謹論樂全集卷六
