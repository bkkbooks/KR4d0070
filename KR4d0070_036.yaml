body:
  text: 樂全集巻三十六宋張方平撰神道碑故推誠保徳宣忠亮節崇仁協恭守正翊戴功臣開府儀同三司守太尉致仕上柱國許國公食邑一萬八千四百户食實封七千六百户贈太師中書令諡文靖吕公神道碑銘并序皇宋受命光宅天下唯上帝顧保世賚良弼在太宗朝有若吕文穆公䝉正率循大卞乂寜王家克左右亂四方以底綏大業聖上纉服有若元宰太尉許公寅亮一徳謨明修輔答揚祖宗之猷訓以緝熈於光明此所以持盈保成重雍累洽隆無疆之基者也公諱夷簡字坦夫文穆公之從子太嶽之後流光源深大王父夢竒唐兵部侍郎北京副留守以文穆貴追贈太師王父龜祥以殿省丞守夀春有善政沒因家焉考䝉亨嘗舉進士禮部奏名處髙等方從兄執政嫌不就廷試後選集吏部銓得引對太皇頋判銓王旦曰某佳士奈何以䝉正故抑之旦曰此其文學政事有過人者即授光禄寺丞改丞大理無禄早世公登台司追錫命三代並至開府儀同三司中書令兼尚書令封齊祁魏三國咸平三年章聖始御便座閲郡國貢士公以進士擢第解褐絳州推官再調鹽城監判官將漕以幹局聞就遷大理丞𣙜定鹽筴度署西溪大儲放利㑹詔舉六科以才識兼茂試政事堂屬將封泰山或言非訪闕政時因例報罷出倅通濠材譽日洽章聖識其名濵城並河水羨溢為害冦萊公鎮魏請擇守於朝上諭宰司而以公行到郡循隄防究民利病平繇省賦拯諸墊昏暇日閲征簿見田鎛之筭曰先儒有言王道本於農此何名哉表請除之朝廷推其法天下自是農器無征太尉王文正當國深器重公時王沂公曽在西掖文正嘗從容問沂公頗知吕濵州乎曰聞名舊矣太尉曰他日成天下之務者斯人也君善交之後公竟與沂公同當鈞軸徙兩浙提㸃刑獄時緣瑞符繕靈宫上所嚴嚮貴權督作外希風㫖趨副期㑹役徒斬材或殞林壑吏輒以亡命聞而囚其孥公具條白採伐為緩栰木浮河調夫挽送方冬水涸暴宿河埭公請一切散遣須春流畨兵更還陛覲面承慰奬擢刑部員外郎知御史臺雜事賜五品服數治詔獄聽訟事閲實明辯當比平恕天禧旱蝗祅民驚譁屢奏讜言指陳變咎公之論事婉而正辯而裁通而易從不崇空語以干浮譽故人主樂於聽受嘗臨諭曰卿言朕自主勉毋悼害復因占對稱㫖特寵金艾近姻除中丞換起居舍人領通進銀臺封駮從官小㑹必䝉特召後亦不得以為例也每上前目送注意殊渥内史缺丞相進名而不及公帝曰吕某固宜此選公適持金絮使臨湟命虛貟以待復節除兵部員外郎知制誥俄授刑部郎中龍圗閣直學士知開封府都邑務劇尹正才難擊斷者雜中善良循恕者并容姦蠧公之為理雅得其術威而不猛寛而無犯機芒不施區槖自破治政清淨府庭肅然逮今言尹京之政公為吏師今上莅阼優除右諫議大夫永定甫竁内璫徙筮山辭連冢司詔公馳驛覆視初陵既復同軌如期朝廷曰能遂以給事中參知政事自章聖愆豫希見大臣翼室宅宗房闥助治二府機政稍復壅閡公時判禮儀事請親户牖之聽以分帷帟之重柅絶矯漏用周幾㣲綴衣移御即請罷天書儀衞納靈文方中闇然日章其慮逺矣祏主登祔章獻慕徃本室器服欲如事生公執禮文竟循舊典東朝叅决抗尊當宁裁蕝儀物無溢等數事規諸萌務全王體進貳六職歴小宗伯小司徒毗賛七年遂正宰席領景靈宫使集賢殿大學士一心百慮知無不為推選名儒増設講貟敷經上前𨗳以典學每奏事之間輒引經史稱古昔以諭哲惠日新發於啟迪玉清災議止繕營因表謝宫使加吏部侍郎昭文館大學士監修國史登冠三階公自叅貳兼掌國䇿合三朝之載以緒成大典至是史成凡預筆削率被遷賞公前事確譲特䝉褒許乆之拜中書侍郎兼兵部尚書復辭都兵章懿之即逺也獻后俾為菆塗且毋變朝夕公請㐮事如禮司天探㫖撓以拘忌獻后遣謁者挾日官使公裁公執大義不可奪卒制服發哭考吉日備宫仗𦵏近原以究恤典禁籞春宴獻后命無廢㑹公固啓而罷翬幄顓威龍徳務晦懿不待養弗言而毁得伸情禮繄公將順且念輔臨之乆而虞倖密之間規中造膝事為之慎自此至尊舉息皆章惠躬涖簡用剛鋭任之言責協規交警俾􅋏后心欽承二宫周旋十年内無隙言外無異慮孝慈篤至固由上聖之姿佐佑彌縫抑自嘉猷之助天聖保定公實勤止禁城火領使庀作落成進右僕射兼門下侍郎時二駕復新宫肆大眚恩覃内外特疇公勞而加異數公請均同列懇譲不拜止以吏部尚書兼鸞臺獻后登遐上念章惠擁翼之勤褒上崇名著之遺札公以漸不可長亟白刋誥止奉保慶之册以掲大明之照時王路方正乾剛獨運攄發健粹始初清明公手疏七條以端治本杜宣授止中畫斷側門之貢絶刋章之弊天下聞聴廓焉更新永底蒸民之生則惟我后之徳衮司十稔深懐抑畏頓首上前祈避重位制授武勝軍節度使同中書門下平章事判陳州將行燕見願得上三年計帝曰行矣半嵗其還相余公之在朝也則聖人之心易然而無天下之憂公之不在於朝也則聖人之心慊然若無與屬其天下至於朝議塗説咸企公歸如期而召復冠鈞衡修明治方綜覈名實自左右常任準人牧夫俊乂在官本於訓迪光天之下至於蠻貊之邦但見巍巍之尊如天之覆美利所及日用不知惟景祐之平康則燮諧之績用若乃並侑三后著不祧之式以顯揚文武之烈崇建中壼尊順成之體以嚴對宗廟之重其糾睦公族也則官之環尹以别庶姓朂之講學以納軌善其章叙庶工也則陞之類舉以合公論集之朝邸以嚴班制伸理誣枉若冦忠愍之比悉及昭恤紹續功舊如潘武惠而下咸加甄叙此又賛㐮餘論推廣徳澤一二大較也若其沃心話言極深研幾慎密不出莫悉聞已景祐二年拜右僕射冬至上享帝於陽丘封申國公三年表六上納政手札譬止次春復五上天子重違沖㫖命以鎮安軍節度使檢校太師同平章事判許州在許二年而夏戎叛公聞之曰嘻鶵羽翼成是必颺去吾恐謀國者慮害不深事失機先必致朝廷旰食已而如公言卒至繹擾天下被其勞故徙公鎮魏固河朔心公比當衡每籌邊奏揣敵動静效如在目及此過覲手詔問策公備陳西北守禦利害朝議賴以適從至魏浚城洫除器備審佼壯籍蒐補其缺畨休訓肄聲懾戎境大河之北長城岌然康定元年五月復召輔政悉仍舊秩騎冦犯塞赤嚢日至公慮屯戍之乆生佗盜心於是始議營北都城鎮寜以謹北門之閉募民兵増州防以重庶邦之守三邊守宰悉從擇遣俾綏凋敝諸府禆校間為召見使知感歎夜思而得旦請而行已而北人來渝平山東饑多盜備預有素恃而無虞冬郊改封許國公特拜司空堅謝得允上惟文武之柄付倚在公倘計議不齊則事功難集下制兼判樞密院事公以二府之舊相均為重啓辭判緫止兼使名上體愛人之心密講和戎之畫數下恩㫖切勅邊吏内保疆場遏其侵軼外推信義示之綏懐意在我守有餘賊勢自殆而後可與惟新矣後諸路防禦益嚴夏人通款納誓訖如公䇿慶厯二年季冬甲寅夙興將朝遂感風眩上憫公勞瘁至忘其身詔除司空平章軍國重事聽三五日一入累牘遜免朝機邊畫就第咨訪勅就開寳浮圗設道㑹祝公延夀御府出萬金藥上剪髭和七以賜至有移疾朕躬之諭遂再辭位中㫖斷表三年三月召見延和殿俾騎及殿扉以不良行顧内侍輿以前固辭更給扶命無拜面謝衰篤慈衷惻然册拜司徒猶監史閣軍國大事尋致軍國之議頻表請老乃以太尉致仕朝朔望班等丞相使璫密札軫問無虚月公世𦵏鄭原既得謝如鄭展墓郡以疾聞詔使馳餉藥奩而已不及春秋六十六薨問至輔臣方奏事上哭發聲謂左右曰乃心國家而任大事如吕某者可復得乎病不就訣歿不臨酹吾恨何既哉感悼不已為制服苑中哭之甚哀不視朝三日贈太師中書令禮官考行諡曰文靖比𦵏内密四致奠賻賜累千𦵏日復廢朝有以見大君元臣感通契㑹同徳一體恩榮始終之極致者矣其配秦國夫人扶風馬氏太子少保忠肅公亮之女婦體順而正母道慈以嚴公在許昌夫人以歿及鄭展墓也且將𦵏夫人卜有日矣而公薨即以慶厯四年十一月壬申祔於新鄭陪先兆君子以為知命七子公綽兵部貟外郎史館修撰公弼度支員外郎三司鹽鐵判官公著公孺並太常博士操行器識儒學吏用維其似之必復大顕公餗贈右賛善大夫餘早夭二女長適司封郎中雍文正公子也次不育公性莊重有儀矩望之毅然而姿宇渾厚即之温如而神采英發才全道周用無常器踐歴臺閣綢繆廊廟一話一言莫不留為故事有猷有為莫不著為令典不潔名不矜勞敢任天下之怨不敢有天下之徳至於風郡國建學校以廣教育之本循貢舉張六科以大招延之路志在得士為邦家基推賢援能彚征於朝有自常參同時宰延人物藻鍳賞别精裁其品題初若未盡者巳而果然善合羣慮考用衆長樂道人善而忘嫌惡雖待微者若亡貴賤之間以延盡下情其接僚友周而不比寛而有辨其事上直而無怫順而能守其殿邦撫民條教明使人便安而下不敢犯其在朝位若不勝其恭者退而燕居恂恂如也與季氏宗簡尤為友愛休暇相對談名理之蹟不及公家之事而又敏學多聞精識强記殚簡册而備究經耳目者不忘屬辭雄贍長於理道朝廷典册多出公手至於文史之學名法之書當世所行率公考正非夫命世之禀生人之傑安能徳言並立功名兼劭如此其章烜也宗簡惟古之君子論譔其前人之美以明著於後世禮之大者故推諸孤之志舉烝彛景鐘之義以請於上有命史臣俾敷揚其休烈康許公抑所以表其子孫也銘曰天監有宋世祚明徳能哲而惠以熈衮職考慎厥相用康保民式克欽承相惟其人其人維何文武許公實經大猷股肱王躬帝視公視帝聴公聴有翼有為訏謨賦命恭黙未言弼諧二尊如權如衡如箎如塤嚮明專治啟發健粹秉國之平遵王之義百揆四岳庶政惟和六府三事九功可歌于蕃許昌孰尸鼎鉉以速冦戎丕艱廟筭公體慈㫖請寛叛刑勅邊謹守戎卒來庭三冠泰階再擁方鉞忠勞則多恩禮亦絶曰師曰公名器之隆於申於許山川之封二十三年盡瘁王室納政於上請老以佚臨雍未拜熒圃言歸古有知命公乎庶幾訃奏來聞上哭之慟盖隠家邦摧此隆棟爰命史臣纂揚丕績陵谷有遷音徽無斁大宋故推誠保徳崇仁守正翊戴功臣開府儀同三司太子太傅致仕上柱國隴西郡開國公食邑八千一百户食實封二千四百户贈司空侍中諡文定李公神道碑銘并序慶厯七年冬十一月壬子元老太子太傅致仕隴西公薨於京師有司以聞上惟先帝察公忠厚任大節而屬之以政傅導儲邸顧託之意甚重又惟公徳義之益弼亮之勤隠恫之深為廢朝遣内司賔臨奠於位賜恤異於他公故事襚以司空侍中章紱太常凖功行易名文定越庚午㡛帷就引内使典䘮以返濮上越明年閏正月丙午𦵏我文定公於鄄城縣之鄧侯鄉越三月申命史臣譔揚休烈表之神隧盖恩禮始終備巳按牒公諱迪字復古先世自趙徙燕大王父在欽以武材仕范陽軍逮唐季之難渡河樂濮之風土營家老焉遂徙名數為衞人以公貴贈太師王父令泃有知略初粤人間湖湘之亂盜取郴連周保權歸朝公為桂陽監使建䇿復二州逮潘尹弔伐師竞道連以絶嶺俘劉鋹終庫部員外郎三司户部判官贈太師中書令考䕶明經術名法以御史推直使案蜀獄歸節因言陜部多留繫連逮糾紛太皇為遣傳理出之召對苑中問蜀故中意賜朱紱終國子博士知徳州贈太師尚書令蔡國公曽王妣潘氏王妣楊氏白氏妣邊氏繼母劉氏追封魯韓燕陳魏五國太夫人公學通古今深博有大度初從河東栁先生游每覧公文章未嘗不稱善語門人張景髙弁曰復古乎輔相器也且陶冶生輩矣賔興至都士皆目屬之禮部奏公第居下及廷對天子擢居第一召見容止嚴重姿表甚偉釋褐除將作監丞通判徐州兖州召試翰林遷著作郎直史館入謝加緋魚尋充鹽鐵判官屬議東巡命二輔臣聫判泰寜經置封事以公貳之公始倅兖嘗言萊蕪冶廢不鼓第繇民輸鐵課凡髙貲家率以冶敗至沒入田産械繫孤婺請罷冶賦大農張空簿計文不改公議格及是慤為魯人請勒封肆眚竟命除之稍遷右司諌徙知鄆州召糾都獄改右史江淮饑甚朝廷憂之授公安撫使俾以便宜從事公到部督吏課徹徭賦通闗市散利已責賑廪勸分勞徠安集所以救荒之術甚設雖窮鄉知上恩意之及故年雖大殺民罔蕩析牢無縲縶野無敓􅔯復命遷宰士簉銅鹽錫服三品未幾擢掌誥命車駕祠瀨鄉陞亳為集慶軍以公領州事譙境䝉幸復除公為均節其嘗預調役者加優焉故禮成旋蹕譙民忘勞郡介京東西淮甸之交逋慝之衢地有盜乆横或晝操仗入城邑陳蔡潁夀皆警縣鄉蒐閲至出庫甲捕擊乆之公謝還禁兵緩追罷購盜益自寛㣲得其區槖隂簡驍士農商服而匿諸䝉館盜相翔稍集掩格殱焉為正封圻疏溝瀆屢見善祥而嵗大穣代歸章聖以治亳之政勞勉乆之公頓首謝㑹邈川犯秦隴邊遽相及召對長春殿上曰雍闗中根柢卿有方面才吾蘄君重鎮撫之即以諫議大夫集賢院學士知永興軍府陛辭上慰諭且召君無慊行也尋除本道都轉運使詔赴秦庭按邊馳度隴行諸屯拊循吏士諜離種豪以解羌謀繕築堡障守杜要害因與曹瑋圗上方略未幾果召還禁林充學士特䝉眷禮上欲時見公俾領審刑每奏決讞輒見止訪以機政嘗出沐内璫亟召對於側門語及洮戎曰吾屬曹瑋秦州謂足辦緩急比緣羌變須濟師師未出請上郡章殆難以持重君其為吾謀帥公徐對曰騎冦剽悍略從諸小種勢甚張即入塞而秦州嬰城以守何以攝戎狄戰則兵不足瑋所以數告也瑋沈勇有謀威信著扞邊擒敵無易瑋者時方議崇上帝徽號上意難於出車黙然公曰陛下嘉與海内臣庻行稀闊禮豈惡祠兵西郊乎上前席曰然則奈何公曰臣頃巡陜右凡伍符庫仗有細札小方今在芾帯遂探以進西兵在掌上閲之嘉歎指筆牘授公具疏諸戍卒乘度留防守之偹命樞府悉發㑹秦塞下顧謂公曰今日復見頗牧在吾禁中矣師僅集告敵入境上召問公瑋必克乎公曰克哉何以言之公曰兵法善戰者致人不致於人羌數揚輕瑋言欲以怒瑋為誘兵鈔秦鄙故見羸以致我羌雖知情得不勝其貪忿而卒自致此為在瑋彀中者克之必矣居數日中貴人馳召公對於龍圗閣上迎謂公曰曹瑋大敗洮冦來獻戎㨗公何料之審也三都振旅羌以破壊故訖今三十年懾不敢動寳元中夏戎飽飛西陲驛騷而汧隴晏如闗輔賴以為安實章聖納公逺筞而公任瑋之材折衝帷幄惠綏來世惟幾也故能成天下之務其功利溥哉天禧初旱蝗仍饑縣官經費不贍上坐内閣召公入語從容以三司所上計簿屬公畨閲問財利何以取濟公曰放於利而為政導民抏敝非王度也盖祖宗營内帑以備師旅凶札今羌狄欵懐邊亡大費出帑物以祋嵗振百姓之急盛徳之舉也上曰善盍以故事貸之公曰貸之為言虧廣大體不若遂賜之上喜為製寛財利論發内府金繒給度支使無加賦天下公因啓曰古之君人者必時視民之所勤民勤於力則功築罕勤於食則百事廢曩者上封詔郡國勿伐木除道宿頓傳郵以示㳟儉已而祠汾款亳有司侈設寖爽詔意繕靈館度殊庭斬艾山林更費無藝恒暘羽孽迺天意所以申儆上悚然即禁採伐弛力役申戒四方省不急之度公之論事誠心為質引義慷慨不崇空語故人主察其忠實虚懐嘉納啓心造膝云補宏矣章聖嘗目公廊廟之器盖知公之深也尋以給事中參知政事儲闈肇建始初預聞及是首除太子少傅手疏援先朝之故以譲遂兼賔客詔儲后接賔客如師傅累牘遜免許從客禮焉賜之御篇元良述六藝箴勉以輔導之意俄遷禮部侍郎冦忠愍公由宫僚罷相詖辭讕衍公因燕見上頗問春坊事公曰皇太子仁孝天縱睿問日躋羣臣佐翼實無過事或有他語者臣請付御史辨之上改容慰罷焉時丞相缺公以參知政事獨當國謀猷燮諧率循訓典總領衆職甚稱上意面命之相者數矣輒懇辭一日對滋福殿東序皇太子趨下稱謝曰䝉恩擢賔客為宰相因再拜上顧公其可復譲歟翼日制出以吏部侍郎兼太子少傅中書門下平章事賜賚皆異數公荷厚恩厲精索慮竭股肱之力知無不為而與朱崖丁謂相同秉政謂顓權不軌公意在綱紀國體論議不能平章聖不豫始議儲后聽決謂立異以為太子總萬機即上躬良巳殆難為朝廷禮公進曰撫軍監國漢唐以之上疾止如初何愆於義由是資善決事國本固焉謂益横其心間忠舊鉤黨攀援相入傷危不附至輒除吏不以聞公憤然語同列曰迪起布衣無左右之先上特達稱舉十年至宰相知竭誠奉公豈能阿權臣取容乎是日廷數謂執邪罔諼傾亂憲度顓威福誖大臣節因質責其狀乃并自劾姦臣竊國命而不能正請同免上深感悟歎公忠孝又稱忠忠者數四遂與謂偕罷歸班既還第喜甚謂所親曰古之君子乎無求生以害仁今日吾所以報也屬上疾稍侵謂謀得施頃之復相是日除公户部侍郎知鄆州真駕升遐貶公檢校尚書水部貟外郎衡州團練副使志且殺公或説謂衡州之謫若士議何謂曰是庸何傷他日好事生傳衡州事不過云天下惜之而巳時乾興元年三月也七月謂敗十二月復秘書監知舒州徙建康就改刑部侍郎徙兖海改兵部徙東秦又徙河南詔朝京師公既對留五日而辭絶口不及舊事至洛師改尚書右丞徙三城就遷工部尚書耕籍之嵗獻后上仙今上馳馹還公授資政殿學士圗舊共政遂復相章聖朝公雅見親重君臣之際無間然者毅然廟堂以身許國自謂臨大故賁育弗能奪不結黨友取㳺說之助見加彊詖播越在外故莫為之地者精誠忠義貫於神眀惟帝念兹復我弼直然天資剛勁秉心醇一雖歴危難艱阻僅全折而不撓正色益厲當軸處中用是亦弗能乆也景祐二年以刑部尚書資政殿大學士兼翰林侍讀學士解機柄留侍經筵竟罥僿文除太常卿知髙密尋復秋官徙彭門又改地官徙兖海党羌不恭大入内地公上疏願以屬老臣上曰是豈宜以煩耆徳乎詔慰答西師在野遼戎睢盱朝議藉公威重綏定河朔因授彰信軍節旄判天雄軍吏民卒旅至於四夷皆知公兩朝二十年舊相故不嚴而治疆埸乂寧復徙青社詔赴本鎮過鄉展墓因慨然曰吾遭時至將相幸全節義不忝先人盍歸來乎佚吾餘日也及曹南遂引年還君事疏三上天子愍以職務留以除太子太傅致仕歸老濮上放懐物外逍遥六年子東之以侍御史知雜奉安輿至都使璫餉茗餌致上意存勞謂公不可强自力一見我歟公謝衰疾竟弗入謂故吏曰吾篤老槁骸灰心聖君念雅素儻加恩是吾為子孫見也張禹數視其兒猶市攫爾啓手足之日無他恙時凝凛偃氊廬中頋左右曰安得大幄冒天下之寒者乎神爽恬泊頽然委化享年七十有七配時氏卒公約時子東之請諸朝追封永嘉郡夫人繼室榮國夫人皇甫氏皆有徳禮式憲宗姻三子曰東之尚書工部郎中天章閣待制徽之度支貟外郎京西轉運使皆以才進著名迹稱賢士大夫不藉世家幼輔之太常寺太祝六女長歸國子博士向絳次祠部員外集賢校理張充次太常博士王端次未有行而亡次歸大理評事陳襲古次在室諸孫曽孫十一人徳厚流光宜乎世濟其美者公孝於親友於昆季篤於朋友不遷怒不逆詐計數回巧不接心術不苟進不潔退功美不居患難不悔譽善不為諂嫉惡不為忌率由天至非有勉者藴之為行誼發之為事業在公之道盖土苴爾夫夸者死權矜者徇名逞禍機而𨗳爭端聞公之風薄斯知敦貪斯知約矣臣承學淺昧然粗聞春秋義例矣大君有命敢誣信書銘曰侍中剛塞藴涵純徳發為正色隠然柱石章聖惠哲察公忠烈可臨大節託之喉舌遂付宰柄爰屬之政實受端命賔傅儲聖孽臣專朝僻訛姦驕鉤連日囂我心欝焦感憤中激志除邪偪乃誠靖國以寧社稷綴衣出庭遘閔南征不逺湘衡顧懐周京大人繼照圗舊廣孝顯揚輔導俄還廊廟迺平泰階謨明弼諧若作梓材爾惟鹽梅師戍羌落帝念遼漠公在河朔敵崩厥角宣力中外文武盡瘁若時進退道徳益大攻奪為利太息為義處心云異於道同敝公冲而用不激不聳率誠以動不勉伊中巖廊穆清軫念老成俾揚頌聲式昭典刑宋故推誠保徳功臣宣徽南院使安武軍節度使冀州管内觀察處置等使開府儀同三司檢校太傅使持節冀州諸軍事冀州刺史兼御史大夫鄜延路馬步軍都總管經略安撫使判延州軍州事管内勸農使上柱國廣平郡開國公食邑五千二百户食實封一千六百户贈太尉諡曰康穆程公神道碑銘并序昔髙陽氏命南正重司天北正黎司地其後為羲氏和氏唐虞之際實紹其業至於夏商故重黎氏世序天地在周程伯休甫其後也程氏世系盖逺矣公之曽王父諱守瓌仕周檢校尚書工部員外郎兼侍御史嘗更潁川陽翟令樂其風土自汴之封丘徙居焉故今占籍陽翟公諱戡字勝之先公以治春秋登仕故公初亦傳三家之學既習通矣而委之曰君子惟多識前言徃行以蓄其徳奚事一經遂博綜蓺文天禧中楊文公億典禮部貢舉時推文宗尤以藻鍳自任考試進士精甚見公程文大器賞之遂為舉首及廷試亦在第四于時公之名動天下釋褐涇州觀察推官代還遷秘書省著作佐郎知齊州長清絳州翼城縣以愛利為政有聲俄改秘書丞通判許州蘄州遷太常博士復通判䖍州贑人巧滑嚚訟公治明審數辨寃獄發姦慝吏民畏服刑平政清風績推最以尚書屯田員外郎徙知歸州轉都官員外郎數月代還且甄用也途次㐮陽聞父䘮徒步而歸服除召為侍御史寳元元年并代地大震壊城郭廬舍民死傷者衆公以選為并忻等州安撫使入境以便宜從事宣布上之恩意諸失業不能自存者所以救賙安集施設周及人情大安還白利害稱㫖所建皆見嘉納除三司度支判官遷兵部員外郎尋兼起居舍人知諫院鍾内艱時西鄙有釁朝廷多事公納忠開説補益居多時政賴之奪情俾領職公確辭得終禮制既免䘮復還諫省尋以本官兼侍御史知臺雜事公之任言責司憲度切磨獻替以尊王體正國論未嘗齪齪及諸細也故時議者重公有逺識惟帝心簡在殊深以例換三司户部副使不閲嵗擢授天章閣待制陜西都轉運使遷刑部郎中知渭州自羌戎為不義出車遣戍平涼當其衝騎冦三大入殘夷及是始通款公蒐補卒乗繕完壁櫓綏撫新附種落寜輯軍氣以振邑里始寜時樞府缺員仁宗頋謂輔臣曰程某厚重可大任也有間公者以為故事未有自待制擢二府者遂不成命拜樞密直學士知益州屬貝州軍亂州將張得一失守抵罪公以嘗任得一褫職移知鳳翔府易河中朝論皆謂坐累太重踰月還舊頃之徙永興軍未幾遷左司郎中領瀛州髙陽關路馬步軍都總管安撫使甫至遷左諫議大夫祀明堂覃慶遷給事中契丹使過髙陽關稱疾請以紗巾見公曰疾可無見見則以禮北使憚公嚴正乃具冠服如儀仁宗聞而嘉之語曰程某有守差强人意還知審官院他日帝從容諭時相曰昔孟知祥以後唐甲午歲得蜀至本朝咸平中歲在甲午盜發益州西土大擾故蜀父老識之來嵗復在甲午蜀人以為恐其精擇可鎮靜者既而曰無易程某矣召對便殿親諭此指且曰為朕再行即召公執政公頓首曰事君者有命無避安敢以寵利居成功帝屬意良厚優除端明殿學士知益州到部彭州果有訛傳兵起者即捕斬之人心以定自孟昶歸朝守者務為安靜苟逺嫌訾至城堞毁圯莫敢増葺公曰城以保民者也故萃以除戎器戒不虞聚而莫保民何依焉遂議版築浚池隍今蜀城脩完公之力也明年召除參知政事屢表遜避優詔敦促中人撫問者數四在政府有告急變者稱得遺札於路關搆甚密尹以白於執政相顧未決公曰獨斬告者或曰何遽爾公曰是情易得也尹試嘗訊之果告者工人舊出入此軍㣲聞其中豪黠輩妄言頗連諸校因相與謀此官司莫敢寛者必當按狀竟之因以圗賞利不竟亦無以反坐非有同謀莫取證爾遂斬告者皆服公之發姦詐明且決至和二年宰相文潞公復輔政公以通姻引避除尚書禮部侍郎改樞密副使公才長於政事既歴二府練達治要處心積慮期有以報特達之遇而時為樞密使者與公情㫖不相得邕州守將以賄聞而奏請増補嵠洞酋長且十餘上公持不從以為後必生事數爭辯帝前因堅求解五年以吏部侍郎觀文殿學士翰林侍讀學士領羣牧制置使罷然帝察公議每長有憂深思逺之致内直公尋亦罷樞密使者拜公宣徽南院使檢校太保鄜延路馬步軍都總管經畧安撫使判延州秋大雨水五龍川溢東西兩城將壊居民詾懼公登城肅禱水波稍復迴還遂退衆謂公誠心若有所感然英宗踐祚視秩帝傅是嵗就錫命以安武軍節旄再判延州初夏戎承襲尚幼沒臧訛庬四族顓國諒祚益習事患其逼用季父磨乜之謀誘訛庬等誅之初朝廷嵗賜諒祚金帛四族常分其半首領入貢輒貨易圗利故四族盛强至是併其所部沒入財畜諒祚始擅其國氣驕意得作為僣慢遂改元置官號數為干請公上言戎狄貪婪乃其天性十求九獲猶懐觖望饑則噬人飽則颺去畜養之道宜以威克請專遣使責其僣妄朝廷因降詔詰問羌雖不悉禀命因是知為裁折公念西疆四道戍守千里士馬留屯坐空儲積持乆之計必兼耕戰自古言邊偹者必以其土人勁鋭便馳射戰鬬習知山川險易其氣俗然也請籍邊户擇取丁壯籍以為義勇廟堂議協自陜以西無慮得十六萬人更戍畨休以農隙訓閲豐財足食安民保大武有七徳公近之矣夏人自繼遷之叛狃於狙詐之利至元昊尤多狡數故能獵服諸戎敢為國患諒祚實輕譎易與者而朝論懲寳元慶厯之難抑游説者多過其實羌每與契丹洮人相攻擊輒大㸃集聲欲犯境公獨筞其情不為之動而常勵諸將曰夫兵事以嚴終可無用不可不戒也克勤小物備預益修故時推公沈毅有方略得將帥體羌比年侵掠内屬蕃部秦渭尤甚或言帥臣蔽匿不以實聞乃遣内璫專領諸路蕃部事公上言熟戸利於附漢甚憚役屬於羌我不能庇内臣督領無益也且族帳星散而數犒饗呼召期㑹更為煩擾不若委帥臣察其材勇捍邊有勞部衆所服者間召赴闕天子親臨撫閲遷擢用之此羈縻之術也上善其言以新命已行難遽改後竟以不便悉罷或請置重兵長安為四路根本選大臣摠節制詔公以利害聞公對四路距雍逺或千里禀白待報豈及機㑹責成四路雅合事權冦所侵軼相為救便從焉既而引年謝事章十數上仁宗晚年賜詔曰卿年耆而徳益隆朕所加遇者未可以期頥自髙也公惶恐不敢辭及加旄鉞復申前請表又十上英宗特馳近侍賜手詔曰卿雖年髙而精力克壯在廷歴年處置舉合機要頃邊多事正當為偹卿勿復更有請厚賜手封茗劑以將恩意公陳情懇至使者曰且有後命勿受辭公不獲已下拜受賜力疾視事賔佐共白公其嗇精神近醫藥厚自持府事僚吏請盡力公曰邊帥豈深居飬疾者耶旦夕無少解疾益侵帝聞憫之詔還闕就輿上道軍民逺送郊莫不號慟治平三年正月乙亥行次同州澄城縣索筆牘欲自具遺奏草數字而薨享年七十外見大星殞于寢堂而聞發哭先帝軫悼輟視朝遣中使弔撫厚賻其家追禭太尉章紱太常考功閥合康穆二法以易名禮也諸子奉􅀈帷以歸陽翟四月𦵏我康穆公於舊學鄊先公之塋陽翟君後終濮州臨濮令祖思議隠居不仕考諱坦國子博士以公貴追命三代普贈太師中書令兼尚書令博士封成國公曽祖妣田氏祖妣劉氏妣王氏秦魏陳三國太夫人公先娶謝氏追封陳留郡夫人再娶李氏贈永昌縣君繼室以曹氏樞密使司空兼侍中㐮悼公利用之女也封新平郡夫人三子曰莊曰荀尚書虞部員外郎曰萃内殿承制七女適供奉官郭承則殿中丞崔良孺大理寺丞宋彦國虞部員外郎文恭祖侍禁閤門祗候王咸允杭州節度掌書記孫賁濮州推官李恂六孫髙光祿寺丞充章雍太常寺太祝奇秘書省正字公温而莊寛而栗尤樂易喜談笑不為城府崖岸善與人交其度豁如也薄於自奉食罕重味器服僅給而巳嗜讀書老而不倦雖在戎旅未嘗釋巻而首公勤職盖天資然易著乾之四徳曰貞者事之幹貞固足以幹事理財正辭禁民為非曰義若貞與義公實有焉用是出處顯重且五十年忠勞在朝功利在民為當時偉人重徳盛矣僕康定中與公並命處諫垣至和末又代公為益部以常同僚而從公之游也舊故知公之器藴為詳銘曰貞以幹事義以治民施於有政康穆其人文學發身貢名第一惟其徳業誠心為質亹亹諫垣實陳昌言法冠糾違王體以尊遂服邇僚式䖍亮采帝察其衷於心簡在帝念戎難内儲蜀憂疇咨文武屬之懐柔公有常徳維邦之翰四方於宣先登於岸西圉既平西州既寜還躋二府參斡機衡無有作好無有比徳剛亦不吐王道正直髙奴古塞實扼氐羌鎮守之重咨公巖廊蠢爾夏戎奸黷憲度公厲御策奔踶入馭卒乗輯睦壁櫓繕完拊循蒐閱軍氣桓桓議建民兵法古農戰保大經乆憂深思逺關河晏然以公在邊兩朝眷賴弗遑引年公不敢康將吏傷憫君恩見還大星已殞元戎於征麾纛啓行及歸里門翩翩素旌一氣同生大期共盡惟此徳名流徽不泯大宋上都左街景徳寺顯化禪師碑銘我聞菩薩以方便智行於非道而作佛事以平等慈不捨衆生而共世業雖逆順之殊化於解脱以同歸此惟自證聖覺之可通固非常情思議之所及若顯化禪師者盖其人也歟初京城景徳寺西塔七俱胝院有僧清璲以誦經為業誦妙法蓮華經至五萬部尊勝大悲陁羅尼各三百藏祥符中有布衣自云姓許夀春人造璲作禮請受經梵相竒古目直視不瞬璲異之為受具戒名之曰志言動止軒昻時獨語笑多行市里褰裳疾趨或舉指畫空佇立良乆間從屠酤㳺飲啗無所擇道俗共目為狂僧璲謂其徒曰此聖人也佛法有賴矣衆未之信乆之士民稍稍斂矚有意欲為師具供曉輒至門云來赴齋有欲施諸供具輒道名件索之温人林仲方自其家以摩衲來獻舟始及岸已來就取仁宗皇帝每延入禁中徑登座結趺飰畢遽出未嘗揖也王公士庻召即赴然莫與交一言者或進紙筆黙致所請揮翰如風字體遒壯初不可曉後無不驗仁宗臨御乆春秋漸髙深念繼承之重遣近侍至師所無他語惟展紙於前侍者授筆須㬰滿幅末云十三郎近侍以進不測何謂後英宗皇帝入纂大統實濮安懿王第十三子也大宗正守節請書師不顧迫之得潤州字未幾守節薨贈丹陽郡王曾在故相張文懿第見童妾謂為王家比丘尼他日以從女適故工部尚書王公素竟為尼僧義懐未出家師見之撫其背曰徳山臨濟後住雪竇為衆説法祖道益明今南方宗㫖盛傳多懐出也如是前記不可悉數普浄院施浴鳴鐘時方迎佛聞浴室中有人聲僧叔嚴徃視乃師也語少時振衣遽去叔嚴追之院門尚闔故詣西塔欲驗其事守麗景門啓闗而出師安寢於室復前語無遺海舶遇風濤且沒共見一僧操絙引之商人至都見師於市釋然引舟者也師曰非我汝為魚矣有具齋饌而薦鱠師并進之過廣濟河入菜市橋下或躡而窺之見臨流而吐羣小鮮泳去南海有逸人潘晃衆莫可親近獨與士人趙棠善語棠云我昔見言公於番禺由是通宿命師故未嘗徃番禺也棠亦與師偈頌相從徃還萬里間不浹日師遺棠偈有太平山上寳珠光之句又稱棠為赤溪君山人劉立常從棠得見其偈問赤溪何也棠曰太平赤溪皆兠率内院山名爾棠者本曹人舉進士從官嶺外因攝潮州海陽簿見潘棄官從之後坐亡盛夏身不壊立後亦為僧名行忠住持傳法云如是異迹亦不可具載丞相吕許公問佛法大意師曰本來無一物一味摠成真僧問世有佛否師曰寺裏文殊或問師凡耶聖耶師舉手指曰我不在此住朝士長者四方耆宿有所咨叩應聲率爾直示心要如是句義亦不可詳録將示化作遺頌其㫖不可曉也巳而曰我從無量刼來成就逝多國土分身揚化今南歸矣語畢右脇而寂慶厯戊子十一月二十三日也有香如蓮華乆之不歇仁宗遣内璫安奉真身於院之西殿金書顯化禪師四字掲於前楹度侍者超覺為僧今真浄上人也異日進士姜厚攀帷瞻禮額上有光如螢得舍利一粒至是嵗寖乆四衆供事益嚴光靈益顯其江東誌云唐法雲僧伽之儔侣歟嘗試論之盖一相浄圓人各具足自心見量非増減於太虚妙用無方故通融於萬化但由根境隔閡藏識分别龜毛兎角空華海浪習氣迷轉因物而遷至於本覺元明未嘗變失如漚生滅水性無虧如雲去來日光不昧若知實無有法則為諸佛現前證惟自心即是衆生度盡自然具清浄眼入無碍智弗離當念超出祗刼之上不起於座周遍塵刹之逺則師前記之明異迹之顯句義之妙故非智之所可知識之所能識也太原王鞏少而樂聞道自其先君素以真浄為善知識及是鞏編次其状請以續諸隐聖之後子閲其所紀皆衆所共聞見者非傳疑也故為略其煩細而擇其著眀者實録之而係以銘曰佛子云何號為顯化仁宗皇帝至心浄信以是名字留於世間復次佛子以正受力入於塵勞而作佛事於一切法得如實見轉輪聖王宰官士夫若善男子諸來問我我為方便示其本際如水中影如鑑中像如摩尼珠衆色自見無能所取非生住滅佛法流世力願廣大不見聲光孰警盲聵師為法來故云有賴生民有欲著於好惡非激而勸弗沮而懼我於世教不其有助閒名已謝幻身猶全法施無盡金題爛然太平山上寳月還圓宋故龍圗閣學士朝散大夫尚書工部侍郎提舉南京鴻慶宫上柱國清河郡開國公食邑三千八百戸食實封八百戸賜紫金魚袋傅公神道碑銘并序商書髙宗夢得説爰立作相作説命三篇以為說築傅巖之野故為傅氏盖黄帝之子其得姓者十四人有受國於傅邑者自為氏說其别也歴漢至唐常有達者公諱某字命之世濟隂人今徙畿内考城曽祖祖值五代亂離不仕考累贈開府儀同三司司空公幼孤事母孝早有見於鄉里外祖樞密直學士燕公肅愛賞之守㑹稽挈以行欲任以仕辭曰仕當以學請姑就學勵精服勤遂成髙業甫冠一上登進士第甲科釋褐以大理評事知兖州仙源縣邑有嫠訟乆不決又訟於州舊相李文定公屬吏窮訊反坐嫠矯誣公至復自辨公使對者原書其契不類情得遂伏辜文定聞而嘆曰吾不能使枉者直而又為寡婦人罪吾甚愧之謝以粟帛盛薦公之才於朝代還知撫州臨川縣江西劇邑名難治盖南楚之俗纎僄巧法吏舞文相俠為欺詆以多所證逮積嵗不竟困細弱公察其敝曰契之不明訟所由生乃立條教告民凢田訟傅别約劑不具者一切不受其辭以故豪猾不得逞吏束手囹圄屢空善良者安由是時輩推其能政通判泗州淮瀆大溢墊城壁朝廷聞水害馳近璫臨役事程畚築慮庸六十萬渡淮徙土南山下道回逺勞甚公循汴堤旁得髙阜數里﨑嶇不便於挽綷請夷之載以回舟委城下省工大半詔書嘉奨泰州並海嵗苦風濤壊田廬又徙公海陵圗其患至則相地形勢規築堤鄣遂止漂淫之害民至於今賴之以選通判大名府佐吕文靖公文靖夙聞其才委以府政俄而吕公復相擢知宿州未幾提㸃江西刑獄徙益州路賜五品服公自大理寺丞殿中丞太常博士尚書屯田都官司封員外郎至是就遷工部郎中梓州路轉運使到部值涓井夷人方擾郡請益甲公曰夷實獸心獸窮則搏不有犯者奚自而來乘傳躬徃亷問果縣豪吏侵擾諸夷衆怨以叛按其罪流之嶺外告諭酋領即解散先是夷人每秋成鬻粟於市市人相約率賤居之伺其乏輒倍蓰以出常以是畜憾而生邊患公以官錢委官以時斂發若常平之法夷人大恱自是境上少事慶厯初始制課民植栁榆以為縣官殿最兩川地狹生齒繁無尺寸曠土而吏恐負督民種蓺不堪其擾公以聞罷之蜀人安業轉運使圭田在廣安舊事擇軍校之髙貲者四輩掌其納輸貿遷取贏嵗送鏹三千公命以市估鬻之送鏹三千後使何知至清吏也善而循之遂習為常其在兩川為民興利除害事良多召還改刑部陜西轉運使陛辭賜三品服初夏戎阻命犯延安蹂平涼暴師鄙上興費不贍夏文莊竦始建更幣以振邊置鑪商税鑄重錢一凖十既又就河東山澤遂及江南諸監並烻鐵為錢轉以資關右民怵於利則冶鎔盜鑄殽雜為巧死罪積多法不能勝四民失業朝廷患之議所云捄公請大泉一當三貨物始平民稱便建𣙜鐵法姦鑄遂衷止值闗中饑春麥苗被野豪賈益閉匿糓騰躍而錢不出操貲者賖貸邀重息公曰弛斂時也輕重權也發庫錢三百萬緡以濟農民之交乏約輸麥於縣官軍儲以給公私共利後間用其法以實邊糓西戍乆嚴饋道難梗州縣租賦自陜潼推移以輸塞上公按籍而歎曰此民之所以困也為之經畫就所平糴自此田稅得輸本部先是募商人入粟於邉而受錢於都内凡三路歲或數十鉅萬時河朔吿乏而朝廷艱於移用公聞之上言本道藏廩足給請罷都内所受錢以資河朔仁宗曰共國慮者當如是矣璽札褒飾召還糾察在京刑獄俄遷兵部三司户部副使尋使契丹方還即命計事隴右時秦闕帥轉運使范祥攝職請城古渭州以拓彊埸初蕃部訥支藺氊有此地藺氊與夏人有仇力不能支因獻其地謀以自保祥不探其情遽陳利害以請朝廷易聽之遂興大役勒兵䕶築侵耗諸羌相率為叛夏戎亦集兵境上來理經界後帥張昪劾祥生事邀功請棄其地命公馳赴審事宜公至則以朝命宣告諸羌稍稍引散視古渭形勢深在戎落然業已營築請止為一寨立五堡以通行路朝議然之迄如所築復命除天章閣待制陜西都轉運使歲餘遷諫議大夫入判三班院流内銓陞龍圖閣直學士充環慶路都總管知慶州到部畨官皆見環州首領蘇恩宿有疵負恐因見質執獨不至州將敦迫使就道愈恐恃其衆偃蹇不奉命恩豪種有力量隣道聞之嚴戍境上公乘其未動告諸邊吏恩始非惡意過疑懼爾乃遣禆校單騎抵恩所諭以此意恩號感聽命即自歸嵗餘徙涇原渭州舊事嵗遣將佐領甲兵歴按諸戍謂之巡犒所至侵擾民患苦之公止不遣公私便安民為立祠今刻石存焉代還判太常兼知審官院遷給事中承乏開封府丁内艱服除知審官院兼羣牧使復領開封府㑹中山謀帥咽呃巨屏守邊巳試之效無右公者遷樞密直學士定州路都總管知定州未幾保州守將操下嚴卒伍狃於姑息藉藉有怨言民懲慶厯之變或以族行違難朝廷聞以為憂方議易守而公奏至具條所以戒遏狀且言士驕而輒得所欲後母以制請勿易守保無他虞時議推其持重有大體英皇由是器之有大用意大農計邉儲内帑資以金帛則下本道貿易緡錢平糴度支凖其直率倍號曰省估民輸重困公按實以聞遂罷省估止從在所時價河朔同被國惠除龍圗閣學士召入知開封府今上踐祚遷工部侍郎莅事審給府政大清間以疾倦於勞冗請得外補乃知兖州復召還領三班判集賢院權判都省提舉司天監寖有休息意請便鄊一藩乃除應天府又請閒曹以遂頥養就領鴻慶宫遂歸曹南熈寜六年六月十三日考終於私第享年七十一公性夷粹無城府而臨事有守操執堅正天資長於政事而本之以明恕不為皦察行吏下畏信簡而易從敏以有功故所踐歴必有可稱紀英宗簡在甚深訖不究其用然亦可謂厚行君子循良吏矣嘗買妾察其態度有異問之衣冠家女也又常嫁為士人妻公乃嘗識其父為之咨惻訪其家母已改適因為備行具以禮嫁之又為保薦其夫其篤於義多類此先娶王女早卒再娶栁氏華原郡君亦先公歿子六人裼國子博士扆太子中舍裳秘書省校書郎早卒衷裔並秘書省正字女六人適太廟齋郎陳邈秀州推官張行先左藏庫副使李昭用太子中舍李備太常寺太祝吕希俊鄧州内鄉縣尉向紘孫男十一人詳陳州商水令謫齊州歴城主簿評進士及第誦奉禮郎諫讜将作監主簿詵該詢誠並幼八年五月二十三日𦵏於考城縣之西原陪先塋二夫人祔銘曰商書說命中興武丁東維箕尾爰垂列星世有俊徳秉有光靈前載相望文武是經於赫大宋朝多髦彦能哲而惠舉此黎獻於灌奉璋於宣作翰太平之基惟士之選有若傅公政事著名初試為邑即聞治聲凡所謀為迄觀厥成雖在周行巳期公卿賢人徳業本於簡易易主乎仁簡近於義險阻異端烏可適治公知由斯故多愛利兩蜀逺方三秦劇部連駕督輸民庸實著渭扼西疆定雄北路事鄙近功體存逺馭持重不撓慮㣲亦精卒乘以肅獄市以清簡在英主迺還尹京素藴未施濟河於行我初起家才名有煒歸杖於鄉以違世累風迹三朝隙光四紀履道坦坦吉祥止止既具五福又餘積善宜爾子孫保茲蕃衍必有令人克續以顯九泉可作尚襲黻冕樂全集巻三十六
