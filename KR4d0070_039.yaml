body:
  text: 樂全集卷三十九宋張方平撰墓志銘推誠保德功臣正奉大夫守太子少傅致仕上柱國南陽郡開國公食邑三千三百户食實封八百户賜紫金魚袋贈太子太保諡忠憲韓公墓志銘并序上景祐中其執政之老曰昌黎韓公諱億以直方惇厚更踐二府謨猷憲度所以弼諧者甚著既而避位拜天官二卿保釐南都加資政殿學士領澶淵上以澶淵當北道衝會非所以佚耆艾易亳社就遷尚書左丞慶厯三年連抗章請老以太子少傅致仕還京師明年仲秋既望考終于景寧里第享年七十有三天子憫然不御朝追錫命為太子太保禮官廞行合於忠憲二法以聞詔用易名公之先占籍常山之靈壽考信公游學過河遂不北還公既貴卜封樹禰廟得許昌之長社吉因而度竁故公之得謝也使營居于許將徙而薨其孤綜等奉公之喪以歸新宅至于陽月乃克葬于大塋成公志也公字忠魏曾王父母贈太保諱某江國夫人張氏王父母贈太傅諱某舒國夫人李氏考妣贈太師尚書令信國公諱某二夫人越國郭氏吳國周氏世載善慶至公而大公郭之自出咸平中登進士第釋褐廷尉平知亳之永城縣理聲籍甚郡守皇甫選時名士察公逺器傾身定交凡亳境內訟事久不決者輒屬公平處淮南計臺上治最改大理寺丞蓋初蒞官風迹固巳章章矣丁信國艱服除倅淮陽河决屬邑淹田廬無慮計工將賦諸民公請循視水勢即斬材河瀕稍楗合之水復故道而民不知俄遷殿省丞他日章聖嘗覽公著述特命引對改太常博士知洋州州有寃獄乃大豪巨姦賂以買直積十年不决公一訊情得罪人自服還除屯田員外郎張文節公鎮魏公佐之文節髙介少許與雅重公薦公文中御史即召殿中擢侍御史江淮南兩浙旱蝗命公安撫到部問民疾苦察吏理慰薦廉善劾免貪殘散利薄征去幾省禁合肥有陂可溉田久為强家豪占公按復之民至今受賜未復命除開封府判官一日對下已出殿屛復召入賜五品服俄授河北轉運使故相向公諸子訟財詔公留為平之時丁崖州擅朝交利欲得向氏長安華嚴别墅諸子已聽命使所親諷公公不答崖州絶以為恨鎮定帥曹瑋有威名崖相亦忌之斥知萊州又慮其有辭也命公馳驛先入據城奪其兵緣是伺間欲兼中公以危法公處事周審慮先幾微故崖相卒不能傷上嗣位推恩遷司封進直史館領青社尋追還臺兼侍御史知雜事賜服三品遷起部郎中會中丞缺公專臺務禁軍有告急變者中貴人夜開宫門逮卒百餘輩付臺公質辭探情知事矯誣寬之不問中貴人自以捕反者為功日傳制促獄上及文具止誅告者計臣更茶利法傷財害民公被命詰諸謬議者閲實其罪自丞相率時帷幄預政權幸干寵公連鞫詔獄持法平不撓貴幸二宫亦用是知公為質重有守擢龍圖閣待制頃之出亳州尋召知審刑院先是天下斷獄多中覆待報公請裁定中典頒為常制廷尉讞平郡國按章不以時决公奏立日程由是天下刑禁少滯以五兵加樞密直學士牧益州又遷諫議大夫時知星者言益部當災非仍饑且有兵變上心憂之推選才堪鎮撫者而以公行且諭之意公稽首曰陛下過屬臣以方面臣雖不敏當不辱命惟陛下無以蜀為慮也慨然登車至則歲果大旱公罄精力安集流散凡利害事知無不為决九升江口以溉闔境濡足賑廩勸分寬賦弛役所以救荒之術施設甚詳或短公于朝為不足辦蜀事上遣使若緣他故至蜀者實以覘公之政既入蜀蜀人美公不容口入境年雖大殺而民無饑色獄無囚繫野無盜竊使者還白上於是知公可屬以重任而定大用之意未幾有㫖召公參知政事宰相以益部不可缺守宜須代歸以拜既而引所善易制者故公命中格還更除御史中丞充理檢使公見上謝理蜀無政一無及寵利意奏引唐制增置御史裏行員屢陳便宜切劘時事上嚮納之多施行者尋以工部侍郎同知樞密院事國家自景德中與契丹氏平而夏人效職貢鄙上無事且四十年武備寖弛廟堂優游言不及兵公登樞府獨悉心邊防事建議執政各任堪將帥者稍試用之又言諸武臣宜知兵事權謀之書而今皆禁絶盍類次四種之要使習通之上為親集神武祕略頒諸邊將邈川與夏人尋戈而來獻捷朝議欲加節制公曰二族皆藩臣擅相攻擊朝廷曾不曲直之問顧但加賞勝者是驕邈川而怒夏人德刑去矣獨執不可事遂寢公揣元昊野心勢必揚去其國人交易都下雜處邸肆請為除館遣官監其市事道路護以往來下詔若優待逺人者實羈防其姦諜國朝故事方鎮不得擅兵嶺南去甸外數千里溪穴蠻或聚為盜郡縣無以禦馳請濟師朝廷雖近發湖湘之甲援擊率不及事公奏置廣桂鈐轄增募土兵重其鎮守南粵以安附遷以小司徒參知政事時定襄地大震災異數見公方在告力疾入對上問地震何主對曰是為隂有餘夷狄中國之隂也天意儻以此告且陳所以消伏之道上欣納命戒邊備仍詔求直言極諌者公罷後三年夏冦畔擾疆場時駭天下共其勞議者方思公之前慮盡心王室也劉平戰敗延州邊臣以降賊聞族應從坐法以降狀未明未之收也有司請兵圍其第衆知平見誣莫敢言者公時入覲為上言日平延州殊死戰殺賊過當轉鬬傅城下守將不為納勢窮被執更以姦讒被大戮則忠力之臣何勸上悟曰嘻微公言用刑幾濫即徹守兵亳社介京東西淮服數路之交故盜充斥公之再為州也屬邑日有剽劫民不寧處為設方略刺取乃大校為之囊槖誅獲幾百人四封肅然無追胥之役公凡歷別任判大理知審官院吏部流內銓掌貢舉刪修令敕聘契丹為國信使所處事任後必有可稱述者歷刺守令治行為吏最登三事謀王體斷國論有大臣節薛宣身兼數器胡廣天下中庸見於公矣性莊重造次不違禮法其家事尤理自闑以內肅如官府諸子侍側非忠義之言不及稚孫能行即長幼有序無敢戲嫚公旁者家人有嚴君焉公之謂巳與人遇下則更溫恕篤於親舊其孤藐不能自存者為之婚葬稍才者推䕃使仕教撫成就之樂聞孝悌之事凡議賞罰有以敦勸風俗者必屬意焉夫人蒲氏追封安定郡太君繼室王氏太尉文正公之女追封太原郡太君德禮有儀宗姻攸憲先公以歿子男八人曰綱前任水部員外郎綜太常博士集賢校理綘太子中允繹維縝並太常寺太祝緯大理評事緬太常寺太祝女六人長適端明殿學士翰林侍讀學士給事中李淑次早卒次適大理評事蘇舜賓次適太常寺太祝王整二人尚幼孫男十四人公起諸生丁時纍洽出入顯重至登鈞衡餘四十年輝光日新功用在人典型在朝引年辭榮道德益髙諸子孫並以行藝冇令名孝恭雍和承顔無違福壽始終可謂全者某早辱公之知而又從諸子游義甚厚託辭傳信所不得讓銘曰股肱惟人后聖惟臣不顯忠憲力扶化均亹亹忠憲維德之勉四方于宣維國之翰蜀告艱災天子命公民忘饑勞實奏顯庸還司邦憲率迪訓典正色于朝不仁者逺帝志先定畀公以政乃更二府爰賦明命時方乂寧公獨深慮思患豫防愛莫公助公罷三歲夏戎孔熾人益諒公忠於國計年至告老道全德髙福祿蕃厚亦遐壽考長社之北嘉禾之鄉下從先公掩此幽堂子孫多材克延休問人皆有終公也無恨朝散大夫守尚書户部侍郎致仕上柱國太原郡開國公食邑二千九百户食實封五百户賜紫金魚袋王公墓志銘并序英宗治平二年龍圖閣學士給事中知陳州王公年七十請致君事以尚書禮部侍郎得謝歸鄉里今上即位改户部熙寧二年歲次巳酉閏十一月八日無疾燕坐終于正寢享年七十有六公諱贄字至之廬陵太和人王氏自晉太傅導為江左盛族唐末公之從伯祖綰從楊行密定江淮有功其子崇文終吉州刺史因家焉公天禧三年進士擢第釋褐邵州防禦推官歷衡連郴三州軍事判官初仕即以風幹著稱本部任材監興國軍大冶縣茶埸兼知縣事大冶江西劇縣吏猾民豪久不治訟有至數年不决敝事尤多公到未幾政以清簡聞遷著作佐郎監益州軍資庫樞密直學士王公鬷領益部辟公幕府流內銓已注官在路公聞詣府白曰選人逺官勤矣如之何使之中途而返也堅請復奏寢前章王公善其意從之就改祕書丞京尹舉知開封府尉氏縣時承獻后埀箔之後中人擅勢銜命出邑下者邀索撓民公密疏其事以聞朝廷因以正法中人威暴由是始沮後尹杜祁公知之深所嗟賞以為由一邑而正天下之法可謂之能才矣叙遷太常博士用三司使薦提舉江淮廣東𣙜鹽陛辭賜五品服章規畫功利務便公私不專為聚斂上課召還將有以擢用操事者有不悅故但除尚書屯田員外郎通判信州公常謂吏道以精勤為本閲諸帳籍至獲隱沒官物數百萬上言州縣之治簿書為要一郡之敝推而知其積矣因條上鈎考之法周防詳密遂為著令至今奉行慶厯初湖南溪峒騷動擇用並邊牧守公以選知道州朝廷專遣使安撫至州分布兵屯多非要害公執不可使者方責拒命俄而蠻冦來襲公擊走之遂不敢犯境監司列上功狀璽書褒諭憲臺薦公文中御史召除殿中侍御史乘傳赴闕真宗天禧中詔置諫院定除諫官六員而難用人員常不足乃命於三院選二員充言事御史中間久廢及是公猶未至道除此職既對見仁宗問公近臣稱卿才今將何以稱職公對曰臣逺方寒士過屬言責之地若事繫朝廷大體或姦邪罔惑聰明有犯無隱死且不避至于人臣閨門曖昧之私交構愛憎之迹險危之說實傷美化臣竊耻之仁宗曰卿言是也近日言事官章疏大率如卿言朕深不取入臺供職遷侍御史未幾換尚書刑部員外郎知諌院判國子監逾年改起居舍人直史館判司農寺未朞除天章閣待制仍知諫院仁宗嘗御迎陽門召兩禁臺諫官親策問時政得失公既上對復賜手詔令盡所未言益條當世所急十餘事多見納用慶厯皇祐間政尚寬易公有以開發者焉間因進對書思對命于笏搢而讀奏上指之問曰此記何等事也公因得一一條陳時對甚久既退上顧謂入內都知張永和曰五方異禀風俗不同或南士而有燕趙之氣是人資必忠厚仕亦貴顯王某之謂也殿上聞者莫不屬目公論事能揣知人主深㫖情辭婉順不為矯激切摩歸之正而後巳中貴人王守忠以儲邸舊恩眷遇任事嘗緣薄勞而遷重職臺諫官章疏繼上不納公請對上迎謂之曰卿豈非論王守忠耶公曰臣所論非一事既而徐及守忠所言精切信而有稽仁宗亟命內臣宣諭中書收寢誥命久在言路終守初對之意以大體自任不渝也别受命知貢舉領三班院判吏部流內銓猶兼諫省初置天章閣直學士選名臣充員首以命公即拜河北都轉運使公時具慶父牧以贊善大夫致政後贈工部尚書母安定郡太君潘氏年偕八十餘懇辭河北仁宗曰欲卿諳歷邊事行且召矣即遣內璫就私第賜尚書緋衣銀魚太夫人冠帔又為發內帑緡一百萬俾資儲峙其寵遇如此到部均賦役固河防振災害節冗費權幸忌其公朝廷稱其勤考績遷禮部郎中歲中祀明堂霈恩遷吏部以二親耋老數求江外一州以便迎養就移知洪州未離部丁外艱安定繼終于路護喪南歸服除還闕時朝議以寰內陳許鄭滑曹為輔郡增設兵防而置京畿轉運使除公樞密直學士充使歲餘職罷還朝復領三班院遷左諫議大夫出知鄭州久之遷龍圖閣學士移髙陽關路馬步軍都總管兼安撫使知瀛州髙陽北道之衝舊城隘軍民居城外以盟書故難於興築慶厯初契丹來渝平鄙上繕亭障因此展關城纍更守將而功不就公巡視曰城以保民軍政宜先此即計徒庸增版幹不日而雉堞樓櫓完備軍府增氣後人賴焉邊吏偷安法防多弛公謹關市嚴譏禁毋習苟簡必守故常方略設施毅然得鎮守之體以任官坐纍降秩一等內閣如故知池州尋復左諫議大夫知江寧府英宗踐阼進給事中移陳州引年得請遂歸廬陵雅知養生夙明性理心量虛曠而得安樂好書畫能鍳賞古之名筆多購得之聚書萬餘卷所居有林塘之勝髙僧野客談禪話道間從詩酒優游自娛世事一不屑意蕭然有方外之趣以至泊然委化神明不動其所得精矣特被仁宗厚遇每見玉色怡然退而猶若不及左右常候知之命知貢舉御書博學字賜之領畿漕御書安民字賜之往帥瀛關宸章寵行意皆有所褒藉㫖在大用而竟不及士友以為惜夫人劉氏封同安郡君前二年卒子二人曰儀終殿中丞曰億今為職方員外郎前知袁州一女適筠州軍事推官蕭迅四孫曰球曰瓌大理評事曰瑜曰玠郊社齊郎平生論述多切時務有奏議集二十卷别集二十卷藏于家以某年月日葬于某縣某鄉夫人不祔從本俗也僕與公遊有莫逆之契故億以迅所撰行狀來請銘銘曰仁皇在御四十二祀萬邦黎獻惟帝時舉皇無好惡遵王之路閲人則多鮮承殊顧公來逺方孰先為容惟其誠心于以自通誠至心精百里斯順以此事君不結而信憲臺諫省匪卷則折公居纍年始終一節河朔之行臨遣依依後命未申泣血南歸歷守五州載其善政為治不同所同清淨七十得謝遂老而傳築居幽閒邃兼林泉和以天倪自得為得采真之遊詣其冥極又達宗乘即動非動入理之門契其妙用逍遙樂地如是七年泊爾宴寂還其本然迷有生死悟無去住一切一如是公歸處朝請大夫守太子賓客判南京留守司御史臺柱國平凉縣開國伯食邑九百户賜紫金魚袋隴西李公墓志銘并序仁宗朝近臣以清德純行著稱者有太子賔客隴西李公宥字仲嚴其為人雖長者然安重有守儒雅而文故識者品藻之以為彬彬君子者矣支出于唐五世祖鼎蘇州刺史因家吳後徙營丘曾祖瑜應藩侯辟從事平盧軍祖成贈太子洗馬不仕亂世放懷詩酒與逸民游酷嗜山水能圖其幽深之趣攝之尺素極無涯之逺天下之名筆莫得其髣佛故世以為神妙考覺以明經為博士太宗嘗幸國子學適值其為諸生講易即命坐之講否泰二卦言上下交則其志通君子小人各從其類消長吉凶之象太宗甚悅翼日以語輔臣曰聞李某之說是可以為君臣鍳矣稍見褒擢終司門員外郎直史館不及中壽故其用不究公躋顯仕纍贈禮部尚書妣王氏封太原郡太君公六歲而孤知好學問幼不嬉弄長不雜交其度淡如也祥符中舉進士一上中等調火山軍判官時章聖以文治欲讎校祕室延閣之書詔吏部先以身言書判擇三銓之集者百餘員送西掖覆以三題才三人中選公處其一擢充館閣校勘預釋真宗御集詳定雅樂凡論撰之選多以屬公禮部辟試進士故宋丞相文卷已為考落公閲得之袖以見主司中山劉侍郎筠中山歎賞取冠天下士再典太學考試皆首送楊置置竟廷試第一後使荆湖見某州某官唐介深加器奬厚為薦寵今著名臺閣故時推公精鍳歷令刺守視民如傷聽訟斷獄尤為明慎蘄春值歲凶道殣相望老稚病羸委諸塗者公蠲圭田食之多以全活民或殺人而以利紿愚傭吏通為奸使自誣伏縣上具獄公一訊情得聞者以為神明其察京獄囚有疑罪法不當死尹按誅之過公慮問即糾以聞尹坐免在金陵民有誣人以殺其子者曰吾子去家時衣若衣巾若巾今巾是矣民苦榜楚自誣伏曰我固殺之縣上具獄公疑親究卒得枉狀由其深誠為質致以慘怛之心故若有以感發者然呂文靖公當國厭時俊奔競知公守道欲以激雅俗白公修起居注尋知制誥公齒長矣不樂諸輩新進事辭翰甫閲歲請解職易州朝廷從其志除諫議大夫而惜其去留判尚書禮部太常寺復請金陵加集賢院學士以行政簡易吏民便愛久之府廨火自徼廬煬譙門以及寢序公將吏卒護庫兵帑積以全仁皇始封升王因建州號江寧聞火意不悅遣使往視公不時救遂以祕書監致仕而善人惜之問或為言謂譴之重公亦不自辨上以其終長者改分司南京復領留守司御史臺遂遷太子賔客睢陽積年安時而處順浩然得於和理憂樂無自入矣某年月日捐館享年六十有二歷官繇選調遷大理寺丞殿中丞太常博士祠部度支司封員外郎祠部刑部郎中至諌議大夫兼職繇校勘改集賢校理直集賢院記注典贊命至集賢學士其更任使繇太常禮院吏部南曹登聞鼓院檢院知開封縣出守蘄州提㸃荆湖北路刑獄利州路轉運使三司户部判官户部勾院糾察在京刑獄徊翔館閣踐更內外垂三十年而資不苟合恬於勢利不為名髙亦不汩於俗詭僻之為不接于心行安而節和故士論無間然者既幼失其親痛不逮養事寡姑如事母嘗遷兵部郎中不拜以丐封邑别業在陳哀舅家之窶舉質劑畀之與朋友交久而彌篤不治生産至不祿家屢空索然朝廷聞之特加賻賜以給喪事公初娶張氏禮部侍郎秉之女封南陽縣君後配刁氏刑部郎中湛之女封延安郡君二子忱大理寺丞恂大理評事一女適刑部郎中知制誥吳充某年月日葬公于某所某與公同時左右更直外制實有忘年之契故忱來請銘銘曰有君子儒恂恂李公惟資篤行時乎中庸適道之正不否不同循理之順匪執匪容歷令刺守政處其厚民罔常懷謂公父母其在朝廷於得無苟歲寒後凋如松之茂退老于睢無田一㕓自得其得動而之天以是仁心以是吉德以還本真以貽淳則贈給事中太原王公墓志銘并序公諱瀆字希聖占籍宋虞城祖某贈尚書虞部郎中父礪贈光祿大夫尚書左僕射司虞生五代屯會委髙資從儒者游習通禮學州辟從事始為士族時鄉人正素先生戚君同文聚徒講業學者自逺方至僕射府君戚之自出著牒門下以髙業取甲科仕至屯田郎中名載國策實生才子七人六登進士第世緒熾昌遂為睢陽冠冕公其第二子也風調閎邁凛凛有奇節嘗慨然曰士志於道在得其大者逺者學而不究於古今之變究而不適於幾深之用豈士也乎景德中章聖張六科致材髦公奮曰此非吾時邪起就賢良舉文中髙選不時就召因後中書試里人於正素舊廬建庠序虛師席待公自諸耆舊大生皆執經北面材經匠手無不成器後登朝廷著名蹟者甚衆今四方學校其規模條教悉權輿於宋焉鄉舉賔興嘗占第一祥符七年景亳回鑾舉服勤詞學科既廷試第優等考官翰林學士陳彭年指公賦用韻有疑音上親為問公言彭年所指非是援据詳明欲處公乙第辭不就以布衣詘貴近於上前伸道不為名士林韙之明年乃登第釋褐試校書郎臨江决曹掾未之官僕射弃養以善喪聞除調濰州團練推官州之渠洫有東西汙等四水夏輒暴溢漂田廬歲勞民塞治轉運使承詔選公護役事度地形勢導之下流隄一立迄今無水患萊人有訟其仇為殺兄者獄疑久不决外臺以屬公公閲囚辭伏念旬時未知所以摘其情推致精誠至有見于夢寐若有人自稱其兄者明弟被誣且云取某人為證寤而召捕之果得獄遂正代還徙新平幕舉黃州麻城𣙜茗屬計省議更𣙜法公審新議非便持不時下顓用舊法既而諸𣙜悉負常課獨麻城最後新議亦竟寢遷大理丞知楚州山陽縣改殿中丞詳議審刑賜五品服處比平奏讞無滯屢䝉詔褒時天子游心治方樂聞讜言命百官轉對公上便宜十餘條皆見納用朝議嘉其論事有大體弟沖宰陳留大姓田氏豪黠賂交權要為姦利沖彈治之急則飛語轂下浸聞獻后付中人推沖性剛毅不辱終莫肯承獻后盛怒謫沖雷州公坐監征淮西頃之移倅海陵就郡改奉常博士淮甸仍災艱食發廩粟與蓄家之囤以賦饑民日數萬計巡視必親因遘沴疾作淹至捐館享年五十有六蔡文忠公時在中司薦公經明有風節中御史命埀下而公不待士君子惜之初公之與計偕名動埸屋貴游爭寵薦自託朋輩推附莫敢為等比以為仕必至公卿用于時必立功名及效官所至必有紀者然才髙而位不充志大而時不與曾莫展發歿于中身命也哉所著文集十卷備對制䇿十卷平生素藴略存焉夫人清源縣君仇氏婦德順而正母道慈以嚴二子堯臣翰林學士龍圖閣學士權三司使天聖中今上初臨軒大選天下士幾四百人翰林䇿名第一通材雅望輝光篤實踐歷顯重為朝廷羽儀巖廊之瞻積有日矣次純臣大理寺丞國子監直講文雅開敏邦之彥也一女歸魏氏國子博士舜卿孫五人廷老商老同老並祕書省正字國老周老皆幼諸弟子姪先後登進士科者十二人盛矣哉翰林之貴清源君進封樂安郡太君而纍追命公吏部員外禮部郎中祕書少監翰林掌邦計以贊禋禮之勤故公有夕郎之贈教忠繼志慶靈用集翰林考于龜策奉公輤車將歸窆于故邑之某原得慶厯乙酉陽月某日吉謂某曰子非余鄉黨僚友乎先子之烈子亦聞之矣惟是窀穸之事子其識之義不得以讓銘曰良農能稼而不能穡良匠善構如莫我役匪水行舟匪山生材士用於時功名則諧展如公兮維時之望初誰謂公而不卿相乘馬班如行道邅如曾莫逺騁命將然歟有子而才宗廟之器挹彼注兹亶成公志宰樹蕭蕭即安幽宅衮衣繡裳尚有追錫朝散大夫右諫議大夫知相州軍州同羣牧事上柱國賜紫金魚袋趙郡李公墓志銘并序趙郡李氏出廣武君左車拓跋魏至唐時為冠冕盛族五代晉侍中嵩公之祖也侍中閥閲載于晉册公諱宗詠字某幼孤器志豁如也從兄宗諤在翰林欲任公以仕公辭焉曰士策名從政學古自致爾益奮厲通藝文祥符初舉進士中甲科試祕書省校書郎補吉州廬陵尉邑多盜民好訟號難理公至則攝令事所以發姦摘伏之術甚密破盜區槖訟庭蕭然秩滿調虢州盧氏令上官交章保薦還遷大理丞𣙜酤許州徙知益州溫江縣遷殿中丞太常博士又徙餘杭之錢塘還朝遷尚書屯田員外郎諫議大夫姜公遵出尹京兆請公自佐踰年朝議以公文中御史詔除殿中後尹王公某表公材借留之不數月競召還奏事稱㫖賜緋衣銀魚順安軍有疑獄請讞焉公往案之亟設賞募罪人斯得寃誣以明授户部判官褒能也俄遷侍御史除江西轉運使寵行賜三品服就遷兵部員外郎工部郎中入判户部勾院江東仍饑朝廷憂之命公為安撫使馳傳入境問民疾苦舍禁弛力薄征緩刑勞徠流散殺政畢舉上益知其才可用因俾修聘戎廷復命還遷刑部河東轉運使地震定襄壞城郭廬舍孜孜蚤莫經營完葺安集賑恤民忘災患鄙上有閒田北人稍耕之公曰疆場之侮當絶其漸馳檄責問侵地盡復夏戎飽飛王師西戍徙公關中屬承平久邊不為備一旦軍興且數十萬衆資糧不乏調發有節繄於心計就遷七兵明年授江湖浙諸路制置發運使得朝對指陳西事上悅語執政曰此嘗使江東者耶其置諸要職行至淮上召充三司户部副使初夏戎犯河西墮九原新秦路梗朝廷推才經略多難其行公至自淮上陛見之日詔公安撫河東承命上道渡河抵安北規築建寧六寨扼抄騎之衝道通無虞河西以安出知徐州徐城隘鄽肆列城外公築而廣之民以安居利國監㹅八冶歲賦鐵三十萬冶大善崩崩則罷鼓官課不供徐之髙資率以冶敗民告無聊公親往視之得所以然因以新意為作小冶功省而利倍徐人于今便之復召充鹽鐵副使遷太常少卿擢拜諫議大夫知相州視事未旬以慶厯七年七月四日考終于官署享年六十有六天性和裕淡無喜慍質厚不為緣飾事兄姊恭睦與朋友篤于義為令守政簡易不煩苛多仁恕愛利吏民安之纍歷刺舉吏有善輒奬薦於朝不以小故案吏誡勉之使循理而巳革弊去蠧專以裕民為本故所至不嚴而治去必見思蒞官四十年事上遇下無有怨嫌者不以君子小人一見公必曰長者也啓手足之日朝野聞之皆嗟惜曰善人逝矣詩云愷悌君子書稱吉人為善其公之謂歟世占籍饒陽自侍中葬雍丘之輔國里遂為陳留著姓曾祖某以侍中貴追命太師考璨有節行不趣榮利故仕不及顯纍贈禮部尚書妣張氏仁壽郡太君始娶湯氏卒公微時後娶閭丘氏封永安郡君子茂先大理評事茂直將作監主簿茂立太常寺奉禮郎皆樂學問謹厚自樹立克家者長女適殿中丞薛中孺而卒次早夭次適泗州軍事判官張公立二季在室諸孤問龜考吉得慶厯戊子閏某月十日葬先塋之穆位禮也銘曰猗嗟乎公有守有容不否不同循理之中歷令判守政處其厚民斯勤斯謂公父母愷悌君子胡不遐年泃直且仁歸此杞原子願以敏淳則之近德音不忘納銘傳信宋故太中大夫尚書刑部郎中分司西京上柱國賜紫金魚袋纍贈某官刁公墓志銘并序公諱闕字闕其先渤海人晉元帝紹統建康協預中興四佐位居朝首其後為丹陽人唐末喪亂姦豪專土李忭冒揚徐之業開國江左刁氏南州望族故世仕焉祖諱某江南昭武軍節度使為李氏勳舊皇朝贈左龍武大將軍考諱衎江南某官雖處僞庭而儒雅清素名重中朝從煜歸命終尚書兵部郎中直祕閣纍贈户部尚書妣徐氏陳氏封髙平萬年縣太君公咸平三年進士擢第釋褐大理評事知宣州宣城縣秩滿遷大理寺丞監興國軍大冶縣茶埸兼知縣代還遷殿中丞知潮州真皇東封岱宗遷太常博士祀汾睢遷尚書屯田員外郎知開封府司録歲餘丁外艱服除通判越州遷都官知廬州徙壽州遷職方召赴闕授荆湖北路提㸃刑獄仁宗登極遷祠部郎中徙䕫州路轉運使遷刑部丁內艱服除授三司支度判官閲歲請舒州上言䕫峽溪洞事特㫖召對面賜三品服到郡以疾徙黃州不行請分司西京遂歸老丹陽公以儒術發身而才長於吏事聽訟決獄尤盡心焉在朝參嘗録囚於糾察刑獄司其具獄當五囚重辟公閲事原情理出四人㑹京府司録缺員政府以公名聞真皇指其名曰此近嘗録囚而活人者耶是宜此選矣軍巡有重囚久繫抵讕不承京尹請讞上疑其寃特命付公推冀其平反屢遣內璫臨訊公探其情實挾詐囚知情得悉服罪上猶欲矜減公上言曰民而為寇攘姦宄越殺人于貨以故犯于有司如是而可以詐免適以長惡竟按誅之公之於獄有以哀矜有以懲艾惟其當其平心守法類此通判越州長吏闕公承乏時浙東蝗公齊居致誠遍禱羣祀翼日迅雷烈風蝗漂溺于江湖粵人信禨祥相與驚異以為公之誠感是歲稼穡不害更以大穰郡城中溝瀆湮塞民久苦之公為集衆力疏濬引湖水周流城中大便利及被代百姓戀戀遮留不忍其去乃圖其像立祠郡之承天寺是亦知公之愛利有以及民者也守壽春淮甸劇郡號難治公遏豪猾細人得職獄市清課最登故召還有荆湖之命將漕䕫峽屬施州溪洞蠻首領田彥稠彥晏等妄干恩典朝議不從即率宗黨攻破寨栅殺吏民燒官舍掠公私物保險為邊患朝廷命施州將討擊彌年無功又特遣武臣出禁旅圖深入蠻益拒命乃召公招輯值彥稠死蠻悔懼有善意而武臣欲自以為功閉隔不為納民告疲於調輸會施州地震山川崩人厭死者衆朝廷遣中使致祭且問邊事公密疏請罷兵使蠻無疑邊事即定中人入奏未幾武臣內徙以兵屬公公遣禆校與蠻要納蠻兵徙集不離近徼公令設次于野從親吏數人坐次中醜類千餘挺刃睢盱左右股栗公毅然召彥晏前曰吾丐若餘生是屬奚為者彥晏懼揮却其衆徐命吏引諸酋首歃血立誓因犒飲散遣之歡譟動於山谷曰自丁相公後復見今日矣丁崖相謂昔為䕫州路轉運使有功利蠻夷懷之故云爾朝命授彥晏歸逺將軍被公璽書褒諭自後黔中妥安公性恬厚資孝廉出于徐夫人而不及養國朝封贈之典在具慶者恩不及亡母東封告成肆大眚推恩妻已喪者得敘封公上章以請其略云妻以箕帚之舊尚䝉封邑之榮母以劬勞之恩不及漏泉之澤教化之本輕重未安朝議然之故徐夫人有髙平之贈今之朝籍父在而封及亡母由公發之昭武在江南時以勳伐賜田丹陽封占甚廣祕閣公素不治産分割質於鄉人田沃衍耕穫者輒富饒及公居憂親黨請收以自業公曰誠美然鄉人致力亦勤矣仕有祿生事以足奈何侵較鄉人以牟利也焚其質劑閭里多其義分務退居諸子從官便境更相迎養以致其樂親賔燕語未嘗及榮淡乎自適凡十六年次子約知婺州扶侍赴官道中感疾皇祐元年十一月七日終于錢塘享年七十有九二月十九日夫人長壽縣君陳氏相繼而逝享年八十陳氏江南令族父士倫有名建業為壽昌殿使歸朝遂不仕夫人婦德順而正母道慈以嚴明惠知書諸子童稚時皆親自教授閨門禮法宗姻著之子五人繹約並太常博士紓某官紡某官幼早亡六女適翰林學士知開封府胥偃太子賔客李宥某官蔡仲卿某官劉緬某官施元長某官孫錫公之啓手足時資政殿學士范公守餘杭故喪事皆如禮諸子護㡛帷歸丹陽菆于唐山莊舍某年某月日合葬于某縣某鄉某原易曰素履終吉夫子曰君子哉若人公之謂矣銘曰五季積哀王土剖分江南區區為多才臣祕閣歸朝時推德素逮公策名益延夙譽公資愷悌濟之敏明以是從政所處有聲人之情僞為難知者公之察獄以誠匪詐義之與利孰思重輕公在鄉黨終和且清沖而用之以早知止十有六年全其吉履養致其樂喪致其哀公實多子子亦多才丹陽南原松阡幽宅下從先公永安體魄朝奉郎尚書刑部員外郎知制誥同知審官院上騎都尉賜紫金魚袋昌黎韓君墓志銘并序仁宗朝國老韓忠憲公清德流光實多才子其第二子曰綜以文雅政事著名于時而世家益顯君字仲文幼以父任將作監主簿忠憲領益州奏授簽書鳳翔府判官隴蜀間一都㑹號煩劇君試從事吏文精敏上官更薦其能郡缺倅君攝職時禁省災大興繕修仰材關右賦諸州縣君督採伐丁夫冒寒山谷時食而均其力役不告勞先期輸送朝廷録其勤將加恩君推而不處新宫成覃恩改太常寺太祝尋遷大理評事天聖八年舉進士擢第除通判鄧州不行領馬步軍專勾理大理寺丞充羣牧判官更通判天雄軍改殿中丞丞相吕許公鎮魏府事多以屬君河水泛溢金堤府縣危迫懼衝决為害君請行營護之瀕河民徙就髙丘水大至老弱號呼君出令能致一人豫千錢民操桴筏往救悉得全濟水巳冒丘是日活數百家許公復相薦君文行宜在臺閣擢集賢校理知太常禮院開封府推官賜五品服太常博士三司户部判官忠憲公薨去官免喪還朝同修起居注判三司度支勾院遷尚書祠部員外郎慶厯六年使契丹容止醖藉善占對北主屬目使問系閥初忠憲公在先北主世亦嘗奉使君對及之北主喜謂君二國通好至于行人仍世將命盍酌酒勸我君請與同使者五人偕進北主益喜舉觴爵自離席就飲君及同使者各一巵君還奏事執政非君不當辭除知滑州衆論以為問及而言無所辱命將何譴得徙知許州衛帥許懷德有田在屬邑訟久不决因三司判官楊儀書囑君君不答儀别坐請求事被詔推辭上當君不聞儀書奪校理徙知袁州君無故再黜士大夫為君不平故君至袁州之月復校理未幾就除江東轉運使尋召還復修起居注判三司都磨勘司改刑部員外郎換度支勾院頃之召試知制誥賜服三品知審官院審官自尚書省五品以下按籍除補中外員而官簿無倫吏緣為姦君大為簿書條次有序至今用焉契丹使來君受命館伴時北主通書稱北朝而去契丹號意以自尊大君詰之謂曰自古未有建國而無號者北使愧屈後遂復舊皇祐四年五月暴疾不起年四十五時皆歎惜其才之未及用也君既歿契丹使來有請于朝擇可遣報者仁宗識君前館伴時語謂左右曰若韓某在足為朕辦此追悼久之君資孝悌事忠憲公承顔無違盡其誠志怡怡其和也懍凛其肅也仕而在逺其心若未嘗離膝下友于兄弟愛順無間協睦內外姻族莫不備盡情理善與人交主忠信致力其急難其行巳立志博而有守約而有容介不詭時隨不違正其蒞官臨事推之已而不願不以施諸人果於去弊不以得情為明亦可謂通人周材矣忠憲公之配安定太夫人蒲氏遂寧郡太夫人王氏君王氏出真皇廟宰相太尉文正公外王父也君娶劉氏封壽安縣君先卒三子宗道進士及第今任太常博士有行誼器識克家者也宗良宗直太常寺太祝七女適祕書丞劉攽都官員外郎胥元衡常州司理參軍蘇注比部員外郎王景華太常寺奉禮郎錢長卿所從皆名族佳士二人幼未嫁治平二年乙巳某月某日葬許州長社之嘉禾鄉從先塋宗道來請曰先人之交公最深盍書銘銘曰君孝於親友于兄弟資以事君忠誠自至與朋友交實篤信義施之及民政以慈惠行成于身既有本根發于事業舉逢其原措諸廊廟王體以尊率是承流風俗乃敦吁嗟仲文維本之得英華粹純用罔不適亦既遭時巳服近職足以有為奚年之嗇長社之原嘉禾之鄉先公親卜以啓幽堂君歸可作尚奉蕭薌後人令人君兮不忘朝奉郎尚書屯田員外郎通判杭州軍州兼管內勸農使輕車都尉賜緋魚袋贈尚書禮部侍郎李君墓志銘并序君諱某字某其先自博平徙魏占籍內黃祖守澄開封府襄邑縣尉父珣贈殿中丞皆有行義著於邑里君始冠羇游京師講習上庠衆推材髙獨與故相張文節公友善太皇右文親閲貢士便殿淳化中廷試賜題巵言日出賦諸生閣筆君卷先奏御上嘉其贍敏擢甲第補河南澠池尉殽峽巖阻有劇盜久不擒中人馳傳督捕君年少厲鋒氣率吏窮討殱其黨監司上狀特留在任秩滿方論賞丁父艱還本邑咸平中契丹連歲犯境深入大興戍河北間有亡命羣輩攻劫內黃孤邑數驚騷令丞不自固君為設方略耳目掩擊輒摧殄邑人賴以安惟恐君之去也服除調貝州司理參軍郡將樞密直學士邊公肅知君能凡有艱急輒以屬君郡多姦伏賊連發不得邊公被君檄捕逐君亦勇于自用揣其所過抵夕馳百餘里竟執以歸無脫遺者州及部司稱舉以聞驛召除大理寺丞知漢州什邡縣改殿中丞徙秀州嘉興縣真皇封禪遷太常博士通判通利軍賜服章五品祀汾隂就遷尚書屯田員外郎河決壞軍壁奪田曹監真州鹽場浙江有舊堤自吳越國廢久不治潮水潄渱羡溢墊官亭民舍朝議命江淮制置發運司經度舉明功利者以君名聞因命通判杭州委護其役大省工費築者忘其勞為潮頭西興之謳美君巡撫之勤杭民喜免江濤之害列君功狀聞于朝廷還君田曹畀再任吳人俗薄輕巧君清心簡事多所裁正訟平禁止歸優上官然自吏民皆知府政之和繄君是賴時吕文靖公糾獄兩浙深器待君薦堪治劇近臣復言文中御史且召以母憂去職君內行修收恤宗族無疏逺仰衣食者甚衆以故不能北歸留寓睢陽君事親至孝平日承顔盡其歡心自疾不茹葷居喪毁甚服未闋競捐館年五十三貧無資舉斂王沂公居守聞之厚為賻贈始得成禮凡五娶最後夫人太康縣君邊氏君掾貝州時郡將肅之女也邊公剛明人鮮合意者多君材故妻之子中庸三泉縣主簿中師三司度支副使工部郎中四女適太子中舍聶復漳南縣令葛初平比部員外郎張參一早亡君性明果早學問以文藝自達然資長於吏事文無害而有恕故所居官治辦有愛利及民代輒被留去必見思其感人心之深蓋必有以致之者夫子言仁可以行於天下者曰敏則有功惠則足以使人君實有焉惜乎位不顯于朝年不登乎中壽不究其所藴故風迹止爾不在其身必延于後度支君之才器其承慶而光大者也以度支故纍贈君至尚書工部侍郎嘉祐七年歲在攝提格某月某日葬于某縣某鄉睢陽余里也自君之歿度支少也孤邊夫人嚴明有禮法訓其子義甚至獨俾從余游故度支來請銘銘曰孔門四科其一政事長於治人春秋之義君起儒者雅精吏能舉其操術試自殽陵盤根錯節益見利器殄艾姦慝良民被惠浙江湯湯君固其防水波還道井閭樂康司臣上功御史且召劬勞不待吁嗟死孝才窘于位志厄于年古共慨歎悠悠蒼天不至公卿而有令子九原可作兹為受祉錫命有典尚光泉扄君沒不朽其在斯銘朝奉郎守祕書省著作郎直史館判三司户部勾院輕車都尉賜緋魚袋安定梁君墓志銘并序君諱固字仲堅東平須城人曾王考諱某贈比部郎中王考諱某贈尚書右僕射烈考諱皓翰林學士右諫議大夫贈刑部尚書君能言而知好學讀經史輒自通其義不待師友講誨切磋之勤故器藝夙成年十三筆削班固書約魯史褒貶為漢春秋具藁數秩翰林公見而異之知其志之逺也翰林公捐館真宗皇帝甚悼惜聞其有子又力學即賜同進士出身巳而業成慨然思自致功名之地羞與貴遊子弟為伍因上還所賜出身以進士就鄉舉是時天下承平上方東封泰山禮成詔有司籲進時俊君一上冠禮部貢籍法座臨軒覆試遂占魁甲光華聲望烜赫海內初藝祖深講治要總攬權綱以謂取士官材為國基本乃人主之柄非下所宜專始御便殿親閲春官所奏名士至太宗遂以為常士之處榜首者平步雲路不日而取公卿雍熙中翰林公策名第一及是君濟其美薦紳紀為國朝盛事逮今言父子繼登甲科者有梁氏云然翰林之才之望簡在帝心既以內相尹京上且屬以大政制垂下疾暴作不果拜而君復能隆其緒業解巾將作監丞監高密郡才二十五歲代還遷著作郎直史館賜五品服旋除三司户部判官尋改判夲部勾院鸞鳳翔於霄漢杞梓聳乎林谷矣俾臧而壽事可涯哉天禧三年三月遘疾卒于京師享年三十有三何起之暴而奪之遽也夫人樂安任氏禮部尚書康懿公中正之女華族令儀禀柔而正前君五年而逝無子獨存文集十卷目曰是芳云再世藴鬱不究其盛或者將有所啓故君之季弟今禮部郎中知制誥適以敏才利器方且大騁于時兹其啓者歟禮部以父兄之未克葬請于朝出領兖州求便須城松檟以某嘗同僚右垣臨别言曰龜策告余歲在涒灘利用襄事吾兄之名願託子以不朽故序而銘曰翰林室墉君塗塈茨勤不獲處孰歌於斯既有鎡基而逢昌期獨年弗待將誰促之有弟而才無續勿悲載考于䇿亦問諸龜收子即安食子惟時先子之後于汶之涯宣德郎行監察御史判三司度支勾院騎都尉賜緋魚袋蔡君墓志銘并序君諱禀字淳之世夲洛陽人曾王考綰為萊州膠水令九年不代終于官政有遺愛子孫因家焉王考鄰考元卿並以文行稱山東鄉老賔興而不登仕君之從父兄文忠公齊踐揚二府禭典及三代故膠水贈太保王考贈太傅逮君升朝得追褒一廟贈考大理寺丞君少孤力學自立文忠在禁掖任君補蜀郡導江主簿再調鄭之管城薦君材者章交公車秩滿得見擢衛尉丞更從進士舉一上中第換光祿用計司奏掌無為軍管𣙜遷著作佐郎上方圖講治要思進天下士訪古今之術發幾微之慮乃用六科以取賢者能者君應賢良方正能直言極諫科召試祕閣名在選中巳而更報罷遂出通判滑州改祕書丞明年夏戎不䖍朝廷議問罪君述通志論十五篇陳討伐之䇿備禦之要指明逆順成敗之理甚精悉翰林王公堯臣表上之繇是擢守奉天就遷太常博士北人來渝平君復揣摩事情緒前編以獻優詔褒答時公卿多言君有將帥材可使治戎驛召至丞相府使言其志君自以儒業進固讓得免引謁便坐賜五品服改沿邊𣙜鹽使才至部除開封府推官會别事下令參知政事吳公育舉文中御史者吳公以君應詔遂召為御史於是京西多盜至入州縣吏不能制汝漢間騷然詔君乘傳捕逐至則設方略明賞罰擊除略盡民以安業還臺兼判三司度支勾院慶厯五年持節迓送北使到都四日以孟夏癸卯卒于私第年四十四舉朝士大夫莫不嗟惜天子憫然特録其孤大年為郊社齊郎非常例也其配張氏工部郎中夏之女封某縣君生三子二女是冬君二弟亶交奉君之喪自京師歸葬青州某縣某里窆用十月九日君器姿魁碩議論閎博其為人彊毅能刻意自勉所好必學所學必成所成必精慨然將推是以致功名蓋其志慮逺矣初文忠公德望顯重門下多英俊君年且三十而方以廕仕內耻無以逮人者文忠亦未之奇也辭詣導江朂而遣之君奮曰丈夫處世當碌碌如是邪到官勇自煆礪至忘寢食比三年更還則於六藝百家之書歷代治亂之際至于方技小說罔不該貫文忠驚且喜自是待之猶益者之友其為彊敏有如此者凡所歷官率有風蹟既為御史敢言不避權要數對論事上心器之有拔用意奄忽淪謝卒莫展發嗚呼非命也哉亶交造余曰伯氏平時自言知我者張安道爾今窀穸之事不可以無識也嗚呼文忠之視余猶子弟則余於淳之義可知矣余故實知淳之者是宜為銘銘曰嗟嗟乎淳之才余所知命非余所知子何志之逺而年之促耶靈府之藴兮一莫得施年之促兮可奈何銜恨九泉兮無終期巳而巳而為知子者之永悲朝散大夫祕書丞上騎都尉杜陵韋府君墓志銘并序韋氏世序逺矣漢丞相扶陽侯自鄒徙杜陵名德歷朝著為世家扶陽十六代至周逍遙公敻始别其族為十三房觀唐吏部肇宗㑹之約則知韋氏之禮義與他族異矣第八房平齊公瑱之雲孫萬年縣令象生台州刺史方憲台州生福建觀察判官鈞鈞生襄州録事參軍允之府君之王考也唐昭宗末解襄陽掾將集吏部會梁氏革運感朝代之變不復北歸潛遁漢南穀城縣青石川之峎下後唐莊宗入汴詔訪前朝衣冠不事朱氏者命方鎮優禮傳詣公車郡勸君駕歎曰吾耻梁而逸奚為乎沙陀之廷臥不起時孔勍帥襄陽夲儒者重君髙節善為之辭而以疾聞莊宗嘉之不奪其志録其子仁濟試祕書省校書郎沒因葬漢濵校書以父隱居躬耕釣以養終喪久之衛王符彥卿總兵在上黨領太原行府始應其召終于陳州録事參軍娶司空氏實生府君于峎下府君諱襄字逾中幼刻勵好學早冇名譽雅為冬官卿朱洞所知從洞光州廬州幕國初州郡辟署賔佐猶襲唐五代舊事太皇纂極詔悉罷之一命黃綬以上皆遣王官而益廣科第之選府君更就賔興于譙太平興國八年登進士第釋褐臨淮之盱眙尉遷廷尉平知䖍州贑縣邑多訟事號難理府君待以誠恕獄市以清吏民悅之因上官以請諸朝遂留六年就改光祿寺丞南方卑溽風淫于末因以搆癘宦意寖薄代還求𣙜酤聊城朝中知君者惜其才或薦之上因召赴都授著作佐郎復求監征宜春蓋祿仕也還自宜春遷祕書丞至道三年正月二十六日卒于京師春秋六十有三君天性和易識致沖逺從之游者皆一時髙流名士善與人交淮陽孫茂蘭萬適南頓喬維嶽江南李虛巳睢陽戚同文宗度泰山張茂直咸以趣尚相得同文子綸西蜀李建中雒陽崔遵度巨野王禹稱合淝姚鉉並以同年生定交淡乎相歡久而彌篤每官下士友自逺方至輒如歸為食飲具俸入隨盡口不言利未嘗問家有無手不度貨幣對客清談不及世務在官若私未嘗斯須見憂愠之色古所謂隤然其處順淵乎其似道者耶君之捐館四子皆未成立無田産可歸夫人吳氏教撫之慈且嚴母道稱於宗姻長子國祥舉明經不第卒仲曰不伐字次德通經術有節義士君子推重之今為衛尉寺丞次國華次為道士一女歸程氏琬今宣徽北院使武昌軍節度琳之兄也某羇旅在睢上次德忘年見友慶厯甲申某領審官次德齊閥閲公謁曰不伐應受大縣願掌山隂之征以其去峎下四十里便襄事也既得請崎嶇陳蔡潁亳凡緦以上喪悉負歸漢上戊子孟秋十日徙君夫人以葬于隱君之塋側蓋治命也且來丐銘惟隱君之義祕省之德乃史官所宜録余史官也撰著宜矣銘曰猗嗟韋公沛乎其中雖不公卿道德則充如彼金石咸韶具然不擊不考至音自全如彼杞梓棟杗之分不朴不斫良材固存灝灝汪汪渾渾粹醇順命懸解以還氤氳君子哉若人尚德哉若人奚糟粕之足留而功名之異云唐州桐柏縣令上谷冦府君墓志銘并序府君諱闕字闕薊人漢雍奴侯恂夲上谷昌平著姓佐光武成大業後裔蕃於河朔五代晉髙祖資契丹援立而賂以山後之地幽薊隔絶君陷北鄙不敢自晦仕為應州節度判官檢校禮部郎中兼御史中丞太皇之北征也先自拔歸得見行在上甚佳賞將不次旌擢大臣有間言又值王師無功而還故君不䝉褒録久之授綘州司理參軍後除撫州臨川縣主簿宋州司理萊州即墨令唐州桐柏令卒官享年七十有五燕涿勃碣其人精急懻忮悲歌慷慨矜夸功名少禮文事游俠風謠氣俗頗雜戎索君家世獨傳儒藝曾祖德誠以廉直立名義不侵重然諾當唐季諸侯專土詐力相雄爭欲致于賔佐莫之能屈朝廷知其節詔起為右補闕一至京師尋歸老于家當時河朔謂之髙士祖安仁以才略纍歷藩鎮幕府終于真定節度行軍副使父顯贇尤篤志于學通經術不肯仕居鄉里教授齊魯諸生更過河受業及終門人誄行追諡曰有道先生君既歸國久困州縣喟然歎曰吾得違於北鄙以至中原謂有以發所藴今乃為祿仕乎猶有民人焉是亦足以為政矣惟日孜孜以誠心恤隱始至綘有重囚將決察其辭色若懷未盡者徐以私問之果大豪買直掠服取競一訊情得脫垂死之寃凡再掌獄嘗分俸營餐劑濟縲繫之饑病者至家無餘資去官不能就選即墨瀕海多豪桀侵奪細民收倍稱之息役惡少督責勢嚴官賦君悉收其劵焚之鄉閭為之一蘇凡歷官専意貧弱舉多愛利篤矣乎仁者之心也惜乎勢卑位微不得行其志直躬孤官莫或知其道使得據土疆之大撫吏民之衆政平訟理推之慈惠古之循吏何以尚兹至性忠厚動有規準言無游飾居無惰狎凛凛然庶幾古君子之遺風者哉夫人髙氏淑慎克配子某承教義方再舉進士贈尚書職方員外郎長孫平時吉履休有令望厯東京淮南轉運使今以尚書工部郎中知徐州嘉祐四年歲次在大淵獻十一月二十六日始奉君輤帷即安壠兆實潁川陽翟縣之麥秀鄉工部少孤艱勤自致葬是以緩銘曰崆峒隂方勃碣邊裔俗夲用武人知尚氣有美昌平德名奕世補衮風節隱居經義君初歸朝亶懷逺志尺蠖之屈干將莫試篤哉若人循乎為吏生雖逢時壯圖弗遂沒而不朽孝孫是似勒銘幽堂矢辭無愧泉州清溪縣令丁府君墓志銘并序康定二年辛巳陽月丁氏啓新阡于睢陽宋城縣之某鄉司農少卿府君占丙穴清溪府君占辛穴司農之穆也凡世系世德則翰林學士王公伯庸為司農鋕銘具矣府君諱立字某司農之長子以廕補太廟齊郎歷邵武軍建寧尉單之魚臺陜之胡城宋之寧陵三邑簿復調通州靜海尉遷泉州清溪令卒官享年六十有二君在魚臺邑民甚苦前令佐貪苛恱君之廉靜譽甚美至達旁大府故相文節公守南都聞之形言嘉歎在寧陵疏導溝洫得近官在靜海屬歲饑振廩救荒得免選在清溪為政寬簡視人恐傷閩俗雖獷猾感君誠恕率教不欺君天性和易處家蒞官未始有忿言慍色不惟不發形于外蓋亦未嘗萌于心術恬於聲利不知人間有巧邪進取事遊宦不擇地不驚不詭渾然不為澄撓變無賢不肖雖至狂惡人一見君退必曰長者也更無嫌忤意夫天道無親常與善人君可謂善人矣胡不黃耉胡為祿仕之微天之報寵不在其身將在其後乎前夫人張氏太子洗馬某之女有賢行生二男曰昉南京留守推官曰曄以濟州録事參軍𣙜酤畿邑一女適南京國子監直講王鼎臣張夫人先君而歿兹實祔焉今夫人王氏某官某之女順於為婦慈於為母姻黨稱焉生三男曰某舉進士曰某某皆幼昉曄通敏方雅皆有才志君之積善將在其後不誣矣某鄉里晚輩君不以年德間之又與君之二子游既來請銘義不得辭銘曰嘻夫君涵天醇有時順無亨屯惟德慶遺後人後人孝神永寧從先子歸泉扄君不朽在此銘將仕郎揚州司法參軍時府君墓志銘并序府君諱闕字舜舉世著籍彭城之滕縣考旦纍典藩郡以政事知名終于尚書屯田郎中君少舉進士以父任太廟齊郎不樂仕宦學通古今重意氣然諾四方之英才名士多從之游君雖隱居常慨然而有憂世之志見時事有未便者輒以效於朝廷不敢為私議士大夫尤以此多之仁宗始封升王君至京師上書請問言事章聖召對於便殿進曰升王宜日侍御所預聞政事以資其聰明且使天下早熟其睿聞帝心喜之執政者曰位卑而言髙僭也罷之君曰致吾心而巳矣吾何求哉李文定與君雅厚嘗從容語歎時人事怨德巳甚且言丁謂置余於死向余守洛厚恤其家諛我者構其子孫之罪余反坐之先是劉隨為諫官以剛直忤時擯于外文定時作相有不足於隨者不與之進君因曰公之為德也奚於正則否文定曰正人為誰君曰劉隨也文定嘉納其言即遷隨於朝夏戎叛命君復詣闕上攻守之策十有二謂所親曰國家有事于邊鄙師久無功天下共其勞智者宜效其謀勇者當致其力吾雖一命微且逺思慮所及不可不自盡故自官制法令國家貨利軍儲馬牧之事有便于時有救于敝者罔不為言既以聞而遂行是時公卿重人如蔡文忠范補之流輩十數公皆與君交厚善富丞相在東平欲辟君參佐君曰吾老矣不能事人并帥孫元規復致意亦以是辭焉嘉祐四年五月三日卒年七十有八君為人仁而尤孝先君卒于京師徒跣扶柩以歸居鄉里恂恂如也唯謹爾資素贍而好施羇旅之士造者如歸人一見之必曰長者也而彌知其所存必曰君子也矜寡廢疾日月給薪餼冬豫苧絮歲饑出粟賑乏絶有遺稚乳于路收而字之多所濟活死不能舉為之衣櫬凡掩藏暴胔且數千平生未嘗斷殺生物之命昆蟲草芥之細莫之傷也將啓手足顧諸子訓以孝悌忠恕一不及于家事祖延嶽仕至國子博士贈尚書都官員外郎母蔣氏封晉陵縣君三娶閻氏王氏宋氏皆先府君卒子男五人材鄉貢進士堯楚州司法參軍孝基河南府澠池主簿並亡德基興化軍録事參軍世基郊社齊郎八女適尚書職方員外郎申屠正光祿卿直祕閣李及之尚書都官郎中朝仲綽兖州萊蕪主簿苗總尚書兵部員外郎兼起居舍人吕晦國子博士孔承休尚書職方員外郎何世昌太常博士閭丘孝直孫曾孫十二人在易乾之四德文言曰貞者事之幹貞固足以幹事君實有焉故以此修身而修治家而治誠推而廣之是謂通才逺業足以經國阜民獨卷而懷之足乎巳而巳爾僕昔游豐沛山東始見君于汶上三紀于兹熟君之風義久矣今適守東平而其子來請欲以丁未某月某日葬君于縣北之某鄉丐有以傳後者銘曰鄒魯之鄉士多儒服洙泗之濵巳為楚俗滕介其間實同風土故君之材質有文武學其逺者資亦逢時一命家居藴不以施秉義慷慨數言世務與民同憂匪躬之故以此為政何用不臧豈夫不遭我實未遑有孚惠心願無伐善人斯忱斯其微自顯我邦我里幼無所養至為鞠育死歸之壤謂天蓋髙鍳于克仁君之受祉非止其身子孫衆多必有興者遺德在人盍配于社贈承奉郎大理評事齊郡蓋府君墓志銘并序府君諱某字某先世籍魏元城祖某父某皆孝悌力田不出仕君性醇厚篤實幼專經通毛氏詩晚更好浮屠道信根深熟悟解宗㫖雖不絶俗而以戒律自持諸具壽比丘時輒從君質問法義處閭里恂恂如也人化其行以遷善逺罪猶霧露之潤不覺衣之霑濡施之名教迹近而功逺矣娶樂安孫氏生五子長曰平今以尚書虞部員外郎知遼州曰參太常丞曰良渭州録事參軍曰充曰寅並舉進士初平調官縉雲迎君以行秩滿赴都集道出睢上宋都庠序實權輿天下學者自逺方至甚盛君志在訓育諸子遂留家焉後參良繼策科充寅從鄉賦義方慈訓識者推之年六十有五考終于里舍一女歸進士李孟大名冠族也暨平登朝歷尚書省屬天子郊陽丘霈恩故君有理平之贈歲在涒灘冬至後二日參等舉君夫人之喪以葬于宋城縣某鄉某原禮也某於君為姻家而又早與諸子游故識君行狀以納諸壙云銘曰膠西清淨相參避堂安平虎牙起燕要陽著籍于魏實夲司𨽻何斯中間光響不繼君始去鄉而僑睢陽樂就學校以成義方亦竟有成策科揚名鶱翔臺省漸于修程積善之源君實有素餘慶寖昌後則有裕坡坨平岡爰掩幽宅君兮何歸金仙之域秦國太夫人相里氏墓志銘并序秦國太夫人相里氏故相太子太師致仕贈太師兼中書令祁國正獻杜公之配也初祁公二歲而孤母歸寧于家在濟源故祁公幼而是依稍長學問致名譽邑有長者相里君好士有鍳識察祁公大器欲以其女妻之親族皆不悅曰女何患無歸奈何以與羇游士君曰非若所知故夫人遂從杜氏明年祁公舉進士登甲科諸不悅者慙且喜鄉閭謂相里君知人祁公一命揚州節度推官乃迎母夫人就官即某國太夫人某氏也杜氏舊族自其髙曽以禮樂為法歲時祭祀齊薦牲幣菹醢皆有儀式夫人祇嚴內事相奠必飭祁公通朝籍始封長安縣君公授樞密直學士擬封安德郡君公同知樞密院特封西河郡夫人公拜中書門下平章事進封祁國夫人纍更徐晉二國祁公以直清名世積德纍功以至輔相夫人內助實有淑範抑其志性之類故若琴瑟之諧皆有清廟之音焉祁公在二府夫人朝謁禁中被服無采翠珠璣之飾左右至有指笑者夫人恬然自若出入纍年未嘗私謁內人近習或謂夫人諸得進見者有求請多如意得無中外親戚奚為獨不夫人第多謝之中宫錫宴侍席密近數承顧問辭對雅正不以諛自入旁聞者為之斂容加莊仁宗慈厚有容然所以觀羣臣甚密見遇尤渥者亦罕䝉褒藉之言嘗謂杜某公正獨被勞勉公之持衡國論無私固上所察抑參以夫人之所守知其內行修也故君子之道知風之自知微而不可掩其祁公之謂歟祁公六十九歲上書致君事夫人賀曰今日喜公得全令名矣吾家素不事富貴在官猶如閒居閒居正為得所願公固請同樂安佚以保餘年公既得謝無第可歸退寓睢陽閉關陋巷端居十載相與怡怡如也初公微時逺姻疏族平昔未始通者見公貴顯稍集於門公一無間為成宦婚賙其喪葬俸賜無餘既告老此意無倦夫人不為蓄藏贊以為施而巳公捐館保撫內外素風淳則其家事理不以老而少懈治平元年子尚書都官員外郎欣知單州迎夫人就官治平二年正月十四日考終于官舍享年七十八欣奉輤帷以歸應天府某月日祔葬祁公之塋男四人詵大理評事訥將作監主簿詒祕書省正字並先祁公亡欣其次子也女三人所從皆名士夫人之弟周由祁公任補纍官國子博士故相里君追贈大理寺丞子孫祿仕相續識一賢人足以庇宗貽後非此君亦安得有此女銘曰我君知人歸我祁公維德專靜資與公同襟纓佩帨恪恭婦事禮相助奠祇嚴時祀從公內外志尚實類豈不夙夜共兹德義公登宰輔司我王度見謂公正夫人有助公勤于邦我儉于家相勉勞瘁敢為光華公心決退賀以知止公喜惠散侑之為施凡此風節賢傑或難猗嗟夫人處不為艱子孝無違奉承在郡含飴樂只迫此期盡祁公新阡在諸之麋體魄同藏神明與歸文安先生墓表仁宗皇祐中僕領益部念蜀異日常有髙賢竒士今獨乏耶或曰勿謂蜀無人蜀有人焉眉山處士蘇洵其人也請問蘇君之為人曰蘇君隱居以求其志行義以達其道然非為亢者也為乎藴而未施行而未成我不求諸人而人莫我知者故今年四十餘不仕公不禮士士莫至公有思見之意宜來久之蘇君果至即之穆如也聽其言知其博物洽聞矣既而得其所著權書衡論閲之如大雲之出於山忽布無方倐散無餘如大川之滔滔東至於海源也委蛇其無間斷也因謂蘇君左丘明國語司馬遷善叙事賈誼之明王道君兼之矣逺方不足成君名盍游京師乎因以書先之於歐陽永叔君然僕言至京師永叔一見大稱歎以為未始見夫人也目為孫卿子獻其書於朝自是名動天下士爭傳誦其文時文為之一變稱為老蘇時相韓公琦聞其風而厚待之嘗與論天下事亦以為賈誼不能過也然知其才而不能用初作昭陵凶禮廢闕琦為大禮使事從其厚調發輒辦州縣騷動先生以書諫琦且再三至引華元不臣以責之琦為變色然顧大義為稍省其過甚者及先生沒韓亦頗自咎恨以詩哭之曰知賢而不早用愧莫先於余者矣先生亮直寡合有倦游之意獨與其子居非道義不談至于名理稱㑹自有孔顔之樂一㕓一區侃侃如也又數年召試紫微閣下不至乃除試祕書省校書郎俾就太常修纂建隆以來禮書以為霸州文安縣主簿使食其祿集成太常因革禮一百卷書成奏未報而以疾卒享年五十有八實治平三年四月英宗聞而傷之命有司具舟載其喪歸葬於蜀明年八月壬辰葬于眉州彭山縣安鎮鄉可龍里朝野之士為誄者百一十有三人先生字明允考序大理評事纍贈職方員外郎以節義自重蜀人貴之生三子淡渙教訓甚至各成名宦先生其季也巳冠猶不知書職方不教鄉人問其故笑曰非爾所知也年二十七始讀書不一二年出諸老先生之右一日因覽舊文作而曰吾今之學乃猶未之學也巳取舊文藁悉焚之杜門絶賔友翻詩書經傳諸子百家之書貫穿古今由是著述根柢深矣質直忠信與人交共其憂患死則收恤其子孫不喜飲酒未嘗戲狎常談陋今而髙古若先生者非古之人歟謂今莫如古者斯焉取斯嘉祐初王安石名始盛黨友傾一時其命相制曰生民以來數人而巳造作言語至以為幾於聖人歐陽修亦善之勸先生與之游而安石亦願交於先生先生曰吾知其人矣是不近人情者鮮不為天下患安石之母死士大夫皆弔之先生獨不往作辨姦論一篇其文曰事有必至理有固然惟天下之靜者乃能見微而知著月暈而風礎潤而雨人人知之人事之推移理勢之相因其疏闊而難知變化而不可測者孰與天地隂陽之事而賢者有不知其故何也好惡亂其中而利害奪其外也昔者羊叔子見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今而言之其理固有可見者以吾觀之王衍之為人也容貌言語固有以欺世而盜名者然不忮不求與物浮沉使晉無惠帝僅得中主雖衍百千何從而亂天下乎盧杞之姦固足以敗國然而不學無文容貌不足以動人言語不足以眩世非德宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人口誦孔老之言身履夷齊之行召收好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而隂賊險狠與人異趣是王衍盧杞合而為一人也其禍豈可勝言哉夫面垢不忘洗衣垢不忘浣此人之至情也今也不然衣巨盧之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦慝豎刁易牙開方是也以蓋世之名而濟其未形之患雖有願治之主好賢之相猶將舉而用之則其為天下之患必然而無疑者非特二子之比也孫子曰善用兵者無赫赫之功使斯人而不用也則吾之言為過而斯人有不遇之歎孰知禍之至於此哉不然天下將被其禍而吾獲知言之名悲夫當時見者多不謂然曰嘻其甚矣先生既沒三年而安石用事其言乃信夫惟有國者之患常由辨之不早子言之知風之自見動之微非天下之至精其孰能至於此嘗試評之曰定天下之臧否一人而巳所著文集二十卷諡法三卷易傳十卷初君將游京師過益州與僕别且見其二子軾轍及其文卷曰二子者將以從鄉舉可哉僕披其卷曰從鄉舉乘騏驥而馳閭巷也六科所以擢英俊君二子從此選猶不足騁其逸力爾君曰姑為後圖遂以就舉一上皆登進士第再舉制䇿並入髙等今則皆為國士仁宗時海內乂安朝廷謹持憲度取士有常格故羔鴈不至於岩谷奉常特召已為異禮屬之論撰臺閣之漸也而君不待惜乎其嗇於命也其事業不得舉而措諸天下獨新禮百篇今為太常施用若夫鄉黨之行家世之詳則有别傳存焉今舉其始卒之大概以表其墓惟其有之是以言之不怍云朝奉郎守太子中舍騎都尉韋君墓志銘并序睢陽鄉先生韋君諱不伐字次德好古學篤信義立風節自五代亂離經籍道息睢陽有隱君子戚君同文獨以講授為業諸生後多達者子綸處近官就其舊廬構學校志于學者自逺方至朝廷嘉其事賜名應天府書院天下庠序由兹始常選學行可為人師者主領之君久處師席晏元獻公宋宣獻公蔡文忠公相繼居守皆厚為之禮尤善與人交范仲淹希文石延年曼卿劉潛仲方山東豪俊慕君名從游者甚多好急人患難始終不渝不戚戚於貧賤不汲汲於富貴年五十餘始以一命為房山司法參軍再調鄧州襄城尉遷綘州太平令某知諫省受詔舉堪治民者二人以君塞詔授乾州軍事推官知慈州吉鄉縣轉運使就舉監汾州酒稅明文烈公鎬知并州顧君方重有古人之風屢為慰薦屬河西有警君督藁粟入府州有勞就遷衛尉寺丞其誥辭曰朕知生老而有謀倜儻士也明公讀之喜曰此言盡君平生矣意欲處其孥於漢上因求監光化軍酒稅遷大理寺丞歲滿知許州司録改太子中舍因退居襄陽優游物外年七十有四而終君夲南京宋城人先君葬其祖榖城遂為襄陽人曾祖襄陽録事參軍諱允之祖陳州録事參軍諱仁濟考祕書丞贈尚書祠部員外郎諱襄娶楚氏子安序孫積善積中皆修進士業君既沒二十八年元豐二年十一月某日始克葬君于穀城青石之峎下安序俾積善來請銘其墓銘曰舉世趦趄逐權利君獨軒昂事風義晚得微官志不伸生前素藴心無愧平昔交游拱木髙今方峎下幽堂閉君名不泯幸我存襄陽耆舊追前記樂全集卷三十九
