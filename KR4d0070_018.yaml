body:
  text: 樂全集卷十八宋張方平撰對詔策對手詔一道朕承祖宗大業賴文武藎臣夙夜兢兢期底于治間者西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給纍歲於兹公私匱乏加以承平寖久仕進多門人浮政濫員多闕少滋長奔競糜費廩祿又守牧之職以惠綏吾民而罕聞奏最將帥之任以威服四夷而艱於稱職豈制度未立不能變通於時耶豈簡擢靡臻不能勸勵於下耶西北多故敵變難常獻奇譎空言者多陳悠久實效者少預備不虞理當先物朕思濟此急務罔知所從以卿碩望故兹訪逮側身旰食躬佇條畫對臣今日䝉召對資政殿賜手詔一道逮朝廷急務俾之條晝以聞臣以庸昧謬居近列論思獻納乃侍從之職不能孜孜夙夜拾遺補闕聖心焦勞躬垂清問闊宥循默之罪開導淺陋之見敢不悉情極慮粗陳大體上冒衡石少補塵露臣子之分不勝至幸伏覩手詔云西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給纍歲於兹公私匱乏此足以見陛下社稷之長慮憂民之深意也當康定之末慶厯之初朝廷議刺民兵增添軍籍之時臣忝誎官屢上章疏極言其害至於今日事勢果然臣昨在三司計會天下財用出入之籍及建隆以來國家畜養兵數乞朝廷速加圖議蓋太祖朝取荆潭收蜀平廣南備河東禦西戎契丹畜兵不及十五萬人太宗朝平河東備遷賊禦契丹料兵閲馬志在收取燕薊然畜兵不過四十萬人章聖朝備遷賊禦契丹搜募戰士及契丹請和祥符已後稍稍消汰常語宰臣曰今之兵與古不同古者三時務農一時教戰民即兵矣今皆坐待衣食國家經費至廣不可不慎於選練故住招募斥疲老以減冗食至於寶元幾四十年天下可謂乂安矣向因夏戎阻命宰相非其人慮害不深事失幾先遂致大擾始籍民兵俄黕黥以補軍籍升諸州廂軍以充禁旅增虛名以受實弊至于陜西河北京東京西增置保捷一百八十五指揮武衛七十四指揮宣毅一百六十四指揮慶厯三年因王倫張海等狂賊數十人更於江湖淮浙福建諸路又添宣毅一百二十四指揮凡內外增置禁軍約四十二萬餘人通三朝舊兵且八九十萬人其鄉軍義勇州郡廂軍諸軍小分半分剩員等不在此數軍人日多農民日少頃來七年之間天下大困生民之膏澤竭盡國家之倉庫空虛三邊稅賦支贍不足募客人入中糧草三司於在京給還錢帛加擡則例價率三倍以此度支大計日窘外則剗刷諸道之物中則侵用內帑之財厚賞聚斂之人賤立鬻官之令苟徇目前之急莫為經久之慮天下之事可憂者無大於此也凡此冗兵非惟困天下之財用方且成天下之禍階若不早圖後無及矣且景祐已前兵不及四十萬人三司歲計不聞有餘今而入九十萬人則何以得足此雖愚者亦可見矣若更加之以橫費因之以饑饉國家安危之計臣愚竊甚寒心臣兩曾具此事體敷奏而中書樞密院未聞有所改為即今便有改為猶須效在纍年之後如救焚溺緩則益不及矣然兹事體實大非君臣同心而上下協濟則事必難成伏望陛下先且將臣此言詳問兩府若别有長䇿豐財足食則非臣淺智之所及若量入以為出必無術以善於後則乞嚴令天下禁止招募軍人令逐路轉運使提㸃刑獄更出分按所部州郡㨂選疲老便與放停歲須三兩次更互巡歷只依常程旋旋揀放無得宣露朝廷密㫖若雖係禁軍其間羸弱憚於教閲願退就廂軍者亦聽從便委樞密院㸃勘軍籍其人數少者即令團並以省軍員其馬軍無馬者即與招募如願補填步人者稍與補充近上衣糧優處軍分其有馬者即與團並足成指揮令堪教習準備使用仍詔諸路經略部署司使體知朝廷深意有專愎自任無體國之心者亦在陛下斷自聖心懲一足以警衆矣此其省兵之大略至於嘉謀密議權術幾微則有宥密之司又非臣所得詳知者也手詔云承平寖久仕進多門人浮政濫員多闕少滋長奔競糜費廩祿此又以見陛下深思官濫欲清化源之大㫖也臣不敢逺言前代及祖宗朝事即以景祐年未有邊事之時較之即可知其浮且濫矣臣曾勾當三班院約計在院使臣景祐中四千餘員今六千五百餘員臣勘㑹學士院兩省已上官具員景祐中四十餘員今六十餘員臣任御史中丞將本臺班簿㸃算景祐中京朝不及二千員今二千八百員臣判流內銓取責在銓選人畢竟不知數目大約三員守一闕略計萬餘人十年之間所增官員之數如此若更五七年後其將奈何員數既多賢愚同滯才不才又難分别勸罰不立士鮮全行此則天下之所以日不理也今略數入仕之門禮部貢院所放進士明經外近例率以舉數編排别試名恩澤人每榜不下三數百人文臣兩制兩省少卿監以上每歲奏廕子弟諸路轉運提㸃刑獄正郎及帶職員外郎遇郊恩例得奏䕃子弟武臣自諸司副使軍職大校以上至於宫掖嬪御內臣近職每歲或遇郊恩奏廕皆有常例又文武官因職任或致仕遺奏及諸色特恩録用者又諸班殿侍三司軍大將內外胥吏牙校出職如此計會每歲入官之路徼幸攀援日生新例不可勝數糜費廩祿煩擾吏民經營闕次因緣請託各為身計衣食之所迫逼奔競滋長勢使之然澄源培本在陛下命令而已乞令中書樞密院各具逐年諸色入仕名目及人數取其徼幸弊濫尤甚者逐色别立條約稍加裁損其屬三司殿前司羣牧司等處酬奬條貫亦乞各委明敏練事近上官員重行詳定臣聞先朝以前雖將相大臣之家子孫猶多白衣未仕今自少卿監以上輒每歲任一人不亦過乎如此之類可謂徼幸弊濫尤甚者稍加裁損未為傷事也若只因循今日之例人浮政濫轉恐甚矣手詔云牧守之職以惠綏吾民而罕聞奏最將帥之任以威服邊境而艱於稱職豈制度未立不能變通於時耶豈簡擢靡臻不能勸勵於下耶此又以見陛下愛恤蒸民不忘邊患之意也臣請只以祖宗時事言之祖宗之時文武官不立磨勘年歲不為升遷資序有才用名實之人或從下位便見超擢無才用名實之人有守一官至十餘年不改轉者其任監當或知縣通判知州有至數任不得遷者故當時人皆自勉非有勞效知不得進故在所職次率多修舉以其用人無定格惟才是用自祥符之後天下治平朝廷之議益多寬大故令自監當入知縣知縣入通判通判入知州皆以兩任為限又令守官及三年者與考課改轉後又不限在外在京在任不在任但纍及三年即例得磨勘先朝行之人始知恩未見有弊及今年歲深久習以為常皆謂如此遷升本分合得無賢不肖莫知所勸故牧守之職罕聞奏最此實制度不能變通于時者也陛下如欲變而通之合稍釐革此制其應磨勘叙遷者必有勞績可褒或朝廷特敕擇官保任者即與轉遷如無勞績又不因保任例更增展年考庶乎人稍知勸勉於自效其保任之法不當一例應須選擇清望有才識之人即命舉之如此則是委執政之臣舉清望官委清望官舉親民官也有闕員隨員數令舉又足以見聖恩急才愛民之意此亦小變今弊矣至於將帥之任在駕馭得術仍宜久於其職李漢超自太祖時任濟州防禦使兼關南兵馬都監至太宗朝擢授應州觀察使仍守關南通十七年北人畏服不敢窺邊止得一改官而已太宗任郭進西山巡檢二十年賀惟忠守易州十餘年李謙溥守隰州十年姚丙斌守慶州十餘年董遵誨守通逺軍十四年侯贇守靈州十餘年真宗任楊延昭守髙陽關亦九年假之事任闊略其細故不為間言輕有移易責其成效而巳又不與髙官常令其志有所未滿不怠於為用也今則不然武臣指邊郡謂之邊任假之為發身之地歷邊任者曾無寸勞薄效不數年徑至橫行刺史防團廉察能飾廚傳熟於人事者即以為才而又移換改易地形山川未及知軍員士伍未及識吏民土俗未及諳巳復去矣將何以服邊境而得稱職是由揀擢未得于理故下不知所以勸勵者矣願陛下鑒祖宗之故事重爵賞以待功勞責久任以勸能效亦馭將帥之一節也手詔云西北多故敵變難常獻竒譎空言者多陳悠久實效者少預備不虞理當先物此可以見陛下安不忘危思患預防之逺慮也國家自祖宗以來不急于邊疆之功以愛民安人為上急而巳昔太祖但以豐財練兵保邊為事嘗積帛內府謂左右曰北人若敢似昔時犯邊我以二十匹絹購其一人首料其精兵不過十萬我用絹二百萬匹其人盡矣壯哉聖人之謀兵法所謂先為不可勝以待敵之可勝者也臣前所陳國家畜養冗兵竭天下之力而且成禍胎矣今每歲天下賦稅之外只東南和買紬絹自是三百萬匹而衣賜諸用度猶不能給則公私安得不匱乏哉此乃不待敵國之患而我固巳先困矣備預不虞理豈如此臣願陛下試詳臣前言減兵節用擇吏選將重慎賞罰以明勸寵以春夏之月稍移邊兵就食內州稍減邊騎就牧內地邊費省則國計足民力寬然後外謹信誓內完守備悠久實效無先於此竒譎空言又何足聽此亦先物之理也伏惟陛下至仁盛德髙明博大勞謙寅畏以求理要斯帝堯之詢于衆大禹之不自矜先格王之懿蹟陛下裕然而有之臣愧于頑疏不達治道據詔問所及謹以近事上對其詔㫖所不及者亦不敢僭易有陳也干冒天聰臣不任隕越待罪之至慶厯七年二月十六日仁宗皇帝御資政殿兩府兩制兩省官面賜手詔令就座條對宰臣陳執中樞密使夏竦等請各就夲司對上上許之是夕某宿直禁林夜漏五鼓封進此對再對御札一道御札所有手詔該說不盡如卿更有所見仰子細陳述具實封奏聞對臣奉十七日御札所有手詔該說不盡如卿更有所見令子細陳述具實封奏聞者天㫖訪逮承命惶栗學識淺陋愧不能副聖明求理勤切之心臣竊惟士大夫之遭時事主雖有長才逺慮欲一自致而莫之得也今臣何者而遇陛下深懷抑畏虛心聽採不有天下之樂而以天下為憂臣敢隱情悼害有所不盡者歟伏詳前詔所問冗兵措置之宜國計盈虛之夲仕進多門之濫牧守乏人之由將帥簡擢之體西北預備之術此皆當今切時要務聖意慮之固已深矣今被㫖俾得更陳所見敢推愚心嘗所念慮之事擇取其尤急者以獻焉今兹聖心因昨保州恩州之變得無常以河北為意者乎臣嘗歎國家竭天下之力以養冗兵而且成禍階然河北比天下為尤甚何也河北自唐天寶安史叛亂之後繼以五代後唐後周皆因魏以為業故河北軍素以驕悍自處又北接契丹朝廷亦嘗姑息之承平雖久而驕氣不除在於事體亦難處置欲選擇軍校以嚴整之耶則河北軍員盡是夲營遷補不比在京及諸道可以轉員移易也欲揀選上京别補軍分耶則河北軍盡是夲營子弟姻婭蔓連根固樂土重遷不比在京及諸道可以選募轉徙也欲升遷軍分以利動之耶則河北軍衣糧素厚難以更行增給以此處置為難臣曾勘㑹河北廂禁軍僅二十萬人禁軍五之四然嘗體問其中老疲不任征役者甚多若朝廷密諭安撫部署司及轉運提刑官員此後一切且住招填令依常例旋行揀放頻作番次揀選少作人數放停使由之而不知無得漏露朝㫖歲年之後稍稍團併據所關指揮自京禁兵就逐州駐劄夫自古以來置兵之法漢則南北軍七校唐則兩軍十二衛必須離析其勢使相持制然後平也河北兵自唐以來驕悍跋扈但以土兵相黨爾今若漸消土兵稍置禁旅則主客之形可以相制若統之以能將撫之以能吏折其蘖牙去其害羣者庶乎置器以安也今兹聖心因昨衛士震驚宫省得無以親衛為意者乎臣按周官虎賁氏掌守王宫皆士也趙左師觸龍託其子為太后願補黑衣之闕以衛王宫蓋王宫之衛兼用卿大夫之子弟也秦漢官儀郎中令掌宫殿掖門户三署郎皆執㦸侍衛期門比郎無員多至千人後更名虎賁郎羽林次期門取六郡良家子弟充之又取從軍死事者之子孫養羽林教五兵號曰羽林孤兒歷代以來宿衛之士不惟選材武必取馴慤莊願之人以其近尊者不可不慎也國初循周朝軍制置諸班直備爪牙士屬殿前司又置親從官屬皇城司掌啓閉掃除之役守衛扈從之嚴其宿衛之法殿外則相間設廬更為防制殿內則專用親從最為親兵也然募制之法則異於古皆惰游無根蒂莫容其身而後應募者矣前此變故卒生意外臣恐當有以懲創之臣職在詞禁軍旅之事未之預聞輒約古制粗陳其要惟陛下擇焉若於諸班直中選其年勞久次者至于東西下班殿侍有門閥家業者及諸軍中死事者之孤稍有材力勝兵者嚴立保委之法選取千人以充殿內之衛仍領屬皇城司令樞密院殿前司立定選補格式歲月更代之法歲滿則優遣之願留者令皇城司保任委是莊願謹良則聽留蓋取之以年勞久次則人以為出身之地取之以門閥家業則有家族之顧取之以死者之孤則忠義之人知勸立年更代則人知勞逸得均遷補有式則人知自重若其功過之准教習之法居處之制頒給之例即請自朝廷裁議今兹聖心思冗兵之為患憫國用之不給得無念其所以致然者乎臣聞太祖皇帝訓齊諸軍法制甚嚴軍人不得衣皂但許衣褐其制不得過膝豈有紅紫之服葱韭不得入營門豈知魚肉之味每請月糧時營在城西者即於城東支營在城東者即於城西給不許雇車乘須令自負以勞役之嘗問左右後唐莊宗何以致亂或對曰莊宗不能御下嘗出獵軍士至攏馬首自言兒郎寂寞望接借太祖拊髀嘆曰莊宗得天下大艱難所為乃如此我于三軍亦不惜財敢犯我惟有劍耳故是時令行禁止軍士亦以足用今則異矣臣嘗入朝見諸軍帥從卒一例新紫羅衫紅羅抱肚白綾袴絲鞋戴青紗帽長帶紳鮮華爛然其服裝少敝固已恥于衆也一青紗帽市估千錢至于衫袴蓋一卒之服不啻萬錢今之上四軍請給比諸軍為至厚然月受千錢正可買得一帽耳度所戴帽歲須二枚補染服裝須要鮮潔則於諸事略稱此也計其所受廩給不足一身之費若有妻子爭不得饑凍妻子既不免饑凍小人之情豈能不歸怨于上此軍情所以易動也至於常程特支例只對料錢勘請朝廷一次特支在京約用錢三十萬貫及入軍人之手何足為用是朝廷不勝其困軍中殊未有濟所以至此者由乎習侈汰之弊也願陛下因清閒之餘試召軍帥如此問之便可密令條陳以何術可以革今日之奢靡以何道可以復昔時之朴素如帥臣能自節約以身率下則軍人庶乎可以存濟矣今兹聖心以近日諸道州郡軍民搆造妖事往往起大獄得無欲以深刑峻法懲止之者乎臣竊惟陛下御極於今且三十年其甚盛德之事所以感格天地結洽人心之深者以其至仁慈厚好生惡殺急深故之罪寬縱出之罰哀矜庶獄惟刑之恤也近因貝賊挾妖為亂朝廷又追核李談之獄張存等例䝉重罰州郡承風覺發妖事所在成大獄至于誦經供佛符呪禁術盡遭捕繫蔓延平民豈無姦人乘便構造疑似以干賞利或挾讎怨更相攀引搒掠之下何求不獲今臣見判審刑院夲院奏案七十餘道內二十餘道係是妖事雖近降朝㫖嚴加止絶但恐今後官吏斷獄指李談為鑒戒無復更用平恕之心文致鍛鍊慮成後悔臣聞賞罰猶風也人情猶草也草上之風必偃人情隨賞罰而遷矣臣惜陛下三十年之甚盛德功虧于一簣寶元之後國家多故邊郵繹騷人事紛紜災異屢見中外屬任之官鮮著事效推諸人事勢可憂已聖心焦勞寅畏祇厲日慎一日迄此乂寧獨賴陛下至仁慈厚之德所以感格天地結洽人心之深者也奈何輕用刑獄以危天下招致沴氣以速民怨者乎此月十六日立夏可以挺重囚出輕繫願陛下先期臨軒疏决在京罪人因遣使四出應州郡見禁妖事令依近降聖㫖除情涉不順者具案聽裁外餘並釋免仍切敕逐路提㸃刑獄司覺發部下刑禁枉濫及有枝蔓良民務在清平不失有罪而已仍告諭官吏無得以張存之故因用深文從事上全聖德下安人情斯社稷之長慮也凡臣所陳實時要務然皆事之一節耳至於天下大勢臣請為陛下言之臣觀古今治亂之變不在其他只在上下之勢離合而巳上下之勢合事無大不成上下之勢離事無小不敗比年以來朝廷頗引輕險之人布之言路違道干譽利口為賢天下承風靡然一變又外人議論展轉緣飾沽激倣效惟恐不及敗壞雅俗遂成險薄內則言事官外則按察官多發人閨門曖昧年歲深逺纍經赦宥之事而又諸色小人下至吏胥僮奴觀時得逞敢犯于上構造辭說朝廷便行濟以愛憎何所不至故自將相而下至于卿大夫士惴惴危恐莫有泰然而自安者一動一為輒曰恐致人言也料此以至陛下宫省左右前後下逮閭巷庶人亦莫不然更相姑息専避嫌疑苟且因循求免謗咎何暇展布心體為國家立事者哉臣竊詳聖意豈欲人情風俗之若此歟但以其所由來者漸矣自上及下無不知此者但莫肯為陛下深切開陳之也理道之壅無大於此上下之勢離阻若是則誰與陛下同心一德而深謀逺慮者哉既無同心一德之人深謀逺慮之事則天下之務何以致治願陛下深為留神務在通上下之情欲上下之情合在審於聽受而已臣自參侍從陟降十年對法座聞德音多矣觀陛下之寬仁矜惻如天之無不容也英睿明智如日之無不照也彼浮淺狙詐之人亦何有遁形于天日之下者然臣聞聖人作罰宥過無大刑故無小欺罔險譎是為真姦偶虧檢防是為小疵若陛下察其真姦必正國典寬其小疵以全人用則有臣億萬自當一心隨才大小孰不傾盡此所謂合上下之勢誠君人之大體為國之大方也願陛下於此特加省納焉臣識慮迂疏不達理要本末簡擢盡出聖恩浮沉著位愧無補報矧被咨訪敢不盡愚上黷宸聰不任戰汗惶栗之至謹對十七日早未趨朝內降此問當日晚具對封進應賢良方正能直言極諫科對制䇿一道景祐五年八月皇帝若曰朕䝉積纍之休蒞幅員之廣寅畏天命以康元元思欲恢祖宗之逺圖追皇王之極治躋俗于仁壽之域陶民于禮義之化兢兢業業不敢怠遑焦心勞志十有七年于兹矣而明不燭逺智不通幽奉承謨訓唯恐失墜故深詔有司詳延天下特起之士冀聞忠讜實至之言以輔朕之不逮子大夫卓出羣萃褎然造庭必有宏謀以塞虛佇國家誕膺寶命奄甸中區三聖繼明禺邦作乂除殘而革暴蠲苛而薄賦稼政修禮文縟愛人甚于赤子縻賢同夫白駒竒傑魁壘之士列位于朝循良慈惠之長分政于外求治若此可謂勤且至矣然而格之前載猶或異論法制寖講而未協厥中經費實繁而未得其節樂未諧于韶濩刑未措于成康官師或昧于亷平風俗頗虧于素朴夷貊雖率化而時有陵犯邊鄙者嵗時雖嘉靖而時有警戒變易者將朕之不德使之然邪抑物之有數適當爾邪子大夫其精心極慮無有所隱古之制度可用於今今之章程有盩於古並宜條列勿事猥并立樂之方何以格神祇而來瑞物祥刑之要何以空囹圄而致和氣至于遴揀多士懋建庶官咸有前規可為來範唐氏考功之格善最悉陳漢家刺部之儀科條具舉士民之類愚衆賢寡奢僭相尚習以成風不嚴而化其術安在恣睢强寇何以革其非心漠然大鈞何以致其順序且道者萬世無弊而前經有忠文相救之說法者百王不易而舊典著輕重異用之宜戴記為國有九經所宜詮次周官辨地以五物咸為敷陳式副咨詢且觀殫洽固將施之於行事匪獨取之於虛文悉意以陳無撓執事對臣聞昔漢氏始舉賢良文學士而䇿以當時之大政凡治亂之故施捨之宜使以經對所得善者輒施之於政故文景之朝制度興作比隆三代得人之盛由此其選也今陛下上承先志遐稽治古祇惕乎安安之難戒慎乎事事之備數詔方聞之士延致大廷臨問以保邦制理之道以通天下之志以成天下之務兹誠抱器而有心于生民者發舒其憤願之會臣不佞學不足以通天人之變識不足以達古今之務而竊有志焉乃今承乏靦然塞舉大問所及豈臣愚所能通者雖然敢不以承學所聞謹昧死上愚對臣伏讀聖䇿見陛下寅畏天命以康兆民為心奉承謨訓以恢逺圖為志期躋俗于仁壽思陶民于誼禮而退託於不逮以求忠讜之言斯以見陛下虛懷於聽受之勤也伏以聖䇿有除殘去暴之言及蠲苛薄賦之念列愛人縻賢之道叙列位分政之良斯又見陛下勤恤小民之依以深察其微隱勵精庶政之化以博用乎人才此帝堯之協和萬邦周文之思皇多士而猶慊然興嘆逖懷治古請為陛下廣其義焉昔聖王之所以能見天下于户牖之間運萬化于股掌之上者非為一人之明且智可遍見而盡察也使聰明者竭其視聽智力者盡其謀能則事無所遺政無不舉矣欲事無所遺在乎廣言路欲政無不舉在乎正有司臣聞書稱舜之德曰詢于衆伊尹曰匹夫匹婦不獲自盡人主罔與成厥功古之興王咨嗟戒慎莫不針敕其羣下俾補察其政故在輿有旅賁之規位寧有官師之典倚几有誦訓之諫臨事有瞽史之導猶衆楚人咻之求其齊言不可得也古之明君思興治道曷有不先廣視聽以平王度者乎昔漢魏相白去尚書副封以防壅蔽而宣帝得以知萬機之微為漢明主唐太宗著司門式云其無門籍人有論奏者皆令監門司馬引對不許關礙又制大臣入論事輒令諫官同入或對問之言有虧道理隨即爭之此唐文帝致太平之迹也今朝廷司過拾遺之職惟御史諫臣凡厥庶官無得出其位而言者臣願陛下深留聖慮逺惟治方益進端亮骨鯁之士以旦夕承弼清閒之餘對臨之際訪之古訓爰及政事則嘉謀日聞于黈纊誠士各薦其見聞夫如是則何逺而不燭乎臣聞夫子曰必也正名乎春秋之義君不尸小事臣不専大名故尊主其要卑任其勞人君佚于任使仰成而治三公論道九卿分職羣有司各事其事以故庶務百職夲末滌理今夫津官亭吏一命之微米鹽貨利毫杪之細莫不關决衡石經煩清衷三公下任卿大夫之勞卿大夫旁領羣有司之事職分名局不歸臺省政失其本事忘其舊惟陛下考理之要清化之源莫若謹諸關柅執其機轄委任三吏切摩治夲使夫總百揆者則謀建庶官之長列庶官之長者則各選衆職之任付之柄而要其效盡其材而責其成官守典司無相侵紊有廢厥職必正于罰如此則陛下以無為用天下羣吏莫不各有為而為天下用要在于上詳在于下上下正則天下治矣夫如是又何幽而不通乎方且優游巖廊之上拱揖羲軒之庭不為而功成不勞而治定易曰知臨大君之宜此之謂也伏以聖䇿曰今竒傑魁壘之士列位于朝循良慈惠之長分政于外求治若此之勤猶未格于前載者臣伏讀至于再而切有感矣臣誠深嘆陛下有英睿之度而臣弼乏將明之材因循蔽欺偷取一切不能作法於治不能革弊於細獨貽陛下兢兢之憂也誠使朝皆竒傑則朝廷重而百度正外皆循良則上下交而其志通雖甚盛德何以加此又何前載之愧乎以臣之愚正謂朝位鮮魁壘之器外官寡慈惠之師未足以副聖心愛人縻賢之念爾雖然奇傑乃間世而出循良非比肩而有亦在人主推擇而聳勸之爾何以言之列位于朝者忠邪不可不辨也分政于外者宰牧不可不重也臣聞伊尹戒太甲曰左右惟其人周穆王命伯冏為太僕正曰僕臣正厥后克正僕臣諛厥后自聖㫖哉聖賢之究治夲也堯舜禹大聖智者然猶相與歎以不知人為憂此九德所以為帝謨也至于夫子亦以為知人之難堯舜其猶病諸夫知人之所以難者以其巧言令色之賊實也夫世之治亂君之昏明臣之忠邪所更而有雖治世明君不能使其立朝居位舉忠賢而無邪佞者也由能親忠賢而疏邪佞者爾雖亂世昏君亦未必立朝居位舉邪佞而無忠賢者也由其近邪佞而逺忠賢者爾故堯舜之朝稷契班乎共鯀幽厲之朝蘇衛儕乎榮暴顧上所親而近者孰恱焉夫欲辨朝位之忠諛者考其所朋之迹而志行見矣察其施作之謀而材智詳矣忠莊而端直斯則雪霜之松柏矣諂從而容恱者斯則疾風之蓬蔂矣進斯人也原其譽之所自退斯人也察其毁之所出拔茅以彚必有類也如此則列位之縻賢頗得竒傑魁壘之士矣臣聞民政之夲在乎牧宰而朝之選任其制甚輕銓審補除初無差擇計階而授循資而遣或罷弱昏亂狠頑貪忍流毒于下窮枉無告刺守奪于權利坐視其弊而莫之聞者地相接也夫夲既失之姑正其末猶愈於不正也昔在兩漢雖有刺史督州而又時遣使四出察羣吏之治故前漢則有繡衣直指傳行四方得専免二千石後漢則有美俗清詔之名以按郡國唐雖有採訪按察之職而亦時遣郎官御史出廉外事誠國家舉用漢唐之典精選臺閣之臣才識深明風度方重者時遣分道以察郡縣守令能否之迹具善惡而入報示賞罰於必行如此則宰牧之官心知勸懼郡縣之政稍以澄清夫是則治民分政者頗得循良慈惠之長矣聖䇿曰法制寖講而未協厥中經費實繁而未得其節樂未諧于韶濩刑未措于成康官師或昧于廉平風俗頗虧于朴素此以見陛下無微不講無小不慮者也夫法制所以未中以其命令之數易經費所以未節以其用度之無藝樂未諧于韶濩以其工師之失職刑未措于成康以其貨利之亂制官師或昧于亷平以其澄勸之義廢風俗頗虧于素朴以其分度之禮踰臣請為陛下悉數以終之臣所謂法制所以未中以其命令之數易者聞之書曰愼乃出令令出惟行夫命令者國之綱紀政之隄防綱紀一弛則萬目隨解隄防一傾則橫流莫制故為國之夲為政之原信為大也比者命令布下尋復衝改是以郡縣承用者駮姦吏巧詆因緣為市民無所措手足而多犯于有司揆大體而論之此損政之深者儻朝廷出令事干大政必集議而後行下于多方必一定而無變略其苛細刪諸重纍俾萬姓咸曰大哉王言又曰一哉王心如此則法制允當協于中理矣臣所謂經費之未節以其用度之無藝者伏以承平之日久是故因循之弊生日知其所增歲不知其所減此費之所以煩也陛下幸加惠思所以撙節之理臣謂宜以約處之而巳宫室臺榭足以順隂陽之候旌旗羽衛足以昭文物之容苑囿池籞足以備游豫之行音官樂部足以具燕享之禮自餘土木之不急者舉罷容衛之罕用者勿飾寬池囿之利下賦於貧民省音樂之伎稍斥其冗食減後苑之工巧息匠司之營繕愼無名之好賜約無功之匪頒罷緇黃之厚施節一切之橫費以緩天下水旱之賦以為國家帑廩之實以濟疲農工女稼穡之勤以整老弱孤寡饑勞之殃如此則德澤被于天下而經費有節矣臣所謂樂未諧于韶濩以其工師之失職者昔舜命九官䕫實典樂漢史叙得人之盛而儒雅質直與協律並列又漢制卑者之子不得舞宗廟之酎歷代而下樂府令丞多用士大夫均聲考律其義微矣故師胥瞽矇古所甚重也今夫執伎以事上者厯象則有司天之監醫藥則有翰林之署至于琴奕書畫一藝之微者莫不厚賦廩稍間䝉寵賜太醫諸工真古者大夫士之職也謂宜略依司天為之官次補用知鍾律之士以充其選擇取儒師為之令丞使習其精義通其鍾吕雖名異于韶濩而可以薦天地享祖宗其義一也臣所謂刑未措于成康以其貨利之亂制者伏以國家之在宥天下一統治平德教加於蒸民其陶化抑深矣陛下臨御區極欽恤庶愼急深故之罪寬縱出之罰有慘怛之愛有忠利之教而刑未之措獄繫猶蕃其故何由蓋上之籠貨物漁財利之路多管𣙜封占之法密間之以權豪富室侵奪貧細吏務因循或引賕賄不能抑强扶弱是以小人業蹙窮而思濫者衆矣誠朝廷愼擇守宰摧抑豪猾稍寬利路以優齊民刋定律令除文致毛細之法務從簡易便於遵守使民不敢欺冒而試法吏無以輕重而舞文則刑雖未盡措而羅穽寬矣臣所謂官師或昧于廉平以其澄勸之義廢者按周典小宰以六計弊羣吏之治雖治行不同而同主于廉故馭吏之法麗重惟貨而受賕抵禁相繼有焉意者官刑稍以寬弛部長多所故縱歟夫貪利侵刻下民善事上官腹心爪牙各有施設及貫盈滅趾官以墨敗而又赦令屢下亟䝉釋解丹書未乾已冀收叙此所謂官刑稍以寬弛者也今夫令宰有濫黷之迹而守倅縱不考驗守倅有貪暴之政而司官隱不上聞及乎惡積而不可掩事播而不可逭罪止不察厥罰至輕倘使諸統攝之司及于聫事之職贓罪相坐以重其纍則人自為計下無容姦矣夫峻刑苛禁誠非治世善化之意然今風俗流溢踰軌者衆不嚴官制何以立法猶乎馭駻突而不利乎銜䇿且奔踶而僨蹶矣古所謂惟齊非齊者謂此道也臣所謂風俗頗虧于素朴以其分度之禮踰者書曰惟民生厚因物有遷違上所令從厥攸好故君人者章好以示民俗愼惡以御民淫夫風化之所起必由上以達下內而及外且萬邦表則在乎王國今夫雕飾巧僞之器竒邪纎靡之服陳鬻于市流于四方詐僞姦欺聚為淵藪按周官以儀辨等則民不越以度教節則民知足古之制民者使之雖富不異服無故不食珍納幣無過五兩合親不踰一肉故王道之端必自制節始也謂宜益條其僭侈之弊惟事事為之分度所示制令期于必信如此則爭奪踰靡之俗革禮義敦厚之教行矣聖䇿曰夷貊雖率化而時有陵犯邊鄙者歲時雖嘉靖而時有警戒變異者兹又以見陛下過虞冦聚之漸祇畏天戒之重也然陵犯之擾匪特徼裔之强敵變異之來兹乃隂陽之大事何陛下問之後乎彼羣蠻依溪峒之險恃林嶺之阻窺伺無備潛出攘掠結集如蜂蟻飛迸如鳥獸守臣無狀自投亡地然此之區區者亦何足以纍國威煩聖慮哉臣謂邊事之重其在西北乎北國通好於我餘三十年自漢氏巳來南北之和而能堅守信誓如今之久者未之有也非惟懷我恩信利我聘幣抑當我盛德之世無釁可乘夫以利相結者利盡則交疏以勢相合者勢解則難作故有備無患謂之善無恃不來在乎多算又西陲雖受羈縻姑息蓋久自國家失朔方棄靈武置戌內地控扼益蹙雖貢職外謹而巢穴內堅鄙上之防不可不戒且自唐氏中世以降兵農之業離文武之權分而政事不齊國謀相乖矣今之邊事根本在于廟堂措置設施固非下臣所得而詳然三軍之命繫於主帥是以擇將之重兵事之本臣請因平冦之問著于後篇以言之深惟陛下以天日髙明之德承祖宗淳耀之靈夙興視朝中昃勤聽敕天之命臨此下人無疆惟休亦無疆惟恤宜乎自天降休百嘉來應而災異數作譎變仍見上天勤勤之意諒不徒發而必有所屬也間者殞星如雨流擾失次地震定襄裂而湧泉雷不收聲泄于窮冬又正月以來日䝉少光輒或數日不解臣鄙儒昧于天官之學竊考春秋之義及前志天文五行之占其咎皆由乎陽德微弱隂道専縱下為阿比盜用威柄者也夫隂之為象臣道也妻道也外國之道也天意若曰將俾陛下察左右之姦正宫闈以禮謹邊防之備者乎夫人君之道所以配乾而法天者蓋取乎乾體之剛天行之健也剛故中正無邪健故運用不息洪範曰惟辟作福惟辟作威春秋之義譏大夫之専者夫臣下能竊威福之柄亦不専在乎執政當國者苟信聽之或過則欺誣之隨生蟻漏壞隄炬遺燎原杜漸防微在愼厥始此所謂察左右之姦者也若夫防戚黨之侵預絶女謁之請求御進取周典之文均選循漢氏之制戒留連之害政事省幽怨以延和氣此所謂正宫闈以禮者也若夫將校之列思其智勇可任者為誰卒伍之衆察其鋭驍無前者有幾邊壘守將孰有扞城之材帷幄謀臣孰有折衝之算至于儲峙輸發之術兵械精完之數有一未備非先勝之道也此所謂謹邊防之備者也夫是三者惟在陛下存神而逺照凝慮而深思利柄勿以假人主威貴乎獨運雖篋櫝已固扃鑰不可不嚴雖垣墉既修關鍵不可不設用乾剛以弭隂異謹人事以應天心如此則災異不足消休祥不足致也且聖䇿俾人精心極慮無有所隱臣既冒陛下斯舉矣敢悼後害而為身謀者歟亦在陛下寬狂妄之誅以來天下至當之言焉聖䇿曰古之制度可用于今今之章程有盩于古并宜條列勿事猥并臣謹按春秋之義譏變古易常者而又善變之正者蓋國之善制不可輕變其未至者變之可也伏以先制舊法彼此一時事體權宜各有云設誠大制度或大典章為世規摹著在甲令故當守而勿失謹以奉行至于凡小事為因時消息或迹存而理異或法久而姦生必踐而行以為無改於祖宗之道此所謂膠柱而鼓瑟刻舟以求劍者易曰窮則變變則通通則久故復而不厭久而不弊之謂道昔先王之作為爵祿賞罰以親攬其柄是以為天下之主見勞授賞則衆譽不能進無功見惡行誅則衆讒不能退無罪若政無大小人無善惡進退用舍一取諸舊是爵祿賞罰不在人主而在例也與奪之柄於陛下何有臣願陛下革弊去蠧無不忍之愛拔材賞忠無踈賤之隔大稽諸古小度於今使天下之耳目常新萬務之本原必正無曰引例合義而巳如此則古之制度斯用于今今之章程自合于古矣帝王之制不亦光大乎聖䇿曰立樂之方何以格神祇而來瑞物祥刑之要何以空囹圄而致和氣臣前所謂謹工師之職齊貨利之制者備矣夫樂作而順氣成象則和和則瑞物至矣故䕫曰於豫擊石拊石鳥獸蹌蹌簫韶九成鳳凰來儀刑得中則清清則和氣應矣故周官曰以刑教中則民不暴夫是則和氣其有不通乎聖䇿曰遴揀多士懋建庶官咸有常規可為來範唐氏考功之格善最悉陳漢家刺部之儀科條具舉臣按唐六典考功考課之法有四善一曰德義有聞二曰清愼明著三曰公平可稱四曰恪勤匪懈善狀之外有二十七最獻可替否拾遺補闕為近侍之最銓衡人物簡擢良材為選司之最揚清激濁褒貶必當為考校之最禮制儀式動合經典為禮官之最音律克諧不失節奏為樂官之最决斷不滯與奪合理為判事之最部統有方警守無失為宿衛之最兵士調習戎裝充備為督領之最推鞫得情處斷平允為法官之最讎校精審明於刋定為校正之最承㫖敷奏吐納明敏為宣納之最訓道有方生徒克業為學官之最賞罰嚴明攻戰必勝為將帥之最禮義興行肅清所部為政教之最詳録典正詞理兼舉為文史之最訪察精審彈舉必當為糾正之最明於勘覆稽失無隱為勾檢之最職事修理供承强濟為監掌之最功課皆充丁匠無怨為役使之最耕耨以時收穫成課為屯官之最謹於蓋藏明於出納為倉庫之最推步盈虛究理精密為厯官之最占候醫卜效驗居多為方術之最譏察有方行旅無壅為關津之最市鄽不擾奸濫不行為市司之最收養肥碩蕃息孶多為牧官之最邊境肅清城隍修理為鎮防之最類其善最校定內外文武官吏之課為九等焉漢刺史以六條察所部二千石其略曰豪右兼并占田過制曰二千石納引賕賄曰喜怒任情曰選署不平曰子弟請託曰違公下比此科條之目也聖策曰士民之類愚衆賢寡奢僭相尚習以成風不嚴而化其術安在夫戒奢防僭之術臣既略陳于前矣蓋民之為名謂其泯然無知辨者愚之衆也所稟蓋然其動靜趣習惟上是視故曰君子之德風小人之德草草上之風必偃言下化上之速也在易履卦象曰君子以辨上下定民志故上下誠辨則民志斯定矣其在節卦象曰節以制數度議德行夫數度有等則貴賤章别德行見奬則賢愚自分此則節之本也陛下念民習侈屢以為問有以見聖意之深憫乎末俗之不厚也間者頒下詔㫖戒服用之尤溢者偷靡少損矣然未足以稱陛下淳儉之教意者民之所效者其本未正歟春秋之義法之所建必自貴者始陛下誠欲清天下之弊其自諸戚里豪貴大臣之家以先之上徐趨而下奔走矣不嚴而化此其術也聖䇿曰恣睢强寇何以革其非心漠然大鈞何以致其順序者夫制馭邊陲臣既列于前篇矣其擇將之事請得復盡焉今禁衛千幕環絡京甸什五相長偏禆相承六軍之重統乎元帥而皆起奔走之勤舊積恩澤以稍遷以軀力為武以引强為材智不足以達機變惠不足以撫部伍冒沒寵利優游太平輕肥相夸坐受姑息設不幸遐陬有嘯聚之寇邊隅有侵牧之擾雖受成于上指縱在人非惟師律之不臧智勇之無恃是其肯委易得之富庶冒難死之鋒刃乎故將不知兵主不擇將無功厚賜無勞重祿皆法所忌者也向者朝廷念將帥之材難是以擇搢紳之能者然其所得率多善奔走人事以為寵利之路而已其鈐略才藝不謂無之然固鮮焉誠國家因為科條損益其制使夫衣冠之應詔者為設機宜十問以䇿之必有稽於軍志精合於時體者為通擢之理戎參于列校其方略智勇固未之盡抑猶愈于徒進者也至于和大鈞致大順兹由民心下和則和氣上應爾時使薄斂以富之緩刑弛力以佚之制節謹度以平之擇吏審令以安之是以政和則民和民和而後隂陽和隂陽和則大鈞調而順氣序矣聖䇿曰且道者萬世無弊而前代有忠文相救之說法者百王不易而舊典著輕重異用之宜者夫董生推道蓋探其本而言荀卿論刑蓋有所激而發彼三代之弊雖有忠文相救之說至于法天順人之意其可改乎此則萬世無弊之本也彼治亂之世雖有輕重異用之宜至于遏惡扶善之用其可殊乎此則百王不易之制也聖䇿曰戴記為國有九經所宜詮次周官辨地以五物咸為敷陳夫為國有九經者修身則道立尊賢則不惑親親則諸父昆弟無怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之此為國之九經也周官大司徒之職以土會之法辨五地之物生一曰山林其動物宜毛物其植物宜皂物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黑而津三曰丘陵其動物宜羽物其植物宜核物其民專而長四曰墳衍其動物宜介物其植物宜莢物其民晳而瘠五曰原隰其動物宜裸物其植物宜叢物其民豐肉而庳此五地之物也聖䇿曰固將施之於行事匪獨取之於虛文兹以見陛下虛已以咨詢留聽于葑菲者也臣才識迂鄙不通於政至于所發亦庶幾有以上當聖心者陛下不廢其言擇其近似者粉澤而用之使天下知國家設科取士之道不為虛名則豈惟臣之獨被寵靈也哉固朝廷之盛美者已臣昧死上對次年夏戎阻命西邊用兵朝廷多事矣又二年契丹來渝平樂全集卷十八
