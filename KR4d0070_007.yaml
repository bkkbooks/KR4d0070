body:
  text: 樂全集卷七宋張方平撰芻蕘論主柄論夫人君宅海域之位以據辰極之尊攝天地之政以主名器之重言為法令動為制度其所以藏身之固者賞罰二柄而已故萬邦黎獻共為臣僕義勇投命賢傑效智挾藝能者懷爵祿而畢力暴威武者顧斧鉞而死心巍巍乎南面而臨天下人用畏戴由私有二柄而公用之也是謂天之大寶必由受命而得是謂國之利器亦以假人而失故明主誡慎視聽感發寤寐以求道德之老忠信之臣賢正之才慈惠之士以與居處以與圖議嚴恭祗畏奉若天命官不及私昵惟其能爵罔及惡德惟其賢及後佚王荒寧耽慢狎昵邪慝果行喜怒匪勤惟易柄用下失有失之閨閫有失之閽寺有失之廊廟有失之藩方原失之初率由近始雖得於外姦必在中故柄在藩方其耳目必在廊廟柄在廊廟其腹心必在閽寺柄在閽寺其肘腋必在閨閫蓋情款密者則機隙易伺憑麗重者則指擿難及伏戎于莽猶可虞伏戎于門不可虞也至乃后族戚里為虺蜴之宅北司内省為豺狼之窟台司公府為穽檻之地庶邦列都為斧鑕之塲四方相仇烝民殄瘁得非由上失其正而下罹其害者哉歴代敗亂覆車一軌觀夫僻君失馭强臣得政蓋由厚味腊毒宴安稔慝謂篋櫝已固扃鐍不足嚴謂垣墉既修闗楗可以弛倒鐏授盜脱輈自絶及姧㣲竊弄包藏結釁蟻漏壞堤炬遺燎原合抱自毫末之萌履霜為堅氷之漸以我刀鋸而威之以我衣裳而誘之皆其心腹雖平勃之謀無以遏産祿之勢蕃武之重不能正甫節之惡謝安作相弗敢阻南郡之九錫尉迥為將莫可正隋公之受遺矣故周書八柄惟王行爵祿罪誅之事洪範三德惟辟有玉食威福之專是二柄者人主所自固生民所寄命也可不慎也乎故略著前代治亂危亡之迹以為鑒焉后妃臣聞禮始乎大婚詩首於闗雎易曰正家而天下定故啻嚳之立四妃虞舜之嬪二女塗山配禹簡娀啟商周自古公王季姜任太姒世德相載故文王刑于寡妻以御于家邦夫三代之制后妃嬪御皆所以助釐陰教贊成内治閫外之事非所預聞自秦芈后始攝朝事以弟魏冉當國任政故范雎以為秦獨有穰侯天下不知有王也及漢吕氏因惠帝之早世乗間挺起干據帝座陰陽錯位根幹倒植末塗淪潰幾遷運厯孝成即祚委政王氏皇緖中㣲正統三絶外家昌大執權四世而東朝壽考為之宗主至於新莽遂盜神器逮乎東京孝安之後外立者四帝臨朝者六后地深帷幄禮間外朝莫不衡柄歸於父兄詔令專於閽寺於是有利幼之立忌賢之難邪謀陰策以圖自固匪人乗間又牽牛而蹊田正士悼心思投䑕而忌器害家凶國濫觴有漸近如唐時大帝孝和武韋之亂廟社危絶僅續如綫春秋之義君子大居正雖嗣王繼厯幼沖纘服而猶朝政緫聽乎冢宰師傅保乂乎上躬則阿衡專美於有商周公勤勞乎王家其人也故三代之道無后妃預政之理漢自諸吕之亂大臣議所立而先擇外家之賢者以定大計故孝文之入繼抑由薄氏仁良之故及武帝機識超遠深謀獨斷顧命金霍克隆基圖誠雄傑英主哉魏文帝鑒東京之覆轍立後世之長緖亦嘗作為戒誓其事可法夫六宫之位稽諸昏義則有三夫人九嬪二十七世婦八十一女御之數其在周禮則世婦女御職存而數闕蓋明君子不苟於色有婦德則擇以充位無則闕之矣自姬室衰陵諸侯僭縱秦併六國遷其後宫恣用汰心益崇爵號漢自文景務循儉德奕世累盛而至武元選納益廣嬖幸用煩至乃掖庭三千増級十四是以人君耽娛佚之樂起驕怠之感倦勤廢政亂是用長唐景龍之孽天寶之敗是皆始於女德也夫其初皆恃當世之平寧因天下之全盛罔思生民作業之勞不念四方惟正之供沈溺留連漸至蠧弊女謁干乎王度姦㣲竊乎事權帑藏以淫費而耗竭賞刑以私昵而謬濫召禍當日垂鑒後人良可哀也是故考歴代治亂之迹覽彤史得失之論擇善違失可舉而言若夫戒慎失政之方保全外戚之道則莫若賦之祿而使就第教之學而使循禮傅之以儒雅篤行之士而絶其便僻險偽之交示之以恭讓儉德之賞而懲其慢游僭汰之好以義節之是謂寵之以恩驕之是謂禍之梁竇無噍類於漢武韋不遺育於唐是可戒矣若夫體乾坤之法正閨闈之治則莫若登選良姓之種採納衣冠之緖屏卑賤之妖色斥猥㣲之淫行叙進婉順之德崇近清閒之性雨露均施照臨無頗以資昊天悠久之無疆以取文王百斯之善慶若夫保邦求理之法節用安人之善則莫若省其品號罷虛授之廩祿放其游冗節徒費之羞服裁用度以寛民力息曠怨以除沴氣是故治世賢王之修身正家愛民經國之道莫先於此也已宦者臣聞三代之制凡在君側皆卿大夫士夏商之世未聞有宦者周官雖有閽人之職止乎掌王宫中門之禁稽出入時啓閉掃門庭而已非所以預政令揔權務者也周道衰微官紀紊亂而寺人巷伯稍見乎詩傳至於秦漢列為近職然帷幄親密之地省闥左右之任宣受詔命陪從輿輦自諸常侍謁者之職多為士人儒者之選自武帝臨御長久留連盤娛數燕遊乎後庭頗疎隔乎朝士故請奏機事多由宦者而始得政矣遂為兩京喪敗之基焉東漢自孝安之後繼以女主臨朝陰勢相乗中官遂大專斷國命掌握衡軸賢才死於鉤黨黎民弊於塗炭三綱錯亂四海飜離害徧生靈毒滿區夏而桓帝乃始比超悺於伊旦靈帝方更指讓忠為翁母書傳所載覆亡之迹未若桓靈之際也唐太宗定制内省官階不得逾四品而其數不及百員但分掌五局及在閤門守禦黃衣廪食而已後明皇纘御崇重宫臣乃至爵為國公門施棨㦸中官之數遂及三千則有銜命四方監軍諸道宣傳密㫖主當要務詣一郡至一軍誅索貨賕必千萬計搖動天下紊亂朝經内則思藝為林甫之腹心外則璆琳為祿山之耳目以至養成禍變傾覆基祚於後肅宗有輔國之逼而不得全父子孝慈之性代宗為元振所掣而不能庇將相股肱之臣德宗自山南蒙塵而還不欲武臣典親兵乃置兩中尉分掌左右神策天威等軍而委宦者主之由是禁衛兵權之重悉歸於中官矣蘭錡將臣藩嶽戎帥自其蓄育由之遣置威福之柄非復天子所執元和神武之功猶不書𦵏昭愍童昏之亂宜難自全士良虎視於太和之朝令孜鴞張於乾符之後逮其季世王室如燬南北朋比中外乖疑内則隂邪惡類秉樞機外則險賊姦人居相位爭權交噬刺骨相復故崔昌遐輩連結强帥向導全忠本為自援之謀遂成移國之禍是非一朝一夕之故所由來者漸矣或曰三代而下一統承平之治國惟漢唐焉而其顛覆喪敗之禍同由此迹歴世則不然何歟臣對曰是惟一統承平之治國而後同此柄也何歟曰夫為國者不在外難必有内憂自非聖人孰能戒慎乎無患憂惕於既安當其一統為大無艱虞之急承平久治有驕汰之志匪勤惟懈逸欲是尋幾務宻猷委之近習大臣從容而議存大體而畧細故憸人窺伺其隙乗機㑹而竊事權故弊積於甚㣲慝生於所忽此漢唐之所以亂也夫魏氏至於江左疆事外擾朝廷多虞雖有暴慢之君荒殘淫僻危窘斃滅勢不得長嬖佞姧孽旋亦夷殛故上權之墜於下也無滋蔓深固之勢抑時有緩急其間不足容乎因循之暇爾臣故曰是惟一統承平之治國乃同此禍也噫弊之來也既久矣其亦奈何姑可取戒乎漢桓靈之事勿使預乎刑獄以免其誣染善良之虐乎姑可取戒乎唐明皇之事勿使銜命出使以省其怖動郡縣之威乎姑可取戒乎肅代德之事勿使侵盜軍旅以收其把握天下之柄乎是三者不失則人君之所以據圖御世士大夫之所以輸忠事主烝民之所以宅生託命可以保全而不陷於非道矣宰司臣聞天下之事政無小大繫在廟堂有圖議而後有得失有得失而後有治亂有治亂而後有安危有安危而後有存亡善議政者不使有失善正失者不成於亂善救亂者不及於危善圖危者不至於亡誠使廟堂之上協忠將救敷求俊哲列於庶位惟事事乃其有備戒慎出令無從匪彜善始慮終惟正之念又惡乎危之至哉是故人謀誠得不牽乎天時國法既脩不推乎厯數當其治法有猷庶邦嘉靖王道正直民用平康則收功在人推美乎政及乎危而弗持顛而弗扶典廢於上民亂於下則歸非於數貽咎於天是不亦近乎善則稱人過則稱天者乎古之君子善則稱天過則稱人禹稷之贊堯舜則引天之命湯武之誅辛癸則斥人之罪蓋天降灾祥在德而吉凶不僭在人已則作孽何天之怨前世遠矣略弗復論近取諸唐則天寶幽陵之叛興元奉天之逼廣明邛蜀之幸乾符豳岐之遷是皆釁起廟堂禍歸邦國者矣夫廟堂之上有得失有治亂有安危存亡有爵有賞有顯榮寵利者有兵有刑有毁家覆族者且主德成於弼直國體正於臣鄰不有英睿之君聰明之德安能照姦而顯忠不有仁義之臣忠亮之志安能協恭而底乂是故帝王之道莫大乎平心而御物輔相之德莫先乎圖大而致主有平心之度故能通天下之志而不專偏聽之惑有圖大之慮故能以天下為心而不急樹私之計蓋人君偏聽則啟讒慝之門人臣樹私則開朋比之路俾夫姦諛進身之賊稱於人主之側游説規利之士諜於大臣之門君有蔽忌之心臣行傾奪之計如是則國安得而治政安得而和是天下之大禍也故君以臣為體臣以君為心道充乎神宇則美暢乎四肢患結乎膚革則憂及乎諸慮是以臣各獻其忠則君受其效國先泰於上則家蒙其福由是言之故知偏聽者召亂之本樹私者理末之術使君行此道臣知此説天下其有不治者乎藩鎮臣聞議者曰唐失御於藩帥至於一道百城跨制千里列郡長吏出其所署戮二千石而不請專地繼世僅如戰國自安史起釁河北非王土德順姑息河南皆㓂壤章武勤勞夙夜拔材練謀極力十年粗夷險阻懿僖之後寖㣲益削朱氏兼領十鎮遂行窺逼而受終矣五代圯壞顛危相逐皆由强諸侯擁重兵而奪取焉及我太祖之受命也天謀神機風雷變動創艾前弊謀建長䇿於是不愛乎節鉞多命乎帥臣權分而勢自輕外與而内實取於後諸侯入覲漸留不遣方面都府牧伯之位更除士大夫而僚吏掾佐悉天官選補塞覬望之蹊隧覆姦亂之巢穴故四聖累盛六紀於兹寰海乂寧不震不擾門無闗鍵豈煩擊柝之虞蓄無扃鐍安容胠篋之變可謂藏身之固置器於安規摹之深逺也乎臣聞而論之曰唐自天寶之亂天下剖裂至我朝太平興國擒劉繼元靜并汾而天下始大一統生民離鋒鏑之禍伏惟祖宗之大功盛德無與較焉然三王之善制不能無敝百世之長軌難以遐御故自古無亂國而有亂君有治人而無治法利害倚伏勢數之常幽厲享文武之國桓靈繼髙光之法棄彜敗典昵邪遠正周漢宫廟鞠成榛莽夫歴世始王創基垂裕莫不鑒前之敗深思經久其為秦謀者蓋見三代之繼皆由諸侯於是有廢五等之畫為漢計者蓋見秦無盤維之固孤而易危於是有郡國雜建之策魏晉之議者蓋見陳項之事黃巾之擾乗州邑之無備遂潰漫而不制於是有都督持節之命皆所以誡覆轍遏亂略堅鑿契以抵欹壞平衡石而均重輕然其負舟而趨遷鼎奄有者則又不常在存藉世家撫宅疆宇者矣故閭左戍卒攘臂以亾秦族泗水亭長提劍而啟漢祚光武以書生起宛曹公以孝亷去譙司馬氏無凌儉之衆宋髙祖乏敦温之勢歡泰出偏禆之㣲隋文因戚里之重及其乘隙定業勢歸事濟備物九錫建國立臺比夫西伯以二分而事紂小白奉四履以勤王體迹殊矣是故鞅斯罷侯置守之筭徒見其輻轂運動之勞誼錯强幹弱枝之論蓋昧於皮毛附麗之本至於天乙之後王室數衰每及賢王九琛復㑹周厲之削宣王中興秦天下一家二世遽滅惡在乎郡縣而安也且唐之授厯幾三百年内難四興外冦三作大帝孝和禍稔帷薄憲宗昭愍毒由宫臣其范陽之亂奉天之逼雖安泚為之戎首而甫杞實其禍胎恭惠不君紀律虧替私昵執鈞衡之柄閽寺專帷幄之謀於是患結安南兵連徐土發邛蜀之役構雲代之釁恭定繼立王綱已解半天之下巢讓之所塗炭自陜以東權儒之所踐食禁旅為蒲人所殲邠師以襄王僣命原其禍孽都由令孜是故唐之傾危不自藩鎮皆自蕭墻之内也向使明皇勤恤無怠開元之初神武勵精常若建中之始懿皇紹稱克守大中之政則范陽涇帥乗何釁而犯順嶺表彭門因何隙而嘯聚譬之瘣木蠹由中生譬之累棊勢從上墜故知治亂本乎法度興亡繫乎時君御得諸道逺可以賔絶俗撫乖乎方近不能保宫室彼方州者闗柅動靜臂指伸縮制不在外而在中矣且夫我太祖之以睿武拯天下則有經綸恢定之畧駕馭威懷之術我太宗之以英文繼大業則有緝熙撫寧之道裁節畫一之制我真宗之以至仁纘丕圖則有寛冲恭睦之德持盈保成之方維其撥亂守文理致小異然皆主威獨運國命自制政不容於姑息思不假於近習此所以髙拱南靣子孫無疆之法也主上爍震耀之精體乾剛之德攬威福二柄以照臨四表剸制無牽忍之愛采拔罔卑逺之隔廣謀以明聽受獨斷而絶浸潤此其上所以建皇極下所以綏天下者彼郡縣之制苟曰不虞豈朝廷之所恃者乎謹論樂全集卷七
