body:
  text: 樂全集卷二十三宋張方平撰論事奏夏州事宜近者夏戎寖驕慢所遣貢賀首領輒假竊官號凌僣之狀暴著臣在秦州雖去諒祚住坐處逺然邊事相關頗知其動靜夏人數易西蕃前年交兵數為董氊摧敗忙宗車明等族因此搆釁被誅諒祚既除權迫遂懷侈汰觀其妄作蓋是狂童野心非同元昊之權譎變詐豪勇神斷者也初元昊欲阻命先威服諸戎潛通契丹結輔車之勢法令明審能用其衆戰勝而無輕狃之志雖覆軍殺將然不過邀鹵獲之利所破城堡亦不能有也不五七年其力已自困況使一舉而有所不利其勢固無以復振幸朝廷撫徠遂至納款猶終不敢極上僣之惡今此狂童只緣誅三強族自謂人莫我敢忤輒爾驕盈北連兵於契丹南結仇於邈川睥睨中國欲負恩信其經事舊人蓋懼其敢行誅戮雖有忠謀善意莫為之盡其實上下離二其部族苦於苛斂若其妄動恐或是其自取亡散之期以臣愚見惟望朝廷嚴戒邊吏但逺斥候繕堡壁除戎器羌冦或至謹據要害以守境保民勿與爭鋒逐利精遣間諜重開賞募以招納其亡叛而潰其心腹此今日禦戎之上䇿也且戎冦屯集不能曠月日相持恃持重可以敝之但使集而無大利自難再舉矣儻忿不思難虐用其衆契丹窺其釁邈川乘其敝至於帳下之變勢且有之天其或者昊賊之餘殃其將降罰此羌也論國計出納事三司勘會陜西用兵以來內外所增置禁軍八百六十餘指揮約四十有餘萬人通人員長行用中等例每人約科錢五百月糧兩石五斗春冬衣紬絹六匹綿一十二兩隨衣錢三千計每年共支料錢二百四十萬緡糧一千二百萬石準例六折計七百二十萬石紬絹二百四十萬匹綿四百八十萬兩隨衣錢一百二十萬緡每次南郊賞給六百萬緡內馬軍一百二十餘指揮若馬數全足計六萬有餘匹每年支草一千五百一十二萬束料一百五十一萬二千石其係三路保捷振武宣毅武衛清邊蕃落等指揮並本道土兵連營仰給約二十餘萬人比屯駐戍兵當四十萬人本道稅賦支贍不足募商人入中糧草度支給還錢帛加擡則例價率三倍茶鹽礬緣此法賤貨利流散弊悉歸官又自慶厯三年以後增添給送西北銀絹內外文武冗官日更增廣以此三司經用不贍慶厯二年六月聖恩特賜內藏銀一百萬兩絹二百萬匹仍盡放免日前所貸內庫錢帛慶厯三年八月又蒙恩賜內藏紬絹三百萬匹據此銀絹六百萬匹兩為錢一千二百萬緡支用慶厯五年又將江南所鑄到大銅錢一十萬當小錢一百一十萬貫支使及今未滿五年相添費用已盡乃是每年常將內藏銀絹近三百萬緡供助三司經費仍復調發諸路錢物應副方始得足即日外州府庫搜剗亡餘不知內藏蓄積幾何可供今後支撥天下山澤之利茶鹽酒稅諸色課入比之先朝以前例皆大有增剩可謂無遺利也若據國家天下之廣嵗入之數自古無此之多者然有司調度交見匱乏直以支費數廣不量入以為出所致爾方今急務莫先貨食貨食不足何以為國昔唐自天寶之亂肅代之後禁軍乏餉畿甸百姓至挼穗以供兵食登都城門以望貢奉之至王室可為危蹙矣然患難既平則兵有時而解兵解則民力紓矣今禁兵之籍不啻百萬人坐而衣食無有解期七八年間天下已困而中外恬然不知云救萬一因之以冦戎加之以飢饉則國家逺計臣恐智者難以善於後矣請舉一事而言則他可以類知也景祐年中天下預買紬絹一百九十萬匹去年至買三百萬匹諸路轉運司率多訴者有司末如之何已議者徒知茶鹽諸貨利之法弊而不知弊之所由詳求其故法實不弊勢使然爾置兵有䇿則邊費可省邊費省則兼并之民不能觀時緩急以侵利權然後有司可以制輕重矣臣以不才謬當大計職憂所切心如焚灼推諸利害至於根本則關柅動靜臂指伸縮乃繫二府非有司所預謹具大略乞下中書樞密院審加圖議裁於聖斷變而通之允底蒸民之生兹為適治之路再上國計事臣昨曽約計天下財利出入之籍知天下之所以困本於兵因勘會自寶元慶厯後內外增置禁軍嵗給錢帛糧賜等數進呈乞朝廷圖議其事有以弛張之伏以太祖皇帝取荆潭收蜀廣南江南備晉冦禦西北二敵計所蓄兵不及十五萬國初得周兵十二萬後平蜀揀其精兵止留一百二十人及乾德中選練中外之兵止存十萬蓋極精鋭也後乃稍增及十五萬人爾太宗皇帝平太原備西邊禦北塞料簡軍旅增修戎備志在收取燕薊然蓄兵不過四十餘萬人先皇咸平中備西邊禦北塞搜募戰士至五十餘萬人及契丹請和祥符以後稍稍消汰弛馬牧地給耕民先帝常語宰臣曰天下兵馬之數雖不少精鋭者鮮且今之兵與古不同古者三時務農一時教戰民即兵矣今皆坐待衣食國家經費至廣不可不慎於選練向敏中曰軍額漸多農民轉耗近準詔旨已往召募斥去疲老大減冗食帝曰卿等常宜講求務于經久之要邊將占兵自固者輒罷之先帝常詔環慶路減神勇兵還營周瑩言當路兵數非多未敢便減上曰西邊難得芻糧每嵗役民輸運瑩無心惜民亦可知矣即以曹瑋代之至於寶元幾四十年可謂乂安矣向因夏戎阻命始籍民兵俄命刺之以補軍籍遂於陜西河北京東西增置保捷武衛宣毅等軍保捷一百八十五指揮武衛七十四指揮宣毅二百八十八指揮此其尤多者他不具載既而又置宣毅於江淮荆湖福建等路淮南三十二兩浙二十二江東十三江西十七湖北十九湖南十一福建十二指揮凡內外增置禁軍約四十二萬餘人通三朝舊兵且百萬其鄉軍義勇州郡廂軍諸軍小分半分剩員等不列於數連營之士日增南畝之民日減邇來七年之間民力大困天下耕夫織婦莫能給其衣食生民之膏澤竭盡國家之倉庫空虛而此冗兵狃於姑息寖驕以熾漸成厲階然且上下恬然不圖云救惟恐招置之不多也且太祖訓兵十萬人以定天下今以百萬人為少此無他爾各苟及身之安莫為經久之慮也夫苟且者臣下及身之謀經久者陛下國家之計今負販之家猶汲汲於擔石之備安有不慮經久而可以保全天下者哉比嵗以來三路入中糧草度支給還價錢常至一千萬貫上下邊費如此何以枝梧臣較今大計加之百萬不為益減之百萬不為損而比來鬻官六千緡者與簿尉萬緡則殿直諸監管場務官準課程以立賞格收贏至三二千緡即以次遷陟不知賣官遷官幾何員數可供三路一嵗糧草之費是謂聚畎澮之微供尾閭之泄也淺陋之人更言遺利以禆經用末矣蓋財計盈虛時事安危繫諸兵而已矣景祐以前兵五十萬三司財用無餘及今而加一倍則何以得足臣近約度今年在京支計前已進呈只是準擬常程用度圓融變轉僅以有備過此以往若更因之以橫費加之以飢饉雖有智者亦恐難以善其後矣況臣之愚敢期克濟惟社稷之福祖宗之靈陛下至仁盛德有以感格天地降之以善祥報之以有年則兆民之所賴也若觀諸人事臣愚竊甚寒心伏望令中書樞密院檢會臣前奏審加計議裁於聖斷早為之所猶須效在纍年之後如救焚溺緩則益不及矣請節省財用事伏以天下承平為嵗深逺而國用不贍民力益困今聚師境上調費寖廣倚於經入則財不給加以橫賦則人不堪救兹交急特在陛下身先於率下惟事事乃其撙約而已臣竊惟陛下躬勤節用克自抑畏凡諸服御殊為菲薄而兹中外之論皆言用度之過臣竊疑之蓋宫闈嬖昵左右近習假威恣橫敢為欺誣仰恃仁慈緣為姦弊且禁中呼索輒稱聖旨有司應奉皆為上供故外人不知其詳而譏議纍乎聖德國家帑藏之困乃羣下侵牟之蠧也伏願陛下上念宗社之計下以生民為心彼婦人宦者何煩過為姑息超然逺慮斷自天心試取先帝之世及陛下臨御以來天聖之初宫司帳籍如內東門之類比較近年支費金帛則知增損豐儉之數以一言裁減之恩為萬方富庶之本兆民所賴為幸實深先朝以前事恐難繼若天聖初體例夫豈逺哉因降詔書諭天下以陛下憂邊之心愛民之故則將卒聞之孰不奮勵以授命士民聞之孰不鼓舞以稱仁至於外諸司庫務凡百橫費乞特置司局選用公平通敏諳曉時務之士三兩員條理之而以大臣一人監領其事其不便者惟是左右主當之臣爾誠陛下斷之不疑無容阻撓則上可以資德美下可以施恩惠內可以集國計外可以成武功效速而利多事近而德逺此當世之切務也論減省財用事臣近受敕同賈昌朝等定奪減省財費竊聞淵旨先自宫禁裁省一切用度至於聖躬奉給緡錢亦令罷供此蓋陛下身先勤儉為生靈計夫減省所為者自下而議上則於體不順由上以率下則於名為正臣願以禁中所行之事擇其大者三數節宣示外廷因發明詔使天下共知聖意憂邊愛人之深則中外臣庶得不體國家之急上承美德者乎特在陛下斷之清衷不屑細言則成效可兾也其有徇已之利與則喜奪則怒此女子與小人之情怨謗所由生也臣輩敢不竭精盡慮上副天心請校會邦計事伏見西事以來應副邊備天下被其勞凡百賦率至增數倍當時朝旨蓋為用兵之際權宜應急豈敢承以為常今邊防雖已漸寧而緣邊戍守未能徹備四方添置兵馬數亦甚多向之所增賦斂必難復舊何以慰天下百姓之望朝廷所以綏懷二國者正謂寬財用紓民力以厚為之備也今乘邊事之間豈可優遊虛度嵗月不切講求經久之計若遂恬然憚於有為臣恐民力日困財用日匱難以善於後矣今內自三司外至發運轉運使凡掌財利之官簿書期會猶不暇給豈暇為國家生民逺慮者哉臣欲乞於兩省已上官選差才敏之士三兩員就三司與使副據國用嵗計之數量入以為出平貨物之輕重通天下之有無校其利害之源以革因循之弊旋具事節先到中書樞密院開陳商量必久逺可行者奏上取裁若細碎之事無大損益徒成煩擾不須施行所兾助財用紓民力當今之切務也再奏請劄子方今天下切務無先貨食貨食之原在於三司而計臣事務煩綜簿書期會之不暇給豈暇及於國家根本之慮哉故於去年曽上言乞於兩省巳上官選差三兩員就三司與使副據嵗計之所入約中外之所費移用之法則權其輕重率斂之物則通其有無參究利害之原剗革因循之弊所兾寬財用紓民力助三司均節之體者也自後未蒙朝廷施行不測所以難之之意今不乘邊事之間急講久逺之策臣恐民力日困財用日匱恐朝廷重於生事欲乞且令三司將天聖中一年天下賦入之數及中外支費之籍與昨一年比並條上則國家之大計可校而知矣如是而可以經久則善如其不可則豈得恬然不深慮哉前所上劄子伏乞更賜詳擇請别差官議財計事臣近曽上言乞差官就三司議財計事近聞已差臣及楊偕且臣本請推擇才識之士已而自當其選招攬事任以為已功干涉物議理甚不可緣臣忝處言責之地故思慮所及合以陳論豈其淺愚果能周務其所裁定之事雖更經中書樞密院商量就復有失將使誰言乞賜别命近臣於體為便改差高若訥奏財計未便合商量條件臣昨請差官就三司同議財計事訪於衆議凡公私利害比比而有今舉其大要列上五條略開其端餘繫所議凡如此事必料中書樞密院及三司前後皆有臣寮曽上言其便宜亦乞檢會送下本處參詳可否施行一陜西河東見行財幣利害合議定經久之法以便官私一天下常平倉所以權斂散平輕重合議興舉一兩川久來將諸埸務課利變納銀及自西事已來增賦絹布數多民力交見困竭合議救革一淮南諸鹽埸積鹽相因而江南逺地荆湖兩路民無食鹽官有遺利衆謂通商為便合議施行之法一諸路入中糧草利害極多本為窮邊艱於挽送計其役費募人入納比來豪賈遂擅公利因國緩急反操輕重其間地有險易穀有凶穰平準適宜合行議定奉聖旨送楊偕等商議請省陜西兵馬及諸冗費事臣伏聞陜西夏旱二麥不收近雖有得雨處秋田亦未必有望民已艱食頗有流移邊警雖寧兵戍尚衆因之飢饉事實可憂芻糧委輸最為切務朝廷綏懷夏冦本為休兵息民若其役費不紓必見物力日困經久之計殆無以支又比來諸州纍報地震考諸咎證由陰有餘夫陰者妻道也臣道也民也外蕃也此時後宫無過制外廷無權強所當戒慮者民與外蕃爾內安民而外待強蕃其要在貨力有備而已今境上堡寨兵分力微假如冦來勢必不能出戰如其守也即隨處土人自應足用況春夏之際敵人必無大舉若每年三月以後緣邊所屯軍兵一切抽向內地就食至八九月復遣出戍又邊城一馬之給當步卒三人既多羸駑不任馳敵平時虛糜芻粟動輒兼人送命若今後所發緣邊屯駐馬軍約度足以巡邏外稍用步人替還寬減調度此其約也近聞勾抽陜西提點刑獄曹穎叔到闕欲令減省邊計臣兩見穎叔據其説畫亦恐虛行今邊臣惟務留兵朝廷無肯任咎悠悠穎叔如大計何必在內外協心休戚齊慮乘邊隅之粗間極夙夜以疚懷倘詳利害之原猶有異同之論斷之欲獨當繫聖裁穎叔此行每事乞明與處分凡干冗費深加裁減如恐其勢輕重難獨任或推選近臣一員承命而往其陜西四路部署乞各賜一詔書諭之此意使與穎叔公共計議所有陜西轉運使亦乞察臣前言早賜别行擇任請減省河北徭役事伏以國家通好契丹三十七年于兹矣邊人不知有戰爭之患餉餽之勤保其父子室家安於耕桑畜牧宜乎生業益殖事力加裕而比屋雕瘁率無蓋藏一穀不登莫能自濟臣愚竊思其故其弊有三一曰厨傳二曰徭役三曰河防自和好以來邊將無所事惟以酒食宴樂苞苴問遺名聲相傾惟恐不逮公錢不足則取於百姓百姓不足則賈以求贏賈又不足則有傾私槖以繼之者羊豕不得擾于闌雉兔不得安于野行販者不得共其利擔負者不得寧其居此厨傳之弊也又民之大害惟在更徭有丁解州役即被縣差家無兼丁自身營業故凡役事率以雇傭二年一更傭金不減十萬中人之家耗矣夫如是百姓安得不困臣獨竊歎邊陲無事逾四十年不能公私充實備於無患而竭民之財産於不急之役及官吏口腹逸欲之費一旦倉卒蕭然無所恃惟彼河防猶為國事所不得已者欲乞朝廷選官與河北轉運使盡取一路郡縣凡民之籍以較徭役之數益減節之所有州郡厨傳餼贈之弊深料此事亦非官吏所願然蓋體例相習彼此相形雖有愛民節用之心勢不可獨異臣謂宜明為條約事為之制則雖往來使客亦自絶過望之心至于毁譽愛憎亦當漸自消弭然後裁損用度以充公私之備詢考名實以觀郡縣之政三數年庶乎民之富庶必有加也請選河北河東陜西轉運使事切惟今邊事粗寧正是朝廷日夕留意思患預防之時若夫撫綏疲民均節賦役與事切近而可以致功利者三路轉運使最當精選也如陜西河東殘敝之餘而用某等今又除某官此遵常守故敘遷次補而已任才濟務則未也近某官授河北衆亦非允然有與共事猶可相兼其陜西河東各乞特選一員代去其尤不任職者聊以下厭物論夫有言責者事有害於理則言之可也相時俯仰依違其議蓋懲髙論之無益度朝廷之能行者而少取其效爾論京師軍儲事臣竊惟今之京師古所謂陳留天下四衝八達之地者也非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐末朱溫受封于梁因而建都至于石晉割幽薊之地以入契丹遂與強敵共平原之利故五代爭奪戎馬生郊其患由乎畿甸無藩籬之限本根無所庇也祖宗受命規摹畢講不還周漢之宇而梁氏是因非樂是而處之勢有所不獲已者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立兵以食為命食以漕運為本今仰食于官廩者不惟三軍至于京城士庶以億萬計大半待飽于軍稍之餘故國家於漕事最急最重臣慶厯五年權三司使嘗取責到在京諸倉見在斛斗數人糧一千三百萬石是時每月約支三十四萬有餘石計可備二年一十一月日支遣馬料三百二十萬石是時每月約支四萬餘石計可備七年支遣今次受命再領邦計昨於三月中取責到在京諸倉見在斛斗數人糧八百萬石每月約支四十萬石計可備一年餘八月日支遣馬料七十萬石每月約支四萬七千餘石計可備一年餘四月日支遣自慶厯及今通十年之比計所虧耗五分之二為國逺慮竊所寒心究所以致然者蓋自慶厯七年揀發京東西江湖淮浙宣毅兵士充填在京諸軍至於諸色冗食頃來益衆復自有事西邊內外支費不贍屢減東南之糴使輸緡王府或州郡災傷朝旨輒輟糧運以救賙艱急亦緣諸路轉運積成廢慢年額虧減上下因循闕於督舉官失其守事忘其舊致令儲備益乏如此日侵月削更五七年京師倉廩無一年之蓄矣夫金帛輕貨緩急易聚至於糧餽非素為備若因之以飢饉倘别有不可預防之事一旦闕悮豈可倉卒而致者倘有不給雖大聖智其將何術以濟此國家安危之計也臣才慮疏淺然職思其憂謹具所合舉行之事畫一條件如右一汴河年額上供斛斗六百萬石若每年般運及數可以年支得給而有餘自康定年後西邉用兵經費不足每年常將上供斛斗折納見錢一石千錢為率或一百萬石或五十萬石是時王師外戍在京軍糧月支數少減倉儲供邊糴猶為有名自後邊兵還營京師增置禁旅人數益多猶復時緣前例折納去年以恭謝大禮亦是於江湖六路將斛斗五十萬石折錢五十萬緡起發上京乞特降敕命三司今後更不得將年額上供斛斗折變見錢一汴河上供斛斗本為京師軍儲自明道年山東荐飢朝廷以為憂特令截撥運米入清河賑濟自後緣此屢以上供糧斛外支諸路去年令截上供糧米六十萬石應副河北十五萬石應副京東五萬二千有餘石自湖南起發赴昭桂州卸納然州縣災荒理當賙救若慮害輕重則本末當有校矣乞特降敕命今後諸路災傷不得更議截撥上供斛斗只令三司多方擘畫就别路支移應副若極於艱急須至輟借內帑錢帛猶愈於虧乏軍儲之患大也一廣濟河年額上供斛斗六十二萬石其實五十萬石內十二萬石因慶厯初京東轉運使奏南京軍營多每歲計度軍糧支移徐單曹濟州廣濟軍二稅應副民力勞敝遂截上供運米十二萬石通舊八萬石共二十萬石充本京軍糧却從廣濟河認數般運填納所截粳米小麥其填數多是雜色粟豆已為虧損倉儲而又每年三司折變錢帛供助支費至和二年折三十一萬石嘉祐元年二十萬石或冇盡數折納之時只是三司承例施行亦不曽奏候朝旨今年不曽更行折變然亦慮本路遞年不曽盡數起發斛斗以此綱運人船或有因循闕備乞降敕命三司今後不得更將廣濟河年額上供斛斗折變錢帛及下本路所般年額斛斗今後須得起發及數其綱船兵士常令本司添填有備運路河道亦委本司相度擘畫取令通濟一惠民河年額上供斛斗六十萬石內二十五萬石係淮南年額般赴咸平太康尉氏等縣充軍糧比來發運司又於汴河上供年額內豁除此數顯是將此斛斗兩充數省司見行根問次其三十五萬石合是京西管認起發近嵗並不曽趕辦般運其到京之數每年五七萬而已勘會皇祐五年曽降朝旨令蔡河撥發司每年添般上供斛斗數目本路辭訴部內災傷乞候豐熟應副自後因循亦是催促不前今相度本路財賦不至豐贍諸色支費亦多令辦年額必恐不逮乞降敕命今後年額上供斛斗特與減十五萬石只今般運二十萬須管到京數足不得更有虧闕內供御小麥并油醋庫油麻逐時依省司拋數供納外許以大小麥小豆黑豆穀粟充數一黃河檢會景德二年敕陜西轉運司每年認定馬料三十萬石上京所有細色斛斗如有剩數即行般運又檢會三門白波發運司編敕黃河年額上供糧斛委陜西轉運司並支新好斛斗赴緣河倉送納仍常預報三門白波發運司計度人船般運若計度支移有失即罪在轉運司般運虧額即罪發運司並令三門發運判官催驅般輦每至冬終具般過數目比較申奏臣看詳景德二年正是繼遷騷擾西陲用兵陜右困敝之際然猶漕運上供京師未嘗廢也勘會近嵗以來即不曽起發一船一運到京抑由中間天下無事財力豐贍倉廩充實不以儲蓄為切務內外因循及寶元中夏戎叛命遂不暇給頃來邊事寧息關中纍年豐熟本路財費無闕朝廷至今每年供給物帛不少其舊額馬料三十萬石合行計度上供乞特降敕旨下陜西轉運司三門白波發運司起嘉祐二年秋一依先降敕命據年額馬料三十萬石須管般運到京數足一在京歲支馬料豆麥約六十萬石近年計度多拋數下發運司起發遂以大麥黑豆粗色充數每年常及三十萬石計兵船口食水腳為費數倍今若令陜西京西及將京畿二稅細色折納粗色嵗計可以得足則汴河漕挽專令般粳米量以小麥充以年額此所謂轉江湖之榖以實太倉者也一今以軍儲大計欲倉廩充實諸河所般年額上供斛斗據見今綱船兵梢常患不足難更添數般運惟是在京坐倉收糴可免漕挽之費即今京倉月支軍糧四十萬石若坐倉收糴每月以五萬石為限猶有寬剩可以充民糴如此每年可得六十萬石其價例當隨時估定然通計中等價例每斗一百文用錢六十萬貫勘會遞年春初內藏庫撥錢六十萬貫付三司添助支費謂之年退錢樁留此錢以充糴價可也即今計天下財賦所入中外軍國所費年支見在不至交闕昨以河北災傷又河防為患本路艱急自三司供給除軍糧斛斗外支撥見錢銀絹約八十五萬貫匹兩又約度今年年支糧草計置人糧馬料二百萬石以本路豐稔更於年計外添糴一百萬石準備軍儲凡此糴本價錢今已計度有備又今年見將麴院店宅務課利錢六十五萬貫撥還內藏庫填納至和二年分輟過河北便糴本錢約更用來年半年課利可以撥填數足凡此錢數並係年計外非泛支費總計二百二十萬貫有餘即日猶據見在粗無闕乏若諸路豐熟邊陲寧靜朝廷每事撙節别無橫費則年退錢一項樁充坐倉糴本添備軍糧足可那容不至闕悮一備儲廪通漕運當令河道疏通藝祖開國首浚諸河按汴渠本禹迹也春秋時已名見諸經歷代嘗濬之隋大發民開鑿通濟渠其去古汴依約不逺自漢至唐雖都雍洛凡諸水運咸資此渠漕引江湖利盡南海天聖已前每嵗開理緣河人户各蓄開河器備名品甚多未嘗有堙壅也天聖初有張君平者陳利見始罷春夫繼以淺妄小人苟規賞利撙減役費以為勞績致兹淤塞有妨通漕至于惠民廣濟二河皆所以致四方之貨食以會京邑舳艫相接贍給公私近年以來悉皆填塞蓋圖長利者不恤於小費期永逸者無憚於一勞伏乞朝廷訪問差擇稍知水利精力幹事不拘文武官三兩員經度計置開通諸河各據地分所歷州縣夫令盡工料疏理其木岸埧閘堰埭材用合繕修處先為計備嚴為責罰必令經久去年京畿大水壞官私廬舍自去秋至今春半年之中所修諸軍營房十餘萬間夫以國家物力豈有不可成之事但事敗於因循而成於果決至於其所不獲已亦必成而巳又諸修造無名不急之處土木之工無時暫輟所費不可勝計此諸河道皆是祖宗留心之地國家大計所資忽而不圖是亦有司之過矣一裏河折中倉本是在京便糴以添助軍儲隨時立法旋行拋數然於邉糴輕重有妨以此便入不能及數近慶厯年中令在京入中諸色斛斗二百萬石用三説法三十貫支見錢三十五貫支向南州軍末鹽三十五貫支香藥茶交引當時為河北緣邉入便亦用三説文鈔以此只入到十五萬餘石事體不便遂罷今在庫香藥闕少又江湖末鹽自是見錢之法邦計所賴諸山場茶貨巳充河北糧草支用若更將折中行使必亦利害相攻故不若坐倉收糴事簡而利溥也一京東淮南土壤寬廣財穀足贍可容三五萬人駐泊就糧若遣京師禁軍就糧淮南河北兵士就糧京東可以省倉儲留邉榖因其外屯亦可揀退疲冗一積粟太倉本以強兵而惰遊冗食之人坐為糜耗使儲廪日以虛竭玩而弗恤斯為深弊勘會在京及畿縣諸營剩員僅及三萬人至於京城六軍兵士其間老病不堪作役者至多諸司庫務疲癃遊冗不可勝計是皆衣食於帑廪牟蠧生民之膏澤者也夫山海之髙深不讓涓塵之益億萬之數積於一二故事聚蓄者必纍微細以成廣大凡此在京六軍及京城府界剩員諸司庫務諸老病之人欲乞朝廷詳酌指揮漸次揀選放停免令虛耗倉庫一府界稅賦準皇祐五年赦敕應開封府諸縣兩稅太重特於元額上減落三分永為定式今勘會除依赦敕減三分外即今夏秋二稅斛斗四十萬有餘石錢三十四萬有餘貫紬絹十萬有餘匹向由賦重百姓輸送不逮故因災害多是體量減放務從寬恤朝廷以此明降赦令例行優除姦遊之民尚循故態年榖順成亦復披訴官吏自圖省便未嘗按行檢履但據保甲槩為約免苟容僥幸習以為常今後畿縣災傷差官分檢令並依農田敕式樣施行除放蓋租稅之制有國者所以取于民至公之道爾若是歲之凶穰如法而弛斂事舉其中理合於正所謂理財正辭禁民為非曰義者也一轉漕之職在發運使屬之官責當久其任請精選才幹之吏曽歷三司判官合入第二任轉運使資序人權充候及三年職事辦集即與正除又及三年事務修舉與就除三司副使領職又及三年與除近職或兩省官其有器略足用者更自朝廷奬擢委任其兩員嘗令先後除代此則為官擇人之體也一糧綱到京交納少欠每歲不下六七萬石其逐綱劵厯兵稍糧食承例在路並權閣不請及到倉卸納據逐船少數將在劵閣留糧斛充償所欠謂之折會據兵稍口食合是緣路支請輒行積留却將太倉合納軍儲消折此皆起於近歲因循敝例理合令發運司依數包認每年候上供住運具折會都數下本司次第理納補填此小事巳從三司指揮行下亦合以聞右臣所條畫事節乞自朝廷詳議施行倘相繼持守不遽隳改則庶乎三年可以餘一年之儲十年可以致三年之積通三十年而有九年之蓄可謂盛王之大業也前史有言堯之水湯之旱而無危忘之慮以其儲蓄有備爾堯湯之聖不能以無備而待天災天災流行亦無如人之有備也唐劉晏論漕運之事云三秦之人待此而飽六軍之衆待此而強四方旅拒者可以破膽三河流離者於兹請命是謂安社稷之奇䇿也夫立人之道建國之本在乎衣食而巳矣惟陛下深留聖慮焉樂全集卷二十三
